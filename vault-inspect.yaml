apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: vault-inspect-global-
  namespace: argo-workflows
spec:
  entrypoint: main
  serviceAccountName: argo-workflow-sa
  templates:
    - name: main
      container:
        image: hashicorp/vault:1.15
        command: [sh, -c]
        args:
          - |
            export VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
            export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=argo-workflow jwt=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token))
            
            echo "--- List secret/platform ---"
            vault kv list secret/platform || echo "Failed to list platform"
            
            echo "--- List secret/teams ---"
            vault kv list secret/teams || echo "Failed to list teams"
            
            echo "--- Check specific agent path ---"
            vault kv get secret/platform/mctl-agent/database || echo "Not found at platform/mctl-agent/database"
