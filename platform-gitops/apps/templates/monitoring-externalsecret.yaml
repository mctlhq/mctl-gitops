---
# ExternalSecret for Grafana admin credentials
# Synced from Vault path: secret/data/platform/grafana
# Required keys in Vault: admin-user, admin-password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: platform/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: platform/grafana
        property: admin-password
