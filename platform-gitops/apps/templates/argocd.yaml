apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-self-managed
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: "9.4.1"
    helm:
      releaseName: argocd
      values: |
        ## Argo CD configuration for mctl.me preview
        ## Managed by ArgoCD itself (GitOps)

        nameOverride: argocd

        global:
          domain: argocd-preview.mctl.me

        configs:
          cm:
            url: https://argocd-preview.mctl.me
            admin.enabled: true
            timeout.reconciliation: 180s

            # Health check for ExternalSecrets
            resource.customizations.health.external-secrets.io_ExternalSecret: |
              hs = {}
              if obj.status ~= nil then
                if obj.status.conditions ~= nil then
                  for _, condition in ipairs(obj.status.conditions) do
                    if condition.type == "Ready" then
                      if condition.status == "True" then
                        hs.status = "Healthy"
                        hs.message = condition.message or "SecretSynced"
                      else
                        hs.status = "Degraded"
                        hs.message = condition.message or "Not ready"
                      end
                      return hs
                    end
                  end
                end
              end
              hs.status = "Progressing"
              hs.message = "Waiting for sync"
              return hs

            # Health check for Applications
            resource.customizations.health.argoproj.io_Application: |
              hs = {}
              hs.status = "Progressing"
              hs.message = ""
              if obj.status ~= nil then
                if obj.status.health ~= nil then
                  hs.status = obj.status.health.status
                  if obj.status.health.message ~= nil then
                    hs.message = obj.status.health.message
                  end
                end
              end
              return hs

            # Dex connector for GitHub OAuth
            dex.config: |
              logger:
                level: info
                format: json
              connectors:
              - type: github
                id: github
                name: GitHub
                config:
                  baseURL: https://github.com
                  clientID: "$github-client-id"
                  clientSecret: "$github-client-secret"
                  orgs:
                    - name: dmitriimashkov

          params:
            server.insecure: true

          # RBAC managed by external ConfigMap (argocd-rbac-cm.yaml)
          rbac:
            # Use external ConfigMap for policies
            policy.default: ""
            scopes: "[groups]"

          secret:
            createSecret: true
            extra:
              github-client-id: ""
              github-client-secret: ""

        # Server ingress configuration
        server:
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            tls: true
            extraTls:
              - hosts:
                  - argocd-preview.mctl.me
                secretName: argocd-tls

        # Root app embedded in ArgoCD installation
        extraObjects:
          - apiVersion: argoproj.io/v1alpha1
            kind: Application
            metadata:
              name: root-app
              namespace: argocd
              finalizers:
                - resources-finalizer.argocd.argoproj.io
            spec:
              project: default
              source:
                repoURL: https://github.com/dmitriimashkov/mctl.me.git
                targetRevision: main
                path: platform-gitops/apps
                helm:
                  valueFiles:
                    - values.yaml
              destination:
                server: https://kubernetes.default.svc
                namespace: argocd
              syncPolicy:
                automated:
                  prune: true
                  selfHeal: true
                syncOptions:
                  - ServerSideApply=true  # Prevent CRD annotation bloat
                  - RespectIgnoreDifferences=true
                retry:
                  limit: 5
                  backoff:
                    duration: 5s
                    factor: 2
                    maxDuration: 3m
              ignoreDifferences:
                - group: external-secrets.io
                  kind: ExternalSecret
                  jqPathExpressions:
                    - .spec.data[].remoteRef.conversionStrategy
                    - .spec.data[].remoteRef.decodingStrategy
                    - .spec.data[].remoteRef.metadataPolicy
                    - .spec.target.deletionPolicy
                    - .spec.target.template.engineVersion
                    - .spec.target.template.mergePolicy

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: false  # Don't auto-prune ArgoCD itself (safety)
      selfHeal: true
    syncOptions:
      - CreateNamespace=false  # Namespace already exists
      - RespectIgnoreDifferences=true
      - ServerSideApply=true  # Prevent CRD annotation bloat
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Ignore differences in secrets (managed by ExternalSecrets)
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: argocd-secret
      jsonPointers:
        - /data
