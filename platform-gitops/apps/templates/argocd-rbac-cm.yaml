apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  policy.default: ""
  policy.csv: |
    # ============================================================================
    # ArgoCD RBAC Policies - Synced with GitHub Teams
    # ============================================================================
    #
    # To add a new team:
    # 1. Create GitHub team in dmitriimashkov organization
    # 2. Add team mapping below: g, dmitriimashkov:<team>, role:team-<team>
    # 3. Add team policies below
    # 4. Commit to git → ArgoCD syncs automatically
    #
    # ============================================================================

    # Admin team: full access to ArgoCD
    p, role:admin, applications, *, */*, allow
    p, role:admin, logs, get, */*, allow
    p, role:admin, exec, create, */*, allow
    p, role:admin, clusters, get, */*, allow
    p, role:admin, repositories, *, */*, allow
    p, role:admin, projects, *, */*, allow
    g, dmitriimashkov:admin, role:admin

    # ============================================================================
    # Team-Based Access (Read-Only)
    # Pattern: preview-{team}-* applications
    # ============================================================================

    # Team: libertex
    p, role:team-libertex, applications, get, argocd/preview-libertex-*, allow
    p, role:team-libertex, logs, get, argocd/preview-libertex-*, allow
    g, dmitriimashkov:libertex, role:team-libertex

    # Team: internal
    p, role:team-internal, applications, get, argocd/preview-internal-*, allow
    p, role:team-internal, logs, get, argocd/preview-internal-*, allow
    g, dmitriimashkov:internal, role:team-internal

    # ============================================================================
    # Example: To add "backend" team:
    # ============================================================================
    # 1. Create GitHub team: https://github.com/orgs/dmitriimashkov/teams
    # 2. Add users to team
    # 3. Add these lines:
    #
    # # Team: backend
    # p, role:team-backend, applications, get, argocd/preview-backend-*, allow
    # p, role:team-backend, logs, get, argocd/preview-backend-*, allow
    # g, dmitriimashkov:backend, role:team-backend
    #
    # 4. Commit → Push → ArgoCD syncs
    # 5. Users in backend team can now view preview-backend-* applications
    # ============================================================================
