apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-cleanup
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-cleanup
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["vault-token"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vault-cleanup
subjects:
- kind: ServiceAccount
  name: vault-cleanup
  namespace: default
---
# ExternalSecret для Vault cleanup token
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-cleanup-token
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: preview/vault/cleanup-token
        property: token
