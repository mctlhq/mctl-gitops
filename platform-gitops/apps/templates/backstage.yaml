apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://backstage.github.io/charts
    chart: backstage
    targetRevision: 2.6.3
    helm:
      values: |
        ingress:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          host: backstage-preprod.mctl.me
          tls:
            enabled: true
            secretName: backstage-tls

        backstage:
          image:
            registry: ghcr.io
            repository: dmitriimashkov/backstage
            tag: latest
            pullSecrets:
              - ghcr-credentials
          extraEnvVarsSecrets:
            - backstage-secrets
          appConfig:
            app:
              title: mctl.me Backstage
              baseUrl: https://backstage-preprod.mctl.me
            organization:
              name: mctl.me
            backend:
              baseUrl: https://backstage-preprod.mctl.me
              listen:
                port: 7007
              database:
                client: pg
                connection:
                  host: backstage-postgresql
                  port: "5432"
                  user: backstage
                  password: backstage
            auth:
              environment: production
              providers:
                github:
                  production:
                    clientId: ${AUTH_GITHUB_CLIENT_ID}
                    clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
                    signIn:
                      resolvers:
                        - resolver: usernameMatchingUserEntityName
            integrations:
              github:
                - host: github.com
                  token: ${GITHUB_TOKEN}
            proxy:
              endpoints:
                /vault:
                  target: ${VAULT_ADDR}
                  credentials: dangerously-allow-unauthenticated
                  headers:
                    X-Vault-Token: ${VAULT_TOKEN}
                  allowedMethods:
                    - GET
                    - POST
                    - PUT
                  allowedHeaders:
                    - Content-Type
            catalog:
              rules:
                - allow: [Component, System, API, Resource, Location, Template, Group, User]
              providers:
                githubOrg:
                  - id: production
                    githubUrl: https://github.com
                    orgs:
                      - dmitriimashkov
                    schedule:
                      initialDelay:
                        seconds: 30
                      frequency:
                        minutes: 1
                      timeout:
                        minutes: 10
              locations:
                - type: url
                  target: https://github.com/dmitriimashkov/mctl.me/blob/main/backstage-templates/deploy-service/template.yaml
                  rules:
                    - allow: [Template]

        postgresql:
          enabled: true
          auth:
            username: backstage
            password: backstage
          architecture: standalone
          primary:
            persistence:
              storageClass: longhorn

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
