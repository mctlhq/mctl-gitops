apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://backstage.github.io/charts
    chart: backstage
    targetRevision: 2.6.3
    helm:
      values: |
        ingress:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          host: backstage-preview.mctl.me
          tls:
            enabled: true
            secretName: backstage-tls

        backstage:
          image:
            registry: ghcr.io
            repository: dmitriimashkov/backstage
            tag: 1.13.2
            pullSecrets:
              - ghcr-credentials
          extraEnvVarsSecrets:
            - backstage-secrets
          startupProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
            periodSeconds: 10
            failureThreshold: 2
          appConfig:
            app:
              title: mctl.me Backstage
              baseUrl: https://backstage-preview.mctl.me
            organization:
              name: mctl.me
            backend:
              baseUrl: https://backstage-preview.mctl.me
              listen:
                port: 7007
              database:
                client: pg
                pluginDivisionMode: schema
                connection:
                  host: ${POSTGRES_HOST}
                  port: ${POSTGRES_PORT}
                  user: ${POSTGRES_USER}
                  password: ${POSTGRES_PASSWORD}
                  database: ${POSTGRES_DB}
                knexConfig:
                  pool:
                    min: 0
                    max: 3
            auth:
              environment: production
              providers:
                github:
                  production:
                    clientId: ${AUTH_GITHUB_CLIENT_ID}
                    clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
                    signIn:
                      resolvers:
                        - resolver: usernameMatchingUserEntityName
            integrations:
              github:
                - host: github.com
                  apps:
                    - appId: ${GITHUB_APP_ID}
                      clientId: ${GITHUB_APP_CLIENT_ID}
                      clientSecret: ${GITHUB_APP_CLIENT_SECRET}
                      privateKey: ${GITHUB_APP_PRIVATE_KEY}
            permission:
              enabled: true
            githubAppConnect:
              appSlug: mctl-me
              appId: ${GITHUB_APP_ID}
              privateKey: ${GITHUB_APP_PRIVATE_KEY}
            vaultSecrets:
              endpoint: ${VAULT_ADDR}
              token: ${VAULT_TOKEN}
            proxy:
              endpoints:
                /vault:
                  target: ${VAULT_ADDR}
                  credentials: dangerously-allow-unauthenticated
                  headers:
                    X-Vault-Token: ${VAULT_TOKEN}
                  allowedMethods:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - PATCH
                  allowedHeaders:
                    - Content-Type
            catalog:
              orphanStrategy: delete
              rules:
                - allow: [Component, System, Domain, API, Resource, Location, Template, Group, User]
              providers:
                githubOrg:
                  - id: production
                    githubUrl: https://github.com
                    orgs:
                      - dmitriimashkov
                    schedule:
                      initialDelay:
                        seconds: 30
                      frequency:
                        minutes: 1
                      timeout:
                        minutes: 10
                github:
                  mctlMe:
                    organization: dmitriimashkov
                    catalogPath: /catalog-info.yaml
                    filters:
                      repository: mctl.me
                      branch: main
                    schedule:
                      frequency:
                        minutes: 1
                      timeout:
                        minutes: 3
                  platformCatalog:
                    organization: dmitriimashkov
                    catalogPath: /platform-gitops/catalog-info.yaml
                    filters:
                      repository: mctl.me
                      branch: main
                    schedule:
                      frequency:
                        minutes: 1
                      timeout:
                        minutes: 3
                  previewServices:
                    organization: dmitriimashkov
                    catalogPath: /platform-gitops/services/preview/*/*/catalog-info.yaml
                    filters:
                      repository: mctl.me
                      branch: main
                    schedule:
                      frequency:
                        minutes: 1
                      timeout:
                        minutes: 3
                  previewWorkers:
                    organization: dmitriimashkov
                    catalogPath: /platform-gitops/workers/preview/*/*/catalog-info.yaml
                    filters:
                      repository: mctl.me
                      branch: main
                    schedule:
                      frequency:
                        minutes: 1
                      timeout:
                        minutes: 3
              locations:
                # Backstage templates (static, no need for provider-based discovery)
                - type: url
                  target: https://github.com/dmitriimashkov/mctl.me/blob/main/platform-gitops/backstage-templates/deploy-component/template.yaml
                  rules:
                    - allow: [Template]
                - type: url
                  target: https://github.com/dmitriimashkov/mctl.me/blob/main/platform-gitops/backstage-templates/delete-component/template.yaml
                  rules:
                    - allow: [Template]
                - type: url
                  target: https://github.com/dmitriimashkov/mctl.me/blob/main/platform-gitops/backstage-templates/update-component-config/template.yaml
                  rules:
                    - allow: [Template]
                - type: url
                  target: https://github.com/dmitriimashkov/mctl.me/blob/main/platform-gitops/backstage-templates/provision-database/template.yaml
                  rules:
                    - allow: [Template]

        # PostgreSQL subchart disabled — using shared CNPG cluster in platform-db namespace
        postgresql:
          enabled: false

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
