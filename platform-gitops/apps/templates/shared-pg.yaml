apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-pg
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mctlhq/mctl-core.git
    targetRevision: main
    path: platform-gitops/cnpg-clusters/shared
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: platform-db
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      jqPathExpressions:
        - .metadata.annotations
        - .spec.postgresql.pg_hba
        - .spec.affinity
        - .spec.enablePDB
        - .spec.enableSuperuserAccess
        - .spec.failoverDelay
        - .spec.imageName
        - .spec.logLevel
        - .spec.maxSyncReplicas
        - .spec.minSyncReplicas
        - .spec.postgresGID
        - .spec.postgresUID
        - .spec.primaryUpdateMethod
        - .spec.primaryUpdateStrategy
        - .spec.replicationSlots
        - .spec.smartShutdownTimeout
        - .spec.startDelay
        - .spec.stopDelay
        - .spec.switchoverDelay
        - .status
        - .spec.managed.roles[]?.status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - ServerSideDiff=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
