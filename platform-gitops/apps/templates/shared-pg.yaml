apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-pg
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/dmitriimashkov/mctl.me.git
    targetRevision: main
    path: platform-gitops/cnpg-clusters/shared
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: platform-db
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
