# Allow mctl-api to submit Argo Workflows into any namespace (team namespaces)
# and to read ClusterWorkflowTemplates (cluster-scoped).
# The ServiceAccount itself is created by the mctl-api Helm chart.
#
# Workflows are submitted into the target team's namespace so they are visible
# at workflows.mctl.ai/workflows/<team>. A ClusterRole is used so that new
# team namespaces do not require additional RBAC changes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mctl-api-workflow-submitter
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["clusterworkflowtemplates"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mctl-api-workflow-submitter
subjects:
  - kind: ServiceAccount
    name: mctl-api
    namespace: mctl-api
roleRef:
  kind: ClusterRole
  name: mctl-api-workflow-submitter
  apiGroup: rbac.authorization.k8s.io
