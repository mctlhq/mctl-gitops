# Allow mctl-api to submit Argo Workflows and read ClusterWorkflowTemplates.
# The ServiceAccount itself is created by the mctl-api Helm chart.
# Workflows always execute in the argo-workflows namespace (infrastructure SA + secrets live there).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mctl-api-workflow-submitter
  namespace: argo-workflows
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["clusterworkflowtemplates"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mctl-api-workflow-submitter
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: mctl-api
    namespace: mctl-api
roleRef:
  kind: Role
  name: mctl-api-workflow-submitter
  apiGroup: rbac.authorization.k8s.io
---
# Allow reading ClusterWorkflowTemplates (cluster-scoped resource)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mctl-api-cwt-reader
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["clusterworkflowtemplates"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mctl-api-cwt-reader
subjects:
  - kind: ServiceAccount
    name: mctl-api
    namespace: mctl-api
roleRef:
  kind: ClusterRole
  name: mctl-api-cwt-reader
  apiGroup: rbac.authorization.k8s.io
