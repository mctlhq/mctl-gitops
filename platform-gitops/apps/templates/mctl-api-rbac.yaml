# Allow mctl-api to read ClusterWorkflowTemplates and manage workflows in argo-workflows ns.
# The ServiceAccount itself is created by the mctl-api Helm chart.
# Per-tenant workflow submission RBAC is provisioned by the tenant Helm chart
# (see helm-charts/tenant/templates/argo-workflow.yaml — mctl-api-workflow-submitter RB).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mctl-api-workflow-submitter
  namespace: argo-workflows
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["clusterworkflowtemplates"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mctl-api-workflow-submitter
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: mctl-api
    namespace: mctl-api
roleRef:
  kind: Role
  name: mctl-api-workflow-submitter
  apiGroup: rbac.authorization.k8s.io
---
# Allow reading ClusterWorkflowTemplates (cluster-scoped resource)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mctl-api-cwt-reader
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["clusterworkflowtemplates"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mctl-api-cwt-reader
subjects:
  - kind: ServiceAccount
    name: mctl-api
    namespace: mctl-api
roleRef:
  kind: ClusterRole
  name: mctl-api-cwt-reader
  apiGroup: rbac.authorization.k8s.io
