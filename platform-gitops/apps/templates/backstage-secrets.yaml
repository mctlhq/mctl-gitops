apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-oauth
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: backstage-secrets
    creationPolicy: Owner
    template:
      data:
        AUTH_GITHUB_CLIENT_ID: "{{ `{{ .client_id }}` }}"
        AUTH_GITHUB_CLIENT_SECRET: "{{ `{{ .client_secret }}` }}"
        GITHUB_TOKEN: "{{ `{{ .token }}` }}"
        VAULT_ADDR: "https://vault-preview.mctl.me"
        VAULT_TOKEN: "{{ `{{ .vault_token }}` }}"
  data:
    - secretKey: client_id
      remoteRef:
        key: preview/backstage/github-oauth
        property: client-id
    - secretKey: client_secret
      remoteRef:
        key: preview/backstage/github-oauth
        property: client-secret
    - secretKey: token
      remoteRef:
        key: preview/backstage/github-token
        property: token
    - secretKey: vault_token
      remoteRef:
        key: preview/backstage/vault-token
        property: token
