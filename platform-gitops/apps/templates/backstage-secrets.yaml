apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-oauth
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: backstage-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTH_GITHUB_CLIENT_ID
      remoteRef:
        key: preview/backstage/github-oauth
        property: client-id
    - secretKey: AUTH_GITHUB_CLIENT_SECRET
      remoteRef:
        key: preview/backstage/github-oauth
        property: client-secret
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: preview/backstage/github-token
        property: token
