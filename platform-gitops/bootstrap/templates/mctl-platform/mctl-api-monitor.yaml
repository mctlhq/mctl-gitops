apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: mctl-api
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mctl-api
  namespaceSelector:
    matchNames:
      - mctl-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
