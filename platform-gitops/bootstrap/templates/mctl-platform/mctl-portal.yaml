# Developer Portal (Backstage)
# Consolidates Application, ExternalSecrets, and RBAC

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-oauth
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: backstage-secrets
    creationPolicy: Owner
    template:
      data:
        AUTH_GITHUB_CLIENT_ID: "{{ `{{ .client_id }}` }}"
        AUTH_GITHUB_CLIENT_SECRET: "{{ `{{ .client_secret }}` }}"
        OIDC_CLIENT_ID: "{{ `{{ .oidc_client_id }}` }}"
        OIDC_CLIENT_SECRET: "{{ `{{ .oidc_client_secret }}` }}"
        OIDC_RULES_CLIENT_SECRET: "{{ `{{ .rules_oidc_client_secret }}` }}"
        GITHUB_APP_ID: "{{ `{{ .app_id }}` }}"
        GITHUB_APP_CLIENT_ID: "{{ `{{ .client_id }}` }}"
        GITHUB_APP_CLIENT_SECRET: "{{ `{{ .client_secret }}` }}"
        GITHUB_APP_PRIVATE_KEY: "{{ `{{ .private_key }}` }}"
        GITHUB_APP_INSTALLATION_ID: "{{ `{{ .installation_id }}` }}"
        VAULT_ADDR: "https://secrets.mctl.ai"
        VAULT_TOKEN: "{{ `{{ .vault_token }}` }}"
        POSTGRES_USER: "{{ `{{ .postgres_user }}` }}"
        POSTGRES_PASSWORD: "{{ `{{ .postgres_password }}` }}"
        POSTGRES_HOST: "{{ `{{ .postgres_host }}` }}"
        POSTGRES_PORT: "{{ `{{ .postgres_port }}` }}"
        POSTGRES_DB: "{{ `{{ .postgres_db }}` }}"
        DATABASE_URL: "{{ `{{ .database_url }}` }}"
        K8S_SERVICE_ACCOUNT_TOKEN: "{{ `{{ .k8s_token }}` }}"
        ARGO_WORKFLOWS_TOKEN: "{{ `{{ .argo_workflows_token }}` }}"
        GITHUB_WEBHOOK_SECRET: "{{ `{{ .webhook_secret }}` }}"
        BACKSTAGE_LANDING_TOKEN: "{{ `{{ .landing_token }}` }}"
  data:
    - secretKey: client_id
      remoteRef:
        key: platform/github-app
        property: client-id
    - secretKey: client_secret
      remoteRef:
        key: platform/github-app
        property: client-secret
    - secretKey: oidc_client_id
      remoteRef:
        key: platform/backstage/github-oauth
        property: client-id
    - secretKey: oidc_client_secret
      remoteRef:
        key: platform/backstage/github-oauth
        property: client-secret
    # Shared with the mctl-rules app (same Vault secret both sides of the
    # OIDC client). Must exist in Vault BEFORE this file merges, or the
    # whole backstage-oauth ExternalSecret stops syncing.
    - secretKey: rules_oidc_client_secret
      remoteRef:
        key: teams/labs/mctl-rules
        property: OIDC_CLIENT_SECRET
    - secretKey: app_id
      remoteRef:
        key: platform/github-app
        property: app-id
    - secretKey: private_key
      remoteRef:
        key: platform/github-app
        property: private-key
    - secretKey: installation_id
      remoteRef:
        key: platform/github-app
        property: installation-id
    - secretKey: vault_token
      remoteRef:
        key: platform/backstage/vault-token
        property: token
    - secretKey: postgres_user
      remoteRef:
        key: platform/backstage/database
        property: postgres-user
    - secretKey: postgres_password
      remoteRef:
        key: platform/backstage/database
        property: postgres-password
    - secretKey: postgres_host
      remoteRef:
        key: platform/backstage/database
        property: postgres-host
    - secretKey: postgres_port
      remoteRef:
        key: platform/backstage/database
        property: postgres-port
    - secretKey: postgres_db
      remoteRef:
        key: platform/backstage/database
        property: postgres-db
    - secretKey: database_url
      remoteRef:
        key: platform/backstage/database
        property: database-url
    - secretKey: k8s_token
      remoteRef:
        key: platform/backstage/k8s-reader
        property: token
    - secretKey: argo_workflows_token
      remoteRef:
        key: platform/backstage/argo-workflows
        property: token
    - secretKey: webhook_secret
      remoteRef:
        key: platform/backstage/github-webhook
        property: webhook_secret
    - secretKey: landing_token
      remoteRef:
        key: platform/backstage/landing-token
        property: token

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-ghcr
  namespace: backstage
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: ghcr-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      metadata:
        annotations:
          argocd.argoproj.io/compare-options: IgnoreExtraneous
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: platform/backstage/ghcr-credentials
        property: dockerconfigjson

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage-k8s-reader
  namespace: backstage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backstage-k8s-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "events", "namespaces", "limitranges", "resourcequotas"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-k8s-reader
subjects:
  - kind: ServiceAccount
    name: backstage-k8s-reader
    namespace: backstage
roleRef:
  kind: ClusterRole
  name: backstage-k8s-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: backstage-k8s-reader-token
  namespace: backstage
  annotations:
    kubernetes.io/service-account.name: backstage-k8s-reader
type: kubernetes.io/service-account-token

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admins-mctl-portal
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://backstage.github.io/charts
    chart: backstage
    targetRevision: 2.6.3
    helm:
      releaseName: backstage
      values: |
        ingress:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          host: app.mctl.ai
          extraHosts:
            - name: app.mctl.ai
          tls:
            enabled: true
            secretName: backstage-tls
          extraTls:
            - hosts:
                - app.mctl.ai
              secretName: backstage-mctl-ai-tls

        backstage:
          image:
            registry: ghcr.io
            repository: mctlhq/mctl-portal
            tag: 4.7.2
            pullSecrets:
              - ghcr-credentials
          resources:
            requests:
              cpu: 100m
              # Observed RSS ~368Mi; 384Mi gives 4% buffer. Raised 256Mi→384Mi
              # on 2026-05-10 (RAM real>requests gap on Global RAM dashboard).
              memory: 384Mi
            limits:
              # Steady-state ~26m; 300m gives 11x cushion. Trimmed 500m→300m
              # on 2026-05-07 (CPU-limits cluster headroom).
              cpu: 300m
              memory: 768Mi
          extraEnvVarsSecrets:
            - backstage-secrets
          startupProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /.backstage/health/v1/readiness
              port: 7007
            periodSeconds: 10
            failureThreshold: 2
          appConfig:
            app:
              title: mctl.ai User Portal
              baseUrl: https://app.mctl.ai
            organization:
              name: MCTL
            backend:
              baseUrl: https://app.mctl.ai
              listen:
                port: 7007
              reading:
                allow:
                  - host: app.mctl.ai
                  - host: app.mctl.ai
              database:
                client: pg
                pluginDivisionMode: schema
                connection:
                  host: ${POSTGRES_HOST}
                  port: ${POSTGRES_PORT}
                  user: ${POSTGRES_USER}
                  password: ${POSTGRES_PASSWORD}
                  database: ${POSTGRES_DB}
                knexConfig:
                  pool:
                    min: 0
                    max: 3
            auth:
              environment: production
              providers:
                github:
                  production:
                    clientId: ${AUTH_GITHUB_CLIENT_ID}
                    clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
            integrations:
              github:
                - host: github.com
                  apps:
                    - appId: ${GITHUB_APP_ID}
                      clientId: ${GITHUB_APP_CLIENT_ID}
                      clientSecret: ${GITHUB_APP_CLIENT_SECRET}
                      privateKey: ${GITHUB_APP_PRIVATE_KEY}
            permission:
              enabled: true
            githubAppConnect:
              appSlug: mctl-app
              appId: ${GITHUB_APP_ID}
              privateKey: ${GITHUB_APP_PRIVATE_KEY}
              webhookSecret: ${GITHUB_WEBHOOK_SECRET}
            vaultSecrets:
              endpoint: ${VAULT_ADDR}
              token: ${VAULT_TOKEN}
            argoWorkflows:
              baseUrl: https://workflows.mctl.ai
              namespace: argo-workflows
              token: ${ARGO_WORKFLOWS_TOKEN}
            tenantManagement:
              githubOrg: mctlhq
              repoName: mctl-gitops
              tenantsPath: platform-gitops/tenants
              syncIntervalMinutes: 5
              landingPageToken: ${BACKSTAGE_LANDING_TOKEN}
              githubAppInstallationId: ${GITHUB_APP_INSTALLATION_ID}
              defaultQuotas:
                cpuReq: "1"
                cpuLim: "2"
                memReq: "2Gi"
                memLim: "3Gi"
                pods: "10"
                pvcs: "2"
                services: "5"
              maxTeamsPerTenant: 1
            oidcProvider:
              issuer: https://app.mctl.ai/api/oidc-provider
              github:
                clientId: ${AUTH_GITHUB_CLIENT_ID}
                clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
              clients:
                - clientId: ${OIDC_CLIENT_ID}
                  clientSecret: ${OIDC_CLIENT_SECRET}
                  redirectUris:
                    - https://ops.mctl.ai/api/dex/callback
                    - https://ops.mctl.ai/api/dex/callback
                # mctl-rules (rules.mctl.ai) — confidential client + PKCE S256
                - clientId: mctl-rules
                  clientSecret: ${OIDC_RULES_CLIENT_SECRET}
                  redirectUris:
                    - https://rules.mctl.ai/api/auth/callback
                    - https://labs-mctl-rules.mctl.ai/api/auth/callback
            resourceUsage:
              kubeConfigType: token
              kubeApiUrl: https://kubernetes.default.svc
              kubeToken: ${K8S_SERVICE_ACCOUNT_TOKEN}
              skipTLSVerify: true
            kubernetes:
              serviceLocatorMethod:
                type: multiTenant
              clusterLocatorMethods:
                - type: config
                  clusters:
                    - url: https://kubernetes.default.svc
                      name: production
                      authProvider: serviceAccount
                      skipTLSVerify: true
                      serviceAccountToken: ${K8S_SERVICE_ACCOUNT_TOKEN}
            proxy:
              endpoints:
                /vault:
                  target: ${VAULT_ADDR}
                  credentials: dangerously-allow-unauthenticated
                  headers:
                    X-Vault-Token: ${VAULT_TOKEN}
                  allowedMethods:
                    - GET
                    - POST
                    - PUT
                    - DELETE
                    - PATCH
                  allowedHeaders:
                    - Content-Type
            techdocs:
              builder: local
              generator:
                runIn: local
              publisher:
                type: local
            catalog:
              processingInterval: { seconds: 30 }
              orphanStrategy: delete
              rules:
                - allow: [Component, System, Resource, Location, Template, Group, User]
              providers:
                github:
                  mctlMe:
                    organization: mctlhq
                    catalogPath: /catalog-info.yaml
                    filters:
                      repository: mctl-gitops
                      branch: main
                    schedule:
                      frequency:
                        minutes: 1
                      timeout:
                        minutes: 3
                  services:
                    organization: mctlhq
                    catalogPath: /platform-gitops/services/*/*/catalog-info.yaml
                    filters:
                      repository: mctl-gitops
                      branch: main
                    schedule:
                      frequency:
                        minutes: 1
                      timeout:
                        minutes: 3
                  tenants:
                    organization: mctlhq
                    catalogPath: /platform-gitops/tenants/*/catalog-info.yaml
                    filters:
                      repository: mctl-gitops
                      branch: main
                    schedule:
                      frequency:
                        minutes: 1
                      timeout:
                        minutes: 3
              locations:
                # Backstage templates (static, no need for provider-based discovery)
                - type: url
                  target: https://github.com/mctlhq/mctl-gitops/blob/main/platform-gitops/backstage/templates/deploy-component/template.yaml
                  rules:
                    - allow: [Template]
                - type: url
                  target: https://github.com/mctlhq/mctl-gitops/blob/main/platform-gitops/backstage/templates/delete-component/template.yaml
                  rules:
                    - allow: [Template]
                - type: url
                  target: https://github.com/mctlhq/mctl-gitops/blob/main/platform-gitops/backstage/templates/update-component-config/template.yaml
                  rules:
                    - allow: [Template]
                - type: url
                  target: https://github.com/mctlhq/mctl-gitops/blob/main/platform-gitops/backstage/templates/provision-database/template.yaml
                  rules:
                    - allow: [Template]
                - type: url
                  target: https://github.com/mctlhq/mctl-gitops/blob/main/platform-gitops/backstage/templates/deploy-version/template.yaml
                  rules:
                    - allow: [Template]
                - type: url
                  target: https://github.com/mctlhq/mctl-gitops/blob/main/platform-gitops/backstage/templates/create-tenant/template.yaml
                  rules:
                    - allow: [Template]
                - type: url
                  target: https://github.com/mctlhq/mctl-gitops/blob/main/platform-gitops/backstage/templates/delete-tenant/template.yaml
                  rules:
                    - allow: [Template]
                # Tenant entities from the tenant-management backend.
                # The endpoint serves PII and requires the landing token; the
                # catalog UrlReader cannot send headers, so it rides the query
                # string. Backstage substitutes the env var at runtime.
                - type: url
                  target: https://app.mctl.ai/api/tenant-management/backstage/catalog.yaml?token=${BACKSTAGE_LANDING_TOKEN}
                  rules:
                    - allow: [User, Group, System]

        # PostgreSQL subchart disabled — using shared CNPG cluster in platform-db namespace
        postgresql:
          enabled: false

  ignoreDifferences:
    # ESO admission webhook injects defaults absent in git, plus legacy
    # last-applied-configuration annotations can pin stale apiVersion across
    # chart churn. Mirror the tenants ApplicationSet pattern.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .metadata.annotations
        # Note: .metadata.managedFields must NOT be listed here — with
        # RespectIgnoreDifferences=true + ServerSideApply, ArgoCD injects the
        # live object's cached managedFields into the SSA apply payload, which
        # the apiserver rejects ("metadata.managedFields must be nil").
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.dataFrom[].extract.conversionStrategy
        - .spec.dataFrom[].extract.decodingStrategy
        - .spec.dataFrom[].extract.metadataPolicy
        - .status
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
