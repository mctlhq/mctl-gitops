apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mctl-api-secrets
  namespace: mctl-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: mctl-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: ARGOCD_TOKEN
      remoteRef:
        key: platform/mctl-api/argocd-token
        property: token
    - secretKey: BACKSTAGE_TOKEN
      remoteRef:
        key: platform/mctl-api/backstage-token
        property: token
    - secretKey: DEX_CLIENT_SECRET
      remoteRef:
        key: platform/mctl-api/sso
        property: client-secret
    - secretKey: OAUTH_GITHUB_CLIENT_ID
      remoteRef:
        key: platform/github-app
        property: client-id
    - secretKey: OAUTH_GITHUB_CLIENT_SECRET
      remoteRef:
        key: platform/github-app
        property: client-secret
    - secretKey: OAUTH_JWT_SECRET
      remoteRef:
        key: platform/mctl-api/oauth
        property: jwt-secret
