apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admins-mctl-api
  namespace: argocd
spec:
  project: platform
  sources:
    # Helm chart from the mctl-api repository
    - repoURL: https://github.com/mctlhq/mctl-api.git
      targetRevision: main
      path: helm
      helm:
        releaseName: mctl-api
        values: |
          image:
            repository: ghcr.io/mctlhq/mctl-api
            tag: "4.24.0"

          ingress:
            enabled: true
            className: traefik
            tls: true
            hosts:
              - host: api.mctl.ai

          env:
            GITOPS_REPO_URL: https://github.com/mctlhq/mctl-gitops.git
            GITOPS_BRANCH: main
            GITOPS_LOCAL_PATH: /data/mctl-gitops
            ARGOCD_URL: https://ops.mctl.ai
            ARGO_WORKFLOWS_NAMESPACE: argo-workflows
            GITHUB_ORG: mctlhq
            ADMIN_USERS: mashkovd
            AUTH_REQUIRED: "true"
            BACKSTAGE_URL: https://app.mctl.ai
            DEX_ISSUER_URL: https://ops.mctl.ai/api/dex
            DEX_CLIENT_ID: mctl-api
            SELF_URL: https://api.mctl.ai
            VAULT_ADDR: https://secrets.mctl.ai
            # OAuth 2.0 for Claude.ai custom connector (PKCE, public client)
            # Secrets (OAUTH_GITHUB_CLIENT_ID, OAUTH_GITHUB_CLIENT_SECRET, OAUTH_JWT_SECRET)
            # come from mctl-api-secrets (Vault: platform/mctl-api/oauth-github)
            OAUTH_ALLOWED_REDIRECT_URIS: "https://claude.ai/api/mcp/auth_callback,https://claude.com/api/mcp/auth_callback,http://localhost:6274/oauth/callback,http://localhost:6274/oauth/callback/debug,https://chatgpt.com/connector/oauth/*"
            # Allow git operations on emptyDir volume (owned by root, run as uid=1000)
            GIT_CONFIG_COUNT: "1"
            GIT_CONFIG_KEY_0: "safe.directory"
            GIT_CONFIG_VALUE_0: "*"
            LOKI_URL: "http://loki-stack.monitoring.svc.cluster.local:3100"
            AUDIT_DB_URL: "postgresql://$(DB_USER):$(DB_PASSWORD)@shared-pg-rw.platform-db.svc:5432/mctl-api?sslmode=disable"

          envFromSecret: mctl-api-secrets
          envFromExtraSecret: mctl-api-gitops-token

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              # Steady-state ~11m; 500m gives headroom for GC/git-op bursts.
              # Trimmed to 250m on 2026-05-07, reverted 2026-05-30 after
              # repeated CPUThrottlingHigh incidents.
              cpu: 500m
              memory: 256Mi

  ignoreDifferences:
    # ESO admission webhook injects defaults absent in git, plus legacy
    # last-applied-configuration annotations can pin stale apiVersion across
    # chart churn. Mirror the tenants ApplicationSet pattern.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .metadata.annotations
        # Note: .metadata.managedFields must NOT be listed here — with
        # RespectIgnoreDifferences=true + ServerSideApply, ArgoCD injects the
        # live object's cached managedFields into the SSA apply payload, which
        # the apiserver rejects ("metadata.managedFields must be nil").
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.dataFrom[].extract.conversionStrategy
        - .spec.dataFrom[].extract.decodingStrategy
        - .spec.dataFrom[].extract.metadataPolicy
        - .status
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: mctl-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
