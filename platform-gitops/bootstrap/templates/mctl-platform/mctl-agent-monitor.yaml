apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: mctl-agent
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: admins-mctl-agent
      app.kubernetes.io/name: base-service
  namespaceSelector:
    matchNames:
      - admins
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
