apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admins-mctl-agent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mctlhq/mctl-gitops.git
    targetRevision: main
    path: platform-gitops/helm-charts/base-service
    helm:
      values: |
        image:
          repository: ghcr.io/mctlhq/mctl-agent
          tag: "1.14.2"
        imagePullSecrets:
          - name: ghcr-credentials
        service:
          port: 8080
        extraObjects:
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-monitoring-to-mctl-agent
            spec:
              podSelector:
                matchLabels:
                  app.kubernetes.io/instance: admins-mctl-agent
                  app.kubernetes.io/name: base-service
              policyTypes:
                - Ingress
              ingress:
                - from:
                    - namespaceSelector:
                        matchLabels:
                          kubernetes.io/metadata.name: monitoring
                  ports:
                    - protocol: TCP
                      port: 8080
        podSecurityContext:
          fsGroup: 1000
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        env:
          PORT: "8080"
          MCTL_API_URL: "http://mctl-api.mctl-api.svc:8080"
          GITHUB_OWNER: mctlhq
          GITHUB_REPO: mctl-gitops
          POLL_INTERVAL: "5m"
          # Flapping CPU throttling alerts (openclaw, etc.) oscillate every
          # 30m-4h, generating duplicate tickets each cycle. Default 10m
          # cooldown was too short — see 129 stale resource_limit tickets
          # on 2026-05-12. Observed re-fire spacing (6-17h for claude-remote)
          # still exceeded the 4h window, so duplicates kept accruing; widened
          # 4h→12h so a full day's flaps fold into one ticket.
          ALERT_FLAP_COOLDOWN: "12h"
          DRY_RUN: "false"
          WEBHOOK_ENABLED: "true"
          WEBHOOK_CALLBACK_URL: "https://agent.mctl.ai"
          WEBHOOK_DEFAULT_TTL: "15m"
          # Bot username for the "Ask OpenClaw" deeplink button on
          # Telegram notifications. Must match the bot reachable in
          # admins-openclaw chat — TELEGRAM_BOT_TOKEN in Vault has the
          # corresponding token.
          OPENCLAW_BOT_USERNAME: "@MCTL_AI_bot"
          # LLM fallback skill disabled — Anthropic Console API key removed.
          # Deterministic skills cover all known alert types; TypeGeneric
          # alerts will remain open until MAX_ANALYZING_AGE expires.
          DISABLE_LLM_DIAGNOSIS: "true"
          # Absolute TTL for analyzing tickets (CreatedAt-based, not reset by
          # flapping alert heartbeats). Prevents eternal stale incidents when
          # a flapping alert keeps UpdatedAt fresh but no skill can resolve it.
          MAX_ANALYZING_AGE: "120h"
          # AlertManager reconciliation: resolve tickets whose alert is no
          # longer active in AM, instead of waiting out MAX_ANALYZING_AGE.
          # Defaults to on in code; set explicitly so it's visible that this
          # path is load-bearing for incident auto-close (it propagates to
          # mctl-api as of mctl-agent 1.14.1). ALERTMANAGER_URL defaults to the
          # in-cluster vmalertmanager service and is left on that default.
          AM_RECONCILE_ENABLED: "true"
          DATABASE_URL: "postgresql://$(DB_USER):$(DB_PASSWORD)@shared-pg-rw.platform-db.svc:5432/mctl-agent"
        envFrom:
          - secretRef:
              name: mctl-agent-secrets
          - secretRef:
              name: mctl-agent-db-creds
        externalSecret:
          targetSecret: mctl-agent-secrets
          targetTemplateData:
            # Sole Telegram chat. Per-tenant routing intentionally disabled —
            # all mctl-agent notifications land in the operator's private
            # chat with @MCTL_AI_bot (mctl_admins). The chat_id is the
            # operator's Telegram user ID, not the bot's: in 1:1 bot chats
            # Telegram identifies the chat by the human participant.
            # Re-enable per-tenant by adding TELEGRAM_TENANT_CHAT_IDS here
            # + a matching data entry below (see git history of this file
            # for the previous shape).
            TELEGRAM_CHAT_ID: "210408407"
          data:
            - secretKey: MCTL_API_TOKEN
              remoteKey: platform/mctl-agent/tokens
              property: mctl-api-token
            - secretKey: GITHUB_TOKEN
              remoteKey: platform/mctl-agent/tokens
              property: github-token
            - secretKey: TELEGRAM_BOT_TOKEN
              remoteKey: platform/mctl-agent/tokens
              property: telegram-bot-token
        # DB creds for the pod, synced from the same Vault path as the CNPG
        # managed-role secret in platform-db (cnpg/shared/secrets.yaml).
        # Owner policy adopts the previously hand-created secret so password
        # rotation in Vault propagates here without manual patching.
        extraExternalSecrets:
          mctl-agent-db-creds:
            data:
              - secretKey: DB_USER
                remoteKey: platform/mctl-agent/database
                property: username
              - secretKey: DB_PASSWORD
                remoteKey: platform/mctl-agent/database
                property: password
        ingress:
          enabled: true
          ingressClassName: traefik
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          hosts:
            - agent.mctl.ai
          tls:
            - secretName: mctl-agent-tls
              hosts:
                - agent.mctl.ai
        probes:
          liveness:
            path: /healthz
            port: http
          readiness:
            path: /readyz
            port: http
        strategy:
          type: Recreate
        persistence:
          data:
            enabled: false

  ignoreDifferences:
    # ESO admission webhook injects defaults absent in git, plus legacy
    # last-applied-configuration annotations can pin stale apiVersion across
    # chart churn. Mirror the tenants ApplicationSet pattern.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .metadata.annotations
        - .metadata.managedFields
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.dataFrom[].extract.conversionStrategy
        - .spec.dataFrom[].extract.decodingStrategy
        - .spec.dataFrom[].extract.metadataPolicy
        - .status
  destination:
    server: https://kubernetes.default.svc
    namespace: admins
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
