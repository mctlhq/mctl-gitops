apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: Services and workers

  sourceRepos:
    - {{ .Values.spec.source.repoURL }}

  destinations:
    - server: {{ .Values.spec.destination.server }}
      namespace: "*"

  # No cluster-scoped resources allowed — namespaces are managed by the
  # "platform" project via tenant ApplicationSet. Apps should only deploy
  # namespace-scoped resources into their own tenant namespace.
  clusterResourceWhitelist: []

  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: apps
      kind: "*"
    - group: networking.k8s.io
      kind: "*"
    - group: autoscaling
      kind: "*"
    - group: batch
      kind: "*"
    - group: external-secrets.io
      kind: "*"
    - group: argoproj.io
      kind: "*"
    - group: monitoring.coreos.com
      kind: "*"
    - group: traefik.io
      kind: "*"

  orphanedResources:
    warn: true
    # Downstream artifacts of resources ArgoCD already manages — they appear in
    # tenant namespaces without an app.kubernetes.io/instance label and would
    # otherwise be flagged as orphans (e.g. ESO-rendered Secrets, Helm release
    # storage, dynamic Workflow runs from CI/CD).
    ignore:
      - group: argoproj.io
        kind: Workflow
      - kind: Secret
      - kind: ConfigMap
      - kind: ServiceAccount
      - group: networking.k8s.io
        kind: NetworkPolicy
