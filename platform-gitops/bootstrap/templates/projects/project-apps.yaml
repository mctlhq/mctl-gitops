apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: Services and workers

  sourceRepos:
    - {{ .Values.spec.source.repoURL }}

  destinations:
    - server: {{ .Values.spec.destination.server }}
      namespace: "*"

  # No cluster-scoped resources allowed — namespaces are managed by the
  # "platform" project via tenant ApplicationSet. Apps should only deploy
  # namespace-scoped resources into their own tenant namespace.
  clusterResourceWhitelist: []

  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: apps
      kind: "*"
    - group: networking.k8s.io
      kind: "*"
    - group: autoscaling
      kind: "*"
    - group: batch
      kind: "*"
    - group: external-secrets.io
      kind: "*"
    - group: argoproj.io
      kind: "*"
    - group: monitoring.coreos.com
      kind: "*"
    - group: traefik.io
      kind: "*"

  orphanedResources:
    warn: true
    # Downstream artifacts of resources ArgoCD already manages — they appear in
    # tenant namespaces without an app.kubernetes.io/instance label and would
    # otherwise be flagged as orphans (e.g. ESO-rendered Secrets, Helm release
    # storage, dynamic Workflow runs from CI/CD).
    ignore:
      - group: argoproj.io
        kind: Workflow
      - kind: Secret
      - kind: ConfigMap
      - kind: ServiceAccount
      - group: networking.k8s.io
        kind: NetworkPolicy

  # FROZEN 2026-07-12: admins-openclaw is undergoing the mctl-openclaw#38
  # upstream sync (108-conflict merge touching gateway/auth code) — a training
  # run for a "freeze before risky deploy" gate. `schedule: "* * * * *"` +
  # `duration: 1h` means the deny window re-triggers every minute with an
  # overlapping 1h span, so it is continuously active (no gaps) until this
  # entry is removed. `manualSync: true` still allows an explicit
  # `argocd app sync admins-openclaw` — only the ApplicationSet's automated
  # prune+selfHeal is blocked. Scoped to this one Application by name; no
  # other service on the platform is affected.
  #
  # To unfreeze: delete this syncWindows entry, only after explicit double
  # confirmation from the operator (two separate "yes", not one — lifting
  # this re-enables auto-deploy mid-way through a large, security-sensitive
  # upstream merge).
  syncWindows:
    - kind: deny
      schedule: "* * * * *"
      duration: 1h
      applications:
        - admins-openclaw
      manualSync: true
