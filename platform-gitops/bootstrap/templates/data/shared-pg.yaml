apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-pg
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mctlhq/mctl-gitops.git
    targetRevision: main
    path: platform-gitops/infra-components/data/cnpg/shared
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: platform-db
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      jqPathExpressions:
        - .metadata.annotations
        - .status
        - .spec.resources   # CNPG normalizes CPU/memory quantities (e.g. 1000m → "1")
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
