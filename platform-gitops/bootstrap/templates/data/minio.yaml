apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.min.io/
      chart: minio
      targetRevision: 5.4.0
      helm:
        values: |
          mode: standalone

          existingSecret: minio-root-credentials
          rootUser: ""
          rootPassword: ""

          persistence:
            enabled: true
            # Bumped from 20Gi to 40Gi after the volume hit 99.9% used and Argo
            # workflows started failing with "Storage backend has reached its
            # minimum free drive threshold" on artifact upload (see
            # mctl-agents-implement-702897ce, 2026-04-30).
            # `hcloud-volumes` supports online expansion; the StatefulSet's
            # volumeClaimTemplates is immutable so after ArgoCD syncs, the
            # existing PVC may need a manual
            # `kubectl patch pvc minio -n minio --type=merge \
            #   -p '{"spec":{"resources":{"requests":{"storage":"40Gi"}}}}'`.
            # Follow-up: add a bucket lifecycle rule on argo-workflows-logs to
            # auto-expire archived logs older than 30 days so this doesn't
            # recur on the next bump.
            size: 40Gi

          deploymentUpdate:
            type: Recreate

          service:
            type: ClusterIP
            port: 9000

          consoleService:
            type: ClusterIP
            port: 9001

          ingress:
            enabled: false

          consoleIngress:
            enabled: false

          resources:
            requests:
              cpu: 100m
              # Bumped 900Mi→1Gi on 2026-06-27 to reflect real sustained working
              # set (~1Gi under artifact-store load).
              memory: 1Gi
            limits:
              # Raised 1000m→2000m on 2026-06-27: MinIO sat PEGGED at the 1000m
              # cap (1003m, 100%) under sustained s3-sync load (claude-remote was
              # mirroring a 9 GiB version bloat every 10s, since pruned), starving
              # other clients — labs-watch-scan's state reads to MinIO timed out
              # (60s) and the CronWorkflow failed every tick.
              cpu: 2000m
              # Raised 1Gi→2Gi on 2026-06-27: working set hit 1004Mi (>1Gi limit)
              # and MinIO was OOMKill-restarting (27 restarts) → unresponsive,
              # causing the read timeouts above. 2Gi gives real headroom.
              memory: 2Gi

          buckets:
            - name: argo-workflows-logs
              policy: none
            - name: platform-cache
              policy: none
            - name: platform-state
              policy: none
            - name: postgres-backups
              policy: none

    - repoURL: https://github.com/mctlhq/mctl-gitops.git
      targetRevision: main
      path: platform-gitops/infra-components/data/minio

  ignoreDifferences:
    # ESO admission webhook injects defaults absent in git, plus legacy
    # last-applied-configuration annotations can pin stale apiVersion across
    # chart churn. Mirror the tenants ApplicationSet pattern.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .metadata.annotations
        - .metadata.managedFields
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.dataFrom[].extract.conversionStrategy
        - .spec.dataFrom[].extract.decodingStrategy
        - .spec.dataFrom[].extract.metadataPolicy
        - .status
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
