apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporal
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    # Official Temporal Helm chart — pinned to 1.2.0 (server appVersion 1.31.0,
    # released 2026-04-29). Chart 1.x removed the bundled Cassandra/MySQL/PG/ES
    # sub-charts; persistence is now declared inline under
    # server.config.persistence.datastores. We point both default + visibility
    # stores at the platform shared-pg cluster. The Web UI lives in a separate
    # base-service release (bootstrap/templates/data/temporal-web.yaml) so we
    # inherit the platform's standard forward-auth Middleware.
    - repoURL: https://go.temporal.io/helm-charts
      chart: temporal
      targetRevision: 1.2.0
      helm:
        values: |
          server:
            replicaCount: 1
            config:
              persistence:
                defaultStore: default
                visibilityStore: visibility
                # numHistoryShards is fixed at create time — never change after
                # the schema is set up. 512 is the chart default.
                numHistoryShards: 512
                datastores:
                  default:
                    sql:
                      # The chart defaults createDatabase to true and runs
                      # `temporal-sql-tool create-database` before schema setup.
                      # Our `temporal` role is a regular CNPG login role
                      # without CREATEDB, and the temporal/temporal_visibility
                      # databases are already provisioned by Database CRDs in
                      # cnpg/shared/databases.yaml — leave creation to CNPG and
                      # let the schema Job only run setup/update-schema.
                      createDatabase: false
                      pluginName: postgres12
                      databaseName: temporal
                      connectAddr: shared-pg-rw.platform-db.svc.cluster.local:5432
                      connectProtocol: tcp
                      user: temporal
                      # Helm-specific keys; chart strips them from the rendered
                      # server config and reads `password` out of the Secret.
                      existingSecret: temporal-server-db-creds
                      secretKey: password
                      maxConns: 20
                      maxIdleConns: 20
                      maxConnLifetime: "1h"
                  visibility:
                    sql:
                      createDatabase: false
                      pluginName: postgres12
                      databaseName: temporal_visibility
                      connectAddr: shared-pg-rw.platform-db.svc.cluster.local:5432
                      connectProtocol: tcp
                      user: temporal
                      existingSecret: temporal-server-db-creds
                      secretKey: password
                      maxConns: 10
                      maxIdleConns: 10
                      maxConnLifetime: "1h"

            # Resource envelope for k3s-preview. Limits trimmed 500m→250m on
            # 2026-05-07 after observing 12-53m steady-state across all four
            # services (kuptsi-app + mctl-agents shepherd workflows). 250m
            # still gives 5-20x headroom for bursts; saves 1c of cluster
            # CPU-limits headroom.
            frontend:
              service:
                type: ClusterIP
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 250m
                  memory: 512Mi
            history:
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 250m
                  memory: 512Mi
            matching:
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 250m
                  memory: 512Mi
            worker:
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 250m
                  memory: 512Mi

          # Bundled Web UI is shipped through base-service instead — see
          # bootstrap/templates/data/temporal-web.yaml.
          web:
            enabled: false

          admintools:
            enabled: true
            image:
              repository: temporalio/admin-tools
              tag: "1.31.0"
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                # Raised 100m→500m on 2026-06-27. The 2026-05-07 trim to 100m
                # looked safe by average (~6m) but the container makes frequent
                # sub-period CPU bursts: over 24h it sat at ~53% CFS throttling
                # (68% of samples >50%), firing recurring resource_limit
                # incidents. 500m absorbs the bursts; usage stays ~6m so the
                # limit is pure headroom (CPU is not reserved).
                cpu: 500m
                memory: 256Mi

          # The schema Job needs special handling under Argo CD:
          #   - useHelmHooks: true → Helm pre-install hook becomes PreSync,
          #     which runs before the ExternalSecret in the second source is
          #     applied — first sync fails on missing credentials.
          #   - useHelmHooks: false (raw Job) → ttlSecondsAfterFinished cleans
          #     up after 24h; selfHeal then sees the Job missing in cluster and
          #     keeps recreating it, churning idempotent setup-schema runs.
          # Solution: keep useHelmHooks off, but turn the Job into an Argo CD
          # Sync hook (jobAnnotations). Sync hooks live in the Sync phase
          # alongside ExternalSecret, sync-wave: "5" guarantees the Secret
          # exists first, and hook resources are not drift-tracked, so TTL
          # deletion no longer triggers the selfHeal loop.
          schema:
            useHelmHooks: false
            jobAnnotations:
              argocd.argoproj.io/hook: Sync
              argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
              argocd.argoproj.io/sync-wave: "5"

    # In-repo manifests: ExternalSecret for DB creds + Job that registers
    # tenant Temporal namespaces (kuptsi, …) once the frontend is healthy.
    - repoURL: https://github.com/mctlhq/mctl-gitops.git
      targetRevision: main
      path: platform-gitops/infra-components/data/temporal

  ignoreDifferences:
    # ESO admission webhook injects defaults absent in git, plus legacy
    # last-applied-configuration annotations can pin stale apiVersion across
    # chart churn. Mirror the tenants ApplicationSet pattern.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .metadata.annotations
        # Note: .metadata.managedFields must NOT be listed here — with
        # RespectIgnoreDifferences=true + ServerSideApply, ArgoCD injects the
        # live object's cached managedFields into the SSA apply payload, which
        # the apiserver rejects ("metadata.managedFields must be nil").
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.dataFrom[].extract.conversionStrategy
        - .spec.dataFrom[].extract.decodingStrategy
        - .spec.dataFrom[].extract.metadataPolicy
        - .status
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: temporal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
