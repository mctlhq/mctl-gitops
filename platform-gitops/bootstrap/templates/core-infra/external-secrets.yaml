apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.4.0
    helm:
      values: |
        installCRDs: true
        crds:
          # ESO 2.4.x defaults `unsafeServeV1Beta1: false`, which removes
          # v1beta1 serving from the CRDs. The repo still has many
          # ExternalSecret manifests on `external-secrets.io/v1beta1`
          # (bootstrap/templates/, argo-workflows/, services/...).
          # Without this override, ArgoCD applies fail with
          # "no matches for kind ... in version external-secrets.io/v1beta1"
          # right after the chart syncs. Keep v1beta1 serving during the
          # transition period; a follow-up PR migrates all manifests to
          # `external-secrets.io/v1` and then this flag can be dropped.
          unsafeServeV1Beta1: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 192Mi

        webhook:
          port: 9443
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 192Mi

        certController:
          enabled: true
          resources:
            requests:
              cpu: 100m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
