apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reflector
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://emberstack.github.io/helm-charts
    chart: reflector
    targetRevision: 10.0.5
    helm:
      values: |
        configuration:
          logging:
            minimumLevel: Information
        resources:
          requests:
            cpu: 50m
            # Observed RSS ~269Mi; 300Mi gives 12% buffer. Raised 128Mi→300Mi
            # on 2026-05-10 (RAM real>requests gap on Global RAM dashboard).
            memory: 300Mi
          limits:
            cpu: 250m
            memory: 384Mi

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: reflector-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
