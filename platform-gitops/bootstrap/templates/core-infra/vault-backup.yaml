# Daily Vault raft snapshot → R2.
#
# Auth: the snapshot init container logs into Vault via Kubernetes auth using
# the projected SA token of the `vault-backup` ServiceAccount. The Vault role
# `vault-backup` (created out-of-band, see
# infrastructure/k3s-preview/cluster-bootstrap/vault-config/README.md) binds
# this SA to the `vault-backup` policy, which only grants
# read on `sys/storage/raft/snapshot`. No long-lived tokens.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-backup
  namespace: vault
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-backup-r2
  namespace: vault
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: vault-backup-r2-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: platform/vault/r2-backup
        property: access-key-id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: platform/vault/r2-backup
        property: secret-access-key
    - secretKey: BUCKET
      remoteRef:
        key: platform/vault/r2-backup
        property: bucket
    - secretKey: ENDPOINT
      remoteRef:
        key: platform/vault/r2-backup
        property: endpoint
---
# Telegram credentials for CronJob run-reports in the vault namespace
# (consumed by vault-backup and vault-auto-unseal). Same bot + admins chat
# as the mctl-agents workflows; only the two notify keys are mirrored here —
# the rest of platform/mctl-agents (OAuth/PAT tokens) stays out of this ns.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegram-notify
  namespace: vault
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: telegram-notify
    creationPolicy: Owner
  data:
    - secretKey: telegram-bot-token
      remoteRef:
        key: platform/mctl-agents
        property: telegram-bot-token
    - secretKey: telegram-chat-id
      remoteRef:
        key: platform/mctl-agents
        property: telegram-chat-id
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-backup
  namespace: vault
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      # 2h (was 24h): clear the Job — and the transient failed-attempt pod a
      # backoffLimit retry leaves behind — soon after the daily run, so it stops
      # pinning KubeContainerWaiting for most of the day. Snapshot logs persist
      # in Loki and successful backups are uploaded to R2 regardless.
      ttlSecondsAfterFinished: 7200
      template:
        spec:
          serviceAccountName: vault-backup
          restartPolicy: Never
          volumes:
            - name: snapshot
              emptyDir: {}
          initContainers:
            - name: snapshot
              image: hashicorp/vault:1.18
              env:
                - name: VAULT_ADDR
                  # Raft snapshots must hit the active (leader) node: through
                  # the generic `vault` service a standby's request forwarding
                  # corrupts the stream ("incomplete snapshot, unable to read
                  # SHA256SUMS.sealed file"). KV reads are fine on any node.
                  value: http://vault-active.vault.svc.cluster.local:8200
              volumeMounts:
                - name: snapshot
                  mountPath: /snapshot
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Logging into Vault via Kubernetes auth..."
                  VAULT_TOKEN=$(vault write -field=token \
                    auth/kubernetes/login \
                    role=vault-backup \
                    jwt=@/var/run/secrets/kubernetes.io/serviceaccount/token)
                  export VAULT_TOKEN

                  echo "Taking Vault raft snapshot..."
                  vault operator raft snapshot save /snapshot/vault-snapshot.snap
                  ls -lh /snapshot/vault-snapshot.snap
                  echo "Snapshot saved"
          containers:
            - name: upload
              image: amazon/aws-cli:2.22.35
              envFrom:
                - secretRef:
                    name: vault-backup-r2-credentials
              env:
                # Daily-run Telegram report (admins chat). Covers this upload
                # container only: a snapshot init-container failure kills the
                # pod before we run, and is reported via the AlertManager
                # KubeJobFailed → telegram route instead. Optional: without
                # the secret the backup still runs, just silently.
                - name: TG_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: telegram-notify
                      key: telegram-bot-token
                      optional: true
                - name: TG_CHAT_ID
                  valueFrom:
                    secretKeyRef:
                      name: telegram-notify
                      key: telegram-chat-id
                      optional: true
              volumeMounts:
                - name: snapshot
                  mountPath: /snapshot
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  notify() {
                    RC=$?
                    set +e
                    [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ] || return 0
                    if [ "$RC" -eq 0 ]; then
                      SIZE=$(du -h /snapshot/vault-snapshot.snap 2>/dev/null | cut -f1)
                      MSG="vault-backup OK: vault-snapshot-${TIMESTAMP}.snap (${SIZE:-?}) uploaded to R2"
                    else
                      MSG="vault-backup FAILED at upload (exit ${RC}) — see: kubectl -n vault logs job/<latest vault-backup job> -c upload"
                    fi
                    curl -s --max-time 10 \
                      "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
                      --data-urlencode "chat_id=${TG_CHAT_ID}" \
                      --data-urlencode "text=${MSG}" > /dev/null \
                      || echo "telegram notify failed; continuing"
                  }
                  trap notify EXIT

                  echo "Uploading snapshot to R2..."
                  aws s3 cp /snapshot/vault-snapshot.snap \
                    "s3://${BUCKET}/vault-backups/vault-snapshot-${TIMESTAMP}.snap" \
                    --endpoint-url "${ENDPOINT}" \
                    --region auto

                  echo "Cleaning old backups (keep last 30)..."
                  aws s3 ls "s3://${BUCKET}/vault-backups/" \
                    --endpoint-url "${ENDPOINT}" \
                    --region auto | sort | head -n -30 | while read -r line; do
                    FILE=$(echo "$line" | awk '{print $4}')
                    if [ -n "$FILE" ]; then
                      aws s3 rm "s3://${BUCKET}/vault-backups/${FILE}" \
                        --endpoint-url "${ENDPOINT}" \
                        --region auto
                    fi
                  done

                  echo "Backup complete: vault-snapshot-${TIMESTAMP}.snap"
