apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-unseal
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-unseal
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-unseal
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-unseal
subjects:
  - kind: ServiceAccount
    name: vault-unseal
    namespace: vault
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-auto-unseal
  namespace: vault
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 120
      template:
        spec:
          serviceAccountName: vault-unseal
          restartPolicy: Never
          containers:
            - name: unseal
              image: alpine/k8s:1.33.12
              envFrom:
                - secretRef:
                    name: vault-unseal-keys
              env:
                # Telegram report (admins chat). Runs every 2 min, so it only
                # reports when it actually unsealed a pod — an unseal event
                # means Vault restarted/crashed and a human should know.
                # Optional: without the secret the job still runs, just
                # silently.
                - name: TG_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: telegram-notify
                      key: telegram-bot-token
                      optional: true
                - name: TG_CHAT_ID
                  valueFrom:
                    secretKeyRef:
                      name: telegram-notify
                      key: telegram-chat-id
                      optional: true
              command:
                - /bin/sh
                - -c
                - |
                  echo "=== Vault Auto-Unseal Check ==="
                  UNSEALED_PODS=""
                  PODS=$(kubectl get pods -n vault -l app.kubernetes.io/name=vault,component=server --no-headers -o custom-columns=":metadata.name" 2>/dev/null)
                  for pod in $PODS; do
                    echo "Checking $pod..."
                    # vault status returns exit 1 (initialized+sealed) or 2 (sealed) — capture output regardless
                    STATUS=$(kubectl exec -n vault $pod -- vault status -format=json 2>/dev/null) || true
                    if [ -z "$STATUS" ]; then
                      echo "$pod: not ready, skipping"
                      continue
                    fi

                    SEALED=$(echo "$STATUS" | grep -o '"sealed" *: *[a-z]*' | grep -o '[a-z]*$')

                    if [ "$SEALED" = "true" ]; then
                      echo "$pod is SEALED — unsealing..."
                      kubectl exec -n vault $pod -- vault operator unseal "$UNSEAL_KEY_1"
                      kubectl exec -n vault $pod -- vault operator unseal "$UNSEAL_KEY_2"
                      kubectl exec -n vault $pod -- vault operator unseal "$UNSEAL_KEY_3"
                      echo "$pod unsealed ✅"
                      UNSEALED_PODS="${UNSEALED_PODS} ${pod}"
                    else
                      echo "$pod is already unsealed ✅"
                    fi
                  done
                  if [ -n "$UNSEALED_PODS" ] && [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ]; then
                    MSG="vault-auto-unseal: unsealed${UNSEALED_PODS} (a sealed pod means Vault restarted — check why)"
                    curl -s --max-time 10 \
                      "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
                      --data-urlencode "chat_id=${TG_CHAT_ID}" \
                      --data-urlencode "text=${MSG}" > /dev/null \
                      || echo "telegram notify failed; continuing"
                  fi
                  echo "=== Done ==="
