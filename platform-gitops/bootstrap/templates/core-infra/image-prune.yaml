# Per-node container image garbage collector.
#
# Why this exists: preview environments pull a unique image tag per PR onto
# whichever worker they land on, and containerd keeps the layers cached after
# the preview is torn down. kubelet's automatic image GC only fires when the
# disk crosses imageGCHighThresholdPercent (default 85%); our nodes peaked
# around 73% (imageFs 75-83 GB on 160 GB disks) and so never triggered it,
# letting unused images accumulate indefinitely (≈170 GB reclaimed in the
# 2026-06-25 manual sweep).
#
# Why a DaemonSet and not a CronJob: a CronJob runs a single pod on one node
# per fire, so it cannot prune every node. A DaemonSet places one pruner on
# each node and loops on a timer — the standard primitive for per-node
# periodic maintenance (same shape as kured).
#
# Why chroot /host: /usr/local/bin/crictl is a self-extracting k3s symlink
# that bootstraps the whole /var/lib/rancher/k3s data dir, so it cannot be
# run with just the binary + socket bind-mounted — it must execute inside the
# host filesystem. `crictl rmi --prune` only removes images not referenced by
# any container, so images for running/pending pods are never touched.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-prune
  namespace: kube-system
  labels:
    app.kubernetes.io/name: image-prune
    app.kubernetes.io/part-of: mctl-platform
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: image-prune
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-prune
        app.kubernetes.io/part-of: mctl-platform
    spec:
      # Run on every node, including the tainted control-plane.
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 5
      containers:
        - name: prune
          image: busybox:1.36
          securityContext:
            # chroot + access to the root-owned containerd socket.
            privileged: true
            runAsUser: 0
          command: ["sh", "-c"]
          args:
            - |
              INTERVAL="${PRUNE_INTERVAL_SECONDS:-86400}"
              SOCK="unix:///run/k3s/containerd/containerd.sock"
              while true; do
                echo "[image-prune] $(date -u) pruning unused images on ${NODE_NAME}"
                chroot /host /usr/local/bin/crictl --runtime-endpoint "$SOCK" rmi --prune 2>&1 \
                  || echo "[image-prune] $(date -u) prune returned non-zero (continuing)"
                echo "[image-prune] $(date -u) done; sleeping ${INTERVAL}s"
                sleep "$INTERVAL"
              done
          env:
            # 24h between sweeps. Override per-node if churn ever demands it.
            - name: PRUNE_INTERVAL_SECONDS
              value: "86400"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 200m
              memory: 64Mi
          volumeMounts:
            - name: host-root
              mountPath: /host
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
