apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.28.1
    helm:
      values: |
        server:
          ha:
            enabled: true
            replicas: 1
            raft:
              enabled: true
              config: |
                ui = true

                listener "tcp" {
                  tls_disable = 1
                  address = "[::]:8200"
                  cluster_address = "[::]:8201"
                }

                storage "raft" {
                  path = "/vault/data"
                }

                service_registration "kubernetes" {}

          standalone:
            enabled: false

          dataStorage:
            enabled: true
            size: 1Gi
            storageClass: hcloud-volumes

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - host: secrets.mctl.ai
              - host: secrets.mctl.ai
            tls:
              - hosts:
                  - secrets.mctl.ai
                  - secrets.mctl.ai
                secretName: vault-tls

        ui:
          enabled: true

        injector:
          enabled: false

  ignoreDifferences:
    # ESO admission webhook injects defaults absent in git, plus legacy
    # last-applied-configuration annotations can pin stale apiVersion across
    # chart churn. Mirror the tenants ApplicationSet pattern.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .metadata.annotations
        - .metadata.managedFields
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .status
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
