apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.28.1
    helm:
      values: |
        server:
          ha:
            enabled: true
            # 3-node Raft cluster. A single replica had a PDB with 0 allowed
            # disruptions, so a node drain (e.g. the k3s rolling upgrade that
            # left worker-cx43-fsn1-ftx cordoned for 13 days) could never evict
            # vault-0. Three nodes tolerate losing one while keeping quorum.
            replicas: 3
            raft:
              enabled: true
              config: |
                ui = true

                listener "tcp" {
                  tls_disable = 1
                  address = "[::]:8200"
                  cluster_address = "[::]:8201"
                }

                storage "raft" {
                  path = "/vault/data"
                  retry_join {
                    leader_api_addr = "http://vault-0.vault-internal:8200"
                  }
                  retry_join {
                    leader_api_addr = "http://vault-1.vault-internal:8200"
                  }
                  retry_join {
                    leader_api_addr = "http://vault-2.vault-internal:8200"
                  }
                }

                service_registration "kubernetes" {}

            # Without this override the chart defaults maxUnavailable to
            # (n/2)-1 = 0 for 3 replicas, which would re-block node drains.
            # 1 lets one node drain while the remaining 2/3 keep Raft quorum.
            disruptionBudget:
              maxUnavailable: 1

          standalone:
            enabled: false

          dataStorage:
            enabled: true
            size: 1Gi
            storageClass: hcloud-volumes

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              # Restored 200m→500m on 2026-05-13: steady-state usage reached
              # 101m (50% of 200m limit), triggering CPUThrottlingHigh alerts.
              # 500m was the pre-2026-05-10 value and proved sufficient.
              cpu: 500m
              memory: 1Gi

          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - host: secrets.mctl.ai
              - host: secrets.mctl.ai
            tls:
              - hosts:
                  - secrets.mctl.ai
                  - secrets.mctl.ai
                secretName: vault-tls

        ui:
          enabled: true

        injector:
          enabled: false

  ignoreDifferences:
    # ESO admission webhook injects defaults absent in git, plus legacy
    # last-applied-configuration annotations can pin stale apiVersion across
    # chart churn. Mirror the tenants ApplicationSet pattern.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .metadata.annotations
        - .metadata.managedFields
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.dataFrom[].extract.conversionStrategy
        - .spec.dataFrom[].extract.decodingStrategy
        - .spec.dataFrom[].extract.metadataPolicy
        - .status
    # Hashicorp vault chart 0.28.1 renders fields that the API server
    # normalises away — without ServerSideDiff the controller would
    # otherwise flag the StatefulSet OutOfSync indefinitely. Two classes:
    #
    # 1) Chart-emitted nulls/explicit-false the API strips:
    #    - `spec.template.metadata.annotations` (helper renders an
    #      `annotations:` line with no body when neither
    #      `server.annotations` nor `server.includeConfigAnnotation` is
    #      set; YAML parses as null, API drops)
    #    - `spec.template.spec.hostNetwork: false` (chart explicit, API
    #      drops the false default)
    #    - `spec.volumeClaimTemplates[].metadata.creationTimestamp: null`
    #
    # 2) Kube-injected defaults the chart never set:
    #    - `spec.persistentVolumeClaimRetentionPolicy` (k8s 1.27+ default
    #      `{Retain, Retain}`)
    #    - `spec.revisionHistoryLimit: 10`
    #    - `spec.template.spec.{dnsPolicy,restartPolicy,schedulerName,serviceAccount}`
    #    - `spec.template.spec.containers[].env[].valueFrom.fieldRef.apiVersion: v1`
    #    - `spec.template.spec.containers[].ports[].protocol: TCP`
    #    - `spec.template.spec.containers[].terminationMessage{Path,Policy}`
    #    - `spec.template.spec.volumes[].configMap.defaultMode: 420`
    #    - `spec.volumeClaimTemplates[].{apiVersion,kind,spec.volumeMode,status}`
    - group: apps
      kind: StatefulSet
      name: vault
      jqPathExpressions:
        - .spec.template.metadata.annotations
        - .spec.template.spec.hostNetwork
        - .spec.persistentVolumeClaimRetentionPolicy
        - .spec.revisionHistoryLimit
        - .spec.template.spec.dnsPolicy
        - .spec.template.spec.restartPolicy
        - .spec.template.spec.schedulerName
        - .spec.template.spec.serviceAccount
        - .spec.template.spec.containers[].env[].valueFrom.fieldRef.apiVersion
        - .spec.template.spec.containers[].ports[].protocol
        - .spec.template.spec.containers[].terminationMessagePath
        - .spec.template.spec.containers[].terminationMessagePolicy
        - .spec.template.spec.volumes[].configMap.defaultMode
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind
        - .spec.volumeClaimTemplates[].metadata.creationTimestamp
        - .spec.volumeClaimTemplates[].spec.volumeMode
        - .spec.volumeClaimTemplates[].status
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
