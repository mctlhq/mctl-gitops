apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shared-pg-backup-reader
  namespace: platform-db
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["r2-backup-creds"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shared-pg-backup-reader-binding
  namespace: platform-db
subjects:
  - kind: ServiceAccount
    name: shared-pg
    namespace: platform-db
roleRef:
  kind: Role
  name: shared-pg-backup-reader
  apiGroup: rbac.authorization.k8s.io
