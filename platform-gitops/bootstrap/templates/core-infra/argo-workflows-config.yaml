apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: {{ .Values.spec.source.targetRevision }}
    path: platform-gitops/argo-workflows
    directory:
      recurse: true
  ignoreDifferences:
    # ESO admission webhook injects defaults absent in git, plus the legacy
    # client-side `kubectl.kubernetes.io/last-applied-configuration` annotation
    # has historically pinned a stale apiVersion/resourceVersion across chart
    # version churn. Mirror the tenants ApplicationSet pattern.
    #
    # Do NOT list .metadata.managedFields here: with RespectIgnoreDifferences
    # + ServerSideApply, ArgoCD injects the live object's cached managedFields
    # into the SSA apply payload, which the apiserver rejects with
    # "metadata.managedFields must be nil" (retried 5x, sync Failed). Hit on
    # 2026-07-01 during the Loki/Argo R2 migration cutover (PR #483) — the
    # minio-artifact-credentials ExternalSecret never got its new Vault path,
    # leaving Argo Workflows artifact saves on dead MinIO creds. Same lesson
    # already documented in applicationset-apps.yaml; this file just hadn't
    # been updated to match.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .metadata.annotations
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.dataFrom[].extract.conversionStrategy
        - .spec.dataFrom[].extract.decodingStrategy
        - .spec.dataFrom[].extract.metadataPolicy
        - .status
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: argo-workflows
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
