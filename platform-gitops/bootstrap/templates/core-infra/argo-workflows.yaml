apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.47.5
    helm:
      values: |
        server:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 384Mi
          authModes:
            - sso
            - client
          extraArgs: []
          sso:
            enabled: true
            issuer: https://ops.mctl.ai/api/dex
            clientId:
              name: argo-workflows-sso
              key: client-id
            clientSecret:
              name: argo-workflows-sso
              key: client-secret
            redirectUrl: https://workflows.mctl.ai/oauth2/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            rbac:
              enabled: true
            customGroupClaimName: groups
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - workflows.mctl.ai
              - workflows.mctl.ai
            tls:
              - hosts:
                  - workflows.mctl.ai
                  - workflows.mctl.ai
                secretName: argo-workflows-tls

        controller:
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              # Controller bursts above 500m during workflow reconciliation,
              # causing recurring CPUThrottlingHigh. Raised 500m→750m.
              cpu: 750m
              memory: 512Mi
          metricsConfig:
            enabled: true
            port: 9090
          persistence:
            archive: true
            # Prune archived workflows after 30d. Without this the archive
            # table grows unbounded (default retention is indefinite): it had
            # reached 9.3k rows / 120MB since 2026-03-20 before this was set.
            # GC cadence is governed by ARCHIVED_WORKFLOW_GC_PERIOD.
            archiveTTL: 30d
            # Offload workflow node tree to PostgreSQL instead of etcd.
            # Reduces kube-apiserver watch-cache RAM by ~300-600Mi at 500+
            # workflow objects (each workflow node stored as ~5KB instead of
            # 36-107KB in etcd). Requires archive: true + PG already configured.
            nodeStatusOffLoad: true
            postgresql:
              host: shared-pg-rw.platform-db.svc
              port: 5432
              database: argo-workflows
              # tableName is the node-status OFFLOAD table. It MUST differ from
              # the archive table, which Argo always hardcodes to
              # `argo_archived_workflows`. Previously this was also set to
              # `argo_archived_workflows`, collapsing both onto one merged-schema
              # table; the offload GC then read NULL `version` rows and crashed
              # every pass ("converting NULL to string"), so offloaded nodes were
              # never pruned. Restore the conventional dedicated offload table.
              tableName: argo_workflows
              userNameSecret:
                name: argo-workflows-db-creds
                key: username
              passwordSecret:
                name: argo-workflows-db-creds
                key: password
          workflowDefaults:
            spec:
              serviceAccountName: argo-workflow-sa
              ttlStrategy:
                secondsAfterCompletion: 3600
                secondsAfterSuccess: 1800
                secondsAfterFailure: 86400
              podGC:
                strategy: OnWorkflowCompletion

        artifactRepository:
          archiveLogs: true
          s3:
            endpoint: minio.minio.svc:9000
            bucket: argo-workflows-logs
            insecure: true
            accessKeySecret:
              name: minio-artifact-credentials
              key: accessKey
            secretKeySecret:
              name: minio-artifact-credentials
              key: secretKey

        workflow:
          serviceAccount:
            create: false
            name: argo-workflow-sa

        useStaticCredentials: true

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: argo-workflows
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
