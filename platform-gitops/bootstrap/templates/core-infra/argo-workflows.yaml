apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.47.5
    helm:
      values: |
        server:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 384Mi
          authModes:
            - sso
            - client
          extraArgs: []
          sso:
            enabled: true
            issuer: https://ops.mctl.ai/api/dex
            clientId:
              name: argo-workflows-sso
              key: client-id
            clientSecret:
              name: argo-workflows-sso
              key: client-secret
            redirectUrl: https://workflows.mctl.ai/oauth2/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            rbac:
              enabled: true
            customGroupClaimName: groups
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - workflows.mctl.ai
              - workflows.mctl.ai
            tls:
              - hosts:
                  - workflows.mctl.ai
                  - workflows.mctl.ai
                secretName: argo-workflows-tls

        controller:
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          metricsConfig:
            enabled: true
            port: 9090
          persistence:
            archive: true
            nodeStatusOffLoad: false
            postgresql:
              host: shared-pg-rw.platform-db.svc
              port: 5432
              database: argo-workflows
              tableName: argo_archived_workflows
              userNameSecret:
                name: argo-workflows-db-creds
                key: username
              passwordSecret:
                name: argo-workflows-db-creds
                key: password
          workflowDefaults:
            spec:
              serviceAccountName: argo-workflow-sa
              ttlStrategy:
                secondsAfterCompletion: 3600
                secondsAfterSuccess: 1800
                secondsAfterFailure: 86400
              podGC:
                strategy: OnWorkflowCompletion

        artifactRepository:
          archiveLogs: true
          s3:
            endpoint: minio.minio.svc:9000
            bucket: argo-workflows-logs
            insecure: true
            accessKeySecret:
              name: minio-artifact-credentials
              key: accessKey
            secretKeySecret:
              name: minio-artifact-credentials
              key: secretKey

        workflow:
          serviceAccount:
            create: false
            name: argo-workflow-sa

        useStaticCredentials: true

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: argo-workflows
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
