apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.47.5
    helm:
      values: |
        server:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 384Mi
          authModes:
            - sso
            - client
          extraArgs: []
          sso:
            enabled: true
            issuer: https://ops.mctl.ai/api/dex
            clientId:
              name: argo-workflows-sso
              key: client-id
            clientSecret:
              name: argo-workflows-sso
              key: client-secret
            redirectUrl: https://workflows.mctl.ai/oauth2/callback
            scopes:
              - openid
              - profile
              - email
              - groups
            rbac:
              enabled: true
            customGroupClaimName: groups
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hosts:
              - workflows.mctl.ai
              - workflows.mctl.ai
            tls:
              - hosts:
                  - workflows.mctl.ai
                  - workflows.mctl.ai
                secretName: argo-workflows-tls

        controller:
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              # Controller bursts above 500m during workflow reconciliation,
              # causing recurring CPUThrottlingHigh. Raised 500m→750m.
              cpu: 750m
              memory: 512Mi
          metricsConfig:
            enabled: true
            port: 9090
          persistence:
            archive: true
            # Prune archived workflows after 30d. Without this the archive
            # table grows unbounded (default retention is indefinite): it had
            # reached 9.3k rows / 120MB since 2026-03-20 before this was set.
            # GC cadence is governed by ARCHIVED_WORKFLOW_GC_PERIOD.
            archiveTTL: 30d
            # Node-status offload to PostgreSQL is DISABLED. At this scale the
            # live workflow count is tiny (the 30-min success TTL keeps very few
            # objects around), so the kube-apiserver watch-cache pressure that
            # offload mitigates does not exist, while offload has been nothing
            # but trouble: the offload GC first crashed every pass on NULL
            # `version` rows (when tableName collided with the archive table),
            # and after correcting tableName the offload table no longer exists
            # in the DB (Argo's migrate framework skips creating it because
            # schema_history was already stamped at the latest version by the
            # earlier broken config), so the GC now logs
            # `relation "argo_workflows" does not exist` every ~5 min. With
            # offload off the controller never creates or queries that table,
            # so the error path is gone — and no shared-pg DDL is needed.
            # archive: true above is unaffected — archiving uses the hardcoded
            # `argo_archived_workflows` table, independent of offload.
            nodeStatusOffLoad: false
            postgresql:
              host: shared-pg-rw.platform-db.svc
              port: 5432
              database: argo-workflows
              # tableName MUST stay set even with offload disabled: the
              # controller calls GetTableName() unconditionally whenever
              # persistence is configured and fails to start on an empty value
              # ("TableName is empty"), which would also take archiving down.
              # The value is otherwise inert while nodeStatusOffLoad is false —
              # no offload table is ever created or queried.
              tableName: argo_workflows
              userNameSecret:
                name: argo-workflows-db-creds
                key: username
              passwordSecret:
                name: argo-workflows-db-creds
                key: password
          workflowDefaults:
            spec:
              serviceAccountName: argo-workflow-sa
              ttlStrategy:
                secondsAfterCompletion: 3600
                secondsAfterSuccess: 1800
                secondsAfterFailure: 86400
              podGC:
                strategy: OnWorkflowCompletion
              # Delete volumeClaimTemplate PVCs (the per-workflow `workdir`) on
              # completion regardless of outcome. Argo's default is
              # OnWorkflowSuccess, which RETAINS the PVC when a workflow fails;
              # ttlStrategy then GCs the Workflow object, orphaning the PVC (and
              # its backing Hetzner volume) permanently. This left several failed
              # mctl-agents issue-poll workdir PVCs stranded (10Gi each).
              volumeClaimGC:
                strategy: OnWorkflowCompletion

        artifactRepository:
          archiveLogs: true
          s3:
            endpoint: minio.minio.svc:9000
            bucket: argo-workflows-logs
            insecure: true
            accessKeySecret:
              name: minio-artifact-credentials
              key: accessKey
            secretKeySecret:
              name: minio-artifact-credentials
              key: secretKey

        workflow:
          serviceAccount:
            create: false
            name: argo-workflow-sa

        useStaticCredentials: true

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: argo-workflows
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
