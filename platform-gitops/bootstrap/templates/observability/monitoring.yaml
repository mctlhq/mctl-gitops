apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://victoriametrics.github.io/helm-charts/
      chart: victoria-metrics-k8s-stack
      targetRevision: "0.72.5"
      helm:
        values: |
          # Use VMSingle for single-node efficiency (replacing Prometheus operator)
          vmsingle:
            enabled: true
            spec:
              # Raised 3d→14d on 2026-07-18: the mctl-agent resource
              # optimizer needs a 14-day observation window to compute
              # right-sizing recommendations directly from VM history
              # (its own SQLite/PG rollups only accumulate going forward).
              retentionPeriod: "14d"
              resources:
                requests:
                  cpu: 100m
                  memory: 1400Mi
                limits:
                  cpu: 750m
                  # Raised 1536Mi→2Gi on 2026-06-26: working set sat at ~1409Mi
                  # (~92% of the 1536Mi cap), firing recurring ">80% memory used"
                  # warnings and risking OOM. Request stays 1400Mi (no scheduling
                  # change); the bump is pure headroom.
                  memory: 2Gi
              extraArgs:
                search.maxConcurrentRequests: "16"
                search.maxQueueDuration: "30s"
                search.cacheTimestampOffset: "12h"
              storage:
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    # Sized 25Gi for the 14d retention (~4.7x the 3d data
                    # volume that fit in 10Gi). Expansion needs the storage
                    # class to allow volume expansion; if the PVC resize is
                    # rejected, VM still runs — it drops oldest data at the
                    # disk limit. vmbackup R2 size grows accordingly.
                    storage: 25Gi
              # vmbackup sidecar — backs up to Cloudflare R2 daily
              extraContainers:
                - name: vmbackup
                  image: victoriametrics/vmbackup:v1.106.1
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      while true; do
                        echo "[vmbackup] Starting backup to R2..."
                        /vmbackup \
                          -storageDataPath=/storage \
                          -snapshotCreateURL=http://localhost:8428/snapshot/create \
                          -snapshotDeleteURL=http://localhost:8428/snapshot/delete \
                          -dst=s3://vault-backup/victoria-metrics \
                          -customS3Endpoint=$S3_ENDPOINT
                        echo "[vmbackup] Done. Next run in 24h."
                        sleep 86400
                      done
                  env:
                    - name: AWS_ACCESS_KEY_ID
                      valueFrom:
                        secretKeyRef:
                          name: victoria-backup-r2
                          key: AWS_ACCESS_KEY_ID
                    - name: AWS_SECRET_ACCESS_KEY
                      valueFrom:
                        secretKeyRef:
                          name: victoria-backup-r2
                          key: AWS_SECRET_ACCESS_KEY
                    - name: S3_ENDPOINT
                      valueFrom:
                        secretKeyRef:
                          name: victoria-backup-r2
                          key: S3_ENDPOINT
                  volumeMounts:
                    - name: data
                      mountPath: /storage
                  resources:
                    requests:
                      cpu: 10m
                      memory: 64Mi
                    limits:
                      cpu: 200m
                      memory: 256Mi

          # Disable bundled k8s-views-global so our patched ConfigMap
          # (z-mctl-k8s-views-global) is the sole provider of UID k8s_views_global.
          # Duplicate UIDs cause Grafana provisioner lockout in v12.
          defaultDashboards:
            dashboards:
              kubernetes-views-global:
                enabled: false

          # Core components
          defaultRules:
            enabled: true
            groups:
              etcd:
                create: false
              kubeScheduler:
                create: false
              kubernetesSystemScheduler:
                create: false
              kubernetesSystemControllerManager:
                create: false

          prometheus-node-exporter:
            enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 32Mi
              limits:
                cpu: 250m
                memory: 128Mi

          kube-state-metrics:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 192Mi

          victoria-metrics-operator:
            resources:
              requests:
                cpu: 50m
                memory: 96Mi
              limits:
                cpu: 250m
                memory: 256Mi

          # VMAgent replaces Prometheus's scrape engine
          vmagent:
            enabled: true
            spec:
              extraArgs:
                promscrape.dropOriginalLabels: "true"
                promscrape.streamParse: "true"
                promscrape.maxScrapeSize: "64MB"
              remoteWrite:
                - url: http://vmsingle-monitoring-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8428/api/v1/write
              selectAllByDefault: true
              scrapeInterval: 1m
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  # Raised 250m→500m on 2026-06-27: the 2026-05-07 trim to 250m
                  # was too aggressive — vmagent CFS-throttled ~37% (7d) on
                  # scrape/remote-write bursts. 500m restores burst headroom.
                  cpu: 500m
                  memory: 512Mi

          # VMAlert replaces Prometheus's alerting engine
          vmalert:
            enabled: true
            spec:
              selectAllByDefault: true
              evaluationInterval: 1m
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi

          grafana:
            enabled: true
            # Pin to patched release; CVE-2026-27876 fixed in v12.4.2
            image:
              tag: "12.4.2"
            admin:
              existingSecret: grafana-admin-secret
              userKey: admin-user
              passwordKey: admin-password
            envValueFrom:
              GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: oidc-client-secret
            grafana.ini:
              server:
                root_url: https://grafana.mctl.ai
              auth:
                disable_login_form: true
                oauth_auto_login: true
              auth.basic:
                enabled: false
              auth.generic_oauth:
                enabled: true
                name: mctl.ai
                allow_sign_up: true
                client_id: grafana
                scopes: openid profile email groups
                auth_url: https://ops.mctl.ai/api/dex/auth
                token_url: https://ops.mctl.ai/api/dex/token
                api_url: https://ops.mctl.ai/api/dex/userinfo
                role_attribute_path: "contains(groups, 'admins') && 'Admin' || 'Viewer'"
              feature_toggles:
                # CVE-2026-27876: disable SQL Expressions RCE attack vector
                sqlExpressions: "false"
            ingress:
              enabled: true
              ingressClassName: traefik
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt-prod
              hosts:
                - grafana.mctl.ai
              tls:
                - secretName: grafana-tls
                  hosts:
                    - grafana.mctl.ai
            defaultDashboardsEnabled: true
            env:
              GF_INSTALL_PLUGINS: victoriametrics-metrics-datasource
            sidecar:
              datasources:
                enabled: true
              dashboards:
                enabled: true
                label: grafana_dashboard
                labelValue: "1"
                searchNamespace: ALL
            plugins:
              - victoriametrics-metrics-datasource
            resources:
              requests:
                cpu: 50m
                memory: 384Mi
              limits:
                cpu: 200m
                memory: 768Mi

          alertmanager:
            enabled: true
            spec:
              secrets:
                - alertmanager-telegram-secret
            config:
              global:
                resolve_timeout: 5m
                telegram_api_url: "https://api.telegram.org"
              route:
                receiver: mctl-agent
                group_by: ["alertname", "namespace"]
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 4h
                routes:
                  - receiver: "null"
                    matchers:
                      - alertname =~ "InfoInhibitor|Watchdog"
                  - receiver: "null"
                    matchers:
                      - alertname = "KubeContainerWaiting"
                      - namespace = "vault"
                  # vault CronJobs (backup, auto-unseal) are operator-owned —
                  # mctl-agent can't remediate them, so a failed job pages a
                  # human. This also backstops the jobs' own Telegram reports:
                  # if the pod never starts (image pull, init-container crash)
                  # the in-job notify can't fire, but this alert still does.
                  - receiver: telegram
                    matchers:
                      - alertname = "KubeJobFailed"
                      - namespace = "vault"
                  - receiver: "null"
                    matchers:
                      - alertname = "KubeJobFailed"
                      - namespace = "labs"
                  - receiver: "null"
                    matchers:
                      - alertname = "CPUThrottlingHigh"
                      - namespace = "monitoring"
                  - receiver: "null"
                    matchers:
                      - alertname =~ "KubeControllerManagerDown|KubeSchedulerDown|KubeProxyDown"
                  - receiver: "null"
                    matchers:
                      - alertname =~ "KubePodNotReady|PodNotReady"
                      - namespace = "argo-workflows"
                  # Node-cordon / stuck-upgrade alerts go straight to a human on
                  # Telegram — mctl-agent cannot auto-remediate these (they need
                  # an operator to uncordon / re-drive the upgrade).
                  # MctlAgentsPipelineStale joins this group for the same
                  # reason: mctl-agent IS the thing that's down when this
                  # fires (expired/exhausted OAuth token), so it can't
                  # self-remediate — only an operator reseeding Vault can.
                  - receiver: telegram
                    matchers:
                      - alertname =~ "NodeCordoned|K3sUpgradeJobFailed|MctlAgentsPipelineStale"
                  - receiver: mctl-agent
                    matchers:
                      - alertname =~ "RecordingRulesNoData|ScrapePoolHasNoTargets|TooManyScrapeErrors|TooManyLogs"
                      - namespace = "monitoring"
                  - receiver: mctl-agent
                    matchers:
                      - alertname =~ "PodCrashLooping|KubePodCrashLooping|KubePodNotReady|PodNotReady|TenantCPUQuotaHigh|TenantMemoryQuotaHigh|ArgoWorkflowFailed|ArgoWorkflowHighFailureRate|CPUThrottlingHigh|KubeJobNotCompleted|KubePersistentVolumeFillingUp|KubeStatefulSetReplicasMismatch|NodeHighCPU|NodeHighMemory|NodeLowMemoryAvailable|NodeDiskPressure|NodeDiskSpaceHigh|VaultSealed|MinioBucketUsageHigh|MinioBucketUsageCritical|ArgoCDApplicationDegraded|ArgoCDApplicationOutOfSyncLong|OpenclawCodexTokenRefreshFailed"
              receivers:
                - name: "null"
                - name: mctl-agent
                  webhook_configs:
                    - url: "http://admins-mctl-agent-base-service.admins.svc.cluster.local:8080/api/v1/alerts"
                      send_resolved: true
                - name: telegram
                  telegram_configs:
                    - bot_token_file: /etc/vm/secrets/alertmanager-telegram-secret/bot-token
                      chat_id: {{ .Values.alertmanager.telegramChatId | int64 }}
                      parse_mode: HTML
                      message: |
                        {{ "{{" }} range .Alerts {{ "}}" }}
                        <b>{{ "{{" }} .Status | toUpper {{ "}}" }}: {{ "{{" }} .Labels.alertname {{ "}}" }}</b>
                        {{ "{{" }} .Annotations.summary {{ "}}" }}
                        <i>Namespace: {{ "{{" }} .Labels.namespace {{ "}}" }}</i>
                        {{ "{{" }} end {{ "}}" }}

          # Disable Prometheus (operator components)
          prometheus:
            enabled: false
          prometheusOperator:
            enabled: true # Keep operator to manage CRDs (ServiceMonitors, VMAlerts)

          kubeControllerManager:
            enabled: false
          kubeEtcd:
            enabled: false
          kubeScheduler:
            enabled: false
          kubeStateMetrics:
            enabled: true
          nodeExporter:
            enabled: true

    - repoURL: https://github.com/mctlhq/mctl-gitops.git
      targetRevision: main
      path: platform-gitops/infra-components/observability/grafana-dashboards

    - repoURL: https://github.com/mctlhq/mctl-gitops.git
      targetRevision: main
      path: platform-gitops/infra-components/observability/secrets

    - repoURL: https://github.com/mctlhq/mctl-gitops.git
      targetRevision: main
      path: platform-gitops/infra-components/observability/vm-rules

    - repoURL: https://github.com/mctlhq/mctl-gitops.git
      targetRevision: main
      path: platform-gitops/infra-components/observability/pushgateway

  ignoreDifferences:
    - group: operator.victoriametrics.com
      kind: VMSingle
      jsonPointers:
        - /spec/extraContainers
    # The victoria-metrics-operator subchart ships a `pre-delete` Helm hook
    # ServiceAccount (cleanup-hook). ArgoCD applies it once but, being a
    # pre-delete hook, never re-applies it on a normal sync — so when the
    # k8s-stack chart bumps its bundled operator version, the live SA keeps the
    # OLD `helm.sh/chart` / `app.kubernetes.io/version` labels while git renders
    # the new ones. That label-only mismatch left the SA (and thus root-app)
    # perpetually OutOfSync despite being Healthy. Ignore label diffs on this
    # one SA; the hook still functions on app deletion.
    - group: ""
      kind: ServiceAccount
      name: monitoring-victoria-metrics-operator-cleanup-hook
      namespace: monitoring
      jqPathExpressions:
        - .metadata.labels
    # ESO admission webhook injects default fields absent in git.
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .status

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      # VictoriaMetrics operator CRDs (VMSingle, VMAlert, ...) declare an
      # incomplete schema that omits some pass-through fields like
      # `VMSingle.spec.extraContainers`. Once cluster-wide
      # `controller.diff.server.side: "true"` is set, ArgoCD's SSA
      # dry-run rejects the diff with `failed to create typed patch
      # object: .spec.extraContainers: field not declared in schema` and
      # the app stays Sync=Unknown. Opt this app out so it falls back to
      # the legacy client-side diff.
      - ServerSideDiff=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
