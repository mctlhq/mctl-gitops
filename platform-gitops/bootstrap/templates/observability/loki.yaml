apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "2.10.2"
    helm:
      values: |
        loki:
          enabled: true
          persistence:
            enabled: false # Switched to MinIO (S3)
          config:
            schema_config:
              configs:
                - from: 2024-04-01
                  store: tsdb
                  object_store: s3
                  schema: v13
                  index:
                    prefix: index_
                    period: 24h
            storage_config:
              tsdb_shipper:
                active_index_directory: /data/loki/index
                cache_location: /data/loki/index_cache
              aws:
                s3: s3://minio-root-user:mctlhq-minio-secret@minio.minio.svc.cluster.local:9000/loki
                s3forcepathstyle: true
            limits_config:
              retention_period: 336h  # 14 days

        promtail:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          config:
            clients:
              - url: http://loki-stack:3100/loki/api/v1/push
            scrape_configs:
              - job_name: kubernetes-pods
                pipeline_stages:
                  - docker: {}
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: drop
                    regex: "false"
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                    target_label: app
                  - source_labels: [__meta_kubernetes_pod_label_mctl_ai_team]
                    target_label: team
                  - source_labels: [__meta_kubernetes_pod_label_mctl_ai_component]
                    target_label: component
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod

        grafana:
          # Grafana is managed by kube-prometheus-stack; only add Loki datasource via sidecar.
          enabled: false
          sidecar:
            datasources:
              enabled: true
              label: grafana_datasource

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
