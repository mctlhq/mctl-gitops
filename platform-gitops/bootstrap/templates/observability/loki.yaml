apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "2.10.2"
    helm:
      values: |
        loki:
          enabled: true
          # Pin Loki to a recent 2.9.x release. The loki-stack chart 2.10.2 pulls in
          # the loki subchart 2.16.0 whose default image tag is still 2.6.1, where
          # `store: tsdb` is unsupported and the compactor refuses to run (logs show
          # "Not using boltdb-shipper index, not starting compactor"). 2.9.x adds
          # native tsdb support and a compactor that honours retention on tsdb+s3.
          image:
            repository: grafana/loki
            tag: 2.9.17
          persistence:
            enabled: false # Switched to MinIO (S3); /data is backed by emptyDir
          resources:
            requests:
              cpu: 100m
              memory: 1536Mi
            limits:
              # Steady-state ~16m; 200m gives 12x cushion for compaction bursts.
              # Trimmed 500m→200m on 2026-05-10 (CPU-limits cluster headroom).
              cpu: 200m
              memory: 2048Mi
          extraEnvFrom:
            - secretRef:
                name: loki-minio-credentials
          config:
            schema_config:
              configs:
                - from: 2024-04-01
                  store: tsdb
                  object_store: s3
                  schema: v12
                  index:
                    prefix: index_
                    period: 24h
            storage_config:
              # Note: the loki subchart (2.16.0) injects default `boltdb_shipper` and
              # `filesystem` sub-blocks here. Helm cannot delete subchart-default keys
              # via `null`, so they stay in the rendered Secret. That is harmless: the
              # schema_config below only references `store: tsdb` + `object_store: s3`,
              # so Loki loads tsdb+aws and never touches the dormant boltdb/filesystem
              # paths.
              tsdb_shipper:
                active_index_directory: /data/loki/index
                cache_location: /data/loki/index_cache
                shared_store: s3
              # Migrated 2026-07 from self-hosted MinIO to Cloudflare R2.
              # Bucket recreated on R2 as "loki" with a 30-day defensive
              # lifecycle rule (retention is already enforced above by the
              # compactor at 168h, this is just a backstop). Credentials
              # still come from the loki-minio-credentials Secret (name
              # unchanged), whose ExternalSecret now sources R2 keys from
              # Vault (see infra-components/observability/secrets/
              # loki-minio-externalsecret.yaml).
              aws:
                endpoint: https://6a09f637d20e1f66a8e9d45ebe778058.r2.cloudflarestorage.com
                region: auto
                bucketnames: loki
                s3forcepathstyle: true
            limits_config:
              ingestion_rate_mb: 4
              ingestion_burst_size_mb: 8
              retention_period: 168h  # 7 days
            chunk_store_config:
              max_look_back_period: 168h
            # table_manager is obsolete once the compactor handles retention on tsdb;
            # keeping it alongside compactor.retention_enabled produces duplicate
            # delete workers and warnings in 2.9. Explicitly disable it.
            table_manager:
              retention_deletes_enabled: false
              retention_period: 0s
            compactor:
              working_directory: /data/loki/compactor
              shared_store: s3
              compaction_interval: 10m
              retention_enabled: true
              retention_delete_delay: 2h
              retention_delete_worker_count: 150

        promtail:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              # 24h peak observed 28m on the busiest node (workflow log bursts);
              # 150m gives ~5x cushion. Previously 500m, which was helm chart
              # default and unjustified — released ~1.4c of cluster headroom.
              cpu: 150m
              # 1h peak working set hit 94% of 128Mi across multiple nodes;
              # log volume grew with mctl-agents proposals + openclaw sessions.
              # 256Mi gives 2x cushion; cluster-wide cost is +384Mi (3 nodes).
              memory: 256Mi
          config:
            clients:
              - url: http://loki-stack:3100/loki/api/v1/push
            scrape_configs:
              - job_name: kubernetes-pods
                pipeline_stages:
                  - docker: {}
                  - match:
                      selector: '{namespace=~"labs|admins|ovk"}'
                      stages:
                        - regex:
                            expression: '(?P<token_refresh_failed>\[openai-codex\] Token refresh failed)'
                        - metrics:
                            openclaw_token_refresh_failed_total:
                              type: Counter
                              description: "openai-codex token refresh failure count"
                              source: token_refresh_failed
                              config:
                                match_all: false
                                action: inc
                        # Catches the broader "no usable credentials" case: never
                        # connected, expired-then-purged, or explicitly
                        # disconnected — none of which produce a "Token refresh
                        # failed" line above. See mctlhq/mctl-gitops#556.
                        # Named capture group (?P<provider>...) is kept only so
                        # the extracted value could be promoted to a Loki label
                        # via a `labels` stage; Promtail's `metrics` stage itself
                        # does not attach per-value labels to the Counter it
                        # exposes (metrics stage output has no dynamic labels,
                        # only what's already on the log stream) — so this is a
                        # single unlabeled total across all providers, same
                        # shape as openclaw_token_refresh_failed_total above.
                        - regex:
                            expression: '(?P<missing_api_key>Missing API key for provider "(?P<provider>[^"]+)")'
                        - metrics:
                            openclaw_provider_missing_api_key_total:
                              type: Counter
                              description: "gateway 'Missing API key for provider' occurrence count (any provider)"
                              source: missing_api_key
                              config:
                                match_all: false
                                action: inc
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: drop
                    regex: "false"
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                    target_label: app
                  - source_labels: [__meta_kubernetes_pod_label_mctl_ai_team]
                    target_label: team
                  - source_labels: [__meta_kubernetes_pod_label_mctl_ai_component]
                    target_label: component
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod

        grafana:
          # Grafana is managed by kube-prometheus-stack; only add Loki datasource via sidecar.
          enabled: false
          sidecar:
            datasources:
              enabled: true
              label: grafana_datasource

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
