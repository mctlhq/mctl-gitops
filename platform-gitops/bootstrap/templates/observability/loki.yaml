apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "2.10.2"
    helm:
      values: |
        loki:
          enabled: true
          # Pin Loki to a recent 2.9.x release. The loki-stack chart 2.10.2 pulls in
          # the loki subchart 2.16.0 whose default image tag is still 2.6.1, where
          # `store: tsdb` is unsupported and the compactor refuses to run (logs show
          # "Not using boltdb-shipper index, not starting compactor"). 2.9.x adds
          # native tsdb support and a compactor that honours retention on tsdb+s3.
          image:
            repository: grafana/loki
            tag: 2.9.17
          persistence:
            # Minimal PVC (2Gi) specifically for Loki's /data — the
            # compactor working_directory lives there and must survive pod
            # restarts, otherwise pending deletion markers are lost on
            # every restart and some chunks never get deleted from S3.
            # Bulk data (chunks + index) still lives in MinIO via
            # storage_config.aws.s3 / tsdb_shipper.shared_store: s3.
            enabled: true
            size: 2Gi
            storageClassName: hcloud-volumes
          resources:
            requests:
              cpu: 100m
              memory: 1536Mi
            limits:
              cpu: 500m
              memory: 2048Mi
          extraEnvFrom:
            - secretRef:
                name: loki-minio-credentials
          config:
            schema_config:
              configs:
                - from: 2024-04-01
                  store: tsdb
                  object_store: s3
                  schema: v12
                  index:
                    prefix: index_
                    period: 24h
            storage_config:
              # Note: the loki subchart (2.16.0) injects default `boltdb_shipper` and
              # `filesystem` sub-blocks here. Helm cannot delete subchart-default keys
              # via `null`, so they stay in the rendered Secret. That is harmless: the
              # schema_config below only references `store: tsdb` + `object_store: s3`,
              # so Loki loads tsdb+aws and never touches the dormant boltdb/filesystem
              # paths.
              tsdb_shipper:
                active_index_directory: /data/loki/index
                cache_location: /data/loki/index_cache
                shared_store: s3
              aws:
                s3: s3://minio.minio.svc.cluster.local:9000/loki
                s3forcepathstyle: true
            limits_config:
              ingestion_rate_mb: 4
              ingestion_burst_size_mb: 8
              retention_period: 168h  # 7 days
            chunk_store_config:
              max_look_back_period: 168h
            # table_manager is obsolete once the compactor handles retention on tsdb;
            # keeping it alongside compactor.retention_enabled produces duplicate
            # delete workers and warnings in 2.9. Explicitly disable it.
            table_manager:
              retention_deletes_enabled: false
              retention_period: 0s
            compactor:
              working_directory: /data/loki/compactor
              shared_store: s3
              compaction_interval: 10m
              retention_enabled: true
              retention_delete_delay: 2h
              retention_delete_worker_count: 150

        promtail:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 48Mi
            limits:
              cpu: 500m
              memory: 128Mi
          config:
            clients:
              - url: http://loki-stack:3100/loki/api/v1/push
            scrape_configs:
              - job_name: kubernetes-pods
                pipeline_stages:
                  - docker: {}
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: drop
                    regex: "false"
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                    target_label: app
                  - source_labels: [__meta_kubernetes_pod_label_mctl_ai_team]
                    target_label: team
                  - source_labels: [__meta_kubernetes_pod_label_mctl_ai_component]
                    target_label: component
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod

        grafana:
          # Grafana is managed by kube-prometheus-stack; only add Loki datasource via sidecar.
          enabled: false
          sidecar:
            datasources:
              enabled: true
              label: grafana_datasource

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
