apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: "2.10.2"
    helm:
      values: |
        loki:
          enabled: true
          persistence:
            enabled: true
            size: 5Gi
          config:
            limits_config:
              retention_period: 336h  # 14 days
              reject_old_samples: true
              reject_old_samples_max_age: 168h
            schema_config:
              configs:
                - from: 2024-01-01
                  store: boltdb-shipper
                  object_store: filesystem
                  schema: v11
                  index:
                    prefix: index_
                    period: 24h

        promtail:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          config:
            clients:
              - url: http://loki-stack:3100/loki/api/v1/push
            scrape_configs:
              - job_name: kubernetes-pods
                pipeline_stages:
                  - docker: {}
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                    action: drop
                    regex: "false"
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                    target_label: app
                  - source_labels: [__meta_kubernetes_pod_label_mctl_ai_team]
                    target_label: team
                  - source_labels: [__meta_kubernetes_pod_label_mctl_ai_component]
                    target_label: component
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod

        grafana:
          # Grafana is managed by kube-prometheus-stack; only add Loki datasource.
          enabled: false
          sidecar:
            datasources:
              enabled: true
              # This ConfigMap will be picked up by the existing Grafana sidecar.
              label: grafana_datasource

        # Loki datasource ConfigMap for the existing Grafana instance.
        extraObjects:
          - apiVersion: v1
            kind: ConfigMap
            metadata:
              name: loki-grafana-datasource
              namespace: monitoring
              labels:
                grafana_datasource: "1"
            data:
              loki-datasource.yaml: |
                apiVersion: 1
                datasources:
                  - name: Loki
                    type: loki
                    url: http://loki-stack.monitoring.svc.cluster.local:3100
                    access: proxy
                    isDefault: false
                    jsonData:
                      maxLines: 1000

  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
