---
# ExternalSecret for Grafana admin credentials
# Synced from Vault path: secret/data/platform/grafana
# Required keys in Vault: admin-user, admin-password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: platform/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: platform/grafana
        property: admin-password
    - secretKey: oidc-client-secret
      remoteRef:
        key: platform/mctl-api/sso
        property: client-secret
---
# ExternalSecret for AlertManager Telegram integration
# Synced from Vault path: secret/data/platform/alertmanager
# Required keys in Vault: telegram-bot-token, telegram-chat-id
#
# To populate Vault:
#   vault kv put secret/platform/alertmanager \
#     telegram-bot-token="<BOT_TOKEN>" \
#     telegram-chat-id="<CHAT_ID>"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-telegram-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-telegram-secret
    creationPolicy: Owner
  data:
    - secretKey: bot-token
      remoteRef:
        key: platform/alertmanager
        property: telegram-bot-token
    - secretKey: chat-id
      remoteRef:
        key: platform/alertmanager
        property: telegram-chat-id
