apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: openclaw-skills
  namespace: argocd
  annotations:
    argocd/description: |
      Creates one ArgoCD Application per tenant that has an openclaw service dir.
      Each Application renders two ConfigMaps in the tenant namespace:
        {team}-openclaw-skills   — Layer-3 skill markdown (workspace fan-out)
        {team}-openclaw-identity — Layer-3 identity overrides
      Values are consumed from two per-tenant files:
        platform-gitops/services/{team}/openclaw/generated/platform-skills-values.yaml
          — enabled platform-catalog skills, rendered by
            scripts/materialize-openclaw-platform-skills.py via the
            platform-skill-* workflows
        platform-gitops/services/{team}/openclaw/generated/skills-values.yaml
          — tenant-authored skills/identity, regenerated on every skill or
            identity save/delete by the wft-openclaw-skill-save /
            wft-openclaw-identity-save workflows
      Helm merges the `skills:` maps per key; the tenant-authored file is
      listed last so it wins name collisions with platform skills.
      `ignoreMissingValueFiles: true` keeps the Application healthy for
      tenants that have neither file yet.
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
    - git:
        repoURL: {{ .Values.spec.source.repoURL }}
        revision: {{ .Values.spec.source.targetRevision }}
        requeueAfterSeconds: 30
        directories:
          # Each services/*/openclaw dir = one tenant. Tenants that do not run
          # openclaw simply do not have this subdir, and thus get no Application.
          - path: platform-gitops/services/*/openclaw
  template:
    metadata:
      name: '{{`{{ index .path.segments 2 }}-openclaw-skills`}}'
      labels:
        env: apps
        team: '{{`{{ index .path.segments 2 }}`}}'
        # Kubernetes label values are capped at 63 characters. Tenant names
        # are validated up to 63 characters upstream, so `{team}-openclaw-skills`
        # would exceed the cap for teams longer than 47 characters; truncate to
        # keep the ApplicationSet controller from rejecting the generated
        # Application for long-named tenants.
        backstage.io/kubernetes-id: '{{`{{ trunc 63 (printf "%s-openclaw-skills" (index .path.segments 2)) }}`}}'
      annotations:
        argocd/app-name: '{{`{{ index .path.segments 2 }}-openclaw-skills`}}'
    spec:
      project: apps
      sources:
        # Chart (logic).
        - repoURL: {{ .Values.spec.source.repoURL }}
          targetRevision: {{ .Values.spec.source.targetRevision }}
          path: platform-gitops/helm-charts/openclaw-skills
          helm:
            # Skip generated values files gracefully until the first skill
            # or identity save creates them. Supported since ArgoCD 2.6.
            ignoreMissingValueFiles: true
            valueFiles:
              # Platform-catalog skills first, tenant-authored file last:
              # tenant skills win Helm's per-key map merge on name collisions.
              - $values/{{ `{{ .path.path }}` }}/generated/platform-skills-values.yaml
              - $values/{{ `{{ .path.path }}` }}/generated/skills-values.yaml
            parameters:
              - name: team
                value: '{{`{{ index .path.segments 2 }}`}}'
        # Values (data) — points at this same repo so valueFiles above resolves.
        - repoURL: {{ .Values.spec.source.repoURL }}
          targetRevision: {{ .Values.spec.source.targetRevision }}
          ref: values
      destination:
        server: {{ .Values.spec.destination.server }}
        # Tenant namespace == team name (same convention as applicationset-apps).
        namespace: '{{`{{ index .path.segments 2 }}`}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ApplyOutOfSyncOnly=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
