apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
    - git:
        repoURL: {{ .Values.spec.source.repoURL }}
        revision: {{ .Values.spec.source.targetRevision }}
        requeueAfterSeconds: 30
        directories:
          - path: platform-gitops/services/*/*
          # FROZEN 2026-07-12: admins-openclaw is undergoing the mctl-openclaw#38
          # upstream sync (108-conflict merge touching gateway/auth code). Excluded
          # here so this ApplicationSet stops managing it; a standalone manual-sync-only
          # Application (application-admins-openclaw-frozen.yaml) takes over so deploys
          # require an explicit `argocd app sync admins-openclaw` instead of auto
          # prune+selfHeal. To unfreeze: delete both this exclude entry and the
          # standalone Application file, in the same PR, only after explicit
          # double-confirmation from the operator.
          - path: platform-gitops/services/admins/openclaw
            exclude: true
  template:
    metadata:
      name: '{{`{{ index .path.segments 2 }}-{{ index .path.segments 3 }}`}}'
      labels:
        env: apps
        team: '{{`{{ index .path.segments 2 }}`}}'
        backstage.io/kubernetes-id: '{{`{{ index .path.segments 3 }}`}}'
      annotations:
        backstage.io/kubernetes-id: '{{`{{ index .path.segments 3 }}`}}'
        argocd/app-name: '{{`{{ index .path.segments 2 }}-{{ index .path.segments 3 }}`}}'
    spec:
      project: apps
      sources:
        - repoURL: {{ .Values.spec.source.repoURL }}
          targetRevision: {{ .Values.spec.source.targetRevision }}
          # TODO: Support custom helm charts per service.
          # Currently all services use base-service. To support custom charts:
          # 1. Add chart to helm-charts/<chart-name>/
          # 2. Create a second ApplicationSet with git file generator that reads
          #    a "chart" field from each service's values.yaml
          # 3. Or use convention: if service dir contains Chart.yaml → use it as chart
          path: platform-gitops/helm-charts/base-service
          helm:
            valueFiles:
              - $values/{{ `{{ .path.path }}` }}/values.yaml
        - repoURL: {{ .Values.spec.source.repoURL }}
          targetRevision: {{ .Values.spec.source.targetRevision }}
          ref: values
      destination:
        server: {{ .Values.spec.destination.server }}
        namespace: '{{`{{ index .path.segments 2 }}`}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      ignoreDifferences:
        - kind: Secret
          name: ghcr-credentials
          jqPathExpressions:
            - .data
        # Mirror applicationset-tenants.yaml — ESO admission webhook injects
        # defaults absent in git, plus the legacy
        # `kubectl.kubernetes.io/last-applied-configuration` annotation can
        # pin a stale apiVersion across chart-version churn (2026-05-07
        # 0.10.x↔2.x roundtrip wedged ArgoCD on 41 ESs).
        # Note: .metadata.managedFields must NOT be listed here — with
        # RespectIgnoreDifferences=true + ServerSideApply, ArgoCD injects the
        # live object's cached managedFields into the SSA apply payload, which
        # the apiserver rejects ("metadata.managedFields must be nil"). That
        # wedges every spec.data change on a labs ExternalSecret (hit 2026-06-29
        # adding admin keys, 2026-06-30 adding PII_ENCRYPTION_KEY). The
        # stale-apiVersion churn above is handled by ignoring .metadata.annotations.
        - group: external-secrets.io
          kind: ExternalSecret
          jqPathExpressions:
            - .metadata.annotations
            - .spec.target.deletionPolicy
            - .spec.data[].remoteRef.conversionStrategy
            - .spec.data[].remoteRef.decodingStrategy
            - .spec.data[].remoteRef.metadataPolicy
            - .spec.dataFrom[].extract.conversionStrategy
            - .spec.dataFrom[].extract.decodingStrategy
            - .spec.dataFrom[].extract.metadataPolicy
            - .status
