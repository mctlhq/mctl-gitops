# FROZEN 2026-07-12: manual-sync-only stand-in for admins-openclaw while the
# mctl-openclaw#38 upstream sync (108-conflict merge touching gateway/auth code)
# is in flight. Mirrors exactly what applicationset-apps.yaml would generate for
# platform-gitops/services/admins/openclaw, EXCEPT syncPolicy has no `automated`
# block — ArgoCD will report OutOfSync on new commits/image tags but will NOT
# prune or self-heal automatically. Deploys require an explicit
# `argocd app sync admins-openclaw` (or UI Sync button) after operator confirmation.
#
# To unfreeze: delete this file AND the matching exclude entry in
# applicationset-apps.yaml, in the same PR, only after explicit double
# confirmation from the operator (not a single "yes, go ahead" — two separate
# confirmations, since lifting this gate re-enables prune+selfHeal for a
# service mid-way through a large, security-sensitive upstream merge).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admins-openclaw
  namespace: argocd
  labels:
    env: apps
    team: admins
    backstage.io/kubernetes-id: openclaw
  annotations:
    backstage.io/kubernetes-id: openclaw
    argocd/app-name: admins-openclaw
spec:
  project: apps
  sources:
    - repoURL: https://github.com/mctlhq/mctl-gitops.git
      targetRevision: main
      path: platform-gitops/helm-charts/base-service
      helm:
        valueFiles:
          - $values/platform-gitops/services/admins/openclaw/values.yaml
    - repoURL: https://github.com/mctlhq/mctl-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: admins
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - kind: Secret
      name: ghcr-credentials
      jqPathExpressions:
        - .data
    - group: external-secrets.io
      kind: ExternalSecret
      jqPathExpressions:
        - .metadata.annotations
        - .spec.target.deletionPolicy
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
        - .spec.dataFrom[].extract.conversionStrategy
        - .spec.dataFrom[].extract.decodingStrategy
        - .spec.dataFrom[].extract.metadataPolicy
        - .status
