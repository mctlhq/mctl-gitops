---
# ExternalSecret for MinIO root credentials in the minio namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-root-credentials
  namespace: minio
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: minio-root-credentials
    creationPolicy: Owner
  data:
    - secretKey: rootUser
      remoteRef:
        key: teams/platform/minio
        property: root-user
    - secretKey: rootPassword
      remoteRef:
        key: teams/platform/minio
        property: root-password
