# SSO RBAC: team mcp-smoke-cb2xm2 — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-mcp-smoke-cb2xm2
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'mcp-smoke-cb2xm2' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-mcp-smoke-cb2xm2.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-mcp-smoke-cb2xm2
type: kubernetes.io/service-account-token
