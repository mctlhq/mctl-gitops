# SSO RBAC: team team-spirt — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-team-spirt
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'team-spirt' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-team-spirt.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-team-spirt
type: kubernetes.io/service-account-token
