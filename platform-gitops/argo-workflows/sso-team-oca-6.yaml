# SSO RBAC: team oca-6 — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-oca-6
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'oca-6' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-oca-6.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-oca-6
type: kubernetes.io/service-account-token
