# SSO RBAC: team admins — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-admins
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'admins' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-admins.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-admins
type: kubernetes.io/service-account-token
