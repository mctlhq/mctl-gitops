# SSO RBAC: team xxxx — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-xxxx
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'xxxx' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-xxxx.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-xxxx
type: kubernetes.io/service-account-token
