# SSO RBAC: team mctl-internals — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-mctl-internals
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'mctl-internals' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-mctl-internals.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-mctl-internals
type: kubernetes.io/service-account-token
