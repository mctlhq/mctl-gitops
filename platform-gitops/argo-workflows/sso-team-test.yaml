# SSO RBAC: team test — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-test
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'test' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-test.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-test
type: kubernetes.io/service-account-token
