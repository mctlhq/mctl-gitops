# SSO RBAC: team viewer — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-viewer
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'viewer' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-viewer.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-viewer
type: kubernetes.io/service-account-token
