apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow-sa
  namespace: argo-workflows
---
# SSO RBAC: admin access for mctlhq:admin GitHub team members
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflows-admin
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'mctlhq:admin' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "1"
---
# Kubernetes 1.24+ requires explicit SA token secret creation
apiVersion: v1
kind: Secret
metadata:
  name: argo-workflows-admin.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: argo-workflows-admin
type: kubernetes.io/service-account-token
metadata:
  name: argo-workflows-admin-sso
subjects:
  - kind: ServiceAccount
    name: argo-workflows-admin
    namespace: argo-workflows
roleRef:
  kind: ClusterRole
  name: argo-workflows-admin
  apiGroup: rbac.authorization.k8s.io
---
# Allow workflow SA to create workflows (needed for resubmit/retry)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-runner
  namespace: argo-workflows
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtaskresults"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-runner
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: argo-workflow-sa
    namespace: argo-workflows
roleRef:
  kind: Role
  name: argo-workflow-runner
  apiGroup: rbac.authorization.k8s.io
