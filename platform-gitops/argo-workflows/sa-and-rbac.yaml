apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow-sa
  namespace: argo-workflows
---
# SSO RBAC: admin access for admins group (Backstage OIDC)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflows-admin
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'admins' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "1"
---
# SSO RBAC: default read-only access for any authenticated user
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-default
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "true"
    workflows.argoproj.io/rbac-rule-precedence: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sso-default-admin
subjects:
  - kind: ServiceAccount
    name: sso-default
    namespace: argo-workflows
roleRef:
  kind: ClusterRole
  name: argo-workflows-admin
  apiGroup: rbac.authorization.k8s.io
---
# Kubernetes 1.24+ requires explicit SA token secret creation
apiVersion: v1
kind: Secret
metadata:
  name: sso-default.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-default
type: kubernetes.io/service-account-token
---
# Kubernetes 1.24+ requires explicit SA token secret creation
apiVersion: v1
kind: Secret
metadata:
  name: argo-workflows-admin.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: argo-workflows-admin
type: kubernetes.io/service-account-token
---
# Bind argo-workflows-admin SA to the argo-workflows-admin ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-workflows-admin-sso
subjects:
  - kind: ServiceAccount
    name: argo-workflows-admin
    namespace: argo-workflows
roleRef:
  kind: ClusterRole
  name: argo-workflows-admin
  apiGroup: rbac.authorization.k8s.io
---
# Allow workflow SA to create workflows (needed for resubmit/retry)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-runner
  namespace: argo-workflows
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtaskresults"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
# Allow smoke-test workflow steps to verify deployments, pods, secrets, and
# ExternalSecrets in tenant namespaces (kubectl wait, rollout status, exec, get secret)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-workflow-smoke-verify
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-workflow-smoke-verify
subjects:
  - kind: ServiceAccount
    name: argo-workflow-sa
    namespace: argo-workflows
roleRef:
  kind: ClusterRole
  name: argo-workflow-smoke-verify
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-runner
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: argo-workflow-sa
    namespace: argo-workflows
roleRef:
  kind: Role
  name: argo-workflow-runner
  apiGroup: rbac.authorization.k8s.io
