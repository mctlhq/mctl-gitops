# SSO RBAC: team xxx — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-xxx
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'xxx' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-xxx.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-xxx
type: kubernetes.io/service-account-token
