# SSO RBAC: team oh-lala — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-oh-lala
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'oh-lala' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-oh-lala.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-oh-lala
type: kubernetes.io/service-account-token
