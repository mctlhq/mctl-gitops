# SSO RBAC: team nfc2026 — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-nfc2026
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'nfc2026' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-nfc2026.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-nfc2026
type: kubernetes.io/service-account-token
