# SSO RBAC: team my-team — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-my-team
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'my-team' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-my-team.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-my-team
type: kubernetes.io/service-account-token
