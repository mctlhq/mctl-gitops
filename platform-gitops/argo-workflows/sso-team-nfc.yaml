# SSO RBAC: team nfc — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-nfc
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'nfc' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-nfc.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-nfc
type: kubernetes.io/service-account-token
