# SSO RBAC: team ovk — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-ovk
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'ovk' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-ovk.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-ovk
type: kubernetes.io/service-account-token
