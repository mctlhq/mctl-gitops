# SSO RBAC: team tests — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-tests
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'tests' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-tests.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-tests
type: kubernetes.io/service-account-token
