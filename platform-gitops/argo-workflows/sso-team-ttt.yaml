# SSO RBAC: team ttt — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-ttt
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'ttt' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-ttt.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-ttt
type: kubernetes.io/service-account-token
