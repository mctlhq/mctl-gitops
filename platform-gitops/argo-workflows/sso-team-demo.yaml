# SSO RBAC: team demo — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-demo
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'demo' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-demo.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-demo
type: kubernetes.io/service-account-token
