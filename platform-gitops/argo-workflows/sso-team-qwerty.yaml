# SSO RBAC: team qwerty — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-qwerty
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'qwerty' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-qwerty.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-qwerty
type: kubernetes.io/service-account-token
