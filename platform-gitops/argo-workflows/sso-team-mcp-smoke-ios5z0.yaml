# SSO RBAC: team mcp-smoke-ios5z0 — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-mcp-smoke-ios5z0
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'mcp-smoke-ios5z0' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-mcp-smoke-ios5z0.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-mcp-smoke-ios5z0
type: kubernetes.io/service-account-token
