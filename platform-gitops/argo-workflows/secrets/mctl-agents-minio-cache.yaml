---
# ExternalSecret for the Tier 2 implementer's Go module/build cache.
#
# Same Vault path and keys as the per-tenant `minio-cache-creds` secrets
# (platform-gitops/services/{labs,admins,ovk}/openclaw/values.yaml) — those
# are root MinIO credentials synced into each tenant namespace for the
# whisper-cli build cache pattern. This ExternalSecret syncs the SAME
# credentials into argo-workflows so cwft-mctl-agents-implement.yaml's
# restore-go-cache / save-go-cache steps can read/write the shared
# `platform-cache` bucket (see platform-gitops/bootstrap/templates/data/minio.yaml
# for the bucket declaration).
#
# Vault path: secret/platform/minio (already exists — no seeding needed).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-cache-creds
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: minio-cache-creds
    creationPolicy: Owner
  data:
    - secretKey: access-key
      remoteRef:
        key: platform/minio
        property: root-user
    - secretKey: secret-key
      remoteRef:
        key: platform/minio
        property: root-password
