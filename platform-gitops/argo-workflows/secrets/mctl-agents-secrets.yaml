---
# ExternalSecret for mctl-agents CronWorkflow runtime credentials.
# Read by the workflow pod via secretKeyRef in cwft-mctl-agents-daily.yaml.
#
# Auth: Claude Pro/Max OAuth (NOT Console API key) — runs within owner's
# subscription quotas, no separate billing. See plan §4.3 for tradeoffs +
# fallback procedure to API key if OAuth ever breaks.
#
# Vault paths:
#   - secret/platform/mctl-agents          (this workflow's own keys)
#   - secret/platform/mctl-agent/tokens    (shared bot identity — github-token)
#
# Keys (all optional individually — workflow degrades gracefully):
#   - claude-code-oauth-token  → CLAUDE_CODE_OAUTH_TOKEN (sk-ant-oat01-...)
#                                REQUIRED at runtime — workflow can't auth without it.
#                                Marked non-optional in the CronWorkflow secretKeyRef.
#   - mctl-token               → MCTL_TOKEN (Bearer for api.mctl.ai/mcp)
#                                Optional — without it the agents skip mcp__mctl__*
#                                tools and rely on WebSearch/WebFetch only.
#   - github-token             → GITHUB_TOKEN (PAT with repo scope on mctlhq/*)
#                                REQUIRED for the Tier 2 implementer step
#                                (`gh repo clone` + `gh pr create` against
#                                private mctlhq sibling repos). Pulled from
#                                the same Vault path as mctl-agent's bot
#                                identity so we keep one canonical token —
#                                rotating mctl-agent's token automatically
#                                rotates the implementer's too.
#
# `dataFrom: extract` pulls whatever subset of keys exists at
# platform/mctl-agents (claude-oauth, mctl-token). The explicit `data:`
# block below pulls github-token from the bot-identity path; ESO's default
# mergePolicy (Replace) means data: entries override anything dataFrom:
# might pull with the same secretKey, so we cannot accidentally pick up
# a stale local copy of github-token if one ever lands at platform/mctl-agents.
#
# Seed via:
#   claude setup-token   # local; copy printed token
#   vault kv put secret/platform/mctl-agents \
#     claude-code-oauth-token=sk-ant-oat01-...
#   # later, optionally:
#   vault kv patch secret/platform/mctl-agents mctl-token=...
#
# If owner's claude.ai session is invalidated → token dies → workflow fails →
# re-run setup-token + re-seed Vault. Consider adding a smoke alert on the
# CronWorkflow's last-success age (>48h = investigate).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mctl-agents-secrets
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: mctl-agents-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: platform/mctl-agents
  data:
    - secretKey: github-token
      remoteRef:
        key: platform/mctl-agent/tokens
        property: github-token
