---
# GHCR pull credentials for mctl-agents image (private repo).
# Mirrors the per-tenant pattern from
# bootstrap/templates/mctl-platform/mctl-agent-secrets.yaml — same Vault
# key, same docker-config-json shape, same target name. Lets argo-workflows
# pods pull ghcr.io/mctlhq/mctl-agents:* (and any other private mctlhq image).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mctl-agents-ghcr
  namespace: argo-workflows
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: ghcr-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      metadata:
        annotations:
          argocd.argoproj.io/compare-options: IgnoreExtraneous
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: platform/backstage/ghcr-credentials
        property: dockerconfigjson
