# GHCR push credentials for Kaniko builds
# Kaniko needs docker config to push images to ghcr.io/mctlhq/
#
# Create this secret manually or via ExternalSecret:
#   kubectl create secret generic ghcr-push-credentials \
#     --namespace=argo-workflows \
#     --from-file=config.json=/path/to/docker-config.json
#
# docker-config.json format:
# {
#   "auths": {
#     "ghcr.io": {
#       "auth": "<base64(username:PAT)>"
#     }
#   }
# }

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-push-credentials
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: ghcr-push-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        config.json: |
          {"auths":{"ghcr.io":{"auth":"{{ .token }}"}}}
  data:
    - secretKey: token
      remoteRef:
        key: platform/argo-workflows/ghcr
        property: auth-token

---
# GitHub App credentials for cloning private repos and pushing to mctl-core
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-app-credentials
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: github-app-credentials
    creationPolicy: Owner
  data:
    - secretKey: app-id
      remoteRef:
        key: platform/github-app
        property: app-id
    - secretKey: private-key
      remoteRef:
        key: platform/github-app
        property: private-key
    - secretKey: installation-id
      remoteRef:
        key: platform/github-app
        property: installation-id
