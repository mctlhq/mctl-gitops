# SSO RBAC: team mashkoffdmitry — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-mashkoffdmitry
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'mashkoffdmitry' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-mashkoffdmitry.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-mashkoffdmitry
type: kubernetes.io/service-account-token
