# SSO RBAC: team www — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-www
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'www' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-www.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-www
type: kubernetes.io/service-account-token
