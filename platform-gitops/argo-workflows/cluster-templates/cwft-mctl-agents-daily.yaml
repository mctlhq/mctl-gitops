apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: mctl-agents-daily
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: |
      Daily 06:00 UTC trigger for the full mctl-agents pipeline.

      All workflow logic now lives in ClusterWorkflowTemplate
      `mctl-agents-run` (cwft-mctl-agents-run.yaml). This CronWorkflow is
      a thin wrapper that submits a Workflow with mode=full once per day.

      Other entry points reference the same template with different
      parameters:
        - mctl-api MCP tool mctl_trigger_mentor_only      → mode=mentor-only
        - mctl-api MCP tool mctl_trigger_single_service   → mode=single-service, service=<name>
        - mctl-api MCP tool mctl_trigger_agents_run       → mode=full (same as this cron, on demand)
spec:
  schedule: "0 6 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  # 14d / 7d retention — same rationale as
  # cronworkflow-mctl-agents-shepherd.yaml. With the 06:00 UTC daily
  # cadence, default 3 covered only ~3 days, which masked actual
  # cron firing during the ESO incident triage window.
  successfulJobsHistoryLimit: 14
  failedJobsHistoryLimit: 7
  workflowSpec:
    workflowTemplateRef:
      name: mctl-agents-run
      clusterScope: true
    arguments:
      parameters:
        - name: mode
          value: "full"
        - name: service
          value: ""
