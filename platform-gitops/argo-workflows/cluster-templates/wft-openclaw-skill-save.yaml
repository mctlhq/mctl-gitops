apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: openclaw-skill-save
  annotations:
    workflows.argoproj.io/description: |
      Save a single OpenClaw SKILL.md file to the gitops repo as a durable backup.

      Writes to platform-gitops/services/{team}/openclaw/skills/{skill_name}.md.
      Overwrites an existing file if present. Commits as argo-workflows[bot] with
      the triggering user's ID recorded in the commit message (actor).

      Input validation of team/skill_name and content size is performed in
      mctl-api before this workflow is submitted; the workflow re-validates
      the path as a defense-in-depth check.
spec:
  entrypoint: save-skill
  serviceAccountName: argo-workflow-sa

  arguments:
    parameters:
      - name: team_name
      - name: skill_name
      - name: content_b64
      - name: actor
        value: "unknown"

  templates:
    - name: save-skill
      inputs:
        parameters:
          - name: team_name
          - name: skill_name
          - name: content_b64
          - name: actor
      script:
        image: alpine:3.19
        command: [sh]
        # Parameters are passed as env vars so the container runtime injects
        # them as opaque values, instead of substituting them into the shell
        # source where shell parsing could execute $(…), ``…``, or escape
        # quotes before our regex validation runs.
        env:
          - name: TEAM
            value: "{{inputs.parameters.team_name}}"
          - name: SKILL
            value: "{{inputs.parameters.skill_name}}"
          - name: CONTENT_B64
            value: "{{inputs.parameters.content_b64}}"
          - name: ACTOR
            value: "{{inputs.parameters.actor}}"
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        source: |
          set -e

          # ── Validate names (defense-in-depth; mctl-api validates first) ────
          if ! printf '%s' "$TEAM" | grep -Eq '^[a-z0-9][a-z0-9-]{0,61}[a-z0-9]$'; then
            echo "❌ Invalid team name: $TEAM"
            exit 1
          fi
          if ! printf '%s' "$SKILL" | grep -Eq '^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$'; then
            echo "❌ Invalid skill name: $SKILL"
            exit 1
          fi

          # Strip newlines / control chars from actor so the commit trailer
          # can't be forged with extra lines.
          SAFE_ACTOR=$(printf '%s' "$ACTOR" | tr -d '\r\n' | tr -d '[:cntrl:]')
          [ -z "$SAFE_ACTOR" ] && SAFE_ACTOR="unknown"

          apk add --no-cache git openssh-client ca-certificates > /dev/null

          # ── Set up SSH ────────────────────────────────────────────────────
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          # ── Clone gitops repo ─────────────────────────────────────────────
          git clone --depth=1 "git@github.com:${GITOPS_ORG}/${GITOPS_REPO}.git" /tmp/mctl-gitops
          cd /tmp/mctl-gitops
          git config user.name "argo-workflows[bot]"
          git config user.email "argo-workflows[bot]@users.noreply.github.com"

          DIR="platform-gitops/services/${TEAM}/openclaw/skills"
          FILE="${DIR}/${SKILL}.md"

          # ── Path containment check ───────────────────────────────────────
          case "$FILE" in
            platform-gitops/services/${TEAM}/openclaw/skills/*.md) : ;;
            *)
              echo "❌ Security: computed path $FILE is outside the allowed scope"
              exit 1
              ;;
          esac
          case "$FILE" in
            *..*)
              echo "❌ Security: path traversal detected in $FILE"
              exit 1
              ;;
          esac

          mkdir -p "$DIR"

          # ── Decode content and write file ────────────────────────────────
          if [ -z "$CONTENT_B64" ]; then
            echo "❌ Empty content_b64"
            exit 1
          fi
          printf '%s' "$CONTENT_B64" | base64 -d > "$FILE"
          SIZE=$(wc -c < "$FILE")
          echo "✅ Wrote $FILE ($SIZE bytes)"

          # ── Commit ───────────────────────────────────────────────────────
          git add "$FILE"
          if git diff --cached --quiet; then
            echo "ℹ️  No changes — file unchanged on main"
            exit 0
          fi
          git commit \
            -m "feat(${TEAM}/openclaw): save skill ${SKILL}" \
            -m "Triggered by: ${SAFE_ACTOR}"

          # ── Push with rebase retry ───────────────────────────────────────
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ Pushed skill ${SKILL} for ${TEAM}"
              break
            fi
            if [ "$i" -lt 5 ]; then
              echo "⚠️  Push failed (attempt $i), rebasing..."
              git pull --rebase origin main
            else
              echo "❌ Push failed after 5 attempts"
              exit 1
            fi
          done
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key
