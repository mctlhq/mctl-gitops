apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: labs-watch-scan
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: |
      Every-30-minute autonomous CoinGlass watchlist scanner for the
      labs-openclaw eth-trading-intel skill. Reads the chat-driven
      watchlist from S3 (s3://platform-state/labs/openclaw/workspace/
      state/eth-trading-intel.json) read-only, runs a simplified
      4-signal score per symbol against the per-entry threshold +
      direction filter, posts a Telegram alert if crossed AND the
      last alert for that symbol was more than 4h ago.

      This closes the cron-gap of the openclaw runtime (which is
      stateless message-driven and cannot self-schedule). The
      simplified scoring is deliberately a coarser pre-filter than
      the chat skill's full 10-step pipeline — alerts say "wake up,
      run /eth SYMBOL for full analysis", they are not the final
      signal.

      Tier note: currently CoinGlass HOBBYIST. All MCP calls use
      4h interval; STANDARD-only tools (coins_markets, max_pain,
      whale_positions) are not used. When tier is upgraded the
      simplified scoring can be expanded; chat skill stays the
      source of truth for full directional rubric.

      State separation:
        - s3://platform-state/labs/openclaw/workspace/state/eth-trading-intel.json
          (chat-driven, written by skill via Bash) — READ-ONLY for cron.
          Lives inside the s3-sync mirror prefix (labs/openclaw/...).
        - s3://platform-state/labs/cron/eth-trading-intel-alerts.json
          (cron-only, dedup state) — written by cron only.
          Lives OUTSIDE the s3-sync mirror prefix on purpose: the
          openclaw s3-sync sidecar runs `mc mirror --remove --overwrite
          /home/node/.openclaw s3/platform-state/labs/openclaw/` every
          10s, which would clobber any cron-written file inside that
          prefix because it's not in the pod's local .openclaw mirror.
          A sibling labs/cron/ prefix is untouched by that mirror.

      Concurrency: per-tenant mutex prevents two overlapping ticks
      double-firing alerts. Cron does NOT contend on
      mctl-gitops-main-writes (writes nothing to gitops main).
spec:
  schedule: "*/30 * * * *"
  timezone: "UTC"
  # Forbid: never run two scans in parallel — both would hit the
  # same alerts state file in S3 and could double-send Telegram
  # alerts. If a tick takes longer than 30 min something is wrong;
  # let it complete cleanly before the next one.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  # Counts, NOT days. With a `*/30` cron (48 ticks/day) 144 ≈ 3 days
  # of triage history and 72 ≈ 1.5 days of failures. Default 3
  # covered only 90 min, useless for any retroactive look. Same
  # cadence math as cronworkflow-mctl-agents-shepherd.yaml.
  successfulJobsHistoryLimit: 144
  failedJobsHistoryLimit: 72
  # Active. Monitoring threshold cadence is 30 min; dedup window 4h
  # per symbol prevents alert spam.
  suspend: false
  workflowSpec:
    serviceAccountName: argo-workflow-sa
    ttlStrategy:
      # 3d retention — must outlive the successfulJobsHistoryLimit (144)
      # at the `*/30` cadence (48 ticks/d). Explicit value also avoids
      # the Argo v3.7.10 archive-worker NULL-nodes wedge
      # (ref: reference_argo_archive_bug). Bumped from 86400 to 259200
      # for Codex P1 on PR #147 — without this the 3-day history goal
      # was unreachable because Argo would prune at 24h regardless.
      secondsAfterCompletion: 259200
    # Per-tenant mutex on the alerts state file. Not the shared
    # mctl-gitops-main-writes because we don't push to gitops.
    synchronization:
      mutex:
        name: labs-watch-scan-coinglass-pull
    entrypoint: scan
    onExit: notify-on-failure
    templates:
      - name: scan
        script:
          image: python:3.12-alpine
          command: [sh]
          source: |
            set -e
            pip install boto3 --quiet

            python3 - << 'PYEOF'
            import os, sys, json, urllib.request, urllib.error
            from datetime import datetime, timezone, timedelta

            VAULT_ADDR = os.environ["VAULT_ADDR"]
            MINIO_ENDPOINT = os.environ["MINIO_ENDPOINT"]
            MINIO_BUCKET = "platform-state"
            STATE_KEY = "labs/openclaw/workspace/state/eth-trading-intel.json"
            # Outside the openclaw s3-sync mirror prefix (labs/openclaw/...)
            # to survive the every-10s `mc mirror --remove --overwrite` sweep
            # done by the s3-sync sidecar. See workflow-level annotation for
            # the full rationale and the empirical bug that surfaced this.
            ALERTS_KEY = "labs/cron/eth-trading-intel-alerts.json"
            COINGLASS_MCP_URL = "https://api-mcp.coinglass.com/mcp"
            TELEGRAM_API = "https://api.telegram.org"
            DEDUP_HOURS = 4
            # Telegram chat IDs to receive cron alerts. Must mirror the openclaw
            # tenant's `channels.telegram.allowFrom` list in
            # platform-gitops/services/labs/openclaw/values.yaml — these are the
            # only operators trusted to chat with the bot, so they are also the
            # ones who should see autonomous alerts. If allowFrom changes there,
            # update this list too.
            ALERT_CHAT_IDS = ["210408407", "103413580"]

            def vault_token():
                with open("/var/run/secrets/kubernetes.io/serviceaccount/token") as f:
                    sa_token = f.read().strip()
                resp = urllib.request.urlopen(urllib.request.Request(
                    f"{VAULT_ADDR}/v1/auth/kubernetes/login",
                    data=json.dumps({"role": "argo-workflow", "jwt": sa_token}).encode(),
                    headers={"Content-Type": "application/json"},
                    method="POST",
                ))
                return json.loads(resp.read())["auth"]["client_token"]

            def vault_read(token, path):
                req = urllib.request.Request(
                    f"{VAULT_ADDR}/v1/{path}",
                    headers={"X-Vault-Token": token},
                )
                return json.loads(urllib.request.urlopen(req).read())["data"]["data"]

            print(f"[{datetime.now(timezone.utc).isoformat()}] labs-watch-scan starting")
            vt = vault_token()
            print("✅ Vault authenticated")

            cg_api_key = vault_read(vt, "secret/data/teams/labs/openclaw/coinglass")["api_key"]
            tg_token = vault_read(vt, "secret/data/teams/labs/openclaw/telegram")["telegram-bot-token"]
            minio_creds = vault_read(vt, "secret/data/platform/minio")
            print("✅ Secrets loaded")

            # ── MinIO client (S3-compatible) ──────────────────────────────────
            import boto3
            from botocore.config import Config
            s3 = boto3.client(
                "s3",
                endpoint_url=MINIO_ENDPOINT,
                aws_access_key_id=minio_creds["root-user"],
                aws_secret_access_key=minio_creds["root-password"],
                config=Config(signature_version="s3v4"),
                region_name="us-east-1",
            )

            # ── Read chat-driven watchlist (read-only) ────────────────────────
            try:
                obj = s3.get_object(Bucket=MINIO_BUCKET, Key=STATE_KEY)
                state = json.loads(obj["Body"].read())
            except s3.exceptions.NoSuchKey:
                print(f"⚠️  No state file at s3://{MINIO_BUCKET}/{STATE_KEY} — nothing to scan, exiting cleanly")
                sys.exit(0)

            global_threshold = int(state.get("threshold", 70))
            raw_watchlist = state.get("watchlist", [])

            # Migration shim — cron tolerates both schema 1 (string entries) and schema 2 (object entries).
            # Cron does NOT write back to chat state file; the migration result lives only in this run.
            watchlist = []
            for entry in raw_watchlist:
                if isinstance(entry, str):
                    sym = entry.strip().upper()
                    if sym:
                        watchlist.append({
                            "symbol": sym,
                            "threshold": global_threshold,
                            "direction": "both",
                        })
                elif isinstance(entry, dict) and entry.get("symbol"):
                    sym = str(entry["symbol"]).strip().upper()
                    thr = entry.get("threshold")
                    try:
                        thr = int(thr) if thr is not None else global_threshold
                    except (TypeError, ValueError):
                        thr = global_threshold
                    if not (50 <= thr <= 95):
                        thr = global_threshold
                    direction = entry.get("direction", "both")
                    if direction not in ("long", "short", "both"):
                        direction = "both"
                    watchlist.append({"symbol": sym, "threshold": thr, "direction": direction})
                # malformed entries silently skipped — chat skill owns repair

            if not watchlist:
                print("⚠️  Watchlist empty after parsing; exiting cleanly")
                sys.exit(0)

            print(f"✅ Watchlist: {[(e['symbol'], e['threshold'], e['direction']) for e in watchlist]}")

            # ── Read alerts state (dedup) ─────────────────────────────────────
            try:
                obj = s3.get_object(Bucket=MINIO_BUCKET, Key=ALERTS_KEY)
                alerts_state = json.loads(obj["Body"].read())
            except s3.exceptions.NoSuchKey:
                alerts_state = {"last_alert_at": {}}

            last_alert_at = alerts_state.setdefault("last_alert_at", {})

            # ── CoinGlass MCP helpers (streamable-HTTP via direct POST) ───────
            mcp_session_id = None
            mcp_protocol = "2025-06-18"

            # Monotonic JSON-RPC request id. JSON-RPC + the MCP spec require
            # ids to be unique within a session — strict servers reject or
            # mis-correlate calls that reuse `id`. Counter wraps via plain
            # int increment; one cron tick issues at most ~3 calls per
            # symbol × N symbols, well under any practical bound.
            _mcp_id_counter = [0]

            def _next_request_id():
                _mcp_id_counter[0] += 1
                return _mcp_id_counter[0]

            def mcp_request(method, params=None):
                global mcp_session_id
                request_id = _next_request_id()
                body = json.dumps({
                    "jsonrpc": "2.0",
                    "id": request_id,
                    "method": method,
                    "params": params or {},
                }).encode()
                headers = {
                    "Content-Type": "application/json",
                    "Accept": "application/json, text/event-stream",
                    "CG-API-KEY": cg_api_key,
                }
                if mcp_session_id:
                    headers["Mcp-Session-Id"] = mcp_session_id
                    headers["Mcp-Protocol-Version"] = mcp_protocol
                req = urllib.request.Request(COINGLASS_MCP_URL, data=body, headers=headers, method="POST")
                try:
                    resp = urllib.request.urlopen(req, timeout=30)
                except urllib.error.HTTPError as e:
                    raw = e.read().decode("utf-8", "replace")
                    return {"_http_error": e.code, "_body": raw}
                except urllib.error.URLError as e:
                    return {"_http_error": "URLError", "_body": str(e.reason)}
                sid = resp.headers.get("Mcp-Session-Id")
                if sid and not mcp_session_id:
                    mcp_session_id = sid
                ct = resp.headers.get("Content-Type", "")
                raw = resp.read().decode("utf-8", "replace")
                if "text/event-stream" in ct:
                    # MCP streamable-HTTP servers may emit server-initiated
                    # notifications/requests in SSE frames *before* the
                    # response to our request. Iterate every data: frame,
                    # parse JSON, and return the first one whose id matches
                    # our request_id. If we exhaust the stream without a
                    # matching id, return the last parseable frame as a
                    # fallback (still better than silently dropping all
                    # frames), or _sse_empty if nothing parsed.
                    last_parsed = None
                    for line in raw.splitlines():
                        if not line.startswith("data:"):
                            continue
                        payload = line[len("data:"):].strip()
                        if not payload:
                            continue
                        try:
                            frame = json.loads(payload)
                        except json.JSONDecodeError:
                            continue
                        last_parsed = frame
                        if isinstance(frame, dict) and frame.get("id") == request_id:
                            return frame
                    if last_parsed is not None:
                        return last_parsed
                    return {"_sse_empty": True, "_body": raw}
                if not raw.strip():
                    return {"_empty": True}
                return json.loads(raw)

            def mcp_tool_call(name, arguments):
                resp = mcp_request("tools/call", {"name": name, "arguments": arguments})
                if "_http_error" in resp:
                    return None, f"HTTP {resp['_http_error']}: {resp['_body'][:200]}"
                if "result" not in resp:
                    return None, f"Bad response: {json.dumps(resp)[:200]}"
                # CoinGlass returns content array with text JSON
                content = resp["result"].get("content", [])
                if not content:
                    return None, "Empty content"
                text = content[0].get("text", "")
                try:
                    payload = json.loads(text)
                except json.JSONDecodeError:
                    return None, f"Non-JSON content: {text[:200]}"
                if isinstance(payload, dict) and payload.get("code") not in (None, "0", 0):
                    return None, f"CoinGlass error code {payload.get('code')}: {payload.get('msg', '')}"
                return payload.get("data") if isinstance(payload, dict) else payload, None

            def mcp_notify(method, params=None):
                """Fire-and-forget JSON-RPC notification (no id field, no response parsing).

                Required by MCP lifecycle: after initialize, the client must send
                notifications/initialized before any normal request, or strict servers
                may refuse tools/call (and silently miss alerts).
                """
                body = json.dumps({
                    "jsonrpc": "2.0",
                    "method": method,
                    "params": params or {},
                }).encode()
                headers = {
                    "Content-Type": "application/json",
                    "Accept": "application/json, text/event-stream",
                    "CG-API-KEY": cg_api_key,
                }
                if mcp_session_id:
                    headers["Mcp-Session-Id"] = mcp_session_id
                    headers["Mcp-Protocol-Version"] = mcp_protocol
                req = urllib.request.Request(COINGLASS_MCP_URL, data=body, headers=headers, method="POST")
                try:
                    # Notifications return 202 Accepted with no body; consume and discard.
                    urllib.request.urlopen(req, timeout=15).read()
                except urllib.error.HTTPError as e:
                    # 4xx on a notification is non-fatal (server may not require it),
                    # but log so spec-strictness regressions are visible.
                    print(f"⚠️  notification {method} returned HTTP {e.code}; continuing")
                except urllib.error.URLError as e:
                    # Network blip on a fire-and-forget notification must not abort
                    # the whole cron run — later tools/call requests may still succeed
                    # (or be handled per-symbol). Log and proceed.
                    print(f"⚠️  notification {method} URLError: {e.reason}; continuing")

            # MCP initialize handshake. Three steps per spec:
            #   1. Client → request initialize
            #   2. Server → response with capabilities
            #   3. Client → notifications/initialized (fire-and-forget, no id)
            # Strict servers (and the MCP spec) require step 3 before tools/call.
            # The CoinGlass server has historically been lenient about steps 1-2
            # (initialize occasionally 401s while tools/call with the same header
            # succeeds), but step 3 is cheap insurance and matches the lifecycle
            # the openclaw bundle-mcp client performs through the stdio bridge.
            init_resp = mcp_request("initialize", {
                "protocolVersion": mcp_protocol,
                "capabilities": {},
                "clientInfo": {"name": "labs-watch-scan", "version": "1.0.0"},
            })
            if "result" not in init_resp and "_http_error" not in init_resp:
                print(f"⚠️  initialize response: {json.dumps(init_resp)[:200]}")
            else:
                print("✅ MCP initialized")

            mcp_notify("notifications/initialized")
            print("✅ initialized notification sent")

            # ── Local indicators (Bybit V5 + Binance public REST) ────────────
            # Public, no auth, no CoinGlass tier gate. Used to add the 5th
            # scoring signal (RSI extreme) and to populate cvd_24h in the
            # snapshot — both were "tier-locked" on HOBBYIST.
            #
            # Each helper returns (value, err_str). On any HTTP/parse error
            # the caller appends to `missing` and the scoring rule guarded
            # by that input simply does not fire (fail-soft, never abort).
            BYBIT_BASE = "https://api.bybit.com"
            BINANCE_BASE = "https://api.binance.com"

            def public_get_json(url, timeout=10):
                req = urllib.request.Request(
                    url,
                    headers={"User-Agent": "labs-watch-scan/1.0"},
                )
                try:
                    resp = urllib.request.urlopen(req, timeout=timeout)
                except urllib.error.HTTPError as e:
                    return None, f"HTTP {e.code}"
                except urllib.error.URLError as e:
                    return None, f"URLError: {e.reason}"
                try:
                    return json.loads(resp.read().decode("utf-8", "replace")), None
                except json.JSONDecodeError as e:
                    return None, f"JSON decode: {e}"

            def bybit_kline_closes(symbol_pair, interval, limit=200):
                """Bybit V5 linear kline → list of close prices, oldest-first.
                interval values: "15", "60", "240", "720", "D"."""
                url = (
                    f"{BYBIT_BASE}/v5/market/kline"
                    f"?category=linear&symbol={symbol_pair}"
                    f"&interval={interval}&limit={limit}"
                )
                data, err = public_get_json(url)
                if err:
                    return None, err
                rows = data.get("result", {}).get("list") or []
                if not rows:
                    return None, "empty kline"
                # Bybit returns newest-first; reverse to oldest-first
                try:
                    return [float(r[4]) for r in rows[::-1]], None
                except (TypeError, ValueError, IndexError) as e:
                    return None, f"parse: {e}"

            def binance_taker_buy_24h(symbol_pair):
                """6 × 4h klines = 24h taker_buy delta in quote (≈ USD).
                Binance kline indices: 4=close, 5=volume_base, 9=taker_buy_base.
                Per candle: delta_quote ≈ (2*taker_buy - volume) * close.
                Returns (delta_usd, err) — sign indicates net buyers vs sellers."""
                url = (
                    f"{BINANCE_BASE}/api/v3/klines"
                    f"?symbol={symbol_pair}&interval=4h&limit=6"
                )
                data, err = public_get_json(url)
                if err:
                    return None, err
                if not isinstance(data, list) or not data:
                    return None, "empty klines"
                try:
                    total = 0.0
                    for r in data:
                        close = float(r[4])
                        vol_base = float(r[5])
                        tb_base = float(r[9])
                        total += (2.0 * tb_base - vol_base) * close
                    return total, None
                except (TypeError, ValueError, IndexError) as e:
                    return None, f"parse: {e}"

            def rsi_wilder(closes, period=14):
                """Last RSI value using Wilder's smoothing. Needs ≥ period+1 closes."""
                if not closes or len(closes) < period + 1:
                    return None
                gains = []
                losses = []
                for i in range(1, len(closes)):
                    diff = closes[i] - closes[i - 1]
                    gains.append(max(diff, 0.0))
                    losses.append(max(-diff, 0.0))
                avg_g = sum(gains[:period]) / period
                avg_l = sum(losses[:period]) / period
                for i in range(period, len(gains)):
                    avg_g = (avg_g * (period - 1) + gains[i]) / period
                    avg_l = (avg_l * (period - 1) + losses[i]) / period
                # Flat window (no up- or down-moves) is neutral, not extreme.
                # Returning 100 here would let the cron's RSI > 70 short
                # branch fire on a low-volatility symbol with all closes
                # equal. Order matters: check both-zero before only-loss-zero.
                if avg_g == 0 and avg_l == 0:
                    return 50.0
                if avg_l == 0:
                    return 100.0
                rs = avg_g / avg_l
                return 100.0 - (100.0 / (1.0 + rs))

            # ── Scoring: 5 binary signals × 20 (HOBBYIST-friendly) ────────────
            # Inputs (4h interval throughout, signals 1–4 from CoinGlass MCP,
            # signal 5 from public Bybit kline):
            #   1. funding direction (long_proxy: funding < 0; short_proxy: funding > 0.03)
            #   2. price_24h direction (long_proxy: up; short_proxy: down)
            #   3. OI 24h delta (long_proxy: rising while price up; short_proxy: rising while price down)
            #   4. funding extreme (long_proxy: funding ≤ -0.02; short_proxy: funding ≥ 0.05)
            #   5. RSI 4h extreme (long_proxy: rsi < 35 oversold; short_proxy: rsi > 70 overbought)
            # 7 candles × 4h = 24h window (first vs last close compares t-24h to t-0).
            # Earlier limit=6 spanned only 5 intervals = 20h, off by one.
            # Signal weight rebalanced from 4×25 to 5×20 so max score stays 100
            # and the RSI signal carries the same weight as the others.
            HISTORY_BARS = 7

            def score_symbol(symbol):
                # 1. Funding (4h, OI-weighted)
                fr_data, fr_err = mcp_tool_call(
                    "get_futures_funding_rate_oi_weight_history",
                    {"symbol": symbol, "interval": "4h", "limit": HISTORY_BARS},
                )
                # 2. OI 4h aggregated
                oi_data, oi_err = mcp_tool_call(
                    "get_futures_aggregated_open_interest_history",
                    {"symbol": symbol, "interval": "4h", "limit": HISTORY_BARS},
                )
                # 3. Price (use one major exchange pair for direction)
                px_data, px_err = mcp_tool_call(
                    "get_futures_price_history",
                    {
                        "exchange": "Binance",
                        "symbol": f"{symbol}USDT",
                        "interval": "4h",
                        "limit": HISTORY_BARS,
                    },
                )

                missing = []
                if fr_err:
                    missing.append(f"funding ({fr_err[:60]})")
                if oi_err:
                    missing.append(f"oi ({oi_err[:60]})")
                if px_err:
                    missing.append(f"price ({px_err[:60]})")

                # Extract closing values; tolerate either dict-of-arrays or list-of-dicts shape
                def last_close(rows, close_keys=("c", "close")):
                    if not rows:
                        return None
                    if isinstance(rows, list) and rows and isinstance(rows[0], dict):
                        for k in close_keys:
                            if k in rows[-1]:
                                try:
                                    return float(rows[-1][k])
                                except (TypeError, ValueError):
                                    return None
                    if isinstance(rows, dict):
                        for k in close_keys:
                            if k in rows and rows[k]:
                                try:
                                    return float(rows[k][-1])
                                except (TypeError, ValueError, IndexError):
                                    return None
                    return None

                def first_close(rows, close_keys=("c", "close")):
                    if not rows:
                        return None
                    if isinstance(rows, list) and rows and isinstance(rows[0], dict):
                        for k in close_keys:
                            if k in rows[0]:
                                try:
                                    return float(rows[0][k])
                                except (TypeError, ValueError):
                                    return None
                    if isinstance(rows, dict):
                        for k in close_keys:
                            if k in rows and rows[k]:
                                try:
                                    return float(rows[k][0])
                                except (TypeError, ValueError, IndexError):
                                    return None
                    return None

                funding_now = last_close(fr_data)
                oi_now = last_close(oi_data)
                oi_then = first_close(oi_data)
                price_now = last_close(px_data)
                price_then = first_close(px_data)

                long_signals = 0
                short_signals = 0

                # Signal 1: funding direction
                if funding_now is not None:
                    if funding_now < 0:
                        long_signals += 1
                    if funding_now > 0.03:
                        short_signals += 1

                # Signal 2: price 24h direction
                price_up = price_now is not None and price_then is not None and price_now > price_then
                price_down = price_now is not None and price_then is not None and price_now < price_then
                if price_up:
                    long_signals += 1
                if price_down:
                    short_signals += 1

                # Signal 3: OI rising × price direction
                oi_rising = oi_now is not None and oi_then is not None and oi_now > oi_then
                if oi_rising and price_up:
                    long_signals += 1
                if oi_rising and price_down:
                    short_signals += 1

                # Signal 4: funding extremes
                if funding_now is not None:
                    if funding_now <= -0.02:
                        long_signals += 1
                    if funding_now >= 0.05:
                        short_signals += 1

                # Signal 5: RSI 4h extreme (local Bybit, no CoinGlass tier dep).
                # Pair format on Bybit linear is the standard "<COIN>USDT" perp;
                # matches the CoinGlass `<symbol>USDT` pair used for price above.
                # 200 candles × 4h = ~33d, gives RSI plenty of warmup.
                rsi_pair = f"{symbol}USDT"
                bybit_closes, bybit_err = bybit_kline_closes(rsi_pair, "240", 200)
                rsi_4h = None
                if bybit_err:
                    missing.append(f"bybit_kline ({bybit_err[:60]})")
                else:
                    rsi_4h = rsi_wilder(bybit_closes, 14)
                    if rsi_4h is None:
                        missing.append("rsi_4h_compute")

                if rsi_4h is not None:
                    if rsi_4h < 35:
                        long_signals += 1
                    if rsi_4h > 70:
                        short_signals += 1

                # 5 binary signals × 20 = max 100 (was 4 × 25; rebalanced
                # so the new RSI signal carries equal weight to the others
                # without changing the operator-facing 0–100 score range).
                long_score = long_signals * 20
                short_score = short_signals * 20
                return {
                    "symbol": symbol,
                    "long_score": long_score,
                    "short_score": short_score,
                    "funding": funding_now,
                    "price_now": price_now,
                    "price_change_pct": (
                        round(((price_now - price_then) / price_then) * 100, 2)
                        if price_now is not None and price_then not in (None, 0)
                        else None
                    ),
                    "oi_rising": oi_rising,
                    "rsi_4h": rsi_4h,
                    "missing": missing,
                }

            # ── Per-symbol scan + alert decision ──────────────────────────────
            now = datetime.now(timezone.utc)
            now_iso = now.isoformat()
            sent_alerts = []

            for entry in watchlist:
                sym = entry["symbol"]
                thr = entry["threshold"]
                direction = entry["direction"]

                try:
                    sc = score_symbol(sym)
                except Exception as e:
                    print(f"⚠️  {sym} scoring failed: {e}")
                    continue

                long_s = sc["long_score"]
                short_s = sc["short_score"]
                if direction == "long":
                    crossed = long_s >= thr
                    side = "long"
                    score = long_s
                elif direction == "short":
                    crossed = short_s >= thr
                    side = "short"
                    score = short_s
                else:
                    if long_s >= thr or short_s >= thr:
                        crossed = True
                        if long_s >= short_s:
                            side = "long"
                            score = long_s
                        else:
                            side = "short"
                            score = short_s
                    else:
                        crossed = False
                        side = "long" if long_s >= short_s else "short"
                        score = max(long_s, short_s)

                print(
                    f"  {sym}: long={long_s} short={short_s} threshold={thr} "
                    f"direction={direction} crossed={crossed} missing={sc['missing']}"
                )

                if not crossed:
                    continue

                # Dedup window check
                last_at_str = last_alert_at.get(sym)
                if last_at_str:
                    try:
                        last_at = datetime.fromisoformat(last_at_str)
                        if last_at.tzinfo is None:
                            last_at = last_at.replace(tzinfo=timezone.utc)
                        if now - last_at < timedelta(hours=DEDUP_HOURS):
                            age_min = int((now - last_at).total_seconds() / 60)
                            print(
                                f"    deduped — last alert was {age_min} min ago "
                                f"(<{DEDUP_HOURS}h)"
                            )
                            continue
                    except ValueError:
                        pass

                price_str = f"${sc['price_now']:.2f}" if sc["price_now"] is not None else "?"
                pc = sc["price_change_pct"]
                price_chg = f"{pc:+.2f}%" if pc is not None else "?"
                funding_str = (
                    f"{sc['funding']*100:+.4f}%" if sc["funding"] is not None else "?"
                )
                rsi_str = (
                    f"{sc['rsi_4h']:.1f}" if sc.get("rsi_4h") is not None else "?"
                )
                # Russian-language alert. Telegram chats are operator DMs in Russian;
                # English-only messages were unintuitive at a glance. Trader slang
                # (long → лонг, short → шорт, funding/OI) stays in its widely used
                # form. Emoji + score line stay structurally identical so the older
                # cron-alerts archive still reads the same shape.
                side_ru = {"long": "лонг", "short": "шорт"}.get(side, side)
                direction_ru = {"long": "лонг", "short": "шорт", "both": "оба"}.get(direction, direction)
                oi_ru = "да" if sc["oi_rising"] else "нет"
                msg = (
                    f"⚠️ {sym} {side_ru} — сработал watch (cron pre-filter)\n"
                    f"\n"
                    f"Скор: {score}/100 (порог {thr}, направление {direction_ru})\n"
                    f"Цена: {price_str} (Δ за 24ч: {price_chg})\n"
                    f"Funding 4h: {funding_str}\n"
                    f"OI растёт: {oi_ru}\n"
                    f"RSI 4h: {rsi_str}\n"
                    f"\n"
                    f"Запустите /eth {sym.lower()} или /{sym.lower()} для полного анализа в чат-скилле.\n"
                    f"Это наблюдение, не финансовая рекомендация."
                )

                # Send alert to every operator chat in ALERT_CHAT_IDS. Update
                # dedup state if at least one delivery returned ok=true: the
                # operator group has seen this signal at least once, so the
                # 4h suppression window is the right behavior. If every chat
                # fails (network down, bot kicked from all chats), leave
                # last_alert_at unchanged so the next tick can retry.
                tg_url = f"{TELEGRAM_API}/bot{tg_token}/sendMessage"
                any_delivered = False
                delivery_summary = []
                for chat_id in ALERT_CHAT_IDS:
                    tg_body = json.dumps({
                        "chat_id": chat_id,
                        "text": msg,
                    }).encode()
                    try:
                        tg_req = urllib.request.Request(
                            tg_url,
                            data=tg_body,
                            headers={"Content-Type": "application/json"},
                            method="POST",
                        )
                        tg_resp = urllib.request.urlopen(tg_req, timeout=15)
                        # Telegram Bot API can return HTTP 200 with {"ok": false, "description": "..."}
                        # on non-network failures (invalid chat_id, bot blocked, message too long, etc.).
                        try:
                            tg_payload = json.loads(tg_resp.read().decode("utf-8", "replace"))
                        except json.JSONDecodeError:
                            tg_payload = {}
                        if not tg_payload.get("ok"):
                            desc = tg_payload.get("description", "no description")
                            print(f"    ⚠️  Telegram ok=false for {sym} → chat {chat_id}: {desc}")
                            delivery_summary.append(f"{chat_id}=ok_false")
                        else:
                            any_delivered = True
                            delivery_summary.append(f"{chat_id}=ok")
                    except urllib.error.HTTPError as e:
                        err_body = e.read().decode("utf-8", "replace")[:200]
                        print(f"    ⚠️  Telegram POST {sym}→{chat_id} failed: HTTP {e.code} {err_body}")
                        delivery_summary.append(f"{chat_id}=http_{e.code}")
                    except urllib.error.URLError as e:
                        print(f"    ⚠️  Telegram POST {sym}→{chat_id} network error: {e.reason}")
                        delivery_summary.append(f"{chat_id}=urlerror")

                if any_delivered:
                    last_alert_at[sym] = now_iso
                    sent_alerts.append(sym)
                    print(f"    ✅ alert {sym} delivered: [{', '.join(delivery_summary)}]")
                else:
                    print(
                        f"    ❌ alert {sym} failed to all chats: [{', '.join(delivery_summary)}]; "
                        f"keeping last_alert_at unchanged for retry next tick"
                    )

            # ── Persist alerts state ──────────────────────────────────────────
            alerts_state["last_alert_at"] = last_alert_at
            alerts_state["last_run_at"] = now_iso
            alerts_state["last_run_alerts"] = sent_alerts
            s3.put_object(
                Bucket=MINIO_BUCKET,
                Key=ALERTS_KEY,
                Body=json.dumps(alerts_state, indent=2).encode(),
                ContentType="application/json",
            )
            print(f"✅ alerts state persisted; alerts sent this run: {sent_alerts}")
            print(f"[{datetime.now(timezone.utc).isoformat()}] labs-watch-scan complete")
            PYEOF
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: MINIO_ENDPOINT
              value: "http://minio.minio.svc.cluster.local:9000"

      # onExit handler — Telegram error notification on workflow failure.
      # Pattern matches feedback_argo_onexit_telegram: alpine + curl,
      # token from Vault, exits 0 even if curl fails so the workflow
      # status is determined by the main step, not the notifier.
      - name: notify-on-failure
        steps:
          - - name: notify
              template: telegram-error
              when: "{{workflow.status}} != Succeeded"
      - name: telegram-error
        script:
          image: alpine:3.20
          command: [sh]
          source: |
            set +e
            apk add --no-cache curl jq >/dev/null 2>&1
            # Read Telegram token from Vault (same pattern as scan step)
            SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            VAULT_TOKEN=$(curl -s --max-time 10 -X POST \
              -d "{\"role\":\"argo-workflow\",\"jwt\":\"${SA_TOKEN}\"}" \
              "${VAULT_ADDR}/v1/auth/kubernetes/login" \
              | jq -r '.auth.client_token // empty')
            if [ -z "$VAULT_TOKEN" ]; then
              echo "vault auth failed; skipping notification"
              exit 0
            fi
            TG_TOKEN=$(curl -s --max-time 10 \
              -H "X-Vault-Token: ${VAULT_TOKEN}" \
              "${VAULT_ADDR}/v1/secret/data/teams/labs/openclaw/telegram" \
              | jq -r '.data.data["telegram-bot-token"] // empty')
            if [ -z "$TG_TOKEN" ]; then
              echo "telegram token not in vault; skipping notification"
              exit 0
            fi
            MSG="🚨 labs-watch-scan упал: workflow={{workflow.name}} status={{workflow.status}}. Проверьте workflows.mctl.ai/workflows/argo-workflows/{{workflow.name}}"
            # Notify every operator chat — must mirror ALERT_CHAT_IDS in the
            # main scan step and channels.telegram.allowFrom in the openclaw
            # tenant values.yaml. Loop is best-effort: a failure to reach one
            # chat does not block the others or fail the workflow.
            for CHAT_ID in 210408407 103413580; do
              curl -s --max-time 10 -X POST \
                "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                -H "Content-Type: application/json" \
                -d "$(jq -n --arg c "$CHAT_ID" --arg t "$MSG" '{chat_id:$c,text:$t}')" \
                > /dev/null 2>&1 \
                || echo "telegram POST to $CHAT_ID failed; continuing"
            done
            exit 0
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
