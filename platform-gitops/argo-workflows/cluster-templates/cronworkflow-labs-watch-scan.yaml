apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: labs-watch-scan
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: |
      Every-30-minute autonomous CoinGlass watchlist scanner for the
      labs-openclaw eth-trading-intel skill. Reads the chat-driven
      watchlist from S3 (s3://platform-state/labs/openclaw/workspace/
      state/eth-trading-intel.json) read-only, runs a simplified
      4-signal score per symbol against the per-entry threshold +
      direction filter, posts a Telegram alert if crossed AND the
      last alert for that symbol was more than 4h ago.

      This closes the cron-gap of the openclaw runtime (which is
      stateless message-driven and cannot self-schedule). The
      simplified scoring is deliberately a coarser pre-filter than
      the chat skill's full 10-step pipeline — alerts say "wake up,
      run /eth SYMBOL for full analysis", they are not the final
      signal.

      Tier note: currently CoinGlass HOBBYIST. All MCP calls use
      4h interval; STANDARD-only tools (coins_markets, max_pain,
      whale_positions) are not used. When tier is upgraded the
      simplified scoring can be expanded; chat skill stays the
      source of truth for full directional rubric.

      State separation:
        - eth-trading-intel.json (chat-driven, written by skill via
          Bash) — READ-ONLY for cron
        - eth-trading-intel-alerts.json (cron-only, dedup state)
          — written by cron only

      Concurrency: per-tenant mutex prevents two overlapping ticks
      double-firing alerts. Cron does NOT contend on
      mctl-gitops-main-writes (writes nothing to gitops main).
spec:
  schedule: "*/30 * * * *"
  timezone: "UTC"
  # Forbid: never run two scans in parallel — both would hit the
  # same alerts state file in S3 and could double-send Telegram
  # alerts. If a tick takes longer than 30 min something is wrong;
  # let it complete cleanly before the next one.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  # Active. Monitoring threshold cadence is 30 min; dedup window 4h
  # per symbol prevents alert spam.
  suspend: false
  workflowSpec:
    serviceAccountName: argo-workflow-sa
    ttlStrategy:
      # 24h retention — explicit value avoids the Argo v3.7.10
      # archive-worker NULL-nodes wedge (ref: reference_argo_archive_bug).
      secondsAfterCompletion: 86400
    # Per-tenant mutex on the alerts state file. Not the shared
    # mctl-gitops-main-writes because we don't push to gitops.
    synchronization:
      mutex:
        name: labs-watch-scan-coinglass-pull
    entrypoint: scan
    onExit: notify-on-failure
    templates:
      - name: scan
        script:
          image: python:3.12-alpine
          command: [sh]
          source: |
            set -e
            pip install boto3 --quiet

            python3 - << 'PYEOF'
            import os, sys, json, urllib.request, urllib.error
            from datetime import datetime, timezone, timedelta

            VAULT_ADDR = os.environ["VAULT_ADDR"]
            MINIO_ENDPOINT = os.environ["MINIO_ENDPOINT"]
            MINIO_BUCKET = "platform-state"
            STATE_KEY = "labs/openclaw/workspace/state/eth-trading-intel.json"
            ALERTS_KEY = "labs/openclaw/workspace/state/eth-trading-intel-alerts.json"
            COINGLASS_MCP_URL = "https://api-mcp.coinglass.com/mcp"
            TELEGRAM_API = "https://api.telegram.org"
            DEDUP_HOURS = 4
            ALERT_CHAT_ID = "210408407"  # operator DM with @MCTL_AI_bot

            def vault_token():
                with open("/var/run/secrets/kubernetes.io/serviceaccount/token") as f:
                    sa_token = f.read().strip()
                resp = urllib.request.urlopen(urllib.request.Request(
                    f"{VAULT_ADDR}/v1/auth/kubernetes/login",
                    data=json.dumps({"role": "argo-workflow", "jwt": sa_token}).encode(),
                    headers={"Content-Type": "application/json"},
                    method="POST",
                ))
                return json.loads(resp.read())["auth"]["client_token"]

            def vault_read(token, path):
                req = urllib.request.Request(
                    f"{VAULT_ADDR}/v1/{path}",
                    headers={"X-Vault-Token": token},
                )
                return json.loads(urllib.request.urlopen(req).read())["data"]["data"]

            print(f"[{datetime.now(timezone.utc).isoformat()}] labs-watch-scan starting")
            vt = vault_token()
            print("✅ Vault authenticated")

            cg_api_key = vault_read(vt, "secret/data/teams/labs/openclaw/coinglass")["api_key"]
            tg_token = vault_read(vt, "secret/data/teams/labs/openclaw/telegram")["telegram-bot-token"]
            minio_creds = vault_read(vt, "secret/data/platform/minio")
            print("✅ Secrets loaded")

            # ── MinIO client (S3-compatible) ──────────────────────────────────
            import boto3
            from botocore.config import Config
            s3 = boto3.client(
                "s3",
                endpoint_url=MINIO_ENDPOINT,
                aws_access_key_id=minio_creds["root-user"],
                aws_secret_access_key=minio_creds["root-password"],
                config=Config(signature_version="s3v4"),
                region_name="us-east-1",
            )

            # ── Read chat-driven watchlist (read-only) ────────────────────────
            try:
                obj = s3.get_object(Bucket=MINIO_BUCKET, Key=STATE_KEY)
                state = json.loads(obj["Body"].read())
            except s3.exceptions.NoSuchKey:
                print(f"⚠️  No state file at s3://{MINIO_BUCKET}/{STATE_KEY} — nothing to scan, exiting cleanly")
                sys.exit(0)

            global_threshold = int(state.get("threshold", 70))
            raw_watchlist = state.get("watchlist", [])

            # Migration shim — cron tolerates both schema 1 (string entries) and schema 2 (object entries).
            # Cron does NOT write back to chat state file; the migration result lives only in this run.
            watchlist = []
            for entry in raw_watchlist:
                if isinstance(entry, str):
                    sym = entry.strip().upper()
                    if sym:
                        watchlist.append({
                            "symbol": sym,
                            "threshold": global_threshold,
                            "direction": "both",
                        })
                elif isinstance(entry, dict) and entry.get("symbol"):
                    sym = str(entry["symbol"]).strip().upper()
                    thr = entry.get("threshold")
                    try:
                        thr = int(thr) if thr is not None else global_threshold
                    except (TypeError, ValueError):
                        thr = global_threshold
                    if not (50 <= thr <= 95):
                        thr = global_threshold
                    direction = entry.get("direction", "both")
                    if direction not in ("long", "short", "both"):
                        direction = "both"
                    watchlist.append({"symbol": sym, "threshold": thr, "direction": direction})
                # malformed entries silently skipped — chat skill owns repair

            if not watchlist:
                print("⚠️  Watchlist empty after parsing; exiting cleanly")
                sys.exit(0)

            print(f"✅ Watchlist: {[(e['symbol'], e['threshold'], e['direction']) for e in watchlist]}")

            # ── Read alerts state (dedup) ─────────────────────────────────────
            try:
                obj = s3.get_object(Bucket=MINIO_BUCKET, Key=ALERTS_KEY)
                alerts_state = json.loads(obj["Body"].read())
            except s3.exceptions.NoSuchKey:
                alerts_state = {"last_alert_at": {}}

            last_alert_at = alerts_state.setdefault("last_alert_at", {})

            # ── CoinGlass MCP helpers (streamable-HTTP via direct POST) ───────
            mcp_session_id = None
            mcp_protocol = "2025-06-18"

            def mcp_request(method, params=None, request_id=1):
                global mcp_session_id
                body = json.dumps({
                    "jsonrpc": "2.0",
                    "id": request_id,
                    "method": method,
                    "params": params or {},
                }).encode()
                headers = {
                    "Content-Type": "application/json",
                    "Accept": "application/json, text/event-stream",
                    "CG-API-KEY": cg_api_key,
                }
                if mcp_session_id:
                    headers["Mcp-Session-Id"] = mcp_session_id
                    headers["Mcp-Protocol-Version"] = mcp_protocol
                req = urllib.request.Request(COINGLASS_MCP_URL, data=body, headers=headers, method="POST")
                try:
                    resp = urllib.request.urlopen(req, timeout=30)
                except urllib.error.HTTPError as e:
                    raw = e.read().decode("utf-8", "replace")
                    return {"_http_error": e.code, "_body": raw}
                except urllib.error.URLError as e:
                    return {"_http_error": "URLError", "_body": str(e.reason)}
                sid = resp.headers.get("Mcp-Session-Id")
                if sid and not mcp_session_id:
                    mcp_session_id = sid
                ct = resp.headers.get("Content-Type", "")
                raw = resp.read().decode("utf-8", "replace")
                if "text/event-stream" in ct:
                    # SSE frames: data: {...}\n\n
                    for line in raw.splitlines():
                        if line.startswith("data:"):
                            payload = line[len("data:"):].strip()
                            if payload:
                                try:
                                    return json.loads(payload)
                                except json.JSONDecodeError:
                                    continue
                    return {"_sse_empty": True, "_body": raw}
                if not raw.strip():
                    return {"_empty": True}
                return json.loads(raw)

            def mcp_tool_call(name, arguments):
                resp = mcp_request("tools/call", {"name": name, "arguments": arguments})
                if "_http_error" in resp:
                    return None, f"HTTP {resp['_http_error']}: {resp['_body'][:200]}"
                if "result" not in resp:
                    return None, f"Bad response: {json.dumps(resp)[:200]}"
                # CoinGlass returns content array with text JSON
                content = resp["result"].get("content", [])
                if not content:
                    return None, "Empty content"
                text = content[0].get("text", "")
                try:
                    payload = json.loads(text)
                except json.JSONDecodeError:
                    return None, f"Non-JSON content: {text[:200]}"
                if isinstance(payload, dict) and payload.get("code") not in (None, "0", 0):
                    return None, f"CoinGlass error code {payload.get('code')}: {payload.get('msg', '')}"
                return payload.get("data") if isinstance(payload, dict) else payload, None

            def mcp_notify(method, params=None):
                """Fire-and-forget JSON-RPC notification (no id field, no response parsing).

                Required by MCP lifecycle: after initialize, the client must send
                notifications/initialized before any normal request, or strict servers
                may refuse tools/call (and silently miss alerts).
                """
                body = json.dumps({
                    "jsonrpc": "2.0",
                    "method": method,
                    "params": params or {},
                }).encode()
                headers = {
                    "Content-Type": "application/json",
                    "Accept": "application/json, text/event-stream",
                    "CG-API-KEY": cg_api_key,
                }
                if mcp_session_id:
                    headers["Mcp-Session-Id"] = mcp_session_id
                    headers["Mcp-Protocol-Version"] = mcp_protocol
                req = urllib.request.Request(COINGLASS_MCP_URL, data=body, headers=headers, method="POST")
                try:
                    # Notifications return 202 Accepted with no body; consume and discard.
                    urllib.request.urlopen(req, timeout=15).read()
                except urllib.error.HTTPError as e:
                    # 4xx on a notification is non-fatal (server may not require it),
                    # but log so spec-strictness regressions are visible.
                    print(f"⚠️  notification {method} returned HTTP {e.code}; continuing")

            # MCP initialize handshake. Three steps per spec:
            #   1. Client → request initialize
            #   2. Server → response with capabilities
            #   3. Client → notifications/initialized (fire-and-forget, no id)
            # Strict servers (and the MCP spec) require step 3 before tools/call.
            # The CoinGlass server has historically been lenient about steps 1-2
            # (initialize occasionally 401s while tools/call with the same header
            # succeeds), but step 3 is cheap insurance and matches the lifecycle
            # the openclaw bundle-mcp client performs through the stdio bridge.
            init_resp = mcp_request("initialize", {
                "protocolVersion": mcp_protocol,
                "capabilities": {},
                "clientInfo": {"name": "labs-watch-scan", "version": "1.0.0"},
            })
            if "result" not in init_resp and "_http_error" not in init_resp:
                print(f"⚠️  initialize response: {json.dumps(init_resp)[:200]}")
            else:
                print("✅ MCP initialized")

            mcp_notify("notifications/initialized")
            print("✅ initialized notification sent")

            # ── Scoring: 4 binary signals × 25 (HOBBYIST-friendly) ────────────
            # Inputs (4h interval throughout):
            #   1. funding direction (long_proxy: funding < 0; short_proxy: funding > 0.03)
            #   2. price_24h direction (long_proxy: up; short_proxy: down)
            #   3. OI 24h delta (long_proxy: rising while price up; short_proxy: rising while price down)
            #   4. funding extreme (long_proxy: funding ≤ -0.02; short_proxy: funding ≥ 0.05)
            def score_symbol(symbol):
                # 1. Funding (4h, OI-weighted)
                fr_data, fr_err = mcp_tool_call(
                    "get_futures_funding_rate_oi_weight_history",
                    {"symbol": symbol, "interval": "4h", "limit": 6},
                )
                # 2. OI 4h aggregated
                oi_data, oi_err = mcp_tool_call(
                    "get_futures_aggregated_open_interest_history",
                    {"symbol": symbol, "interval": "4h", "limit": 6},
                )
                # 3. Price (use one major exchange pair for direction)
                px_data, px_err = mcp_tool_call(
                    "get_futures_price_history",
                    {
                        "exchange": "Binance",
                        "symbol": f"{symbol}USDT",
                        "interval": "4h",
                        "limit": 6,
                    },
                )

                missing = []
                if fr_err:
                    missing.append(f"funding ({fr_err[:60]})")
                if oi_err:
                    missing.append(f"oi ({oi_err[:60]})")
                if px_err:
                    missing.append(f"price ({px_err[:60]})")

                # Extract closing values; tolerate either dict-of-arrays or list-of-dicts shape
                def last_close(rows, close_keys=("c", "close")):
                    if not rows:
                        return None
                    if isinstance(rows, list) and rows and isinstance(rows[0], dict):
                        for k in close_keys:
                            if k in rows[-1]:
                                try:
                                    return float(rows[-1][k])
                                except (TypeError, ValueError):
                                    return None
                    if isinstance(rows, dict):
                        for k in close_keys:
                            if k in rows and rows[k]:
                                try:
                                    return float(rows[k][-1])
                                except (TypeError, ValueError, IndexError):
                                    return None
                    return None

                def first_close(rows, close_keys=("c", "close")):
                    if not rows:
                        return None
                    if isinstance(rows, list) and rows and isinstance(rows[0], dict):
                        for k in close_keys:
                            if k in rows[0]:
                                try:
                                    return float(rows[0][k])
                                except (TypeError, ValueError):
                                    return None
                    if isinstance(rows, dict):
                        for k in close_keys:
                            if k in rows and rows[k]:
                                try:
                                    return float(rows[k][0])
                                except (TypeError, ValueError, IndexError):
                                    return None
                    return None

                funding_now = last_close(fr_data)
                oi_now = last_close(oi_data)
                oi_then = first_close(oi_data)
                price_now = last_close(px_data)
                price_then = first_close(px_data)

                long_signals = 0
                short_signals = 0

                # Signal 1: funding direction
                if funding_now is not None:
                    if funding_now < 0:
                        long_signals += 1
                    if funding_now > 0.03:
                        short_signals += 1

                # Signal 2: price 24h direction
                price_up = price_now is not None and price_then is not None and price_now > price_then
                price_down = price_now is not None and price_then is not None and price_now < price_then
                if price_up:
                    long_signals += 1
                if price_down:
                    short_signals += 1

                # Signal 3: OI rising × price direction
                oi_rising = oi_now is not None and oi_then is not None and oi_now > oi_then
                if oi_rising and price_up:
                    long_signals += 1
                if oi_rising and price_down:
                    short_signals += 1

                # Signal 4: funding extremes
                if funding_now is not None:
                    if funding_now <= -0.02:
                        long_signals += 1
                    if funding_now >= 0.05:
                        short_signals += 1

                long_score = long_signals * 25
                short_score = short_signals * 25
                return {
                    "symbol": symbol,
                    "long_score": long_score,
                    "short_score": short_score,
                    "funding": funding_now,
                    "price_now": price_now,
                    "price_change_pct": (
                        round(((price_now - price_then) / price_then) * 100, 2)
                        if price_now is not None and price_then not in (None, 0)
                        else None
                    ),
                    "oi_rising": oi_rising,
                    "missing": missing,
                }

            # ── Per-symbol scan + alert decision ──────────────────────────────
            now = datetime.now(timezone.utc)
            now_iso = now.isoformat()
            sent_alerts = []

            for entry in watchlist:
                sym = entry["symbol"]
                thr = entry["threshold"]
                direction = entry["direction"]

                try:
                    sc = score_symbol(sym)
                except Exception as e:
                    print(f"⚠️  {sym} scoring failed: {e}")
                    continue

                long_s = sc["long_score"]
                short_s = sc["short_score"]
                if direction == "long":
                    crossed = long_s >= thr
                    side = "long"
                    score = long_s
                elif direction == "short":
                    crossed = short_s >= thr
                    side = "short"
                    score = short_s
                else:
                    if long_s >= thr or short_s >= thr:
                        crossed = True
                        if long_s >= short_s:
                            side = "long"
                            score = long_s
                        else:
                            side = "short"
                            score = short_s
                    else:
                        crossed = False
                        side = "long" if long_s >= short_s else "short"
                        score = max(long_s, short_s)

                print(
                    f"  {sym}: long={long_s} short={short_s} threshold={thr} "
                    f"direction={direction} crossed={crossed} missing={sc['missing']}"
                )

                if not crossed:
                    continue

                # Dedup window check
                last_at_str = last_alert_at.get(sym)
                if last_at_str:
                    try:
                        last_at = datetime.fromisoformat(last_at_str)
                        if last_at.tzinfo is None:
                            last_at = last_at.replace(tzinfo=timezone.utc)
                        if now - last_at < timedelta(hours=DEDUP_HOURS):
                            age_min = int((now - last_at).total_seconds() / 60)
                            print(
                                f"    deduped — last alert was {age_min} min ago "
                                f"(<{DEDUP_HOURS}h)"
                            )
                            continue
                    except ValueError:
                        pass

                price_str = f"${sc['price_now']:.2f}" if sc["price_now"] is not None else "?"
                pc = sc["price_change_pct"]
                price_chg = f"{pc:+.2f}%" if pc is not None else "?"
                funding_str = (
                    f"{sc['funding']*100:+.4f}%" if sc["funding"] is not None else "?"
                )
                missing_str = "; ".join(sc["missing"]) if sc["missing"] else "none"
                msg = (
                    f"⚠️ {sym} {side.upper()} watch crossed (cron pre-filter)\n"
                    f"\n"
                    f"Score (cron simple): {score}/100 (threshold {thr}, direction {direction})\n"
                    f"Price: {price_str} (24h Δ {price_chg})\n"
                    f"Funding 4h: {funding_str}\n"
                    f"OI rising: {sc['oi_rising']}\n"
                    f"\n"
                    f"Run /eth {sym.lower()} or /{sym.lower()} for full chat-skill analysis.\n"
                    f"This is observation, not financial advice."
                )

                tg_url = f"{TELEGRAM_API}/bot{tg_token}/sendMessage"
                tg_body = json.dumps({
                    "chat_id": ALERT_CHAT_ID,
                    "text": msg,
                }).encode()
                try:
                    tg_req = urllib.request.Request(
                        tg_url,
                        data=tg_body,
                        headers={"Content-Type": "application/json"},
                        method="POST",
                    )
                    urllib.request.urlopen(tg_req, timeout=15)
                    last_alert_at[sym] = now_iso
                    sent_alerts.append(sym)
                    print(f"    ✅ alert sent for {sym}")
                except urllib.error.HTTPError as e:
                    err_body = e.read().decode("utf-8", "replace")[:300]
                    print(f"    ⚠️  Telegram POST failed: HTTP {e.code} {err_body}")
                except urllib.error.URLError as e:
                    print(f"    ⚠️  Telegram POST network error: {e.reason}")

            # ── Persist alerts state ──────────────────────────────────────────
            alerts_state["last_alert_at"] = last_alert_at
            alerts_state["last_run_at"] = now_iso
            alerts_state["last_run_alerts"] = sent_alerts
            s3.put_object(
                Bucket=MINIO_BUCKET,
                Key=ALERTS_KEY,
                Body=json.dumps(alerts_state, indent=2).encode(),
                ContentType="application/json",
            )
            print(f"✅ alerts state persisted; alerts sent this run: {sent_alerts}")
            print(f"[{datetime.now(timezone.utc).isoformat()}] labs-watch-scan complete")
            PYEOF
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: MINIO_ENDPOINT
              value: "http://minio.minio.svc.cluster.local:9000"

      # onExit handler — Telegram error notification on workflow failure.
      # Pattern matches feedback_argo_onexit_telegram: alpine + curl,
      # token from Vault, exits 0 even if curl fails so the workflow
      # status is determined by the main step, not the notifier.
      - name: notify-on-failure
        steps:
          - - name: notify
              template: telegram-error
              when: "{{workflow.status}} != Succeeded"
      - name: telegram-error
        script:
          image: alpine:3.20
          command: [sh]
          source: |
            set +e
            apk add --no-cache curl jq >/dev/null 2>&1
            # Read Telegram token from Vault (same pattern as scan step)
            SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            VAULT_TOKEN=$(curl -s --max-time 10 -X POST \
              -d "{\"role\":\"argo-workflow\",\"jwt\":\"${SA_TOKEN}\"}" \
              "${VAULT_ADDR}/v1/auth/kubernetes/login" \
              | jq -r '.auth.client_token // empty')
            if [ -z "$VAULT_TOKEN" ]; then
              echo "vault auth failed; skipping notification"
              exit 0
            fi
            TG_TOKEN=$(curl -s --max-time 10 \
              -H "X-Vault-Token: ${VAULT_TOKEN}" \
              "${VAULT_ADDR}/v1/secret/data/teams/labs/openclaw/telegram" \
              | jq -r '.data.data["telegram-bot-token"] // empty')
            if [ -z "$TG_TOKEN" ]; then
              echo "telegram token not in vault; skipping notification"
              exit 0
            fi
            MSG="🚨 labs-watch-scan failed: workflow={{workflow.name}} status={{workflow.status}}. Check workflows.mctl.ai/workflows/argo-workflows/{{workflow.name}}"
            curl -s --max-time 10 -X POST \
              "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg c "210408407" --arg t "$MSG" '{chat_id:$c,text:$t}')" \
              || echo "telegram POST failed; not blocking workflow"
            exit 0
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
