# Periodically delete completed Workflows that have aged out.
#
# Why this exists:
#   workflowDefaults.spec.ttlStrategy (in argo-workflows.yaml) sets TTL on new
#   workflows at creation time. The 262 workflows created before that default
#   was added have no spec.ttlStrategy, so the TTL controller never touches them
#   — they accumulate in etcd, inflating kube-apiserver watch-cache RAM. This
#   CronWorkflow is a safety net: it removes any Succeeded/Failed/Error workflow
#   older than 3 days, regardless of whether the TTL controller handled it.
#
# RBAC: workflow-cleanup-sa (ClusterRole below) has get/list/delete on
#   workflows.argoproj.io cluster-wide. It has no other permissions.
#
# Schedule: daily at 03:00 UTC, after the TTL manager's overnight sweep.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow-cleanup-sa
  namespace: argo-workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workflow-cleanup
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workflow-cleanup
subjects:
  - kind: ServiceAccount
    name: workflow-cleanup-sa
    namespace: argo-workflows
roleRef:
  kind: ClusterRole
  name: workflow-cleanup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: cron-cleanup-old-workflows
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: |
      Deletes Succeeded/Failed/Error Workflows older than 3 days across all
      namespaces. Complements the TTL controller: new workflows get ttlStrategy
      via workflowDefaults; this catches any that slip through (e.g. workflows
      created before the default was added, or created with ttlStrategy=null).
spec:
  schedule: "0 3 * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    serviceAccountName: workflow-cleanup-sa
    entrypoint: cleanup
    templates:
      - name: cleanup
        script:
          image: bitnami/kubectl:1.32.3
          command: [python3]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          source: |
            import json, subprocess, sys
            from datetime import datetime, timezone, timedelta

            result = subprocess.run(
                ["kubectl", "get", "workflows", "--all-namespaces", "-o", "json"],
                capture_output=True, text=True, check=True
            )
            data = json.loads(result.stdout)

            now = datetime.now(timezone.utc)
            cutoff = now - timedelta(days=3)
            deleted = 0
            skipped = 0

            for wf in data["items"]:
                phase = wf.get("status", {}).get("phase", "")
                if phase not in ("Succeeded", "Failed", "Error"):
                    skipped += 1
                    continue
                fin = wf.get("status", {}).get("finishedAt", "")
                if not fin:
                    skipped += 1
                    continue
                ft = datetime.fromisoformat(fin.replace("Z", "+00:00"))
                if ft >= cutoff:
                    skipped += 1
                    continue
                ns = wf["metadata"]["namespace"]
                name = wf["metadata"]["name"]
                r = subprocess.run(
                    ["kubectl", "delete", "workflow", name, "-n", ns, "--ignore-not-found"],
                    capture_output=True, text=True
                )
                age = (now - ft).days
                if r.returncode == 0:
                    print(f"deleted {ns}/{name} (phase={phase}, age={age}d)")
                    deleted += 1
                else:
                    print(f"WARN: failed to delete {ns}/{name}: {r.stderr.strip()}", file=sys.stderr)

            print(f"summary: deleted={deleted} skipped={skipped}")
