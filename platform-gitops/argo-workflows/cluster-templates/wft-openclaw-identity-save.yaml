apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: openclaw-identity-save
  annotations:
    workflows.argoproj.io/description: |
      Save a single OpenClaw identity override file (AGENTS.md / SOUL.md /
      IDENTITY.md / USER.md / TOOLS.md) to the gitops repo.

      Writes to platform-gitops/services/{team}/openclaw/identity/{file_name}.
      Overwrites an existing file if present. Commits as argo-workflows[bot]
      with the triggering user's ID recorded in the commit message (actor).

      Input validation of team/file_name/content is performed in mctl-api
      before this workflow is submitted; the workflow re-validates the
      file name against the fixed identity allowlist and the path as a
      defense-in-depth check.
spec:
  entrypoint: save-identity
  serviceAccountName: argo-workflow-sa

  arguments:
    parameters:
      - name: team_name
      - name: file_name
      - name: content_b64
      - name: actor
        value: "unknown"

  templates:
    - name: save-identity
      inputs:
        parameters:
          - name: team_name
          - name: file_name
          - name: content_b64
          - name: actor
      script:
        image: alpine:3.19
        command: [sh]
        # Small resource envelope so this workflow fits alongside the tenant's
        # OpenClaw pod inside the namespace CPU quota — the work is just a git
        # clone / single-file write / push, it does not need a full core.
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        # Parameters are passed as env vars so the container runtime injects
        # them as opaque values, instead of substituting them into the shell
        # source where shell parsing could execute $(…), ``…``, or escape
        # quotes before our regex validation runs.
        env:
          - name: TEAM
            value: "{{inputs.parameters.team_name}}"
          - name: FILE
            value: "{{inputs.parameters.file_name}}"
          - name: CONTENT_B64
            value: "{{inputs.parameters.content_b64}}"
          - name: ACTOR
            value: "{{inputs.parameters.actor}}"
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        source: |
          set -e

          # ── Validate team name (kebab-case) ───────────────────────────────
          if [ -n "$(printf '%s' "$TEAM" | tr -d 'a-z0-9-')" ]; then
            echo "❌ Invalid team name: contains disallowed characters"
            exit 1
          fi
          if ! printf '%s' "$TEAM" | grep -Eq '^[a-z0-9][a-z0-9-]{0,62}$'; then
            echo "❌ Invalid team name: $TEAM"
            exit 1
          fi

          # ── Validate file_name against fixed identity allowlist ──────────
          # mctl-api enforces the same allowlist; we re-check here so the
          # workflow is safe even if invoked directly (defense-in-depth).
          case "$FILE" in
            AGENTS.md|SOUL.md|IDENTITY.md|USER.md|TOOLS.md) : ;;
            *)
              echo "❌ Invalid identity file name: $FILE (must be AGENTS.md | SOUL.md | IDENTITY.md | USER.md | TOOLS.md)"
              exit 1
              ;;
          esac

          # Strip newlines / control chars from actor so the commit trailer
          # can't be forged with extra lines.
          SAFE_ACTOR=$(printf '%s' "$ACTOR" | tr -d '\r\n' | tr -d '[:cntrl:]')
          [ -z "$SAFE_ACTOR" ] && SAFE_ACTOR="unknown"

          apk add --no-cache git openssh-client ca-certificates python3 py3-yaml > /dev/null

          # ── Set up SSH ────────────────────────────────────────────────────
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          # ── Clone gitops repo ─────────────────────────────────────────────
          git clone --depth=1 "git@github.com:${GITOPS_ORG}/${GITOPS_REPO}.git" /tmp/mctl-gitops
          cd /tmp/mctl-gitops
          git config user.name "argo-workflows[bot]"
          git config user.email "argo-workflows[bot]@users.noreply.github.com"

          DIR="platform-gitops/services/${TEAM}/openclaw/identity"
          TARGET="${DIR}/${FILE}"

          # ── Path containment check ───────────────────────────────────────
          case "$TARGET" in
            platform-gitops/services/${TEAM}/openclaw/identity/AGENTS.md) : ;;
            platform-gitops/services/${TEAM}/openclaw/identity/SOUL.md) : ;;
            platform-gitops/services/${TEAM}/openclaw/identity/IDENTITY.md) : ;;
            platform-gitops/services/${TEAM}/openclaw/identity/USER.md) : ;;
            platform-gitops/services/${TEAM}/openclaw/identity/TOOLS.md) : ;;
            *)
              echo "❌ Security: computed path $TARGET is outside the allowed scope"
              exit 1
              ;;
          esac
          case "$TARGET" in
            *..*)
              echo "❌ Security: path traversal detected in $TARGET"
              exit 1
              ;;
          esac

          mkdir -p "$DIR"

          # ── Decode content and write file ────────────────────────────────
          if [ -z "$CONTENT_B64" ]; then
            echo "❌ Empty content_b64"
            exit 1
          fi
          printf '%s' "$CONTENT_B64" | base64 -d > "$TARGET"
          SIZE=$(wc -c < "$TARGET")
          echo "✅ Wrote $TARGET ($SIZE bytes)"

          # ── Regenerate consolidated values file for openclaw-skills chart ─
          # The openclaw-skills ApplicationSet reads
          # platform-gitops/services/{team}/openclaw/generated/skills-values.yaml
          # via Helm valueFiles. We rebuild it from the full contents of
          # skills/ + identity/ on every save so the ConfigMaps stay in
          # lock-step with the per-file markdown sources.
          GEN_DIR="platform-gitops/services/${TEAM}/openclaw/generated"
          GEN_FILE="${GEN_DIR}/skills-values.yaml"

          # ── Helper: write identity file + regenerate consolidated values + stage ─
          # Called once initially and again after each conflict-driven reset,
          # so the same code path produces the commit whether we start from a
          # clean clone or from `origin/main` after a concurrent push.
          apply_change_and_stage() {
            mkdir -p "$DIR"
            printf '%s' "$CONTENT_B64" | base64 -d > "$TARGET"
            SIZE=$(wc -c < "$TARGET")
            echo "✅ Wrote $TARGET ($SIZE bytes)"
            mkdir -p "$GEN_DIR"
            TEAM="$TEAM" python3 <<'PY'
          import os, glob, yaml
          team = os.environ["TEAM"]
          base = f"platform-gitops/services/{team}/openclaw"
          def load_dir(rel, exclude=()):
              entries = {}
              for path in sorted(glob.glob(f"{base}/{rel}/*.md")):
                  name = os.path.basename(path)
                  if name in exclude:
                      continue
                  with open(path, "r", encoding="utf-8") as f:
                      entries[name] = f.read()
              return entries
          # pyyaml.safe_dump correctly quotes keys that collide with YAML
          # special forms (yes/no/on/off/null/true/false, leading digits,
          # containing ':', etc.) and escapes inner quotes/backslashes, so
          # any skill or identity filename is round-trip safe.
          skills = load_dir("skills", exclude={"README.md"})
          identity = load_dir("identity")
          out = {
              "skills": {k[:-3]: v for k, v in skills.items()},
              "identity": dict(identity),
          }
          os.makedirs(f"{base}/generated", exist_ok=True)
          with open(f"{base}/generated/skills-values.yaml", "w", encoding="utf-8") as f:
              f.write("# Auto-generated by openclaw-skill-* / openclaw-identity-* workflows.\n")
              f.write("# Do not edit manually — changes will be overwritten on the next save/delete.\n")
              yaml.safe_dump(out, f, allow_unicode=True, default_style="|", sort_keys=False, width=4096)
          PY
            echo "✅ Regenerated $GEN_FILE"
            git add "$TARGET" "$GEN_FILE"
          }

          apply_change_and_stage

          # ── Commit ───────────────────────────────────────────────────────
          if git diff --cached --quiet; then
            echo "ℹ️  No changes — file unchanged on main"
            exit 0
          fi
          git commit \
            -m "feat(${TEAM}/openclaw): save identity ${FILE}" \
            -m "Triggered by: ${SAFE_ACTOR}"

          # ── Push with reset-and-retry on conflict ────────────────────────
          # See wft-openclaw-skill-save.yaml for rationale — `git pull
          # --rebase` would conflict on the shared generated/skills-values
          # file, so on a failed push we reset to the latest main and
          # re-apply our change on top.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ Pushed identity ${FILE} for ${TEAM}"
              exit 0
            fi
            if [ "$i" -eq 5 ]; then
              echo "❌ Push failed after 5 attempts"
              exit 1
            fi
            echo "⚠️  Push failed (attempt $i), resetting to origin/main and re-applying..."
            git fetch origin main
            git reset --hard origin/main
            apply_change_and_stage
            if git diff --cached --quiet; then
              echo "ℹ️  Identical change already on main — nothing to commit"
              exit 0
            fi
            git commit \
              -m "feat(${TEAM}/openclaw): save identity ${FILE}" \
              -m "Triggered by: ${SAFE_ACTOR}"
          done
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key
