apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: mctl-agents-run
  annotations:
    workflows.argoproj.io/description: |
      Cluster-wide template for the mctl-agents pipeline. Three steps run
      sequentially through a 1Gi PVC `workdir`:
        1. clone-gitops — SSH-clone mctl-gitops via the shared deploy key
        2. run-orchestrator — ghcr.io/mctlhq/mctl-agents:<tag> with
           STATE_DIR pointing at agents-state/. RUN_MODE / RUN_SERVICE env
           vars (from workflow parameters) tell the Python orchestrator
           whether to do full / mentor-only / single-service.
        3. commit-and-push — commit any agents-state diff, push to main
           with rebase-on-conflict (5 retries).

      Triggered by:
        - cron via CronWorkflow `mctl-agents-daily` (mode=full, weekly Sat 00:00 UTC)
        - mctl-api MCP tools mctl_trigger_{agents_run,mentor_only,single_service}
          (each submits a Workflow that references this template via
          workflowTemplateRef + clusterScope:true with appropriate parameters)
spec:
  serviceAccountName: argo-workflow-sa
  imagePullSecrets:
    - name: ghcr-credentials
  # 14d TTL — must outlive the new successfulJobsHistoryLimit (14) on
  # cwft-mctl-agents-daily. Argo deletes a completed Workflow once
  # secondsAfterCompletion elapses, REGARDLESS of how the parent
  # CronWorkflow's history caps are set. With the default 1d here the
  # daily cron's 14-success cap was unreachable (Codex P1 on PR #147).
  ttlStrategy:
    secondsAfterCompletion: 1209600
  # Release the workdir PVC (and its 10 GB Hetzner volume) as soon as the
  # workflow finishes — success OR failure. Without this the Argo default
  # (OnWorkflowSuccess) keeps a failed run's volume attached for the full
  # 14-day ttlStrategy above, which leaked ~€6 of idle detached volumes in
  # June 2026.
  volumeClaimGC:
    strategy: OnWorkflowCompletion
  activeDeadlineSeconds: 3600
  entrypoint: run-agents
  # onExit always fires after the entrypoint completes — Succeeded, Failed,
  # or Error. Posts a one-line Telegram summary to the admins chat so the
  # operator doesn't have to poll mctl_list_recent_agent_runs after each
  # mctl_trigger_*.
  onExit: notify-telegram
  # Serialize with every other workflow that pushes to mctl-gitops main
  # (wft-delete-tenant et al.). Without this, cron + on-demand MCP triggers
  # could race the commit-and-push step — `git pull --rebase` retries do
  # eventually win but waste agent-runtime PVC time and produce noisy logs.
  # Same mutex name as wft-delete-tenant.yaml so we share the lock.
  synchronization:
    mutex:
      name: mctl-gitops-main-writes

  # Loki/promtail relabels pod label `app.kubernetes.io/name` -> stream label
  # `app` and `mctl.ai/team` -> stream label `team`
  # (platform-gitops/bootstrap/templates/observability/loki.yaml
  # relabel_configs). Argo Workflow pods otherwise carry only
  # workflows.argoproj.io/* labels, so mctl_get_service_logs(team=admins,
  # service=mctl-agents) returned zero lines even across the 2026-07-15
  # incident-17841555 failure windows. Set them here so every pod this
  # template spawns (clone / run / run-fallback / commit / notify) is
  # queryable by team+app.
  podMetadata:
    labels:
      app.kubernetes.io/name: mctl-agents
      mctl.ai/team: admins

  arguments:
    parameters:
      - name: mode
        value: "full"
        # full | mentor-only | single-service
      - name: service
        value: ""
        # Required only when mode=single-service. Validated by the Python
        # orchestrator against config/settings.py SERVICES (exit 1 on mismatch).

  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
  volumes:
    - name: deploy-key
      secret:
        secretName: mctl-gitops-deploy-key
        defaultMode: 0600

  templates:
    - name: run-agents
      steps:
        - - name: clone
            template: clone-gitops
        - - name: run
            template: run-orchestrator
            arguments:
              parameters:
                - name: oauth-key
                  value: claude-code-oauth-token
                - name: is-fallback
                  value: "false"
            # continueOn so the fallback attempt and commit still run when the
            # primary fails (most commonly the account-1 OAuth token hitting
            # its five_hour usage limit → HTTP 429). Same rationale as
            # cwft-mctl-agents-implement.
            continueOn:
              failed: true
              error: true
        # Fallback retry on a SECOND Claude account, mirroring
        # cwft-mctl-agents-implement: the incident-responder cron shares
        # `claude-code-oauth-token` with every other pipeline consumer, so a
        # quota exhaustion event otherwise hard-fails EVERY 30-min tick until
        # the window resets (observed 2026-07-12 18:16–20:16 UTC, 5 failed
        # runs). If token-2 is not seeded the fallback fails (exit 1) so the
        # run reports Failed instead of being masked as success.
        - - name: run-fallback
            template: run-orchestrator
            when: "{{steps.run.status}} != Succeeded"
            arguments:
              parameters:
                - name: oauth-key
                  value: claude-code-oauth-token-2
                - name: is-fallback
                  value: "true"
            continueOn:
              failed: true
              error: true
        - - name: commit
            template: commit-and-push
        # Truthful status: run + fallback use continueOn so commit always
        # persists partial state, which would otherwise leave the workflow
        # GREEN when both attempts failed. Never fails a legitimate no-op —
        # a "nothing to do" run still has run=Succeeded.
        - - name: assert-produced
            template: assert-attempt
            arguments:
              parameters:
                - name: primary
                  value: "{{steps.run.status}}"
                - name: fallback
                  value: "{{steps.run-fallback.status}}"

    # ── 1. SSH-clone mctl-gitops into shared volume ───────────────────────
    - name: clone-gitops
      script:
        image: alpine/git:2.43.0
        command: [sh]
        source: |
          set -e
          apk add --no-cache openssh-client ca-certificates
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          git clone --depth=1 git@github.com:mctlhq/mctl-gitops.git /workdir/mctl-gitops
          mkdir -p /workdir/mctl-gitops/platform-gitops/agents-state
          echo "✓ gitops cloned"
        volumeMounts:
          - name: workdir
            mountPath: /workdir
          - name: deploy-key
            mountPath: /secrets/deploy-key

    # ── 2. Run mctl-agents orchestrator with state mounted ────────────────
    - name: run-orchestrator
      inputs:
        parameters:
          # Which Vault key under mctl-agents-secrets holds the OAuth token for
          # this attempt. Primary step passes claude-code-oauth-token; the
          # fallback step passes claude-code-oauth-token-2 (a second account).
          # Same convention as cwft-mctl-agents-implement.
          - name: oauth-key
            value: claude-code-oauth-token
          # "true" only for the fallback retry: fail loudly if token-2 is
          # absent instead of masking the double-failure as success.
          - name: is-fallback
            value: "false"
      container:
        image: ghcr.io/mctlhq/mctl-agents:1.18.0
        imagePullPolicy: IfNotPresent
        # Explicit command + args so Argo's emissary executor doesn't need
        # to introspect the registry for ENTRYPOINT/CMD.
        command: ["/entrypoint.sh"]
        args:
          - "sh"
          - "-c"
          - |
            set -e
            # Fallback-token guard, mirroring cwft-mctl-agents-implement's
            # run-implementer: on the account-2 retry an unseeded token-2
            # (empty env via optional:true) must fail non-zero so the run
            # reports Failed instead of being masked as success. A missing
            # PRIMARY token still fails loudly at SDK auth.
            if [ "$IS_FALLBACK" = "true" ]; then
              if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
                echo "❌ Primary attempt failed and no fallback token (claude-code-oauth-token-2) is set — cannot fall back." >&2
                exit 1
              fi
              echo "↻ Primary attempt did not succeed — retrying on fallback OAuth token (account 2)."
            fi
            exec python -m orchestrator.run_all
        env:
          - name: IS_FALLBACK
            value: "{{inputs.parameters.is-fallback}}"
          - name: STATE_DIR
            value: /workdir/mctl-gitops/platform-gitops/agents-state
          # Run-mode dispatch (Phase 2 of plan logical-floating-lemon §Phase 2).
          # Python orchestrator reads these and branches:
          #   full           → all service-agents in parallel + mentor
          #   mentor-only    → mentor only (cheap re-aggregation)
          #   single-service → one service-agent named in RUN_SERVICE; no mentor
          - name: RUN_MODE
            value: "{{workflow.parameters.mode}}"
          - name: RUN_SERVICE
            value: "{{workflow.parameters.service}}"
          # Auth: OAuth (Claude Pro/Max). NOT API key — runs within owner's
          # subscription. Do NOT add ANTHROPIC_API_KEY in parallel.
          # Key is parameterized: primary uses claude-code-oauth-token, the
          # fallback step uses claude-code-oauth-token-2. optional:true lets
          # the fallback pod schedule when token-2 is absent (the guard
          # script then exits 1); a missing PRIMARY token still fails loudly
          # at SDK auth.
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: "{{inputs.parameters.oauth-key}}"
                optional: true
          # Optional — agents degrade gracefully (no mcp__mctl__* tools)
          # if Vault doesn't have mctl-token yet.
          - name: MCTL_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: mctl-token
                optional: true
          # GitHub PAT for the researcher's sibling-repo scan.
          # Without it the researcher falls through to the unauthenticated
          # GitHub API (60 req/h, no private-repo access) and reports
          # "no signal: <repo> — 404 (private repo, GITHUB_TOKEN not set)"
          # for every private mctlhq/* repo, producing single-repo-only
          # proposals. Same secret + key as the Tier 2 implementer.
          # Marked optional so the cron run still works (degraded) if
          # Vault hasn't been seeded yet.
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: github-token
                optional: true
          - name: SERVICE_AGENT_BUDGET_USD
            value: "5.00"
          - name: MENTOR_BUDGET_USD
            value: "10.00"
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits:   { cpu: 2000m, memory: 2Gi }
        volumeMounts:
          - name: workdir
            mountPath: /workdir

    # ── 3. Commit & push back to mctl-gitops ──────────────────────────────
    - name: commit-and-push
      # Bounded retry around the actual gitops-write step. The workflow-level
      # `mctl-gitops-main-writes` mutex above only serializes this pipeline
      # against OTHER Argo Workflows (implement/investigate/delete-tenant) —
      # it does NOT protect against `gitops-bump.yaml` / `release-deploy.yaml`,
      # which push straight to main from GitHub Actions with no mutex (see
      # CLAUDE.md "Branch Protection Exception"). A burst of image-tag bumps
      # can still race this step's own 5x rebase-and-push loop below to
      # exhaustion. incident-17841555: mctl-agents-incidents failed 20x on
      # 2026-07-15 with variable durations consistent with write contention,
      # and a concurrent mctl-agents-implement run was observed blocked on
      # this same mutex at investigation time. Retrying the whole step (not
      # just the in-script loop) with backoff gives contention more time to
      # clear before the run is reported Failed.
      retryStrategy:
        limit: "3"
        retryPolicy: OnFailure
        backoff:
          duration: "30s"
          factor: "2"
          maxDuration: "5m"
      script:
        image: alpine/git:2.43.0
        command: [sh]
        env:
          # Workflow params injected as env vars so the shell layer can quote
          # them safely. Direct `workflow.parameters.*` (Argo template syntax) interpolation is
          # a shell-injection vector — and this pod has the gitops deploy key
          # + push access to main.
          - name: WORKFLOW_MODE
            value: "{{workflow.parameters.mode}}"
          - name: WORKFLOW_SERVICE
            value: "{{workflow.parameters.service}}"
        source: |
          set -e
          apk add --no-cache openssh-client ca-certificates
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          cd /workdir/mctl-gitops
          git config user.name "mctl-agents[bot]"
          git config user.email "mctl-agents[bot]@users.noreply.github.com"

          # Stage only agents-state (paranoia: nothing else)
          git add platform-gitops/agents-state/

          if git diff --cached --quiet; then
            echo "ℹ️  No new proposals or digest changes — nothing to commit."
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          if [ "$WORKFLOW_MODE" = "single-service" ] && [ -n "$WORKFLOW_SERVICE" ]; then
            MSG="chore(agents): ${WORKFLOW_MODE} ${WORKFLOW_SERVICE} ${DATE}"
          else
            MSG="chore(agents): ${WORKFLOW_MODE} run ${DATE}"
          fi
          git commit -m "$MSG"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ Pushed agents-state changes"
              exit 0
            fi
            echo "⚠️  Push failed (attempt ${i}), rebasing..."
            git pull --rebase origin main
          done
          echo "❌ Push failed after 5 attempts"
          exit 1
        volumeMounts:
          - name: workdir
            mountPath: /workdir
          - name: deploy-key
            mountPath: /secrets/deploy-key

    # ── 3b. Truthful-status assert (same pattern as cwft-mctl-agents-implement) ─
    - name: assert-attempt
      inputs:
        parameters:
          - name: primary
          - name: fallback
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          PRIMARY='{{inputs.parameters.primary}}'
          FALLBACK='{{inputs.parameters.fallback}}'
          echo "primary attempt: ${PRIMARY:-<none>}   fallback attempt: ${FALLBACK:-<none>}"
          if [ "$PRIMARY" = "Succeeded" ] || [ "$FALLBACK" = "Succeeded" ]; then
            echo "✓ An attempt succeeded — workflow status reflects real work."
            exit 0
          fi
          echo "❌ Neither the primary attempt nor the account-2 fallback succeeded — no durable result produced." >&2
          echo "   Most often the Claude five_hour usage limit / HTTP 429 on both accounts, or token-2 unset." >&2
          exit 1

    # ── 4. Telegram + incident notification (onExit handler — always fires) ─
    # Posts a one-line summary to admins chat with mode, status, duration,
    # and a link to the workflow UI. Best-effort: failures don't fail the
    # workflow itself (we already finished the real work by this point).
    #
    # On Failed / Error also POSTs to mctl-api `/api/v1/incidents` so the
    # cron-driven failure becomes a tracked incident in mctl_list_incidents
    # rather than a Telegram-only one-shot. Without this, scheduled cron
    # failures (mctl-agents-daily firing on a broken day) had no record in
    # the alert store and so never showed up in the incident dashboard —
    # exposed during the 2026-05-07 ESO triage. See plan
    # ~/.claude/plans/mctl-agents-daily-cron-visibility.md (G3).
    - name: notify-telegram
      script:
        image: alpine:3.19
        command: [sh]
        env:
          - name: TG_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: telegram-bot-token
                optional: true
          - name: TG_CHAT_ID
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: telegram-chat-id
                optional: true
          - name: MCTL_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: mctl-token
                optional: true
          # Workflow params + status injected as env vars so the shell layer
          # can quote them safely. Avoid raw `workflow.parameters.*` (Argo template syntax)
          # interpolation in the script body.
          - name: WORKFLOW_STATUS
            value: "{{workflow.status}}"
          # Identifies which CWFT this onExit handler belongs to — used to
          # namespace the incident fingerprint below so run/implement/shepherd
          # failures never collide with each other.
          - name: WORKFLOW_TEMPLATE_KIND
            value: "run"
          - name: WORKFLOW_MODE
            value: "{{workflow.parameters.mode}}"
          - name: WORKFLOW_SERVICE
            value: "{{workflow.parameters.service}}"
          - name: WORKFLOW_NAME
            value: "{{workflow.name}}"
          - name: WORKFLOW_DURATION
            value: "{{workflow.duration}}"
        source: |
          set +e
          apk add --no-cache curl ca-certificates jq >/dev/null 2>&1

          # Stable dedup key for this recurring job. Two failures of the same
          # {mode, service} combination collapse into one open incident
          # instead of a fresh one per run (mctl-api fingerprint upsert);
          # a differing mode/service still gets its own incident.
          FINGERPRINT="workflow_failed:${WORKFLOW_TEMPLATE_KIND}:${WORKFLOW_MODE}:${WORKFLOW_SERVICE}"

          case "$WORKFLOW_STATUS" in
            Succeeded) ICON="✅" ;;
            Failed)    ICON="❌" ;;
            Error)     ICON="⚠️" ;;
            *)         ICON="⏳" ;;
          esac
          if [ "$WORKFLOW_MODE" = "single-service" ] && [ -n "$WORKFLOW_SERVICE" ]; then
            SUBJECT="${WORKFLOW_MODE} ${WORKFLOW_SERVICE}"
          else
            SUBJECT="${WORKFLOW_MODE}"
          fi
          UI_URL="https://workflows.mctl.ai/workflows/argo-workflows/${WORKFLOW_NAME}"
          TEXT="${ICON} mctl-agents: ${SUBJECT} — ${WORKFLOW_STATUS} (${WORKFLOW_DURATION}s)\n${UI_URL}"

          # Telegram leg.
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s -o /dev/null -w 'telegram http=%{http_code}\n' \
              -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TG_CHAT_ID}\",\"text\":\"${TEXT}\",\"disable_web_page_preview\":true}"
          else
            echo "ℹ️  TG_BOT_TOKEN or TG_CHAT_ID not set; skipping Telegram leg."
          fi

          # Incident leg — only on terminal failure/success.
          if { [ "$WORKFLOW_STATUS" = "Failed" ] || [ "$WORKFLOW_STATUS" = "Error" ]; } && [ -n "$MCTL_TOKEN" ]; then
            # Workflow name is the natural dedup key — a single Workflow
            # only finishes once, so the same id never collides on retry.
            # Suffix the id with the onExit-run epoch second so each
            # `argo retry <wf>` produces a fresh incident. Argo retries
            # reuse the same Workflow object/name and a stable
            # `workflow.uid`, so without this suffix a retry that
            # fails again would POST a duplicate id and the alert
            # store would dedup-reject it (Codex P2 on PR #149). Real
            # cross-run dedup now happens via `fingerprint` below.
            INCIDENT_ID="argo-${WORKFLOW_NAME}-$(date +%s)"
            SUMMARY="mctl-agents-run ${SUBJECT} ${WORKFLOW_STATUS} after ${WORKFLOW_DURATION}s — ${UI_URL}"
            # JSON-encode dynamic fields via jq so a quote / newline /
            # backslash in WORKFLOW_SERVICE / WORKFLOW_SLUG cannot break
            # the request body. printf-style construction would let a
            # crafted slug like `; rm` / `\"` reject the POST silently
            # and the failure-incident would never reach the alert store.
            BODY=$(jq -nc --arg id "$INCIDENT_ID" --arg summary "$SUMMARY" --arg fingerprint "$FINGERPRINT" '{
              id: $id,
              source: "argo-workflows",
              type: "workflow_failed",
              tenant: "admins",
              service: "mctl-agents",
              summary: $summary,
              severity: "warning",
              # "analyzing", not "open": the incident-responder discovery
              # query only picks up status=analyzing, and nothing in mctl-api
              # ever promotes open->analyzing — a status of "open" here means
              # the incident sits unanalyzed forever (observed 2026-07-12:
              # 6 self-reported workflow_failed incidents never picked up).
              status: "analyzing",
              fingerprint: $fingerprint
            }')
            curl -s -o /dev/null -w 'incident http=%{http_code}\n' \
              -X POST "https://api.mctl.ai/api/v1/incidents" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${MCTL_TOKEN}" \
              -d "$BODY"
          elif [ "$WORKFLOW_STATUS" = "Succeeded" ] && [ -n "$MCTL_TOKEN" ]; then
            # Close the loop: the same recurring job finally succeeded, so
            # resolve any open incident sharing this fingerprint. No-op if
            # none exists (e.g. this was already a clean run).
            RESOLVE_BODY=$(jq -nc --arg tenant "admins" --arg fingerprint "$FINGERPRINT" '{tenant: $tenant, fingerprint: $fingerprint}')
            curl -s -o /dev/null -w 'resolve http=%{http_code}\n' \
              -X POST "https://api.mctl.ai/api/v1/incidents/resolve-by-fingerprint" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${MCTL_TOKEN}" \
              -d "$RESOLVE_BODY"
          else
            echo "ℹ️  Workflow ${WORKFLOW_STATUS} or MCTL_TOKEN missing; skipping incident leg."
          fi
          # Non-zero curl exit shouldn't fail this onExit step.
          exit 0
