apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: mctl-agents-shepherd
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: |
      Every-hour (HH:00) trigger for the Tier 3 PR shepherd.

      All workflow logic lives in ClusterWorkflowTemplate
      `mctl-agents-shepherd` (cwft-mctl-agents-shepherd.yaml). This
      CronWorkflow is a thin wrapper that submits a Workflow with no
      service / slug filter, so the shepherd processes every proposal
      whose .status.yaml is in {implemented, review-fixing}.

      Other entry points reference the same template with different
      parameters:
        - operator submitting a one-shot Workflow that references this
          CWFT (manual triage, dry-run, single-proposal sweep)

      Active. Un-suspended via gitops on 2026-05-01 after the first
      one-shot real run (mctl-agents-shepherd-712b9f8e) successfully
      flipped 11 proposals (9 to `merged`, 2 to `rejected`) with no
      false positives.
spec:
  # `0 * * * *` — fires at HH:00 every hour (24 ticks/day). A tick with
  # no proposals in {implemented, review-fixing} is a cheap no-op (one
  # glob + exit). Contends with rotate-mctl-agent-github-token (also :00)
  # on the `mctl-gitops-main-writes` mutex — Forbid drops overlaps cleanly.
  # Was `30 */2 * * *` (12 ticks/day); increased 2026-05-23 to reduce
  # worst-case PR-sit-time from ~2h to ~1h.
  schedule: "0 * * * *"
  timezone: "UTC"
  # Forbid: never overlap two shepherd ticks. They all contend on the
  # same `mctl-gitops-main-writes` mutex anyway, and a queued tick
  # would only delay the next genuine cron-driven one. Drop overlaps
  # cleanly instead.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  # Counts, NOT days — Argo retains the last N succeeded / N failed
  # Workflow objects regardless of age. For shepherd's `0 * * * *` cron
  # (24 ticks/day) 48 ≈ 2 days of successful triage history and 24
  # ≈ 1 day of failures. Kept window matches the typical
  # incident-postmortem reach without bloating etcd.
  #
  # Default was 3 (~6 hours), which masked the firing pattern during
  # the 2026-05-07 ESO triage. See plan
  # ~/.claude/plans/mctl-agents-daily-cron-visibility.md.
  successfulJobsHistoryLimit: 48
  failedJobsHistoryLimit: 24
  # Active — un-suspended after the smoke test (one-shot real run on
  # 2026-05-01 flipped 11 proposals correctly). Schedule fires every
  # hour UTC and the workflow contends on the shared
  # `mctl-gitops-main-writes` mutex with the implementer / agents-run
  # workflows, so back-pressure is bounded.
  suspend: false
  workflowSpec:
    workflowTemplateRef:
      name: mctl-agents-shepherd
      clusterScope: true
    arguments:
      parameters:
        - name: service
          value: ""
        - name: slug
          value: ""
        - name: dry_run
          value: "false"
