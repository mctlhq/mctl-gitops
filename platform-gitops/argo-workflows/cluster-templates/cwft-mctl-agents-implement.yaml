apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: mctl-agents-implement
  annotations:
    workflows.argoproj.io/description: |
      Tier 2 — implementer.

      Takes accepted proposals from platform-gitops/agents-state/<svc>/proposals/
      (those with .status.yaml status=accepted) and opens PRs in the matching
      sibling repos under mctlhq/. Runs:

        1. clone-gitops — SSH-clone mctl-gitops via the shared deploy key.
        2. run-implementer — orchestrator/run_implementer.py inside
           ghcr.io/mctlhq/mctl-agents:1.14.1. The Python script gh-clones the
           target sibling repo into /tmp, runs the Claude Agent SDK with the
           per-service implementer.md sub-agent, pushes the branch, opens a PR.
        3. commit-and-push — commits .status.yaml updates back to gitops main.

      Triggered by:
        - CronWorkflow mctl-agents-implement (every hour at :20 UTC)
        - mctl-api MCP tool mctl_trigger_implementer (admin-only)
        - operator submitting a Workflow that references this CWFT
spec:
  serviceAccountName: argo-workflow-sa
  imagePullSecrets:
    - name: ghcr-credentials
  ttlStrategy:
    secondsAfterCompletion: 86400
  # Release the workdir PVC (and its 10 GB Hetzner volume) as soon as the
  # workflow finishes — success OR failure. The Argo default
  # (OnWorkflowSuccess) keeps a failed run's volume attached until the
  # ttlStrategy above deletes the whole workflow (up to 14 days for the run
  # template), which leaked ~€6 of idle detached volumes in June 2026.
  volumeClaimGC:
    strategy: OnWorkflowCompletion
  # Implementer pipeline can be slow: clone two repos + Claude SDK + push + PR.
  # Bump above the cron run's 1h budget.
  activeDeadlineSeconds: 7200
  entrypoint: implement-proposals
  onExit: notify-telegram
  # Same shared mutex as cwft-mctl-agents-run — both push to mctl-gitops main.
  synchronization:
    mutex:
      name: mctl-gitops-main-writes

  arguments:
    parameters:
      - name: service
        value: ""
        # Optional. When set, only proposals under that service's dir are
        # considered. Validated by run_implementer.py against config/settings.py
        # SERVICES (exit 1 on mismatch).
      - name: slug
        value: ""
        # Optional. When set, only that slug is implemented (across services
        # if `service` is empty too).
      - name: force
        value: "false"
        # When "true", a proposal stuck in `in-progress` (previous attempt
        # crashed mid-run) is retried. Default: skip such proposals.

  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            # Bigger than cwft-mctl-agents-run because the implementer also
            # gh-clones each target sibling repo into /tmp inside the same pod.
            # Worst case: ~10 sibling clones × ~500 MB = 5 GiB.
            storage: 8Gi
  volumes:
    - name: deploy-key
      secret:
        secretName: mctl-gitops-deploy-key
        defaultMode: 0600

  templates:
    - name: implement-proposals
      steps:
        - - name: clone
            template: clone-gitops
        # Restore any previously-saved Go module cache (see restore-go-cache
        # below) so a Go-repo implementer run (currently only mctl-telegram)
        # doesn't re-download the whole gotd/td dependency graph from a cold
        # GOPATH every single time. No-op in ~1s for a non-Go run.
        # continueOn: this is a purely optional performance cache — if
        # minio-cache-creds hasn't synced yet or MinIO is briefly unhealthy,
        # implementation must still proceed cold rather than the whole run
        # failing before run-implementer even starts (codex P2 finding on
        # PR #603).
        - - name: restore-go-cache
            template: restore-go-cache
            continueOn:
              failed: true
              error: true
        - - name: implement
            template: run-implementer
            arguments:
              parameters:
                - name: oauth-key
                  value: claude-code-oauth-token
                - name: is-fallback
                  value: "false"
            # run_implementer.py writes .status.yaml updates (in-progress →
            # implemented/error) to the worktree BEFORE any failure that may
            # crash the step. Without continueOn, Argo would skip commit-and-push
            # on non-zero exit, those updates would never persist back to
            # mctl-gitops main, and the next run would reprocess the same
            # proposal — duplicate PR attempts. Letting commit run unconditionally
            # makes the status durable; commit-and-push already handles the
            # "no diff" case via `git diff --cached --quiet`.
            #
            # Both failed AND error: Argo distinguishes app-level non-zero
            # exits (Failed) from pod-level errors like OOMKilled / deadline /
            # controller errors (Error). Both can leave partial .status.yaml
            # writes, so commit-and-push must run in either case.
            continueOn:
              failed: true
              error: true
        # Fallback retry on a SECOND Claude account. If the primary attempt did
        # not succeed (most commonly the account-1 OAuth token hitting its
        # five_hour usage limit → HTTP 429), rerun the SAME scope on the
        # account-2 token `claude-code-oauth-token-2`. Mirrors claude-review.yml's
        # CLAUDE_CODE_OAUTH_TOKEN_2 fallback. is-fallback=true makes the rerun
        # force-reprocess the in-progress claim the primary left. If token-2 is
        # not seeded the fallback fails (exit 1) so the run reports Failed
        # instead of being masked as success.
        - - name: implement-fallback
            template: run-implementer
            when: "{{steps.implement.status}} != Succeeded"
            arguments:
              parameters:
                - name: oauth-key
                  value: claude-code-oauth-token-2
                - name: is-fallback
                  value: "true"
            continueOn:
              failed: true
              error: true
        - - name: commit
            template: commit-and-push
        # Save whatever Go module cache got populated back to MinIO,
        # regardless of whether implement/implement-fallback succeeded —
        # even a run that hit its budget cap before finishing still
        # downloaded real dependencies worth keeping for next time. Runs
        # AFTER commit (not before): if a large mirror upload stalls or
        # runs long, it must never risk the workflow hitting its
        # activeDeadlineSeconds before the .status.yaml commit lands —
        # that would silently leave a real implementation attempt stuck
        # in-progress with no durable record (codex P2 finding on PR #603).
        # activeDeadlineSeconds bounds worst-case stall time so this
        # optional step can never eat meaningfully into the overall budget.
        - - name: save-go-cache
            template: save-go-cache
            continueOn:
              failed: true
              error: true
        # Truthful status. implement + its fallback run with continueOn so a
        # partial .status.yaml write still gets committed — but that also means
        # a crash (e.g. five_hour 429 on both accounts) would otherwise leave
        # the workflow GREEN while a proposal stays stuck in-progress with no
        # PR. Fail the run unless at least one attempt succeeded. A genuine
        # "nothing accepted to implement" run still has implement=Succeeded, so
        # this never fails a legitimate no-op.
        - - name: assert-produced
            template: assert-attempt
            arguments:
              parameters:
                - name: primary
                  value: "{{steps.implement.status}}"
                - name: fallback
                  value: "{{steps.implement-fallback.status}}"

    # ── 1. SSH-clone mctl-gitops into shared volume ───────────────────────
    - name: clone-gitops
      script:
        image: alpine/git:2.43.0
        command: [sh]
        source: |
          set -e
          apk add --no-cache openssh-client ca-certificates
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          git clone --depth=1 git@github.com:mctlhq/mctl-gitops.git /workdir/mctl-gitops
          mkdir -p /workdir/mctl-gitops/platform-gitops/agents-state
          # Pre-create a PVC-backed scratch dir for run_implementer's
          # `gh repo clone` targets. The orchestrator picks up
          # `tempfile.gettempdir()` which honors TMPDIR — see run-implementer
          # env below. Without this, clones would land on the pod's
          # ephemeral storage and the 8Gi PVC sizing in this template would
          # be ineffective for multi-repo runs (codex P2 finding).
          mkdir -p /workdir/clones
          echo "✓ gitops cloned"
        volumeMounts:
          - name: workdir
            mountPath: /workdir
          - name: deploy-key
            mountPath: /secrets/deploy-key

    # ── 2. Run implementer orchestrator ───────────────────────────────────
    # NB: 1.11.0 carries the generic implementer fallback (agents/_generic/)
    # and the read-merge-write update_status_yaml that preserves the `source`
    # block on issue-driven proposals, plus `Closes <repo>#N` in the PR body.
    # 1.8.0 was the first tag with `gh` CLI baked in (mctl-agents PR #10);
    # tags before that crash with ImportError at this step.
    - name: run-implementer
      inputs:
        parameters:
          # Which Vault key under mctl-agents-secrets holds the OAuth token for
          # this run. Primary step passes claude-code-oauth-token; the
          # fallback step passes claude-code-oauth-token-2 (a second account).
          - name: oauth-key
            value: claude-code-oauth-token
          # "true" only for the fallback retry: skip cleanly if token-2 absent,
          # and force-reprocess the primary's in-progress claim.
          - name: is-fallback
            value: "false"
      container:
        image: ghcr.io/mctlhq/mctl-agents:1.17.0
        imagePullPolicy: IfNotPresent
        command: ["/entrypoint.sh"]
        args:
          - "sh"
          - "-c"
          - |
            set -e
            # Fallback-token handling. When this run is the account-2 retry
            # (is-fallback=true): if claude-code-oauth-token-2 is not seeded
            # (empty token) fail non-zero so the run reports Failed instead of
            # being masked as success; otherwise mark the run forced so it
            # reprocesses the in-progress claim the primary attempt left behind.
            # Primary runs (is-fallback=false) are untouched — a missing primary
            # token still fails loudly at SDK auth.
            if [ "$IS_FALLBACK" = "true" ]; then
              if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
                echo "❌ Primary attempt failed and no fallback token (claude-code-oauth-token-2) is set — cannot fall back." >&2
                echo "   Exiting non-zero so the run reports Failed instead of being masked as success." >&2
                exit 1
              fi
              echo "↻ Primary attempt did not succeed — retrying on fallback OAuth token (account 2)."
              WORKFLOW_FORCE=true
            fi
            # Wire git's HTTPS credential helper to the same GITHUB_TOKEN
            # gh CLI uses. Without this, `gh repo clone` succeeds (it speaks
            # to the API directly) but the implementer's later `git push -u
            # origin <branch>` falls through to interactive auth and fails
            # with "could not read Username for 'https://github.com'".
            # `gh auth setup-git` installs `gh auth git-credential` as the
            # credential helper, which reads GITHUB_TOKEN from the env at
            # push time. Skip silently if no token (fail-closed at gh clone
            # already; this just keeps the path clean for offline smoke).
            if [ -n "$GITHUB_TOKEN" ]; then
              gh auth setup-git
            fi
            # Read params from env, NOT inline workflow.parameters interpolation
            # (Argo template syntax): a value like `; rm -rf /` would otherwise be
            # spliced straight into the shell command. Build argv via `set --`
            # so each flag/value pair is a separate, properly quoted token.
            set -- python -m orchestrator.run_implementer
            if [ -n "$WORKFLOW_SERVICE" ]; then
              set -- "$@" --service "$WORKFLOW_SERVICE"
            fi
            if [ -n "$WORKFLOW_SLUG" ]; then
              set -- "$@" --slug "$WORKFLOW_SLUG"
            fi
            if [ "$WORKFLOW_FORCE" = "true" ]; then
              set -- "$@" --force
            fi
            printf '→'
            printf ' %s' "$@"
            printf '\n'
            exec "$@"
        env:
          # Workflow params injected as env vars so the shell layer can quote
          # them safely. Direct `workflow.parameters.*` (Argo template syntax) interpolation in
          # the script body is a shell-injection vector.
          - name: WORKFLOW_SERVICE
            value: "{{workflow.parameters.service}}"
          - name: WORKFLOW_SLUG
            value: "{{workflow.parameters.slug}}"
          - name: WORKFLOW_FORCE
            value: "{{workflow.parameters.force}}"
          # Same STATE_DIR layout as cwft-mctl-agents-run — entrypoint.sh
          # symlinks <state>/<svc>/proposals onto /app/agents/<svc>/proposals/
          # so the SDK sees them, and run_implementer reads them directly.
          - name: STATE_DIR
            value: /workdir/mctl-gitops/platform-gitops/agents-state
          # Redirect Python's `tempfile.gettempdir()` (used by
          # run_implementer._clone_target) onto the PVC so each
          # `gh repo clone` lands in PVC-backed storage — not the pod's
          # ephemeral filesystem. clone-gitops creates this dir; if it
          # doesn't exist Python's mkstemp / mkdtemp will error.
          - name: TMPDIR
            value: /workdir/clones
          # Auth: OAuth (Claude Pro/Max). Same secret as the run pipeline.
          # Key is parameterized: the primary step uses claude-code-oauth-token,
          # the fallback step uses claude-code-oauth-token-2. optional:true lets
          # the fallback pod schedule when token-2 is absent (the script then
          # exits 0); a missing PRIMARY token still fails loudly at SDK auth.
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: "{{inputs.parameters.oauth-key}}"
                optional: true
          - name: IS_FALLBACK
            value: "{{inputs.parameters.is-fallback}}"
          # GitHub PAT for `gh repo clone` + `gh pr create`. PAT must have
          # repo write scope on mctlhq/*. Sub-plan B introduces this key in
          # the shared secret (same Vault path) — uses `dataFrom: extract`,
          # so no manifest change is needed once Vault has it. If the key
          # is absent, gh CLI falls through to interactive login and the
          # implementer fails fast at clone-target step. Marked optional:
          # local smoke runs without GITHUB_TOKEN can still exercise the
          # discovery path (--dry-run).
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: github-token
                optional: true
          # Optional MCP token, same convention as run pipeline.
          - name: MCTL_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: mctl-token
                optional: true
          # Soft cap per proposal. Raised 3.00 -> 10.00: large issue-driven
          # proposals (e.g. a full observability layer) blew the $3 cap and
          # the SDK raised error_max_budget_usd before opening a PR. Small
          # proposals still finish well under this.
          # Raised 10.00 -> 20.00: mctl-telegram issue-287 (send_media tool)
          # hit error_max_budget_usd at $10.10/140 tool uses with real,
          # near-complete work (tests passing, at gofmt) still unfinished —
          # a Go service with no per-service implementer image pays a cold
          # Go-toolchain-bootstrap + full gotd/td module-cache build tax on
          # top of the actual implementation cost every single run.
          - name: IMPLEMENTER_BUDGET_USD
            value: "20.00"
          # Point any Go toolchain the implementer installs (currently only
          # mctl-telegram) at the module cache restored by restore-go-cache /
          # persisted by save-go-cache, instead of the default ~/go inside
          # this ephemeral per-run PVC. Harmless no-op env var for non-Go
          # implementer runs. GOCACHE (compiled build cache, as opposed to
          # downloaded module source) is deliberately NOT pointed at the
          # MinIO-backed path — see restore-go-cache/save-go-cache below for
          # why compiled artifacts must not land in the shared cache bucket.
          - name: GOPATH
            value: /workdir/gocache/gopath
        resources:
          # memory bumped 4Gi -> 8Gi: the implementer sub-agent runs the
          # target repo's build as a sanity check; `go build ./...` on a
          # large Go service (e.g. mctl-telegram + gotd/td) on top of the
          # Claude SDK process exceeded 4Gi and the container was OOMKilled.
          # cpu bumped 2000m -> 3000m: observed pegged at the 2-core limit
          # during issue-283's run (Go toolchain bootstrap + SDK process
          # contending for CPU), same profile as an earlier real stall.
          requests: { cpu: 200m, memory: 1Gi }
          limits:   { cpu: 3000m, memory: 8Gi }
        volumeMounts:
          - name: workdir
            mountPath: /workdir

    # ── 2b. Restore Go MODULE cache from MinIO ────────────────────────────
    # Reuses the existing in-cluster MinIO (`platform-cache` bucket, same
    # instance + Vault path as the openclaw whisper-cli build cache — see
    # platform-gitops/argo-workflows/service-templates/openclaw/values.yaml.tpl)
    # instead of provisioning a new PVC. `workdir` is a fresh per-workflow-run
    # volumeClaimTemplate (released on completion), so without this every Go
    # repo run re-downloads its whole module graph (e.g. mctl-telegram +
    # gotd/td) from a cold GOPATH — this bridges that gap across separate
    # workflow runs via object storage instead of a persistent volume.
    # `mc mirror` (not tar) so the step only depends on the `mc` binary
    # itself — no assumption that the minio/mc image ships tar/gzip.
    #
    # Deliberately GOPATH (downloaded third-party module source) ONLY, never
    # GOCACHE (compiled build cache derived from the target repo's own
    # source). The `platform-cache` bucket + minio-cache-creds credential is
    # also used by openclaw tenant configs (see
    # platform-gitops/services/labs/openclaw/values.yaml), so anything
    # written here is readable from tenant workloads sharing that
    # credential — compiled artifacts of a private repo must not land there
    # (codex P2 finding on PR #603). Module source is comparatively low-risk
    # (public OSS dependency code either way).
    #
    # Non-fatal by design (set +e, no `mc alias set ... || exit`): this is a
    # purely optional performance cache. If minio-cache-creds hasn't synced
    # yet or MinIO is briefly unhealthy, the run must still proceed cold
    # instead of failing before run-implementer even starts (codex P2
    # finding on PR #603 — this step also has continueOn at the step-list
    # level as defense in depth for pod-level scheduling errors).
    - name: restore-go-cache
      script:
        image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
        command: [sh]
        env:
          - name: MINIO_ENDPOINT
            value: "http://minio.minio.svc.cluster.local:9000"
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-cache-creds
                key: access-key
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: minio-cache-creds
                key: secret-key
          - name: MINIO_BUCKET
            value: "platform-cache"
        source: |
          set +e
          mkdir -p /workdir/gocache/gopath
          mc alias set cache "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" --quiet 2>&1
          if mc mirror --quiet "cache/$MINIO_BUCKET/mctl-agents/gocache/gopath/" /workdir/gocache/gopath/ 2>&1; then
            echo "✓ Go module cache restored"
          else
            echo "ℹ️  No existing Go module cache in MinIO (or restore failed) — starting cold."
          fi
          exit 0
        resources:
          requests: { cpu: 50m, memory: 128Mi }
          limits:   { cpu: 500m, memory: 1Gi }
        activeDeadlineSeconds: 300
        volumeMounts:
          - name: workdir
            mountPath: /workdir

    # ── 2c. Save Go MODULE cache back to MinIO ────────────────────────────
    # Runs after commit (not before) — see the step-list comment above — and
    # after implement/implement-fallback regardless of outcome, since even a
    # run that hit its budget cap before opening a PR still downloaded real
    # dependencies worth keeping. Best-effort: a save failure must not fail
    # the whole workflow (the actual implementation result already landed).
    # GOPATH only, same private-artifact reasoning as restore-go-cache above.
    - name: save-go-cache
      script:
        image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
        command: [sh]
        env:
          - name: MINIO_ENDPOINT
            value: "http://minio.minio.svc.cluster.local:9000"
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: minio-cache-creds
                key: access-key
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: minio-cache-creds
                key: secret-key
          - name: MINIO_BUCKET
            value: "platform-cache"
        source: |
          set +e
          if [ -d /workdir/gocache/gopath ] && [ -n "$(find /workdir/gocache/gopath -maxdepth 3 -type f -print -quit 2>/dev/null)" ]; then
            mc alias set cache "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" --quiet
            mc mirror --quiet --overwrite /workdir/gocache/gopath/ "cache/$MINIO_BUCKET/mctl-agents/gocache/gopath/"
            if [ $? -eq 0 ]; then
              echo "✓ Go module cache saved"
            else
              echo "⚠️  Go module cache save failed (non-fatal, implementation result is unaffected)"
            fi
          else
            echo "ℹ️  No Go module cache populated this run — nothing to save."
          fi
          exit 0
        resources:
          requests: { cpu: 50m, memory: 128Mi }
          limits:   { cpu: 500m, memory: 1Gi }
        activeDeadlineSeconds: 300
        volumeMounts:
          - name: workdir
            mountPath: /workdir

    # ── 3. Commit & push back to mctl-gitops ──────────────────────────────
    # Only .status.yaml files should change in agents-state/ (run_implementer
    # writes them after each proposal). Defensive: stage only that subtree.
    - name: commit-and-push
      # Writes /workdir/activity ("yes"/"none") for notify-telegram to read
      # directly off the shared workdir PVC — NOT via Argo output parameters.
      # A `workflow.outputs.parameters.X` reference from onExit resolves fine
      # with exactly one such parameter (see degraded_apps on
      # cwft-mctl-agents-shepherd), but adding a SECOND one sourced from a
      # different step broke Argo's static validator workflow-wide
      # ("invalid spec: templates.notify-telegram: failed to resolve
      # {{workflow.outputs.parameters.activity}}", reproduced 2026-07-06 —
      # every CronWorkflow tick failed silently, `implement`/`issue-poll`
      # stopped scheduling entirely). The PVC file sidesteps that mechanism.
      script:
        image: alpine/git:2.43.0
        command: [sh]
        env:
          # Workflow params injected as env vars so the shell layer can quote
          # them safely. Direct `workflow.parameters.*` (Argo template syntax) interpolation in
          # the script body is a shell-injection vector — and this pod has
          # the gitops deploy key + push access to main, so a crafted
          # `service` / `slug` value could escalate from a malformed param
          # into arbitrary git operations against mctl-gitops.
          - name: WORKFLOW_SERVICE
            value: "{{workflow.parameters.service}}"
          - name: WORKFLOW_SLUG
            value: "{{workflow.parameters.slug}}"
        source: |
          set -e
          apk add --no-cache openssh-client ca-certificates
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          cd /workdir/mctl-gitops
          git config user.name "mctl-agents[bot]"
          git config user.email "mctl-agents[bot]@users.noreply.github.com"

          # Stage only .status.yaml updates under agents-state. Anything
          # else changed there (proposal bodies, digests, ad-hoc files left
          # by a crashed implementer) is NOT what this workflow should be
          # pushing back to gitops main — fail loudly instead of silently
          # broadening the commit scope.
          NON_STATUS_CHANGES="$(git status --porcelain -- 'platform-gitops/agents-state/' ':(exclude,glob)platform-gitops/agents-state/**/.status.yaml')"
          if [ -n "$NON_STATUS_CHANGES" ]; then
            echo "❌ Refusing to commit non-.status.yaml changes under platform-gitops/agents-state/:"
            printf '%s\n' "$NON_STATUS_CHANGES"
            exit 1
          fi

          # Short-circuit BEFORE `git add`: with `set -e`, a glob pathspec
          # that matches zero files (`fatal: pathspec ... did not match any
          # files`) would otherwise crash the workflow instead of becoming
          # a no-op. Happens on the very first run (no .status.yaml exist
          # yet) and on runs where zero proposals were accepted.
          STATUS_CHANGES="$(git status --porcelain -- ':(glob)platform-gitops/agents-state/**/.status.yaml')"
          if [ -z "$STATUS_CHANGES" ]; then
            echo "ℹ️  No .status.yaml updates — nothing to commit."
            echo -n "none" > /workdir/activity
            exit 0
          fi
          git add -- ':(glob)platform-gitops/agents-state/**/.status.yaml'

          if git diff --cached --quiet; then
            # Defensive: STATUS_CHANGES already proved there are matches,
            # but keep this guard in case `git add` ever ends up staging
            # an empty diff (e.g. a permissions-only change git ignores).
            echo "ℹ️  No status updates after staging — nothing to commit."
            echo -n "none" > /workdir/activity
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          if [ -n "$WORKFLOW_SLUG" ]; then
            MSG="chore(agents): implement ${WORKFLOW_SLUG} ${DATE}"
          elif [ -n "$WORKFLOW_SERVICE" ]; then
            MSG="chore(agents): implement ${WORKFLOW_SERVICE} ${DATE}"
          else
            MSG="chore(agents): implement run ${DATE}"
          fi
          git commit -m "$MSG"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ Pushed status updates"
              echo -n "yes" > /workdir/activity
              exit 0
            fi
            echo "⚠️  Push failed (attempt ${i}), rebasing..."
            git pull --rebase origin main
          done
          echo "❌ Push failed after 5 attempts"
          exit 1
        volumeMounts:
          - name: workdir
            mountPath: /workdir
          - name: deploy-key
            mountPath: /secrets/deploy-key

    # ── 3b. Assert at least one attempt succeeded ─────────────────────────
    # Without this, the continueOn on implement/implement-fallback plus a
    # commit that only persists whatever .status.yaml was written would report
    # the whole workflow as Succeeded even when every attempt crashed (e.g.
    # five_hour 429) and a proposal is left stuck in-progress with no PR.
    # Receives the two step statuses and fails iff neither is "Succeeded".
    # Omitted steps resolve to "Omitted" (when implement succeeds, the fallback
    # is skipped) — harmless, the primary clause already passes in that case.
    - name: assert-attempt
      inputs:
        parameters:
          - name: primary
          - name: fallback
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          PRIMARY='{{inputs.parameters.primary}}'
          FALLBACK='{{inputs.parameters.fallback}}'
          echo "primary attempt: ${PRIMARY:-<none>}   fallback attempt: ${FALLBACK:-<none>}"
          if [ "$PRIMARY" = "Succeeded" ] || [ "$FALLBACK" = "Succeeded" ]; then
            echo "✓ An attempt succeeded — workflow status reflects real work."
            exit 0
          fi
          echo "❌ Neither the primary attempt nor the account-2 fallback succeeded — no durable result produced." >&2
          echo "   Most often the Claude five_hour usage limit / HTTP 429 on both accounts, or token-2 unset." >&2
          echo "   A proposal may be left stuck in-progress with no PR — re-run with force=true once quota resets." >&2
          exit 1

    # ── 4. Telegram notification (onExit) ──────────────────────────────────
    # Same pattern as cwft-mctl-agents-run.
    - name: notify-telegram
      script:
        image: alpine:3.19
        command: [sh]
        env:
          - name: TG_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: telegram-bot-token
                optional: true
          - name: TG_CHAT_ID
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: telegram-chat-id
                optional: true
          - name: MCTL_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: mctl-token
                optional: true
          # Workflow params + status injected as env vars so the shell layer
          # can quote them safely. Even though this is just a notification
          # step, raw `workflow.parameters.*` (Argo template syntax) interpolation is still
          # arbitrary command execution in a workflow pod.
          - name: WORKFLOW_STATUS
            value: "{{workflow.status}}"
          # Identifies which CWFT this onExit handler belongs to — used to
          # namespace the incident fingerprint below so run/implement/shepherd
          # failures never collide with each other.
          - name: WORKFLOW_TEMPLATE_KIND
            value: "implement"
          - name: WORKFLOW_SERVICE
            value: "{{workflow.parameters.service}}"
          - name: WORKFLOW_SLUG
            value: "{{workflow.parameters.slug}}"
          - name: WORKFLOW_NAME
            value: "{{workflow.name}}"
          - name: WORKFLOW_DURATION
            value: "{{workflow.duration}}"
        volumeMounts:
          - name: workdir
            mountPath: /workdir
        source: |
          set +e
          apk add --no-cache curl ca-certificates jq >/dev/null 2>&1

          # "none" when commit-and-push had nothing to commit (steady-state
          # tick at the */5 cadence with an empty proposal queue). Read off
          # the shared workdir PVC rather than a workflow output parameter —
          # see the note on commit-and-push for why.
          WORKFLOW_ACTIVITY=$(cat /workdir/activity 2>/dev/null || echo "unknown")

          # Stable dedup key for this recurring job. Two failures of the same
          # {service, slug} scope collapse into one open incident instead of
          # a fresh one per tick; a differing service/slug still gets its own.
          FINGERPRINT="workflow_failed:${WORKFLOW_TEMPLATE_KIND}:${WORKFLOW_SERVICE}:${WORKFLOW_SLUG}"

          case "$WORKFLOW_STATUS" in
            Succeeded) ICON="✅" ;;
            Failed)    ICON="❌" ;;
            Error)     ICON="⚠️" ;;
            *)         ICON="⏳" ;;
          esac
          if [ -n "$WORKFLOW_SLUG" ]; then
            SUBJECT="implement ${WORKFLOW_SLUG}"
          elif [ -n "$WORKFLOW_SERVICE" ]; then
            SUBJECT="implement ${WORKFLOW_SERVICE}"
          else
            SUBJECT="implement (all accepted)"
          fi
          UI_URL="https://workflows.mctl.ai/workflows/argo-workflows/${WORKFLOW_NAME}"
          TEXT="${ICON} mctl-agents: ${SUBJECT} — ${WORKFLOW_STATUS} (${WORKFLOW_DURATION}s)\n${UI_URL}"

          # Telegram leg. Skip a Succeeded run that found nothing to do —
          # at the */5 cadence that's the steady-state outcome, and an
          # unconditional ✅ every 5 minutes drowned out real activity.
          # Failed/Error/Unknown always notify regardless of activity.
          if [ "$WORKFLOW_STATUS" = "Succeeded" ] && [ "$WORKFLOW_ACTIVITY" = "none" ]; then
            echo "ℹ️  Succeeded with no activity (empty proposal queue) — skipping Telegram leg."
          elif [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            curl -s -o /dev/null -w 'telegram http=%{http_code}\n' \
              -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${TG_CHAT_ID}\",\"text\":\"${TEXT}\",\"disable_web_page_preview\":true}"
          else
            echo "ℹ️  TG_BOT_TOKEN or TG_CHAT_ID not set; skipping Telegram leg."
          fi

          # Incident leg — only on terminal failure/success. See B6 G3 in
          # ~/.claude/plans/mctl-agents-daily-cron-visibility.md.
          if { [ "$WORKFLOW_STATUS" = "Failed" ] || [ "$WORKFLOW_STATUS" = "Error" ]; } && [ -n "$MCTL_TOKEN" ]; then
            # Suffix the id with epoch-second so `argo retry <wf>`
            # produces a fresh incident — workflow names/UIDs stay
            # stable across retries (Codex P2 on PR #149). Real cross-run
            # dedup now happens via `fingerprint` below.
            INCIDENT_ID="argo-${WORKFLOW_NAME}-$(date +%s)"
            SUMMARY="implement ${SUBJECT} ${WORKFLOW_STATUS} after ${WORKFLOW_DURATION}s — ${UI_URL}"
            # JSON-encode via jq so quotes / newlines / backslashes in
            # WORKFLOW_SLUG / WORKFLOW_SERVICE cannot break the body.
            BODY=$(jq -nc --arg id "$INCIDENT_ID" --arg summary "$SUMMARY" --arg fingerprint "$FINGERPRINT" '{
              id: $id,
              source: "argo-workflows",
              type: "workflow_failed",
              tenant: "admins",
              service: "mctl-agents",
              summary: $summary,
              severity: "warning",
              # "analyzing", not "open": the incident-responder discovery
              # query only picks up status=analyzing, and nothing in mctl-api
              # ever promotes open->analyzing — a status of "open" here means
              # the incident sits unanalyzed forever (observed 2026-07-12:
              # 6 self-reported workflow_failed incidents never picked up).
              status: "analyzing",
              fingerprint: $fingerprint
            }')
            curl -s -o /dev/null -w 'incident http=%{http_code}\n' \
              -X POST "https://api.mctl.ai/api/v1/incidents" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${MCTL_TOKEN}" \
              -d "$BODY"
          elif [ "$WORKFLOW_STATUS" = "Succeeded" ] && [ -n "$MCTL_TOKEN" ]; then
            # Close the loop: this scope's implement run finally succeeded,
            # so resolve any open incident sharing this fingerprint. No-op
            # if none exists.
            RESOLVE_BODY=$(jq -nc --arg tenant "admins" --arg fingerprint "$FINGERPRINT" '{tenant: $tenant, fingerprint: $fingerprint}')
            curl -s -o /dev/null -w 'resolve http=%{http_code}\n' \
              -X POST "https://api.mctl.ai/api/v1/incidents/resolve-by-fingerprint" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${MCTL_TOKEN}" \
              -d "$RESOLVE_BODY"
          else
            echo "ℹ️  Workflow ${WORKFLOW_STATUS} or MCTL_TOKEN missing; skipping incident leg."
          fi
          exit 0
