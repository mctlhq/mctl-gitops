apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: openclaw-identity-delete
  annotations:
    workflows.argoproj.io/description: |
      Remove a single OpenClaw identity override file from the gitops repo.

      Deletes platform-gitops/services/{team}/openclaw/identity/{file_name}.
      file_name must be one of AGENTS.md / SOUL.md / IDENTITY.md / USER.md /
      TOOLS.md. No-op (success) if the file does not exist. Commits as
      argo-workflows[bot] with the triggering user's ID recorded in the
      commit message (actor).
spec:
  entrypoint: delete-identity
  serviceAccountName: argo-workflow-sa

  arguments:
    parameters:
      - name: team_name
      - name: file_name
      - name: actor
        value: "unknown"

  templates:
    - name: delete-identity
      inputs:
        parameters:
          - name: team_name
          - name: file_name
          - name: actor
      script:
        image: alpine:3.19
        command: [sh]
        # Small resource envelope — the workflow runs in the tenant namespace
        # alongside the OpenClaw pod and must fit within the tenant CPU quota.
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        # Parameters passed as env vars so the container runtime injects
        # them opaquely; avoids shell parsing of $(…)/``…`` in params
        # before our regex validation runs.
        env:
          - name: TEAM
            value: "{{inputs.parameters.team_name}}"
          - name: FILE
            value: "{{inputs.parameters.file_name}}"
          - name: ACTOR
            value: "{{inputs.parameters.actor}}"
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        source: |
          set -e

          if [ -n "$(printf '%s' "$TEAM" | tr -d 'a-z0-9-')" ]; then
            echo "❌ Invalid team name: contains disallowed characters"
            exit 1
          fi
          if ! printf '%s' "$TEAM" | grep -Eq '^[a-z0-9][a-z0-9-]{0,62}$'; then
            echo "❌ Invalid team name: $TEAM"
            exit 1
          fi

          # Re-validate file_name against the fixed identity allowlist
          # (defense-in-depth; mctl-api enforces it first).
          case "$FILE" in
            AGENTS.md|SOUL.md|IDENTITY.md|USER.md|TOOLS.md) : ;;
            *)
              echo "❌ Invalid identity file name: $FILE (must be AGENTS.md | SOUL.md | IDENTITY.md | USER.md | TOOLS.md)"
              exit 1
              ;;
          esac

          SAFE_ACTOR=$(printf '%s' "$ACTOR" | tr -d '\r\n' | tr -d '[:cntrl:]')
          [ -z "$SAFE_ACTOR" ] && SAFE_ACTOR="unknown"

          apk add --no-cache git openssh-client ca-certificates python3 > /dev/null

          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          git clone --depth=1 "git@github.com:${GITOPS_ORG}/${GITOPS_REPO}.git" /tmp/mctl-gitops
          cd /tmp/mctl-gitops
          git config user.name "argo-workflows[bot]"
          git config user.email "argo-workflows[bot]@users.noreply.github.com"

          TARGET="platform-gitops/services/${TEAM}/openclaw/identity/${FILE}"

          case "$TARGET" in
            platform-gitops/services/${TEAM}/openclaw/identity/AGENTS.md) : ;;
            platform-gitops/services/${TEAM}/openclaw/identity/SOUL.md) : ;;
            platform-gitops/services/${TEAM}/openclaw/identity/IDENTITY.md) : ;;
            platform-gitops/services/${TEAM}/openclaw/identity/USER.md) : ;;
            platform-gitops/services/${TEAM}/openclaw/identity/TOOLS.md) : ;;
            *)
              echo "❌ Security: computed path $TARGET is outside the allowed scope"
              exit 1
              ;;
          esac
          case "$TARGET" in
            *..*)
              echo "❌ Security: path traversal detected in $TARGET"
              exit 1
              ;;
          esac

          if [ ! -f "$TARGET" ]; then
            echo "ℹ️  $TARGET does not exist — nothing to delete"
            exit 0
          fi

          git rm "$TARGET"

          # ── Regenerate consolidated values file for openclaw-skills chart ─
          # Rebuild from whatever remains in skills/ + identity/ after the
          # deletion so the openclaw-skills ConfigMaps stay in sync. If the
          # last identity override was removed, this produces `identity: {}`.
          GEN_DIR="platform-gitops/services/${TEAM}/openclaw/generated"
          GEN_FILE="${GEN_DIR}/skills-values.yaml"
          mkdir -p "$GEN_DIR"
          TEAM="$TEAM" python3 <<'PY'
          import os, glob
          team = os.environ["TEAM"]
          base = f"platform-gitops/services/{team}/openclaw"
          def load_dir(rel, exclude=()):
              entries = {}
              for path in sorted(glob.glob(f"{base}/{rel}/*.md")):
                  name = os.path.basename(path)
                  if name in exclude:
                      continue
                  with open(path, "r", encoding="utf-8") as f:
                      entries[name] = f.read()
              return entries
          def emit_map(label, mp, key_transform):
              if not mp:
                  return f"{label}: {{}}\n"
              out = f"{label}:\n"
              for k, v in mp.items():
                  key = key_transform(k)
                  out += f"  {key}: |-\n"
                  for line in v.splitlines():
                      out += f"    {line}\n"
              return out
          skills = load_dir("skills", exclude={"README.md"})
          identity = load_dir("identity")
          body = emit_map("skills", skills, lambda k: k[:-3]) + emit_map("identity", identity, lambda k: k)
          os.makedirs(f"{base}/generated", exist_ok=True)
          with open(f"{base}/generated/skills-values.yaml", "w", encoding="utf-8") as f:
              f.write("# Auto-generated by openclaw-skill-* / openclaw-identity-* workflows.\n")
              f.write("# Do not edit manually — changes will be overwritten on the next save/delete.\n")
              f.write(body)
          PY
          git add "$GEN_FILE"
          echo "✅ Regenerated $GEN_FILE"

          git commit \
            -m "chore(${TEAM}/openclaw): remove identity ${FILE}" \
            -m "Triggered by: ${SAFE_ACTOR}"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ Deleted identity ${FILE} for ${TEAM}"
              break
            fi
            if [ "$i" -lt 5 ]; then
              echo "⚠️  Push failed (attempt $i), rebasing..."
              git pull --rebase origin main
            else
              echo "❌ Push failed after 5 attempts"
              exit 1
            fi
          done
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key
