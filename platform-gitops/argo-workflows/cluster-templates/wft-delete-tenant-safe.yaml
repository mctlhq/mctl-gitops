apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: delete-tenant-safe
  annotations:
    workflows.argoproj.io/description: |
      Safely deletes a tenant from the platform:
        1. validate         — checks tenant exists, not reserved
        2. retire-services  — discovers and retires all services for the tenant, waiting for completion
        3. cleanup-shared-db — removes any remaining tenant-owned shared CNPG resources
        4. delete-vault     — removes Vault policy + remaining secrets under teams/{name}/
        5. delete-from-git  — removes tenant dir + ArgoCD RBAC from gitops repo
        6. delete-k8s       — deletes ArgoCD app + K8s namespace

      DB cleanup in tenant state is handled before namespace deletion so shared-pg does not
      degrade on missing tenant namespaces.
spec:
  # See wft-create-tenant.yaml: workflowDefaults from the controller
  # config does not merge into workflows launched via templateRef, so
  # ttlStrategy must be declared inline on each ClusterWorkflowTemplate.
  ttlStrategy:
    secondsAfterSuccess: 1800
    secondsAfterFailure: 86400
    secondsAfterCompletion: 3600
  entrypoint: delete-tenant-safe-pipeline
  serviceAccountName: argo-workflow-sa
  synchronization:
    mutex:
      name: mctl-gitops-main-writes

  arguments:
    parameters:
      - name: tenant_name

  templates:
    - name: delete-tenant-safe-pipeline
      dag:
        tasks:
          - name: validate
            template: validate-tenant-exists
            arguments:
              parameters:
                - name: tenant_name
                  value: "{{workflow.parameters.tenant_name}}"

          - name: retire-services
            dependencies: [validate]
            template: retire-tenant-services
            arguments:
              parameters:
                - name: tenant_name
                  value: "{{workflow.parameters.tenant_name}}"

          - name: delete-vault
            dependencies: [cleanup-shared-db]
            template: delete-vault-policy
            arguments:
              parameters:
                - name: tenant_name
                  value: "{{workflow.parameters.tenant_name}}"

          - name: delete-from-git
            dependencies: [cleanup-shared-db]
            template: delete-tenant-from-git
            arguments:
              parameters:
                - name: tenant_name
                  value: "{{workflow.parameters.tenant_name}}"

          - name: cleanup-shared-db
            dependencies: [retire-services]
            template: cleanup-tenant-db-from-gitops
            arguments:
              parameters:
                - name: tenant_name
                  value: "{{workflow.parameters.tenant_name}}"

          - name: delete-k8s
            dependencies: [delete-from-git]
            template: delete-k8s-resources
            arguments:
              parameters:
                - name: tenant_name
                  value: "{{workflow.parameters.tenant_name}}"

    - name: validate-tenant-exists
      inputs:
        parameters:
          - name: tenant_name
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -e
          TENANT="{{inputs.parameters.tenant_name}}"

          echo "Validating tenant: $TENANT"

          for reserved in admins argocd argo-workflows argo-events kube-system kube-public kube-node-lease default cert-manager traefik vault external-secrets monitoring backstage platform-db; do
            if [ "$TENANT" = "$reserved" ]; then
              echo "ERROR: '$TENANT' is a reserved/protected tenant and cannot be deleted."
              exit 1
            fi
          done

          echo "Tenant '$TENANT' passed validation."

    - name: retire-tenant-services
      inputs:
        parameters:
          - name: tenant_name
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key
            defaultMode: 0600
      script:
        image: alpine:3.19
        command: [sh]
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
            readOnly: true
        source: |
          set -e
          TENANT="{{inputs.parameters.tenant_name}}"

          apk add --no-cache git openssh-client curl > /dev/null

          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          git clone --depth=1 "git@github.com:${GITOPS_ORG}/${GITOPS_REPO}.git" /tmp/mctl-gitops > /dev/null 2>&1

          SERVICE_ROOT="/tmp/mctl-gitops/platform-gitops/services/${TENANT}"
          if [ ! -d "${SERVICE_ROOT}" ]; then
            echo "No services directory for tenant ${TENANT}; nothing to retire."
            exit 0
          fi

          curl -sLo /usr/local/bin/kubectl "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x /usr/local/bin/kubectl

          SERVICES=$(find "${SERVICE_ROOT}" -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort)
          if [ -z "${SERVICES}" ]; then
            echo "No services found for tenant ${TENANT}; nothing to retire."
            exit 0
          fi

          create_retire_workflow() {
            ns="$1"
            svc="$2"
            svc_type="$3"
            kubectl create -n "${ns}" -o jsonpath='{.metadata.name}' -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: retire-${TENANT}-${svc}-
            namespace: ${ns}
            labels:
              mctl.ai/operation: retire-service
              mctl.ai/team: ${TENANT}
              mctl.ai/component: ${svc}
          spec:
            workflowTemplateRef:
              name: retire-service
              clusterScope: true
            arguments:
              parameters:
              - {name: team_name, value: "${TENANT}"}
              - {name: component_name, value: "${svc}"}
              - {name: component_type, value: "${svc_type}"}
              - {name: delete_vault_secrets, value: "true"}
          EOF
          }

          for SVC in ${SERVICES}; do
            echo "Retiring service ${TENANT}/${SVC}..."
            SVC_TYPE="base-service"
            if grep -q "worker-service" "${SERVICE_ROOT}/${SVC}/values.yaml" 2>/dev/null; then
              SVC_TYPE="worker-service"
            fi

            TARGET_NS="argo-workflows"
            if kubectl get ns "${TENANT}" > /dev/null 2>&1; then
              TARGET_NS="${TENANT}"
            fi

            set +e
            WF_NAME=$(create_retire_workflow "${TARGET_NS}" "${SVC}" "${SVC_TYPE}" 2>/tmp/retire.err)
            CREATE_RC=$?
            set -e
            if [ "${CREATE_RC}" -ne 0 ] && [ "${TARGET_NS}" != "argo-workflows" ]; then
              echo "Workflow submission in namespace ${TARGET_NS} failed, retrying in argo-workflows..."
              cat /tmp/retire.err || true
              TARGET_NS="argo-workflows"
              WF_NAME=$(create_retire_workflow "${TARGET_NS}" "${SVC}" "${SVC_TYPE}")
            elif [ "${CREATE_RC}" -ne 0 ]; then
              cat /tmp/retire.err || true
              exit "${CREATE_RC}"
            fi

            echo "Submitted retire workflow ${WF_NAME} for ${SVC_TYPE} in namespace ${TARGET_NS}"
            for i in $(seq 1 80); do
              PHASE=$(kubectl get workflow "${WF_NAME}" -n "${TARGET_NS}" \
                -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
              echo "  [${i}/80] ${WF_NAME}: ${PHASE}"
              case "${PHASE}" in
                Succeeded) break ;;
                Failed|Error)
                  echo "Retire workflow ${WF_NAME} failed with phase ${PHASE}"
                  exit 1
                  ;;
              esac
              sleep 10
            done

            FINAL_PHASE=$(kubectl get workflow "${WF_NAME}" -n "${TARGET_NS}" \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
            if [ "${FINAL_PHASE}" != "Succeeded" ]; then
              echo "Timed out waiting for retire workflow ${WF_NAME}; last phase: ${FINAL_PHASE}"
              exit 1
            fi
          done

          echo "All services retired for tenant ${TENANT}."

    - name: cleanup-tenant-db-from-gitops
      inputs:
        parameters:
          - name: tenant_name
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key
            defaultMode: 0600
      script:
        image: alpine:3.19
        command: [sh]
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
            readOnly: true
        source: |
          set -e
          TENANT="{{inputs.parameters.tenant_name}}"
          CNPG_DIR="platform-gitops/infra-components/data/cnpg/shared"

          apk add --no-cache git openssh-client > /dev/null 2>&1

          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          git clone --depth=1 "git@github.com:${GITOPS_ORG}/${GITOPS_REPO}.git" /tmp/mctl-gitops > /dev/null 2>&1
          cd /tmp/mctl-gitops
          git config user.name "argo-workflows[bot]"
          git config user.email "argo-workflows[bot]@users.noreply.github.com"

          CHANGED=false

          if grep -q "host ${TENANT}-" "${CNPG_DIR}/cluster.yaml" 2>/dev/null; then
            sed -i "/- host ${TENANT}-.* all scram-sha-256/d" "${CNPG_DIR}/cluster.yaml"
            echo "✅ Removed tenant pg_hba entries for ${TENANT}"
            CHANGED=true
          fi

          if grep -q "name: ${TENANT}-" "${CNPG_DIR}/cluster.yaml" 2>/dev/null; then
            awk -v tenant="${TENANT}-" '
              /^[[:space:]]*- name: / {
                if ($0 ~ "^[[:space:]]*- name: " tenant) { skip=1; next }
                if (skip) { skip=0 }
              }
              skip { next }
              { print }
            ' "${CNPG_DIR}/cluster.yaml" > "${CNPG_DIR}/cluster.yaml.tmp" && mv "${CNPG_DIR}/cluster.yaml.tmp" "${CNPG_DIR}/cluster.yaml"
            echo "✅ Removed tenant managed roles for ${TENANT}"
            CHANGED=true
          fi

          if grep -q "name: ${TENANT}-.*-db" "${CNPG_DIR}/databases.yaml" 2>/dev/null; then
            awk -v tenant="${TENANT}-" '
              BEGIN { saw=0; doc="" }
              function flush() {
                if (doc == "") return
                if (!saw) printf "%s", doc
                doc=""
                saw=0
              }
              /^---[[:space:]]*$/ {
                flush()
                doc=$0 ORS
                next
              }
              {
                doc = doc $0 ORS
                if ($0 ~ "^[[:space:]]*name:[[:space:]]*" tenant ".*-db$") saw=1
              }
              END { flush() }
            ' "${CNPG_DIR}/databases.yaml" > "${CNPG_DIR}/databases.yaml.tmp" && mv "${CNPG_DIR}/databases.yaml.tmp" "${CNPG_DIR}/databases.yaml"
            echo "✅ Removed tenant Database CRDs for ${TENANT}"
            CHANGED=true
          fi

          if grep -q "name: ${TENANT}-.*-db-creds" "${CNPG_DIR}/secrets.yaml" 2>/dev/null; then
            awk -v tenant="${TENANT}-" '
              BEGIN { saw=0; doc="" }
              function flush() {
                if (doc == "") return
                if (!saw) printf "%s", doc
                doc=""
                saw=0
              }
              /^---[[:space:]]*$/ {
                flush()
                doc=$0 ORS
                next
              }
              {
                doc = doc $0 ORS
                if ($0 ~ "^[[:space:]]*name:[[:space:]]*" tenant ".*-db-creds$") saw=1
              }
              END { flush() }
            ' "${CNPG_DIR}/secrets.yaml" > "${CNPG_DIR}/secrets.yaml.tmp" && mv "${CNPG_DIR}/secrets.yaml.tmp" "${CNPG_DIR}/secrets.yaml"
            echo "✅ Removed tenant ExternalSecrets for ${TENANT}"
            CHANGED=true
          fi

          if [ "$CHANGED" = "true" ]; then
            git add "${CNPG_DIR}/cluster.yaml" "${CNPG_DIR}/databases.yaml" "${CNPG_DIR}/secrets.yaml"
            if ! git diff --cached --quiet; then
              git commit -m "chore(db): cleanup shared CNPG resources for tenant ${TENANT}" \
                -m "Removed remaining tenant-owned roles, pg_hba entries, Database CRDs and ExternalSecrets before namespace deletion."
              for i in $(seq 1 5); do
                if git push origin HEAD:main; then
                  echo "✅ Shared DB cleanup pushed"
                  break
                fi
                git pull --rebase origin main
              done
            fi
          else
            echo "ℹ️  No remaining shared DB resources found for tenant ${TENANT}"
          fi

    - name: delete-vault-policy
      inputs:
        parameters:
          - name: tenant_name
      script:
        image: hashicorp/vault:1.15
        command: [sh]
        env:
          - name: VAULT_ADDR
            value: "http://vault.vault.svc.cluster.local:8200"
        source: |
          set -e
          TENANT="{{inputs.parameters.tenant_name}}"

          echo "Authenticating to Vault via Kubernetes auth..."
          KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
            role=argo-workflow \
            jwt="$KUBE_TOKEN")
          export VAULT_TOKEN

          if vault policy read "tenant-${TENANT}" > /dev/null 2>&1; then
            vault policy delete "tenant-${TENANT}"
            echo "Vault policy tenant-${TENANT} deleted."
          else
            echo "Vault policy tenant-${TENANT} not found (already deleted). Skipping."
          fi

          echo "Cleaning up Vault secrets under teams/${TENANT}/..."
          SERVICES=$(vault kv list -format=json -mount=secret "teams/${TENANT}/" 2>/dev/null || echo "[]")
          if [ "$SERVICES" != "[]" ]; then
            for SVC in $(echo "$SERVICES" | sed 's/[][]//g' | tr ',' '\n' | tr -d '" '); do
              SUB_KEYS=$(vault kv list -format=json -mount=secret "teams/${TENANT}/${SVC}" 2>/dev/null || echo "[]")
              if [ "$SUB_KEYS" != "[]" ]; then
                for KEY in $(echo "$SUB_KEYS" | sed 's/[][]//g' | tr ',' '\n' | tr -d '" '); do
                  vault kv metadata delete -mount=secret "teams/${TENANT}/${SVC}${KEY}" 2>/dev/null && \
                    echo "  Deleted secret teams/${TENANT}/${SVC}${KEY}" || true
                done
              fi
              vault kv metadata delete -mount=secret "teams/${TENANT}/${SVC}" 2>/dev/null && \
                echo "  Deleted secret teams/${TENANT}/${SVC}" || true
            done
            echo "Vault secrets for tenant ${TENANT} cleaned up."
          else
            echo "No Vault secrets found for tenant ${TENANT}."
          fi

    - name: delete-tenant-from-git
      inputs:
        parameters:
          - name: tenant_name
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key
            defaultMode: 0600
      script:
        image: alpine:3.19
        command: [sh]
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
            readOnly: true
        source: |
          set -e
          TENANT="{{inputs.parameters.tenant_name}}"

          apk add --no-cache openssl curl jq git openssh-client ca-certificates
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          git config --global user.email "argo-workflows[bot]@mctl.ai"
          git config --global user.name "Argo Workflows Bot"
          apply_changes() {
            CHANGED=false

            TENANT_DIR="platform-gitops/tenants/${TENANT}"
            if [ -d "$TENANT_DIR" ]; then
              git rm -rf "$TENANT_DIR"
              echo "Removed $TENANT_DIR"
              CHANGED=true
            else
              echo "WARNING: $TENANT_DIR not found, skipping."
            fi

            ARGOCD_VALUES="platform-gitops/argocd/values.yaml"
            if grep -q "role:team-${TENANT}," "$ARGOCD_VALUES"; then
              sed -i "/# Tenant: ${TENANT}/d" "$ARGOCD_VALUES"
              sed -i "/role:team-${TENANT},/d" "$ARGOCD_VALUES"
              sed -i "/g, ${TENANT}, role:team-${TENANT}/d" "$ARGOCD_VALUES"
              sed -i '/^$/N;/^\n$/d' "$ARGOCD_VALUES"
              git add "$ARGOCD_VALUES"
              echo "Removed ArgoCD RBAC for tenant: ${TENANT}"
              CHANGED=true
            else
              echo "WARNING: No ArgoCD RBAC found for tenant ${TENANT}, skipping."
            fi

            SSO_FILE="platform-gitops/tenants/${TENANT}/sso.yaml"
            if [ -f "$SSO_FILE" ]; then
              git rm "$SSO_FILE"
              echo "Removed $SSO_FILE"
              CHANGED=true
            else
              echo "WARNING: $SSO_FILE not found (already deleted). Skipping."
            fi

            SKILL_BINDING_FILE="platform-gitops/platform-skills/bindings/tenants/${TENANT}.yaml"
            if [ -f "$SKILL_BINDING_FILE" ]; then
              git rm "$SKILL_BINDING_FILE"
              echo "Removed $SKILL_BINDING_FILE"
              CHANGED=true
            else
              echo "WARNING: $SKILL_BINDING_FILE not found (already deleted or never enabled). Skipping."
            fi

            CNPG_DIR="platform-gitops/infra-components/data/cnpg/shared"

            DB_FILE="${CNPG_DIR}/databases.yaml"
            if [ -f "$DB_FILE" ] && grep -q "name: ${TENANT}-" "$DB_FILE"; then
              echo "Cleaning up Database CRDs for tenant ${TENANT}..."
              sed -i "/name: ${TENANT}-/,+8d" "$DB_FILE"
              git add "$DB_FILE"
              CHANGED=true
            fi

            SEC_FILE="${CNPG_DIR}/secrets.yaml"
            if [ -f "$SEC_FILE" ] && grep -q "name: ${TENANT}-" "$SEC_FILE"; then
              echo "Cleaning up ExternalSecrets for tenant ${TENANT}..."
              sed -i "/name: ${TENANT}-/,+40d" "$SEC_FILE"
              git add "$SEC_FILE"
              CHANGED=true
            fi

            CLUSTER_FILE="${CNPG_DIR}/cluster.yaml"
            if [ -f "$CLUSTER_FILE" ] && grep -q "name: ${TENANT}-" "$CLUSTER_FILE"; then
              echo "Cleaning up Cluster roles for tenant ${TENANT}..."
              sed -i "/name: ${TENANT}-/,+4d" "$CLUSTER_FILE"
              sed -i "/host.*${TENANT}-/d" "$CLUSTER_FILE"
              git add "$CLUSTER_FILE"
              CHANGED=true
            fi

            [ "$CHANGED" = "true" ]
          }

          MAX_ATTEMPTS=5
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Git mutation attempt $attempt/$MAX_ATTEMPTS..."
            rm -rf /tmp/mctl-gitops
            git clone --depth=1 "git@github.com:${GITOPS_ORG}/${GITOPS_REPO}.git" /tmp/mctl-gitops
            cd /tmp/mctl-gitops

            if ! apply_changes; then
              echo "No git changes needed."
              exit 0
            fi

            git status
            git commit -m "chore(tenant): delete tenant ${TENANT}

          - Retired all services for tenant ${TENANT}
          - Removed platform-gitops/tenants/${TENANT}/
          - Removed ArgoCD RBAC for role:team-${TENANT}
          - Removed database resources (DB CRDs, Secrets, Roles)
          - Removed platform skill bindings for tenant ${TENANT}

          Deleted by Argo Workflows (wft-delete-tenant-safe)"

            if git push origin HEAD:main; then
              echo "Successfully pushed deletion of tenant ${TENANT}!"
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Push failed due to concurrent update; retrying from fresh main..."
              sleep $((attempt * 2))
            else
              echo "ERROR: Push failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
          done

    - name: delete-k8s-resources
      inputs:
        parameters:
          - name: tenant_name
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -e
          apk add --no-cache curl
          TENANT="{{inputs.parameters.tenant_name}}"

          curl -sLO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && mv kubectl /usr/local/bin/

          echo "Refreshing ArgoCD ApplicationSets before deleting app CRs..."
          kubectl annotate applicationset apps -n argocd argocd.argoproj.io/refresh=hard --overwrite || true
          kubectl annotate applicationset tenants -n argocd argocd.argoproj.io/refresh=hard --overwrite || true

          SERVICE_APPS=$(kubectl get app -n argocd -l "team=${TENANT}" -o name 2>/dev/null || true)
          if [ -n "${SERVICE_APPS}" ]; then
            echo "Deleting service apps for tenant ${TENANT}:"
            echo "${SERVICE_APPS}"
            echo "${SERVICE_APPS}" | xargs -r kubectl delete -n argocd
          else
            echo "No service apps found for tenant ${TENANT}."
          fi

          if kubectl get app -n argocd "tenant-${TENANT}" > /dev/null 2>&1; then
            echo "Deleting ArgoCD app tenant-${TENANT}..."
            kubectl delete app -n argocd "tenant-${TENANT}"
          else
            echo "ArgoCD app tenant-${TENANT} not found, skipping."
          fi

          if kubectl get ns "${TENANT}" > /dev/null 2>&1; then
            echo "Deleting namespace ${TENANT}..."
            kubectl delete ns "${TENANT}"
          else
            echo "Namespace ${TENANT} not found, skipping."
          fi

          echo "Waiting for service apps, tenant app, and namespace to disappear..."
          for i in $(seq 1 60); do
            APP_COUNT=$(kubectl get app -n argocd -l "team=${TENANT}" --no-headers 2>/dev/null | wc -l | tr -d ' ')
            if kubectl get app -n argocd "tenant-${TENANT}" > /dev/null 2>&1; then
              TENANT_APP_RC=0
            else
              TENANT_APP_RC=$?
            fi
            if kubectl get ns "${TENANT}" > /dev/null 2>&1; then
              NS_RC=0
            else
              NS_RC=$?
            fi
            echo "  [${i}/60] serviceApps=${APP_COUNT} tenantAppRc=${TENANT_APP_RC} namespaceRc=${NS_RC}"
            if [ "${APP_COUNT}" = "0" ] && [ "${TENANT_APP_RC}" -ne 0 ] && [ "${NS_RC}" -ne 0 ]; then
              echo "K8s cleanup fully complete for tenant ${TENANT}."
              exit 0
            fi
            sleep 5
          done

          echo "Timed out waiting for ArgoCD app CRs or namespace to disappear for tenant ${TENANT}"
          exit 1
