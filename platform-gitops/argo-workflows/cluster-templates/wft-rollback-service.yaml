apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: rollback-service
  annotations:
    workflows.argoproj.io/description: |
      Roll back a service to a previous image tag by patching image.tag in the
      GitOps values.yaml and committing. ArgoCD picks up the change and redeploys.
spec:
  entrypoint: rollback-pipeline
  serviceAccountName: argo-workflow-sa

  arguments:
    parameters:
      - name: team_name
      - name: component_name
      - name: target_tag

  templates:
    - name: rollback-pipeline
      dag:
        tasks:
          - name: patch-and-commit
            template: patch-values

    - name: patch-values
      inputs:
        parameters:
          - name: team_name
            value: "{{workflow.parameters.team_name}}"
          - name: component_name
            value: "{{workflow.parameters.component_name}}"
          - name: target_tag
            value: "{{workflow.parameters.target_tag}}"
      script:
        image: alpine/git:2.45.2
        command: [sh]
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
            readOnly: true
        source: |
          set -euo pipefail

          # alpine/git is minimal — install yq for the openclaw setup-init
          # image patch below.
          apk add --no-cache --quiet curl ca-certificates
          if ! command -v yq >/dev/null 2>&1; then
            curl -fsSL --retry 5 --retry-delay 3 --retry-max-time 60 \
              -o /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
            chmod +x /usr/local/bin/yq
          fi

          # Configure SSH for git push
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 443 ssh.github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config --global url."ssh://git@ssh.github.com:443/".insteadOf "https://github.com/"

          TEAM="{{inputs.parameters.team_name}}"
          COMPONENT="{{inputs.parameters.component_name}}"
          TAG="{{inputs.parameters.target_tag}}"
          REPO="https://github.com/${GITOPS_ORG}/${GITOPS_REPO}.git"
          VALUES="platform-gitops/services/${TEAM}/${COMPONENT}/values.yaml"

          git clone --depth=1 "${REPO}" /tmp/mctl-gitops
          cd /tmp/mctl-gitops

          if [ ! -f "${VALUES}" ]; then
            echo "ERROR: ${VALUES} not found — service may not exist"
            exit 1
          fi

          # Patch image.tag using sed (safe for simple tag strings)
          sed -i "s|^\( *tag: *\).*|\1\"${TAG}\"|" "${VALUES}"
          # Keep any openclaw setup init container pinned to the same
          # image tag so the Layer-2 overlay bootstrap runs from the
          # same release the main container serves. noop on services
          # that don't define a setup init in .initContainers.
          REPO=$(yq eval '.image.repository' "${VALUES}")
          # Only touch setup init image on openclaw-style overlay tenants
          # (setup already uses the same repo as main). Legacy busybox
          # bootstrap setups are left alone.
          CURRENT_SETUP=$(yq eval '(.initContainers[]? | select(.name == "setup") | .image) // ""' "${VALUES}")
          case "$CURRENT_SETUP" in
            "${REPO}:"*)
              yq eval -i "(.initContainers[]? | select(.name == \"setup\") | .image) = \"${REPO}:${TAG}\"" "${VALUES}"
              ;;
          esac

          git config user.email "ci@mctl.ai"
          git config user.name "mctl-rollback"
          git add "${VALUES}"
          git diff --staged --quiet && echo "No changes needed (already at ${TAG})" && exit 0
          git commit -m "chore: rollback ${TEAM}/${COMPONENT} to ${TAG}"
          git push
          echo "Rolled back ${TEAM}/${COMPONENT} to tag ${TAG}"
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key
