apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: platform-skill-publish
  annotations:
    workflows.argoproj.io/description: Publish or update a platform-wide skill catalog entry in mctl-gitops.
spec:
  ttlStrategy:
    secondsAfterSuccess: 1800
    secondsAfterFailure: 86400
    secondsAfterCompletion: 3600
  entrypoint: publish-skill
  serviceAccountName: argo-workflow-sa
  arguments:
    parameters:
      - name: skill_name
      - name: metadata_b64
      - name: content_b64
      - name: actor
        value: unknown
  templates:
    - name: publish-skill
      inputs:
        parameters:
          - name: skill_name
          - name: metadata_b64
          - name: content_b64
          - name: actor
      script:
        image: alpine:3.19
        command: [sh]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        env:
          - name: SKILL
            value: "{{inputs.parameters.skill_name}}"
          - name: METADATA_B64
            value: "{{inputs.parameters.metadata_b64}}"
          - name: CONTENT_B64
            value: "{{inputs.parameters.content_b64}}"
          - name: ACTOR
            value: "{{inputs.parameters.actor}}"
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        source: |
          set -e
          echo "$SKILL" | grep -Eq '^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$' || { echo "Invalid skill"; exit 1; }
          SAFE_ACTOR=$(printf '%s' "$ACTOR" | tr -d '\r\n' | tr -d '[:cntrl:]')
          [ -z "$SAFE_ACTOR" ] && SAFE_ACTOR=unknown
          apk add --no-cache git openssh-client ca-certificates python3 py3-yaml > /dev/null
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          git clone --depth=1 "git@github.com:${GITOPS_ORG}/${GITOPS_REPO}.git" /tmp/mctl-gitops
          cd /tmp/mctl-gitops
          git config user.name "argo-workflows[bot]"
          git config user.email "argo-workflows[bot]@users.noreply.github.com"
          DIR="platform-gitops/platform-skills/catalog/${SKILL}"
          apply_change() {
            mkdir -p "$DIR"
            printf '%s' "$CONTENT_B64" | base64 -d > "${DIR}/SKILL.md"
            printf '%s' "$METADATA_B64" | base64 -d > /tmp/metadata.json
            SKILL="$SKILL" python3 <<'PY'
          import json, os, yaml
          skill = os.environ["SKILL"]
          with open("/tmp/metadata.json", "r", encoding="utf-8") as f:
              meta = json.load(f)
          if meta.get("name") != skill:
              raise SystemExit("metadata name must match skill_name")
          if meta.get("visibility") not in {"public", "tenant", "admin", "platform-internal"}:
              raise SystemExit("invalid visibility")
          if meta.get("status") not in {"draft", "active", "deprecated"}:
              raise SystemExit("invalid status")
          path = f"platform-gitops/platform-skills/catalog/{skill}/metadata.yaml"
          with open(path, "w", encoding="utf-8") as f:
              yaml.safe_dump(meta, f, sort_keys=False)
          PY
            git add "$DIR/SKILL.md" "$DIR/metadata.yaml"
          }
          apply_change
          if git diff --cached --quiet; then
            echo "No catalog changes"
            exit 0
          fi
          python3 scripts/validate-platform-skills.py
          git commit -m "feat(platform-skills): publish ${SKILL}" -m "Triggered by: ${SAFE_ACTOR}"
          for i in 1 2 3 4 5; do
            git push origin HEAD:main && exit 0
            [ "$i" -eq 5 ] && exit 1
            git fetch origin main
            git reset --hard origin/main
            apply_change
            git diff --cached --quiet && exit 0
            python3 scripts/validate-platform-skills.py
            git commit -m "feat(platform-skills): publish ${SKILL}" -m "Triggered by: ${SAFE_ACTOR}"
          done
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key
