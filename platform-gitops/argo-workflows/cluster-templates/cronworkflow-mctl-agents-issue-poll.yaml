apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: mctl-agents-issue-poll
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: |
      Every-5-minute trigger for the issue-driven entry-point poller.

      Workflow logic lives in ClusterWorkflowTemplate `mctl-agents-issue-poll`
      (cwft-mctl-agents-issue-poll.yaml). This CronWorkflow is a thin wrapper
      that submits a Workflow with no parameters, so the poller sweeps every
      open mctlhq issue labelled `agents:intake`.

      What it does each tick:
        1. `gh search issues` for open mctlhq issues labelled
           `agents:intake`.
        2. For each, runs the issue-investigator in-process — gh-clones the
           target repo read-only, runs the Claude Agent SDK to write the
           requirements/design/tasks proposal triplet + .status.yaml
           (status=proposed), comments the proposal link on the issue.
        3. Removes the `agents:intake` label so the next tick does not
           re-investigate (and re-spend the SDK budget) the same issue.
      The proposal stops at `proposed` — a human flips it to `accepted`,
      the Tier 2 implementer opens a PR, the Tier 3 shepherd merges.

      Start suspended. Un-suspend after the first successful one-shot run
      (verify a labelled test issue yields a proposal and the label is
      removed).
spec:
  # `*/15 * * * *` — fires every 15 minutes (96 ticks/day). A tick with
  # nothing labelled is a cheap no-op (one `gh search` + exit). Was `*/5`;
  # dropped to `*/15` to cut contention on the shared
  # `mctl-gitops-main-writes` mutex — at `*/5` the poll competed with the
  # implement cron (`*/5`) and operator-triggered investigates, queuing
  # their commit-and-push behind no-op poll ticks. 15-min intake latency is
  # fine for an autonomous pipeline. Still occasionally overlaps
  # mctl-agents-shepherd (:30), mctl-agents-incidents (:15/:45), and
  # rotate-mctl-agent-github-token (:00); concurrencyPolicy: Forbid handles it.
  schedule: "*/15 * * * *"
  timezone: "UTC"
  # Forbid: never overlap two poll ticks. They contend on the same
  # `mctl-gitops-main-writes` mutex anyway, and a queued tick would only
  # delay the next genuine cron-driven one. Drop overlaps cleanly.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  # Counts, NOT days. At 96 ticks/day (every 15 min), 96 ≈ 24h of poll
  # history and 48 ≈ 12h of failures — enough for recent debugging.
  successfulJobsHistoryLimit: 96
  failedJobsHistoryLimit: 48
  suspend: false
  workflowSpec:
    workflowTemplateRef:
      name: mctl-agents-issue-poll
      clusterScope: true
