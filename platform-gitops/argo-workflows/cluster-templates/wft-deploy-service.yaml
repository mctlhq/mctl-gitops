apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: deploy-service
  annotations:
    workflows.argoproj.io/description: |
      Main deployment workflow: validate → write Vault secrets
      → generate Helm manifests → commit to gitops repo → ArgoCD syncs.

      Actions:
        onboard      — first deploy: creates values.yaml, catalog-info.yaml, vault-cleanup.yaml
        deploy       — update image tag in existing service
        update-config — update env vars / secrets without rebuilding

      Replaces: .github/workflows/release-service.yml
spec:
  entrypoint: deploy-pipeline
  serviceAccountName: argo-workflow-sa

  arguments:
    parameters:
      - name: action
        # onboard | deploy | update-config
      - name: team_name
      - name: component_name
      - name: component_type
        value: "base-service"
        # base-service | worker-service (onboard only; auto-detected for deploy/update-config)
      - name: dockerfile_repo
        value: ""
        # e.g. "myorg/my-service"
      - name: git_tag
        value: ""
        # e.g. "1.2.3"
      - name: port
        value: "8080"
      - name: host
        value: ""
        # e.g. "myteam-myapp.example.com"
      - name: env_vars
        value: ""
        # KEY=value newline-separated plaintext
      - name: secret_env_vars
        value: ""
        # KEY=value newline-separated (stored in Vault)
      - name: provision_database
        value: "false"
      - name: clear_env
        value: "false"
      - name: clear_secrets
        value: "false"
      - name: skip_health_check
        value: "false"
      - name: dockerfile_path
        value: "Dockerfile"
      - name: image_tag
        value: ""
        # explicit image tag override (empty = derived from git_tag)
      - name: autoscaling_enabled
        value: "false"
      - name: min_replicas
        value: "1"
      - name: max_replicas
        value: "5"
      - name: cpu_threshold
        value: "80"
      - name: service_template
        value: "default"
      - name: container_registry
        value: "ghcr.io/mctlhq"
      - name: config_patch
        value: ""
        # yq expression to patch values.yaml (update-config only)
        # e.g. '.configMaps["openclaw-config"]["openclaw.json"] |= (fromjson | .defaultModel = "openai-codex/gpt-5.4" | tojson)'
      - name: default_model
        value: "openai-codex/gpt-5.4"
      - name: telegram_owner_id
        value: ""
        # Telegram user ID of the service owner — auto-approved in identities table at deploy time
      - name: telegram_bot_token
        value: ""
        # Telegram bot token — written to Vault at teams/{team}/{service} → telegram-bot-token

  templates:
    # ────────────────────────────────────────────────────────────────────────
    - name: deploy-pipeline
      dag:
        tasks:
          # Step 1: validate naming, team, service existence + resolve image_tag
          - name: validate
            templateRef:
              name: tpl-validate-tenant
              clusterScope: true
              template: validate
            arguments:
              parameters:
                - name: team_name
                  value: "{{workflow.parameters.team_name}}"
                - name: component_name
                  value: "{{workflow.parameters.component_name}}"
                - name: action
                  value: "{{workflow.parameters.action}}"
                - name: component_type
                  value: "{{workflow.parameters.component_type}}"
                - name: host
                  value: "{{workflow.parameters.host}}"
                - name: dockerfile_repo
                  value: "{{workflow.parameters.dockerfile_repo}}"
                - name: git_tag
                  value: "{{workflow.parameters.git_tag}}"
                - name: image_tag
                  value: "{{workflow.parameters.image_tag}}"
                - name: service_template
                  value: "{{workflow.parameters.service_template}}"

          # Step 1b: build Docker image via GitHub Actions (skip for update-config)
          - name: build-image
            dependencies: [validate]
            when: "\"{{workflow.parameters.action}}\" != \"update-config\" && \"{{workflow.parameters.dockerfile_repo}}\" != \"\""
            template: trigger-github-build
            arguments:
              parameters:
                - name: dockerfile_repo
                  value: "{{workflow.parameters.dockerfile_repo}}"
                - name: git_tag
                  value: "{{workflow.parameters.git_tag}}"
                - name: image_name
                  value: "{{workflow.parameters.container_registry}}/{{workflow.parameters.component_name}}"
                - name: image_tag
                  value: "{{tasks.validate.outputs.parameters.image_tag}}"
                - name: dockerfile_path
                  value: "{{workflow.parameters.dockerfile_path}}"
                - name: team_name
                  value: "{{workflow.parameters.team_name}}"
                - name: component_name
                  value: "{{workflow.parameters.component_name}}"

          # Step 2: write Vault secrets (skip if no secrets)
          - name: write-secrets
            dependencies: [validate]
            when: "\"{{workflow.parameters.secret_env_vars}}\" != \"\" || \"{{workflow.parameters.telegram_bot_token}}\" != \"\""
            templateRef:
              name: tpl-vault-write
              clusterScope: true
              template: write-service-secrets
            arguments:
              parameters:
                - name: team_name
                  value: "{{workflow.parameters.team_name}}"
                - name: component_name
                  value: "{{workflow.parameters.component_name}}"
                - name: secret_env_vars
                  value: "{{workflow.parameters.secret_env_vars}}"
                - name: telegram_bot_token
                  value: "{{workflow.parameters.telegram_bot_token}}"

          # Step 3: generate manifests + git commit
          # Depends on validate (always) + build-image (optional) + write-secrets (optional).
          - name: commit
            dependencies: [validate, build-image, write-secrets]
            templateRef:
              name: tpl-git-commit
              clusterScope: true
              template: commit-service
            arguments:
              parameters:
                - name: action
                  value: "{{workflow.parameters.action}}"
                - name: team_name
                  value: "{{workflow.parameters.team_name}}"
                - name: component_name
                  value: "{{workflow.parameters.component_name}}"
                - name: component_type
                  value: "{{tasks.validate.outputs.parameters.component_type}}"
                - name: image_tag
                  value: "{{tasks.validate.outputs.parameters.image_tag}}"
                - name: port
                  value: "{{workflow.parameters.port}}"
                - name: host
                  value: "{{workflow.parameters.host}}"
                - name: env_vars
                  value: "{{workflow.parameters.env_vars}}"
                - name: secret_env_vars
                  value: "{{workflow.parameters.secret_env_vars}}"
                - name: clear_env
                  value: "{{workflow.parameters.clear_env}}"
                - name: clear_secrets
                  value: "{{workflow.parameters.clear_secrets}}"
                - name: provision_database
                  value: "{{workflow.parameters.provision_database}}"
                - name: skip_health_check
                  value: "{{workflow.parameters.skip_health_check}}"
                - name: dockerfile_repo
                  value: "{{workflow.parameters.dockerfile_repo}}"
                - name: service_template
                  value: "{{workflow.parameters.service_template}}"
                - name: config_patch
                  value: "{{workflow.parameters.config_patch}}"
                - name: default_model
                  value: "{{workflow.parameters.default_model}}"
                - name: telegram_owner_id
                  value: "{{workflow.parameters.telegram_owner_id}}"

          # Step 4: patch autoscaling block in values.yaml (conditional)
          - name: patch-autoscaling
            dependencies: [commit]
            when: "\"{{workflow.parameters.autoscaling_enabled}}\" == \"true\""
            template: patch-autoscaling-values

    # ────────────────────────────────────────────────────────────────────────
    - name: patch-autoscaling-values
      script:
        image: alpine/git:2.45.2
        command: [sh]
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
            readOnly: true
        source: |
          set -euo pipefail

          # Configure SSH for git push
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 443 ssh.github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config --global url."ssh://git@ssh.github.com:443/".insteadOf "https://github.com/"

          TEAM="{{workflow.parameters.team_name}}"
          COMPONENT="{{workflow.parameters.component_name}}"
          MIN="{{workflow.parameters.min_replicas}}"
          MAX="{{workflow.parameters.max_replicas}}"
          CPU="{{workflow.parameters.cpu_threshold}}"
          REPO="https://github.com/${GITOPS_ORG}/${GITOPS_REPO}.git"
          VALUES="platform-gitops/services/${TEAM}/${COMPONENT}/values.yaml"

          git clone --depth=1 "${REPO}" /tmp/mctl-gitops
          cd /tmp/mctl-gitops

          # Append or update autoscaling block
          if grep -q "^autoscaling:" "${VALUES}"; then
            sed -i "s|^\( *enabled: *\).*|\1true|" "${VALUES}"
            sed -i "s|^\( *minReplicas: *\).*|\1${MIN}|" "${VALUES}"
            sed -i "s|^\( *maxReplicas: *\).*|\1${MAX}|" "${VALUES}"
            sed -i "s|^\( *targetCPUUtilizationPercentage: *\).*|\1${CPU}|" "${VALUES}"
          else
            printf '\nautoscaling:\n  enabled: true\n  minReplicas: %s\n  maxReplicas: %s\n  targetCPUUtilizationPercentage: %s\n' \
              "${MIN}" "${MAX}" "${CPU}" >> "${VALUES}"
          fi

          git config user.email "ci@mctl.ai"
          git config user.name "mctl-deploy"
          git add "${VALUES}"
          git diff --staged --quiet && echo "Autoscaling already configured" && exit 0
          git commit -m "chore: enable autoscaling for ${TEAM}/${COMPONENT} (min=${MIN} max=${MAX} cpu=${CPU}%)"
          git push
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key

    # ────────────────────────────────────────────────────────────────────────
    - name: trigger-github-build
      inputs:
        parameters:
          - name: dockerfile_repo
          - name: git_tag
          - name: image_name
          - name: image_tag
          - name: dockerfile_path
            default: "Dockerfile"
          - name: team_name
          - name: component_name
      script:
        image: python:3.12-alpine
        command: [python3]
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        env:
          - name: GITHUB_PAT
            valueFrom:
              secretKeyRef:
                name: github-actions-pat
                key: token
        source: |
          import os, json, time, urllib.request, urllib.error, sys

          PAT = os.environ["GITHUB_PAT"]
          GITOPS_ORG = os.environ["GITOPS_ORG"]
          GITOPS_REPO = os.environ["GITOPS_REPO"]
          API = "https://api.github.com"

          repo = "{{inputs.parameters.dockerfile_repo}}"
          git_tag = "{{inputs.parameters.git_tag}}"
          image_name = "{{inputs.parameters.image_name}}"
          image_tag = "{{inputs.parameters.image_tag}}"
          dockerfile_path = "{{inputs.parameters.dockerfile_path}}"
          team_name = "{{inputs.parameters.team_name}}"
          component_name = "{{inputs.parameters.component_name}}"
          build_id = "{{workflow.name}}"

          git_ref = git_tag if git_tag else "HEAD"

          headers = {
              "Authorization": f"Bearer {PAT}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "Content-Type": "application/json",
          }

          def api_request(method, path, data=None):
              url = f"{API}{path}"
              body = json.dumps(data).encode() if data else None
              req = urllib.request.Request(url, data=body, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as resp:
                      if resp.status == 204:
                          return None
                      return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  body_text = e.read().decode()
                  print(f"HTTP {e.code}: {body_text}", file=sys.stderr)
                  raise

          # Trigger workflow_dispatch
          print(f"🚀 Triggering build: {repo}@{git_ref} → {image_name}:{image_tag}")
          dispatch_path = f"/repos/{GITOPS_ORG}/{GITOPS_REPO}/actions/workflows/build-image.yaml/dispatches"
          api_request("POST", dispatch_path, {
              "ref": "main",
              "inputs": {
                  "repo": repo,
                  "git_ref": git_ref,
                  "image_name": image_name,
                  "image_tag": image_tag,
                  "dockerfile_path": dockerfile_path,
                  "team_name": team_name,
                  "component_name": component_name,
                  "build_id": build_id,
              }
          })
          print("✅ Workflow dispatched, waiting for run to appear...")

          # Poll for the workflow run (correlation via build_id in run_name)
          run_name = f"build-{build_id}"
          run_id = None
          for attempt in range(30):
              time.sleep(10)
              runs = api_request("GET",
                  f"/repos/{GITOPS_ORG}/{GITOPS_REPO}/actions/workflows/build-image.yaml/runs?per_page=5")
              for run in runs.get("workflow_runs", []):
                  if run.get("name", "") == run_name or build_id in run.get("name", ""):
                      run_id = run["id"]
                      break
              if run_id:
                  break
              print(f"   Waiting for run... (attempt {attempt + 1}/30)")

          if not run_id:
              print("❌ Timed out waiting for workflow run to appear", file=sys.stderr)
              sys.exit(1)

          print(f"📦 Found run: {run_id}")
          run_url = f"https://github.com/{GITOPS_ORG}/{GITOPS_REPO}/actions/runs/{run_id}"
          print(f"🔗 {run_url}")

          # Poll for completion (10 min max)
          for attempt in range(40):
              time.sleep(15)
              run = api_request("GET",
                  f"/repos/{GITOPS_ORG}/{GITOPS_REPO}/actions/runs/{run_id}")
              status = run["status"]
              conclusion = run.get("conclusion")
              if status == "completed":
                  if conclusion == "success":
                      print(f"✅ Build succeeded: {image_name}:{image_tag}")
                      # Write image ref for downstream steps
                      with open("/tmp/image-ref", "w") as f:
                          f.write(f"{image_name}:{image_tag}")
                      sys.exit(0)
                  else:
                      print(f"❌ Build failed: {conclusion}", file=sys.stderr)
                      print(f"🔗 Details: {run_url}", file=sys.stderr)
                      sys.exit(1)
              print(f"   Build {status}... (attempt {attempt + 1}/120)")

          print("❌ Timed out waiting for build to complete (10 min)", file=sys.stderr)
          sys.exit(1)
