apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: tpl-git-commit
  annotations:
    workflows.argoproj.io/description: |
      Reusable template: clones the gitops repo, runs a generation script,
      commits and pushes only within the allowed path prefix.
      Uses GitHub App token from mounted secret.
spec:
  templates:
    # ── Generate and commit service manifests ─────────────────────────────────
    - name: commit-service
      inputs:
        parameters:
          - name: action          # onboard | deploy | update-config
          - name: team_name
          - name: component_name
          - name: component_type  # base-service | worker-service
          - name: image_tag
            default: "latest"
          - name: port
            default: "8080"
          - name: host
            default: ""
          - name: env_vars
            default: ""
          - name: secret_env_vars
            default: ""
          - name: provision_database
            default: "false"
          - name: clear_env
            default: "false"
          - name: clear_secrets
            default: "false"
          - name: skip_health_check
            default: "false"
          - name: dockerfile_repo
            default: ""
          - name: service_template
            default: "default"
      script:
        image: alpine:3.19
        command: [sh]
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        source: |
          set -e

          TEAM="{{inputs.parameters.team_name}}"
          SERVICE="{{inputs.parameters.component_name}}"
          TYPE="{{inputs.parameters.component_type}}"
          ACTION="{{inputs.parameters.action}}"
          TAG="{{inputs.parameters.image_tag}}"
          PORT="{{inputs.parameters.port}}"
          HOST="{{inputs.parameters.host}}"
          ENV_VARS="{{inputs.parameters.env_vars}}"
          SECRET_VARS="{{inputs.parameters.secret_env_vars}}"
          REPO="{{inputs.parameters.dockerfile_repo}}"
          PROVISION_DB="{{inputs.parameters.provision_database}}"
          CLEAR_ENV="{{inputs.parameters.clear_env}}"
          CLEAR_SECRETS="{{inputs.parameters.clear_secrets}}"
          SERVICE_TEMPLATE="{{inputs.parameters.service_template}}"

          # Normalize sentinels (Backstage strips bare empty strings from YAML)
          [ "$HOST" = "none" ] && HOST=""
          [ "$TAG" = "auto" ] && TAG=""
          # clear_env/clear_secrets: use param value, or detect __CLEAR__ sentinel
          [ "$CLEAR_ENV" != "true" ] && CLEAR_ENV=false
          [ "$CLEAR_SECRETS" != "true" ] && CLEAR_SECRETS=false
          [ "$ENV_VARS" = "__CLEAR__" ] && CLEAR_ENV=true && ENV_VARS=""
          [ "$SECRET_VARS" = "__CLEAR__" ] && CLEAR_SECRETS=true && SECRET_VARS=""

          # Auto-generate domain for base-service if host not explicitly set
          if [ "$TYPE" = "base-service" ] && { [ -z "$HOST" ] || [ "$HOST" = "auto" ]; }; then
            HOST="${TEAM}-${SERVICE}.${PLATFORM_DOMAIN}"
            echo "Auto-generated domain: ${HOST}"
          fi
          SKIP_HEALTH="{{inputs.parameters.skip_health_check}}"

          # ── 0. Install dependencies ───────────────────────────────────────────
          apk add --no-cache openssl curl git ca-certificates openssh-client
          curl -fsSL --retry 5 --retry-delay 3 --retry-max-time 60 \
            -o /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64"
          chmod +x /usr/local/bin/yq
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Use port 443 (port 22 is blocked); disable strict host checking for ephemeral container
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          # ── 1. Get GitHub App token (API calls only; not critical — git uses SSH) ──
          GH_TOKEN=""
          if [ -f /var/run/secrets/github-app/app-id ]; then
            APP_ID=$(cat /var/run/secrets/github-app/app-id)
            INSTALL_ID=$(cat /var/run/secrets/github-app/installation-id)
            APP_KEY=/var/run/secrets/github-app/private-key

            NOW=$(date +%s)
            IAT=$((NOW - 60))
            EXP=$((NOW + 540))
            HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
            PAYLOAD=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$IAT" "$EXP" "$APP_ID" | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
            SIG=$(printf '%s.%s' "$HEADER" "$PAYLOAD" | openssl dgst -sha256 -sign "$APP_KEY" | base64 | tr -d '=' | tr '/+' '_-' | tr -d '\n')
            JWT="${HEADER}.${PAYLOAD}.${SIG}"

            GH_TOKEN=$(curl -sf -X POST \
              -H "Authorization: Bearer ${JWT}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/app/installations/${INSTALL_ID}/access_tokens" | \
              grep '"token"' | head -1 | cut -d'"' -f4) || true
          fi

          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️  GitHub App token unavailable (non-fatal, git uses SSH deploy key)"
          fi

          # ── 2. Clone gitops repo via SSH ─────────────────────────────────────
          echo "📥 Cloning ${GITOPS_REPO}..."
          git clone --depth=1 "git@github.com:${GITOPS_ORG}/${GITOPS_REPO}.git" /tmp/mctl-gitops
          cd /tmp/mctl-gitops

          git config user.name "argo-workflows[bot]"
          git config user.email "argo-workflows[bot]@users.noreply.github.com"

          # ── 3. Service directory ──────────────────────────────────────────
          DIR="platform-gitops/services/${TEAM}/${SERVICE}"

          # ── 4. Security: validate path stays within allowed scope ─────────
          ALLOWED_BASES="platform-gitops/services/${TEAM}"
          ALLOWED=false
          for base in $ALLOWED_BASES; do
            case "$DIR" in
              ${base}/*) ALLOWED=true ;;
              ${base}) ALLOWED=true ;;
            esac
          done
          if [ "$ALLOWED" != "true" ]; then
            echo "❌ Security: path $DIR is outside allowed scope for team $TEAM"
            exit 1
          fi

          # ── 5. Generate files ──────────────────────────────────────────────
          if [ "$ACTION" = "onboard" ]; then
            mkdir -p "$DIR"

            # values.yaml from template
            if [ "$TYPE" = "base-service" ]; then
              # Check for service-specific template (e.g. openclaw)
              if [ "$SERVICE_TEMPLATE" != "default" ] && [ -f "platform-gitops/argo-workflows/file-templates/base-service-${SERVICE_TEMPLATE}-values.yaml.tpl" ]; then
                TPL="platform-gitops/argo-workflows/file-templates/base-service-${SERVICE_TEMPLATE}-values.yaml.tpl"
                echo "📋 Using service template: ${SERVICE_TEMPLATE}"
              else
                TPL="platform-gitops/argo-workflows/file-templates/base-service-values.yaml.tpl"
              fi
            else
              TPL="platform-gitops/argo-workflows/file-templates/worker-service-values.yaml.tpl"
            fi

            sed \
              -e "s|__TEAM_NAME__|${TEAM}|g" \
              -e "s|__SERVICE_NAME__|${SERVICE}|g" \
              -e "s|__IMAGE_TAG__|${TAG}|g" \
              -e "s|__PORT__|${PORT}|g" \
              -e "s|__HOST__|${HOST}|g" \
              "$TPL" > "${DIR}/values.yaml"

            # Auto-add mirror domain (alternate ↔ primary) + TLS
            if [ "$HOST" != "none" ] && [ -n "$HOST" ]; then
              MIRROR=""
              if [ -n "${PLATFORM_DOMAIN_ALT}" ]; then
                case "$HOST" in
                  *.${PLATFORM_DOMAIN_ALT}) MIRROR=$(echo "$HOST" | sed "s/\.${PLATFORM_DOMAIN_ALT}$/.${PLATFORM_DOMAIN}/") ;;
                  *.${PLATFORM_DOMAIN}) MIRROR=$(echo "$HOST" | sed "s/\.${PLATFORM_DOMAIN}$/.${PLATFORM_DOMAIN_ALT}/") ;;
                esac
              fi
              if [ -n "$MIRROR" ]; then
                yq eval -i ".ingress.hosts += [\"${MIRROR}\"]" "${DIR}/values.yaml"
              fi
              TLS_NAME="${SERVICE}-tls"
              yq eval -i ".ingress.annotations.\"cert-manager.io/cluster-issuer\" = \"letsencrypt-prod\"" "${DIR}/values.yaml"
              yq eval -i ".ingress.tls = [{\"secretName\": \"${TLS_NAME}\", \"hosts\": .ingress.hosts}]" "${DIR}/values.yaml"
            fi

            # Disable probes if requested
            if [ "$SKIP_HEALTH" = "true" ]; then
              yq eval -i '.probes.liveness = null | .probes.readiness = null' "${DIR}/values.yaml"
            fi

            # Database secret injection
            if [ "$PROVISION_DB" = "true" ]; then
              DB_SECRET="${TEAM}-${SERVICE}-db-creds"
              VAULT_PATH="teams/${TEAM}/${SERVICE}/database"
              yq eval -i ".envFrom = [{\"secretRef\": {\"name\": \"${DB_SECRET}\"}}]" "${DIR}/values.yaml"
              yq eval -i ".dbSecret.vaultPath = \"${VAULT_PATH}\"" "${DIR}/values.yaml"
              yq eval -i ".dbSecret.secretName = \"${DB_SECRET}\"" "${DIR}/values.yaml"
            fi

            # env_vars
            if [ -n "$ENV_VARS" ]; then
              while IFS='=' read -r key rest; do
                [ -z "$key" ] && continue
                echo "$key" | grep -q '^#' && continue
                key=$(echo "$key" | xargs)
                value=$(echo "$rest" | xargs)
                [ -z "$key" ] && continue
                yq eval -i ".env.${key} = \"${value}\"" "${DIR}/values.yaml"
              done << 'ENVEOF'
          {{inputs.parameters.env_vars}}
          ENVEOF
            fi

            # secret_env_vars → ExternalSecret config
            if [ -n "$SECRET_VARS" ]; then
              yq eval -i ".externalSecret.targetSecret = \"${SERVICE}-secrets\"" "${DIR}/values.yaml"
              yq eval -i '.externalSecret.data = []' "${DIR}/values.yaml"
              while IFS='=' read -r key rest; do
                [ -z "$key" ] && continue
                echo "$key" | grep -q '^#' && continue
                key=$(echo "$key" | xargs)
                [ -z "$key" ] && continue
                yq eval -i ".externalSecret.data += [{\"secretKey\": \"${key}\", \"remoteKey\": \"teams/${TEAM}/${SERVICE}\", \"property\": \"${key}\"}]" "${DIR}/values.yaml"
              done << 'SECRETEOF'
          {{inputs.parameters.secret_env_vars}}
          SECRETEOF
              yq eval -i ".envFrom = [{\"secretRef\": {\"name\": \"${SERVICE}-secrets\"}}]" "${DIR}/values.yaml"
            fi

            # catalog-info.yaml
            COMPONENT_TYPE=$( [ "$TYPE" = "base-service" ] && echo "service" || echo "worker" )
            sed \
              -e "s|__TEAM_NAME__|${TEAM}|g" \
              -e "s|__SERVICE_NAME__|${SERVICE}|g" \
              -e "s|__COMPONENT_TYPE__|${COMPONENT_TYPE}|g" \
              -e "s|__DOCKERFILE_REPO__|${REPO}|g" \
              "platform-gitops/argo-workflows/file-templates/catalog-info.yaml.tpl" > "${DIR}/catalog-info.yaml"

            if [ -n "$HOST" ]; then
              yq eval -i ".metadata.links += [{\"url\": \"https://${HOST}\", \"title\": \"Service URL\", \"icon\": \"web\"}]" "${DIR}/catalog-info.yaml"
            fi

            # vault-cleanup.yaml
            sed \
              -e "s|__TEAM_NAME__|${TEAM}|g" \
              -e "s|__SERVICE_NAME__|${SERVICE}|g" \
              "platform-gitops/argo-workflows/file-templates/vault-cleanup.yaml.tpl" > "${DIR}/vault-cleanup.yaml"

            # Validate Helm template before committing
            echo "🔍 Validating Helm template..."
            curl -fsSL --retry 5 --retry-delay 3 --retry-max-time 60 \
              -o /tmp/helm.tar.gz \
              "https://get.helm.sh/helm-v3.14.0-linux-amd64.tar.gz" && \
              tar -xzf /tmp/helm.tar.gz -C /tmp && \
              mv /tmp/linux-amd64/helm /usr/local/bin/helm

            if ! helm template test "platform-gitops/helm-charts/base-service" \
              -f "${DIR}/values.yaml" > /dev/null 2>&1; then
              echo "❌ Helm validation failed:"
              helm template test "platform-gitops/helm-charts/base-service" -f "${DIR}/values.yaml" 2>&1 || true
              exit 1
            fi
            echo "✅ Helm template valid"

            git add "${DIR}/"
            git commit -m "feat: onboard ${TEAM}/${SERVICE} (${TAG})"

          elif [ "$ACTION" = "deploy" ]; then
            yq eval -i ".image.tag = \"${TAG}\"" "${DIR}/values.yaml"

            # Clear env vars if sentinel __CLEAR__ was set
            if [ "$CLEAR_ENV" = "true" ]; then
              yq eval -i '.env = {}' "${DIR}/values.yaml"
              echo "Cleared all env vars"
            elif [ -n "$ENV_VARS" ]; then
              while IFS='=' read -r key rest; do
                [ -z "$key" ] && continue
                echo "$key" | grep -q '^#' && continue
                key=$(echo "$key" | xargs)
                value=$(echo "$rest" | xargs)
                [ -z "$key" ] && continue
                yq eval -i ".env.${key} = \"${value}\"" "${DIR}/values.yaml"
              done << 'ENVEOF3'
          {{inputs.parameters.env_vars}}
          ENVEOF3
            fi

            # Clear secrets if sentinel __CLEAR__ was set
            if [ "$CLEAR_SECRETS" = "true" ]; then
              yq eval -i '.externalSecret = {}' "${DIR}/values.yaml"
              yq eval -i '.envFrom = []' "${DIR}/values.yaml"
              echo "Cleared all secret env vars"
            elif [ -n "$SECRET_VARS" ]; then
              yq eval -i ".externalSecret.targetSecret = \"${SERVICE}-secrets\"" "${DIR}/values.yaml"
              if yq eval '.externalSecret.data' "${DIR}/values.yaml" | grep -q 'null'; then
                yq eval -i '.externalSecret.data = []' "${DIR}/values.yaml"
              fi
              while IFS='=' read -r key rest; do
                [ -z "$key" ] && continue
                echo "$key" | grep -q '^#' && continue
                key=$(echo "$key" | xargs)
                [ -z "$key" ] && continue
                EXISTS=$(yq ".externalSecret.data[] | select(.secretKey == \"${key}\")" "${DIR}/values.yaml")
                if [ -z "$EXISTS" ]; then
                  yq eval -i ".externalSecret.data += [{\"secretKey\": \"${key}\", \"remoteKey\": \"teams/${TEAM}/${SERVICE}\", \"property\": \"${key}\"}]" "${DIR}/values.yaml"
                fi
              done << 'SECRETEOF3'
          {{inputs.parameters.secret_env_vars}}
          SECRETEOF3
              yq eval -i ".envFrom = [{\"secretRef\": {\"name\": \"${SERVICE}-secrets\"}}]" "${DIR}/values.yaml"
            fi

            git add "${DIR}/values.yaml"
            if git diff --cached --quiet; then
              echo "ℹ️  No changes — already at ${TAG}"
            else
              git commit -m "deploy: ${TEAM}/${SERVICE} → ${TAG}"
            fi

          elif [ "$ACTION" = "update-config" ]; then
            CHANGED=false

            if [ "$CLEAR_ENV" = "true" ]; then
              yq eval -i '.env = {}' "${DIR}/values.yaml"
              echo "Cleared all env vars"
              CHANGED=true
            elif [ -n "$ENV_VARS" ]; then
              while IFS='=' read -r key rest; do
                [ -z "$key" ] && continue
                echo "$key" | grep -q '^#' && continue
                key=$(echo "$key" | xargs)
                value=$(echo "$rest" | xargs)
                [ -z "$key" ] && continue
                yq eval -i ".env.${key} = \"${value}\"" "${DIR}/values.yaml"
              done << 'ENVEOF2'
          {{inputs.parameters.env_vars}}
          ENVEOF2
              CHANGED=true
            fi

            if [ "$CLEAR_SECRETS" = "true" ]; then
              yq eval -i '.externalSecret = {}' "${DIR}/values.yaml"
              yq eval -i '.envFrom = []' "${DIR}/values.yaml"
              echo "Cleared all secret env vars"
              CHANGED=true
            elif [ -n "$SECRET_VARS" ]; then
              yq eval -i ".externalSecret.targetSecret = \"${SERVICE}-secrets\"" "${DIR}/values.yaml"
              if yq eval '.externalSecret.data' "${DIR}/values.yaml" | grep -q 'null'; then
                yq eval -i '.externalSecret.data = []' "${DIR}/values.yaml"
              fi
              while IFS='=' read -r key rest; do
                [ -z "$key" ] && continue
                echo "$key" | grep -q '^#' && continue
                key=$(echo "$key" | xargs)
                [ -z "$key" ] && continue
                EXISTS=$(yq ".externalSecret.data[] | select(.secretKey == \"${key}\")" "${DIR}/values.yaml")
                if [ -z "$EXISTS" ]; then
                  yq eval -i ".externalSecret.data += [{\"secretKey\": \"${key}\", \"remoteKey\": \"teams/${TEAM}/${SERVICE}\", \"property\": \"${key}\"}]" "${DIR}/values.yaml"
                fi
              done << 'SECRETEOF2'
          {{inputs.parameters.secret_env_vars}}
          SECRETEOF2
              CHANGED=true
            fi

            git add "${DIR}/values.yaml"
            if git diff --cached --quiet; then
              echo "ℹ️  No changes detected"
            else
              git commit -m "config: update env for ${TEAM}/${SERVICE}"
            fi
          fi

          # ── 6. Push with rebase retry ──────────────────────────────────────
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            if git push origin HEAD:main; then
              echo "✅ Pushed successfully"
              break
            fi
            if [ $i -lt $MAX_RETRIES ]; then
              echo "⚠️  Push failed (attempt $i), rebasing..."
              git pull --rebase origin main
            else
              echo "❌ Push failed after $MAX_RETRIES attempts"
              exit 1
            fi
          done

          echo "✅ Commit pushed — ArgoCD will sync automatically"
        volumeMounts:
          - name: github-app-credentials
            mountPath: /var/run/secrets/github-app
          - name: deploy-key
            mountPath: /secrets/deploy-key
      volumes:
        - name: github-app-credentials
          secret:
            secretName: github-app-credentials
            optional: true
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key

    # ── Delete service directory ──────────────────────────────────────────────
    - name: delete-service
      inputs:
        parameters:
          - name: team_name
          - name: component_name
          - name: component_type
      script:
        image: alpine:3.19
        command: [sh]
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        source: |
          set -e
          TEAM="{{inputs.parameters.team_name}}"
          SERVICE="{{inputs.parameters.component_name}}"
          TYPE="{{inputs.parameters.component_type}}"

          # Setup SSH
          apk add --no-cache openssl curl git openssh-client ca-certificates
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Use port 443 (port 22 is blocked); disable strict host checking for ephemeral container
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          git clone --depth=1 "git@github.com:${GITOPS_ORG}/${GITOPS_REPO}.git" /tmp/mctl-gitops
          cd /tmp/mctl-gitops
          git config user.name "argo-workflows[bot]"
          git config user.email "argo-workflows[bot]@users.noreply.github.com"

          DIR="platform-gitops/services/${TEAM}/${SERVICE}"

          if [ ! -d "$DIR" ]; then
            echo "⚠️  Service directory not found: $DIR — already deleted?"
            exit 0
          fi

          git rm -rf "$DIR"

          # Clean up empty team directory
          TEAM_DIR=$(dirname "$DIR")
          if [ -d "$TEAM_DIR" ] && [ -z "$(ls -A "$TEAM_DIR")" ]; then
            rmdir "$TEAM_DIR"
            echo "🗑️  Removed empty team directory: $TEAM_DIR"
          fi

          git commit -m "delete: ${TEAM}/${SERVICE}"

          for i in $(seq 1 5); do
            if git push origin HEAD:main; then
              echo "✅ Deleted and pushed"
              break
            fi
            if [ $i -lt 5 ]; then
              git pull --rebase origin main
            else
              echo "❌ Push failed after 5 attempts"
              exit 1
            fi
          done
        volumeMounts:
          - name: github-app-credentials
            mountPath: /var/run/secrets/github-app
          - name: deploy-key
            mountPath: /secrets/deploy-key
      volumes:
        - name: github-app-credentials
          secret:
            secretName: github-app-credentials
            optional: true
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key
