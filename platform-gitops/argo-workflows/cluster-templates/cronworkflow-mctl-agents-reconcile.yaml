apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: mctl-agents-reconcile
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: |
      Low-frequency trigger for the read-only status reconciler.

      Workflow logic lives in ClusterWorkflowTemplate `mctl-agents-reconcile`
      (cwft-mctl-agents-reconcile.yaml). This CronWorkflow submits it with no
      parameters, so it reconciles every SHEPHERD_SKIP_SERVICES repo: reads
      each proposal's linked PR and flips .status.yaml to merged/rejected if
      pr-steward's best-effort write-back was dropped. Read-only — no reviews,
      no fixes, no merges, no SDK.

      Cadence: hourly. The reconciler only repairs rare dropped write-backs,
      but steward-owned repos rely on it for the implemented->merged flip, so
      an hourly sweep keeps the bound of staleness for a pr-steward-merged
      proposal that lost its write-back at ~1h.

      Un-suspended at Stage 2: sweeps every SHEPHERD_SKIP_SERVICES repo hourly,
      repairing any pr-steward-merged proposal whose .status.yaml write-back
      was dropped.
spec:
  # `15 * * * *` — hourly at HH:15 UTC (was `45 */6` = 4×/day). Tightened so a
  # pr-steward-merged proposal's `.status.yaml` write-back lands within ~1h
  # instead of ~6h (steward-owned repos rely on reconcile for the merged flip).
  # :15 overlaps the */5 crons (issue-poll, implement) and incidents (:15/:45);
  # all contend on the shared `mctl-gitops-main-writes` mutex, so concurrent
  # ticks serialize (one waits) and the commit step's retry loop resolves it.
  schedule: "15 * * * *"
  timezone: "UTC"
  # Forbid: never overlap two reconcile ticks (they contend on the same
  # mctl-gitops-main-writes mutex anyway).
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  # Counts, NOT days. 24 ticks/day (hourly), so 48 ≈ 2 days of history.
  successfulJobsHistoryLimit: 48
  failedJobsHistoryLimit: 48
  # Un-suspended at Stage 2: reconcile sweeps every SHEPHERD_SKIP_SERVICES repo
  # hourly, repairing any pr-steward-merged proposal that lost its
  # `.status.yaml: merged` write-back.
  # TEMP: org-wide weekly Claude spend cap exhausted, overage disabled at org
  # level. Re-suspended 2026-07-16 to stop noisy failed runs; re-enable
  # (suspend: false) once the cap resets 2026-07-17T03:00:00Z. See gitops#593.
  suspend: true
  workflowSpec:
    workflowTemplateRef:
      name: mctl-agents-reconcile
      clusterScope: true
