apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: preview-deploy
  annotations:
    workflows.argoproj.io/description: |
      Deploy an ephemeral preview environment for a service using an existing image tag.
      Deploys as a separate Helm release (preview-{app}-{id}) in the team's own namespace.
      Accessible at {app}-{id}-preview.{PLATFORM_DOMAIN} (covered by *.{PLATFORM_DOMAIN} wildcard).
      Inherits imagePullSecrets, service.port, envFrom, and resources from the service's values.yaml.
      Only image.tag and ingress host are overridden — no separate ExternalSecret is created,
      the preview reuses the existing secret already in the namespace.
      Cleanup via preview-delete workflow (helm uninstall).
spec:
  entrypoint: preview-pipeline
  serviceAccountName: argo-workflow-sa

  arguments:
    parameters:
      - name: team_name
      - name: component_name
      - name: image_tag
      - name: ttl_hours
        default: "24"

  templates:
    - name: preview-pipeline
      dag:
        tasks:
          - name: deploy-preview
            template: deploy

    - name: deploy
      inputs:
        parameters:
          - name: team_name
            value: "{{workflow.parameters.team_name}}"
          - name: component_name
            value: "{{workflow.parameters.component_name}}"
          - name: image_tag
            value: "{{workflow.parameters.image_tag}}"
          - name: ttl_hours
            value: "{{workflow.parameters.ttl_hours}}"
      outputs:
        parameters:
          - name: preview_id
            valueFrom:
              path: /tmp/preview_id
          - name: preview_url
            valueFrom:
              path: /tmp/preview_url
      script:
        image: alpine/helm:3.16.4
        command: [sh]
        env:
          - name: ARGO_WORKFLOW_NAME
            value: "{{workflow.name}}"
        envFrom:
          - configMapRef:
              name: mctl-platform-config
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
            readOnly: true
        source: |
          set -euo pipefail

          TEAM="{{inputs.parameters.team_name}}"
          COMPONENT="{{inputs.parameters.component_name}}"
          TAG="{{inputs.parameters.image_tag}}"
          TTL_HOURS="{{inputs.parameters.ttl_hours}}"

          # Generate a short preview ID from the workflow name
          PREVIEW_ID=$(echo "${ARGO_WORKFLOW_NAME}" | tr -cd 'a-z0-9' | tail -c 6)
          RELEASE="preview-${COMPONENT}-${PREVIEW_ID}"
          # Use {app}-{id}-preview.{domain} pattern — covered by *.{PLATFORM_DOMAIN} wildcard
          HOST="${COMPONENT}-${PREVIEW_ID}-preview.${PLATFORM_DOMAIN}"

          echo "${PREVIEW_ID}" > /tmp/preview_id
          echo "https://${HOST}" > /tmp/preview_url

          # Clone gitops repo to get Helm chart and service values
          apk add --no-cache git openssh-client > /dev/null 2>&1
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 443 ssh.github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config --global url."ssh://git@ssh.github.com:443/".insteadOf "https://github.com/"
          git clone --depth=1 "https://github.com/${GITOPS_ORG}/${GITOPS_REPO}.git" /tmp/mctl-gitops

          CHART_PATH="/tmp/mctl-gitops/platform-gitops/helm-charts/base-service"
          SERVICE_VALUES="/tmp/mctl-gitops/platform-gitops/services/${TEAM}/${COMPONENT}/values.yaml"

          # Deploy: use service values.yaml as base to inherit imagePullSecrets, service.port,
          # envFrom, resources. Override only image.tag, ingress host, and TLS secret name.
          # externalSecret is not re-created — preview reuses the existing secret in the namespace.
          helm upgrade --install "${RELEASE}" "${CHART_PATH}" \
            --namespace "${TEAM}" \
            --values "${SERVICE_VALUES}" \
            --set image.tag="${TAG}" \
            --set ingress.enabled=true \
            --set ingress.className=traefik \
            --set "ingress.annotations.cert-manager\\.io/cluster-issuer=letsencrypt-prod" \
            --set "ingress.hosts[0]=${HOST}" \
            --set "ingress.tls[0].secretName=${RELEASE}-tls" \
            --set "ingress.tls[0].hosts[0]=${HOST}" \
            --set externalSecret=null \
            --set-string "podLabels.mctl\\.ai/preview=true" \
            --set-string "podLabels.mctl\\.ai/preview-id=${PREVIEW_ID}" \
            --wait --timeout=5m

          echo "Preview deployed: https://${HOST} (release: ${RELEASE}, namespace: ${TEAM}, ttl: ${TTL_HOURS}h)"
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-gitops-deploy-key
