apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: mctl-agents-issue-poll
  annotations:
    workflows.argoproj.io/description: |
      Issue-driven entry point — Phase 2 central poller.

      Scans every open issue under the mctlhq org carrying the
      `agents:intake` label and runs the issue-investigator for each,
      turning labelled feature requests into `proposed` proposals under
      platform-gitops/agents-state/<svc>/proposals/<slug>/.

      Where cwft-mctl-agents-investigate handles ONE issue (manual MCP
      trigger mctl_trigger_issue), this template handles the whole label
      sweep — so an operator starts an investigation by *labelling* an
      issue instead of calling an MCP tool. The poller removes the label
      once an issue has been turned into a proposal, so a steady-state
      run with nothing labelled is a cheap no-op.

      Runs:
        1. clone-gitops — SSH-clone mctl-gitops via the shared deploy key.
        2. run-poller — orchestrator/run_issue_poller.py inside
           ghcr.io/mctlhq/mctl-agents:1.14.1. It `gh search`-es for
           labelled issues, runs the investigator in-process per issue
           (gh-clones the target repo read-only, runs the Claude Agent
           SDK, writes the proposal triplet + .status.yaml, comments on
           the issue), then removes the `agents:intake` label.
        3. commit-and-push — commits the new proposal directories back to
           gitops main.

      Triggered by:
        - cron via CronWorkflow `mctl-agents-issue-poll`
        - operator submitting a one-shot Workflow that references this CWFT
spec:
  serviceAccountName: argo-workflow-sa
  imagePullSecrets:
    - name: ghcr-credentials
  ttlStrategy:
    secondsAfterCompletion: 86400
  # Release the workdir PVC (and its 10 GB Hetzner volume) as soon as the
  # workflow finishes — success OR failure. The Argo default
  # (OnWorkflowSuccess) keeps a failed run's volume attached until the
  # ttlStrategy above deletes the whole workflow (up to 14 days for the run
  # template), which leaked ~€6 of idle detached volumes in June 2026.
  volumeClaimGC:
    strategy: OnWorkflowCompletion
  # incident-17841222: a 2026-07-15 issue-poll run hung for ~14850s (just past
  # the old 14400s/4h ceiling below) with no Loki output and no distinguishing
  # error, vs. same-day baseline runs completing in minutes at the */15
  # cadence. A 4h ceiling does not "fail fast" against that baseline; it just
  # delays the failure signal by 4 hours. Lowered to 1800s (30 min, 2x the
  # cron cadence) so a hang is caught well before it silently burns most of a
  # day and skips several scheduled ticks (concurrencyPolicy: Forbid means a
  # hung run blocks new ticks from starting for as long as it holds the pod).
  # If a genuine multi-issue backlog ever needs longer than 30 min, that is a
  # sign the per-issue investigator itself needs a bound (see
  # ISSUE_INVESTIGATOR_BUDGET_USD below) rather than raising this ceiling.
  activeDeadlineSeconds: 1800
  entrypoint: poll-issues
  onExit: notify-telegram
  # NB: the `mctl-gitops-main-writes` mutex is NOT declared here at workflow
  # spec level. A poll cycle investigates N issues back-to-back (each a clone
  # + Claude SDK run), so a spec-level lock — held from pod scheduling until
  # commit-and-push exits — would block investigate/implement/shepherd/run
  # from pushing to main for the whole multi-issue window. The lock lives on
  # the commit-and-push template instead (the only step that writes to main),
  # mirroring cwft-mctl-agents-shepherd.

  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            # gitops clone + one target-repo clone at a time (the poller
            # rm-trees each target clone before moving to the next issue).
            # Same ceiling as cwft-mctl-agents-investigate.
            storage: 4Gi
  volumes:
    - name: deploy-key
      secret:
        secretName: mctl-gitops-deploy-key
        defaultMode: 0600

  templates:
    - name: poll-issues
      steps:
        - - name: clone
            template: clone-gitops
        - - name: poll
            template: run-poller
            # run_issue_poller writes each proposal + comment before any
            # later per-issue failure. Letting commit-and-push run
            # unconditionally makes whatever DID get written durable for
            # inspection; the commit step handles the "no diff" case.
            continueOn:
              failed: true
              error: true
        - - name: commit
            template: commit-and-push

    # ── 1. SSH-clone mctl-gitops into shared volume ───────────────────────
    - name: clone-gitops
      script:
        image: alpine/git:2.43.0
        command: [sh]
        source: |
          set -e
          apk add --no-cache openssh-client ca-certificates
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          git clone --depth=1 git@github.com:mctlhq/mctl-gitops.git /workdir/mctl-gitops
          mkdir -p /workdir/mctl-gitops/platform-gitops/agents-state
          # PVC-backed scratch dir for the per-issue `gh repo clone` target —
          # see TMPDIR in run-poller below.
          mkdir -p /workdir/clones
          echo "✓ gitops cloned"
        volumeMounts:
          - name: workdir
            mountPath: /workdir
          - name: deploy-key
            mountPath: /secrets/deploy-key

    # ── 2. Run issue-poller orchestrator ──────────────────────────────────
    # NB: ghcr.io/mctlhq/mctl-agents:1.12.0 is the first tag with
    # orchestrator/run_issue_poller.py. Earlier tags lack the module and
    # crash with ImportError.
    - name: run-poller
      container:
        image: ghcr.io/mctlhq/mctl-agents:1.17.0
        imagePullPolicy: IfNotPresent
        command: ["/entrypoint.sh"]
        args:
          - "sh"
          - "-c"
          - |
            set -e
            # GITHUB_TOKEN is mandatory: the poller searches for labelled
            # issues, clones target repos, comments, and removes the label.
            # The secretKeyRef is marked optional so the pod still schedules
            # for local/offline debugging — fail fast here with a clear
            # message instead of an opaque `gh` auth error from deep inside
            # Python.
            if [ -z "$GITHUB_TOKEN" ]; then
              echo "❌ GITHUB_TOKEN is not set — the poller needs it to search issues, clone repos, comment, and relabel" >&2
              exit 1
            fi
            # Wire git's HTTPS credential helper to GITHUB_TOKEN so `gh repo
            # clone` and any later git op authenticate non-interactively.
            gh auth setup-git
            exec python -m orchestrator.run_issue_poller
        env:
          # entrypoint.sh symlinks <state>/<svc>/proposals onto the baked-in
          # agents/<svc>/; run_issue_poller reads STATE_DIR directly.
          - name: STATE_DIR
            value: /workdir/mctl-gitops/platform-gitops/agents-state
          # Redirect Python's tempfile.gettempdir() onto the PVC so each
          # per-issue target-repo clone lands in PVC-backed storage.
          - name: TMPDIR
            value: /workdir/clones
          # Auth: OAuth (Claude Pro/Max). Same secret as the other pipelines.
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: claude-code-oauth-token
          # GitHub PAT for `gh search issues`, `gh repo clone`,
          # `gh issue comment` and `gh issue edit --remove-label`. Needs repo
          # read on the target repos plus `issues: write`.
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: github-token
                optional: true
          # Optional MCP token — lets the investigator inspect live service
          # metrics/status while shaping a proposal. Degrades gracefully.
          - name: MCTL_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: mctl-token
                optional: true
          - name: ISSUE_INVESTIGATOR_BUDGET_USD
            value: "3.00"
        resources:
          requests: { cpu: 200m, memory: 512Mi }
          limits:   { cpu: 2000m, memory: 4Gi }
        volumeMounts:
          - name: workdir
            mountPath: /workdir

    # ── 3. Commit & push back to mctl-gitops ──────────────────────────────
    # Like cwft-mctl-agents-investigate, the poller CREATES new proposal
    # directories — requirements.md / design.md / tasks.md / .status.yaml.
    # This step stages the proposal subtree only and refuses anything that
    # lands outside a proposal directory.
    - name: commit-and-push
      # Mutex scoped to this step — see the note at workflow spec level.
      # Only commit-and-push writes to mctl-gitops main, so the lock is
      # held for seconds (commit + push), not the whole multi-issue poll.
      synchronization:
        mutex:
          name: mctl-gitops-main-writes
      # Writes /workdir/activity ("yes"/"none") for notify-telegram to read
      # directly off the shared workdir PVC — NOT via Argo output parameters.
      # A `workflow.outputs.parameters.X` reference from onExit resolves fine
      # with exactly one such parameter (see degraded_apps on
      # cwft-mctl-agents-shepherd), but adding a SECOND one sourced from a
      # different step broke Argo's static validator workflow-wide
      # ("invalid spec: templates.notify-telegram: failed to resolve
      # {{workflow.outputs.parameters.activity}}", reproduced 2026-07-06 —
      # every CronWorkflow tick failed silently, `implement`/`issue-poll`
      # stopped scheduling entirely). The PVC file sidesteps that mechanism.
      script:
        image: alpine/git:2.43.0
        command: [sh]
        source: |
          set -e
          apk add --no-cache openssh-client ca-certificates
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          cd /workdir/mctl-gitops
          git config user.name "mctl-agents[bot]"
          git config user.email "mctl-agents[bot]@users.noreply.github.com"

          # Scope guard: the poller (via the investigator) must only ever
          # create/update files INSIDE a proposal directory —
          # agents-state/<svc>/proposals/<slug>/. Anything else under
          # agents-state/ is not this workflow's output; fail loudly rather
          # than silently widening the commit.
          OUT_OF_SCOPE="$(git status --porcelain -- 'platform-gitops/agents-state/' ':(exclude,glob)platform-gitops/agents-state/*/proposals/*/**')"
          if [ -n "$OUT_OF_SCOPE" ]; then
            echo "❌ Refusing to commit changes outside a proposal directory under platform-gitops/agents-state/:"
            printf '%s\n' "$OUT_OF_SCOPE"
            exit 1
          fi

          # Short-circuit BEFORE `git add` so a zero-change run (e.g. nothing
          # was labelled, or every labelled issue was already in flight) is a
          # clean no-op under `set -e`.
          CHANGES="$(git status --porcelain -- ':(glob)platform-gitops/agents-state/*/proposals/*/**')"
          if [ -z "$CHANGES" ]; then
            echo "ℹ️  No proposal changes — nothing to commit."
            echo -n "none" > /workdir/activity
            exit 0
          fi
          git add -- ':(glob)platform-gitops/agents-state/*/proposals/*/**'

          if git diff --cached --quiet; then
            echo "ℹ️  No staged changes — nothing to commit."
            echo -n "none" > /workdir/activity
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(agents): issue-poll ${DATE}"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "✅ Pushed proposals"
              echo -n "yes" > /workdir/activity
              exit 0
            fi
            echo "⚠️  Push failed (attempt ${i}), rebasing..."
            git pull --rebase origin main
          done
          echo "❌ Push failed after 5 attempts"
          exit 1
        volumeMounts:
          - name: workdir
            mountPath: /workdir
          - name: deploy-key
            mountPath: /secrets/deploy-key

    # ── 4. Telegram + incident notification (onExit) ──────────────────────
    # Same pattern as cwft-mctl-agents-investigate.
    - name: notify-telegram
      script:
        image: alpine:3.19
        command: [sh]
        env:
          - name: TG_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: telegram-bot-token
                optional: true
          - name: TG_CHAT_ID
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: telegram-chat-id
                optional: true
          - name: MCTL_TOKEN
            valueFrom:
              secretKeyRef:
                name: mctl-agents-secrets
                key: mctl-token
                optional: true
          - name: WORKFLOW_STATUS
            value: "{{workflow.status}}"
          - name: WORKFLOW_NAME
            value: "{{workflow.name}}"
          - name: WORKFLOW_DURATION
            value: "{{workflow.duration}}"
        volumeMounts:
          - name: workdir
            mountPath: /workdir
        source: |
          set +e
          apk add --no-cache curl ca-certificates jq >/dev/null 2>&1

          # "none" when commit-and-push had nothing to commit (steady-state
          # tick with no labelled issues). Read off the shared workdir PVC
          # rather than a workflow output parameter — see the note on
          # commit-and-push for why.
          WORKFLOW_ACTIVITY=$(cat /workdir/activity 2>/dev/null || echo "unknown")

          case "$WORKFLOW_STATUS" in
            Succeeded) ICON="✅" ;;
            Failed)    ICON="❌" ;;
            Error)     ICON="⚠️" ;;
            *)         ICON="⏳" ;;
          esac
          UI_URL="https://workflows.mctl.ai/workflows/argo-workflows/${WORKFLOW_NAME}"
          TEXT=$(printf '%s mctl-agents: issue-poll — %s (%ss)\n%s' \
            "$ICON" "$WORKFLOW_STATUS" "$WORKFLOW_DURATION" "$UI_URL")

          # Telegram leg. Skip a Succeeded run that found nothing labelled —
          # at the */15 cadence that's the steady-state outcome. JSON-encode
          # the body via jq so a quote / newline / backslash cannot malform
          # the payload and silently drop it.
          if [ "$WORKFLOW_STATUS" = "Succeeded" ] && [ "$WORKFLOW_ACTIVITY" = "none" ]; then
            echo "ℹ️  Succeeded with no activity (nothing labelled) — skipping Telegram leg."
          elif [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            TG_BODY=$(jq -nc --arg chat "$TG_CHAT_ID" --arg text "$TEXT" \
              '{chat_id: $chat, text: $text, disable_web_page_preview: true}')
            curl -s -o /dev/null -w 'telegram http=%{http_code}\n' \
              -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$TG_BODY"
          else
            echo "ℹ️  TG_BOT_TOKEN or TG_CHAT_ID not set; skipping Telegram leg."
          fi

          # Incident leg — only on terminal failure.
          if { [ "$WORKFLOW_STATUS" = "Failed" ] || [ "$WORKFLOW_STATUS" = "Error" ]; } && [ -n "$MCTL_TOKEN" ]; then
            INCIDENT_ID="argo-${WORKFLOW_NAME}-$(date +%s)"
            SUMMARY="mctl-agents issue-poll ${WORKFLOW_STATUS} after ${WORKFLOW_DURATION}s — ${UI_URL}"
            BODY=$(jq -nc --arg id "$INCIDENT_ID" --arg summary "$SUMMARY" '{
              id: $id,
              source: "argo-workflows",
              type: "workflow_failed",
              tenant: "admins",
              service: "mctl-agents",
              summary: $summary,
              severity: "warning",
              # "analyzing", not "open": the incident-responder discovery
              # query only picks up status=analyzing, and nothing in mctl-api
              # ever promotes open->analyzing — a status of "open" here means
              # the incident sits unanalyzed forever (observed 2026-07-12:
              # 6 self-reported workflow_failed incidents never picked up).
              status: "analyzing"
            }')
            curl -s -o /dev/null -w 'incident http=%{http_code}\n' \
              -X POST "https://api.mctl.ai/api/v1/incidents" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${MCTL_TOKEN}" \
              -d "$BODY"
          else
            echo "ℹ️  Workflow ${WORKFLOW_STATUS} or MCTL_TOKEN missing; skipping incident leg."
          fi
          exit 0
