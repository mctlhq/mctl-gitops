---
# SSO credentials for Argo Workflows GitHub OAuth (via ArgoCD Dex)
# Vault path: platform/argo-workflows/sso
# Required keys: client-id, client-secret
# client-id  = "argo-workflows" (must match Dex staticClient id)
# client-secret = random string (must match Dex staticClient secret)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argo-workflows-sso
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: argo-workflows-sso
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: platform/argo-workflows/sso
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: platform/argo-workflows/sso
        property: client-secret
