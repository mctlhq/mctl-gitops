# Backstop janitor for orphaned per-workflow `workdir` PVCs.
#
# Primary defence is workflowDefaults.spec.volumeClaimGC.strategy=OnWorkflowCompletion
# (set in the argo-workflows Helm values), which deletes a workflow's
# volumeClaimTemplate PVC when it finishes, success or failure. This CronJob is
# defence-in-depth: it catches PVCs that slip through (e.g. a Workflow object
# force-deleted or TTL-GC'd before its PVC was reclaimed, or pre-existing
# orphans from before volumeClaimGC was enabled).
#
# A `<workflow-name>-workdir` PVC is deleted only when BOTH hold:
#   - no Pod currently mounts it, AND
#   - its owning Workflow is gone, or in a terminal phase (Succeeded/Failed/Error).
# A running/pending workflow (incl. a just-submitted one with empty phase) is
# kept, so this never races a live workflow.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-pvc-janitor
  namespace: argo-workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-pvc-janitor
  namespace: argo-workflows
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-pvc-janitor
  namespace: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-pvc-janitor
subjects:
  - kind: ServiceAccount
    name: argo-pvc-janitor
    namespace: argo-workflows
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: argo-pvc-janitor
  namespace: argo-workflows
spec:
  schedule: "17 * * * *"  # hourly, offset to avoid top-of-hour contention
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      ttlSecondsAfterFinished: 600  # don't let finished janitor jobs pile up
      template:
        spec:
          serviceAccountName: argo-pvc-janitor
          restartPolicy: Never
          # alpine/k8s ships kubectl and is multi-pull-reliable. Do NOT use
          # bitnami/kubectl — those Docker Hub tags were retired and silently
          # wedge on ImagePullBackOff (see vault-auto-unseal incident).
          containers:
            - name: janitor
              image: alpine/k8s:1.33.12
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              env:
                # Telegram report (admins chat). Hourly job, so unlike the
                # daily janitors it only reports when it deleted something or
                # failed — a silent run is the normal case. Optional: without
                # the secret the janitor still runs, just silently.
                - name: TG_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: mctl-agents-secrets
                      key: telegram-bot-token
                      optional: true
                - name: TG_CHAT_ID
                  valueFrom:
                    secretKeyRef:
                      name: mctl-agents-secrets
                      key: telegram-chat-id
                      optional: true
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  NS=argo-workflows
                  ACTIONS=/tmp/actions.log
                  : > "$ACTIONS"
                  notify() {
                    RC=$?
                    set +e
                    [ -n "${TG_BOT_TOKEN:-}" ] && [ -n "${TG_CHAT_ID:-}" ] || return 0
                    DELETED=$(grep -c '^DELETE' "$ACTIONS" || true)
                    if [ "$RC" -eq 0 ] && [ "${DELETED:-0}" -eq 0 ]; then
                      return 0
                    fi
                    if [ "$RC" -eq 0 ]; then
                      MSG="argo-pvc-janitor: deleted ${DELETED} orphaned workdir PVC(s)
                  $(grep '^DELETE' "$ACTIONS")"
                    else
                      MSG="argo-pvc-janitor FAILED (exit ${RC}) — see: kubectl -n argo-workflows logs job/<latest argo-pvc-janitor job>"
                    fi
                    curl -s --max-time 10 \
                      "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
                      --data-urlencode "chat_id=${TG_CHAT_ID}" \
                      --data-urlencode "text=${MSG}" > /dev/null \
                      || echo "telegram notify failed; continuing"
                  }
                  trap notify EXIT
                  echo "=== argo workdir PVC janitor ($(date -u +%FT%TZ)) ==="
                  # PVCs currently mounted by some pod — never touch these.
                  INUSE=$(kubectl get pods -n "$NS" \
                    -o jsonpath='{range .items[*]}{range .spec.volumes[*]}{.persistentVolumeClaim.claimName}{"\n"}{end}{end}' \
                    2>/dev/null | sort -u)
                  for pvc in $(kubectl get pvc -n "$NS" -o name 2>/dev/null | sed 's#.*/##' | grep -- '-workdir$' || true); do
                    if printf '%s\n' "$INUSE" | grep -qx "$pvc"; then
                      echo "keep   $pvc (in use by a pod)"; continue
                    fi
                    wf="${pvc%-workdir}"
                    if ! kubectl get workflow -n "$NS" "$wf" >/dev/null 2>&1; then
                      echo "DELETE $pvc (owning workflow '$wf' gone — orphan)" | tee -a "$ACTIONS"
                      kubectl delete pvc -n "$NS" "$pvc" --wait=false || true
                      continue
                    fi
                    phase=$(kubectl get workflow -n "$NS" "$wf" -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
                    case "$phase" in
                      Succeeded|Failed|Error)
                        echo "DELETE $pvc (workflow '$wf' phase=$phase, no pod)" | tee -a "$ACTIONS"
                        kubectl delete pvc -n "$NS" "$pvc" --wait=false || true
                        ;;
                      *)
                        echo "keep   $pvc (workflow '$wf' phase=${phase:-<pending>})"
                        ;;
                    esac
                  done
                  echo "=== done ==="
