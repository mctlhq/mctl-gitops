# VMServiceScrape for Argo Workflows controller metrics.
# Native VMOperator kind (instead of monitoring.coreos.com/ServiceMonitor)
# avoids ArgoCD drift from operator auto-conversion.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: argo-workflows-controller
  namespace: argo-workflows
  labels:
    app.kubernetes.io/name: argo-workflows
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: workflow-controller
      app.kubernetes.io/name: argo-workflows-workflow-controller
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scheme: http
