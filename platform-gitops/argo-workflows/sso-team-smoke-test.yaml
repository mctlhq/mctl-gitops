# SSO RBAC: team smoke-test — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-smoke-test
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'smoke-test' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-smoke-test.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-smoke-test
type: kubernetes.io/service-account-token
