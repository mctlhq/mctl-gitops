# SSO RBAC: team yyy — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-yyy
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'yyy' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-yyy.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-yyy
type: kubernetes.io/service-account-token
