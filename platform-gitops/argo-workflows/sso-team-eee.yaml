# SSO RBAC: team eee — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-eee
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'eee' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-eee.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-eee
type: kubernetes.io/service-account-token
