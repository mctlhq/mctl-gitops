# SSO RBAC: team labs — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-labs
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'labs' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-labs.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-labs
type: kubernetes.io/service-account-token
