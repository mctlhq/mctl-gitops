# SSO RBAC: team rrr — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-rrr
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'rrr' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-rrr.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-rrr
type: kubernetes.io/service-account-token
