apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: smoke-test
  annotations:
    workflows.argoproj.io/description: |
      End-to-end smoke test for the mctl.me platform.

      Lifecycle tested:
        1. onboard      — submit deploy-service(onboard) child workflow
        2. verify-pod   — kubectl wait for Deployment available
        3. deploy       — submit deploy-service(deploy) to redeploy same image
        4. verify-pod   — confirm Deployment still available after redeploy
        5. provision-db — submit provision-database child workflow
        6. verify-vault — vault kv get confirms DB secret exists
        7. verify-secret — ExternalSecret synced into k8s Secret
        8. update-config — submit deploy-service(update-config) child workflow
        9. verify-env   — kubectl exec confirms SMOKE_TEST=true in pod env
       10. retire       — submit retire-service child workflow

      onExit handler always retires (cleanup even on failure).

      Usage:
        kubectl create -n argo-workflows -f - <<EOF
        apiVersion: argoproj.io/v1alpha1
        kind: Workflow
        metadata:
          generateName: smoke-test-
          namespace: argo-workflows
        spec:
          workflowTemplateRef:
            name: smoke-test
            clusterScope: true
        EOF
spec:
  entrypoint: smoke-pipeline
  serviceAccountName: argo-workflow-sa
  onExit: run-retire

  arguments:
    parameters:
      - name: team_name
        value: "tests"
      - name: component_name
        value: "smoke-test-svc"
      - name: dockerfile_repo
        value: "mctlhq/spring-test"

  templates:

    # ─── Main pipeline ────────────────────────────────────────────────────────
    - name: smoke-pipeline
      steps:
        - - name: onboard
            template: run-onboard
        - - name: verify-pod
            template: check-pod-running
        - - name: deploy-version
            template: run-deploy
        - - name: verify-pod-after-deploy
            template: check-pod-running
        - - name: provision-db
            template: run-provision-db
        - - name: sync-argocd-app
            template: trigger-argocd-sync
        - - name: verify-vault-secret
            template: check-vault-secret
        - - name: verify-k8s-secret
            template: check-k8s-secret
        - - name: update-config
            template: run-update-config
        - - name: sync-argocd-app-2
            template: trigger-argocd-sync
        - - name: verify-env-var
            template: check-env-var
        - - name: retire
            template: run-retire

    # ─── Step 1: Onboard service ──────────────────────────────────────────────
    - name: run-onboard
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          REPO="{{workflow.parameters.dockerfile_repo}}"

          WF_NAME=$(kubectl create -n argo-workflows -o jsonpath='{.metadata.name}' -f - << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: smoke-onboard-
            namespace: argo-workflows
          spec:
            workflowTemplateRef:
              name: deploy-service
              clusterScope: true
            arguments:
              parameters:
              - {name: action,             value: onboard}
              - {name: team_name,          value: "${TEAM}"}
              - {name: component_name,     value: "${SVC}"}
              - {name: component_type,     value: worker-service}
              - {name: dockerfile_repo,    value: "${REPO}"}
              - {name: git_tag,            value: main}
              - {name: port,               value: "8080"}
              - {name: host,               value: ""}
              - {name: env_vars,           value: ""}
              - {name: secret_env_vars,    value: ""}
              - {name: provision_database, value: "false"}
              - {name: skip_health_check,  value: "false"}
              - {name: dockerfile_path,    value: Dockerfile}
              - {name: image_tag,          value: ""}
          EOF
          )
          echo "Submitted: ${WF_NAME}"
          for i in $(seq 1 80); do
            PHASE=$(kubectl get workflow "${WF_NAME}" -n argo-workflows \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "  [${i}/80] ${PHASE}"
            case "${PHASE}" in
              Succeeded) echo "✅ onboard Succeeded"; exit 0 ;;
              Failed|Error) echo "❌ onboard ${PHASE}"; exit 1 ;;
            esac
            sleep 15
          done
          echo "❌ Timed out"; exit 1

    # ─── Step 3: Deploy new version (redeploy same image) ────────────────────
    - name: run-deploy
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          REPO="{{workflow.parameters.dockerfile_repo}}"

          WF_NAME=$(kubectl create -n argo-workflows -o jsonpath='{.metadata.name}' -f - << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: smoke-deploy-
            namespace: argo-workflows
          spec:
            workflowTemplateRef:
              name: deploy-service
              clusterScope: true
            arguments:
              parameters:
              - {name: action,             value: deploy}
              - {name: team_name,          value: "${TEAM}"}
              - {name: component_name,     value: "${SVC}"}
              - {name: component_type,     value: worker-service}
              - {name: dockerfile_repo,    value: "${REPO}"}
              - {name: git_tag,            value: main}
              - {name: port,               value: "8080"}
              - {name: host,               value: ""}
              - {name: env_vars,           value: ""}
              - {name: secret_env_vars,    value: ""}
              - {name: provision_database, value: "false"}
              - {name: skip_health_check,  value: "false"}
              - {name: dockerfile_path,    value: Dockerfile}
              - {name: image_tag,          value: ""}
          EOF
          )
          echo "Submitted: ${WF_NAME}"
          for i in $(seq 1 80); do
            PHASE=$(kubectl get workflow "${WF_NAME}" -n argo-workflows \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "  [${i}/80] ${PHASE}"
            case "${PHASE}" in
              Succeeded) echo "✅ deploy Succeeded"; exit 0 ;;
              Failed|Error) echo "❌ deploy ${PHASE}"; exit 1 ;;
            esac
            sleep 15
          done
          echo "❌ Timed out"; exit 1

    # ─── Step 5: Provision database ───────────────────────────────────────────
    - name: run-provision-db
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"

          WF_NAME=$(kubectl create -n argo-workflows -o jsonpath='{.metadata.name}' -f - << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: smoke-db-
            namespace: argo-workflows
          spec:
            workflowTemplateRef:
              name: provision-database
              clusterScope: true
            arguments:
              parameters:
              - {name: team_name, value: "${TEAM}"}
              - {name: app_name,  value: "${SVC}"}
          EOF
          )
          echo "Submitted: ${WF_NAME}"
          for i in $(seq 1 40); do
            PHASE=$(kubectl get workflow "${WF_NAME}" -n argo-workflows \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "  [${i}/40] ${PHASE}"
            case "${PHASE}" in
              Succeeded) echo "✅ provision-db Succeeded"; exit 0 ;;
              Failed|Error) echo "❌ provision-db ${PHASE}"; exit 1 ;;
            esac
            sleep 15
          done
          echo "❌ Timed out"; exit 1

    # ─── Step 6: Update config ────────────────────────────────────────────────
    - name: run-update-config
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"

          WF_NAME=$(kubectl create -n argo-workflows -o jsonpath='{.metadata.name}' -f - << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: smoke-update-
            namespace: argo-workflows
          spec:
            workflowTemplateRef:
              name: deploy-service
              clusterScope: true
            arguments:
              parameters:
              - {name: action,             value: update-config}
              - {name: team_name,          value: "${TEAM}"}
              - {name: component_name,     value: "${SVC}"}
              - {name: component_type,     value: worker-service}
              - {name: dockerfile_repo,    value: ""}
              - {name: git_tag,            value: ""}
              - {name: port,               value: "8080"}
              - {name: host,               value: ""}
              - {name: env_vars,           value: "SMOKE_TEST=true"}
              - {name: secret_env_vars,    value: ""}
              - {name: provision_database, value: "false"}
              - {name: skip_health_check,  value: "false"}
              - {name: dockerfile_path,    value: Dockerfile}
              - {name: image_tag,          value: ""}
          EOF
          )
          echo "Submitted: ${WF_NAME}"
          for i in $(seq 1 40); do
            PHASE=$(kubectl get workflow "${WF_NAME}" -n argo-workflows \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "  [${i}/40] ${PHASE}"
            case "${PHASE}" in
              Succeeded) echo "✅ update-config Succeeded"; exit 0 ;;
              Failed|Error) echo "❌ update-config ${PHASE}"; exit 1 ;;
            esac
            sleep 15
          done
          echo "❌ Timed out"; exit 1

    # ─── Step 8: Retire service ───────────────────────────────────────────────
    - name: run-retire
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"

          WF_NAME=$(kubectl create -n argo-workflows -o jsonpath='{.metadata.name}' -f - << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: smoke-retire-
            namespace: argo-workflows
          spec:
            workflowTemplateRef:
              name: retire-service
              clusterScope: true
            arguments:
              parameters:
              - {name: team_name,            value: "${TEAM}"}
              - {name: component_name,       value: "${SVC}"}
              - {name: component_type,       value: worker-service}
              - {name: delete_vault_secrets, value: "true"}
          EOF
          )
          echo "Submitted: ${WF_NAME}"
          for i in $(seq 1 20); do
            PHASE=$(kubectl get workflow "${WF_NAME}" -n argo-workflows \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "  [${i}/20] ${PHASE}"
            case "${PHASE}" in
              Succeeded) echo "✅ retire Succeeded"; exit 0 ;;
              Failed|Error) echo "❌ retire ${PHASE}"; exit 1 ;;
            esac
            sleep 15
          done
          echo "❌ Timed out"; exit 1

    # ─── Verification: pod running ────────────────────────────────────────────
    - name: check-pod-running
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          INSTANCE_LABEL="${TEAM}-${SVC}"
          echo "⏳ Waiting for ArgoCD to sync deployment (instance=${INSTANCE_LABEL}) in namespace ${TEAM}..."
          for i in $(seq 1 30); do
            DEPLOY=$(kubectl get deployment -n "${TEAM}" -l "app.kubernetes.io/instance=${INSTANCE_LABEL}" -o name 2>/dev/null | head -1)
            [ -n "${DEPLOY}" ] && break || true
            echo "  [${i}/30] Not created yet..."
            sleep 10
          done
          DEPLOY=$(kubectl get deployment -n "${TEAM}" -l "app.kubernetes.io/instance=${INSTANCE_LABEL}" -o name 2>/dev/null | head -1)
          [ -z "${DEPLOY}" ] && { echo "❌ Deployment never created"; exit 1; }
          echo "Found: ${DEPLOY}"
          kubectl wait "${DEPLOY}" \
            --namespace "${TEAM}" \
            --for=condition=available \
            --timeout=180s
          READY=$(kubectl get "${DEPLOY}" -n "${TEAM}" -o jsonpath='{.status.readyReplicas}')
          echo "✅ Deployment available (${READY:-0} ready replicas)"

    # ─── Trigger ArgoCD sync for service app ─────────────────────────────────
    - name: trigger-argocd-sync
      script:
        image: bitnami/kubectl:latest
        command: [sh]
        source: |
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          APP="${TEAM}-${SVC}"
          echo "▶ Triggering ArgoCD hard refresh for ${APP}..."
          kubectl annotate app "${APP}" argocd.argoproj.io/refresh=hard --overwrite -n argocd || true
          echo "▶ Triggering ArgoCD hard refresh for shared-pg (ExternalSecrets)..."
          kubectl annotate app "shared-pg" argocd.argoproj.io/refresh=hard --overwrite -n argocd || true
          # Give ArgoCD time to process the refresh annotation and detect OutOfSync
          echo "⏳ Waiting 30s for ArgoCD to detect changes..."
          sleep 30
          # Re-annotate in case first was missed
          kubectl annotate app "shared-pg" argocd.argoproj.io/refresh=hard --overwrite -n argocd || true
          kubectl annotate app "${APP}" argocd.argoproj.io/refresh=hard --overwrite -n argocd || true
          # Wait for shared-pg to become Synced (up to 5 min)
          echo "⏳ Waiting for shared-pg to sync..."
          for i in $(seq 1 30); do
            STATUS=$(kubectl get app shared-pg -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH=$(kubectl get app shared-pg -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            echo "  [${i}/30] shared-pg: ${STATUS} / ${HEALTH}"
            [ "$STATUS" = "Synced" ] && break
            sleep 10
          done
          echo "✅ ArgoCD sync triggered"

    # ─── Verification: Vault DB secret exists ────────────────────────────────
    - name: check-vault-secret
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -e
          apk add --no-cache curl > /dev/null 2>&1
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          VAULT_PATH="secret/data/teams/${TEAM}/${SVC}/database"
          echo "🔐 Authenticating to Vault via Kubernetes auth..."
          SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          VAULT_TOKEN=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"role\":\"argo-workflow\",\"jwt\":\"${SA_TOKEN}\"}" \
            "${VAULT_ADDR}/v1/auth/kubernetes/login" | \
            grep '"client_token"' | sed 's/.*"client_token":"\([^"]*\)".*/\1/')
          if [ -z "$VAULT_TOKEN" ]; then
            echo "❌ Failed to authenticate with Vault"
            exit 1
          fi
          echo "🔍 Checking Vault secret at ${VAULT_PATH}..."
          HTTP=$(curl -sS -o /tmp/vsecret.json -w "%{http_code}" \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "${VAULT_ADDR}/v1/${VAULT_PATH}")
          if [ "$HTTP" != "200" ]; then
            echo "❌ Secret not found (HTTP $HTTP)"
            cat /tmp/vsecret.json || true
            exit 1
          fi
          grep -q '"database"' /tmp/vsecret.json || { echo "❌ database key missing"; exit 1; }
          grep -q '"password"' /tmp/vsecret.json || { echo "❌ password key missing"; exit 1; }
          echo "✅ Vault secret exists with expected DB keys"
        env:
          - name: VAULT_ADDR
            value: "http://vault.vault.svc.cluster.local:8200"

    # ─── Verification: ExternalSecret synced ─────────────────────────────────
    - name: check-k8s-secret
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          # ExternalSecret and Secret live in platform-db (shared CNPG namespace)
          ES_NS="platform-db"
          ES_NAME="${TEAM}-${SVC}-db-creds"
          echo "🔍 Waiting for ExternalSecret ${ES_NAME} in ${ES_NS} to sync (up to 5min)..."
          for i in $(seq 1 30); do
            STATUS=$(kubectl get externalsecret "${ES_NAME}" -n "${ES_NS}" \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
            [ "${STATUS}" = "True" ] && { echo "✅ ExternalSecret synced"; break; }
            echo "  [${i}/30] status=${STATUS:-NotFound}, retrying in 10s..."
            sleep 10
          done
          STATUS=$(kubectl get externalsecret "${ES_NAME}" -n "${ES_NS}" \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
          if [ "${STATUS}" != "True" ]; then
            echo "❌ ExternalSecret ${ES_NAME} not Ready (status: ${STATUS})"
            kubectl get externalsecret -n "${ES_NS}" 2>/dev/null || true
            exit 1
          fi
          kubectl get secret "${ES_NAME}" -n "${ES_NS}" \
            -o jsonpath='{.data.DATABASE_URL}' | base64 -d | grep -q "postgresql://"
          echo "✅ k8s Secret ${ES_NAME} in ${ES_NS} contains valid DATABASE_URL"

    # ─── Verification: env var in running pod ────────────────────────────────
    - name: check-env-var
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          INSTANCE_LABEL="${TEAM}-${SVC}"
          # Give ArgoCD time to detect the config change and start syncing
          echo "Waiting 60s for ArgoCD sync to start..."
          sleep 60
          # Retry loop: wait for ArgoCD sync + rollout + SMOKE_TEST to appear
          for i in $(seq 1 24); do
            echo "[${i}/24] Checking for SMOKE_TEST=true in ${TEAM}/${SVC} pod..."
            DEPLOY=$(kubectl get deployment -n "${TEAM}" -l "app.kubernetes.io/instance=${INSTANCE_LABEL}" -o name 2>/dev/null | head -1)
            if [ -z "${DEPLOY}" ]; then echo "  deployment not found yet..."; sleep 15; continue; fi
            kubectl rollout status "${DEPLOY}" -n "${TEAM}" --timeout=30s 2>/dev/null || true
            POD=$(kubectl get pods -n "${TEAM}" \
              -l "app.kubernetes.io/instance=${INSTANCE_LABEL}" \
              --field-selector=status.phase=Running \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [ -z "${POD}" ]; then echo "  no running pod yet..."; sleep 15; continue; fi
            if kubectl exec -n "${TEAM}" "${POD}" -- env 2>/dev/null | grep -q "SMOKE_TEST=true"; then
              echo "✅ SMOKE_TEST=true confirmed in pod ${POD}"
              exit 0
            fi
            echo "  SMOKE_TEST not yet present, waiting..."
            sleep 15
          done
          echo "❌ SMOKE_TEST=true not found after 6 minutes"
          exit 1
