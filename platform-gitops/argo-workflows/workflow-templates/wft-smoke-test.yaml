apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: smoke-test
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: |
      End-to-end smoke test for the mctl.me platform.

      Lifecycle tested:
        1. onboard      — submit deploy-service(onboard) child workflow
        2. verify-pod   — kubectl wait for Deployment available
        3. provision-db — submit provision-database child workflow
        4. verify-vault — vault kv get confirms DB secret exists
        5. verify-secret — ExternalSecret synced into k8s Secret
        6. update-config — submit deploy-service(update-config) child workflow
        7. verify-env   — kubectl exec confirms SMOKE_TEST=true in pod env
        8. retire       — submit retire-service child workflow

      onExit handler always retires (cleanup even on failure).

      Usage:
        kubectl create -n argo-workflows -f - <<EOF
        apiVersion: argoproj.io/v1alpha1
        kind: Workflow
        metadata:
          generateName: smoke-test-
          namespace: argo-workflows
        spec:
          workflowTemplateRef:
            name: smoke-test
        EOF
spec:
  entrypoint: smoke-pipeline
  serviceAccountName: argo-workflow-sa
  onExit: run-retire

  arguments:
    parameters:
      - name: team_name
        value: "tests"
      - name: component_name
        value: "smoke-test-svc"
      - name: dockerfile_repo
        value: "mctlhq/e2e-public-test"

  templates:

    # ─── Main pipeline ────────────────────────────────────────────────────────
    - name: smoke-pipeline
      steps:
        - - name: onboard
            template: run-onboard
        - - name: verify-pod
            template: check-pod-running
        - - name: provision-db
            template: run-provision-db
        - - name: verify-vault-secret
            template: check-vault-secret
        - - name: verify-k8s-secret
            template: check-k8s-secret
        - - name: update-config
            template: run-update-config
        - - name: verify-env-var
            template: check-env-var
        - - name: retire
            template: run-retire

    # ─── Step 1: Onboard service ──────────────────────────────────────────────
    - name: run-onboard
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          REPO="{{workflow.parameters.dockerfile_repo}}"

          WF_NAME=$(kubectl create -n argo-workflows -o jsonpath='{.metadata.name}' -f - << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: smoke-onboard-
            namespace: argo-workflows
          spec:
            workflowTemplateRef:
              name: deploy-service
            arguments:
              parameters:
              - {name: action,             value: onboard}
              - {name: team_name,          value: "${TEAM}"}
              - {name: component_name,     value: "${SVC}"}
              - {name: component_type,     value: worker-service}
              - {name: dockerfile_repo,    value: "${REPO}"}
              - {name: git_tag,            value: main}
              - {name: port,               value: "8080"}
              - {name: host,               value: ""}
              - {name: env_vars,           value: ""}
              - {name: secret_env_vars,    value: ""}
              - {name: provision_database, value: "false"}
              - {name: skip_health_check,  value: "false"}
              - {name: dockerfile_path,    value: Dockerfile}
              - {name: image_tag,          value: ""}
          EOF
          )
          echo "Submitted: ${WF_NAME}"
          for i in $(seq 1 80); do
            PHASE=$(kubectl get workflow "${WF_NAME}" -n argo-workflows \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "  [${i}/80] ${PHASE}"
            case "${PHASE}" in
              Succeeded) echo "✅ onboard Succeeded"; exit 0 ;;
              Failed|Error) echo "❌ onboard ${PHASE}"; exit 1 ;;
            esac
            sleep 15
          done
          echo "❌ Timed out"; exit 1

    # ─── Step 3: Provision database ───────────────────────────────────────────
    - name: run-provision-db
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"

          WF_NAME=$(kubectl create -n argo-workflows -o jsonpath='{.metadata.name}' -f - << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: smoke-db-
            namespace: argo-workflows
          spec:
            workflowTemplateRef:
              name: provision-database
            arguments:
              parameters:
              - {name: team_name, value: "${TEAM}"}
              - {name: app_name,  value: "${SVC}"}
          EOF
          )
          echo "Submitted: ${WF_NAME}"
          for i in $(seq 1 40); do
            PHASE=$(kubectl get workflow "${WF_NAME}" -n argo-workflows \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "  [${i}/40] ${PHASE}"
            case "${PHASE}" in
              Succeeded) echo "✅ provision-db Succeeded"; exit 0 ;;
              Failed|Error) echo "❌ provision-db ${PHASE}"; exit 1 ;;
            esac
            sleep 15
          done
          echo "❌ Timed out"; exit 1

    # ─── Step 6: Update config ────────────────────────────────────────────────
    - name: run-update-config
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"

          WF_NAME=$(kubectl create -n argo-workflows -o jsonpath='{.metadata.name}' -f - << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: smoke-update-
            namespace: argo-workflows
          spec:
            workflowTemplateRef:
              name: deploy-service
            arguments:
              parameters:
              - {name: action,             value: update-config}
              - {name: team_name,          value: "${TEAM}"}
              - {name: component_name,     value: "${SVC}"}
              - {name: component_type,     value: worker-service}
              - {name: dockerfile_repo,    value: ""}
              - {name: git_tag,            value: ""}
              - {name: port,               value: "8080"}
              - {name: host,               value: ""}
              - {name: env_vars,           value: "SMOKE_TEST=true"}
              - {name: secret_env_vars,    value: ""}
              - {name: provision_database, value: "false"}
              - {name: skip_health_check,  value: "false"}
              - {name: dockerfile_path,    value: Dockerfile}
              - {name: image_tag,          value: ""}
          EOF
          )
          echo "Submitted: ${WF_NAME}"
          for i in $(seq 1 40); do
            PHASE=$(kubectl get workflow "${WF_NAME}" -n argo-workflows \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "  [${i}/40] ${PHASE}"
            case "${PHASE}" in
              Succeeded) echo "✅ update-config Succeeded"; exit 0 ;;
              Failed|Error) echo "❌ update-config ${PHASE}"; exit 1 ;;
            esac
            sleep 15
          done
          echo "❌ Timed out"; exit 1

    # ─── Step 8: Retire service ───────────────────────────────────────────────
    - name: run-retire
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"

          WF_NAME=$(kubectl create -n argo-workflows -o jsonpath='{.metadata.name}' -f - << EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Workflow
          metadata:
            generateName: smoke-retire-
            namespace: argo-workflows
          spec:
            workflowTemplateRef:
              name: retire-service
            arguments:
              parameters:
              - {name: team_name,            value: "${TEAM}"}
              - {name: component_name,       value: "${SVC}"}
              - {name: component_type,       value: worker-service}
              - {name: delete_vault_secrets, value: "true"}
          EOF
          )
          echo "Submitted: ${WF_NAME}"
          for i in $(seq 1 20); do
            PHASE=$(kubectl get workflow "${WF_NAME}" -n argo-workflows \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "  [${i}/20] ${PHASE}"
            case "${PHASE}" in
              Succeeded) echo "✅ retire Succeeded"; exit 0 ;;
              Failed|Error) echo "❌ retire ${PHASE}"; exit 1 ;;
            esac
            sleep 15
          done
          echo "❌ Timed out"; exit 1

    # ─── Verification: pod running ────────────────────────────────────────────
    - name: check-pod-running
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          INSTANCE_LABEL="${TEAM}-${SVC}"
          echo "⏳ Waiting for ArgoCD to sync deployment (instance=${INSTANCE_LABEL}) in namespace ${TEAM}..."
          for i in $(seq 1 30); do
            DEPLOY=$(kubectl get deployment -n "${TEAM}" -l "app.kubernetes.io/instance=${INSTANCE_LABEL}" -o name 2>/dev/null | head -1)
            [ -n "${DEPLOY}" ] && break || true
            echo "  [${i}/30] Not created yet..."
            sleep 10
          done
          DEPLOY=$(kubectl get deployment -n "${TEAM}" -l "app.kubernetes.io/instance=${INSTANCE_LABEL}" -o name 2>/dev/null | head -1)
          [ -z "${DEPLOY}" ] && { echo "❌ Deployment never created"; exit 1; }
          echo "Found: ${DEPLOY}"
          kubectl wait "${DEPLOY}" \
            --namespace "${TEAM}" \
            --for=condition=available \
            --timeout=180s
          READY=$(kubectl get "${DEPLOY}" -n "${TEAM}" -o jsonpath='{.status.readyReplicas}')
          echo "✅ Deployment available (${READY:-0} ready replicas)"

    # ─── Verification: Vault DB secret exists ────────────────────────────────
    - name: check-vault-secret
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -e
          apk add --no-cache curl > /dev/null 2>&1
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          VAULT_PATH="secret/data/platform/teams/${TEAM}/${SVC}/database"
          echo "🔐 Authenticating to Vault via Kubernetes auth..."
          SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          VAULT_TOKEN=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"role\":\"argo-workflow\",\"jwt\":\"${SA_TOKEN}\"}" \
            "${VAULT_ADDR}/v1/auth/kubernetes/login" | \
            grep '"client_token"' | sed 's/.*"client_token":"\([^"]*\)".*/\1/')
          if [ -z "$VAULT_TOKEN" ]; then
            echo "❌ Failed to authenticate with Vault"
            exit 1
          fi
          echo "🔍 Checking Vault secret at ${VAULT_PATH}..."
          HTTP=$(curl -sS -o /tmp/vsecret.json -w "%{http_code}" \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "${VAULT_ADDR}/v1/${VAULT_PATH}")
          if [ "$HTTP" != "200" ]; then
            echo "❌ Secret not found (HTTP $HTTP)"
            cat /tmp/vsecret.json || true
            exit 1
          fi
          grep -q '"database"' /tmp/vsecret.json || { echo "❌ database key missing"; exit 1; }
          grep -q '"password"' /tmp/vsecret.json || { echo "❌ password key missing"; exit 1; }
          echo "✅ Vault secret exists with expected DB keys"
        env:
          - name: VAULT_ADDR
            value: "http://vault.vault.svc.cluster.local:8200"

    # ─── Verification: ExternalSecret synced ─────────────────────────────────
    - name: check-k8s-secret
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          # Secret name matches dbSecret.secretName set by provision-database
          SECRET_NAME="${TEAM}-${SVC}-db-creds"
          ES_NAME="${TEAM}-${SVC}-base-service-db-creds"
          echo "🔍 Waiting for ExternalSecret ${ES_NAME} to sync (up to 5min)..."
          for i in $(seq 1 30); do
            STATUS=$(kubectl get externalsecret "${ES_NAME}" -n "${TEAM}" \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
            [ "${STATUS}" = "True" ] && { echo "✅ ExternalSecret synced"; break; }
            echo "  [${i}/30] status=${STATUS:-NotFound}, retrying in 10s..."
            sleep 10
          done
          STATUS=$(kubectl get externalsecret "${ES_NAME}" -n "${TEAM}" \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
          if [ "${STATUS}" != "True" ]; then
            echo "❌ ExternalSecret ${ES_NAME} not Ready (status: ${STATUS})"
            kubectl get externalsecret -n "${TEAM}" 2>/dev/null || true
            exit 1
          fi
          kubectl get secret "${SECRET_NAME}" -n "${TEAM}" \
            -o jsonpath='{.data.DATABASE_URL}' | base64 -d | grep -q "postgresql://"
          echo "✅ k8s Secret ${SECRET_NAME} contains valid DATABASE_URL"

    # ─── Verification: env var in running pod ────────────────────────────────
    - name: check-env-var
      script:
        image: bitnami/kubectl:latest
        command: [bash]
        source: |
          set -e
          TEAM="{{workflow.parameters.team_name}}"
          SVC="{{workflow.parameters.component_name}}"
          INSTANCE_LABEL="${TEAM}-${SVC}"
          echo "⏳ Waiting for rollout to complete..."
          DEPLOY=$(kubectl get deployment -n "${TEAM}" -l "app.kubernetes.io/instance=${INSTANCE_LABEL}" -o name 2>/dev/null | head -1)
          [ -z "${DEPLOY}" ] && { echo "❌ Deployment not found"; exit 1; }
          kubectl rollout status "${DEPLOY}" -n "${TEAM}" --timeout=180s
          POD=$(kubectl get pods -n "${TEAM}" \
            -l "app.kubernetes.io/instance=${INSTANCE_LABEL}" \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -z "${POD}" ]; then
            echo "❌ No running pod found for instance=${INSTANCE_LABEL} in ${TEAM}"
            exit 1
          fi
          echo "🔍 Checking env var in pod ${POD}..."
          kubectl exec -n "${TEAM}" "${POD}" -- env | grep "SMOKE_TEST=true"
          echo "✅ SMOKE_TEST=true confirmed in pod environment"
