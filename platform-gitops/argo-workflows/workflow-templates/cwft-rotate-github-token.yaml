apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: rotate-mctl-agent-github-token
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: |
      Rotates the GitHub App installation token for mctl-agent every 45 minutes.
      Reads the GitHub App private key from Vault, generates a new installation token,
      writes it back to Vault, and triggers ExternalSecret re-sync so the mctl-agent
      pod picks up the fresh token without a restart.
spec:
  schedule: "*/45 * * * *"
  timezone: "UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    serviceAccountName: argo-workflow-sa
    ttlStrategy:
      secondsAfterCompletion: 3600
    entrypoint: rotate
    templates:
      - name: rotate
        script:
          image: python:3.12-alpine
          command: [sh]
          source: |
            set -e
            pip install cryptography --quiet

            python3 - << 'PYEOF'
            import os, time, json, base64, urllib.request, urllib.error, subprocess

            VAULT_ADDR = os.environ["VAULT_ADDR"]

            # ── Authenticate with Vault via Kubernetes SA token ──────────────────
            with open("/var/run/secrets/kubernetes.io/serviceaccount/token") as f:
                sa_token = f.read().strip()

            resp = urllib.request.urlopen(urllib.request.Request(
                f"{VAULT_ADDR}/v1/auth/kubernetes/login",
                data=json.dumps({"role": "argo-workflow", "jwt": sa_token}).encode(),
                headers={"Content-Type": "application/json"},
                method="POST"
            ))
            vault_token = json.loads(resp.read())["auth"]["client_token"]
            print("✅ Vault authenticated")

            # ── Read GitHub App credentials ───────────────────────────────────────
            req = urllib.request.Request(
                f"{VAULT_ADDR}/v1/secret/data/platform/github-app",
                headers={"X-Vault-Token": vault_token}
            )
            data = json.loads(urllib.request.urlopen(req).read())["data"]["data"]
            private_key = data["private-key"]
            app_id = data["app-id"]
            installation_id = data["installation-id"]
            print(f"✅ Got GitHub App credentials (app={app_id}, installation={installation_id})")

            # ── Generate GitHub App JWT ───────────────────────────────────────────
            from cryptography.hazmat.primitives import serialization, hashes
            from cryptography.hazmat.primitives.asymmetric import padding
            from cryptography.hazmat.backends import default_backend

            key = serialization.load_pem_private_key(
                private_key.encode(), password=None, backend=default_backend()
            )
            now = int(time.time())
            header = base64.urlsafe_b64encode(b'{"alg":"RS256","typ":"JWT"}').rstrip(b'=').decode()
            payload_dict = {"iat": now - 60, "exp": now + 600, "iss": app_id}
            payload = base64.urlsafe_b64encode(
                json.dumps(payload_dict, separators=(',', ':')).encode()
            ).rstrip(b'=').decode()
            signing_input = f"{header}.{payload}".encode()
            signature = key.sign(signing_input, padding.PKCS1v15(), hashes.SHA256())
            sig_b64 = base64.urlsafe_b64encode(signature).rstrip(b'=').decode()
            app_jwt = f"{header}.{payload}.{sig_b64}"

            # ── Get installation access token ─────────────────────────────────────
            req = urllib.request.Request(
                f"https://api.github.com/app/installations/{installation_id}/access_tokens",
                data=b"{}",
                headers={
                    "Authorization": f"Bearer {app_jwt}",
                    "Accept": "application/vnd.github+json",
                    "X-GitHub-Api-Version": "2022-11-28",
                    "Content-Length": "2",
                },
                method="POST"
            )
            result = json.loads(urllib.request.urlopen(req).read())
            new_token = result["token"]
            expires_at = result["expires_at"]
            print(f"✅ New GitHub token generated (expires: {expires_at})")

            # ── Read existing Vault secret (to merge, not overwrite) ──────────────
            req = urllib.request.Request(
                f"{VAULT_ADDR}/v1/secret/data/platform/mctl-agent/tokens",
                headers={"X-Vault-Token": vault_token}
            )
            existing = json.loads(urllib.request.urlopen(req).read())["data"]["data"]
            existing["github-token"] = new_token

            # ── Write merged secret back to Vault ─────────────────────────────────
            req = urllib.request.Request(
                f"{VAULT_ADDR}/v1/secret/data/platform/mctl-agent/tokens",
                data=json.dumps({"data": existing}).encode(),
                headers={
                    "X-Vault-Token": vault_token,
                    "Content-Type": "application/json",
                },
                method="POST"
            )
            write_resp = json.loads(urllib.request.urlopen(req).read())
            version = write_resp["data"]["version"]
            print(f"✅ Vault updated (version {version})")

            # ── Trigger ExternalSecret re-sync via Kubernetes API ─────────────────
            with open("/var/run/secrets/kubernetes.io/serviceaccount/token") as f:
                k8s_token = f.read().strip()
            with open("/var/run/secrets/kubernetes.io/serviceaccount/namespace") as f:
                k8s_ns = f.read().strip()

            import ssl
            k8s_ctx = ssl.create_default_context()
            k8s_ctx.load_verify_locations("/var/run/secrets/kubernetes.io/serviceaccount/ca.crt")

            patch_body = json.dumps({
                "metadata": {"annotations": {"force-sync": str(version)}}
            }).encode()
            req = urllib.request.Request(
                "https://kubernetes.default.svc/apis/external-secrets.io/v1beta1"
                "/namespaces/admins/externalsecrets/admins-mctl-agent-base-service",
                data=patch_body,
                headers={
                    "Authorization": f"Bearer {k8s_token}",
                    "Content-Type": "application/merge-patch+json",
                },
                method="PATCH"
            )
            try:
                urllib.request.urlopen(req, context=k8s_ctx)
                print("✅ ExternalSecret re-sync triggered")
            except Exception as e:
                print(f"⚠️  ExternalSecret annotate failed: {e}")

            print("🎉 GitHub token rotation complete")
            PYEOF
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
