apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: provision-database
  annotations:
    workflows.argoproj.io/description: |
      Provisions a PostgreSQL database for a service:
        1. Generate password, store credentials in Vault
        2. Patch CNPG cluster.yaml + databases.yaml + secrets.yaml
        3. Commit to mctl-core → ArgoCD syncs

      Replaces: .github/workflows/provision-db.yml
      Note: This workflow runs in-cluster with direct Vault access (no self-hosted runner needed).
spec:
  entrypoint: provision-pipeline
  serviceAccountName: argo-workflow-sa

  arguments:
    parameters:
      - name: team_name
      - name: app_name

  templates:
    - name: provision-pipeline
      dag:
        tasks:
          - name: provision
            template: do-provision

    - name: do-provision
      inputs:
        parameters:
          - name: team_name
            value: "{{workflow.parameters.team_name}}"
          - name: app_name
            value: "{{workflow.parameters.app_name}}"
      script:
        image: alpine:3.19
        command: [sh]
        source: |
          set -e
          apk add --no-cache curl openssl git openssh-client > /dev/null 2>&1

          TEAM="{{inputs.parameters.team_name}}"
          APP="{{inputs.parameters.app_name}}"
          DB_NAME="${TEAM}-${APP}"
          VAULT_PATH="teams/${TEAM}/${APP}/database"

          # ── Validate inputs ──────────────────────────────────────────────
          echo "$TEAM" | grep -qE '^[a-z0-9][a-z0-9-]{0,30}$' || {
            echo "❌ Invalid team name: $TEAM"
            exit 1
          }
          echo "$APP" | grep -qE '^[a-z0-9][a-z0-9-]{0,30}$' || {
            echo "❌ Invalid app name: $APP"
            exit 1
          }

          # ── Authenticate with Vault (K8s auth) ───────────────────────────
          echo "🔐 Authenticating with Vault..."
          SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          VAULT_TOKEN=$(curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "{\"role\":\"argo-workflow\",\"jwt\":\"${SA_TOKEN}\"}" \
            "${VAULT_ADDR}/v1/auth/kubernetes/login" | \
            grep '"client_token"' | sed 's/.*"client_token":"\([^"]*\)".*/\1/')
          export VAULT_TOKEN

          # ── Set up SSH for git ───────────────────────────────────────────
          mkdir -p ~/.ssh
          cp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf 'Host github.com\n  Hostname ssh.github.com\n  Port 443\n  IdentityFile ~/.ssh/id_ed25519\n  StrictHostKeyChecking no\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config

          # ── Clone mctl-core ───────────────────────────────────────────────
          git clone --depth=1 "git@github.com:mctlhq/mctl-core.git" /tmp/mctl-core
          cd /tmp/mctl-core
          git config user.name "argo-workflows[bot]"
          git config user.email "argo-workflows[bot]@users.noreply.github.com"

          # ── Check if DB already exists ────────────────────────────────────
          CLUSTER_FILE="platform-gitops/cnpg-clusters/shared/cluster.yaml"
          DB_EXISTS=false
          if grep -q "name: ${DB_NAME}-db" platform-gitops/cnpg-clusters/shared/databases.yaml 2>/dev/null; then
            echo "ℹ️  Database '${DB_NAME}' already exists — skipping DB creation"
            DB_EXISTS=true
          fi

          if [ "$DB_EXISTS" = "false" ]; then
          PASSWORD=$(openssl rand -base64 32 | tr -d '/+=\n' | head -c 32)

          HTTP_CODE=$(curl -sS -o /tmp/vault-resp.json -w "%{http_code}" \
            -X POST \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"data\": {
              \"host\": \"shared-pg-rw.platform-db.svc.cluster.local\",
              \"port\": \"5432\",
              \"database\": \"${DB_NAME}\",
              \"username\": \"${DB_NAME}\",
              \"password\": \"${PASSWORD}\"
            }}" \
            "${VAULT_ADDR}/v1/secret/data/${VAULT_PATH}")

          [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ] || {
            echo "❌ Vault write failed (HTTP $HTTP_CODE)"
            cat /tmp/vault-resp.json
            exit 1
          }
          echo "✅ Credentials stored in Vault at ${VAULT_PATH}"

          # ── Patch cluster.yaml: add pg_hba entry ──────────────────────────
          awk -v db="${DB_NAME}" '
            /- host all all 0\.0\.0\.0\/0 reject/ {
              print "      - host " db " " db " all scram-sha-256"
            }
            { print }
          ' "$CLUSTER_FILE" > "${CLUSTER_FILE}.tmp" && mv "${CLUSTER_FILE}.tmp" "$CLUSTER_FILE"

          # Add managed role entry
          awk -v db="${DB_NAME}" '
            /# Team app roles/ {
              print "      - name: " db
              print "        login: true"
              print "        connectionLimit: 10"
              print "        ensure: present"
              print "        passwordSecret:"
              print "          name: " db "-db-creds"
            }
            { print }
          ' "$CLUSTER_FILE" > "${CLUSTER_FILE}.tmp" && mv "${CLUSTER_FILE}.tmp" "$CLUSTER_FILE"
          echo "✅ cluster.yaml updated"

          # ── Append to databases.yaml ──────────────────────────────────────
          cat >> platform-gitops/cnpg-clusters/shared/databases.yaml << DBEOF
          ---
          apiVersion: postgresql.cnpg.io/v1
          kind: Database
          metadata:
            name: ${DB_NAME}-db
          spec:
            name: "${DB_NAME}"
            owner: "${DB_NAME}"
            cluster:
              name: shared-pg
            databaseReclaimPolicy: retain
          DBEOF
          echo "✅ databases.yaml updated"

          # ── Append ExternalSecret to secrets.yaml ─────────────────────────
          cat >> platform-gitops/cnpg-clusters/shared/secrets.yaml << ESEOF
          ---
          apiVersion: external-secrets.io/v1beta1
          kind: ExternalSecret
          metadata:
            name: ${DB_NAME}-db-creds
          spec:
            refreshInterval: 1h
            secretStoreRef:
              kind: ClusterSecretStore
              name: vault-backend
            target:
              name: ${DB_NAME}-db-creds
              creationPolicy: Owner
              template:
                type: Opaque
                data:
                  DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .database }}"
                  DB_HOST: "{{ .host }}"
                  DB_PORT: "{{ .port }}"
                  DB_NAME: "{{ .database }}"
                  DB_USER: "{{ .username }}"
                  DB_PASSWORD: "{{ .password }}"
                  username: "{{ .username }}"
                  password: "{{ .password }}"
            data:
              - secretKey: host
                remoteRef:
                  key: ${VAULT_PATH}
                  property: host
              - secretKey: port
                remoteRef:
                  key: ${VAULT_PATH}
                  property: port
              - secretKey: database
                remoteRef:
                  key: ${VAULT_PATH}
                  property: database
              - secretKey: username
                remoteRef:
                  key: ${VAULT_PATH}
                  property: username
              - secretKey: password
                remoteRef:
                  key: ${VAULT_PATH}
                  property: password
          ESEOF
          echo "✅ secrets.yaml updated"

          # ── Annotate catalog-info.yaml if exists ──────────────────────────
          CATALOG_FILE=""
          for dir in \
            "platform-gitops/services/${TEAM}/${APP}"; do
            [ -f "${dir}/catalog-info.yaml" ] && CATALOG_FILE="${dir}/catalog-info.yaml" && break
          done

          if [ -n "$CATALOG_FILE" ] && ! grep -q "platform.mctl.me/database" "$CATALOG_FILE"; then
            ANN1="    platform.mctl.me/database: \"true\""
            ANN2="    platform.mctl.me/database-team: \"${TEAM}\""
            ANN3="    platform.mctl.me/database-app: \"${APP}\""
            if grep -q "^  annotations:" "$CATALOG_FILE"; then
              sed -i "s|^  annotations:|  annotations:\\n${ANN1}\\n${ANN2}\\n${ANN3}|" "$CATALOG_FILE"
            else
              sed -i "s|^  name: .*|&\\n  annotations:\\n${ANN1}\\n${ANN2}\\n${ANN3}|" "$CATALOG_FILE"
            fi
            git add "$CATALOG_FILE"
            echo "✅ catalog-info.yaml annotated"
          fi

          # ── Close DB-creation-only block ──────────────────────────────────
          fi  # end if [ "$DB_EXISTS" = "false" ]

          # ── Always: inject dbSecret into service values.yaml ──────────────
          SVC_VALUES="platform-gitops/services/${TEAM}/${APP}/values.yaml"
          if [ -f "$SVC_VALUES" ]; then
            DB_SECRET="${TEAM}-${APP}-db-creds"
            # Only append if dbSecret not already present
            if ! grep -q "dbSecret:" "$SVC_VALUES"; then
              printf '\ndbSecret:\n  vaultPath: "%s"\n  secretName: "%s"\nenvFrom:\n  - secretRef:\n      name: "%s"\n' \
                "${VAULT_PATH}" "${DB_SECRET}" "${DB_SECRET}" >> "$SVC_VALUES"
            fi
            git add "$SVC_VALUES"
            echo "✅ service values.yaml updated with dbSecret"
          else
            echo "⚠️  SVC_VALUES not found: ${SVC_VALUES}"
          fi

          # ── Commit and push ────────────────────────────────────────────────
          if [ "$DB_EXISTS" = "false" ]; then
            git add \
              platform-gitops/cnpg-clusters/shared/cluster.yaml \
              platform-gitops/cnpg-clusters/shared/databases.yaml \
              platform-gitops/cnpg-clusters/shared/secrets.yaml
          fi

          if git diff --cached --quiet; then
            echo "ℹ️  Nothing to commit — dbSecret already set"
          else
            git commit -m "feat: provision database ${DB_NAME}" \
              -m "Provisioned PostgreSQL database for ${TEAM}/${APP}:
          - Role: ${DB_NAME}
          - Database: ${DB_NAME}
          - Vault path: ${VAULT_PATH}
          - K8s secret: ${DB_NAME}-db-creds (ExternalSecret -> CNPG)"

            for i in $(seq 1 5); do
              if git push origin HEAD:main; then
                echo "✅ Pushed — ArgoCD will sync automatically"
                break
              fi
              git pull --rebase origin main
            done
          fi
        env:
          - name: VAULT_ADDR
            value: "http://vault.vault.svc.cluster.local:8200"
        volumeMounts:
          - name: deploy-key
            mountPath: /secrets/deploy-key
      volumes:
        - name: deploy-key
          secret:
            secretName: mctl-core-deploy-key
