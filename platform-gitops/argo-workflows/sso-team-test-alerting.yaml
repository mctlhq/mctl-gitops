# SSO RBAC: team test-alerting — scoped to team namespace only
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sso-team-test-alerting
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "'test-alerting' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "5"
---
apiVersion: v1
kind: Secret
metadata:
  name: sso-team-test-alerting.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: sso-team-test-alerting
type: kubernetes.io/service-account-token
