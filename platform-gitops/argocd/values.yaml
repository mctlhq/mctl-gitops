## ArgoCD configuration for mctl.ai
## Managed by argocd-self-managed Application (GitOps)
## Changes here are auto-synced to the cluster
## Do not patch argocd-cm manually; change argo-cd.configs.cm in Git instead.

argo-cd:
  nameOverride: argocd

  # Disable CRD management to prevent annotation overflow
  # CRDs are already installed and should not be modified
  crds:
    install: false
    keep: true

  global:
    domain: ops.mctl.ai
    # Argo CD images are public (quay.io/argoproj, ghcr.io/dexidp, public ECR
    # for redis). No imagePullSecret is required. Set explicitly to [] so the
    # value never picks up a stale ghcr-registry secret from a prior release —
    # without this override the cluster ended up with a non-existent
    # ghcr-registry pullSecret on every argocd workload, generating
    # FailedToRetrieveImagePullSecret events on every pod restart.
    imagePullSecrets: []

  configs:
    cm:
      url: https://ops.mctl.ai
      admin.enabled: true
      timeout.reconciliation: 180s
      accounts.developers: apiKey, login, sync, application, admin
      accounts.mctl-api: apiKey

      # Health check for ExternalSecrets
      resource.customizations.health.external-secrets.io_ExternalSecret: |
        hs = {}
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for _, condition in ipairs(obj.status.conditions) do
              if condition.type == "Ready" then
                if condition.status == "True" then
                  hs.status = "Healthy"
                  hs.message = condition.message or "SecretSynced"
                else
                  hs.status = "Degraded"
                  hs.message = condition.message or "Not ready"
                end
                return hs
              end
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for sync"
        return hs

      # Health check for Applications
      resource.customizations.health.argoproj.io_Application: |
        hs = {}
        hs.status = "Progressing"
        hs.message = ""
        if obj.status ~= nil then
          if obj.status.health ~= nil then
            hs.status = obj.status.health.status
            if obj.status.health.message ~= nil then
              hs.message = obj.status.health.message
            end
          end
        end
        return hs

      # Ignore CNPG Cluster metadata annotations and status in global diff
      resource.customizations.ignoreDifferences.postgresql.cnpg.io_Cluster: |
        jqPathExpressions:
        - .metadata.annotations
        - .status

      # Dex connector for Backstage OIDC
      dex.config: |
        logger:
          level: info
          format: json
        connectors:
        - type: oidc
          id: backstage
          name: mctl.ai
          config:
            issuer: https://app.mctl.ai/api/oidc-provider
            clientID: "$backstage-oidc-client-id"
            clientSecret: "$backstage-oidc-client-secret"
            scopes:
              - openid
              - profile
              - email
              - groups
            getUserInfo: true
            insecureEnableGroups: true
            userNameKey: preferred_username
            claimMapping:
              groups: groups
        staticClients:
        - id: argo-workflows
          name: Argo Workflows
          redirectURIs:
            - https://workflows.mctl.ai/oauth2/callback
            - https://workflows.mctl.me/oauth2/callback
          secret: "$argo-workflows-sso-client-secret"
        - id: mctl-api
          name: mctl-api
          redirectURIs:
            - https://api.mctl.ai/oauth2/callback
          secret: "$argo-workflows-sso-client-secret"
        - id: grafana
          name: Grafana
          redirectURIs:
            - https://grafana.mctl.ai/login/generic_oauth
          secret: "$argo-workflows-sso-client-secret"

    params:
      server.insecure: true
      controller.status.processors: "5"
      controller.operation.processors: "3"
      controller.repo.server.timeout.seconds: "60"

      # Disable server-side apply for CRDs to avoid annotation size issues
      # See: https://github.com/argoproj/argo-cd/issues/9476
      application.resourceTrackingMethod: annotation

      # Disable server-side diff. ArgoCD v3.3.8 server-side diff fails to apply
      # ExternalSecret resources with "metadata.managedFields must be nil"
      # (managedFields leak from the SSA dry-run into the real apply). Observed
      # on labs-mctl-telegram-oauth and admins-mctl-agent. Reverting to
      # client-side diff restores correct apply behaviour. Tracked in issue #225;
      # re-evaluate after the ArgoCD upgrade.
      controller.diff.server.side: "false"

    rbac:
      policy.default: ""
      scopes: "[groups]"
      policy.csv: |
        # Admin team: full access to ArgoCD
        p, role:admin, applications, *, */*, allow
        p, role:admin, logs, get, */*, allow
        p, role:admin, exec, create, */*, allow
        p, role:admin, clusters, get, */*, allow
        p, role:admin, repositories, *, */*, allow
        p, role:admin, projects, *, */*, allow
        g, admins, role:admin
        g, mashkovd@mctl.me, role:admin

        # mctl-api service account: read all applications for status checks
        p, mctl-api, applications, get, */*, allow

        # Tenant: labs
        p, role:team-labs, applications, get, apps/labs-*, allow
        p, role:team-labs, applications, list, apps/labs-*, allow
        p, role:team-labs, applications, sync, apps/labs-*, allow
        p, role:team-labs, applications, override, apps/labs-*, allow
        p, role:team-labs, logs, get, apps/labs-*, allow
        p, role:team-labs, exec, create, apps/labs-*, allow
        g, labs, role:team-labs

        # Tenant: yyy
        p, role:team-yyy, applications, get, apps/yyy-*, allow
        p, role:team-yyy, applications, list, apps/yyy-*, allow
        p, role:team-yyy, applications, sync, apps/yyy-*, allow
        p, role:team-yyy, applications, override, apps/yyy-*, allow
        p, role:team-yyy, logs, get, apps/yyy-*, allow
        p, role:team-yyy, exec, create, apps/yyy-*, allow
        g, yyy, role:team-yyy

        p, role:team-xxxx, applications, get, apps/xxxx-*, allow
        p, role:team-xxxx, applications, list, apps/xxxx-*, allow
        p, role:team-xxxx, applications, sync, apps/xxxx-*, allow
        p, role:team-xxxx, applications, override, apps/xxxx-*, allow
        p, role:team-xxxx, logs, get, apps/xxxx-*, allow
        p, role:team-xxxx, exec, create, apps/xxxx-*, allow
        g, xxxx, role:team-xxxx


        # Tenant: ovk
        p, role:team-ovk, applications, get, apps/ovk-*, allow
        p, role:team-ovk, applications, list, apps/ovk-*, allow
        p, role:team-ovk, applications, sync, apps/ovk-*, allow
        p, role:team-ovk, applications, override, apps/ovk-*, allow
        p, role:team-ovk, logs, get, apps/ovk-*, allow
        p, role:team-ovk, exec, create, apps/ovk-*, allow
        g, ovk, role:team-ovk

        # Tenant: nfc
        p, role:team-nfc, applications, get, apps/nfc-*, allow
        p, role:team-nfc, applications, list, apps/nfc-*, allow
        p, role:team-nfc, applications, sync, apps/nfc-*, allow
        p, role:team-nfc, applications, override, apps/nfc-*, allow
        p, role:team-nfc, logs, get, apps/nfc-*, allow
        p, role:team-nfc, exec, create, apps/nfc-*, allow
        g, nfc, role:team-nfc

        # Tenant: nfc2026
        p, role:team-nfc2026, applications, get, apps/nfc2026-*, allow
        p, role:team-nfc2026, applications, list, apps/nfc2026-*, allow
        p, role:team-nfc2026, applications, sync, apps/nfc2026-*, allow
        p, role:team-nfc2026, applications, override, apps/nfc2026-*, allow
        p, role:team-nfc2026, logs, get, apps/nfc2026-*, allow
        p, role:team-nfc2026, exec, create, apps/nfc2026-*, allow
        g, nfc2026, role:team-nfc2026
    secret:
      createSecret: true

  # Server ingress configuration
  server:
    ingress:
      enabled: true
      ingressClassName: traefik
      hostname: ops.mctl.ai
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls: true
      extraTls:
        - hosts:
            - ops.mctl.ai
          secretName: argocd-tls
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 192Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        # VictoriaMetrics operator converts these to VMServiceScrape automatically
        # (operator default selector matches all ServiceMonitors). Mirrors the
        # pattern used by argo-workflows in
        # platform-gitops/argo-workflows/config/servicemonitor.yaml.
        interval: 30s

  # Controller resource optimization
  controller:
    resources:
      limits:
        # 1h peak working set hit 96% of 1Gi during normal sync activity
        # (Application count grew with mctl-agents proposals). 2Gi gives 2x
        # cushion. GOMEMLIMIT must move with the limit, otherwise the runtime
        # GCs aggressively against the old soft cap and never uses the headroom.
        memory: 2Gi
      requests:
        # Raised 100m->500m on 2026-07-02: observed sustained ~250-400m under
        # normal reconciliation load (top consumer of CPU cluster-wide), so
        # the 100m request badly underrepresented real usage for scheduler
        # bin-packing. 500m covers steady-state with headroom.
        cpu: 500m
        memory: 768Mi
    env:
      - name: GOMEMLIMIT
        value: "1800MiB"
    # Expose controller metrics so VictoriaMetrics can scrape Application
    # health/sync state. Without this the cluster has no signal for
    # ArgoCDApplicationDegraded — see incident 2026-05-01..05-07 where
    # external-secrets stayed Degraded for 6 days unnoticed.
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        # VictoriaMetrics operator converts these to VMServiceScrape automatically
        # (operator default selector matches all ServiceMonitors). Mirrors the
        # pattern used by argo-workflows in
        # platform-gitops/argo-workflows/config/servicemonitor.yaml.
        interval: 30s

  # Dex server probes — auto-restart when OIDC provider is temporarily unavailable
  # Without these, dex stays "Running" but broken after failed initialization
  dex:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 192Mi
    livenessProbe:
      enabled: true
      httpGet:
        path: /healthz/live
        port: 5558
      initialDelaySeconds: 15
      periodSeconds: 30
      failureThreshold: 3
    readinessProbe:
      enabled: true
      httpGet:
        path: /healthz/ready
        port: 5558
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3

  repoServer:
    resources:
      requests:
        cpu: 100m
        # Observed RSS ~171Mi; 192Mi gives 12% buffer. Raised 128Mi→192Mi
        # on 2026-05-10 (RAM real>requests gap on Global RAM dashboard).
        memory: 192Mi
      limits:
        # Steady-state is <50m, but reconciliation bursts (helm template
        # render + git fetch) spike well above the cap for short windows and
        # get CFS-throttled. 500m→250m (2026-05-07) was too aggressive; 500m
        # still throttled ~50% (7d), so raised 500m→1000m on 2026-06-27.
        cpu: 1000m
        memory: 256Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        # VictoriaMetrics operator converts these to VMServiceScrape automatically
        # (operator default selector matches all ServiceMonitors). Mirrors the
        # pattern used by argo-workflows in
        # platform-gitops/argo-workflows/config/servicemonitor.yaml.
        interval: 30s

  applicationSet:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 192Mi

  notifications:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi

  redis:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
