  # Server ingress configuration
  server:
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls: true
      extraTls:
        - hosts:
            - ops.mctl.me
          secretName: argocd-tls

  # Controller resource optimization for preview
  controller:
    resources:
      limits:
        memory: 384Mi
      requests:
        cpu: 50m
        memory: 256Mi
    env:
      - name: GOMEMLIMIT
        value: "350MiB"
