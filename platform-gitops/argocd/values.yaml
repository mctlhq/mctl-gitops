## ArgoCD configuration for mctl.me preview
## Managed by argocd-self-managed Application (GitOps)
## Changes here are auto-synced to the cluster

argo-cd:
  nameOverride: argocd

  # Disable CRD management to prevent annotation overflow
  # CRDs are already installed and should not be modified
  crds:
    install: false
    keep: true

  global:
    domain: ops.mctl.me

  configs:
    cm:
      url: https://ops.mctl.me
      admin.enabled: false
      timeout.reconciliation: 60s

      # Health check for ExternalSecrets
      resource.customizations.health.external-secrets.io_ExternalSecret: |
        hs = {}
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for _, condition in ipairs(obj.status.conditions) do
              if condition.type == "Ready" then
                if condition.status == "True" then
                  hs.status = "Healthy"
                  hs.message = condition.message or "SecretSynced"
                else
                  hs.status = "Degraded"
                  hs.message = condition.message or "Not ready"
                end
                return hs
              end
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for sync"
        return hs

      # Health check for Applications
      resource.customizations.health.argoproj.io_Application: |
        hs = {}
        hs.status = "Progressing"
        hs.message = ""
        if obj.status ~= nil then
          if obj.status.health ~= nil then
            hs.status = obj.status.health.status
            if obj.status.health.message ~= nil then
              hs.message = obj.status.health.message
            end
          end
        end
        return hs

      # Dex connector for GitHub OAuth
      dex.config: |
        logger:
          level: info
          format: json
        connectors:
        - type: github
          id: github
          name: GitHub
          config:
            baseURL: https://github.com
            clientID: "$github-client-id"
            clientSecret: "$github-client-secret"
            orgs:
              - name: mctlhq
        staticClients:
        - id: argo-workflows
          name: Argo Workflows
          redirectURIs:
            - https://workflows.mctl.me/oauth2/callback
          secret: "$argo-workflows-sso-client-secret"

    params:
      server.insecure: true
      controller.status.processors: "5"
      controller.operation.processors: "3"
      controller.repo.server.timeout.seconds: "60"
      
      # Disable server-side apply for CRDs to avoid annotation size issues
      # See: https://github.com/argoproj/argo-cd/issues/9476
      application.resourceTrackingMethod: annotation

    rbac:
      policy.default: ""
      scopes: "[groups]"
      policy.csv: |
        # ============================================================================
        # ArgoCD RBAC Policies - Auto-generated from tenant definitions
        # Source: platform-gitops/tenants/*/values.yaml
        # ============================================================================

        # Admin team: full access to ArgoCD
        p, role:admin, applications, *, */*, allow
        p, role:admin, logs, get, */*, allow
        p, role:admin, exec, create, */*, allow
        p, role:admin, clusters, get, */*, allow
        p, role:admin, repositories, *, */*, allow
        p, role:admin, projects, *, */*, allow
        g, mctlhq:admin, role:admin

        # ============================================================================
        # Team-Based Access (Auto-generated from tenant definitions)
        # ============================================================================

        # Tenant: admins (github: admins)
        p, role:team-admins, applications, get, preview/preview-admins-*, allow
        p, role:team-admins, applications, list, preview/preview-admins-*, allow
        p, role:team-admins, applications, sync, preview/preview-admins-*, allow
        p, role:team-admins, applications, override, preview/preview-admins-*, allow
        p, role:team-admins, logs, get, preview/preview-admins-*, allow
        p, role:team-admins, exec, create, preview/preview-admins-*, allow
        g, mctlhq:admins, role:team-admins

        # Tenant: africaone-dev (github: africaone-dev)
        p, role:team-africaone-dev, applications, get, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, applications, list, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, applications, sync, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, applications, override, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, logs, get, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, exec, create, preview/preview-africaone-dev-*, allow
        g, mctlhq:africaone-dev, role:team-africaone-dev

        # Tenant: bots (github: bots)
        p, role:team-bots, applications, get, preview/preview-bots-*, allow
        p, role:team-bots, applications, list, preview/preview-bots-*, allow
        p, role:team-bots, applications, sync, preview/preview-bots-*, allow
        p, role:team-bots, applications, override, preview/preview-bots-*, allow
        p, role:team-bots, logs, get, preview/preview-bots-*, allow
        p, role:team-bots, exec, create, preview/preview-bots-*, allow
        g, mctlhq:bots, role:team-bots

        # Tenant: cyan-rhino (github: cyan-rhino)
