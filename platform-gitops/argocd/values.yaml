## ArgoCD configuration for mctl.me preview
## Managed by argocd-self-managed Application (GitOps)
## Changes here are auto-synced to the cluster

argo-cd:
  nameOverride: argocd

  # Disable CRD management to prevent annotation overflow
  # CRDs are already installed and should not be modified
  crds:
    install: false
    keep: true

  global:
    domain: argocd-preview.mctl.me

  configs:
    cm:
      url: https://argocd-preview.mctl.me
      admin.enabled: false
      timeout.reconciliation: 180s

      # Health check for ExternalSecrets
      resource.customizations.health.external-secrets.io_ExternalSecret: |
        hs = {}
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for _, condition in ipairs(obj.status.conditions) do
              if condition.type == "Ready" then
                if condition.status == "True" then
                  hs.status = "Healthy"
                  hs.message = condition.message or "SecretSynced"
                else
                  hs.status = "Degraded"
                  hs.message = condition.message or "Not ready"
                end
                return hs
              end
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for sync"
        return hs

      # Health check for Applications
      resource.customizations.health.argoproj.io_Application: |
        hs = {}
        hs.status = "Progressing"
        hs.message = ""
        if obj.status ~= nil then
          if obj.status.health ~= nil then
            hs.status = obj.status.health.status
            if obj.status.health.message ~= nil then
              hs.message = obj.status.health.message
            end
          end
        end
        return hs

      # Dex connector for GitHub OAuth
      dex.config: |
        logger:
          level: info
          format: json
        connectors:
        - type: github
          id: github
          name: GitHub
          config:
            baseURL: https://github.com
            clientID: "$github-client-id"
            clientSecret: "$github-client-secret"
            orgs:
              - name: dmitriimashkov

    params:
      server.insecure: true
      
      # Disable server-side apply for CRDs to avoid annotation size issues
      # See: https://github.com/argoproj/argo-cd/issues/9476
      application.resourceTrackingMethod: annotation

    rbac:
      policy.default: ""
      scopes: "[groups]"
      policy.csv: |
        # ============================================================================
        # ArgoCD RBAC Policies - Auto-synced with GitHub Teams
        # ============================================================================

        # Admin team: full access to ArgoCD
        p, role:admin, applications, *, */*, allow
        p, role:admin, logs, get, */*, allow
        p, role:admin, exec, create, */*, allow
        p, role:admin, clusters, get, */*, allow
        p, role:admin, repositories, *, */*, allow
        p, role:admin, projects, *, */*, allow
        g, dmitriimashkov:admin, role:admin

        # ============================================================================
        # Team-Based Access (Auto-generated from GitHub Teams)
        # ============================================================================

        # Team: africaone-dev
        p, role:team-africaone-dev, applications, get, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, applications, list, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, applications, sync, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, applications, override, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, logs, get, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, exec, create, preview/preview-africaone-dev-*, allow
        g, dmitriimashkov:africaone-dev, role:team-africaone-dev

        # Team: bots
        p, role:team-bots, applications, get, preview/preview-bots-*, allow
        p, role:team-bots, applications, list, preview/preview-bots-*, allow
        p, role:team-bots, applications, sync, preview/preview-bots-*, allow
        p, role:team-bots, applications, override, preview/preview-bots-*, allow
        p, role:team-bots, logs, get, preview/preview-bots-*, allow
        p, role:team-bots, exec, create, preview/preview-bots-*, allow
        g, dmitriimashkov:bots, role:team-bots

        # Team: developers
        p, role:team-developers, applications, get, preview/preview-developers-*, allow
        p, role:team-developers, applications, list, preview/preview-developers-*, allow
        p, role:team-developers, applications, sync, preview/preview-developers-*, allow
        p, role:team-developers, applications, override, preview/preview-developers-*, allow
        p, role:team-developers, logs, get, preview/preview-developers-*, allow
        p, role:team-developers, exec, create, preview/preview-developers-*, allow
        g, dmitriimashkov:developers, role:team-developers

        # Team: internal
        p, role:team-internal, applications, get, preview/preview-internal-*, allow
        p, role:team-internal, applications, list, preview/preview-internal-*, allow
        p, role:team-internal, applications, sync, preview/preview-internal-*, allow
        p, role:team-internal, applications, override, preview/preview-internal-*, allow
        p, role:team-internal, logs, get, preview/preview-internal-*, allow
        p, role:team-internal, exec, create, preview/preview-internal-*, allow
        g, dmitriimashkov:internal, role:team-internal

        # Team: libertex
        p, role:team-libertex, applications, get, preview/preview-libertex-*, allow
        p, role:team-libertex, applications, list, preview/preview-libertex-*, allow
        p, role:team-libertex, applications, sync, preview/preview-libertex-*, allow
        p, role:team-libertex, applications, override, preview/preview-libertex-*, allow
        p, role:team-libertex, logs, get, preview/preview-libertex-*, allow
        p, role:team-libertex, exec, create, preview/preview-libertex-*, allow
        g, dmitriimashkov:libertex, role:team-libertex

    secret:
      createSecret: true

  # Server ingress configuration
  server:
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls: true
      extraTls:
        - hosts:
            - argocd-preview.mctl.me
          secretName: argocd-tls
