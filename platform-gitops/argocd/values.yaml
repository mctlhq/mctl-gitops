## ArgoCD configuration for mctl.me preview
## Managed by argocd-self-managed Application (GitOps)
## Changes here are auto-synced to the cluster

argo-cd:
  nameOverride: argocd

  # Disable CRD management to prevent annotation overflow
  # CRDs are already installed and should not be modified
  crds:
    install: false
    keep: true

  global:
    domain: ops.mctl.me

  configs:
    cm:
      url: https://ops.mctl.me
      admin.enabled: false
      timeout.reconciliation: 60s

      # Health check for ExternalSecrets
      resource.customizations.health.external-secrets.io_ExternalSecret: |
        hs = {}
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for _, condition in ipairs(obj.status.conditions) do
              if condition.type == "Ready" then
                if condition.status == "True" then
                  hs.status = "Healthy"
                  hs.message = condition.message or "SecretSynced"
                else
                  hs.status = "Degraded"
                  hs.message = condition.message or "Not ready"
                end
                return hs
              end
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for sync"
        return hs

      # Health check for Applications
      resource.customizations.health.argoproj.io_Application: |
        hs = {}
        hs.status = "Progressing"
        hs.message = ""
        if obj.status ~= nil then
          if obj.status.health ~= nil then
            hs.status = obj.status.health.status
            if obj.status.health.message ~= nil then
              hs.message = obj.status.health.message
            end
          end
        end
        return hs

      # Ignore CNPG Cluster metadata annotations and status in global diff
      resource.customizations.ignoreDifferences.postgresql.cnpg.io_Cluster: |
        jqPathExpressions:
        - .metadata.annotations
        - .status

      # Dex connector for GitHub OAuth
      dex.config: |
        logger:
          level: info
          format: json
        connectors:
        - type: github
          id: github
          name: GitHub
          config:
            baseURL: https://github.com
            clientID: "$github-client-id"
            clientSecret: "$github-client-secret"
            orgs:
              - name: mctlhq
        staticClients:
        - id: argo-workflows
          name: Argo Workflows
          redirectURIs:
            - https://workflows.mctl.me/oauth2/callback
          secret: "$argo-workflows-sso-client-secret"

    params:
      server.insecure: true
      controller.status.processors: "5"
      controller.operation.processors: "3"
      controller.repo.server.timeout.seconds: "60"
      
      # Disable server-side apply for CRDs to avoid annotation size issues
      # See: https://github.com/argoproj/argo-cd/issues/9476
      application.resourceTrackingMethod: annotation

    rbac:
      policy.default: ""
      scopes: "[groups]"
      policy.csv: |
        # ============================================================================
        # ArgoCD RBAC Policies - Auto-generated from tenant definitions
        # Source: platform-gitops/tenants/*/values.yaml
        # ============================================================================

        # Admin team: full access to ArgoCD
        p, role:admin, applications, *, */*, allow
        p, role:admin, logs, get, */*, allow
        p, role:admin, exec, create, */*, allow
        p, role:admin, clusters, get, */*, allow
        p, role:admin, repositories, *, */*, allow
        p, role:admin, projects, *, */*, allow
        g, mctlhq:admins, role:admin

        # ============================================================================
        # Team-Based Access (Auto-generated from tenant definitions)
        # ============================================================================

        # Tenant: developers (github: developers)
        p, role:team-developers, applications, get, preview/preview-developers-*, allow
        p, role:team-developers, applications, list, preview/preview-developers-*, allow
        p, role:team-developers, applications, sync, preview/preview-developers-*, allow
        p, role:team-developers, applications, override, preview/preview-developers-*, allow
        p, role:team-developers, logs, get, preview/preview-developers-*, allow
        p, role:team-developers, exec, create, preview/preview-developers-*, allow
        g, mctlhq:developers, role:team-developers

        # Tenant: tests (github: tests)
        p, role:team-tests, applications, get, preview/preview-tests-*, allow
        p, role:team-tests, applications, list, preview/preview-tests-*, allow
        p, role:team-tests, applications, sync, preview/preview-tests-*, allow
        p, role:team-tests, applications, override, preview/preview-tests-*, allow
        p, role:team-tests, logs, get, preview/preview-tests-*, allow
        p, role:team-tests, exec, create, preview/preview-tests-*, allow
        g, mctlhq:tests, role:team-tests

    secret:
      createSecret: true

  # Server ingress configuration
  server:
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls: true
      extraTls:
        - hosts:
            - ops.mctl.me
          secretName: argocd-tls

  # Controller resource optimization for preview
  controller:
    resources:
      limits:
        memory: 384Mi
      requests:
        cpu: 50m
        memory: 256Mi
    env:
      - name: GOMEMLIMIT
        value: "350MiB"
