        p, role:team-africaone-dev, applications, sync, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, applications, override, preview/preview-africaone-dev-*, allow
        p, role:team-africaone-dev, logs, get, preview/preview-africaone-dev-*, allow
