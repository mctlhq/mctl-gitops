# Default values for openclaw-skills.
#
# This chart renders two ConfigMaps per tenant:
#   {team}-openclaw-skills   — Layer-3 skill markdown (fanned out into workspace)
#   {team}-openclaw-identity — Layer-3 identity overrides (AGENTS/SOUL/IDENTITY/USER/TOOLS.md)
#
# The real values are produced by the openclaw-skill-save / openclaw-identity-save
# Argo workflows into:
#   services/{team}/openclaw/generated/skills-values.yaml
# That file is then consumed by the ApplicationSet via a multi-source
# `$values/{{ .path.path }}/generated/skills-values.yaml` reference.
#
# Do not hand-edit `generated/skills-values.yaml` — it is rewritten on every
# skill/identity save or delete.

# Tenant name. Always set by the ApplicationSet as a Helm parameter.
team: ""

# Map of skill name -> full SKILL.md content.
# Each entry becomes a key `<name>.md` in the {team}-openclaw-skills ConfigMap.
# Populated from generated/skills-values.yaml. Empty by default so a tenant
# with no custom skills still gets a (placeholder) ConfigMap.
skills: {}

# Map of identity filename -> file content. Keys must match one of the
# allowed identity file names: AGENTS.md, SOUL.md, IDENTITY.md, USER.md, TOOLS.md.
# Populated from generated/skills-values.yaml.
identity: {}
