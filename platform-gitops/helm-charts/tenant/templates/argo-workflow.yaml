{{- $tenantName := include "tenant.name" . }}
# ServiceAccount used by Argo Workflows pods running in this namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow-sa
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
---
# Allow workflow pods to create workflows, read pods/logs/secrets in tenant namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-runner
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtaskresults"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-runner
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: argo-workflow-sa
    namespace: {{ $tenantName }}
roleRef:
  kind: Role
  name: argo-workflow-runner
  apiGroup: rbac.authorization.k8s.io
---
# Namespace-scoped smoke-test permissions: verify deployments, pods, secrets,
# and ExternalSecrets ONLY in this tenant's namespace.
# Replaces the former cluster-wide ClusterRole to prevent cross-tenant access.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-smoke-verify
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
# Bind tenant's local workflow SA to smoke-verify Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-smoke-verify
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: argo-workflow-sa
    namespace: {{ $tenantName }}
roleRef:
  kind: Role
  name: argo-workflow-smoke-verify
  apiGroup: rbac.authorization.k8s.io
---
# Bind central workflow SA (argo-workflows ns) to smoke-verify Role in this namespace.
# This allows platform workflows to verify deployments in tenant namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-smoke-verify-central
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: argo-workflow-sa
    namespace: argo-workflows
roleRef:
  kind: Role
  name: argo-workflow-smoke-verify
  apiGroup: rbac.authorization.k8s.io
---
# SSO RBAC: give the team's SSO SA (in argo-workflows ns) access to workflows here
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sso-team-workflows
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: sso-team-{{ $tenantName }}
    namespace: argo-workflows
roleRef:
  kind: ClusterRole
  name: argo-workflows-admin
  apiGroup: rbac.authorization.k8s.io
---
# SSO RBAC: give the team's SSO SA access to events/secrets/pods/logs for log viewing
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sso-team-logs
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: sso-team-{{ $tenantName }}
    namespace: argo-workflows
roleRef:
  kind: ClusterRole
  name: argo-workflows-admin-extra
  apiGroup: rbac.authorization.k8s.io
---
# Allow mctl-api to submit and manage workflows in this tenant namespace.
# mctl-api creates Workflow CRs here; the local argo-workflow-sa executes them.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mctl-api-workflow-submitter
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: mctl-api
    namespace: mctl-api
roleRef:
  kind: Role
  name: argo-workflow-runner
  apiGroup: rbac.authorization.k8s.io
---
# MinIO artifact credentials — required by Argo Workflows argoexec init container
# to upload/download workflow artifacts (logs) to MinIO in this namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-artifact-credentials
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: minio-artifact-credentials
    creationPolicy: Owner
  data:
    - secretKey: accessKey
      remoteRef:
        key: teams/platform/minio
        property: root-user
    - secretKey: secretKey
      remoteRef:
        key: teams/platform/minio
        property: root-password
