{{- $tenantName := include "tenant.name" . }}
# ServiceAccount used by Argo Workflows pods running in this namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow-sa
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
---
# Allow workflow pods to create workflows, read pods/logs/secrets in tenant namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-runner
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtaskresults"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-runner
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: argo-workflow-sa
    namespace: {{ $tenantName }}
roleRef:
  kind: Role
  name: argo-workflow-runner
  apiGroup: rbac.authorization.k8s.io
---
# Allow workflow pods to verify deployments, pods, secrets in tenant namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-smoke-verify
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: argo-workflow-sa
    namespace: {{ $tenantName }}
roleRef:
  kind: ClusterRole
  name: argo-workflow-smoke-verify
  apiGroup: rbac.authorization.k8s.io
---
# SSO RBAC: give the team's SSO SA (in argo-workflows ns) access to workflows here
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sso-team-workflows
  namespace: {{ $tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: sso-team-{{ $tenantName }}
    namespace: argo-workflows
roleRef:
  kind: ClusterRole
  name: argo-workflows-admin
  apiGroup: rbac.authorization.k8s.io
