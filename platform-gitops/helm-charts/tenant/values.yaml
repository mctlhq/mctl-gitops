# =============================================================================
# tenant: default values
# Override per-tenant in platform-gitops/tenants/{name}/values.yaml
# =============================================================================

tenant:
  # -- Required: tenant slug (lowercase, DNS-safe)
  name: ""

  # -- Optional: human-readable display name
  displayName: ""

  # -- Optional: description
  description: ""

  # -- Optional: GitHub team slug (for ArgoCD RBAC mapping)
  githubTeam: ""

  # -- Optional: contact email
  contactEmail: ""

  # -- Resource quotas for the namespace
  quotas:
    # Aggregate CPU/memory requests across all pods
    requests.cpu: "500m"
    requests.memory: "2Gi"
    # Aggregate CPU/memory limits across all pods (sized for one OpenClaw pod + one service + deploy workflow)
    limits.cpu: "4"
    limits.memory: "6Gi"
    # Maximum number of pods
    pods: "10"
    # Maximum number of PVCs
    persistentvolumeclaims: "2"
    # Maximum number of services
    services: "10"

  # -- LimitRange defaults (applied to containers without explicit limits)
  limitRange:
    enabled: true
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "50m"
      memory: "128Mi"
    max:
      cpu: "1500m"
      memory: "3Gi"

  # -- Network policies
  networking:
    # Allow pods within the same namespace to communicate
    allowIntraNamespace: true
    # Allow egress to cluster-internal services (Vault, ArgoCD, DNS, etc.)
    allowClusterEgress: true
    # Allow egress to the internet (0.0.0.0/0)
    # Closed by default; opt in per tenant (admin/platform teams, services
    # calling external APIs). Argo Workflow pods get internet egress
    # unconditionally via allow-workflow-internet-egress, so builds/deploys
    # work either way. All existing tenants set this explicitly.
    allowInternetEgress: false
    # Specific CIDR ranges to allow (in addition to cluster egress)
    # allowedCIDRs: []

  # -- Pod Security Standards level for the namespace
  # "baseline" allows workflow/CI pods running as root (required for apk, git, etc.)
  # "restricted" enforces non-root + no privilege escalation (stricter, for app-only namespaces)
  podSecurityLevel: "baseline"
