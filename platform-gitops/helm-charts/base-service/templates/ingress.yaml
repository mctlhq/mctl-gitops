{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "base-service.fullname" . }}
  labels:
    {{- include "base-service.labels" . | nindent 4 }}
    {{- include "base-service.extraLabels" . | nindent 4 }}
  {{- $annotations := dict }}
  {{- with .Values.ingress.annotations }}
  {{- $annotations = merge $annotations . }}
  {{- end }}
  {{- if .Values.ingress.forwardAuth.enabled }}
  {{- $_ := set $annotations "traefik.ingress.kubernetes.io/router.middlewares" (printf "%s-%s-forward-auth@kubernetescrd" .Release.Namespace (include "base-service.fullname" .)) }}
  {{- end }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  {{- if .Values.ingress.hosts }}
  rules:
    {{- range $host := .Values.ingress.hosts }}
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ $.Values.ingress.path }}
            pathType: {{ $.Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "base-service.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
    {{- end }}
  {{- else }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "base-service.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
  {{- end }}
{{- end }}
{{- range $idx, $ing := .Values.extraIngresses }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ default (printf "%s-extra-%d" (include "base-service.fullname" $) $idx) $ing.name }}
  labels:
    {{- include "base-service.labels" $ | nindent 4 }}
    {{- include "base-service.extraLabels" $ | nindent 4 }}
  {{- $annotations := dict }}
  {{- with $ing.annotations }}
  {{- $annotations = merge $annotations . }}
  {{- end }}
  {{- if and $ing.forwardAuth $ing.forwardAuth.enabled }}
  {{- $_ := set $annotations "traefik.ingress.kubernetes.io/router.middlewares" (printf "%s-%s-forward-auth@kubernetescrd" $.Release.Namespace (include "base-service.fullname" $)) }}
  {{- end }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ default $.Values.ingress.className $ing.className }}
  {{- if $ing.tls }}
  tls:
    {{- toYaml $ing.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range $host := $ing.hosts }}
    - host: {{ $host | quote }}
      http:
        paths:
          - path: {{ default "/" $ing.path }}
            pathType: {{ default "Prefix" $ing.pathType }}
            backend:
              service:
                name: {{ include "base-service.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
