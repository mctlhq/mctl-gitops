{{- if .Values.externalSecret }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "base-service.fullname" . }}
  labels:
    {{- include "base-service.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecret.store | default "vault-backend" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.externalSecret.targetSecret | default (include "base-service.fullname" .) }}
    creationPolicy: Owner
    {{- with .Values.externalSecret.targetTemplateData }}
    template:
      mergePolicy: Merge
      data:
        {{- toYaml . | nindent 8 }}
    {{- end }}
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
        property: {{ .property }}
    {{- end }}
{{- end }}
