{{- if and .Values.ingress.enabled .Values.ingress.forwardAuth.enabled .Values.ingress.forwardAuth.address }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "base-service.fullname" . }}-forward-auth
  labels:
    {{- include "base-service.labels" . | nindent 4 }}
spec:
  forwardAuth:
    address: {{ .Values.ingress.forwardAuth.address | quote }}
    trustForwardHeader: {{ .Values.ingress.forwardAuth.trustForwardHeader }}
    {{- with .Values.ingress.forwardAuth.authResponseHeaders }}
    authResponseHeaders:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
