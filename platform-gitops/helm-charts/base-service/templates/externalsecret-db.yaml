{{- if .Values.dbSecret }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "base-service.fullname" . }}-db-creds
  labels:
    {{- include "base-service.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.dbSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.dbSecret.store | default "vault-backend" }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.dbSecret.secretName | default (printf "%s-db-creds" (include "base-service.fullname" .)) }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql://{{ "{{ .username }}" }}:{{ "{{ .password }}" }}@{{ "{{ .host }}" }}:{{ "{{ .port }}" }}/{{ "{{ .database }}" }}"
        DB_HOST: '{{ "{{ .host }}" }}'
        DB_PORT: '{{ "{{ .port }}" }}'
        DB_NAME: '{{ "{{ .database }}" }}'
        DB_USER: '{{ "{{ .username }}" }}'
        DB_PASSWORD: '{{ "{{ .password }}" }}'
        username: '{{ "{{ .username }}" }}'
        password: '{{ "{{ .password }}" }}'
  data:
    - secretKey: host
      remoteRef:
        key: {{ .Values.dbSecret.vaultPath }}
        property: host
    - secretKey: port
      remoteRef:
        key: {{ .Values.dbSecret.vaultPath }}
        property: port
    - secretKey: database
      remoteRef:
        key: {{ .Values.dbSecret.vaultPath }}
        property: database
    - secretKey: username
      remoteRef:
        key: {{ .Values.dbSecret.vaultPath }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.dbSecret.vaultPath }}
        property: password
{{- end }}
