{{- if .Values.blueGreen.enabled }}
# Preview service — receives no external traffic.
# Argo Rollouts updates its selector to point to the standby ReplicaSet.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "base-service.fullname" . }}-preview
  labels:
    {{- include "base-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "base-service.selectorLabels" . | nindent 4 }}
{{- end }}
