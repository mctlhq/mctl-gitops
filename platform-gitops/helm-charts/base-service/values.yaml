# =============================================================================
# base-service: default values
# This chart is the single deployment contract for all services.
# =============================================================================

# -- Required: container image
image:
  repository: ""   # MUST be set per service
  tag: ""    # MUST be pinned per service (semver or @sha256 digest); empty fails render
  pullPolicy: IfNotPresent

# -- Required: service port
service:
  type: ClusterIP
  port: 8080

# -- Required: resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Optional: override container ENTRYPOINT (image default is used when unset).
# Useful when the service needs a per-tenant pre-start step (e.g. cleaning up
# state from a previous container restart inside the same pod) before exec'ing
# the image's normal entrypoint. Unset by default — services that don't need
# wrapping just inherit the image's CMD/ENTRYPOINT.
command: []

# -- Optional: override container CMD (image default is used when unset). Pairs
# with `command:` above. When `command` is set but `args` is empty the
# container will run only what's in `command`; when both are set Kubernetes
# uses `args` as the parameter list to `command`.
args: []

# -- Required: environment variables (flat key-value)
env: {}

# -- Optional: environment variables from ConfigMaps/Secrets
envFrom: []

# -- Optional: image pull secrets for private registries
imagePullSecrets: []

# -- Optional: replica count
replicaCount: 1

# -- Optional: ingress
ingress:
  enabled: false
  className: traefik
  host: ""
  hosts: []
  path: /
  pathType: Prefix
  annotations: {}
  tls: []
  forwardAuth:
    enabled: false
    address: ""
    trustForwardHeader: true
    authResponseHeaders: []

# -- Optional: additional ingress objects for the same service
extraIngresses: []

# -- Optional: extra Kubernetes objects rendered in the release namespace
extraObjects: []

# -- Optional: autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# -- Optional: service account
serviceAccount:
  create: false
  name: ""
  annotations: {}

# -- Optional: deployment strategy (Recreate or RollingUpdate)
strategy: {}

# -- Optional: persistent volume claims
# Creates PVC resources. Keys become PVC name suffixes.
# persistence:
#   data:
#     size: 1Gi
#     accessModes: [ReadWriteOnce]
#     storageClassName: ""
persistence: {}

# -- Optional: extra volumes
extraVolumes: []
extraVolumeMounts: []

# -- Pod-level settings
podAnnotations: {}
podLabels: {}
backstage: {}
nodeSelector: {}
tolerations: []
affinity: {}

# -- Optional: override the Kubernetes default (30s) terminationGracePeriodSeconds.
# Bump this when the pod runs a preStop hook that needs more time to flush
# state (e.g. the openclaw s3-sync sidecar running `mc mirror` on SIGTERM).
# Leave unset to inherit the Kubernetes default.
terminationGracePeriodSeconds: ~

# -- Health checks
probes:
  liveness:
    path: /healthz
    port: http
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /readyz
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10

# -- Optional: database credentials ExternalSecret
# When set, creates an ExternalSecret that syncs DB credentials from Vault
# and creates a k8s secret with DATABASE_URL, DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
# dbSecret:
#   vaultPath: teams/myteam/myapp/database
#   secretName: myteam-myapp-db-creds  # optional, defaults to {fullname}-db-creds
#   store: vault-backend               # optional
#   refreshInterval: 1h               # optional
dbSecret: null

dbInitJob:
  enabled: false
  database: ""
  waitTable: "identities"
  sql: ""

# -- Optional: Prometheus metrics endpoint
# When enabled, adds a named 'metrics' port to the Service and Deployment,
# and creates a ServiceMonitor CRD for Prometheus scraping.
# Requires kube-prometheus-stack (or any Prometheus Operator) to be installed.
# -- Optional: ConfigMaps
# Creates ConfigMap resources. Keys are ConfigMap names, values are maps of data keys to content.
# configMaps:
#   my-config:
#     config.json: '{"key": "value"}'
configMaps: {}

metrics:
  enabled: false
  port: 9090
  path: /metrics
  interval: 30s

# -- Optional: blue-green deployment via Argo Rollouts
# When enabled, renders a Rollout instead of Deployment + a preview Service.
# Requires Argo Rollouts controller to be installed in the cluster.
# NOT compatible with RWO PersistentVolumeClaims (both slots need independent storage).
blueGreen:
  enabled: false
  # autoPromotionEnabled: true means the new version is promoted automatically
  # once the preview pod passes readiness probes. Set to false for manual promotion
  # via `kubectl argo rollouts promote <name>` or the Argo Rollouts dashboard.
  autoPromotionEnabled: true
