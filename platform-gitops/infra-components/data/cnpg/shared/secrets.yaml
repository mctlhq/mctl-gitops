# R2 credentials for barman backups — same Vault entry as the vault-backup
# CronJob (platform/vault/r2-backup), whose token already writes to the
# vault-backup bucket.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-backup-r2
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: cnpg-backup-r2
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: platform/vault/r2-backup
        property: access-key-id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: platform/vault/r2-backup
        property: secret-access-key
