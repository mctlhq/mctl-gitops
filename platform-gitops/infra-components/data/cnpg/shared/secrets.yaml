---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: labs-openclaw-db-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: labs-openclaw-db-creds
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .database }}"
        DB_HOST: "{{ .host }}"
        DB_PORT: "{{ .port }}"
        DB_NAME: "{{ .database }}"
        DB_USER: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        key: teams/labs/openclaw/database
        property: host
    - secretKey: port
      remoteRef:
        key: teams/labs/openclaw/database
        property: port
    - secretKey: database
      remoteRef:
        key: teams/labs/openclaw/database
        property: database
    - secretKey: username
      remoteRef:
        key: teams/labs/openclaw/database
        property: username
    - secretKey: password
      remoteRef:
        key: teams/labs/openclaw/database
        property: password
