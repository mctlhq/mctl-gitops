---
# NOTE: tests-smoke-test-svc DB credentials are created/deleted dynamically
# by the smoke-test ClusterWorkflowTemplate (provision-db step → retire step).
# Do NOT add a permanent ExternalSecret here for ephemeral smoke-test resources.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mashkoffdmitry-knot-mvp-db-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: mashkoffdmitry-knot-mvp-db-creds
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        DATABASE_URL: "postgresql://{{ .username }}:{{ .password }}@{{ .host }}:{{ .port }}/{{ .database }}"
        DB_HOST: "{{ .host }}"
        DB_PORT: "{{ .port }}"
        DB_NAME: "{{ .database }}"
        DB_USER: "{{ .username }}"
        DB_PASSWORD: "{{ .password }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: host
      remoteRef:
        key: teams/mashkoffdmitry/knot-mvp/database
        property: host
    - secretKey: port
      remoteRef:
        key: teams/mashkoffdmitry/knot-mvp/database
        property: port
    - secretKey: database
      remoteRef:
        key: teams/mashkoffdmitry/knot-mvp/database
        property: database
    - secretKey: username
      remoteRef:
        key: teams/mashkoffdmitry/knot-mvp/database
        property: username
    - secretKey: password
      remoteRef:
        key: teams/mashkoffdmitry/knot-mvp/database
        property: password

