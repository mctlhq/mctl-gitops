# Temporal DB credentials — pulled from Vault at platform/temporal/database
# CNPG operator consumes this in cluster.yaml managed.roles[temporal].passwordSecret.
# The Temporal server pods read the same Vault path via a separate ExternalSecret
# in infra-components/data/temporal/externalsecret.yaml (namespace: temporal).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: temporal-db-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: temporal-db-creds
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: platform/temporal/database
        property: username
    - secretKey: password
      remoteRef:
        key: platform/temporal/database
        property: password
