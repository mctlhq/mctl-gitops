#   databaseReclaimPolicy: retain
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: argo-workflows-db
spec:
  name: "argo-workflows"
  owner: "argoworkflows"
  cluster:
    name: shared-pg
  databaseReclaimPolicy: retain
