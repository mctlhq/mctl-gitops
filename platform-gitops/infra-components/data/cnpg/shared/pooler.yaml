apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: shared-pg-pooler-rw
spec:
  cluster:
    name: shared-pg
  instances: 2  # 2 PgBouncer pods for availability
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "400"
      default_pool_size: "20"     # enough for 11 Backstage plugins starting in parallel
      reserve_pool_size: "5"
      max_db_connections: "30"    # max backend connections PER database
      server_idle_timeout: "300"
