apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shared-pg
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  # HA: primary + 1 hot standby. Two instances is the minimum that lets a node
  # drain succeed — CNPG promotes the standby and evicts the old primary,
  # instead of the drain deadlocking on the single-instance PDB (0 allowed
  # disruptions) that left worker-cx43-fsn1-ftx cordoned for 13 days during a
  # k3s upgrade. podAntiAffinity (preferred) spreads the two across nodes.
  instances: 2

  # CNPG operator defaults (explicitly set to prevent ArgoCD OutOfSync)
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2

  # Backups go OFF-cluster to R2: the previous in-cluster MinIO target died
  # together with the very cluster/PVCs it was protecting against. Same R2
  # account+bucket as vault-backup and vmbackup; endpoint matches backend.tf.
  # Old MinIO backups (s3://postgres-backups/shared-pg) age out on their own.
  backup:
    barmanObjectStore:
      destinationPath: s3://vault-backup/postgres-backups/shared-pg
      endpointURL: https://6a09f637d20e1f66a8e9d45ebe778058.r2.cloudflarestorage.com
      s3Credentials:
        accessKeyId:
          name: cnpg-backup-r2
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-backup-r2
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 2
      data:
        compression: gzip
    # 14d: 3d left no margin to notice data loss that survives a weekend or
    # a bad migration discovered late. WAL+base are gzip'd; 9 small tenant DBs
    # fit comfortably in MinIO at this window.
    retentionPolicy: "14d"
    target: prefer-standby

  affinity:
    podAntiAffinityType: preferred
  enablePDB: true
  enableSuperuserAccess: false
  failoverDelay: 0
  logLevel: info
  maxSyncReplicas: 0
  minSyncReplicas: 0
  postgresGID: 26
  postgresUID: 26
  primaryUpdateMethod: restart
  primaryUpdateStrategy: unsupervised
  replicationSlots:
    highAvailability:
      enabled: true
      slotPrefix: _cnpg_
    synchronizeReplicas:
      enabled: true
    updateInterval: 30
  smartShutdownTimeout: 180
  startDelay: 3600
  stopDelay: 1800
  switchoverDelay: 3600

  storage:
    storageClass: hcloud-volumes
    size: 40Gi

  resources:
    requests:
      # Raised 1Gi→2Gi on 2026-06-30: shared-pg-1 was OOMKilled 11× against the
      # 1Gi cap, forcing a primary failover to shared-pg-2. shared_buffers
      # (256MB) + 200 max_connections work_mem + WAL/checkpoint buffers exceed
      # 1Gi under load on this shared instance (9 tenant databases).
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 2Gi
      # Raised 1→2 on 2026-06-26: the primary (shared-pg-1) hit 100% CFS
      # throttling on bursts (checkpoints / CNPG base backups) against the 1m
      # cap, firing recurring resource_limit incidents. Avg usage stays low
      # (~89m peak) so request is left at 500m — this is burst headroom only.
      cpu: "2"   # CNPG normalizes 2000m → "2"

  postgresql:
    parameters:
      archive_timeout: "15min"
      max_connections: "200"
      shared_buffers: "256MB"
      work_mem: "4MB"
      temp_file_limit: "256MB"
      statement_timeout: "60s"
      lock_timeout: "10s"
      idle_in_transaction_session_timeout: "300s"
      log_min_duration_statement: "1000"  # log queries >1s
      wal_keep_size: "128MB"  # prevent WAL from filling disk (CNPG default 512MB is too high for 20Gi)
    pg_hba:
      - host all mctl-agent all scram-sha-256
      - host mctl-api mctl-api all scram-sha-256
      # Backstage — access to own db + postgres db (assertDatabaseExists check)
      - host backstage backstage all scram-sha-256
      - host postgres backstage all scram-sha-256
      # Argo Workflows — persistence and archive
      - host argo-workflows argoworkflows all scram-sha-256
      # Team apps — each role only its own database
      # Add new entries when onboarding a new app:
      # - host <db_name> <role_name> all scram-sha-256
      # smoke-test-svc: ephemeral — added/removed by smoke-test CWT, not managed here
      - host mctl-agent mctl-agent all scram-sha-256
      - host labs-openclaw labs-openclaw all scram-sha-256
      - host admins-openclaw admins-openclaw all scram-sha-256
      - host ovk-openclaw ovk-openclaw all scram-sha-256
      - host labs-kuptsi-app labs-kuptsi-app all scram-sha-256
      # Temporal — server (history/matching/visibility) and admintools schema setup
      - host temporal temporal all scram-sha-256
      - host temporal_visibility temporal all scram-sha-256
      - host labs-mctl-telegram labs-mctl-telegram all scram-sha-256
      - host labs-mctl-telegram-preview labs-mctl-telegram-preview all scram-sha-256
      - host labs-mctl-loyalty labs-mctl-loyalty all scram-sha-256
      - host labs-mctl-pairdesk labs-mctl-pairdesk all scram-sha-256
      - host labs-pfeifenpatenschaft labs-pfeifenpatenschaft all scram-sha-256
      - host labs-pfeifenpatenschaft-backend labs-pfeifenpatenschaft-backend all scram-sha-256
      - host all all 0.0.0.0/0 reject

  managed:
    roles:
      - name: backstage
        login: true
        inherit: true
        connectionLimit: 100  # 2 replicas * ~25 plugin connections during rolling deploy
        ensure: present
        passwordSecret:
          name: backstage-db-creds
      - name: argoworkflows
        login: true
        inherit: true
        connectionLimit: 20
        ensure: present
        passwordSecret:
          name: argoworkflows-db-creds
      - name: mctl-agent
        login: true
        inherit: true
        connectionLimit: 20
        ensure: present
        passwordSecret:
          name: mctl-agent-db-creds
      - name: mctl-api
        login: true
        inherit: true
        connectionLimit: 20
        ensure: present
        passwordSecret:
          name: mctl-api-db-creds
      # Team app roles
      - name: labs-pfeifenpatenschaft-backend
        login: true
        connectionLimit: 10
        ensure: present
        passwordSecret:
          name: labs-pfeifenpatenschaft-backend-db-creds
      - name: labs-pfeifenpatenschaft
        login: true
        connectionLimit: 10
        ensure: present
        passwordSecret:
          name: labs-pfeifenpatenschaft-db-creds
      - name: labs-mctl-pairdesk
        login: true
        connectionLimit: 10
        ensure: present
        passwordSecret:
          name: labs-mctl-pairdesk-db-creds
      - name: labs-mctl-loyalty
        login: true
        connectionLimit: 10
        ensure: present
        passwordSecret:
          name: labs-mctl-loyalty-db-creds
      - name: labs-mctl-telegram-preview
        login: true
        connectionLimit: 10
        ensure: present
        passwordSecret:
          name: labs-mctl-telegram-preview-db-creds
      - name: labs-mctl-telegram
        login: true
        connectionLimit: 10
        ensure: present
        passwordSecret:
          name: labs-mctl-telegram-db-creds
      - name: labs-kuptsi-app
        login: true
        connectionLimit: 10
        ensure: present
        passwordSecret:
          name: labs-kuptsi-app-db-creds
      - name: ovk-openclaw
        login: true
        connectionLimit: 10
        ensure: present
        passwordSecret:
          name: ovk-openclaw-db-creds
      - name: admins-openclaw
        login: true
        connectionLimit: 10
        ensure: present
        passwordSecret:
          name: admins-openclaw-db-creds
      - name: labs-openclaw
        login: true
        connectionLimit: 10
        ensure: present
        passwordSecret:
          name: labs-openclaw-db-creds
      # Temporal server connects from the temporal namespace via shared-pg-rw.
      # Owns both the temporal (history+matching) and temporal_visibility databases.
      # Connection budget: 4 server roles (frontend/history/matching/worker)
      # × 20 default + 10 visibility = 120 steady-state, plus admintools spikes
      # during schema-setup hooks. 200 keeps a comfortable head-room.
      - name: temporal
        login: true
        inherit: true
        connectionLimit: 200
        ensure: present
        passwordSecret:
          name: temporal-db-creds
      #   passwordSecret:
      #     name: team1-app1-db-creds

  bootstrap:
    initdb:
      database: backstage
      owner: backstage
      encoding: UTF8
      localeCType: C
      localeCollate: C
      secret:
        name: backstage-db-creds

  monitoring:
    enablePodMonitor: false  # enable when Prometheus is added
