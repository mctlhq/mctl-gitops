# One-shot Job that registers Temporal namespaces consumed by tenant services.
# Idempotent: temporal CLI returns success when the namespace already exists,
# we swallow "already exists" errors and exit 0 so subsequent ArgoCD syncs are no-ops.
#
# Add a new line for each tenant namespace required by deployments. The Temporal
# concept of "namespace" is independent of the Kubernetes namespace — it is the
# isolation boundary inside the Temporal cluster (workflows/queues/schedules).
apiVersion: batch/v1
kind: Job
metadata:
  name: temporal-namespaces-bootstrap
  namespace: temporal
  annotations:
    # Run after each ArgoCD sync. `BeforeHookCreation` makes Argo recreate the
    # Job on the next sync even when a prior run failed — without it, a single
    # failure (e.g. frontend still unreachable past the inner retry loop) leaves
    # the named Job lying around and namespace bootstrap permanently stuck.
    # `HookSucceeded` then sweeps the Job once it eventually wins.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      name: temporal-namespaces-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: temporalio/admin-tools:1.31.0
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc.cluster.local:7233
          command:
            - sh
            - -ceu
            - |
              register_ns() {
                local ns="$1"
                local retention_days="$2"
                if temporal operator namespace describe --namespace "$ns" >/dev/null 2>&1; then
                  echo "Namespace $ns already exists — skipping"
                  return 0
                fi
                echo "Registering Temporal namespace $ns with ${retention_days}d retention"
                temporal operator namespace create \
                  --namespace "$ns" \
                  --retention "${retention_days}d" \
                  --description "Bootstrapped by ArgoCD PostSync hook"
              }

              # Idempotent custom search-attribute registration. Temporal SDK
              # workflows that pass `search_attributes=...` (e.g. kuptsi-app
              # tagging workflows by LeadId) require the attribute to be
              # registered against the namespace beforehand, otherwise
              # `start_workflow` hangs and the gunicorn worker eventually
              # times out with HTTP 500.
              register_sa() {
                local ns="$1"
                local name="$2"
                local type="$3"
                if temporal operator search-attribute list --namespace "$ns" 2>/dev/null \
                    | awk '{print $1}' | grep -qx "$name"; then
                  echo "Search attribute $name already registered on $ns — skipping"
                  return 0
                fi
                echo "Registering search attribute $name ($type) on namespace $ns"
                temporal operator search-attribute create \
                  --namespace "$ns" \
                  --name "$name" \
                  --type "$type"
              }

              # Wait until frontend is reachable before issuing commands —
              # ArgoCD sync may run this hook before the frontend pod is Ready.
              for i in $(seq 1 30); do
                if temporal operator cluster health >/dev/null 2>&1; then
                  break
                fi
                echo "Waiting for temporal-frontend to come up... ($i/30)"
                sleep 10
              done

              # ── Tenant namespaces ─────────────────────────────────────────
              register_ns kuptsi 7

              # ── Tenant search attributes ──────────────────────────────────
              # Add new entries when a tenant workflow needs to be queryable
              # by a custom attribute (Temporal-side equivalent of an index).
              # kuptsi-app tags TelegramAlbumWorkflow with LeadId for ops-time
              # filtering in Temporal Web UI and the failed-workflow monitor.
              register_sa kuptsi LeadId Keyword
