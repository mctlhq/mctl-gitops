# Temporal server reads its persistence credentials from this Secret in the
# `temporal` namespace. Source of truth is Vault path `platform/temporal/database`,
# the same path used by CNPG (cnpg/shared/secrets.yaml) so the role's password
# stays in sync between Postgres and the Temporal config.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: temporal-server-db-creds
  namespace: temporal
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: temporal-server-db-creds
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # The official temporalio/temporal Helm chart wires `existingSecret`
        # by reading the key `password`.
        password: "{{ .password }}"
        username: "{{ .username }}"
  data:
    - secretKey: password
      remoteRef:
        key: platform/temporal/database
        property: password
    - secretKey: username
      remoteRef:
        key: platform/temporal/database
        property: username
