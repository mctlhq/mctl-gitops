apiVersion: v1
kind: ConfigMap
metadata:
  name: mctl-platform-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  mctl-platform.json: |
    {
      "__inputs": [],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "10.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" },
        { "type": "datasource", "id": "loki", "name": "Loki", "version": "1.0.0" }
      ],
      "description": "mctl.ai platform operational dashboard — service health, resource usage, workflow activity",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Service Health",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "options": { "0": { "color": "red", "text": "Down" }, "1": { "color": "green", "text": "Up" } }, "type": "value" }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red" }, { "color": "green", "value": 1 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "id": 1,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "mctl-api",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "up{job=\"mctl-api\"}",
              "legendFormat": "mctl-api"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "id": 2,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "API Request Rate",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "sum(rate(http_requests_total{job=\"mctl-api\"}[5m])) by (method, path)",
              "legendFormat": "{{method}} {{path}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "id": 3,
          "options": { "legend": { "calcs": ["mean", "p95"], "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "API Latency (p50 / p95 / p99)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"mctl-api\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"mctl-api\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"mctl-api\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 },
          "id": 101,
          "title": "Resource Usage by Namespace",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "percent",
              "max": 100,
              "custom": { "lineWidth": 2 }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "id": 4,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "CPU Usage % by Namespace",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\"}[5m])) by (namespace) / sum(kube_resourcequota{namespace=~\"$namespace\", resource=\"limits.cpu\", type=\"hard\"}) by (namespace) * 100",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "percent",
              "max": 100,
              "custom": { "lineWidth": 2 }
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "id": 5,
          "options": { "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Memory Usage % by Namespace",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "sum(container_memory_working_set_bytes{namespace=~\"$namespace\"}) by (namespace) / sum(kube_resourcequota{namespace=~\"$namespace\", resource=\"limits.memory\", type=\"hard\"}) by (namespace) * 100",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 22 },
          "id": 102,
          "title": "Argo Workflows",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green" }, { "color": "yellow", "value": 5 }, { "color": "red", "value": 10 }] }
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 23 },
          "id": 6,
          "options": { "colorMode": "background", "graphMode": "area", "justifyMode": "center", "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "Running Workflows",
          "type": "stat",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "argo_workflows_gauge{phase=\"Running\"}",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 4, "y": 23 },
          "id": 7,
          "options": { "legend": { "calcs": ["sum"], "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Workflow Completions (Succeeded / Failed)",
          "type": "timeseries",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "increase(argo_workflows_total_count{phase=\"Succeeded\"}[10m])",
              "legendFormat": "Succeeded"
            },
            {
              "datasource": { "type": "prometheus", "uid": "$datasource" },
              "expr": "increase(argo_workflows_total_count{phase=\"Failed\"}[10m])",
              "legendFormat": "Failed"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 31 },
          "id": 103,
          "title": "Logs",
          "type": "row"
        },
        {
          "datasource": { "type": "loki", "uid": "$loki_datasource" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 32 },
          "id": 8,
          "options": { "dedupStrategy": "none", "enableLogDetails": true, "prettifyLogMessage": false, "showCommonLabels": false, "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "title": "Platform Logs ($namespace)",
          "type": "logs",
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "$loki_datasource" },
              "expr": "{namespace=~\"$namespace\"} |= \"$search\"",
              "legendFormat": ""
            }
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["mctl", "platform", "ops"],
      "templating": {
        "list": [
          {
            "current": { "selected": true, "text": "VictoriaMetrics", "value": "VictoriaMetrics" },
            "hide": 0,
            "includeAll": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource",
            "label": "Prometheus"
          },
          {
            "current": { "selected": true, "text": "Loki", "value": "Loki" },
            "hide": 0,
            "includeAll": false,
            "name": "loki_datasource",
            "options": [],
            "query": "loki",
            "refresh": 1,
            "type": "datasource",
            "label": "Loki"
          },
          {
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "definition": "label_values(kube_namespace_labels, namespace)",
            "hide": 0,
            "includeAll": true,
            "multi": true,
            "name": "namespace",
            "query": "label_values(kube_namespace_labels{label_mctl_me_tenant!=\"\"}, namespace)",
            "refresh": 2,
            "sort": 1,
            "type": "query",
            "label": "Namespace"
          },
          {
            "current": { "selected": false, "text": "", "value": "" },
            "hide": 0,
            "name": "search",
            "query": "",
            "type": "textbox",
            "label": "Log Search"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "mctl Platform",
      "uid": "mctl-platform-v1",
      "version": 1
    }
