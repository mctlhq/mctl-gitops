# Grafana dashboard for openclaw codex token usage observability.
# Wired in mctlhq/mctl-openclaw#19 + this PR (gitops #201): /metrics
# endpoint + per-request codex_usage Loki log line.
#
# Sidecar in monitoring/grafana auto-discovers ConfigMaps labeled
# `grafana_dashboard: "1"` and mounts them — same pattern as the
# existing mctl-platform / mctl-agent-cleanup dashboards.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-codex-usage-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  openclaw-codex-usage.json: |
    {
      "title": "openclaw — Codex Token Usage",
      "description": "Per-pod codex prompt/completion/cached/request rates (Prometheus) + per-command attribution (Loki).",
      "uid": "openclaw-codex-usage",
      "tags": ["openclaw", "codex", "tokens", "observability"],
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "graphTooltip": 1,
      "timezone": "browser",
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "VictoriaMetrics", "value": "VictoriaMetrics" }
          },
          {
            "name": "loki",
            "type": "datasource",
            "query": "loki",
            "current": { "text": "Loki", "value": "Loki" }
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "$datasource" },
            "query": "label_values(openclaw_codex_requests_total, pod)",
            "refresh": 2,
            "includeAll": true,
            "multi": true
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "id": 100,
          "title": "Rates (1m / 5m)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "type": "timeseries",
          "id": 1,
          "title": "Prompt tokens/sec",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "targets": [
            {
              "expr": "sum by (pod) (rate(openclaw_codex_prompt_tokens_total{pod=~\"$pod\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10 }
            }
          }
        },
        {
          "type": "timeseries",
          "id": 2,
          "title": "Completion tokens/sec",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "targets": [
            {
              "expr": "sum by (pod) (rate(openclaw_codex_completion_tokens_total{pod=~\"$pod\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10 }
            }
          }
        },
        {
          "type": "timeseries",
          "id": 3,
          "title": "Requests/min",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 9 },
          "targets": [
            {
              "expr": "sum by (pod) (rate(openclaw_codex_requests_total{pod=~\"$pod\"}[5m])) * 60",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "bars", "lineInterpolation": "smooth", "fillOpacity": 60 }
            }
          }
        },
        {
          "type": "timeseries",
          "id": 4,
          "title": "Cached tokens/sec (free of charge)",
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 9 },
          "targets": [
            {
              "expr": "sum by (pod) (rate(openclaw_codex_cached_tokens_total{pod=~\"$pod\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10 }
            }
          }
        },
        {
          "type": "row",
          "id": 200,
          "title": "Per-command attribution (Loki)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 17 }
        },
        {
          "type": "logs",
          "id": 5,
          "title": "Latest codex_usage events",
          "datasource": { "type": "loki", "uid": "$loki" },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 18 },
          "targets": [
            {
              "expr": "{pod=~\"$pod\", container=\"base-service\"} |= \"codex_usage\" | json | line_format \"{{.command}} model={{.model}} prompt={{.prompt_tokens}} completion={{.completion_tokens}}\"",
              "refId": "A"
            }
          ],
          "options": { "showTime": true, "wrapLogMessage": false }
        }
      ]
    }
