# Custom alert rules consumed by mctl-agent.
#
# Each alert name maps to a ticket type via
# mctl-agent/internal/monitor/alerthandler.go::classifyAlert. Keep the
# alert names in sync with that switch.
#
# The routing into mctl-agent is configured in
# platform-gitops/bootstrap/templates/observability/monitoring.yaml
# (see the alertmanager route matching these alertnames).
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: mctl-custom-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: mctl-platform
spec:
  groups:
    - name: mctl.tenant-quotas
      rules:
        - alert: TenantCPUQuotaHigh
          expr: |
            sum by (namespace) (
              rate(container_cpu_usage_seconds_total{container!=""}[5m])
            )
            /
            sum by (namespace) (
              kube_resourcequota{type="hard", resource="limits.cpu"}
            ) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: >-
              Namespace {{ $labels.namespace }} CPU usage is at
              {{ $value | humanizePercentage }} of quota

        - alert: TenantMemoryQuotaHigh
          expr: |
            sum by (namespace) (
              container_memory_working_set_bytes{container!=""}
            )
            /
            sum by (namespace) (
              kube_resourcequota{type="hard", resource="limits.memory"}
            ) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: >-
              Namespace {{ $labels.namespace }} memory usage is at
              {{ $value | humanizePercentage }} of quota

    - name: mctl.node-health
      rules:
        - alert: NodeHighCPU
          expr: |
            1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) > 0.9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: >-
              Node {{ $labels.instance }} CPU usage above 90% for 15 minutes

        - alert: NodeHighMemory
          expr: |
            1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.9
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: >-
              Node {{ $labels.instance }} memory usage above 90% for 15 minutes

        - alert: NodeLowMemoryAvailable
          expr: |
            node_memory_MemAvailable_bytes < 1073741824
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: >-
              Node {{ $labels.instance }} has less than 1Gi memory available ({{ $value | humanize1024 }}B free)

        - alert: NodeDiskPressure
          expr: |
            kube_node_status_condition{condition="DiskPressure", status="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: >-
              Node {{ $labels.node }} has disk pressure

        - alert: NodeDiskSpaceHigh
          expr: |
            (
              1 - (
                node_filesystem_avail_bytes{fstype!="tmpfs", mountpoint="/"}
                / node_filesystem_size_bytes{fstype!="tmpfs", mountpoint="/"}
              )
            ) > 0.80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: >-
              Node {{ $labels.instance }} root disk above 80%
              ({{ $value | humanizePercentage }} used)

        # A node left unschedulable longer than a normal upgrade drain.
        # Catches the system-upgrade-controller failure mode where a failed
        # apply-k3s-agent job leaves the node cordoned indefinitely (observed
        # on worker-cx43-fsn1-ftx, cordoned 13 days, 2026-05-21 → 2026-06-03),
        # and any forgotten manual `kubectl cordon`.
        - alert: NodeCordoned
          expr: |
            kube_node_spec_unschedulable == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: >-
              Node {{ $labels.node }} has been cordoned (unschedulable) for
              over 30m — possible stuck k3s upgrade or forgotten manual cordon

    # k3s rolling-upgrade health (system-upgrade-controller).
    # A failed apply job means a node is stuck mid-upgrade — typically a drain
    # deadlock against a PodDisruptionBudget with 0 allowed disruptions
    # (e.g. single-replica Postgres/Vault). Without this the cluster can run
    # degraded for days unnoticed.
    - name: mctl.cluster-upgrades
      rules:
        - alert: K3sUpgradeJobFailed
          # kube_job_status_failed counts Failed *pods*, not the Job's Failed
          # condition — a Job that had a pod fail then retried to success, or a
          # retained completed Job, keeps a nonzero count. Exclude Jobs that
          # have actually completed so we only page on a genuinely stuck
          # upgrade. (kube-state-metrics here exposes kube_job_complete but not
          # a kube_job_failed condition series.)
          expr: |
            kube_job_status_failed{namespace="system-upgrade"} > 0
            unless on(namespace, job_name)
            kube_job_complete{namespace="system-upgrade", condition="true"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: >-
              k3s upgrade job {{ $labels.job_name }} failed in system-upgrade —
              a node is stuck mid-upgrade (likely drain deadlock on a PDB)

    - name: mctl.vault
      rules:
        - alert: VaultSealed
          expr: |
            vault_core_unsealed == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: Vault instance {{ $labels.instance }} is sealed

    # ArgoCD Application health/sync drift alerts.
    # Without these the platform can stay broken indefinitely without firing
    # any alert — exactly what happened to the `external-secrets` Application
    # 2026-05-01 → 2026-05-07 (Health=Degraded for 6 days, no incident raised,
    # GitOps loop wedged across 11 child apps). See
    # ~/.claude/projects/-Users-dmitriimashkov-PycharmProjects-mctlhq/memory/
    # reference_eso_storedversion_recovery.md for the recovery drill.
    - name: mctl.argocd
      rules:
        - alert: ArgoCDApplicationDegraded
          expr: |
            argocd_app_info{health_status="Degraded"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: >-
              ArgoCD application {{ $labels.name }} has been Degraded for 30m
            description: >-
              {{ $labels.dest_namespace }}/{{ $labels.name }} (project
              {{ $labels.project }}) on
              {{ $labels.dest_server }} is reporting Health=Degraded. Check
              `argocd app get {{ $labels.name }}` for stuck resources.

        # NB: this alert tracks prolonged OutOfSync state, not a Sync
        # operation failure per se. ArgoCD doesn't expose a clean
        # "sync_failed" gauge in argocd_app_info; the sync_status label
        # only distinguishes Synced / OutOfSync / Unknown. An app can
        # legitimately stay OutOfSync without any sync error (operator
        # left a manual change in place, ignored-difference rule etc.),
        # so the name reflects "long-drift" rather than implying a
        # specific failure mode. Use the controller log / latest sync
        # operationState for the actual error reason.
        - alert: ArgoCDApplicationOutOfSyncLong
          expr: |
            argocd_app_info{sync_status="OutOfSync"} == 1
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: >-
              ArgoCD application {{ $labels.name }} OutOfSync for 1h
            description: >-
              {{ $labels.dest_namespace }}/{{ $labels.name }} has been
              OutOfSync for 1h. Either auto-sync has exhausted retries
              and the latest operation failed, or the app legitimately
              has unsynced manual changes / ignored differences. Check
              `argocd app get {{ $labels.name }}` and the latest sync
              operationState for the actual cause.

    # MinIO PVC disk-usage alerts. The default
    # KubePersistentVolumeFillingUp alert (kube-prometheus-stack) only fires
    # at 97% over 1h or 87% over 4h, which is too late given the Loki write
    # rate against the 20Gi MinIO PVC. On 2026-04-23 the PVC went transiently
    # full, broke five workflows, and recovered without any alert firing.
    # 75% gives ~5Gi of headroom for the Loki compactor to catch up;
    # 90% escalates well before MinIO starts returning write errors.
    - name: minio.disk-usage
      rules:
        - alert: MinioBucketUsageHigh
          expr: |
            (kubelet_volume_stats_used_bytes{namespace="minio",persistentvolumeclaim="minio"}
             / kubelet_volume_stats_capacity_bytes{namespace="minio",persistentvolumeclaim="minio"}) > 0.75
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: MinIO PVC at {{ $value | humanizePercentage }} of 20Gi
            description: >-
              MinIO is approaching capacity. Loki bucket retention may need
              tightening.

        - alert: MinioBucketUsageCritical
          expr: |
            (kubelet_volume_stats_used_bytes{namespace="minio",persistentvolumeclaim="minio"}
             / kubelet_volume_stats_capacity_bytes{namespace="minio",persistentvolumeclaim="minio"}) > 0.90
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: MinIO PVC critically full at {{ $value | humanizePercentage }}
            description: >-
              MinIO write errors imminent. Free space immediately or expand
              PVC.
