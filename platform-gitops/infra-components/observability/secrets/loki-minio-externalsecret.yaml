---
# ExternalSecret for Loki S3 (MinIO) credentials in the monitoring namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-minio-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: loki-minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: platform/minio
        property: root-user
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: platform/minio
        property: root-password
