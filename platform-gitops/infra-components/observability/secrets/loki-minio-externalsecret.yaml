---
# ExternalSecret for Loki S3 credentials in the monitoring namespace.
# Migrated 2026-07 from self-hosted MinIO to Cloudflare R2 (see
# bootstrap/templates/observability/loki.yaml storage_config.aws for the
# endpoint change). Secret name kept as "loki-minio-credentials" to avoid
# touching the loki-stack values' extraEnvFrom reference; only the Vault
# source path changed.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-minio-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: loki-minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: platform/r2-loki-argo
        property: access-key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: platform/r2-loki-argo
        property: secret-key
