apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: delete-tenant
  title: Delete Tenant
  description: |
    Safely delete a tenant from the mctl.ai platform.
    Retires all tenant services first, then removes the namespace, Vault policy, ArgoCD RBAC, DB records, and catalog entities.
    ⚠️ This action is irreversible.

  tags:
    - tenant
    - provisioning
    - admin
  annotations:
    backstage.io/techdocs-ref: dir:.
    mctl.me/admin-only: "true"
spec:
  owner: group:default/admins
  type: provisioning
  presentation:
    buttonLabels:
      createButtonText: 'Delete Tenant'
      reviewButtonText: 'Review & Delete'

  parameters:
    - title: Select Tenant to Delete
      required:
        - tenantName
        - confirmName
      properties:
        tenantName:
          title: Tenant Name
          type: string
          description: "Enter the exact name of the tenant to delete."
        confirmName:
          title: Confirm Tenant Name
          type: string
          description: "Type the tenant name again to confirm deletion."

  steps:
    - id: delete-tenant
      name: Delete tenant via Backstage API
      action: http:backstage:request
      input:
        method: DELETE
        path: /api/tenant-management/tenants/${{ parameters.tenantName }}

  output:
    text:
      - title: Status
        content: "Tenant `${{ parameters.tenantName }}` deletion has been queued."
      - title: What was removed
        content: |
          - ⏳ Tenant services under `${{ parameters.tenantName }}` will be retired first
          - ⏳ K8s namespace `${{ parameters.tenantName }}` will be deleted after service retirement
          - ⏳ Vault policy `tenant-${{ parameters.tenantName }}` will be deleted
          - ⏳ ArgoCD RBAC entries will be removed
          - ⏳ Git directory `tenants/${{ parameters.tenantName }}/` will be removed
          - ⏳ Database records will be cleaned up by tenant sync after GitOps removal
    links:
      - title: Argo Workflows Run
        icon: dashboard
        url: ${{ steps['delete-tenant'].output.body.workflowUrl }}
