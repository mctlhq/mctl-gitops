apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-tenant
  title: Create Tenant
  description: |
    Provision a new tenant on the mctl.ai platform.
    Creates a dedicated Kubernetes namespace with ResourceQuota, NetworkPolicy, and LimitRange.
    Also creates a scoped Vault policy and ArgoCD RBAC entry for the team.
    Default quota profile is sized for 1 OpenClaw-capable tenant.

  tags:
    - tenant
    - provisioning
    - kubernetes
    - argo
  annotations:
    backstage.io/techdocs-ref: dir:.
    mctl.me/admin-only: "true"
spec:
  owner: group:default/admins
  type: provisioning
  presentation:
    buttonLabels:
      createButtonText: 'Create Tenant'
      reviewButtonText: 'Review & Create'

  parameters:
    - title: Tenant Identity
      required:
        - tenantName
        - displayName
      properties:
        tenantName:
          title: Tenant Name
          type: string
          description: "Lowercase, DNS-safe slug (e.g. my-team). Used as Kubernetes namespace name."
          pattern: "^[a-z0-9][a-z0-9-]{1,62}$"
          ui:field: TenantNameField
        displayName:
          title: Display Name
          type: string
          description: "Human-readable name shown in Backstage and dashboards."
        description:
          title: Description
          type: string
          description: "Brief description of the team and what they build."
          ui:widget: textarea
          ui:options:
            rows: 3
        contactEmail:
          title: Contact Email
          type: string
          description: "Team email for platform notifications."

    - title: Resource Quotas
      description: |
        Default values below are sized for 1 OpenClaw-capable tenant.
        Increase them only if this workspace will run additional services beyond one OpenClaw deployment.
      properties:
        quotaCpuReq:
          title: CPU Requests (total)
          type: string
          default: "500m"
          description: "Default OpenClaw-capable profile: total CPU requests across the namespace."
        quotaCpuLim:
          title: CPU Limits (total)
          type: string
          default: "3"
          description: "Default OpenClaw-capable profile: total CPU limits across the namespace."
        quotaMemoryReq:
          title: Memory Requests (total)
          type: string
          default: "1280Mi"
          description: "Default OpenClaw-capable profile: total memory requests across the namespace."
        quotaMemoryLim:
          title: Memory Limits (total)
          type: string
          default: "4Gi"
          description: "Default OpenClaw-capable profile: total memory limits across the namespace."
        quotaPods:
          title: Max Pods
          type: string
          default: "10"
          description: "Maximum number of pods in the namespace."

    - title: Networking
      properties:
        allowInternetEgress:
          title: Allow Internet Egress
          type: boolean
          default: false
          description: |
            Allow pods in this namespace to make outbound requests to the internet.
            Disabled by default (least privilege). Workflow/CI pods are unaffected —
            they always get internet egress via a dedicated NetworkPolicy. Enable
            only if the tenant's services call external APIs directly.

  steps:
    - id: create-tenant
      name: Create tenant via Backstage API
      action: http:backstage:request
      input:
        method: POST
        path: /api/tenant-management/tenants
        body:
          tenantName: ${{ parameters.tenantName }}
          displayName: ${{ parameters.displayName }}
          description: ${{ parameters.description | default('') }}
          contactEmail: ${{ parameters.contactEmail | default('') }}
          quotaCpuReq: ${{ parameters.quotaCpuReq | default('500m') }}
          quotaCpuLim: ${{ parameters.quotaCpuLim | default('3') }}
          quotaMemoryReq: ${{ parameters.quotaMemoryReq | default('1280Mi') }}
          quotaMemoryLim: ${{ parameters.quotaMemoryLim | default('4Gi') }}
          quotaPods: ${{ parameters.quotaPods | default('5') }}
          allowInternetEgress: ${{ parameters.allowInternetEgress }}
          creatorUserId: ${{ user.entity.metadata.name }}

  output:
    text:
      - title: Tenant Name
        content: "`${{ parameters.tenantName }}`"
      - title: Namespace
        content: "`${{ parameters.tenantName }}`"
      - title: Resource Quotas
        content: |
          Profile: `1 OpenClaw-capable tenant`
          CPU: `${{ parameters.quotaCpuReq }}` req / `${{ parameters.quotaCpuLim }}` lim
          Memory: `${{ parameters.quotaMemoryReq }}` req / `${{ parameters.quotaMemoryLim }}` lim
          Pods: `${{ parameters.quotaPods }}`
      - title: Vault Policy
        content: "`vault-policy: tenant-${{ parameters.tenantName }}`"
      - title: Next Steps
        content: |
          1. ✅ Tenant directory committed to `mctl-gitops`
          2. ⏳ ArgoCD will provision namespace + quotas + NetworkPolicy (~2-3 min)
          3. ⏳ Backstage catalog will refresh tenant Resource entity (~5 min)
          4. Add team members via Backstage tenant management
          5. Members get ArgoCD RBAC automatically via OIDC teams
    links:
      - title: Argo Workflows Run
        icon: dashboard
        url: ${{ steps['create-tenant'].output.body.workflowUrl }}
      - title: ArgoCD — Tenant App
        icon: dashboard
        url: "https://ops.mctl.ai/applications/tenant-${{ parameters.tenantName }}"
      - title: Backstage Catalog — Tenant
        icon: catalog
        url: "https://app.mctl.ai/catalog/default/resource/tenant-${{ parameters.tenantName }}"
