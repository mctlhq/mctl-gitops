apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: openclaw
  description: "openclaw service"
  annotations:
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=demo-openclaw
    backstage.io/kubernetes-namespace: demo
    argocd/app-name: demo-openclaw
    github.com/source-repo: openclaw/openclaw
    # mctl.me/auto-deploy — triggered by GitHub App webhook on tag push
    #   "true" or "auto" — deploy immediately via scaffolder
    #   "confirm"         — notify only, user deploys manually from UI
    #   "false" or absent — skip
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.me/applications/argocd/demo-openclaw
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/openclaw/openclaw
      title: Source Repository
      icon: github
    - url: https://workflows.mctl.me
      title: Argo Workflows
      icon: github
    - url: https://demo-openclaw.mctl.ai
      title: Service URL
      icon: web
  labels:
    team: demo
    env: apps
spec:
  type: service
  lifecycle: production
  owner: group:demo
  system: team-demo
