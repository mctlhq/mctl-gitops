    # clinical-pharmacology

    ## Назначение

    Поддержка задач по клинической фармакологии: PK/PD, лекарственные взаимодействия, подбор и коррекция доз, TDM, оценка рисков и рекомендации для особых групп пациентов.

    ## Когда использовать

    Использовать, когда запрос связан с:

    - фармакокинетикой или фармакодинамикой препарата
    - выбором дозы, коррекцией дозы или режима введения
    - интерпретацией концентраций препарата
    - лекарственными взаимодействиями
    - коррекцией доз при почечной или печёночной недостаточности
    - рисками токсичности, противопоказаниями, дублированием терапии
    - особыми популяциями: пожилые, дети, беременность, почечная/печёночная недостаточность

    ## Что покрывает

    - **Фармакокинетика (PK):** всасывание, распределение, метаболизм, выведение
    - **Фармакодинамика (PD):** связь концентрации и эффекта
    - **Лекарственные взаимодействия:** CYP450, P-gp, транспортёры, фармакодинамические взаимодействия
    - **Индивидуализация дозы:** нагрузочная доза, поддерживающая доза, коррекция интервала
    - **TDM:** пиковая (peak) и остаточная (trough) концентрации, случайная точка (random level), равновесное состояние (steady state), целевой диапазон
    - **Особые популяции:** почечная недостаточность, печёночная недостаточность, пожилые, беременность, педиатрия

    ## Ключевые возможности

    ### 1. Поддержка PK/PD
    - разбор T½, CL, Vd
    - оценка времени до равновесного состояния (steady state)
    - различение нагрузочной и поддерживающей дозы
    - логика «экспозиция → эффект» (exposure-response)

    ### 2. Оценка взаимодействий
    Особый фокус на:
    - CYP450
    - P-gp
    - транспортёры
    - аддитивную токсичность

    Практические клинические риски:
    - кровотечения
    - удлинение интерв
