# Worker: smoke-test-svc
# Team: tests
# Chart: base-service (ingress disabled)

image:
  repository: ghcr.io/mctlhq/smoke-test-svc
  tag: "main"
imagePullSecrets:
  - name: ghcr-credentials
ingress:
  enabled: false
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
env:
  SMOKE_ENV: deploy_action
externalSecret:
  targetSecret: smoke-test-svc-secrets
  data:
    - secretKey: SMOKE_SECRET
      remoteKey: teams/tests/smoke-test-svc
      property: SMOKE_SECRET
envFrom:
  - secretRef:
      name: smoke-test-svc-secrets

dbSecret:
  vaultPath: "teams/tests/smoke-test-svc/database"
  secretName: "tests-smoke-test-svc-db-creds"
envFrom:
  - secretRef:
      name: "tests-smoke-test-svc-db-creds"
