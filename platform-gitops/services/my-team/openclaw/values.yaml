# Service: openclaw
# Team: my-team
# Template: openclaw
# Updated: 2026-03-21 (gemini-bot) - Standardized Vault Paths

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/openclaw
  tag: "main-5a2a4ab"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 18789
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
strategy:
  type: Recreate
podSecurityContext:
  fsGroup: 1000
env:
  APP_ENV: production
  NODE_OPTIONS: "--max-old-space-size=3072"
  OPENCLAW_CONFIG_PATH: /config-rw/openclaw.json
envFrom:
  - secretRef:
      name: my-team-openclaw-base-service-db-creds
initContainers:
  - name: restore-state
    image: minio/mc:latest
    command: ["sh", "-c"]
    args:
      - |
        mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
        if mc ls s3/platform-state/openclaw/my-team/ > /dev/null 2>&1; then
          mc mirror s3/platform-state/openclaw/my-team/ /home/node/.openclaw
        else
          mkdir -p /home/node/.openclaw
        fi
    env:
      - name: MINIO_ENDPOINT
        valueFrom: { secretKeyRef: { name: minio-root-credentials, key: endpoint } }
      - name: MINIO_ACCESS_KEY
        valueFrom: { secretKeyRef: { name: minio-root-credentials, key: access-key } }
      - name: MINIO_SECRET_KEY
        valueFrom: { secretKeyRef: { name: minio-root-credentials, key: secret-key } }
    volumeMounts:
      - name: state-data
        mountPath: /home/node/.openclaw
  - name: install-mcp-remote
    image: node:22-alpine
    command: ["sh", "-c"]
    args:
      - npm install --prefix /npm-cache mcp-remote
    volumeMounts:
      - name: npm-cache
        mountPath: /npm-cache
  - name: setup
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
      - |
        cp /config-tpl/openclaw.json /config-rw/openclaw.json
        if [ -n "$TELEGRAM_TOKEN" ]; then sed -i "s|__TELEGRAM_TOKEN__|$TELEGRAM_TOKEN|g" /config-rw/openclaw.json; fi
        if [ -n "$MCTL_TOKEN" ]; then sed -i "s|__MCTL_TOKEN__|$MCTL_TOKEN|g" /config-rw/openclaw.json; fi
        if [ -n "$ADMIN_IDS" ]; then sed -i "s|__ADMIN_IDS__|$ADMIN_IDS|g" /config-rw/openclaw.json; fi
        chown 1000:1000 /config-rw/openclaw.json
        
        mkdir -p /home/node/.openclaw/agents/main/agent
        if [ -n "$OPENAI_API_KEY" ]; then
          cat <<EOF > /home/node/.openclaw/agents/main/agent/auth-profiles.json
        {
          "openai-codex:default": {
            "provider": "openai-codex",
            "apiKey": "$OPENAI_API_KEY"
          }
        }
        EOF
        fi
        chown -R 1000:1000 /home/node/.openclaw
    env:
      - name: TELEGRAM_TOKEN
        valueFrom: { secretKeyRef: { name: openclaw-telegram-secret, key: telegram-bot-token } }
      - name: MCTL_TOKEN
        valueFrom: { secretKeyRef: { name: openclaw-mctl-token, key: MCTL_API_TOKEN, optional: true } }
      - name: OPENAI_API_KEY
        valueFrom: { secretKeyRef: { name: openclaw-openai-secret, key: api-key } }
      - name: ADMIN_IDS
        value: "210408407"
    volumeMounts:
      - name: openclaw-config-tpl
        mountPath: /config-tpl
        readOnly: true
      - name: openclaw-config-rw
        mountPath: /config-rw
      - name: state-data
        mountPath: /home/node/.openclaw
extraContainers:
  - name: s3-sync
    image: minio/mc:latest
    command: ["sh", "-c"]
    args:
      - |
        mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
        mc mirror --watch --remove --overwrite /home/node/.openclaw s3/platform-state/openclaw/my-team/
    env:
      - name: MINIO_ENDPOINT
        valueFrom: { secretKeyRef: { name: minio-root-credentials, key: endpoint } }
      - name: MINIO_ACCESS_KEY
        valueFrom: { secretKeyRef: { name: minio-root-credentials, key: access-key } }
      - name: MINIO_SECRET_KEY
        valueFrom: { secretKeyRef: { name: minio-root-credentials, key: secret-key } }
    volumeMounts:
      - name: state-data
        mountPath: /home/node/.openclaw
extraVolumeMounts:
  - name: openclaw-config-rw
    mountPath: /config-rw
  - name: npm-cache
    mountPath: /npm-cache
  - name: state-data
    mountPath: /home/node/.openclaw
  - name: openclaw-scripts
    mountPath: /scripts
    readOnly: true
persistence:
  state:
    enabled: false
extraVolumes:
  - name: openclaw-config-tpl
    configMap:
      name: openclaw-config
  - name: openclaw-config-rw
    emptyDir: {}
  - name: npm-cache
    emptyDir: {}
  - name: state-data
    emptyDir: {}
  - name: openclaw-scripts
    configMap:
      name: openclaw-scripts
      defaultMode: 0755
dbSecret:
  vaultPath: teams/my-team/openclaw/database
extraExternalSecrets:
  minio-root-credentials:
    refreshInterval: 1h
    targetSecret: minio-root-credentials
    data:
      - secretKey: access-key
        remoteKey: secret/data/teams/my-team/openclaw/minio
        property: MINIO_ACCESS_KEY
      - secretKey: secret-key
        remoteKey: secret/data/teams/my-team/openclaw/minio
        property: MINIO_SECRET_KEY
      - secretKey: endpoint
        remoteKey: secret/data/teams/my-team/openclaw/minio
        property: MINIO_ENDPOINT
      - secretKey: bucket
        remoteKey: secret/data/teams/my-team/openclaw/minio
        property: MINIO_BUCKET
  openclaw-telegram-secret:
    refreshInterval: 1h
    targetSecret: openclaw-telegram-secret
    data:
      - secretKey: telegram-bot-token
        remoteKey: secret/data/teams/my-team/openclaw/telegram
        property: telegram-bot-token
  openclaw-openai-secret:
    refreshInterval: 1h
    targetSecret: openclaw-openai-secret
    data:
      - secretKey: api-key
        remoteKey: secret/data/teams/my-team/openclaw/openai
        property: api-key
configMaps:
  openclaw-scripts:
    mcp-agent-proxy.js: |-
      #!/usr/bin/env node
      const http = require('http');
      process.stdin.setEncoding('utf8');
      let buf = '';
      process.stdin.on('data', chunk => {
        buf += chunk;
        let nl;
        while ((nl = buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) handleLine(line);
        }
      });
      function handleLine(line) {
        let req;
        try { req = JSON.parse(line); } catch (_) { return; }
        callAgent(req).then(res => write(res), err => write({ jsonrpc: '2.0', id: req.id, error: { code: -32603, message: String(err) } }));
      }
      function write(obj) { process.stdout.write(JSON.stringify(obj) + '\n'); }
      function callAgent(body) {
        return new Promise((resolve, reject) => {
          const data = JSON.stringify(body);
          const req = http.request({ hostname: 'mctl-agent.admins.svc.cluster.local', port: 8080, path: '/mcp', method: 'POST', headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) } }, res => {
            let out = ''; res.on('data', c => { out += c; }); res.on('end', () => { try { resolve(JSON.parse(out)); } catch (_) { reject(new Error('invalid JSON')); } });
          });
          req.on('error', reject); req.write(data); req.end();
        });
      }
  openclaw-config:
    openclaw.json: |-
      {
        "gateway": {
          "bind": "lan",
          "port": 18789,
          "auth": {
            "mode": "trusted-proxy",
            "trustedProxy": { "userHeader": "X-Forwarded-For" }
          },
          "trustedProxies": ["10.42.0.0/16", "10.43.0.0/16", "172.16.0.0/12"],
          "controlUi": {
            "enabled": true,
            "allowedOrigins": ["https://my-team-openclaw.mctl.ai"]
          }
        },
        "agents": { "defaults": { "model": { "primary": "openai-codex/gpt-5.4" } } },
        "auth": {
          "profiles": { "openai-codex:default": { "provider": "openai-codex", "mode": "oauth" } },
          "order": { "openai-codex": ["openai-codex:default"] }
        },
        "providers": {
          "openai-codex": {}
        },
        "channels": {
          "telegram": {
            "enabled": true,
            "botToken": "__TELEGRAM_TOKEN__",
            "dmPolicy": "pairing",
            "groupPolicy": "open",
            "allowFrom": ["210408407"]
          }
        },
        "mcp": {
          "servers": {
            "mctl-agent": {"command": "node", "args": ["/scripts/mcp-agent-proxy.js"]}
          }
        }
      }
ingress:
  enabled: true
  hosts:
    - my-team-openclaw.mctl.ai
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: openclaw-tls
      hosts:
        - my-team-openclaw.mctl.ai
