# Service: openclaw
# Team: my-team
# Template: openclaw
# Updated: 2026-03-21 (gemini-bot) - Fixed Config Schema and Image Tag

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/openclaw
  tag: "main-5a2a4ab" # Fixed stable tag
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 18789
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi
# Recreate strategy required for clean init
strategy:
  type: Recreate
env:
  APP_ENV: production
  NODE_OPTIONS: "--max-old-space-size=3072"
  OPENCLAW_CONFIG_PATH: /config-rw/openclaw.json
envFrom:
  - secretRef:
      name: my-team-openclaw-base-service-db-creds # Corrected name suffix
initContainers:
  # 1. Pre-install mcp-remote
  - name: install-mcp-remote
    image: node:22-alpine
    command: ["sh", "-c"]
    args:
      - npm install --prefix /npm-cache mcp-remote
    volumeMounts:
      - name: npm-cache
        mountPath: /npm-cache
  # 2. Build whisper-cli (disabled)
  - name: install-whisper-cli
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
      - echo whisper disabled; exit 0
  # 3. Setup Config and inject tokens
  - name: setup
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
      - |
        cp /config-tpl/openclaw.json /config-rw/openclaw.json
        if [ -n "$TELEGRAM_TOKEN" ]; then sed -i "s|__TELEGRAM_TOKEN__|$TELEGRAM_TOKEN|g" /config-rw/openclaw.json; fi
        if [ -n "$MCTL_TOKEN" ]; then sed -i "s|__MCTL_TOKEN__|$MCTL_TOKEN|g" /config-rw/openclaw.json; fi
        if [ -n "$OPENAI_API_KEY" ]; then sed -i "s|__OPENAI_API_KEY__|$OPENAI_API_KEY|g" /config-rw/openclaw.json; fi
        if [ -n "$ADMIN_IDS" ]; then sed -i "s|__ADMIN_IDS__|$ADMIN_IDS|g" /config-rw/openclaw.json; fi
        chown 1000:1000 /config-rw/openclaw.json
    env:
      - name: TELEGRAM_TOKEN
        valueFrom:
          secretKeyRef:
            name: openclaw-telegram-secret
            key: OPENCLAW_TELEGRAM_TOKEN
      - name: MCTL_TOKEN
        valueFrom:
          secretKeyRef:
            name: openclaw-mctl-token
            key: MCTL_API_TOKEN
            optional: true
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: openclaw-openai-secret
            key: OPENAI_API_KEY
            optional: true
      - name: ADMIN_IDS
        value: "202444400" # mashkovd
    volumeMounts:
      - name: openclaw-config-tpl
        mountPath: /config-tpl
        readOnly: true
      - name: openclaw-config-rw
        mountPath: /config-rw
extraVolumeMounts:
  - name: openclaw-config-rw
    mountPath: /config-rw
  - name: npm-cache
    mountPath: /npm-cache
  - name: pvc-whisper
    mountPath: /whisper-storage
  - name: openclaw-scripts
    mountPath: /scripts
    readOnly: true
persistence:
  state:
    enabled: false
extraVolumes:
  - name: openclaw-config-tpl
    configMap:
      name: openclaw-config
  - name: openclaw-config-rw
    emptyDir: {}
  - name: npm-cache
    emptyDir: {}
  - name: pvc-whisper
    emptyDir: {}
  - name: openclaw-scripts
    configMap:
      name: openclaw-scripts
      defaultMode: 0755
dbSecret:
  vaultPath: teams/my-team/openclaw/database
dbInitJob:
  enabled: true
  database: "my-team-openclaw"
  waitTable: "identities"
  sql: |
    INSERT INTO identities (provider, provider_id, status, metadata)
    VALUES ('telegram', '202444400', 'approved', '{}')
    ON CONFLICT (provider, provider_id) DO UPDATE SET status = 'approved';
extraExternalSecrets:
  openclaw-telegram-secret:
    refreshInterval: 1h
    targetSecret: openclaw-telegram-secret
    data:
      - secretKey: OPENCLAW_TELEGRAM_TOKEN
        remoteKey: secret/data/teams/my-team/openclaw
        property: telegram-bot-token
configMaps:
  openclaw-scripts:
    mcp-agent-proxy.js: |-
      #!/usr/bin/env node
      const http = require('http');
      process.stdin.setEncoding('utf8');
      let buf = '';
      process.stdin.on('data', chunk => {
        buf += chunk;
        let nl;
        while ((nl = buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) handleLine(line);
        }
      });
      function handleLine(line) {
        let req;
        try { req = JSON.parse(line); } catch (_) { return; }
        callAgent(req).then(res => write(res), err => write({ jsonrpc: '2.0', id: req.id, error: { code: -32603, message: String(err) } }));
      }
      function write(obj) { process.stdout.write(JSON.stringify(obj) + '\n'); }
      function callAgent(body) {
        return new Promise((resolve, reject) => {
          const data = JSON.stringify(body);
          const req = http.request({ hostname: 'mctl-agent.admins.svc.cluster.local', port: 8080, path: '/mcp', method: 'POST', headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) } }, res => {
            let out = ''; res.on('data', c => { out += c; }); res.on('end', () => { try { resolve(JSON.parse(out)); } catch (_) { reject(new Error('invalid JSON')); } });
          });
          req.on('error', reject); req.write(data); req.end();
        });
      }
  openclaw-config:
    openclaw.json: |-
      {
        "gateway": {
          "bind": "lan",
          "port": 18789,
          "auth": {
            "mode": "trusted-proxy",
            "trustedProxy": {
              "userHeader": "X-Forwarded-For"
            }
          },
          "trustedProxies": [
            "10.42.0.0/16",
            "10.43.0.0/16",
            "172.16.0.0/12"
          ],
          "controlUi": {
            "enabled": true,
            "allowedOrigins": [
              "https://my-team-openclaw.mctl.ai",
              "https://my-team-openclaw.mctl.me"
            ]
          }
        },
        "capability": {
          "llm": {
            "defaultModel": "openai-codex/gpt-5.4"
          },
          "providers": {
            "openai-codex": {
              "type": "openai-codex",
              "baseUrl": "https://codex.openai.com/v1",
              "models": {
                "gpt-5.4": "gpt-5.4"
              }
            },
            "anthropic": {
              "enabled": true,
              "token": "__MCTL_TOKEN__"
            }
          },
          "telegram": {
            "enabled": true,
            "token": "__TELEGRAM_TOKEN__",
            "admin_ids": [__ADMIN_IDS__]
          }
        },
        "auth": {
          "methods": {
            "openai-codex": {
              "enabled": true
            }
          }
        }
      }
ingress:
  enabled: true
  hosts:
    - my-team-openclaw.mctl.ai
    - my-team-openclaw.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: openclaw-tls
      hosts:
        - my-team-openclaw.mctl.ai
        - my-team-openclaw.mctl.me
