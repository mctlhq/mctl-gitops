# Service: openclaw
# Team: my-team
# Template: openclaw
# Updated: 2026-03-20 (gemini-bot) - Fixed DB and Auto-Approve

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/openclaw
  tag: "latest"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 18789
resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi
# Recreate strategy required for clean init
strategy:
  type: Recreate
env:
  APP_ENV: production
  NODE_OPTIONS: "--max-old-space-size=3072"
  OPENCLAW_CONFIG_PATH: /config-rw/openclaw.json
envFrom:
  - secretRef:
      name: my-team-openclaw-db-creds
initContainers:
  # 1. Pre-install mcp-remote
  - name: install-mcp-remote
    image: node:22-alpine
    command: ["sh", "-c"]
    args:
      - npm install --prefix /npm-cache mcp-remote
    volumeMounts:
      - name: npm-cache
        mountPath: /npm-cache
  # 2. Build whisper-cli (cached in MinIO platform-cache bucket)
  - name: install-whisper-cli
    image: busybox:1.36
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: "100m"
        memory: 64Mi
    command: ["sh", "-c"]
    args:
      - |
        echo "Whisper disabled"; exit 0
        WHISPER_DIR=/whisper-storage
        BIN=$WHISPER_DIR/whisper-cli
        MODEL=$WHISPER_DIR/ggml-base.bin
        WRAPPER=$WHISPER_DIR/run-whisper.sh
        CACHE_PFX=whisper
        mkdir -p $WHISPER_DIR

        # Setup mc for S3 cache
        apt-get update -qq && apt-get install -y --no-install-recommends wget ca-certificates
        wget -q "https://dl.min.io/client/mc/release/linux-amd64/mc" -O /usr/local/bin/mc
        chmod +x /usr/local/bin/mc
        mc alias set cache "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" --quiet

        # ffmpeg
        if [ ! -f $WHISPER_DIR/ffmpeg ]; then
          if mc stat cache/$MINIO_BUCKET/$CACHE_PFX/ffmpeg > /dev/null 2>&1; then
            echo "Restoring ffmpeg from cache..."
            mc cp cache/$MINIO_BUCKET/$CACHE_PFX/ffmpeg $WHISPER_DIR/ffmpeg && chmod +x $WHISPER_DIR/ffmpeg
          else
            apt-get install -y --no-install-recommends xz-utils
            wget -q "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -O /tmp/ffmpeg.tar.xz
            tar -xJf /tmp/ffmpeg.tar.xz -C $WHISPER_DIR --strip-components=1 --wildcards "*/ffmpeg"
            rm /tmp/ffmpeg.tar.xz
            mc cp $WHISPER_DIR/ffmpeg cache/$MINIO_BUCKET/$CACHE_PFX/ffmpeg || true
          fi
        fi

        # whisper model
        if [ ! -f $MODEL ]; then
          if mc stat cache/$MINIO_BUCKET/$CACHE_PFX/ggml-base.bin > /dev/null 2>&1; then
            echo "Restoring whisper model from cache..."
            mc cp cache/$MINIO_BUCKET/$CACHE_PFX/ggml-base.bin $MODEL
          else
            wget -q "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin" -O $MODEL
            mc cp $MODEL cache/$MINIO_BUCKET/$CACHE_PFX/ggml-base.bin || true
          fi
        fi

        # whisper-cli binary
        if [ ! -f $BIN ]; then
          if mc stat cache/$MINIO_BUCKET/$CACHE_PFX/whisper-cli > /dev/null 2>&1; then
            echo "Restoring whisper-cli from cache..."
            mc cp cache/$MINIO_BUCKET/$CACHE_PFX/whisper-cli $BIN && chmod +x $BIN
          else
            apt-get install -y --no-install-recommends build-essential cmake git
            git clone --depth 1 --branch v1.8.3 https://github.com/ggml-org/whisper.cpp.git /tmp/whispersrc
            cmake -B /tmp/whispersrc/build -S /tmp/whispersrc -DCMAKE_BUILD_TYPE=Release -DWHISPER_BUILD_EXAMPLES=ON -DWHISPER_BUILD_TESTS=OFF
            make -C /tmp/whispersrc/build whisper-cli -j2
            cp /tmp/whispersrc/build/bin/whisper-cli $BIN
            rm -rf /tmp/whispersrc
            mc cp $BIN cache/$MINIO_BUCKET/$CACHE_PFX/whisper-cli || true
          fi
        fi

        cat > $WRAPPER << 'WEOF'
        #!/bin/sh
        TMP_WAV=$(mktemp /tmp/whisper_XXXXXX.wav)
        /whisper-storage/ffmpeg -i "$1" -ar 16000 -ac 1 -f wav "$TMP_WAV" -y 2>/dev/null
        /whisper-storage/whisper-cli -m /whisper-storage/ggml-base.bin -f "$TMP_WAV" --language auto --no-timestamps 2>/dev/null
        EC=$?
        rm -f "$TMP_WAV"
        exit $EC
        WEOF
        chmod +x $WRAPPER
    env:
      - name: MINIO_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: minio-cache-creds
            key: endpoint
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-cache-creds
            key: access-key
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: minio-cache-creds
            key: secret-key
      - name: MINIO_BUCKET
        valueFrom:
          secretKeyRef:
            name: minio-cache-creds
            key: bucket
    volumeMounts:
      - name: pvc-whisper
        mountPath: /whisper-storage
  # 3. Setup Config and inject tokens
  - name: setup
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
      - |
        cp /config-tpl/openclaw.json /config-rw/openclaw.json
        if [ -n "$TELEGRAM_TOKEN" ]; then sed -i "s|__TELEGRAM_TOKEN__|$TELEGRAM_TOKEN|g" /config-rw/openclaw.json; fi
        if [ -n "$OPENAI_API_KEY" ]; then sed -i "s|__OPENAI_API_KEY__|$OPENAI_API_KEY|g" /config-rw/openclaw.json; fi
        chown 1000:1000 /config-rw/openclaw.json
    env:
      - name: TELEGRAM_TOKEN
        valueFrom:
          secretKeyRef:
            name: openclaw-telegram-secret
            key: OPENCLAW_TELEGRAM_TOKEN
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: openclaw-openai-secret
            key: OPENAI_API_KEY
            optional: true
    volumeMounts:
      - name: openclaw-config-tpl
        mountPath: /config-tpl
        readOnly: true
      - name: openclaw-config-rw
        mountPath: /config-rw
extraVolumeMounts:
  - name: openclaw-config-rw
    mountPath: /config-rw
  - name: npm-cache
    mountPath: /npm-cache
  - name: pvc-whisper
    mountPath: /whisper-storage
  - name: openclaw-scripts
    mountPath: /scripts
    readOnly: true
persistence:
  state:
    enabled: false
extraVolumes:
  - name: openclaw-config-tpl
    configMap:
      name: openclaw-config
  - name: openclaw-config-rw
    emptyDir: {}
  - name: npm-cache
    emptyDir: {}
  - name: pvc-whisper
    emptyDir: {}
  - name: openclaw-scripts
    configMap:
      name: openclaw-scripts
      defaultMode: 0755
dbSecret:
  vaultPath: teams/my-team/openclaw/database
  secretName: my-team-openclaw-db-creds
dbInitJob:
  enabled: true
  database: "my-team-openclaw"
  waitTable: "identities"
  sql: |
    INSERT INTO identities (provider, provider_id, status, metadata)
    VALUES ('telegram', '', 'approved', '{}')
    ON CONFLICT (provider, provider_id) DO UPDATE SET status = 'approved';
extraExternalSecrets:
  openclaw-telegram-secret:
    refreshInterval: 1h
    targetSecret: openclaw-telegram-secret
    data:
      - secretKey: OPENCLAW_TELEGRAM_TOKEN
        remoteKey: secret/data/teams/my-team/openclaw
        property: telegram-bot-token
  minio-cache-creds:
    refreshInterval: 1h
    targetSecret: minio-cache-creds
    data:
      - secretKey: access-key
        remoteKey: secret/data/teams/my-team/openclaw
        property: MINIO_ACCESS_KEY
      - secretKey: secret-key
        remoteKey: secret/data/teams/my-team/openclaw
        property: MINIO_SECRET_KEY
      - secretKey: endpoint
        remoteKey: secret/data/teams/my-team/openclaw
        property: MINIO_ENDPOINT
      - secretKey: bucket
        remoteKey: secret/data/teams/my-team/openclaw
        property: MINIO_BUCKET
configMaps:
  openclaw-scripts:
    mcp-agent-proxy.js: |-
      #!/usr/bin/env node
      const http = require('http');
      process.stdin.setEncoding('utf8');
      let buf = '';
      process.stdin.on('data', chunk => {
        buf += chunk;
        let nl;
        while ((nl = buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) handleLine(line);
        }
      });
      function handleLine(line) {
        let req;
        try { req = JSON.parse(line); } catch (_) { return; }
        callAgent(req).then(res => write(res), err => write({ jsonrpc: '2.0', id: req.id, error: { code: -32603, message: String(err) } }));
      }
      function write(obj) { process.stdout.write(JSON.stringify(obj) + '\n'); }
      function callAgent(body) {
        return new Promise((resolve, reject) => {
          const data = JSON.stringify(body);
          const req = http.request({ hostname: 'mctl-agent.admins.svc.cluster.local', port: 8080, path: '/mcp', method: 'POST', headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) } }, res => {
            let out = ''; res.on('data', c => { out += c; }); res.on('end', () => { try { resolve(JSON.parse(out)); } catch (_) { reject(new Error('invalid JSON')); } });
          });
          req.on('error', reject); req.write(data); req.end();
        });
      }
  openclaw-config:
    openclaw.json: |-
      {
        "gateway": {
          "bind": "lan",
          "port": 18789,
          "auth": {
            "mode": "trusted-proxy",
            "trustedProxy": {
              "userHeader": "X-Forwarded-For"
            }
          },
          "trustedProxies": [
            "10.42.0.0/16",
            "10.43.0.0/16",
            "172.16.0.0/12"
          ],
          "controlUi": {
            "enabled": true,
            "allowedOrigins": [
              "https://my-team-openclaw.mctl.ai",
              "https://my-team-openclaw.mctl.me"
            ]
          }
        },
        "agents": {
          "defaults": {
            "model": {
              "primary": "openai-codex/gpt-5.4"
            }
          }
        },
        "auth": {
          "profiles": {
            "openai-codex:default": {
              "provider": "openai-codex",
              "mode": "oauth"
            }
          },
          "order": {
            "openai-codex": ["openai-codex:default"]
          }
        },
        "channels": {
          "telegram": {
            "enabled": false,
            "botToken": "__TELEGRAM_TOKEN__",
            "dmPolicy": "pairing",
            "groupPolicy": "open",
            "allowFrom": [""]
          }
        },
        "mcp": {
          "servers": {
            "mctl-platform": {
              "command": "node",
              "args": [
                "/npm-cache/node_modules/mcp-remote/dist/proxy.js",
                "https://api.mctl.ai/mcp",
                "--transport", "sse",
                "--callback-url", "https://my-team-openclaw.mctl.ai/oauth/callback/mctl-platform"
              ]
            },
            "mctl-agent": {"command": "node", "args": ["/scripts/mcp-agent-proxy.js"]}
          }
        }
      }
ingress:
  enabled: true
  hosts:
    - my-team-openclaw.mctl.ai
    - my-team-openclaw.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: openclaw-tls
      hosts:
        - my-team-openclaw.mctl.ai
        - my-team-openclaw.mctl.me
