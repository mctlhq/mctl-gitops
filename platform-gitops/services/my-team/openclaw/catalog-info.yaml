apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: openclaw
  description: "openclaw service"
  annotations:
    platform.mctl.me/database: "true"
    platform.mctl.me/database-team: "my-team"
    platform.mctl.me/database-app: "openclaw"
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=my-team-openclaw
    backstage.io/kubernetes-namespace: my-team
    argocd/app-name: my-team-openclaw
    github.com/source-repo:
    # mctl.me/auto-deploy — triggered by GitHub App webhook on tag push
    #   "true" or "auto" — deploy immediately via scaffolder
    #   "confirm"         — notify only, user deploys manually from UI
    #   "false" or absent — skip
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.me/applications/argocd/my-team-openclaw
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/
      title: Source Repository
      icon: github
    - url: https://workflows.mctl.me
      title: Argo Workflows
      icon: github
    - url: https://my-team-openclaw.mctl.ai
      title: Service URL
      icon: web
  labels:
    team: my-team
    env: apps
spec:
  type: service
  lifecycle: production
  owner: group:my-team
  system: team-my-team
