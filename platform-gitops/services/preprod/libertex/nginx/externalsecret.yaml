# ExternalSecret for nginx
# Team: libertex
# Vault path: secret/data/preprod/libertex/nginx
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nginx-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: nginx-secrets
    creationPolicy: Owner
  data:
    - secretKey: newKeys
      remoteRef:
        key: preprod/libertex/nginx
        property: newKeys
