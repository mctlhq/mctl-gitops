# Service: monteexchange
# Team: admin
# Environment: preprod

image:
  repository: ghcr.io/mashkovd/monteexchange
  tag: "eeb1a64"

service:
  port: 8080

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  newKey: "New Value"
  newKey-1: "New Value"
  newKey-2: "New Value"

externalSecret:
  targetSecret: monteexchange-secrets
  data:
    - secretKey: BOT_TOKEN
      remoteKey: preprod/admin/monteexchange
      property: BOT_TOKEN
    - secretKey: WISE_TOKEN
      remoteKey: preprod/admin/monteexchange
      property: WISE_TOKEN
    - secretKey: BALANCE_ID
      remoteKey: preprod/admin/monteexchange
      property: BALANCE_ID
    - secretKey: PROFILE_ID
      remoteKey: preprod/admin/monteexchange
      property: PROFILE_ID

envFrom:
  - secretRef:
      name: monteexchange-secrets

ingress:
  enabled: true
  host: monteexchange.mctl.me
