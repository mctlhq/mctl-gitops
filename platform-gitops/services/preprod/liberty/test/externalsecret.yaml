# ExternalSecret for test
# Team: liberty
# Vault path: secret/data/preprod/liberty/test
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: test-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: test-secrets
    creationPolicy: Owner
  data:
    - secretKey: newKeyS
      remoteRef:
        key: preprod/liberty/test
        property: newKeyS
