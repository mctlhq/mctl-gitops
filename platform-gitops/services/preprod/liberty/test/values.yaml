image:
  repository: nginxdemos/hello
  tag: "plain-text"

service:
  port: 80

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  newKey: "1"

envFrom:
  - secretRef:
      name: test-secrets
