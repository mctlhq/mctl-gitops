apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: django-test
  description: "django-test service deployed to production"
  annotations:
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=test-django-test
    backstage.io/kubernetes-namespace: test
    argocd/app-name: test-django-test
    github.com/source-repo: mctlhq/django-test
    # mctl.me/auto-deploy — triggered by GitHub App webhook on tag push
    #   "true" or "auto" — deploy immediately via scaffolder
    #   "confirm"         — notify only, user deploys manually from UI
    #   "false" or absent — skip
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.me/applications/argocd/test-django-test
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/mctlhq/django-test
      title: Source Repository
      icon: github
    - url: https://github.com/mctlhq/mctl-core/actions/workflows/release-service.yml
      title: GitHub Actions
      icon: github
    - url: https://test-django-test.mctl.me
      title: Service URL
      icon: web
  labels:
    team: test
    env: apps
spec:
  type: service
  lifecycle: production
  owner: group:test
  system: team-test
