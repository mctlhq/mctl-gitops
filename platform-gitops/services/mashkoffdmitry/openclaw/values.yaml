# Service: openclaw
# Team: mashkoffdmitry
# Template: openclaw

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/openclaw
  tag: "main-5a2a4ab"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 18789
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 3Gi
# Recreate strategy required: openclaw-state PVC is RWO
strategy:
  type: Recreate
env:
  APP_ENV: production
  NODE_OPTIONS: "--max-old-space-size=2048"
  OPENCLAW_CONFIG_PATH: /config-rw/openclaw.json
initContainers:
  # 1. Pre-install mcp-remote so npx doesn't download it on every MCP call
  - name: install-mcp-remote
    image: node:22-alpine
    command: ["sh", "-c"]
    args:
      - npm install --prefix /npm-cache mcp-remote
    volumeMounts:
      - name: npm-cache
        mountPath: /npm-cache
  # 2. Build whisper-cli from source and download ggml-base model (skips if PVC already populated)
  - name: install-whisper-cli
    image: alpine:3.19
    command: ["sh", "-c"]
    args:
      - |
        set -e
        WHISPER_DIR=/whisper-storage
        BIN=$WHISPER_DIR/whisper-cli
        MODEL=$WHISPER_DIR/ggml-base.bin

        # Skip if already installed (PVC survives pod restarts)
        if [ -f "$BIN" ] && [ -f "$MODEL" ]; then
          echo "whisper-cli already installed, skipping"
          exit 0
        fi

        apk add --no-cache build-base cmake curl git
        mkdir -p $WHISPER_DIR

        # Build whisper-cli from source (ggml-org/whisper.cpp, pinned tag)
        echo "Cloning whisper.cpp v1.8.3..."
        git clone --depth 1 --branch v1.8.3 \
          https://github.com/ggml-org/whisper.cpp.git /tmp/whispersrc
        cmake -B /tmp/whispersrc/build -S /tmp/whispersrc \
          -DCMAKE_BUILD_TYPE=Release \
          -DWHISPER_BUILD_TESTS=OFF \
          -DWHISPER_BUILD_EXAMPLES=ON
        cmake --build /tmp/whispersrc/build --target whisper-cli -j$(nproc)
        cp /tmp/whispersrc/build/bin/whisper-cli $BIN
        rm -rf /tmp/whispersrc
        echo "whisper-cli built: $(ls -lh $BIN)"

        # Download ggml-base model (~142MB, cached on PVC after first run)
        echo "Downloading ggml-base.bin (~142MB)..."
        curl -fsSL \
          "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin" \
          -o $MODEL

        echo "Done: $(ls -lh $WHISPER_DIR)"
    resources:
      requests:
        cpu: "1"
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 1Gi
    volumeMounts:
      - name: pvc-whisper
        mountPath: /whisper-storage
  # 3. Prepare config and state
  - name: setup
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
      - |
        # Copy auth-profiles.json from secret to state dir
        mkdir -p /state/agents/main/agent
        if [ -f /secrets/auth-profiles.json ]; then
          cp /secrets/auth-profiles.json /state/agents/main/agent/auth-profiles.json
        fi
        chown -R 1000:1000 /state
        # Copy config template and inject tokens
        cp /config-tpl/openclaw.json /config-rw/openclaw.json
        if [ -n "$TELEGRAM_TOKEN" ]; then
          sed -i "s|__TELEGRAM_BOT_TOKEN__|$TELEGRAM_TOKEN|g" /config-rw/openclaw.json
        fi
        if [ -n "$MCTL_TOKEN" ]; then
          sed -i "s|__MCTL_API_TOKEN__|$MCTL_TOKEN|g" /config-rw/openclaw.json
        fi
        chown 1000:1000 /config-rw/openclaw.json
    env:
      - name: TELEGRAM_TOKEN
        valueFrom:
          secretKeyRef:
            name: openclaw-telegram-secret
            key: OPENCLAW_TELEGRAM_TOKEN
            optional: true
      - name: MCTL_TOKEN
        valueFrom:
          secretKeyRef:
            name: openclaw-mctl-token
            key: MCTL_API_TOKEN
            optional: true
    volumeMounts:
      - name: openclaw-auth-secret
        mountPath: /secrets
        readOnly: true
      - name: pvc-state
        mountPath: /state
      - name: openclaw-config-tpl
        mountPath: /config-tpl
        readOnly: true
      - name: openclaw-config-rw
        mountPath: /config-rw
probes:
  startup:
    path: /healthz
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 30
  liveness:
    path: /healthz
    port: http
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /readyz
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
extraVolumeMounts:
  - name: openclaw-config-rw
    mountPath: /config-rw
  - name: pvc-state
    mountPath: /home/node/.openclaw
  - name: npm-cache
    mountPath: /npm-cache
  - name: pvc-whisper
    mountPath: /whisper-storage
    readOnly: true
# PVC for openclaw state (Telegram pairing, agent data)
persistence:
  state:
    size: 1Gi
  whisper:
    size: 1Gi
extraVolumes:
  - name: openclaw-config-tpl
    configMap:
      name: openclaw-config
  - name: openclaw-config-rw
    emptyDir: {}
  - name: openclaw-auth-secret
    secret:
      secretName: openclaw-auth
      optional: true
  - name: npm-cache
    emptyDir: {}
externalSecret:
  targetSecret: openclaw-auth
  refreshInterval: 30m
  data:
    - secretKey: auth-profiles.json
      remoteKey: secret/data/teams/mashkoffdmitry/openclaw
      property: auth-profiles.json
extraExternalSecrets:
  openclaw-telegram-secret:
    refreshInterval: 1h
    targetSecret: openclaw-telegram-secret
    data:
      - secretKey: OPENCLAW_TELEGRAM_TOKEN
        remoteKey: secret/data/platform/alertmanager
        property: telegram-bot-token
  openclaw-mctl-token:
    refreshInterval: 1h
    targetSecret: openclaw-mctl-token
    data:
      - secretKey: MCTL_API_TOKEN
        remoteKey: secret/data/teams/mashkoffdmitry/openclaw
        property: mctl-api-token
configMaps:
  openclaw-config:
    openclaw.json: |-
      {
        "agents": {
          "defaults": {
            "model": { "primary": "openai-codex/gpt-5.4" },
            "models": { "openai-codex/gpt-5.4": {} }
          }
        },
        "commands": {
          "native": "auto",
          "nativeSkills": "auto",
          "restart": true,
          "ownerDisplay": "raw"
        },
        "tools": {
          "media": {
            "audio": {
              "enabled": true,
              "echoTranscript": true,
              "echoFormat": "📝 {transcript}",
              "models": [
                {
                  "type": "cli",
                  "command": "/whisper-storage/whisper-cli",
                  "args": [
                    "-m", "/whisper-storage/ggml-base.bin",
                    "-f", "{{MediaPath}}",
                    "--output-txt",
                    "--output-file", "/tmp/wout"
                  ],
                  "timeoutSeconds": 120
                }
              ]
            }
          }
        },
        "channels": {
          "telegram": {
            "enabled": true,
            "botToken": "__TELEGRAM_BOT_TOKEN__",
            "dmPolicy": "pairing",
            "groupPolicy": "open",
            "accounts": {
              "default": {
                "enabled": true,
                "dmPolicy": "pairing",
                "groupPolicy": "open",
                "streaming": "partial"
              }
            },
            "streaming": "partial"
          }
        },
        "mcp": {
          "servers": {
            "mctl-platform": {
              "command": "node",
              "args": [
                "/npm-cache/node_modules/mcp-remote/dist/proxy.js",
                "https://api.mctl.ai/mcp",
                "--header",
                "Authorization: Bearer __MCTL_API_TOKEN__"
              ]
            }
          }
        },
        "gateway": {
          "port": 18789,
          "bind": "lan",
          "controlUi": {
            "enabled": true,
            "allowedOrigins": [
              "https://mashkoffdmitry-openclaw.mctl.ai",
              "https://mashkoffdmitry-openclaw.mctl.me"
            ]
          },
          "auth": {
            "mode": "trusted-proxy",
            "trustedProxy": {
              "userHeader": "X-Forwarded-For"
            }
          },
          "trustedProxies": [
            "10.42.0.0/16",
            "10.43.0.0/16",
            "172.16.0.0/12"
          ]
        }
      }
ingress:
  enabled: true
  hosts:
    - mashkoffdmitry-openclaw.mctl.ai
    - mashkoffdmitry-openclaw.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: openclaw-tls
      hosts:
        - mashkoffdmitry-openclaw.mctl.ai
        - mashkoffdmitry-openclaw.mctl.me
