# Service: openclaw
# Team: mashkoffdmitry
# Template: openclaw

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/openclaw
  tag: "v2026.3.13-1"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 18789
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
env:
  APP_ENV: production
  NODE_OPTIONS: "--max-old-space-size=768"
  OPENCLAW_CONFIG_PATH: /config/openclaw.json
envFrom:
  - secretRef:
      name: openclaw-telegram-secret
initContainers:
  - name: setup-auth
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
      - |
        mkdir -p /state/agents/main/agent
        cp /secrets/auth-profiles.json /state/agents/main/agent/auth-profiles.json
        chown -R 1000:1000 /state
    volumeMounts:
      - name: openclaw-auth-secret
        mountPath: /secrets
        readOnly: true
      - name: openclaw-state
        mountPath: /state
probes:
  startup:
    path: /healthz
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 30
  liveness:
    path: /healthz
    port: http
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /readyz
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
extraVolumeMounts:
  - name: openclaw-config
    mountPath: /config
    readOnly: true
  - name: openclaw-state
    mountPath: /home/node/.openclaw
extraVolumes:
  - name: openclaw-config
    configMap:
      name: openclaw-config
  - name: openclaw-auth-secret
    secret:
      secretName: openclaw-auth
      optional: true
  - name: openclaw-state
    emptyDir: {}
externalSecret:
  targetSecret: openclaw-auth
  refreshInterval: 30m
  data:
    - secretKey: auth-profiles.json
      remoteKey: secret/data/teams/mashkoffdmitry/openclaw
      property: auth-profiles.json
ingress:
  enabled: true
  hosts:
    - mashkoffdmitry-openclaw.mctl.ai
    - mashkoffdmitry-openclaw.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: openclaw-tls
      hosts:
        - mashkoffdmitry-openclaw.mctl.ai
        - mashkoffdmitry-openclaw.mctl.me
