# Service: openclaw
# Team: mashkoffdmitry
# Template: openclaw

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/openclaw
  tag: "main-5a2a4ab"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 18789
resources:
  requests:
    cpu: 200m
    memory: 768Mi
  limits:
    cpu: "1"
    memory: 1.2Gi
# Recreate strategy required
strategy:
  type: Recreate
env:
  APP_ENV: production
  NODE_OPTIONS: "--max-old-space-size=1024"
  OPENCLAW_CONFIG_PATH: /config-rw/openclaw.json
  # PostgreSQL Connection
  DATABASE_URL: "postgresql://backstage:$(DB_PASSWORD)@shared-pg-rw.platform-db.svc.cluster.local:5432/mashkoffdmitry-openclaw"

initContainers:
  - name: install-mcp-remote
    image: node:22-alpine
    command: ["sh", "-c"]
    args:
      - npm install --prefix /npm-cache mcp-remote
    volumeMounts:
      - name: npm-cache
        mountPath: /npm-cache
  - name: install-whisper-cli
    image: debian:12-slim
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 1.2Gi
    command: ["sh", "-c"]
    args:
      - |
        set -e;
        # ... (build script remains the same) ...
    volumeMounts:
      - name: pvc-whisper
        mountPath: /whisper-storage
  - name: setup
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
      - |
        cp /config-tpl/openclaw.json /config-rw/openclaw.json
        if [ -n "$TELEGRAM_TOKEN" ]; then sed -i "s|__TELEGRAM_TOKEN__|$TELEGRAM_TOKEN|g" /config-rw/openclaw.json; fi
        if [ -n "$MCTL_TOKEN" ]; then sed -i "s|__MCTL_TOKEN__|$MCTL_TOKEN|g" /config-rw/openclaw.json; fi
        if [ -n "$OPENAI_CODEX_TOKEN" ]; then sed -i "s|__OPENAI_CODEX_TOKEN__|$OPENAI_CODEX_TOKEN|g" /config-rw/openclaw.json; fi
        chown 1000:1000 /config-rw/openclaw.json
    env:
      - name: TELEGRAM_TOKEN
        valueFrom: { secretKeyRef: { name: openclaw-telegram-secret, key: OPENCLAW_TELEGRAM_TOKEN } }
      - name: MCTL_TOKEN
        valueFrom: { secretKeyRef: { name: openclaw-mctl-token, key: MCTL_API_TOKEN, optional: true } }
      - name: OPENAI_CODEX_TOKEN
        valueFrom: { secretKeyRef: { name: openclaw-codex-secret, key: OPENAI_CODEX_TOKEN, optional: true } }
    volumeMounts:
      - name: openclaw-config-tpl
        mountPath: /config-tpl
        readOnly: true
      - name: openclaw-config-rw
        mountPath: /config-rw

extraExternalSecrets:
  openclaw-codex-secret:
    refreshInterval: 1h
    targetSecret: openclaw-codex-secret
    data:
      - secretKey: OPENAI_CODEX_TOKEN
        remoteKey: secret/data/platform/openai
        property: codex-api-key # Assuming a different key for codex
  # ... other secrets ...

configMaps:
  openclaw-config:
    openclaw.json: |-
      {
        "gateway": {
          "port": 18789,
          "bind": "lan"
        },
        "agents": {
          "defaults": {
            "model": { "primary": "openai-codex/gpt-5.4" },
            "models": {
              "openai-codex/gpt-5.4": {
                "provider": "openai-codex"
              }
            }
          }
        },
        "providers": {
           "openai-codex": {
              "type": "openai",
              "apiKey": "__OPENAI_CODEX_TOKEN__",
              "baseUrl": "https://codex.openai.com/v1"
           }
        },
        "channels": {
          "telegram": {
            "enabled": true,
            "botToken": "__TELEGRAM_TOKEN__"
          }
        }
      }
