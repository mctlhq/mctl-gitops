# Service: openclaw
# Team: mashkoffdmitry
# Template: openclaw

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/openclaw
  tag: "main-5a2a4ab"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 18789
resources:
  requests:
    cpu: 200m
    memory: 768Mi
  limits:
    cpu: "1"
    memory: 2Gi
# Recreate strategy required: openclaw-state PVC is RWO
strategy:
  type: Recreate
env:
  APP_ENV: production
  NODE_OPTIONS: "--max-old-space-size=1024"
  OPENCLAW_CONFIG_PATH: /config-rw/openclaw.json
  # PostgreSQL Connection (credentials injected via externalSecret)
  DATABASE_URL: "postgresql://$(DB_USER):$(DB_PASSWORD)@shared-pg-rw.platform-db.svc.cluster.local:5432/mashkoffdmitry-openclaw"

initContainers:
  # 1. Pre-install mcp-remote so npx doesn't download it on every MCP call
  - name: install-mcp-remote
    image: node:22-alpine
    command: ["sh", "-c"]
    args:
      - npm install --prefix /npm-cache mcp-remote
    volumeMounts:
      - name: npm-cache
        mountPath: /npm-cache
  # 2. Build whisper-cli from source and download ggml-base model (skips if PVC already populated)
  - name: install-whisper-cli
    image: debian:12-slim
    command: ["sh", "-c"]
    args:
      - |
        set -e
        WHISPER_DIR=/whisper-storage
        BIN=$WHISPER_DIR/whisper-cli
        MODEL=$WHISPER_DIR/ggml-base.bin
        WRAPPER=$WHISPER_DIR/run-whisper.sh

        mkdir -p $WHISPER_DIR

        # Always build/download since we use ephemeral storage now
        apt-get update -qq
        apt-get install -y --no-install-recommends \
          build-essential cmake git curl ca-certificates

        # Download static ffmpeg binary (no deps required at runtime)
        echo "Downloading static ffmpeg..."
        curl -fsSL \
          "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" \
          | tar -xJ --strip-components=1 -C $WHISPER_DIR --wildcards "*/ffmpeg"
        chmod +x $WHISPER_DIR/ffmpeg

        # Build whisper-cli from source (debian glibc, pinned tag v1.8.3)
        echo "Cloning whisper.cpp v1.8.3..."
        git clone --depth 1 --branch v1.8.3 \
          https://github.com/ggml-org/whisper.cpp.git /tmp/whispersrc
        cmake -B /tmp/whispersrc/build -S /tmp/whispersrc \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_SHARED_LIBS=OFF \
          -DWHISPER_BUILD_TESTS=OFF \
          -DWHISPER_BUILD_EXAMPLES=ON
        cmake --build /tmp/whispersrc/build --target whisper-cli -j$(nproc)
        cp /tmp/whispersrc/build/bin/whisper-cli $BIN
        rm -rf /tmp/whispersrc

        # Download ggml-base model (~140MB) — fast and lightweight
        echo "Downloading ggml-base.bin (~140MB)..."
        curl -fsSL \
          "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin" \
          -o $MODEL

        # Always regenerate wrapper so language/flag changes take effect
        cat > $WRAPPER << 'WEOF'
        #!/bin/sh
        TMP_WAV=$(mktemp /tmp/whisper_XXXXXX.wav)
        /whisper-storage/ffmpeg -i "$1" -ar 16000 -ac 1 -f wav "$TMP_WAV" -y 2>/dev/null
        /whisper-storage/whisper-cli \
          -m /whisper-storage/ggml-base.bin \
          -f "$TMP_WAV" \
          --language auto \
          --no-timestamps \
          2>/dev/null
        EC=$?
        rm -f "$TMP_WAV"
        exit $EC
        WEOF
        sed -i 's/^        //' $WRAPPER
        chmod +x $WRAPPER
    resources:
      requests:
        cpu: "1"
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 1Gi
    volumeMounts:
      - name: pvc-whisper
        mountPath: /whisper-storage
  # 3. Prepare config and state
  - name: setup
    image: busybox:1.36
    command: ["sh", "-c"]
    args:
      - |
        # Copy auth-profiles.json from secret to state dir
        mkdir -p /state/agents/main/agent
        if [ -f /secrets/auth-profiles.json ]; then
          cp /secrets/auth-profiles.json /state/agents/main/agent/auth-profiles.json
        fi
        chown -R 1000:1000 /state
        # Copy config template and inject tokens
        cp /config-tpl/openclaw.json /config-rw/openclaw.json
        if [ -n "$TELEGRAM_TOKEN" ]; then
          sed -i "s|__TELEGRAM_BOT_TOKEN__|$TELEGRAM_TOKEN|g" /config-rw/openclaw.json
        fi
        if [ -n "$MCTL_TOKEN" ]; then
          sed -i "s|__MCTL_API_TOKEN__|$MCTL_TOKEN|g" /config-rw/openclaw.json
        fi
        chown 1000:1000 /config-rw/openclaw.json
    env:
      - name: TELEGRAM_TOKEN
        valueFrom:
          secretKeyRef:
            name: openclaw-telegram-secret
            key: OPENCLAW_TELEGRAM_TOKEN
      - name: MCTL_TOKEN
        valueFrom:
          secretKeyRef:
            name: openclaw-mctl-token
            key: MCTL_API_TOKEN
            optional: true
      - name: DB_USER
        valueFrom:
          secretKeyRef:
            name: openclaw-db-creds
            key: username
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: openclaw-db-creds
            key: password
    volumeMounts:
      - name: openclaw-auth-secret
        mountPath: /secrets
        readOnly: true
      - name: openclaw-config-tpl
        mountPath: /config-tpl
        readOnly: true
      - name: openclaw-config-rw
        mountPath: /config-rw
probes:
  startup:
    path: /healthz
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 30
  liveness:
    path: /healthz
    port: http
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /readyz
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
extraVolumeMounts:
  - name: openclaw-config-rw
    mountPath: /config-rw
  - name: npm-cache
    mountPath: /npm-cache
  - name: pvc-whisper
    mountPath: /whisper-storage
  - name: openclaw-scripts
    mountPath: /scripts
    readOnly: true
# PVC for openclaw state (Removed - using PostgreSQL)
persistence:
  state:
    enabled: false
extraVolumes:
  - name: openclaw-config-tpl
    configMap:
      name: openclaw-config
  - name: openclaw-config-rw
    emptyDir: {}
  - name: openclaw-auth-secret
    secret:
      secretName: openclaw-auth
      optional: true
  - name: npm-cache
    emptyDir: {}
  - name: pvc-whisper
    emptyDir: {}
  - name: openclaw-scripts
    configMap:
      name: openclaw-scripts
      defaultMode: 0755
externalSecret:
  targetSecret: openclaw-auth
  refreshInterval: 30m
  data:
    - secretKey: auth-profiles.json
      remoteKey: secret/data/teams/mashkoffdmitry/openclaw
      property: auth-profiles.json
extraExternalSecrets:
  openclaw-db-creds:
    refreshInterval: 1h
    targetSecret: openclaw-db-creds
    data:
      - secretKey: username
        remoteKey: secret/data/teams/mashkoffdmitry/openclaw/database
        property: username
      - secretKey: password
        remoteKey: secret/data/teams/mashkoffdmitry/openclaw/database
        property: password
  openclaw-telegram-secret:
    refreshInterval: 1h
    targetSecret: openclaw-telegram-secret
    data:
      - secretKey: OPENCLAW_TELEGRAM_TOKEN
        remoteKey: secret/data/platform/alertmanager
        property: telegram-bot-token
  openclaw-mctl-token:
    refreshInterval: 1h
    targetSecret: openclaw-mctl-token
    data:
      - secretKey: MCTL_API_TOKEN
        remoteKey: secret/data/teams/mashkoffdmitry/openclaw
        property: mctl-api-token
configMaps:
  openclaw-scripts:
    mcp-agent-proxy.js: |-
      #!/usr/bin/env node
      const http = require('http');
      process.stdin.setEncoding('utf8');
      let buf = '';
      process.stdin.on('data', chunk => {
        buf += chunk;
        let nl;
        while ((nl = buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) handleLine(line);
        }
      });
      function handleLine(line) {
        let req;
        try { req = JSON.parse(line); } catch (_) { return; }
        callAgent(req).then(res => write(res), err => write({ jsonrpc: '2.0', id: req.id, error: { code: -32603, message: String(err) } }));
      }
      function write(obj) { process.stdout.write(JSON.stringify(obj) + '\n'); }
      function callAgent(body) {
        return new Promise((resolve, reject) => {
          const data = JSON.stringify(body);
          const req = http.request({ hostname: 'mctl-agent.admins.svc.cluster.local', port: 8080, path: '/mcp', method: 'POST', headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) } }, res => {
            let out = ''; res.on('data', c => { out += c; }); res.on('end', () => { try { resolve(JSON.parse(out)); } catch (_) { reject(new Error('invalid JSON')); } });
          });
          req.on('error', reject); req.write(data); req.end();
        });
      }
  openclaw-config:
    openclaw.json: |-
      {
        "gateway": {
          "port": 18789,
          "bind": "lan",
          "controlUi": {
            "enabled": true,
            "allowedOrigins": ["https://mashkoffdmitry-openclaw.mctl.ai"]
          },
          "auth": { "mode": "trusted-proxy", "trustedProxy": { "userHeader": "X-Forwarded-For" } },
          "trustedProxies": ["10.42.0.0/16", "10.43.0.0/16", "172.16.0.0/12"]
        },
        "channels": {
          "telegram": {
            "enabled": true,
            "botToken": "__TELEGRAM_BOT_TOKEN__",
            "dmPolicy": "pairing",
            "groupPolicy": "allowlist"
          }
        },
        "mcp": {
          "servers": {
            "mctl-platform": {
              "command": "node",
              "args": ["/npm-cache/node_modules/mcp-remote/dist/proxy.js", "https://api.mctl.ai/mcp", "--header", "Authorization: Bearer __MCTL_API_TOKEN__"]
            },
            "mctl-agent": { "command": "node", "args": ["/scripts/mcp-agent-proxy.js"] }
          }
        }
      }
ingress:
  enabled: true
  hosts:
    - mashkoffdmitry-openclaw.mctl.ai
    - mashkoffdmitry-openclaw.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: openclaw-tls
      hosts:
        - mashkoffdmitry-openclaw.mctl.ai
        - mashkoffdmitry-openclaw.mctl.me
