apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: openclaw
  description: "openclaw service"
  annotations:
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=mashkoffdmitry-openclaw
    backstage.io/kubernetes-namespace: mashkoffdmitry
    argocd/app-name: mashkoffdmitry-openclaw
    github.com/source-repo:
    # mctl.me/auto-deploy — triggered by GitHub App webhook on tag push
    #   "true" or "auto" — deploy immediately via scaffolder
    #   "confirm"         — notify only, user deploys manually from UI
    #   "false" or absent — skip
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.me/applications/argocd/mashkoffdmitry-openclaw
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/
      title: Source Repository
      icon: github
    - url: https://workflows.mctl.me
      title: Argo Workflows
      icon: github
    - url: https://mashkoffdmitry-openclaw.mctl.ai
      title: Service URL
      icon: web
  labels:
    team: mashkoffdmitry
    env: apps
spec:
  type: service
  lifecycle: production
  owner: group:mashkoffdmitry
  system: team-mashkoffdmitry
