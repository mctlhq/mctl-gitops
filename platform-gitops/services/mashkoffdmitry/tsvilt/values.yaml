# Service: tsvilt
# Team: mashkoffdmitry

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/tsvilt
  tag: "master"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8000
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
ingress:
  enabled: true
  hosts:
    - mashkoffdmitry-tsvilt.mctl.ai
    - mashkoffdmitry-tsvilt.mctl.me
    - tsvilt.dmitriimashkov.com
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: tsvilt-tls
      hosts:
        - mashkoffdmitry-tsvilt.mctl.ai
        - mashkoffdmitry-tsvilt.mctl.me
    - secretName: tsvilt-custom-tls
      hosts:
        - tsvilt.dmitriimashkov.com
