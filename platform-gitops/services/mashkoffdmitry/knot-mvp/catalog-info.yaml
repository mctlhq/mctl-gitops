apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: knot-mvp
  description: "knot-mvp service"
  annotations:
    platform.mctl.me/database: "true"
    platform.mctl.me/database-team: "mashkoffdmitry"
    platform.mctl.me/database-app: "knot-mvp"
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=mashkoffdmitry-knot-mvp
    backstage.io/kubernetes-namespace: mashkoffdmitry
    argocd/app-name: mashkoffdmitry-knot-mvp
    github.com/source-repo: mashkovd/knot-capital-mvp
    # mctl.me/auto-deploy — triggered by GitHub App webhook on tag push
    #   "true" or "auto" — deploy immediately via scaffolder
    #   "confirm"         — notify only, user deploys manually from UI
    #   "false" or absent — skip
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.me/applications/argocd/mashkoffdmitry-knot-mvp
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/mashkovd/knot-capital-mvp
      title: Source Repository
      icon: github
    - url: https://workflows.mctl.me
      title: Argo Workflows
      icon: github
    - url: https://mashkoffdmitry-knot-mvp.mctl.ai
      title: Service URL
      icon: web
  labels:
    team: mashkoffdmitry
    env: apps
spec:
  type: service
  lifecycle: production
  owner: group:mashkoffdmitry
  system: team-mashkoffdmitry
