# Service: hello-world
# Team: smoke-test

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/hello-world
  tag: "1.0.0"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8080
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
ingress:
  enabled: true
  hosts:
    - smoke-test-hello-world.mctl.ai
    - smoke-test-hello-world.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: hello-world-tls
      hosts:
        - smoke-test-hello-world.mctl.ai
        - smoke-test-hello-world.mctl.me
