apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: hello-world
  description: "hello-world service"
  annotations:
    platform.mctl.me/database: "true"
    platform.mctl.me/database-team: "smoke-test"
    platform.mctl.me/database-app: "hello-world"
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=smoke-test-hello-world
    backstage.io/kubernetes-namespace: smoke-test
    argocd/app-name: smoke-test-hello-world
    github.com/source-repo: mctl-reviewer/hello-world
    # mctl.me/auto-deploy — triggered by GitHub App webhook on tag push
    #   "true" or "auto" — deploy immediately via scaffolder
    #   "confirm"         — notify only, user deploys manually from UI
    #   "false" or absent — skip
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.me/applications/argocd/smoke-test-hello-world
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/mctl-reviewer/hello-world
      title: Source Repository
      icon: github
    - url: https://workflows.mctl.me
      title: Argo Workflows
      icon: github
    - url: https://smoke-test-hello-world.mctl.ai
      title: Service URL
      icon: web
  labels:
    team: smoke-test
    env: apps
spec:
  type: service
  lifecycle: production
  owner: group:smoke-test
  system: team-smoke-test
