# Service: tsvilt
# Team: mctl-internals

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/tsvilt
  tag: "1.1.0"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8000
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: preview
  a: "1"
ingress:
  enabled: true
  host: tsvilt.mctl.me
probes:
  liveness: null
  readiness: null
externalSecret:
  targetSecret: tsvilt-secrets
  data:
    - secretKey: s
      remoteKey: teams/mctl-internals/tsvilt
      property: s
envFrom:
  - secretRef:
      name: tsvilt-secrets
