# Service: tsvilt
# Team: mctl-internals

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/tsvilt
  tag: "1.2.0"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8000
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - tsvilt.mctl.me
    - tsvilt.mctl.io
  tls:
    - secretName: tsvilt-tls
      hosts:
        - tsvilt.mctl.me
        - tsvilt.mctl.io
probes:
  liveness: null
  readiness: null
