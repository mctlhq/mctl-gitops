apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tsvilt
  description: "tsvilt service deployed to preview"
  annotations:
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=mctl-internals-tsvilt
    backstage.io/kubernetes-namespace: mctl-internals
    argocd/app-name: mctl-internals-tsvilt
    github.com/source-repo: mashkoffdmitry/tsvilt
    # mctl.me/auto-deploy — triggered by GitHub App webhook on tag push
    #   "true" or "auto" — deploy immediately via scaffolder
    #   "confirm"         — notify only, user deploys manually from UI
    #   "false" or absent — skip
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.me/applications/argocd/mctl-internals-tsvilt
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/mashkoffdmitry/tsvilt
      title: Source Repository
      icon: github
    - url: https://workflows.mctl.me
      title: Argo Workflows
      icon: github
    - url: https://tsvilt.mctl.me
      title: Service URL
      icon: web
  labels:
    team: mctl-internals
    env: preview
spec:
  type: service
  lifecycle: production
  owner: group:mctl-internals
  system: team-mctl-internals
