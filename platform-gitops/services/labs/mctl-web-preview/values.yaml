# Service: mctl-web-preview
# Team: labs
# Chart: base-service

image:
  repository: ghcr.io/mctlhq/mctl-web
  tag: "0.0.1"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8080
backstage:
  kubernetesId: mctl-web-preview
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
env:
  APP_ENV: preview
  NUXT_PUBLIC_FRONT_BASE: https://mctl-web-preview.mctl.ai
ingress:
  enabled: true
  hosts:
    - mctl-web-preview.mctl.ai
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: mctl-web-preview-tls
      hosts:
        - mctl-web-preview.mctl.ai
externalSecret: {}
envFrom: []
