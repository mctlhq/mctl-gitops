apiVersion: batch/v1
kind: Job
metadata:
  name: vault-cleanup-mctl-web-preview
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      name: vault-cleanup
    spec:
      serviceAccountName: vault-cleanup
      restartPolicy: Never
      containers:
      - name: cleanup
        image: hashicorp/vault:1.15
        env:
        - name: VAULT_ADDR
          value: "https://secrets.mctl.me"
        - name: TEAM
          value: "labs"
        - name: SERVICE
          value: "mctl-web-preview"
        command:
        - sh
        - -c
        - |
          set -e

          echo "Authenticating with Vault using ServiceAccount..."
          SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)

          VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
            role=vault-cleanup \
            jwt="$SA_TOKEN")

          if [ -z "$VAULT_TOKEN" ]; then
            echo "Failed to authenticate with Vault"
            exit 1
          fi

          export VAULT_TOKEN
          echo "Authenticated successfully"

          echo "Cleaning up Vault secrets for ${TEAM}/${SERVICE}"

          vault kv metadata delete secret/teams/${TEAM}/${SERVICE} 2>/dev/null && \
            echo "Deleted secret/teams/${TEAM}/${SERVICE}" || \
            echo "No main secrets found"

          echo "Vault cleanup completed for ${TEAM}/${SERVICE}"
