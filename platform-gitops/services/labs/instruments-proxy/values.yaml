# Service: instruments-proxy
# Team: labs

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/instruments-proxy
  tag: "0.5.0"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8787
backstage:
  kubernetesId: instruments-proxy
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
  UPSTREAM_TWELVEDATA: "true"
  # Free "Basic 8" tier: 800 credits/day, charged per symbol. 6 symbols x one
  # batch /quote call per 15 min ~= 576/day, under quota. Free tier is delayed,
  # so quotes are honestly labelled delayed (no TWELVEDATA_REALTIME).
  TWELVEDATA_POLL_MS: "900000"
  TWELVEDATA_FRESH_MS: "1200000"
ingress:
  enabled: true
  hosts:
    - labs-instruments-proxy.mctl.ai
    - labs-instruments-proxy.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: instruments-proxy-tls
      hosts:
        - labs-instruments-proxy.mctl.ai
        - labs-instruments-proxy.mctl.me
extraContainers: []
externalSecret:
  targetSecret: instruments-proxy-secrets
  data:
    - secretKey: TWELVEDATA_API_KEY
      remoteKey: teams/labs/instruments-proxy
      property: TWELVEDATA_API_KEY
# Inject the synced secret into the container env so the proxy reads
# TWELVEDATA_API_KEY (enables the Twelve Data live source).
envFrom:
  - secretRef:
      name: instruments-proxy-secrets
