# Service: instruments-proxy
# Team: labs

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/instruments-proxy
  tag: "0.7.0"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8787
backstage:
  kubernetesId: instruments-proxy
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
  # Advertised version string (/readyz, /__status, API index). The app's code
  # default is a stale hardcoded literal, so set it here to match image.tag.
  # Keep this in sync with image.tag above on each bump.
  SERVICE_VERSION: "0.7.0"
  # 0.6.0: ~50 instruments across three live sources on the free TD tier.
  #  - Binance (crypto): real-time, free, unlimited.
  #  - TD WebSocket (8 top fx/metal/share): real-time, separate WS budget.
  #  - TD REST (~40, delayed): chunked round-robin, ~640 credits/day < 800.
  # Poll/fresh use the chunk-aware code defaults (18-min/chunk, ~90-min full
  # cycle, FRESH covers two cycles) — do NOT re-add the old single-batch
  # TWELVEDATA_POLL_MS/FRESH_MS, which were sized for 6 symbols and would churn
  # the 40 REST symbols to fixtures between chunk passes.
  UPSTREAM_TWELVEDATA: "true"
  UPSTREAM_TWELVEDATA_WS: "true"
ingress:
  enabled: true
  hosts:
    - labs-instruments-proxy.mctl.ai
    - labs-instruments-proxy.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: instruments-proxy-tls
      hosts:
        - labs-instruments-proxy.mctl.ai
        - labs-instruments-proxy.mctl.me
extraContainers: []
externalSecret:
  targetSecret: instruments-proxy-secrets
  data:
    - secretKey: TWELVEDATA_API_KEY
      remoteKey: teams/labs/instruments-proxy
      property: TWELVEDATA_API_KEY
# Inject the synced secret into the container env so the proxy reads
# TWELVEDATA_API_KEY (enables the Twelve Data live source).
envFrom:
  - secretRef:
      name: instruments-proxy-secrets
