# Service: kuptsi-app
# Team: labs

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/kuptsi-app
  tag: "0.2.16"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 5000
backstage:
  kubernetesId: kuptsi-app
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
# NOTE: do NOT let mctl_deploy_service stomp this block on tag bump — the
# uvicorn entrypoint in kuptsi-app needs HOST/PORT/WEB_CONCURRENCY or it
# silently exits 0 on startup (regression seen 2026-05-07 when 0.1.17 → 0.2.0
# auto-deploy reset env to {} and the new pod CrashLoopBackOff'd while the
# rolling-update surge ate ~93% of the labs CPU quota).
env:
  APP_ENV: production
  TEMPORAL_ADDRESS: temporal-frontend.temporal.svc.cluster.local:7233
  TEMPORAL_NAMESPACE: kuptsi
  HOST: 0.0.0.0
  PORT: "5000"
  WEB_CONCURRENCY: "2"
  LOG_LEVEL: info
  UVICORN_RELOAD: "0"
  MAX_ACTIVITY_WORKERS: "20"
  ALBUM_DEBOUNCE_SECONDS: "15"
  ALBUM_MAX_PHOTOS: "8"
  ALBUM_MAX_WAIT_SECONDS: "150"
  CHAT_ID: "-974122276"
# DATABASE_URL with asyncpg scheme is assembled from Vault DB creds via
# ExternalSecret templating below (`externalSecret.targetTemplateData`)
# rather than the previous `env: DATABASE_URL: "...$(DB_USER):$(DB_PASSWORD)..."`
# pattern. Two reasons:
#   1) The `$(...)` shell metacharacters in env_vars caused tpl-git-commit
#      (clusterworkflowtemplate) to fail at the inline assignment step
#      `ENV_VARS="{{inputs.parameters.env_vars}}"` — shell expanded $(DB_USER)
#      as command substitution, exit 127, set -e killed the workflow.
#   2) ESO target.template lets us keep the placeholder pattern at rest in
#      gitops while ESO renders the final URL into the synced Secret.
# DB creds still come from `dbSecret:` below for the temporal-worker container
# (which has its own env block referencing $(DB_USER)/$(DB_PASSWORD) — that
# path uses K8s native env-var substitution at pod startup, not shell).
dbSecret:
  vaultPath: teams/labs/kuptsi-app/database
envFrom:
  - secretRef:
      name: kuptsi-app-secrets
# kuptsi FastAPI exposes /health (see src/app.py); base-service defaults aim
# at /healthz + /readyz which would never become Ready.
probes:
  liveness:
    path: /health
    port: http
    initialDelaySeconds: 30
    periodSeconds: 30
  readiness:
    path: /health
    port: http
    initialDelaySeconds: 10
    periodSeconds: 10
# Temporal worker rides the same image as the FastAPI service via a sibling
# container. Same env (DB + Temporal address + secrets the user adds via
# Backstage), only the entrypoint differs. Saves a second build and keeps
# the two halves of the service synchronised on tag bumps.
extraContainers:
  - name: temporal-worker
    # NOTE: keep this tag in sync with `image.tag` above; both containers must
    # ride the same kuptsi-v2 build. mctl_deploy_service action=deploy only
    # bumps `image.tag` in this file — bump here manually after each release
    # (or accept lag if you intentionally want to canary).
    image: ghcr.io/mctlhq/kuptsi-app:0.2.16
    imagePullPolicy: IfNotPresent
    command: ["python", "-m", "src.temporal.worker"]
    env:
      - name: TEMPORAL_ADDRESS
        value: temporal-frontend.temporal.svc.cluster.local:7233
      - name: TEMPORAL_NAMESPACE
        value: kuptsi
      - name: LOG_LEVEL
        value: info
      - name: MAX_ACTIVITY_WORKERS
        value: "20"
      - name: DATABASE_URL
        value: "postgresql+asyncpg://$(DB_USER):$(DB_PASSWORD)@shared-pg-rw.platform-db.svc.cluster.local:5432/labs-kuptsi-app"
    envFrom:
      # Same DB creds as the main container — base-service standardises the
      # secret name on `<release>-db-creds`.
      - secretRef:
          name: labs-kuptsi-app-base-service-db-creds
      # User-managed runtime secrets (Telegram/Logfire/Yandex) added later via
      # Backstage UI → mctl-api update-config will land in this secret.
      - secretRef:
          name: kuptsi-app-secrets
          optional: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    livenessProbe:
      exec:
        command: ["sh", "-c", "kill -0 1"]
      initialDelaySeconds: 30
      periodSeconds: 30
ingress:
  enabled: true
  hosts:
    - labs-kuptsi-app.mctl.ai
    - labs-kuptsi-app.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: kuptsi-app-tls
      hosts:
        - labs-kuptsi-app.mctl.ai
        - labs-kuptsi-app.mctl.me
externalSecret:
  targetSecret: kuptsi-app-secrets
  # ESO templating renders the asyncpg-scheme DATABASE_URL into the
  # synced Secret using DB_USER + DB_PASSWORD pulled from the same
  # Vault path that backs `dbSecret:` above. The base-service chart
  # wires this through `target.template.data` with `mergePolicy: Merge`,
  # so the rest of the data list still appears in the Secret as-is.
  # Auto-rotates with the DB password — no separate Vault key to
  # maintain alongside teams/labs/kuptsi-app/database.
  targetTemplateData:
    DATABASE_URL: "postgresql+asyncpg://{{ .DB_USER }}:{{ .DB_PASSWORD }}@shared-pg-rw.platform-db.svc.cluster.local:5432/labs-kuptsi-app"
  data:
    - secretKey: DB_USER
      remoteKey: teams/labs/kuptsi-app/database
      property: username
    - secretKey: DB_PASSWORD
      remoteKey: teams/labs/kuptsi-app/database
      property: password
    - secretKey: LOGFIRE_READ_TOKEN
      remoteKey: teams/labs/kuptsi-app
      property: LOGFIRE_READ_TOKEN
    - secretKey: LOGFIRE_TOKEN
      remoteKey: teams/labs/kuptsi-app
      property: LOGFIRE_TOKEN
    - secretKey: TELEGRAM_TOKEN
      remoteKey: teams/labs/kuptsi-app
      property: TELEGRAM_TOKEN
    - secretKey: YANDEX_DISK_TOKEN
      remoteKey: teams/labs/kuptsi-app
      property: YANDEX_DISK_TOKEN
    - secretKey: CHAT_ID
      remoteKey: teams/labs/kuptsi-app
      property: CHAT_ID
