apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: trading-data
  namespace: labs
  description: "Bybit + Bitget WS taker aggregation + CryptoPanic + Etherscan MCP service for labs-openclaw"
  annotations:
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=labs-trading-data
    backstage.io/kubernetes-id: trading-data
    backstage.io/kubernetes-namespace: labs
    argocd/app-name: labs-trading-data
    github.com/source-repo: mctlhq/mctl-trading-data
    # Auto-deploy disabled — image bumps land via manual mctl_deploy_service
    # so the operator can stage Vault changes for new tools alongside.
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.ai/applications/argocd/labs-trading-data
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/mctlhq/mctl-trading-data
      title: Source Repository
      icon: github
  labels:
    team: labs
    env: apps
spec:
  type: service
  lifecycle: production
  owner: group:default/labs
  system: system:default/team-labs
