# Service: pfeifenpatenschaft-backend
# Team: labs

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/pfeifenpatenschaft-backend
  tag: "0.5.2"
imagePullSecrets:
  - name: ghcr-credentials
# Force a pod rollout when the admin secret keys are added below. envFrom
# secretRef does not restart running pods when the Secret gains keys (no
# reloader), so without this the live pod keeps booting without ADMIN_* and
# /admin stays 404. Bump this date on any future secret-only change. (Codex P2.)
podAnnotations:
  rollout/admin-secrets: "2026-06-29"
service:
  port: 8080
backstage:
  kubernetesId: pfeifenpatenschaft-backend
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
  NODE_ENV: production
  RESERVATION_TTL_MINUTES: "15"
  SWEEPER_INTERVAL_SECONDS: "60"
  EMAIL_PROVIDER: console
  CHURCH_NOTIFICATION_RECIPIENTS: ""
envFrom:
  - secretRef:
      name: labs-pfeifenpatenschaft-backend-db-creds
  # TWINGLE_WEBHOOK_SECRET — synced from Vault by the externalSecret block below.
  - secretRef:
      name: pfeifenpatenschaft-backend-secrets
dbSecret:
  vaultPath: teams/labs/pfeifenpatenschaft-backend/database
  secretName: labs-pfeifenpatenschaft-backend-db-creds
probes:
  liveness:
    path: /health
    port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 5
  readiness:
    path: /health
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
ingress:
  enabled: true
  hosts:
    # Short primary host. The longer labs-* hosts stay as working aliases so
    # existing links/bookmarks keep working.
    - orgel.mctl.ai
    - labs-pfeifenpatenschaft-backend.mctl.ai
    - labs-pfeifenpatenschaft-backend.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: pfeifenpatenschaft-backend-tls
      hosts:
        - orgel.mctl.ai
        - labs-pfeifenpatenschaft-backend.mctl.ai
        - labs-pfeifenpatenschaft-backend.mctl.me
externalSecret:
  targetSecret: pfeifenpatenschaft-backend-secrets
  data:
    - secretKey: TWINGLE_WEBHOOK_SECRET
      remoteKey: teams/labs/pfeifenpatenschaft-backend
      property: TWINGLE_WEBHOOK_SECRET
    # Admin web panel (/admin) login. The browser panel needs both of these;
    # generate the hash with `npm run admin:hash -- '<password>'`.
    # NOTE: write these properties into Vault (teams/labs/pfeifenpatenschaft-backend)
    # BEFORE merging — a missing property fails the ExternalSecret sync.
    - secretKey: ADMIN_PASSWORD_HASH
      remoteKey: teams/labs/pfeifenpatenschaft-backend
      property: ADMIN_PASSWORD_HASH
    - secretKey: ADMIN_SESSION_SECRET
      remoteKey: teams/labs/pfeifenpatenschaft-backend
      property: ADMIN_SESSION_SECRET
