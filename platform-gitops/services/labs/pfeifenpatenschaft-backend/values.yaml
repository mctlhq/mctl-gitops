# Service: pfeifenpatenschaft-backend
# Team: labs

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/pfeifenpatenschaft-backend
  tag: "0.7.0"
imagePullSecrets:
  - name: ghcr-credentials
# Force a pod rollout when the admin secret keys are added below. envFrom
# secretRef does not restart running pods when the Secret gains keys (no
# reloader), so without this the live pod keeps booting without ADMIN_* and
# /admin stays 404. Bump this date on any future secret-only change. (Codex P2.)
# 2026-06-30: added PII_ENCRYPTION_KEY (0.6.0 PII-at-rest); bump forces the pod
# to pick up the new key from the Secret.
podAnnotations:
  rollout/admin-secrets: "2026-06-30"
service:
  port: 8080
backstage:
  kubernetesId: pfeifenpatenschaft-backend
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
  NODE_ENV: production
  RESERVATION_TTL_MINUTES: "15"
  SWEEPER_INTERVAL_SECONDS: "60"
  # Church notification email (0.7.0). Currently console-only: notifications are
  # logged (presence-only, no donor PII), NOT sent. To enable real delivery, set
  # EMAIL_PROVIDER: smtp + SMTP_HOST/SMTP_PORT/SMTP_FROM here and add SMTP_USER /
  # SMTP_PASSWORD via Vault+externalSecret (never plaintext in this file).
  EMAIL_PROVIDER: console
  CHURCH_NOTIFICATION_RECIPIENTS: ""
  # Data retention / Löschkonzept (0.7.0). DISABLED by default and listed
  # explicitly so the knobs aren't forgotten — NOTHING is deleted while
  # RETENTION_ENABLED is "false". Before enabling: agree the windows (days; 0 =
  # never) with the parish, then flip RETENTION_ENABLED to "true".
  RETENTION_ENABLED: "false"
  RETENTION_SWEEP_INTERVAL_SECONDS: "86400"
  RETENTION_UNPAID_DELETE_DAYS: "7"
  RETENTION_PAID_ANONYMIZE_DAYS: "0"
  RETENTION_TWINGLE_EVENTS_DELETE_DAYS: "0"
envFrom:
  - secretRef:
      name: labs-pfeifenpatenschaft-backend-db-creds
  # TWINGLE_WEBHOOK_SECRET — synced from Vault by the externalSecret block below.
  - secretRef:
      name: pfeifenpatenschaft-backend-secrets
dbSecret:
  vaultPath: teams/labs/pfeifenpatenschaft-backend/database
  secretName: labs-pfeifenpatenschaft-backend-db-creds
probes:
  liveness:
    path: /health
    port: http
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 5
  readiness:
    path: /health
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
ingress:
  enabled: true
  hosts:
    # Short primary host. The longer labs-* hosts stay as working aliases so
    # existing links/bookmarks keep working.
    - orgel.mctl.ai
    - labs-pfeifenpatenschaft-backend.mctl.ai
    - labs-pfeifenpatenschaft-backend.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: pfeifenpatenschaft-backend-tls
      hosts:
        - orgel.mctl.ai
        - labs-pfeifenpatenschaft-backend.mctl.ai
        - labs-pfeifenpatenschaft-backend.mctl.me
externalSecret:
  targetSecret: pfeifenpatenschaft-backend-secrets
  data:
    - secretKey: TWINGLE_WEBHOOK_SECRET
      remoteKey: teams/labs/pfeifenpatenschaft-backend
      property: TWINGLE_WEBHOOK_SECRET
    # Admin web panel (/admin) login. The browser panel needs both of these;
    # generate the hash with `npm run admin:hash -- '<password>'`.
    # NOTE: write these properties into Vault (teams/labs/pfeifenpatenschaft-backend)
    # BEFORE merging — a missing property fails the ExternalSecret sync.
    - secretKey: ADMIN_PASSWORD_HASH
      remoteKey: teams/labs/pfeifenpatenschaft-backend
      property: ADMIN_PASSWORD_HASH
    - secretKey: ADMIN_SESSION_SECRET
      remoteKey: teams/labs/pfeifenpatenschaft-backend
      property: ADMIN_SESSION_SECRET
    # PII encryption at rest (0.6.0). base64-encoded 256-bit key; the app refuses
    # to start if set-but-malformed, and stores donor PII as plaintext if absent.
    # Already written to Vault (teams/labs/pfeifenpatenschaft-backend) before this
    # merge, so the ExternalSecret sync finds the property.
    - secretKey: PII_ENCRYPTION_KEY
      remoteKey: teams/labs/pfeifenpatenschaft-backend
      property: PII_ENCRYPTION_KEY
