# Service: mctl-pairdesk
# Team: labs

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/mctl-pairdesk
  tag: "0.1.0"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8080
backstage:
  kubernetesId: mctl-pairdesk
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
  MINI_APP_URL: https://labs-mctl-pairdesk.mctl.ai/app
  TELEGRAM_WEBHOOK_URL: https://labs-mctl-pairdesk.mctl.ai/telegram/webhook
  SUPER_ADMIN_TELEGRAM_IDS: "210408407"
ingress:
  enabled: true
  hosts:
    - labs-mctl-pairdesk.mctl.ai
    - labs-mctl-pairdesk.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: mctl-pairdesk-tls
      hosts:
        - labs-mctl-pairdesk.mctl.ai
        - labs-mctl-pairdesk.mctl.me
envFrom:
  - secretRef:
      name: labs-mctl-pairdesk-db-creds
dbSecret:
  vaultPath: teams/labs/mctl-pairdesk/database
  secretName: labs-mctl-pairdesk-db-creds
externalSecret:
  targetSecret: mctl-pairdesk-secrets
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteKey: teams/labs/mctl-pairdesk
      property: TELEGRAM_BOT_TOKEN
    - secretKey: TELEGRAM_WEBHOOK_SECRET
      remoteKey: teams/labs/mctl-pairdesk
      property: TELEGRAM_WEBHOOK_SECRET
