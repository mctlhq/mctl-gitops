# Service: mctl-telegram
# Team: labs

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/mctl-telegram
  tag: "0.2.0"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8080
backstage:
  kubernetesId: mctl-telegram
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
  AUTH_MODE: local-dev
  AUTH_REQUIRED: "false"
  OPERATOR_GITHUB_LOGIN: mashkovd
  ALLOW_SEND: "false"
  LOG_LEVEL: info
  DATABASE_URL: file:/tmp/mctl-telegram.db?_pragma=journal_mode(WAL)&_pragma=busy_timeout(5000)
ingress:
  enabled: true
  hosts:
    - labs-mctl-telegram.mctl.ai
    - labs-mctl-telegram.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: mctl-telegram-tls
      hosts:
        - labs-mctl-telegram.mctl.ai
        - labs-mctl-telegram.mctl.me
extraContainers: []
