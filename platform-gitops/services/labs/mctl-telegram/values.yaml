# Service: mctl-telegram
# Team: labs

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/mctl-telegram
  tag: "0.41.9"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8080
backstage:
  kubernetesId: mctl-telegram
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    # Raised 500m -> 1000m (2026-05-25): the in-browser login does a full MTProto
    # handshake (DH key exchange + SendCode) which is CPU-heavy and was a suspect
    # in the post-oidc_callback SendCode stalls. Headroom reduces the chance of
    # CPU throttling stretching that round-trip past the timeout. Within the labs
    # LimitRange max (3) and ResourceQuota limits.cpu (12), so no tenant-quota
    # change is needed.
    cpu: 1000m
    memory: 512Mi
env:
  APP_ENV: production
  AUTH_MODE: local-jwt
  AUTH_REQUIRED: "true"
  ALLOW_SEND: "true"
  LOG_LEVEL: info
  PUBLIC_BASE_URL: https://tg.mctl.ai
  OAUTH_ISSUER_URL: https://tg.mctl.ai
  # Origin-header allowlist for /mcp (OriginGuard, DNS-rebinding protection,
  # active from 0.41.0). Requests with no Origin pass (server-to-server MCP
  # clients send none); a present browser Origin MUST be on this list or it is
  # rejected with 403. When ALLOWED_ORIGINS is unset the server defaults to the
  # PUBLIC_BASE_URL origin only, which would 403 chatgpt.com / claude.ai — so
  # they are listed explicitly. 0.40.0 has no OriginGuard and ignores this key,
  # so landing it ahead of the 0.41.0 deploy is safe. NOTE: the values carry
  # "https://" (colons); if mctl_deploy_service ever rewrites this file, verify
  # the key survived the yq round-trip (it is known to strip colon-bearing env
  # vars) and hand-edit to restore if dropped.
  ALLOWED_ORIGINS: https://tg.mctl.ai,https://chatgpt.com,https://chat.openai.com,https://claude.ai
  # Raised from the 10m default: the in-browser enable_access flow (phone -> SMS
  # -> 2FA) is bounded by this same TTL (lookupEnable), and 10m is too tight for
  # a human to receive and enter the SMS code -> "sign-in session has expired".
  OAUTH_CODE_TTL: "30m"
  # Walkthrough video embedded on /demo (ChatGPT App Directory review).
  # ?v=1 is a cache-buster: Cloudflare cached a 404 for the bare .mp4 path
  # before the serving route shipped (0.37.0); a fresh query key avoids the
  # stale 404. Bump the number if the video is ever replaced.
  DEMO_VIDEO_URL: https://tg.mctl.ai/demo/walkthrough.mp4?v=6
  # Telegram OpenID Connect client id = the @MCTL_AI_bot numeric id (the part
  # of the bot token before the colon). Not a secret. The matching
  # TELEGRAM_OIDC_CLIENT_SECRET is sourced from Vault via the oauth
  # ExternalSecret below.
  TELEGRAM_OIDC_CLIENT_ID: "8568443430"
  # CSV of Telegram user IDs that receive full scopes (admin allowlist).
  # 210408407 = operator (@MashkovD) ONLY. The demo/reviewer account 8745115872
  # (@mctlhq) is intentionally NON-admin (client tier): App-Directory reviewers
  # exercise the 9 user-facing tools and should observe the 5 admin tools return
  # a clean scope-denied (admin:users) — that is the correct permission boundary.
  # Admin-tool success is demonstrated separately with operator credentials.
  # (Reverts the temporary reviewer-admin grant; submission docs reframed to match.)
  TG_LOGIN_ADMINS: "210408407"
  # Open registration: every Telegram-authenticated user auto-gets the client
  # tier. Ban a specific user with the set_telegram_access MCP tool.
  AUTO_APPROVE_CLIENTS: "true"
  # Reviewer/demo auth-mode for the ChatGPT App Directory review. When enabled,
  # /oauth/authorize shows a password-gated "reviewer access" form that signs in
  # as the demo Telegram account below WITHOUT the live Telegram OIDC login (no
  # phone/SMS). DEMO_REVIEWER_USERNAME/PASSWORD come from Vault via the
  # labs-mctl-telegram-demo ExternalSecret. Turn OFF and rotate the password
  # after the review. The demo account's per-account send_enabled must be false
  # so sends stay dry-run previews even though ALLOW_SEND is true globally.
  DEMO_REVIEWER_ENABLED: "true"
  DEMO_REVIEWER_TG_ID: "8745115872"
ingress:
  enabled: true
  hosts:
    - tg.mctl.ai
    - labs-mctl-telegram.mctl.ai
    - labs-mctl-telegram.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: mctl-telegram-tls
      hosts:
        - tg.mctl.ai
        - labs-mctl-telegram.mctl.ai
        - labs-mctl-telegram.mctl.me
extraContainers: []
dbSecret:
  vaultPath: "teams/labs/mctl-telegram/database"
  secretName: "labs-mctl-telegram-db-creds"
dbInitJob:
  enabled: false
  database: "labs-mctl-telegram"
  waitTable: "identities"
  sql: |
    INSERT INTO identities (provider, provider_id, status, metadata)
    VALUES ('telegram', '__TELEGRAM_ID__', 'approved', '{}')
    ON CONFLICT (provider, provider_id) DO UPDATE SET status = 'approved';
envFrom:
  - secretRef:
      name: "labs-mctl-telegram-db-creds"
  - secretRef:
      name: "labs-mctl-telegram-tg-api"
  - secretRef:
      name: "labs-mctl-telegram-encryption"
  - secretRef:
      name: "labs-mctl-telegram-oauth"
  - secretRef:
      name: "labs-mctl-telegram-login"
  - secretRef:
      name: "labs-mctl-telegram-demo"
extraExternalSecrets:
  labs-mctl-telegram-tg-api:
    refreshInterval: 1h
    targetSecret: labs-mctl-telegram-tg-api
    data:
      - secretKey: TG_API_ID
        remoteKey: secret/data/platform/mctl-telegram/api
        property: TG_API_ID
      - secretKey: TG_API_HASH
        remoteKey: secret/data/platform/mctl-telegram/api
        property: TG_API_HASH
  labs-mctl-telegram-encryption:
    refreshInterval: 1h
    targetSecret: labs-mctl-telegram-encryption
    data:
      - secretKey: ENCRYPTION_KEY
        remoteKey: secret/data/platform/mctl-telegram/encryption
        property: ENCRYPTION_KEY
  labs-mctl-telegram-oauth:
    refreshInterval: 1h
    targetSecret: labs-mctl-telegram-oauth
    # Force ArgoCD client-side apply for this ExternalSecret. ArgoCD v3.3.8 with
    # ServerSideApply + serverSideDiff fails to apply ExternalSecrets with
    # "metadata.managedFields must be nil"; client-side apply bypasses that path.
    # Remove once the platform-wide ArgoCD SSA bug is fixed (see tracking issue).
    annotations:
      argocd.argoproj.io/sync-options: ServerSideApply=false
    data:
      # Dedicated mctl-telegram JWT signing key. Previously OAUTH_JWT_SECRET was
      # sourced from mctl-api's shared secret (secret/data/platform/mctl-api/oauth),
      # so an mctl-api rotation silently invalidated every mctl-telegram token.
      # The service now reads OAUTH_JWT_SIGNING_KEY from its own Vault path.
      - secretKey: OAUTH_JWT_SIGNING_KEY
        remoteKey: secret/data/platform/mctl-telegram/oauth
        property: jwt-signing-key
      # Telegram OIDC client secret (BotFather → Login Widget → OpenID Connect).
      # Distinct from the bot API token; mctl-telegram presents it as an OIDC
      # Relying Party at Telegram's token endpoint.
      - secretKey: TELEGRAM_OIDC_CLIENT_SECRET
        remoteKey: secret/data/platform/mctl-telegram/oauth
        property: oidc-client-secret
  labs-mctl-telegram-login:
    refreshInterval: 1h
    targetSecret: labs-mctl-telegram-login
    data:
      - secretKey: TELEGRAM_LOGIN_BOT_TOKEN
        remoteKey: secret/data/platform/mctl-telegram/login
        property: TELEGRAM_LOGIN_BOT_TOKEN
  # Reviewer/demo auth-mode credentials (ChatGPT App Directory review). Seed the
  # Vault path secret/data/platform/mctl-telegram/demo with DEMO_REVIEWER_USERNAME
  # and DEMO_REVIEWER_PASSWORD before enabling DEMO_REVIEWER_ENABLED. Remove this
  # block (and the env flags) after the review, then delete the Vault secret.
  labs-mctl-telegram-demo:
    refreshInterval: 1h
    targetSecret: labs-mctl-telegram-demo
    data:
      - secretKey: DEMO_REVIEWER_USERNAME
        remoteKey: secret/data/platform/mctl-telegram/demo
        property: DEMO_REVIEWER_USERNAME
      - secretKey: DEMO_REVIEWER_PASSWORD
        remoteKey: secret/data/platform/mctl-telegram/demo
        property: DEMO_REVIEWER_PASSWORD
  # Telegram alert bot for the demo-reviewer-watch CronJob. Reuses the
  # @MCTL_AI_bot token mctl-agent already uses to DM the operator (chat
  # 210408407), read via the shared vault-backend ClusterSecretStore.
  labs-mctl-telegram-alert-bot:
    refreshInterval: 1h
    targetSecret: labs-mctl-telegram-alert-bot
    data:
      - secretKey: TELEGRAM_BOT_TOKEN
        remoteKey: secret/data/platform/mctl-agent/tokens
        property: telegram-bot-token
# TEMPORARY workaround (ChatGPT App Directory review window). The demo/reviewer
# Telegram session row is subject to the normal session TTLs (absolute 90d, idle
# 30d) and to revoke-on-disconnect. If the row expires or is revoked, the reviewer
# login dead-ends with "Sign-in interrupted: no active Telegram session" (the
# CheckSessionValid -> ErrNoActiveSession path). This CronJob keeps the newest
# demo session row perpetually fresh (un-revoke + push expires_at/last_used_at out
# 90d, force send_enabled=false) so reviewers always find a usable session.
# It does NOT re-login Telegram-side; if the MTProto session is signed out at
# Telegram, a manual `mctl-telegram-login` re-seed is still required.
# REMOVE this block (with DEMO_REVIEWER_ENABLED) once the durable fix ships
# post-freeze: make the DEMO_REVIEWER_TG_ID identity immune to TTL sweeps /
# CheckSessionValid expiry, mirroring the evaluateSendGate reviewer override.
extraObjects:
  # renderIf (base-service extra-objects.yaml): the CronJob is emitted ONLY
  # when this template renders to exactly the string "true". Tied to
  # DEMO_REVIEWER_ENABLED so the refresh job exists only while reviewer mode is
  # on; turning the flag off removes it from the manifest and ArgoCD prunes it.
  - renderIf: '{{ eq (.Values.env.DEMO_REVIEWER_ENABLED | toString) "true" }}'
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: labs-mctl-telegram-demo-session-refresh
      labels:
        app.kubernetes.io/name: mctl-telegram
        app.kubernetes.io/part-of: mctl-platform
        mctl.me/component: demo-session-refresh
    spec:
      # Daily at 03:17 UTC (off-peak). Margin is huge vs the 30d idle / 90d
      # absolute TTLs; daily simply guarantees the session is never more than a
      # day from a refresh during the review window.
      schedule: "17 3 * * *"
      concurrencyPolicy: Forbid
      startingDeadlineSeconds: 300
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 3
      jobTemplate:
        spec:
          backoffLimit: 2
          activeDeadlineSeconds: 120
          template:
            metadata:
              labels:
                app.kubernetes.io/name: mctl-telegram
                mctl.me/component: demo-session-refresh
            spec:
              restartPolicy: OnFailure
              # No imagePullSecrets: postgres:17-alpine is a public Docker Hub
              # image (unlike the chart's dbInitJob, which can run GHCR app images).
              containers:
                - name: refresh
                  image: postgres:17-alpine
                  command: ["sh", "-c"]
                  args:
                    # The UPDATE only un-revokes/extends an EXISTING session row; it
                    # cannot recreate a session that was hard-deleted (e.g. a reviewer
                    # delete_telegram_account call) or never completed login. Capture
                    # the affected row id with RETURNING and fail loudly when none
                    # matched, so a missing reviewer session surfaces as a failed Job
                    # in ArgoCD/k8s status instead of a silent "UPDATE 0". On failure
                    # the operator must re-run mctl-telegram-login on @mctlhq.
                    - |
                      set -e
                      echo "Refreshing demo reviewer session (tg 8745115872)..."
                      DEMO_UID=$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tA -c "SELECT id FROM users WHERE telegram_login_id = '8745115872';")
                      if [ -z "$DEMO_UID" ]; then
                        echo "ERROR: demo reviewer user (telegram_login_id 8745115872) not found in users table." >&2
                        exit 1
                      fi
                      REFRESHED=$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -tA -c "WITH target AS (SELECT id FROM telegram_accounts WHERE user_id = $DEMO_UID AND telegram_user_id IS NOT NULL ORDER BY connected_at DESC LIMIT 1) UPDATE telegram_accounts t SET revoked_at = NULL, last_used_at = now(), expires_at = now() + interval '90 days', send_enabled = false FROM target WHERE t.id = target.id RETURNING t.id;")
                      if [ -z "$REFRESHED" ]; then
                        echo "ERROR: no demo reviewer session row with a real telegram_user_id exists for user $DEMO_UID." >&2
                        echo "The reviewer MTProto session was deleted or never completed login. Recover by re-running mctl-telegram-login on @mctlhq (OPERATOR_GITHUB_LOGIN=tg:8745115872)." >&2
                        exit 1
                      fi
                      echo "Refreshed demo reviewer session row id $REFRESHED."
                      psql "$DATABASE_URL" -c "SELECT id, revoked_at, expires_at, last_used_at, send_enabled FROM telegram_accounts WHERE user_id = $DEMO_UID AND revoked_at IS NULL ORDER BY connected_at DESC LIMIT 1;"
                      echo "Demo session refresh complete."
                  env:
                    - name: DATABASE_URL
                      valueFrom:
                        secretKeyRef:
                          name: labs-mctl-telegram-db-creds
                          key: DATABASE_URL
  # Twice-daily reviewer watch: reads session health + 12h tool-call activity
  # from audit_logs and pushes to the operator on Telegram (@MCTL_AI_bot ->
  # chat 210408407). Loud ping on outage (0 active sessions), FYI on reviewer
  # activity, silent when healthy + idle. Read-only against the DB.
  - renderIf: '{{ eq (.Values.env.DEMO_REVIEWER_ENABLED | toString) "true" }}'
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: labs-mctl-telegram-demo-reviewer-watch
      labels:
        app.kubernetes.io/name: mctl-telegram
        app.kubernetes.io/part-of: mctl-platform
        mctl.me/component: demo-reviewer-watch
    spec:
      schedule: "0 6,18 * * *"
      concurrencyPolicy: Forbid
      startingDeadlineSeconds: 300
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 3
      jobTemplate:
        spec:
          backoffLimit: 1
          activeDeadlineSeconds: 120
          template:
            metadata:
              labels:
                app.kubernetes.io/name: mctl-telegram
                mctl.me/component: demo-reviewer-watch
            spec:
              restartPolicy: OnFailure
              containers:
                - name: watch
                  image: postgres:17-alpine
                  resources:
                    requests:
                      cpu: 25m
                      memory: 32Mi
                    limits:
                      cpu: 200m
                      memory: 128Mi
                  command: ["sh", "-c"]
                  args:
                    - "set -eu\napk add --no-cache curl >/dev/null 2>&1 || true\ncommand -v curl >/dev/null || { echo \"ERROR: curl unavailable, cannot send alerts\" >&2; exit 1; }\nq() { psql \"$DATABASE_URL\" -v ON_ERROR_STOP=1 -tA -c \"$1\"; }\nsend() {\n  curl -fsS -X POST \"https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage\" \\\n    --data-urlencode \"chat_id=${TELEGRAM_CHAT_ID}\" \\\n    --data-urlencode \"disable_web_page_preview=true\" \\\n    --data-urlencode \"text=$1\" >/dev/null 2>&1 || echo \"WARN: telegram send failed\" >&2\n}\nDEMO_UID=$(q \"SELECT id FROM users WHERE telegram_login_id='8745115872';\") || { echo \"ERROR: DB unreachable\" >&2; exit 1; }\nif [ -z \"$DEMO_UID\" ]; then\n  send \"\U0001F534 mctl-telegram demo reviewer @mashkovd — demo user (telegram_login_id 8745115872) is MISSING from the DB. Reviewer login is broken.\"\n  echo \"ALERT: demo user missing\"; exit 0\nfi\nACTIVE=$(q \"SELECT count(*) FROM telegram_accounts WHERE user_id=$DEMO_UID AND revoked_at IS NULL;\") || { echo \"ERROR: query failed (active)\" >&2; exit 1; }\nCALLS=$(q \"SELECT count(*) FROM audit_logs WHERE user_id=$DEMO_UID AND created_at > now() - interval '12 hours';\") || { echo \"ERROR: query failed (calls)\" >&2; exit 1; }\nERRORS=$(q \"SELECT count(*) FROM audit_logs WHERE user_id=$DEMO_UID AND status='error' AND created_at > now() - interval '12 hours';\") || { echo \"ERROR: query failed (errors)\" >&2; exit 1; }\nLATEST=$(q \"SELECT tool_name||' '||status||' @ '||to_char(created_at,'MM-DD HH24:MI') FROM audit_logs WHERE user_id=$DEMO_UID ORDER BY id DESC LIMIT 1;\") || { echo \"ERROR: query failed (latest)\" >&2; exit 1; }\necho \"active=$ACTIVE calls_12h=$CALLS errors_12h=$ERRORS latest=${LATEST:-none}\"\nif [ \"${ACTIVE:-0}\" -eq 0 ]; then\n  send \"\U0001F534 mctl-telegram demo reviewer session DOWN @mashkovd — 0 active sessions for reviewer 8745115872; the ChatGPT reviewer will hit Sign-in interrupted. Recover: in-pod mctl-telegram-login on @mctlhq (OPERATOR_GITHUB_LOGIN=tg:8745115872, --qr).\"\n  echo \"ALERT: session down\"\nelif [ \"${CALLS:-0}\" -gt 0 ]; then\n  send \"\U0001F440 mctl-telegram reviewer activity (12h): ${CALLS} calls, ${ERRORS} errors. Latest: ${LATEST}. Session healthy (${ACTIVE} active).\"\n  echo \"INFO: reviewer activity\"\nelse\n  echo \"quiet: session healthy, no reviewer activity in 12h — no Telegram sent\"\nfi\n"
                  env:
                    - name: DATABASE_URL
                      valueFrom:
                        secretKeyRef:
                          name: labs-mctl-telegram-db-creds
                          key: DATABASE_URL
                    - name: TELEGRAM_BOT_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: labs-mctl-telegram-alert-bot
                          key: TELEGRAM_BOT_TOKEN
                    - name: TELEGRAM_CHAT_ID
                      value: "210408407"
  # Synthetic end-to-end canary. Every 10 minutes a black-box probe (the
  # mctl-telegram-canary binary baked into the service image) exercises the
  # public OAuth metadata endpoint plus the list_dialogs / get_unread_messages
  # MCP tools against the live service, then pushes mctl_telegram_canary_*
  # metrics to the cluster Pushgateway. Alerting lives in the
  # mctl-telegram-canary VMRule (vm-rules/mctl-telegram-canary.yaml).
  #
  # Cadence is */10 — NOT the original */2. The every-2-min variant was once
  # suspended (deploy/canary/cronjob.yaml suspend:true) over suspicion that its
  # MTProto list_dialogs calls, sharing the server's Telegram egress IP,
  # contributed to new-login SendCode throttling. That hang was fixed in
  # 0.38.1/0.38.2 (PR #217), but */10 keeps egress load light while the ChatGPT
  # App Directory review is in flight. Read-only token (tg:210408407), no send
  # scope.
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: labs-mctl-telegram-canary
      labels:
        app.kubernetes.io/name: mctl-telegram
        app.kubernetes.io/part-of: mctl-platform
        mctl.me/component: canary
    spec:
      schedule: "*/10 * * * *"
      concurrencyPolicy: Forbid
      startingDeadlineSeconds: 120
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 5
      jobTemplate:
        spec:
          backoffLimit: 1
          activeDeadlineSeconds: 120
          template:
            metadata:
              labels:
                app.kubernetes.io/name: mctl-telegram
                mctl.me/component: canary
            spec:
              imagePullSecrets:
                - name: ghcr-credentials
              restartPolicy: Never
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
              containers:
                - name: canary
                  # Same image as the deployed service so the probe always
                  # matches the running version (fixes issue-202's stale
                  # hardcoded tag).
                  image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                  command: ["/usr/local/bin/mctl-telegram-canary"]
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    capabilities:
                      drop: ["ALL"]
                  env:
                    - name: CANARY_BASE_URL
                      value: "https://tg.mctl.ai"
                    - name: CANARY_TG_USER_ID
                      valueFrom:
                        secretKeyRef:
                          name: mctl-telegram-canary
                          key: tg_user_id
                    - name: CANARY_BEARER_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: mctl-telegram-canary
                          key: bearer_token
                    - name: CANARY_PROBE_UNREAD
                      value: "true"
                    - name: PUSHGATEWAY_URL
                      value: "http://prometheus-pushgateway.monitoring.svc.cluster.local:9091"
                  resources:
                    requests:
                      cpu: "10m"
                      memory: "32Mi"
                    limits:
                      cpu: "100m"
                      memory: "64Mi"
