# Service: mctl-telegram
# Team: labs

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/mctl-telegram
  tag: "0.28.0"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8080
backstage:
  kubernetesId: mctl-telegram
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
  AUTH_MODE: local-jwt
  AUTH_REQUIRED: "true"
  ALLOW_SEND: "true"
  LOG_LEVEL: info
  PUBLIC_BASE_URL: https://tg.mctl.ai
  OAUTH_ISSUER_URL: https://tg.mctl.ai
  # Telegram OpenID Connect client id = the @MCTL_AI_bot numeric id (the part
  # of the bot token before the colon). Not a secret. The matching
  # TELEGRAM_OIDC_CLIENT_SECRET is sourced from Vault via the oauth
  # ExternalSecret below.
  TELEGRAM_OIDC_CLIENT_ID: "8568443430"
  # CSV of Telegram user IDs that receive full scopes (admin allowlist)
  TG_LOGIN_ADMINS: "210408407"
  # Open registration: every Telegram-authenticated user auto-gets the client
  # tier. Ban a specific user with the set_telegram_access MCP tool.
  AUTO_APPROVE_CLIENTS: "true"
ingress:
  enabled: true
  hosts:
    - tg.mctl.ai
    - labs-mctl-telegram.mctl.ai
    - labs-mctl-telegram.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: mctl-telegram-tls
      hosts:
        - tg.mctl.ai
        - labs-mctl-telegram.mctl.ai
        - labs-mctl-telegram.mctl.me
extraContainers: []
dbSecret:
  vaultPath: "teams/labs/mctl-telegram/database"
  secretName: "labs-mctl-telegram-db-creds"
dbInitJob:
  enabled: false
  database: "labs-mctl-telegram"
  waitTable: "identities"
  sql: |
    INSERT INTO identities (provider, provider_id, status, metadata)
    VALUES ('telegram', '__TELEGRAM_ID__', 'approved', '{}')
    ON CONFLICT (provider, provider_id) DO UPDATE SET status = 'approved';
envFrom:
  - secretRef:
      name: "labs-mctl-telegram-db-creds"
  - secretRef:
      name: "labs-mctl-telegram-tg-api"
  - secretRef:
      name: "labs-mctl-telegram-encryption"
  - secretRef:
      name: "labs-mctl-telegram-oauth"
  - secretRef:
      name: "labs-mctl-telegram-login"
extraExternalSecrets:
  labs-mctl-telegram-tg-api:
    refreshInterval: 1h
    targetSecret: labs-mctl-telegram-tg-api
    data:
      - secretKey: TG_API_ID
        remoteKey: secret/data/platform/mctl-telegram/api
        property: TG_API_ID
      - secretKey: TG_API_HASH
        remoteKey: secret/data/platform/mctl-telegram/api
        property: TG_API_HASH
  labs-mctl-telegram-encryption:
    refreshInterval: 1h
    targetSecret: labs-mctl-telegram-encryption
    data:
      - secretKey: ENCRYPTION_KEY
        remoteKey: secret/data/platform/mctl-telegram/encryption
        property: ENCRYPTION_KEY
  labs-mctl-telegram-oauth:
    refreshInterval: 1h
    targetSecret: labs-mctl-telegram-oauth
    # Force ArgoCD client-side apply for this ExternalSecret. ArgoCD v3.3.8 with
    # ServerSideApply + serverSideDiff fails to apply ExternalSecrets with
    # "metadata.managedFields must be nil"; client-side apply bypasses that path.
    # Remove once the platform-wide ArgoCD SSA bug is fixed (see tracking issue).
    annotations:
      argocd.argoproj.io/sync-options: ServerSideApply=false
    data:
      # Dedicated mctl-telegram JWT signing key. Previously OAUTH_JWT_SECRET was
      # sourced from mctl-api's shared secret (secret/data/platform/mctl-api/oauth),
      # so an mctl-api rotation silently invalidated every mctl-telegram token.
      # The service now reads OAUTH_JWT_SIGNING_KEY from its own Vault path.
      - secretKey: OAUTH_JWT_SIGNING_KEY
        remoteKey: secret/data/platform/mctl-telegram/oauth
        property: jwt-signing-key
      # Telegram OIDC client secret (BotFather → Login Widget → OpenID Connect).
      # Distinct from the bot API token; mctl-telegram presents it as an OIDC
      # Relying Party at Telegram's token endpoint.
      - secretKey: TELEGRAM_OIDC_CLIENT_SECRET
        remoteKey: secret/data/platform/mctl-telegram/oauth
        property: oidc-client-secret
  labs-mctl-telegram-login:
    refreshInterval: 1h
    targetSecret: labs-mctl-telegram-login
    data:
      - secretKey: TELEGRAM_LOGIN_BOT_TOKEN
        remoteKey: secret/data/platform/mctl-telegram/login
        property: TELEGRAM_LOGIN_BOT_TOKEN
