image:
  repository: ghcr.io/mctlhq/mctl-claude-remote
  tag: "0.2.2"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8080
replicaCount: 1
# Single replica — Recreate avoids quota deadlocks (same reason as openclaw)
strategy:
  type: Recreate
# Give s3-sync sidecar time to flush workspace to MinIO on shutdown
terminationGracePeriodSeconds: 60
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
env:
  PORT: "8080"
  # pr-steward automation (canary: mctl-gitops only, branch prefix feat/agents-).
  # Inert in the image until this flag is "true" AND a RemoteTrigger fires a tick.
  PR_STEWARD_ENABLED: "true"
  PR_STEWARD_CONFIG: "/etc/steward/pr-steward.config.json"
  # Overlay skills dir — entrypoint copies these into the workspace skill dir.
  # Carries codex-watch (the review-polling "eyes"), absent from the base image.
  PR_STEWARD_SKILLS_DIR: "/opt/overlay-skills"
  GH_APP_ID: "3802616"
  GH_APP_INSTALLATION_ID: "134480258"
  GH_APP_PRIVATE_KEY_FILE: "/etc/steward/github-app/private-key.pem"
  GH_APP_TOKEN_FILE: "/run/steward/gh-token"
# Intentionally NO envFrom / no CLAUDE_CODE_OAUTH_TOKEN in env:
#
# `claude --remote-control` needs a full-scope claude.ai login (from
# `claude auth login`) saved as ~/.claude/.credentials.json, restored
# here from MinIO by the restore-state initContainer. If CLAUDE_CODE_OAUTH_TOKEN
# is set in env, claude prefers it over the on-disk credentials and rejects
# remote control with:
#   [WARN] Remote Control requires a full-scope login token. Long-lived
#   tokens (from `claude setup-token` or CLAUDE_CODE_OAUTH_TOKEN) are
#   limited to inference-only for security reasons.
# So this service deliberately keeps the env clean.
# Bootstrap procedure for the credentials.json is in README.md.

# ghcr-credentials is already managed by labs/openclaw — no second owner here.

# MinIO credentials — same Vault path as labs/openclaw
extraExternalSecrets:
  labs-claude-remote-minio:
    targetSecret: claude-remote-minio-creds
    data:
      - secretKey: access-key
        remoteKey: platform/minio
        property: root-user
      - secretKey: secret-key
        remoteKey: platform/minio
        property: root-password
  # pr-steward GitHub App private key (RS256 PEM). Mounted on tmpfs, 0440,
  # never in env — gh-app-token mints a 1h installation token from it.
  mctl-claude-remote-github-app:
    targetSecret: claude-remote-github-app
    data:
      - secretKey: private-key.pem
        remoteKey: platform/mctl-claude-remote/github-app
        property: private-key
# Workspace lives in emptyDir, persisted to MinIO by s3-sync sidecar
extraVolumes:
  - name: workspace
    emptyDir: {}
  # pr-steward config (read-only)
  - name: steward-config
    configMap:
      name: pr-steward-config
  # GitHub App PEM from the ExternalSecret above. 0440 so the non-root
  # runAsUser (in the fsGroup) can read it; 0400 would be root-only.
  - name: steward-app-key
    secret:
      secretName: claude-remote-github-app
      defaultMode: 0440
  # tmpfs holding only the short-lived installation token
  - name: steward-runtime
    emptyDir:
      medium: Memory
      sizeLimit: 1Mi
  # codex-watch overlay skill, copied into the workspace skill dir by entrypoint
  - name: overlay-skills
    configMap:
      name: codex-watch-skill
  # Shared volume for the steward's structured JSON log, so the log-tail
  # sidecar can surface it on a clean stdout (the base-service container's
  # stdout is full of claude --remote-control TUI/TTY escape codes).
  # sizeLimit caps unbounded growth (one JSON line per tick) so the log can
  # never accumulate ephemeral storage to the point of pod eviction.
  - name: steward-logs
    emptyDir:
      sizeLimit: 100Mi
extraVolumeMounts:
  - name: workspace
    mountPath: /workspace
  - name: steward-config
    mountPath: /etc/steward/pr-steward.config.json
    subPath: pr-steward.config.json
    readOnly: true
  - name: steward-app-key
    mountPath: /etc/steward/github-app
    readOnly: true
  - name: steward-runtime
    mountPath: /run/steward
  - name: overlay-skills
    mountPath: /opt/overlay-skills/codex-watch
    readOnly: true
  - name: steward-logs
    mountPath: /var/log/steward
# Restore workspace from MinIO before claude starts
initContainers:
  - name: restore-state
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 128Mi
    command: ["sh", "-c"]
    args:
      - |
        mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
        if [ -n "$(mc ls --recursive s3/platform-state/labs/claude-remote/ 2>/dev/null | head -1)" ]; then
          echo "Restoring workspace from MinIO..."
          # --overwrite handles re-runs cleanly; --exclude '.mc/*' keeps mc's own
          # config (in $HOME=/workspace/.mc) out of the restore loop.
          mc mirror --overwrite --exclude '.mc/*' s3/platform-state/labs/claude-remote/ /workspace
          echo "Restore complete."
        else
          echo "No existing state in MinIO — fresh start."
        fi
    env:
      - name: HOME
        value: /workspace
      - name: MINIO_ENDPOINT
        value: "http://minio.minio.svc.cluster.local:9000"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: access-key
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: secret-key
    volumeMounts:
      - name: workspace
        mountPath: /workspace
# s3-sync sidecar — mirrors /workspace → MinIO every 10 s + sync on pod shutdown
extraContainers:
  - name: s3-sync
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 128Mi
    command: ["sh", "-c"]
    args:
      - |
        mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
        # GC keep-list: auth, config, native binary, and mc's own state.
        # Everything else under /workspace (cloned repos, caches, build
        # artifacts) is disposable and is pruned on schedule / size.
        keep() {
          case "$1" in
            .claude|.claude.json|CLAUDE.md|.local|.mc) return 0 ;;
            *) return 1 ;;
          esac
        }
        THRESHOLD_KB=5242880   # 5 GiB
        WEEK=604800            # 7 days
        ACTIVE=24h             # spare anything modified within this window
        last_gc=$(date +%s)    # don't prune right after a (re)start
        i=0
        while true; do
          # Additive backup only -- NO --remove here, so a local logout that
          # deletes ~/.claude/.credentials.json can never wipe the MinIO
          # credentials backup (root cause of the 2026-05-21 restart loop).
          mc mirror --overwrite --exclude '.mc/*' --exclude '*.tmp' \
            /workspace s3/platform-state/labs/claude-remote/ || true
          # GC check ~hourly (360 * 10s) so du doesn't walk the tree each cycle.
          i=$((i + 1))
          if [ $((i % 360)) -eq 0 ]; then
            now=$(date +%s)
            size_kb=$(du -sk /workspace 2>/dev/null)
            size_kb=${size_kb%%[!0-9]*}
            if [ "${size_kb:-0}" -gt "$THRESHOLD_KB" ] || [ $((now - last_gc)) -ge "$WEEK" ]; then
              echo "[gc] pruning /workspace (size=${size_kb}KB), keeping auth/config + active work"
              for entry in /workspace/* /workspace/.[!.]*; do
                [ -e "$entry" ] || continue
                keep "$(basename "$entry")" && continue
                # Spare anything modified within $ACTIVE -- likely active,
                # uncommitted in-session work; only prune cold clutter.
                # Fail SAFE: if the recency check itself errors (e.g. mc find
                # unsupported on a future image), skip the entry rather than
                # risk rm -rf'ing active work. (minio/mc has no find/grep, so
                # the recency check must stay mc-native.)
                if ! mc find "$entry" --newer-than "$ACTIVE" >/tmp/gc_recent 2>/dev/null; then
                  echo "[gc] skip (recency check failed, fail-safe): $entry"
                  continue
                fi
                if [ -s /tmp/gc_recent ]; then
                  echo "[gc] skip (active <$ACTIVE): $entry"
                  continue
                fi
                echo "[gc] rm -rf $entry"
                rm -rf "$entry"
              done
              # Reconcile the prune to MinIO. --remove clears the deleted
              # paths, but every keep-list entry is excluded so a delete in
              # the narrow window between the rm loop and this mirror can
              # never propagate and wipe an auth/config backup.
              mc mirror --overwrite --remove \
                --exclude '.mc/*' --exclude '.claude' --exclude '.claude/*' \
                --exclude '.claude.json' --exclude 'CLAUDE.md' \
                --exclude '.local' --exclude '.local/*' --exclude '*.tmp' \
                /workspace s3/platform-state/labs/claude-remote/ || true
              last_gc=$(date +%s)
            fi
          fi
          sleep 10
        done
    env:
      - name: HOME
        value: /workspace
      - name: MINIO_ENDPOINT
        value: "http://minio.minio.svc.cluster.local:9000"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: access-key
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: secret-key
    volumeMounts:
      - name: workspace
        mountPath: /workspace
    lifecycle:
      preStop:
        exec:
          command:
            - sh
            - -c
            - |
              mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
              # Additive flush on shutdown -- NO --remove, same reason as the
              # sync loop: never let teardown wipe the MinIO credentials backup.
              mc mirror --overwrite --exclude '.mc/*' --exclude '*.tmp' \
                /workspace s3/platform-state/labs/claude-remote/
  # log-tail sidecar — surfaces the steward's structured JSON log on its own
  # stdout so `kubectl logs <pod> -c steward-log` is clean. The base-service
  # stdout is unreadable: claude --remote-control renders a TUI and needs a PTY,
  # so its output can't be ANSI-stripped without dropping it to --print mode.
  - name: steward-log
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
    command: ["sh", "-c"]
    args:
      - |
        # -F retries until base-service creates the file; -n +1 replays the
        # whole file on (re)start so a fresh sidecar shows existing ticks.
        exec tail -n +1 -F /var/log/steward/steward.log
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    volumeMounts:
      - name: steward-logs
        mountPath: /var/log/steward
        readOnly: true
probes:
  startup:
    path: /healthz
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30
  liveness:
    path: /healthz
    port: 8080
    initialDelaySeconds: 0
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /healthz
    port: 8080
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 5
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - claude-remote.mctl.ai
  tls:
    - secretName: claude-remote-tls
      hosts:
        - claude-remote.mctl.ai
  forwardAuth:
    enabled: true
    address: "https://app.mctl.ai/api/oidc-provider/forward-auth?tenant=labs&service=claude-remote"
    trustForwardHeader: true
backstage:
  kubernetesId: claude-remote

# pr-steward overlay ConfigMaps
configMaps:
  pr-steward-config:
    pr-steward.config.json: |
      {
        "merge_mode": "never",
        "max_attempts": 3,
        "stuck_hours": 6,
        "tick_lock_stale_minutes": 15,
        "label_prefix": "steward",
        "review_trigger": "@claude review",
        "review_bots": [
          "claude[bot]"
        ],
        "repos": [
          {
            "name": "mctlhq/mctl-gitops",
            "pr_filter": {
              "head_prefix": "feat/agents-"
            }
          }
        ],
        "github_app": {
          "slug": "mctl-claude-remote",
          "token_file": "/run/steward/gh-token"
        },
        "escalation": {
          "channel": "telegram",
          "telegram": {
            "peer": "210408407"
          }
        },
        "logging": {
          "file": "/var/log/steward/steward.log"
        }
      }
  # codex-watch skill (the review-polling eyes), delivered in-cluster because
  # it is a Mac-global operator skill absent from the OSS image.
  codex-watch-skill:
    SKILL.md: |
      ---
      name: codex-watch
      description: Monitor a GitHub PR in the background for a review-bot response. Watches BOTH claude[bot] (claude-review.yml) and chatgpt-codex-connector[bot] (@codex review). Launches a detached shell process that polls until a bot posts a review (line-anchored comments or top-level review body), a top-level issue comment (clean/"no findings"), or reacts 👍, then writes a result file you can read at any time. Use whenever the user has just posted "@codex review" or "@claude review" on a PR — or asks you to "watch / monitor / wait for / babysit the review" on a specific PR — and they want hands-off notification instead of manual `gh api` polling. Also use when they queue several PRs at once: launch one watcher per PR, in parallel.
      ---

      # codex-watch — background Claude review monitor (detached shell)

      The user has set this up so they don't have to manually re-run `gh api` to check whether the Claude bot has finished reviewing.

      ## When to invoke

      Trigger phrases (Russian or English): "посмотри ответ claude", "монитор claude", "следи за claude", "watch claude on PR X", "wait for claude review", "/codex-watch <PR>".

      Also invoke this **proactively** (without being asked) whenever you have just posted `@claude review` on a PR via `gh pr comment` and the user seems to be waiting for the response. Posting `@claude review` and then idling is exactly the thing this skill exists to automate.

      ## Implementation — detached shell, NOT subagent

      Use the script at `/tmp/codex-watch.sh` (lazily ensure it exists; see "Bootstrap" below). Launch one **detached background shell** per PR via `nohup ... &` + `disown`. The shell process survives across Claude Code sessions and writes a result file when codex responds or after a timeout.

      Do NOT spawn an `Agent` for this. Sub-agent runtime has a strong bias toward the `Monitor` tool, which does not block the agent's completion — agents thinking they're "watching" Monitor exit in seconds without ever waiting. Two empirical attempts at agent-based watchers (with explicit "do not use Monitor" instructions) both failed in 26–39 seconds. The detached shell pattern below is what actually works.

      ## Bootstrap — write `/tmp/codex-watch.sh` if missing

      Before launching watchers, check that the script is in place. If not, write it via Bash heredoc (the entire script body):

      ```bash
      #!/bin/bash
      # Detached PR-review watcher with macOS notification on completion.
      # Watches BOTH review bots — claude[bot] (claude-review.yml GH Action) and
      # chatgpt-codex-connector[bot] (@codex review) — so it works whichever
      # reviewer the repo / trigger uses.
      # Args: <repo>           e.g. mctlhq/mctl-openclaw
      #       <pr>             e.g. 5
      #       <result-file>    e.g. /tmp/codex-watch-mctl-openclaw-5.result
      #       <log-file>       e.g. /tmp/codex-watch-mctl-openclaw-5.log
      set -u
      REPO="$1"; PR="$2"; RESULT="$3"; LOG="$4"
      exec >"$LOG" 2>&1
      echo "[$(date -u +%FT%TZ)] watcher start repo=$REPO pr=$PR pid=$$"

      # jq predicate matching either review bot. Expanded inside the double-quoted
      # --jq strings below; its inner double-quotes survive because shell variable
      # expansion happens after quote parsing. Add more bots here if needed.
      BOTFILTER='select(.user.login == "claude[bot]" or .user.login == "chatgpt-codex-connector[bot]")'

      notify() {
        local title="$1" body="$2" sound="${3:-Glass}"
        # osascript is macOS-only; skip it elsewhere (e.g. in-cluster Linux) so the
        # log stays clean. The result file is the source of truth either way.
        [ "$(uname)" = "Darwin" ] || return 0
        osascript -e "display notification \"$body\" with title \"$title\" sound name \"$sound\"" >/dev/null 2>&1 || true
      }

      # Trigger baseline: the latest @claude review OR @codex review comment.
      TS=$(gh api "repos/$REPO/issues/$PR/comments" --jq '[.[] | select(.body | test("@(claude|codex) review"; "i"))] | last | .created_at')
      ID=$(gh api "repos/$REPO/issues/$PR/comments" --jq '[.[] | select(.body | test("@(claude|codex) review"; "i"))] | last | .id')
      if [ -z "$TS" ] || [ "$TS" = "null" ]; then
        echo "no @claude/@codex review trigger comment found" > "$RESULT"
        notify "codex-watch [$REPO#$PR]" "no review trigger found" "Basso"
        exit 1
      fi
      echo "[$(date -u +%FT%TZ)] baseline trigger_ts=$TS trigger_id=$ID"
      for i in $(seq 1 10); do
        R=$(gh api "repos/$REPO/pulls/$PR/reviews" --jq "[.[] | $BOTFILTER | select(.submitted_at > \"$TS\")] | length" 2>/dev/null || echo 0)
        C=$(gh api "repos/$REPO/pulls/$PR/comments" --jq "[.[] | $BOTFILTER | select(.created_at > \"$TS\")] | length" 2>/dev/null || echo 0)
        # Top-level issue comments — codex posts "no findings" results here
        # ("Codex Review: Didn't find any major issues. Swish!") instead of as
        # a PR review when there is nothing line-anchored to flag. Without this
        # check the watcher times out at 30 min while codex has already
        # responded clean within minutes (regression observed on
        # mctlhq/mctl-gitops#91, 2026-05-01).
        I=$(gh api "repos/$REPO/issues/$PR/comments" --jq "[.[] | $BOTFILTER | select(.created_at > \"$TS\")] | length" 2>/dev/null || echo 0)
        E=$(gh api "repos/$REPO/issues/comments/$ID/reactions" --jq "[.[] | $BOTFILTER | select(.created_at > \"$TS\") | .content] | last" 2>/dev/null || echo "")
        echo "[$(date -u +%FT%TZ)] tick $i: reviews=$R comments=$C issue_comments=$I reaction=$E"
        # Fetch the latest bot issue-comment body up front so the hit gate can tell
        # claude-review.yml's in-progress checklist from a real verdict. The checklist
        # has UNCHECKED boxes ("- [ ]"); a finished verdict has only "- [x]", and codex
        # posts no checklist at all. An issue-comment-only signal that is still a
        # checklist is NOT a response yet -> keep polling (regression: false "clean"
        # on the progress comment, mctlhq/mctl-gitops#267, 2026-05-22).
        ICBODY=$(gh api "repos/$REPO/issues/$PR/comments" --jq "[.[] | $BOTFILTER | select(.created_at > \"$TS\") | .body] | last // \"\"" 2>/dev/null || echo "")
        IC_INPROGRESS=0
        if [ "${I:-0}" -gt 0 ] && [ "${R:-0}" -eq 0 ] && [ "${C:-0}" -eq 0 ]; then
          if printf '%s' "$ICBODY" | grep -qF -- '- [ ]'; then
            IC_INPROGRESS=1
            echo "[$(date -u +%FT%TZ)] issue-comment is an in-progress checklist; still polling"
          fi
        fi
        if [ "${R:-0}" -gt 0 ] || [ "${C:-0}" -gt 0 ] || { [ "${I:-0}" -gt 0 ] && [ "$IC_INPROGRESS" -eq 0 ]; } || [ "$E" = '"+1"' ] || [ "$E" = "+1" ]; then
          echo "[$(date -u +%FT%TZ)] hit; fetching details"
          {
            echo "status=responded"
            echo "trigger_ts=$TS"
            echo "found_at=$(date -u +%FT%TZ)"
            echo "review_count=$R"
            echo "comment_count=$C"
            echo "issue_comment_count=$I"
            echo "reaction=$E"
            echo "---comments---"
            gh api "repos/$REPO/pulls/$PR/comments" --jq "[.[] | $BOTFILTER | select(.created_at > \"$TS\") | {user: .user.login, path, line, original_line, body}]"
            echo "---reviews---"
            gh api "repos/$REPO/pulls/$PR/reviews" --jq "[.[] | $BOTFILTER | select(.submitted_at > \"$TS\") | {user: .user.login, state, body, submitted_at}]"
            echo "---issue_comments---"
            gh api "repos/$REPO/issues/$PR/comments" --jq "[.[] | $BOTFILTER | select(.created_at > \"$TS\") | {user: .user.login, created_at, body}]"
          } > "$RESULT"
          # "Clean" detection paths (bot signals):
          # 1. 👍 reaction on the trigger with no line-anchored reviews/comments
          # 2. Top-level issue comment with no line-anchored findings
          #    (a bot posts a top-level "no issues" comment when clean)
          CLEAN="0"
          if { [ "$E" = '"+1"' ] || [ "$E" = "+1" ]; } && [ "${R:-0}" -eq 0 ] && [ "${C:-0}" -eq 0 ]; then
            CLEAN="1"
          fi
          if [ "${I:-0}" -gt 0 ] && [ "${R:-0}" -eq 0 ] && [ "${C:-0}" -eq 0 ]; then
            CLEAN="1"
          fi
          if [ "$CLEAN" = "1" ]; then
            notify "codex-watch [$REPO#$PR]" "clean review (no findings)" "Glass"
          else
            TOTAL=$(( ${R:-0} + ${C:-0} + ${I:-0} ))
            notify "codex-watch [$REPO#$PR]" "$TOTAL response(s) — read $RESULT" "Glass"
          fi
          exit 0
        fi
        [ "$i" -lt 10 ] && sleep 180
      done
      echo "status=timeout" > "$RESULT"
      echo "trigger_ts=$TS" >> "$RESULT"
      echo "[$(date -u +%FT%TZ)] timeout"
      notify "codex-watch [$REPO#$PR]" "timeout after ~30 min, no review response" "Basso"
      ```

      > **Known caveat — claude[bot] progress checklist.** When `claude-review.yml`
      > is also active, claude[bot] posts a *progress checklist* as a top-level
      > issue comment seconds after the trigger, then edits it as it works. The hit
      > gate guards against this: an issue-comment-only signal whose body still has an
      > unchecked `- [ ]` box is treated as in-progress and the watcher keeps polling
      > (a finished verdict has only `- [x]`, and codex posts no checklist). This
      > matters for automated readers (e.g. pr-steward) that parse the result file
      > rather than eyeballing it — without the guard every tick would misread the
      > checklist as a clean review.

      Save with `chmod +x /tmp/codex-watch.sh`.

      ### macOS notification permission

      `notify` calls `osascript -e 'display notification ...'` — best-effort, fails silently if unavailable. On first use, macOS may prompt for notification permission for the parent terminal/process. If the user reports "I don't see notifications", point them to `System Settings → Notifications` and look for the host app (Terminal, iTerm2, Script Editor depending on which process invoked osascript). The result file still gets written either way; OS notification is the convenience layer, not the source of truth.

      ## Launch a watcher

      For each PR (`<owner>/<repo>` and `<N>`), in a single Bash call:

      ```bash
      nohup /tmp/codex-watch.sh <owner>/<repo> <N> \
        /tmp/codex-watch-<repo-stem>-<N>.result \
        /tmp/codex-watch-<repo-stem>-<N>.log \
        >/dev/null 2>&1 &
      PID=$!
      disown $PID 2>/dev/null
      echo "watcher pid=$PID"
      ```

      `<repo-stem>` = repo name without owner (e.g. `mctl-openclaw`). Multiple PRs ⇒ launch each in its own `nohup ... &` invocation, all in parallel from a single Bash call.

      ## Reading results

      When the user later asks "did codex respond yet?" or similar, just `Read` the `.result` file:

      - If the file does not exist yet → watcher still polling. `Read /tmp/codex-watch-<stem>-<N>.log` for current tick number to estimate.
      - If file contents start with `status=responded` → parse and report findings (Format A).
      - If `status=timeout` → Format C.
      - If contents say "no @claude/@codex review trigger comment found" → Format B-ish but with no-trigger explanation.

      ## Output formats (when reporting to the user)

        Format A — findings:

          [claude] <repo>#<N>: K findings (X P1, Y P2, Z P3)
          https://github.com/<repo>/pull/<N>
          - Pn {file}:{line} — {one-line summary}
          ...

        Format B — clean (no findings, signaled by either 👍 reaction or a top-level issue comment from claude[bot] with no line-anchored comments/reviews):

          [claude] <repo>#<N>: clean review (no findings)
          https://github.com/<repo>/pull/<N>

        Format C — timeout (~30 min, claude[bot] never responded):

          [claude] <repo>#<N>: no claude review response after ~30 min
          Trigger: <trigger_ts>
          Re-post @claude review or check repo settings.

      Severity parsing: claude[bot] prefixes each finding's body with a markdown badge `![P2 Badge](...)` — extract the `P0` / `P1` / `P2` / `P3` token. If absent, mark as `P?`.

      One-line summary per finding: take the first **bold heading** (between `**`) from the comment body and trim to ~80 chars. Do NOT include the explanatory paragraph or full body — the user clicks into the PR for full context.

      ## Multiple PRs

      Single Bash call launching multiple `nohup` background processes is fine — each `&` detaches, each runs independently with its own result/log path.

      ## Argument parsing

      Accepted forms from the user:
      - `mctlhq/mctl-openclaw#5`
      - `https://github.com/mctlhq/mctl-openclaw/pull/5`
      - `5` (only if the user has just opened exactly one PR in conversation context — pick the most recent)

      If args are ambiguous, ask which PRs in one short AskUserQuestion before launching.

      ## Operational notes

      - The detached shell uses `nohup` + `disown` + stdout/stderr redirection — it survives Claude Code session boundaries. A future session can read the result file and report.
      - Codex usually responds within 1–5 minutes of `@claude review`. The 180s tick cadence catches it within the next tick. Sometimes codex takes 5–15 min when busy.
      - Result-file path convention: `/tmp/codex-watch-<repo-stem>-<N>.result` — keep this stable so future sessions can find it without args.
      - If `gh api` returns 403/404, the watcher writes a status-error result and exits. No retries — auth/permission issues won't fix themselves.
      - The first `@claude review` issue comment is the trigger baseline. If the user re-triggers (posts `@claude review` again after a fix-up), launch a new watcher — the script's baseline-detection `last` filter picks up the latest trigger automatically.

      ## What this skill is NOT for

      - One-shot "check codex now" — for that, just call `gh api` directly. This skill is for the wait-and-notify case.
      - Reviews from bots other than `claude[bot]` / `chatgpt-codex-connector[bot]` (Gemini, etc.) — add the login to `BOTFILTER` in the script. For an entirely different review surface, write a sibling skill.
      - Long-term watching across multiple `@claude review` retries — re-launch after each new trigger.

      ## Anti-patterns (do not regress)

      1. **`Agent` + `Monitor` tool**: sub-agent runtime treats Monitor as fire-and-forget and exits in seconds without waiting. Always use detached shell instead.
      2. **Synchronous Bash in foreground**: blocks the user's session for up to 30 min, defeats the "background" goal. Always `nohup ... &` + `disown`.
      3. **Polling without baseline timestamp**: if you check `pulls/<N>/reviews` without filtering by `> $TRIGGER_TS`, you'll match codex's previous (pre-fixup) review and falsely report "responded" immediately. Always filter by the latest `@claude review` issue-comment timestamp.
