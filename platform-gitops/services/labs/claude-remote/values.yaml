image:
  # build.yml in mctlhq/mctl-claude-remote sets IMAGE_NAME=mctlhq/claude-remote explicitly,
  # so GHCR publishes to ghcr.io/mctlhq/claude-remote (not mctlhq/mctl-claude-remote).
  # Confirmed: ghcr.io/mctlhq/claude-remote:0.1.1 exists and is tagged.
  repository: ghcr.io/mctlhq/claude-remote
  tag: "0.1.4"

imagePullSecrets:
  - name: ghcr-credentials

service:
  port: 8080

replicaCount: 1

# Single replica — Recreate avoids quota deadlocks (same reason as openclaw)
strategy:
  type: Recreate

# Give s3-sync sidecar time to flush workspace to MinIO on shutdown
terminationGracePeriodSeconds: 60

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

env:
  PORT: "8080"

envFrom:
  - secretRef:
      name: claude-remote-secrets

# ghcr-credentials is already managed by labs/openclaw — no second owner here.

# CLAUDE_CODE_OAUTH_TOKEN from Vault (path: secret/platform/claude-remote).
# vault-backend ClusterSecretStore has path="secret" version="v2" — ESO adds
# "data/" automatically, so remoteKey does NOT need the "secret/data/" prefix
# (same pattern as admins/mctl-agent which uses "platform/mctl-agent/tokens").
externalSecret:
  targetSecret: claude-remote-secrets
  data:
    - secretKey: CLAUDE_CODE_OAUTH_TOKEN
      remoteKey: platform/claude-remote
      property: CLAUDE_CODE_OAUTH_TOKEN

# MinIO credentials — same Vault path as labs/openclaw
extraExternalSecrets:
  labs-claude-remote-minio:
    targetSecret: claude-remote-minio-creds
    data:
      - secretKey: access-key
        remoteKey: platform/minio
        property: root-user
      - secretKey: secret-key
        remoteKey: platform/minio
        property: root-password

# Workspace lives in emptyDir, persisted to MinIO by s3-sync sidecar
extraVolumes:
  - name: workspace
    emptyDir: {}

extraVolumeMounts:
  - name: workspace
    mountPath: /workspace

# Restore workspace from MinIO before claude starts
initContainers:
  - name: restore-state
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 128Mi
    command: ["sh", "-c"]
    args:
      - |
        mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
        if [ -n "$(mc ls --recursive s3/platform-state/labs/claude-remote/ 2>/dev/null | head -1)" ]; then
          echo "Restoring workspace from MinIO..."
          # --overwrite handles re-runs cleanly; --exclude '.mc/*' keeps mc's own
          # config (in $HOME=/workspace/.mc) out of the restore loop.
          mc mirror --overwrite --exclude '.mc/*' s3/platform-state/labs/claude-remote/ /workspace
          echo "Restore complete."
        else
          echo "No existing state in MinIO — fresh start."
        fi
    env:
      - name: HOME
        value: /workspace
      - name: MINIO_ENDPOINT
        value: "http://minio.minio.svc.cluster.local:9000"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: access-key
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: secret-key
    volumeMounts:
      - name: workspace
        mountPath: /workspace

# s3-sync sidecar — mirrors /workspace → MinIO every 10 s + sync on pod shutdown
extraContainers:
  - name: s3-sync
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 128Mi
    command: ["sh", "-c"]
    args:
      - |
        mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
        while true; do
          mc mirror --overwrite --remove \
            --exclude '.mc/*' --exclude '*.tmp' \
            /workspace s3/platform-state/labs/claude-remote/ || true
          sleep 10
        done
    env:
      - name: HOME
        value: /workspace
      - name: MINIO_ENDPOINT
        value: "http://minio.minio.svc.cluster.local:9000"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: access-key
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: secret-key
    volumeMounts:
      - name: workspace
        mountPath: /workspace
    lifecycle:
      preStop:
        exec:
          command:
            - sh
            - -c
            - |
              mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
              mc mirror --overwrite --remove \
                --exclude '.mc/*' --exclude '*.tmp' \
                /workspace s3/platform-state/labs/claude-remote/

probes:
  startup:
    path: /healthz
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30
  liveness:
    path: /healthz
    port: 8080
    initialDelaySeconds: 0
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /healthz
    port: 8080
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 5

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - claude-remote.mctl.ai
  tls:
    - secretName: claude-remote-tls
      hosts:
        - claude-remote.mctl.ai
  forwardAuth:
    enabled: true
    address: "https://app.mctl.ai/api/oidc-provider/forward-auth?tenant=labs&service=claude-remote"
    trustForwardHeader: true

backstage:
  kubernetesId: claude-remote
