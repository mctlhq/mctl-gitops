image:
  repository: ghcr.io/mctlhq/mctl-claude-remote
  tag: "0.8.0"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8080
replicaCount: 1
# Single replica — Recreate avoids quota deadlocks (same reason as openclaw)
strategy:
  type: Recreate
# Give s3-sync sidecar time to flush workspace to MinIO on shutdown
terminationGracePeriodSeconds: 60
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    # PR-steward agent runs spike past 1000m and get CFS-throttled. Raised
    # 1000m→1500m (fits labs LimitRange max 3 and quota limits.cpu 12).
    cpu: 1500m
    memory: 2Gi
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
env:
  PORT: "8080"
  # Pin the resume target to the active work session. Without this the entrypoint
  # resumes the "newest transcript on disk", which is unreliable after a restart
  # (restore-state from MinIO resets file mtimes, so it picked stale/blank
  # sessions like 92ff94d0 / f60da98d instead of the real one). Remove or update
  # this once the session is finished. Session 65ef01db = the live
  # mctl-telegram tier / handleTelegramCallback work (transcript restored, 800KB).
  RESUME_SESSION_ID: "65ef01db-b382-4e47-b8c7-46bc5d0647fb"
  # pr-steward automation (branch prefix per repo). Per-repo merge_mode
  # (image 0.3.0+): global default is "never" (safe — escalate only); a repo opts
  # into auto-merge explicitly. Ownership is partitioned with the Tier-3 shepherd
  # via SHEPHERD_SKIP_SERVICES (steward owns ONLY what the shepherd skips):
  #   mctl-design   = steward, when-green (gated by branch protection on its public main)
  #   mctl-telegram = steward, when-green + squash (claude/* and fix/* and feat/agents-*)
  #   mctl-docs     = shepherd-owned (removed from steward — low churn, no strict protection)
  #   mctl-gitops   = human-only (removed from steward AND in SHEPHERD_SKIP_SERVICES, so no
  #                   auto-merge by anyone; private, no branch protection possible)
  #   mctl-pairdesk = steward, when-green + merge (public + branch-protected; in SHEPHERD_SKIP_SERVICES)
  # Inert in the image until this flag is "true".
  PR_STEWARD_ENABLED: "true"
  # Built-in scheduler (0.4.0+): fire a headless `claude -p "Run the pr-steward
  # skill"` tick every 20 min so the steward runs without a human prompting the
  # live remote-control session (closes the manual-trigger gap, gitops #276).
  # Each tick is gated by bin/pr-steward-precheck: it only spawns the model run
  # when an in-scope PR (per the configMap repos/pr_filter) is not yet in a
  # terminal steward state, so idle cadences cost one GitHub API call, not
  # Claude usage. Set to "0" to disable the loop (the live session still works).
  PR_STEWARD_SCHEDULE_SECONDS: "1200"
  # Keep the per-tick timeout below the schedule interval (1080 < 1200) so a
  # tick that runs to its limit always finishes before the next fires — rules
  # out two concurrent `claude -p` runs (the 15-min tick lock is the backstop).
  PR_STEWARD_TICK_TIMEOUT_SECONDS: "1080"
  PR_STEWARD_CONFIG: "/etc/steward/pr-steward.config.json"
  # Overlay skills dir — entrypoint copies these into the workspace skill dir.
  # Carries codex-watch (the review-polling "eyes"), absent from the base image.
  PR_STEWARD_SKILLS_DIR: "/opt/overlay-skills"
  GH_APP_ID: "3802616"
  GH_APP_INSTALLATION_ID: "134480258"
  GH_APP_PRIVATE_KEY_FILE: "/etc/steward/github-app/private-key.pem"
  GH_APP_TOKEN_FILE: "/run/steward/gh-token"
  # Persistent operator session — keep memory, never wedge. The entrypoint resumes
  # the pinned RESUME_SESSION_ID on every (re)launch; with a headless
  # (stdin=/dev/null) --remote-control bridge the "Resume from summary?" modal can
  # never be answered, so a resumed session that crosses BOTH default thresholds
  # (age > 70 min AND est. tokens > 100k) blocks startup → "Remote Control failed
  # to connect: /login" → silent wedge (observed 2026-06-03, session stuck ~10h).
  # Raise both thresholds so the modal never fires; resume then loads the full
  # transcript silently and memory is preserved. AUTO_COMPACT_WINDOW makes the
  # long-lived session sustainable: it auto-compacts (summarises, thread kept) at
  # ~70% of a 200k window instead of choking mid-turn near the model max. These
  # mirror the proven Mac-bridge wrapper config. (Phase 1 — env-only, no image
  # release. Phase 2 will add state-file session rotation + retention prune +
  # resumeReturnDismissed + a startup-wedge backstop in entrypoint.sh.)
  CLAUDE_CODE_RESUME_THRESHOLD_MINUTES: "2000000000"
  CLAUDE_CODE_RESUME_TOKEN_THRESHOLD: "2000000000"
  CLAUDE_CODE_AUTO_COMPACT_WINDOW: "140000"
# Intentionally NO envFrom / no CLAUDE_CODE_OAUTH_TOKEN in env:
#
# `claude --remote-control` needs a full-scope claude.ai login (from
# `claude auth login`) saved as ~/.claude/.credentials.json, restored
# here from MinIO by the restore-state initContainer. If CLAUDE_CODE_OAUTH_TOKEN
# is set in env, claude prefers it over the on-disk credentials and rejects
# remote control with:
#   [WARN] Remote Control requires a full-scope login token. Long-lived
#   tokens (from `claude setup-token` or CLAUDE_CODE_OAUTH_TOKEN) are
#   limited to inference-only for security reasons.
# So this service deliberately keeps the env clean.
# Bootstrap procedure for the credentials.json is in README.md.

# ghcr-credentials is already managed by labs/openclaw — no second owner here.

# MinIO credentials — same Vault path as labs/openclaw
extraExternalSecrets:
  labs-claude-remote-minio:
    targetSecret: claude-remote-minio-creds
    data:
      - secretKey: access-key
        remoteKey: platform/minio
        property: root-user
      - secretKey: secret-key
        remoteKey: platform/minio
        property: root-password
  # pr-steward GitHub App private key (RS256 PEM). Mounted on tmpfs, 0440,
  # never in env — gh-app-token mints a 1h installation token from it.
  mctl-claude-remote-github-app:
    targetSecret: claude-remote-github-app
    data:
      - secretKey: private-key.pem
        remoteKey: platform/mctl-claude-remote/github-app
        property: private-key
# Workspace lives in emptyDir, persisted to MinIO by s3-sync sidecar
extraVolumes:
  - name: workspace
    emptyDir: {}
  # pr-steward config (read-only)
  - name: steward-config
    configMap:
      name: pr-steward-config
  # GitHub App PEM from the ExternalSecret above. 0440 so the non-root
  # runAsUser (in the fsGroup) can read it; 0400 would be root-only.
  - name: steward-app-key
    secret:
      secretName: claude-remote-github-app
      defaultMode: 0440
  # tmpfs holding only the short-lived installation token
  - name: steward-runtime
    emptyDir:
      medium: Memory
      sizeLimit: 1Mi
  # codex-watch overlay skill, copied into the workspace skill dir by entrypoint
  - name: overlay-skills
    configMap:
      name: codex-watch-skill
  # Shared volume for the steward's structured JSON log, so the log-tail
  # sidecar can surface it on a clean stdout (the base-service container's
  # stdout is full of claude --remote-control TUI/TTY escape codes).
  # sizeLimit caps unbounded growth (one JSON line per tick) so the log can
  # never accumulate ephemeral storage to the point of pod eviction.
  - name: steward-logs
    emptyDir:
      sizeLimit: 100Mi
extraVolumeMounts:
  - name: workspace
    mountPath: /workspace
  - name: steward-config
    mountPath: /etc/steward/pr-steward.config.json
    subPath: pr-steward.config.json
    readOnly: true
  - name: steward-app-key
    mountPath: /etc/steward/github-app
    readOnly: true
  - name: steward-runtime
    mountPath: /run/steward
  - name: overlay-skills
    mountPath: /opt/overlay-skills/codex-watch
    readOnly: true
  - name: steward-logs
    mountPath: /var/log/steward
# Restore workspace from MinIO before claude starts
initContainers:
  - name: restore-state
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 128Mi
    command: ["sh", "-c"]
    args:
      - |
        mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
        if [ -n "$(mc ls --recursive s3/platform-state/labs/claude-remote/ 2>/dev/null | head -1)" ]; then
          echo "Restoring workspace from MinIO..."
          # --overwrite handles re-runs cleanly; --exclude '.mc/*' keeps mc's own
          # config (in $HOME=/workspace/.mc) out of the restore loop.
          mc mirror --overwrite --exclude '.mc/*' s3/platform-state/labs/claude-remote/ /workspace
          echo "Restore complete."
        else
          echo "No existing state in MinIO — fresh start."
        fi
    env:
      - name: HOME
        value: /workspace
      - name: MINIO_ENDPOINT
        value: "http://minio.minio.svc.cluster.local:9000"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: access-key
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: secret-key
    volumeMounts:
      - name: workspace
        mountPath: /workspace
# s3-sync sidecar — mirrors /workspace → MinIO every 10 s + sync on pod shutdown
extraContainers:
  - name: s3-sync
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 128Mi
    command: ["sh", "-c"]
    args:
      - |
        mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
        # GC keep-list: auth, config, native binary, and mc's own state.
        # Everything else under /workspace (cloned repos, caches, build
        # artifacts) is disposable and is pruned on schedule / size.
        keep() {
          case "$1" in
            .claude|.claude.json|CLAUDE.md|.local|.mc) return 0 ;;
            *) return 1 ;;
          esac
        }
        THRESHOLD_KB=5242880   # 5 GiB
        WEEK=604800            # 7 days
        ACTIVE=24h             # spare anything modified within this window
        last_gc=$(date +%s)    # don't prune right after a (re)start
        i=0
        while true; do
          # Additive backup only -- NO --remove here, so a local logout that
          # deletes ~/.claude/.credentials.json can never wipe the MinIO
          # credentials backup (root cause of the 2026-05-21 restart loop).
          mc mirror --overwrite --exclude '.mc/*' --exclude '*.tmp' \
            /workspace s3/platform-state/labs/claude-remote/ || true
          # GC check ~hourly (360 * 10s) so du doesn't walk the tree each cycle.
          i=$((i + 1))
          if [ $((i % 360)) -eq 0 ]; then
            now=$(date +%s)
            size_kb=$(du -sk /workspace 2>/dev/null)
            size_kb=${size_kb%%[!0-9]*}
            if [ "${size_kb:-0}" -gt "$THRESHOLD_KB" ] || [ $((now - last_gc)) -ge "$WEEK" ]; then
              echo "[gc] pruning /workspace (size=${size_kb}KB), keeping auth/config + active work"
              for entry in /workspace/* /workspace/.[!.]*; do
                [ -e "$entry" ] || continue
                keep "$(basename "$entry")" && continue
                # Spare anything modified within $ACTIVE -- likely active,
                # uncommitted in-session work; only prune cold clutter.
                # Fail SAFE: if the recency check itself errors (e.g. mc find
                # unsupported on a future image), skip the entry rather than
                # risk rm -rf'ing active work. (minio/mc has no find/grep, so
                # the recency check must stay mc-native.)
                if ! mc find "$entry" --newer-than "$ACTIVE" >/tmp/gc_recent 2>/dev/null; then
                  echo "[gc] skip (recency check failed, fail-safe): $entry"
                  continue
                fi
                if [ -s /tmp/gc_recent ]; then
                  echo "[gc] skip (active <$ACTIVE): $entry"
                  continue
                fi
                echo "[gc] rm -rf $entry"
                rm -rf "$entry"
              done
              # Reconcile the prune to MinIO. --remove clears the deleted
              # paths, but every keep-list entry is excluded so a delete in
              # the narrow window between the rm loop and this mirror can
              # never propagate and wipe an auth/config backup.
              mc mirror --overwrite --remove \
                --exclude '.mc/*' --exclude '.claude' --exclude '.claude/*' \
                --exclude '.claude.json' --exclude 'CLAUDE.md' \
                --exclude '.local' --exclude '.local/*' --exclude '*.tmp' \
                /workspace s3/platform-state/labs/claude-remote/ || true
              last_gc=$(date +%s)
            fi
          fi
          sleep 10
        done
    env:
      - name: HOME
        value: /workspace
      - name: MINIO_ENDPOINT
        value: "http://minio.minio.svc.cluster.local:9000"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: access-key
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: claude-remote-minio-creds
            key: secret-key
    volumeMounts:
      - name: workspace
        mountPath: /workspace
    lifecycle:
      preStop:
        exec:
          command:
            - sh
            - -c
            - |
              mc alias set s3 "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
              # Additive flush on shutdown -- NO --remove, same reason as the
              # sync loop: never let teardown wipe the MinIO credentials backup.
              mc mirror --overwrite --exclude '.mc/*' --exclude '*.tmp' \
                /workspace s3/platform-state/labs/claude-remote/
  # log-tail sidecar — surfaces the steward's structured JSON log on its own
  # stdout so `kubectl logs <pod> -c steward-log` is clean. The base-service
  # stdout is unreadable: claude --remote-control renders a TUI and needs a PTY,
  # so its output can't be ANSI-stripped without dropping it to --print mode.
  - name: steward-log
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
    command: ["sh", "-c"]
    args:
      - |
        # -F retries until base-service creates the files; -n +1 replays the
        # whole file on (re)start so a fresh sidecar shows existing ticks.
        # Both the skill's structured JSON (steward.log) and the scheduler
        # loop's precheck/tick output (scheduler.log) are surfaced here.
        exec tail -n +1 -F /var/log/steward/steward.log /var/log/steward/scheduler.log
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    volumeMounts:
      - name: steward-logs
        mountPath: /var/log/steward
        readOnly: true
probes:
  startup:
    path: /healthz
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30
  liveness:
    path: /healthz
    port: 8080
    initialDelaySeconds: 0
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 5
  readiness:
    path: /healthz
    port: 8080
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 5
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - claude-remote.mctl.ai
  tls:
    - secretName: claude-remote-tls
      hosts:
        - claude-remote.mctl.ai
  forwardAuth:
    enabled: true
    address: "https://app.mctl.ai/api/oidc-provider/forward-auth?tenant=labs&service=claude-remote"
    trustForwardHeader: true
backstage:
  kubernetesId: claude-remote
# pr-steward overlay ConfigMaps
configMaps:
  pr-steward-config:
    pr-steward.config.json: |
      {
        "merge_mode": "never",
        "max_attempts": 3,
        "stuck_hours": 6,
        "tick_lock_stale_minutes": 15,
        "label_prefix": "steward",
        "review_trigger": "@claude review",
        "review_bots": [
          "claude[bot]"
        ],
        "repos": [
          {
            "name": "mctlhq/mctl-design",
            "pr_filter": {
              "head_prefix": "feat/agents-"
            },
            "merge_mode": "when-green"
          },
          {
            "name": "mctlhq/mctl-telegram",
            "pr_filter": {
              "head_prefix": "claude/"
            },
            "merge_mode": "when-green",
            "merge_method": "squash"
          },
          {
            "name": "mctlhq/mctl-telegram",
            "pr_filter": {
              "head_prefix": "fix/"
            },
            "merge_mode": "when-green",
            "merge_method": "squash"
          },
          {
            "name": "mctlhq/mctl-telegram",
            "pr_filter": {
              "head_prefix": "feat/agents-"
            },
            "merge_mode": "when-green",
            "merge_method": "squash"
          },
          {
            "name": "mctlhq/mctl-pairdesk",
            "pr_filter": {
              "head_prefix": "feat/agents-"
            },
            "merge_mode": "when-green",
            "merge_method": "merge"
          }
        ],
        "github_app": {
          "slug": "mctl-claude-remote",
          "token_file": "/run/steward/gh-token"
        },
        "escalation": {
          "channel": "telegram",
          "telegram": {
            "peer": "210408407"
          }
        },
        "logging": {
          "file": "/var/log/steward/steward.log"
        }
      }
  # codex-watch skill (the review-polling eyes), delivered in-cluster because
  # it is a Mac-global operator skill absent from the OSS image.
  codex-watch-skill:
    SKILL.md: "---\nname: codex-watch\ndescription: Monitor a GitHub PR in the background for a review-bot response. Watches BOTH claude[bot] (claude-review.yml) and chatgpt-codex-connector[bot] (@codex review). Launches a detached shell process that polls until a bot posts a review (line-anchored comments or top-level review body), a top-level issue comment (clean/\"no findings\"), or reacts \U0001F44D, then writes a result file you can read at any time. Use whenever the user has just posted \"@codex review\" or \"@claude review\" on a PR — or asks you to \"watch / monitor / wait for / babysit the review\" on a specific PR — and they want hands-off notification instead of manual `gh api` polling. Also use when they queue several PRs at once: launch one watcher per PR, in parallel.\n---\n\n# codex-watch — background Claude review monitor (detached shell)\n\nThe user has set this up so they don't have to manually re-run `gh api` to check whether the Claude bot has finished reviewing.\n\n## When to invoke\n\nTrigger phrases (Russian or English): \"посмотри ответ claude\", \"монитор claude\", \"следи за claude\", \"watch claude on PR X\", \"wait for claude review\", \"/codex-watch <PR>\".\n\nAlso invoke this **proactively** (without being asked) whenever you have just posted `@claude review` on a PR via `gh pr comment` and the user seems to be waiting for the response. Posting `@claude review` and then idling is exactly the thing this skill exists to automate.\n\n## Implementation — detached shell, NOT subagent\n\nUse the script at `/tmp/codex-watch.sh` (lazily ensure it exists; see \"Bootstrap\" below). Launch one **detached background shell** per PR via `nohup ... &` + `disown`. The shell process survives across Claude Code sessions and writes a result file when codex responds or after a timeout.\n\nDo NOT spawn an `Agent` for this. Sub-agent runtime has a strong bias toward the `Monitor` tool, which does not block the agent's completion — agents thinking they're \"watching\" Monitor exit in seconds without ever waiting. Two empirical attempts at agent-based watchers (with explicit \"do not use Monitor\" instructions) both failed in 26–39 seconds. The detached shell pattern below is what actually works.\n\n## Bootstrap — write `/tmp/codex-watch.sh` if missing\n\nBefore launching watchers, check that the script is in place. If not, write it via Bash heredoc (the entire script body):\n\n```bash\n#!/bin/bash\n# Detached PR-review watcher with macOS notification on completion.\n# Watches BOTH review bots — claude[bot] (claude-review.yml GH Action) and\n# chatgpt-codex-connector[bot] (@codex review) — so it works whichever\n# reviewer the repo / trigger uses.\n# Args: <repo>           e.g. mctlhq/mctl-openclaw\n#       <pr>             e.g. 5\n#       <result-file>    e.g. /tmp/codex-watch-mctl-openclaw-5.result\n#       <log-file>       e.g. /tmp/codex-watch-mctl-openclaw-5.log\nset -u\nREPO=\"$1\"; PR=\"$2\"; RESULT=\"$3\"; LOG=\"$4\"\nexec >\"$LOG\" 2>&1\necho \"[$(date -u +%FT%TZ)] watcher start repo=$REPO pr=$PR pid=$$\"\n\n# jq predicate matching either review bot. Expanded inside the double-quoted\n# --jq strings below; its inner double-quotes survive because shell variable\n# expansion happens after quote parsing. Add more bots here if needed.\nBOTFILTER='select(.user.login == \"claude[bot]\" or .user.login == \"chatgpt-codex-connector[bot]\")'\n\nnotify() {\n  local title=\"$1\" body=\"$2\" sound=\"${3:-Glass}\"\n  # osascript is macOS-only; skip it elsewhere (e.g. in-cluster Linux) so the\n  # log stays clean. The result file is the source of truth either way.\n  [ \"$(uname)\" = \"Darwin\" ] || return 0\n  osascript -e \"display notification \\\"$body\\\" with title \\\"$title\\\" sound name \\\"$sound\\\"\" >/dev/null 2>&1 || true\n}\n\n# Trigger baseline: the latest @claude review OR @codex review comment.\nTS=$(gh api \"repos/$REPO/issues/$PR/comments\" --jq '[.[] | select(.body | test(\"@(claude|codex) review\"; \"i\"))] | last | .created_at')\nID=$(gh api \"repos/$REPO/issues/$PR/comments\" --jq '[.[] | select(.body | test(\"@(claude|codex) review\"; \"i\"))] | last | .id')\nif [ -z \"$TS\" ] || [ \"$TS\" = \"null\" ]; then\n  echo \"no @claude/@codex review trigger comment found\" > \"$RESULT\"\n  notify \"codex-watch [$REPO#$PR]\" \"no review trigger found\" \"Basso\"\n  exit 1\nfi\necho \"[$(date -u +%FT%TZ)] baseline trigger_ts=$TS trigger_id=$ID\"\nfor i in $(seq 1 10); do\n  R=$(gh api \"repos/$REPO/pulls/$PR/reviews\" --jq \"[.[] | $BOTFILTER | select(.submitted_at > \\\"$TS\\\")] | length\" 2>/dev/null || echo 0)\n  C=$(gh api \"repos/$REPO/pulls/$PR/comments\" --jq \"[.[] | $BOTFILTER | select(.created_at > \\\"$TS\\\")] | length\" 2>/dev/null || echo 0)\n  # Top-level issue comments — codex posts \"no findings\" results here\n  # (\"Codex Review: Didn't find any major issues. Swish!\") instead of as\n  # a PR review when there is nothing line-anchored to flag. Without this\n  # check the watcher times out at 30 min while codex has already\n  # responded clean within minutes (regression observed on\n  # mctlhq/mctl-gitops#91, 2026-05-01).\n  I=$(gh api \"repos/$REPO/issues/$PR/comments\" --jq \"[.[] | $BOTFILTER | select(.created_at > \\\"$TS\\\")] | length\" 2>/dev/null || echo 0)\n  E=$(gh api \"repos/$REPO/issues/comments/$ID/reactions\" --jq \"[.[] | $BOTFILTER | select(.created_at > \\\"$TS\\\") | .content] | last\" 2>/dev/null || echo \"\")\n  echo \"[$(date -u +%FT%TZ)] tick $i: reviews=$R comments=$C issue_comments=$I reaction=$E\"\n  # Fetch the latest bot issue-comment body up front so the hit gate can tell\n  # claude-review.yml's in-progress checklist from a real verdict. The checklist\n  # has UNCHECKED boxes (\"- [ ]\"); a finished verdict has only \"- [x]\", and codex\n  # posts no checklist at all. An issue-comment-only signal that is still a\n  # checklist is NOT a response yet -> keep polling (regression: false \"clean\"\n  # on the progress comment, mctlhq/mctl-gitops#267, 2026-05-22).\n  ICBODY=$(gh api \"repos/$REPO/issues/$PR/comments\" --jq \"[.[] | $BOTFILTER | select(.created_at > \\\"$TS\\\") | .body] | last // \\\"\\\"\" 2>/dev/null || echo \"\")\n  IC_INPROGRESS=0\n  if [ \"${I:-0}\" -gt 0 ] && [ \"${R:-0}\" -eq 0 ] && [ \"${C:-0}\" -eq 0 ]; then\n    if printf '%s' \"$ICBODY\" | grep -qF -- '- [ ]'; then\n      IC_INPROGRESS=1\n      echo \"[$(date -u +%FT%TZ)] issue-comment is an in-progress checklist; still polling\"\n    fi\n  fi\n  if [ \"${R:-0}\" -gt 0 ] || [ \"${C:-0}\" -gt 0 ] || { [ \"${I:-0}\" -gt 0 ] && [ \"$IC_INPROGRESS\" -eq 0 ]; } || [ \"$E\" = '\"+1\"' ] || [ \"$E\" = \"+1\" ]; then\n    echo \"[$(date -u +%FT%TZ)] hit; fetching details\"\n    {\n      echo \"status=responded\"\n      echo \"trigger_ts=$TS\"\n      echo \"found_at=$(date -u +%FT%TZ)\"\n      echo \"review_count=$R\"\n      echo \"comment_count=$C\"\n      echo \"issue_comment_count=$I\"\n      echo \"reaction=$E\"\n      echo \"---comments---\"\n      gh api \"repos/$REPO/pulls/$PR/comments\" --jq \"[.[] | $BOTFILTER | select(.created_at > \\\"$TS\\\") | {user: .user.login, path, line, original_line, body}]\"\n      echo \"---reviews---\"\n      gh api \"repos/$REPO/pulls/$PR/reviews\" --jq \"[.[] | $BOTFILTER | select(.submitted_at > \\\"$TS\\\") | {user: .user.login, state, body, submitted_at}]\"\n      echo \"---issue_comments---\"\n      gh api \"repos/$REPO/issues/$PR/comments\" --jq \"[.[] | $BOTFILTER | select(.created_at > \\\"$TS\\\") | {user: .user.login, created_at, body}]\"\n    } > \"$RESULT\"\n    # \"Clean\" detection paths (bot signals):\n    # 1. \U0001F44D reaction on the trigger with no line-anchored reviews/comments\n    # 2. Top-level issue comment with no line-anchored findings\n    #    (a bot posts a top-level \"no issues\" comment when clean)\n    CLEAN=\"0\"\n    if { [ \"$E\" = '\"+1\"' ] || [ \"$E\" = \"+1\" ]; } && [ \"${R:-0}\" -eq 0 ] && [ \"${C:-0}\" -eq 0 ]; then\n      CLEAN=\"1\"\n    fi\n    if [ \"${I:-0}\" -gt 0 ] && [ \"${R:-0}\" -eq 0 ] && [ \"${C:-0}\" -eq 0 ]; then\n      CLEAN=\"1\"\n    fi\n    if [ \"$CLEAN\" = \"1\" ]; then\n      notify \"codex-watch [$REPO#$PR]\" \"clean review (no findings)\" \"Glass\"\n    else\n      TOTAL=$(( ${R:-0} + ${C:-0} + ${I:-0} ))\n      notify \"codex-watch [$REPO#$PR]\" \"$TOTAL response(s) — read $RESULT\" \"Glass\"\n    fi\n    exit 0\n  fi\n  [ \"$i\" -lt 10 ] && sleep 180\ndone\necho \"status=timeout\" > \"$RESULT\"\necho \"trigger_ts=$TS\" >> \"$RESULT\"\necho \"[$(date -u +%FT%TZ)] timeout\"\nnotify \"codex-watch [$REPO#$PR]\" \"timeout after ~30 min, no review response\" \"Basso\"\n```\n\n> **Known caveat — claude[bot] progress checklist.** When `claude-review.yml`\n> is also active, claude[bot] posts a *progress checklist* as a top-level\n> issue comment seconds after the trigger, then edits it as it works. The hit\n> gate guards against this: an issue-comment-only signal whose body still has an\n> unchecked `- [ ]` box is treated as in-progress and the watcher keeps polling\n> (a finished verdict has only `- [x]`, and codex posts no checklist). This\n> matters for automated readers (e.g. pr-steward) that parse the result file\n> rather than eyeballing it — without the guard every tick would misread the\n> checklist as a clean review.\n\nSave with `chmod +x /tmp/codex-watch.sh`.\n\n### macOS notification permission\n\n`notify` calls `osascript -e 'display notification ...'` — best-effort, fails silently if unavailable. On first use, macOS may prompt for notification permission for the parent terminal/process. If the user reports \"I don't see notifications\", point them to `System Settings → Notifications` and look for the host app (Terminal, iTerm2, Script Editor depending on which process invoked osascript). The result file still gets written either way; OS notification is the convenience layer, not the source of truth.\n\n## Launch a watcher\n\nFor each PR (`<owner>/<repo>` and `<N>`), in a single Bash call:\n\n```bash\nnohup /tmp/codex-watch.sh <owner>/<repo> <N> \\\n  /tmp/codex-watch-<repo-stem>-<N>.result \\\n  /tmp/codex-watch-<repo-stem>-<N>.log \\\n  >/dev/null 2>&1 &\nPID=$!\ndisown $PID 2>/dev/null\necho \"watcher pid=$PID\"\n```\n\n`<repo-stem>` = repo name without owner (e.g. `mctl-openclaw`). Multiple PRs ⇒ launch each in its own `nohup ... &` invocation, all in parallel from a single Bash call.\n\n## Reading results\n\nWhen the user later asks \"did codex respond yet?\" or similar, just `Read` the `.result` file:\n\n- If the file does not exist yet → watcher still polling. `Read /tmp/codex-watch-<stem>-<N>.log` for current tick number to estimate.\n- If file contents start with `status=responded` → parse and report findings (Format A).\n- If `status=timeout` → Format C.\n- If contents say \"no @claude/@codex review trigger comment found\" → Format B-ish but with no-trigger explanation.\n\n## Output formats (when reporting to the user)\n\n  Format A — findings:\n\n    [claude] <repo>#<N>: K findings (X P1, Y P2, Z P3)\n    https://github.com/<repo>/pull/<N>\n    - Pn {file}:{line} — {one-line summary}\n    ...\n\n  Format B — clean (no findings, signaled by either \U0001F44D reaction or a top-level issue comment from claude[bot] with no line-anchored comments/reviews):\n\n    [claude] <repo>#<N>: clean review (no findings)\n    https://github.com/<repo>/pull/<N>\n\n  Format C — timeout (~30 min, claude[bot] never responded):\n\n    [claude] <repo>#<N>: no claude review response after ~30 min\n    Trigger: <trigger_ts>\n    Re-post @claude review or check repo settings.\n\nSeverity parsing: claude[bot] prefixes each finding's body with a markdown badge `![P2 Badge](...)` — extract the `P0` / `P1` / `P2` / `P3` token. If absent, mark as `P?`.\n\nOne-line summary per finding: take the first **bold heading** (between `**`) from the comment body and trim to ~80 chars. Do NOT include the explanatory paragraph or full body — the user clicks into the PR for full context.\n\n## Multiple PRs\n\nSingle Bash call launching multiple `nohup` background processes is fine — each `&` detaches, each runs independently with its own result/log path.\n\n## Argument parsing\n\nAccepted forms from the user:\n- `mctlhq/mctl-openclaw#5`\n- `https://github.com/mctlhq/mctl-openclaw/pull/5`\n- `5` (only if the user has just opened exactly one PR in conversation context — pick the most recent)\n\nIf args are ambiguous, ask which PRs in one short AskUserQuestion before launching.\n\n## Operational notes\n\n- The detached shell uses `nohup` + `disown` + stdout/stderr redirection — it survives Claude Code session boundaries. A future session can read the result file and report.\n- Codex usually responds within 1–5 minutes of `@claude review`. The 180s tick cadence catches it within the next tick. Sometimes codex takes 5–15 min when busy.\n- Result-file path convention: `/tmp/codex-watch-<repo-stem>-<N>.result` — keep this stable so future sessions can find it without args.\n- If `gh api` returns 403/404, the watcher writes a status-error result and exits. No retries — auth/permission issues won't fix themselves.\n- The first `@claude review` issue comment is the trigger baseline. If the user re-triggers (posts `@claude review` again after a fix-up), launch a new watcher — the script's baseline-detection `last` filter picks up the latest trigger automatically.\n\n## What this skill is NOT for\n\n- One-shot \"check codex now\" — for that, just call `gh api` directly. This skill is for the wait-and-notify case.\n- Reviews from bots other than `claude[bot]` / `chatgpt-codex-connector[bot]` (Gemini, etc.) — add the login to `BOTFILTER` in the script. For an entirely different review surface, write a sibling skill.\n- Long-term watching across multiple `@claude review` retries — re-launch after each new trigger.\n\n## Anti-patterns (do not regress)\n\n1. **`Agent` + `Monitor` tool**: sub-agent runtime treats Monitor as fire-and-forget and exits in seconds without waiting. Always use detached shell instead.\n2. **Synchronous Bash in foreground**: blocks the user's session for up to 30 min, defeats the \"background\" goal. Always `nohup ... &` + `disown`.\n3. **Polling without baseline timestamp**: if you check `pulls/<N>/reviews` without filtering by `> $TRIGGER_TS`, you'll match codex's previous (pre-fixup) review and falsely report \"responded\" immediately. Always filter by the latest `@claude review` issue-comment timestamp.\n"
