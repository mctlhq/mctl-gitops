    ## State file

    Persistent state в `/home/node/.openclaw/workspace/state/eth-trading-intel.json`. Schema v2:

    ```json
    {
      "schema": 2,
      "watchlist": [
        { "symbol": "BTC", "threshold": 75, "direction": "both", "added_at": "2026-05-05T12:34:56Z" },
        { "symbol": "ETH", "threshold": 70, "direction": "long", "added_at": "2026-05-05T12:35:01Z" }
      ],
      "threshold": 70,
      "last_signal": {
        "symbol": "BTC",
        "snapshot": {},
        "rendered": "Long Watch · conviction medium · 78/22 ...",
        "at": "2026-05-05T12:34:56Z"
      }
    }
    ```

    - `threshold` (top-level, integer) — **global default** для new entries и для `/scan` если у entry нет своего; диапазон [50, 95].
    - `watchlist[]` — массив объектов. Поля:
      - `symbol`: uppercase futures coin (validate via cached `get_futures_supported_coins`)
      - `threshold`: integer [50, 95] — per-symbol override
      - `direction`: `"long" | "short" | "both"` — какая сторона score должна cross-нуть для signal
      - `added_at`: ISO-8601
    - `last_signal` — full normalized snapshot + rendered text (для `/last` и `/why` без re-running pipeline). Ключ `snapshot` без `raw_sources` (strip перед persist; raw_sources только в памяти агента в течение запроса).

    Read: `cat /home/node/.openclaw/workspace/state/eth-trading-intel.json 2>/dev/null || echo '{}'`.

    Write: `mkdir -p /home/node/.openclaw/workspace/state && echo '<json>' > /home/node/.openclaw/workspace/state/eth-trading-intel.json`.

    s3-sync sidecar мирорит `/home/node/.openclaw/` в S3 каждые 10s — состояние переживает pod restart.

    ### Watchlist migration shim (schema 1 → 2)

    При **первом** read state файл может быть в schema 1 (legacy):

    ```json
    { "watchlist": ["BTC", "ETH"], "threshold": 70, ... }
    ```

    Procedure:
    1. Если `state.schema` отсутствует ИЛИ `state.watchlist[0]` is string → migrate.
    2. Для каждой string-entry promote в `{ symbol: <string>, threshold: state.threshold, direction: "both", added_at: <now> }`.
    3. На любой malformed entry (lowercase symbol, non-string, missing fields) — НЕ throw; reset эту entry в default `{ symbol: "<best-guess upper>", threshold: state.threshold, direction: "both", added_at: <now> }`. Если symbol invalid — drop entry, добавить лог в `missing_data: ["malformed_watchlist_entry: <raw>"]`. Никогда не убивать весь watchlist.
    4. Set `state.schema = 2`. Persist обновлённый state.

    Validation для new entries (`/watch SYMBOL [N] [direction]`):
    - symbol: upper-case, в supported list (cached via `get_futures_supported_coins`)
    - threshold: integer [50, 95], default = `state.threshold`
    - direction: ∈ {long, short, both}, default = `both`
    - dedup: если symbol уже в watchlist — replace entry (не add duplicate)

    ## Snapshot pipeline (`/eth`, `/btc`, `/sol`)

    Параллельные tool calls (1 round trip). Все интервалы — `4h` (HOBBYIST). Все вызовы через `coinglass__<tool>`:

    1. `get_futures_price_history({exchange: "Binance", symbol: "ETHUSDT", interval: "4h", limit: 24})` — OHLCV для current price + 24h-equivalent volatility window. Заменяет `coins_markets` (locked на HOBBYIST). Note: `symbol` here = pair (`ETHUSDT`), not coin (`ETH`).
    2. `get_futures_aggregated_open_interest_history({symbol: "ETH", interval: "4h", limit: 12})` — OI delta 4h/12h/24h (12 bars × 4h = 48h окно)
    3. `get_futures_funding_rate_oi_weight_history({symbol: "ETH", interval: "4h", limit: 12})` — funding trajectory
    4. `get_futures_global_long_short_account_ratio_history({exchange: "Binance", symbol: "ETHUSDT", interval: "4h", limit: 6})` — retail bias
    5. `get_futures_top_long_short_position_ratio_history({exchange: "Binance", symbol: "ETHUSDT", interval: "4h", limit: 6})` — top trader bias
    6. `get_futures_aggregated_liquidation_history({symbol: "ETH", exchange_list: "Binance,OKX,Bybit", interval: "4h", limit: 12})` — recent liq waves
    7. `get_futures_aggregated_cvd_history({symbol: "ETH", exchange_list: "Binance,OKX,Bybit", interval: "4h", limit: 12, unit: "usd"})` — taker imbalance
    8. `get_futures_rsi_list({sort_by: "rsi_4h", limit: 300})` — **SKIP in default `/eth` / `/btc` / `/sol` pipeline.** Call only from `/rsi SYMBOL` or `/pulse` explicit commands. Append `coinglass_rsi_list_skipped` to `missing_data` (no penalty — cross-check only, local Bybit is source of truth).
    9. `get_futures_macd_list({sort_by: "macd_4h", limit: 300})` — **SKIP in default pipeline.** Call only from `/macd SYMBOL` explicit command. Append `coinglass_macd_list_skipped` to `missing_data` (no penalty).
    10. **Symbol-gated ETF flow call** — feeds the ETF bonus in scoring:
        - `BTC` → `get_bitcoin_etf_flow_history({limit: 7})`
        - `ETH` → `get_ethereum_etf_flow_history({limit: 7})`
        - any other symbol (SOL etc.) → **skip the call**, append `<symbol>_etf_flow_unavailable` to `missing_data`. No penalty (bonus, не основа).

    **Steps 11–12 — local indicator engine (Phase 1.6, public REST, no CoinGlass dep):**

    11. **Bybit kline × 5 TF** для symbol pair `<SYMBOL>USDT`. Параллельно (5 GET-запросов на api.bybit.com), 200 свечей каждый:
        - `interval=15` → RSI(14) 15m
        - `interval=60` → RSI(14) 1h, MACD(12,26,9) 1h
        - `interval=240` → RSI(14) 4h, MACD(12,26,9) 4h, ADX(14) 4h
        - `interval=720` → RSI(14) 12h
        - `interval=D` → RSI(14) 1d, MACD(12,26,9) 1d
    12. **CVD 24h leg #1 — Binance kline** `interval=4h&limit=6` для same `<COIN>USDT` pair → per-candle delta_quote = `(2 * taker_buy_base − volume_base) * close`; sum по 6 свечам = 24h Binance CVD.
    13. **CVD 24h leg #2 — OKX (Phase 2 Hook A)** для same coin → три параллельных GET:
        - `https://www.okx.com/api/v5/rubik/stat/taker-volume-contract?instId=<COIN>-USDT-SWAP&period=4H` → 100 баров `[ts, buyVol, sellVol]`, взять последние 6 для 24h окна.
        - `https://www.okx.com/api/v5/public/instruments?instType=SWAP&instId=<COIN>-USDT-SWAP` → `data[0].ctVal` (контрактный размер в base coin; для ETH-USDT-SWAP сейчас `0.1`). Кэшировать на длительный срок — меняется крайне редко.
        - `https://www.okx.com/api/v5/market/candles?instId=<COIN>-USDT-SWAP&bar=4H&limit=100` → 4h klines с close-ценой (поле index 4). **OKX-родной price source — независим от Binance.** Это даёт `okx_only` ветке агрегата (Binance unreachable) реально вычислимый USD delta.
        - Per-bar pricing rule + cross-venue price sanity check — см. `### Local indicators (Phase 1.6)` выше (одна canonical формулировка).
    14. **CVD 24h legs #3+#4 — Bybit + Bitget (Phase 2 Hook B)** через in-cluster `trading-data` MCP. Параллельно с шагами 12-13 (один round trip):
        - `trading-data__bybit_taker_24h({symbol: "<COIN>USDT"})` → `{data: {buy_vol_quote, sell_vol_quote, net_quote, last_close_price, ...}, meta: {window_age_sec, window_incomplete, source: "bybit_v5_publictrade_ws"}}`. Если `meta.window_incomplete == true` (первый час после рестарта pod-а) — leg помечается incomplete и не идёт в N-leg cascade; append `bybit_window_incomplete` в `missing_data`. Если tool возвращает `error` — leg в `null`, append `bybit_taker_unreachable`.
        - `trading-data__bitget_taker_24h({symbol: "<COIN>USDT", productType: "USDT-FUTURES"})` → аналогичная shape; те же window_incomplete / null правила, code `bitget_window_incomplete` / `bitget_taker_unreachable`.
        - Денежная единица `net_quote` — USDT (для USDT-perp пар), эквивалент USD; кладём напрямую в `cvd_24h.per_exchange.{bybit, bitget}` без дополнительного перевода.
    15. **News sentiment (Phase 2 Hook B)** — `trading-data__news_recent({categories: ["<COIN>"], hours_back: 2, max: 10})` через in-cluster `trading-data` MCP (CryptoCompare News v2 free-tier, 5-минутный TTL cache в сервисе, ~100K calls/мес). Источник: `cryptocompare_news_v2`. **GATE: ONLY for BTC and ETH. For all other symbols (SOL, ARB, etc.): DO NOT call this tool** — CryptoCompare coverage for alts is sparse and unreliable. Append `<symbol>_news_unavailable` to `missing_data` immediately, **без penalty** (bonus signal, не core).
        - Для каждого `item` LLM оценивает impact 1-10 на основе `title` + `body_excerpt` + `categories`/`tags`: ETF/SEC/SEC-action/hardfork/Fed-rate = 8-10; major exchange listing/upgrade = 6-7; alt-news/aggregated price commentary = 3-5; promo/sponsored = 1-2 (фильтр уже на стороне сервиса через default `excludeCategories=["Sponsored"]`). Aggregate в `news.score = max(impact)`, `news.high_impact_count = sum(impact ≥ 7)`, `news.top_titles = top-3 by impact`.
        - Если `news.score >= 8` И direction (bullish/bearish) ясно из контента — append соответствующий `+5` бонус long-side или short-side score (см. scoring rubric). На split direction (равноценные bull+bear новости) или ambiguous content — без бонуса, only `risks: ["news mixed: <top headline>"]`.
    16. **CVD aggregation (Phase 2 Hook B):** строим `cvd_24h.per_exchange = { binance: <usd|null>, okx: <usd|null>, bybit: <usd|null>, bitget: <usd|null> }`. Определяем set usable legs (см. N-leg cascade в `### Local indicators`). `cvd_24h.net_usd = sum(usable legs)`. Применяем cascade для `agreement` + `direction`. На `"split"` — append `risks: ["cvd source split: <breakdown по venue>"]`. На `"all_zero"` — append `risks: ["cvd all zero: ..."]`. Source string собирается из usable legs: `"binance_taker_buy_24h+okx_rubik_taker_volume_24h+bybit_publictrade_ws+bitget_publictrade_ws"` (joined по `+`, только usable).
    17. **Onchain gas snapshot (Phase 2 Hook B follow-up)** — `trading-data__etherscan_gas_snapshot()` через in-cluster `trading-data` MCP (Etherscan V2 multichain `gastracker.gasoracle` free-tier, 15s TTL cache в сервисе, ~100K calls/day). Возвращает `{safe_gwei, standard_gwei, fast_gwei, suggest_base_fee_gwei, gas_used_ratio}` (последний — comma-separated string из 5 ratios последних блоков). **GATE: ONLY for ETH. For `/btc`, `/sol`, and all other symbols: DO NOT call this tool** — gas is ETH L1 network state and meaningless for L1-agnostic assets. Append `<symbol>_gas_irrelevant` to `missing_data` (no penalty; gas не модель price-action на L1-агностичных активах).
        - Для ETH bonus используется `standard_gwei` (середина oracle). Если tool возвращает `error` (Etherscan rate limit / NOTOK) → leg `null`, append `etherscan_gas_unreachable` в `missing_data` без penalty (bonus, не основа).

    Если Bybit/Binance kline unreachable (steps 11-12) → append `bybit_kline_unreachable` / `binance_kline_unreachable` к `missing_data`, индикаторы помечаются `null`. Если `trading-data` MCP вообще недоступен (e.g. pod down, network policy) → оба `bybit_taker_unreachable` + `bitget_taker_unreachable` в `missing_data`, `cvd_24h.per_exchange.{bybit,bitget}=null`, `news_unavailable` если step 15 тоже отвалится, и `etherscan_gas_unreachable` для step 17 — pipeline продолжается на Binance + OKX legs (graceful degradation на 2 venues, что было статусом Hook A). Если все 4 CVD legs недоступны → `cvd_24h = null`, `missing_data: ["cvd_unreachable"]`. CoinGlass `get_futures_rsi_list` / `get_futures_macd_list` (steps 8-9) — secondary; используются для cross-check warning, не для scoring.

    **Удалены из pipeline (HOBBYIST tier-locked):**
    - `get_futures_coins_markets` — заменён на `get_futures_price_history` step 1
    - `get_futures_liquidation_max_pain` — max-pain cluster scoring component удалён; его заменяет `liquidation_history` analysis (см. Long score components)
    - Hyperliquid whale positions — удалён из `/risk` output (раньше упоминался)

    Дальше — normalize + score + format.

