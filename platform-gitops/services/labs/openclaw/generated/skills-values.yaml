    **Gas bucket mapping** (используется в scoring и в risks):
    - `standard_gwei < 5` → `"ultra_low"` — типичная нейтральная ситуация L1 затихания, no bias
    - `5 <= standard_gwei < 15` → `"low"` — нормальный пост-rollup активный режим, no bias
    - `15 <= standard_gwei < 30` → `"normal"` — средний фон, no bias
    - `30 <= standard_gwei < 60` → `"elevated"` — растущий on-chain demand, **+5 short_score bonus** (см. scoring rubric); risks: `["gas elevated: standard_gwei=<X>"]`
    - `standard_gwei >= 60` → `"congested"` — сильный stress на L1, **+10 short_score bonus** (заменяет +5 при elevated); risks: `["gas congested: standard_gwei=<X> — historical correlate с capitulation/forced unwinds"]`

    Логика: высокий gas коррелирует с активным forced movement on-chain (whales moving to exchanges, MEV-активная среда, liquidation cascades) — это исторически бычий сигнал для шортов в коротком таймфрейме. Эффект слабее для BTC/SOL (другие L1), поэтому bonus применяется ТОЛЬКО для ETH symbol.

    ### Directional scoring (НЕ scalar 0-100)

    Output: `{long_score, short_score, regime, conviction, reasons, risks, missing_data, bias, action}`. Both scores sum components then `min(sum,100)`.

    **Long: +20 MACD.up, +15 RSI[40,65], +15 OI.up(4h+12h), +10 funding≤0.01, +15 liq.long>short×1.5, +10 retail<1.2+top>1, +15 CVD.buy, +10 ETF.in(BTC/ETH), +5 RSI.confluence, +5 MACD.align, +5 news.bull.**

    **Short: +20 MACD.down, +15 RSI[35,60], +15 OI.up(bear)+price.down, +10 funding>0.03, +15 liq.short>long×1.5, +10 retail>1.5+top<1, +15 CVD.sell, +10 ETF.out, +5 RSI.confluence, +5 MACD.align, +5 news.bear, +5/10 gas.high(ETH).**

    **Penalties: -10 per missing core, -5 per missing bonus, -15 RSI↔MACD contradiction, -10 price stale (>30m).**

    **Regime: ADX≥25+OI.match→trend; ADX<20→range; else→transition. Fallback: RSI[45,55]+vol<2%→range; MACD.abs+OI.match→trend; else→transition. Strength: <20 weak, 20-40 moderate, ≥40 strong.**

    **Conviction: gap≥30+regime≠transition→high; gap[15,30)→medium; else→low.**

    **Bias: both≥threshold+gap≥15→contested; both≥threshold+gap<15→mixed; long≥threshold→long.watch; short≥threshold→short.watch; else→no.edge.**

    ### Output format

    Snapshot output всегда на русском — single-language contract зафиксирован в `## Output language` выше (этот раздел — канонические русские лейблы для bias / regime / conviction, не повторение языкового правила).

    Bias mapping → русские значения (используются в строке `Bias:` snapshot output):

    | Внутренний код        | Русский лейбл                             |
    |-----------------------|-------------------------------------------|
    | `Long Watch`          | `Лонг (наблюдение)`                       |
    | `Short Watch`         | `Шорт (наблюдение)`                       |
    | `Long Watch (contested)` | `Лонг (наблюдение, оспаривается)`     |
    | `Short Watch (contested)`| `Шорт (наблюдение, оспаривается)`     |
    | `Mixed (both elevated)` | `Смешанные сигналы (оба повышены)`     |
    | `No edge`             | `Нет преимущества`                        |

    Regime: `trend` → `тренд`, `range` → `флэт`, `transition` → `переход`.

    Conviction: `low` → `низкая`, `medium` → `средняя`, `high` → `высокая`.

    ```
    ETH снапшот (2026-05-05 12:34 UTC)
    Bias: Лонг (наблюдение)
    Лонг скор: 78 / Шорт скор: 22
    Уверенность: средняя  Режим: тренд

    Сильные стороны лонга:
    1. OI растёт на 4h и 12h, +1.2%/+3.1%
    2. MACD 4h положительный и растёт
    3. CVD: байеры доминируют, +$8.5M за 24h
    4. Ликвидации лонгов $45M vs шортов $22M — сетап на шорт-сквиз
    5. Top traders position ratio 1.10 vs retail 1.85 — крупняк на стороне лонга

    Риски:
    1. RSI 4h = 58, средний диапазон; запас импульса ограничен
    2. Funding 0.012% — нейтральный, но растёт

    Действие:
    Наблюдение за лонг-сетапом; только ручной разбор. Это наблюдение, не финансовая рекомендация. Без автоматических сделок.
    ```

    **Missing data block — рендерить ТОЛЬКО если `missing_data` непустой массив.** Если все источники отдали данные — секцию не показывать вообще (старая практика "Missing data: None" — это шум). Когда есть пропуски:

    ```
    Пропущенные данные:
    - liquidation_map_tier_locked
    - bybit_kline_unreachable
    ```

    Если `bias == "Нет преимущества"` — тот же layout, заменить блок "Сильные стороны ..." на: `Нет актуального сетапа. Рынок во флэте, индикаторы смешанные.` + `Причины:` (1-3 пункта почему bias `No edge`). Блоки `Риски:` и `Действие:` пропустить.

    ### Phrasing guardrails

    **ЗАПРЕЩЕНО** (любой язык): "BUY/SELL NOW", "open/go long/short", "ПОКУПАЙ"/"ПРОДАВАЙ", "вставай в лонг/шорт", обещания цены/направления, советы про размер позиции/плечо, "guaranteed"/"гарантированно"/"100%"/"отличный вход".

    **РАЗРЕШЕНО**: "наблюдение за лонг/шорт-сетапом", "возможный сквиз", "ручной разбор", "ждать ретест/подтверждение", "не догонять", "преимущества нет", "крупняк на стороне X", "флэт без направления".

    (Английские фразы вида "watch long setup" / "no edge detected" заблокированы языковым контрактом — command-level outputs русско-только, см. `## Output language` выше; в 5 fixed-message branch-ах английская версия зафиксирована inline в RU/EN формате.)

    Каждый snapshot завершается дисклеймером: `Это наблюдение, не финансовая рекомендация. Без автоматических сделок.`

    ## Multi-symbol scan (`/scan`)

    1. Read state.watchlist (после migration shim — массив объектов). Если пуст — default `[{symbol:"BTC",threshold:state.threshold,direction:"both"},{symbol:"ETH",...},{symbol:"SOL",...}]`.
    2. Параллельно вызвать snapshot pipeline для каждого entry.
    3. **Per-entry filter**:
       - `direction == "long"` → крест если `long_score >= entry.threshold`
       - `direction == "short"` → крест если `short_score >= entry.threshold`
       - `direction == "both"` → крест если `max(long_score, short_score) >= entry.threshold`
    4. Output — компактный список с per-symbol threshold отметкой:

    ```
    Scan results:
    - ETH (≥70 long): Лонг (наблюдение), 78/22, уверенность средняя  → /eth для деталей  ✓ crossed
    - BTC (≥75 both): Нет преимущества, 41/38, уверенность низкая  · ниже порога
    - SOL (≥70 both): Шорт (наблюдение), 18/72, уверенность высокая  → /sol для деталей  ✓ crossed
    ```

    Если ничего не прошло — fixed message (на языке запроса):
    - RU: `Ни один символ не пересёк порог. Понизь через /watch SYMBOL N или /set_threshold.`
    - EN: `No symbols crossed their thresholds. Lower with /watch SYMBOL N or /set_threshold.`

