    ### Local indicators (Bybit V5 + Binance public REST) — Phase 1.6

    Public, без auth, без CoinGlass tier-gate. Приоритет — local; CoinGlass `get_futures_rsi_list` / `get_futures_macd_list` остаются как cross-check, не как источник истины. Это закрывает Missing data ("RSI 4h", "MACD 4h", "aggregated CVD"), которые на HOBBYIST приходили `tier-locked`/`No content`.

    **Endpoints (никаких ключей, GET, JSON):**
    - Bybit V5 kline: `GET https://api.bybit.com/v5/market/kline?category=linear&symbol=<PAIR>&interval=<I>&limit=200`
      - `interval`: `15` (15m), `60` (1h), `240` (4h), `720` (12h), `D` (1d). Возвращает массив (newest-first; всегда reverse в oldest-first перед расчётом).
      - Pair format: `<COIN>USDT` (например `ETHUSDT`, `BTCUSDT`, `SOLUSDT`).
      - Rate limit: 600 req / 5 sec на IP.
    - Binance kline (CVD leg #1, 50%+ глобального ETH-perp объёма): `GET https://api.binance.com/api/v3/klines?symbol=<PAIR>&interval=4h&limit=6`
      - Индекс 9 в каждой строке = `taker_buy_base_asset_volume`. Per-candle delta_quote ≈ `(2 * taker_buy_base − volume_base) * close`. Сумма по 6 свечам = 24h CVD.
    - **OKX V5 taker-volume (CVD leg #2, Phase 2 Hook A):** три параллельных GET (все public, no auth, no rate-limit gate):
      - `https://www.okx.com/api/v5/rubik/stat/taker-volume-contract?instId=<COIN>-USDT-SWAP&period=4H` → 100 баров `[ts, buyVol, sellVol]`. Объёмы — в **контрактах**, не в base asset.
      - `https://www.okx.com/api/v5/public/instruments?instType=SWAP&instId=<COIN>-USDT-SWAP` → `data[0].ctVal` (контрактный размер в base coin; для ETH-USDT-SWAP сейчас `0.1` ETH; кэшировать на длительный срок — меняется крайне редко). `ctValCcy` обязан быть равен base coin (защитный assert).
      - `https://www.okx.com/api/v5/market/candles?instId=<COIN>-USDT-SWAP&bar=4H&limit=100` → 4h klines с close-ценой (поле `[4]`). **OKX-родной price source — независим от Binance.** Это даёт `okx_only` ветке (см. agreement cascade ниже) реально вычислимый USD delta когда Binance unreachable.
      - **Per-bar pricing rule (важно):** для каждого OKX taker-volume бара брать matching close из **OKX market/candles** по timestamp bucket (`floor(ts / 14_400_000) * 14_400_000`, оба endpoints UTC-aligned 4h). Per-bar delta_usd = `(buyVol − sellVol) * ctVal * okx_close_at_that_bar`. Это и решает codex-finding "single close vs per-bar drift" (sign может flip при дрифте цены), и оставляет `okx_only` достижимым когда Binance leg падает.
      - **Cross-venue price sanity check:** если OKX close vs Binance close на одном и том же ts расходятся >2% → append `risks: ["okx/binance price spread >2% at <ts>: $<okx>, $<binance>"]`. Реальный price spread на perp ETH между биржами обычно <0.1%; >2% означает либо stale data на одной из бирж, либо аутентичный venue dislocation (важный сигнал для оператора).
      - Если кол-во баров OKX taker-volume и OKX candles не совпадает (rubik отдал меньше 6 свежих или timestamps смещены): сматчить по той же `bucket_ts` формуле, пары без обоих источников пропустить.
      - Pair-format: `<COIN>-USDT-SWAP` (отличается от Bybit/Binance `<COIN>USDT`).
      - **Все три OKX endpoint требуют `User-Agent` header** (без UA — 403). Любой не-пустой UA подходит (`labs-trading-intel/1.0` — конвенция). Validated live 2026-05-06.

    **Computed fields:**
    - RSI(14) — Wilder's smoothing — TFs: 15m, 1h, 4h, 12h, 1d
    - MACD(12, 26, 9) — `macd`, `signal`, `hist`, `rising` — TFs: 1h, 4h, 1d
    - Bollinger(20, 2σ) — `upper`, `mid`, `lower`, `percent_b`, `width_pct` — TFs: 1h, 4h
    - ADX(14) — Wilder's — `adx`, `plus_di`, `minus_di`, `trend_strength` bucket — TF: 4h
    - CVD 24h (Phase 2 Hook A — multi-exchange): `cvd_24h.net_usd` = sum(per-exchange deltas) для **Binance + OKX**. Per-exchange разбивка хранится в `cvd_24h.per_exchange`. Source: `binance_taker_buy_24h+okx_rubik_taker_volume_24h`. Bybit и Bitget — в Phase 2 Hook B.

    **Cross-check rule:** если CoinGlass отдал валидный ответ от `get_futures_rsi_list` / `get_futures_macd_list` И local расчёт расходится >5 пунктов (RSI) / >15% (MACD) — append `risks: ["rsi_4h source disagreement: local 54, coinglass 61"]`. Это страхует от тихих багов в локальной формуле; но score считается по local значениям.

    **CVD source-agreement rule (Phase 2 Hook A) — exhaustive enum:**

    `cvd_24h.agreement` всегда обязан присутствовать в snapshot output. Правила (применять в порядке, первое совпадение выигрывает):

    1. `binance == null` (unreachable) AND `okx != null` → `agreement = "okx_only"`
    2. `okx == null` AND `binance != null` → `agreement = "binance_only"`
    3. `binance == null` AND `okx == null` → `cvd_24h = null` целиком, `missing_data: ["cvd_unreachable"]`, дальше скип секции
    4. `binance == 0` AND `okx == 0` → `agreement = "both_zero"`, `direction = "balanced"`
    5. `binance == 0` XOR `okx == 0` (ровно одна сторона ноль, другая non-zero) → `agreement = "partial_zero"`, направление от non-zero стороны (`direction = sign(non_zero) > 0 ? "buyers_dominant" : "sellers_dominant"`)
    6. `sign(binance) == sign(okx)` (оба non-zero, знаки совпадают) → `agreement = "aligned"`, увереннее CVD-сигнал
    7. `sign(binance) != sign(okx)` (оба non-zero, противоположные знаки) → `agreement = "split"` И append `risks: ["cvd source split: binance <sign>$<X>M, okx <sign>$<Y>M — directional pressure не подтверждается между биржами"]`

    Каскад покрывает всё пространство `(binance ∈ {null, <0, 0, >0}) × (okx ∈ {null, <0, 0, >0}) = 16` сочетаний. Score-компоненты CVD остаются на агрегированном `net_usd`, но split/zero-warnings дают оператору сигнал что между биржами происходит арбитраж/decoupling/пустой период.

    **Multi-exchange CVD aggregation status:**
    - ✅ **Binance** (Phase 1.6) — kline taker_buy_base в индексе 9.
    - ✅ **OKX** (Phase 2 Hook A, ~75% global perp ETH вместе с Binance) — `rubik/stat/taker-volume-contract` + `public/instruments` для ctVal.
    - ⏳ **Bybit + Bitget** — Phase 2 Hook B (`labs-trading-data` сервис со stateful WS-стрим). Bybit V5 не отдаёт `taker_buy_volume` в kline и публичного historical-trade endpoint нет; recent-trade покрывает только последние ~минуты. Bitget V2 не имеет публичного taker-volume endpoint вообще (probed 5 candidates, все 404 — см. memory `reference_multi_exchange_taker_endpoints.md`).

