    ## Why command (`/why`)

    1. Read `state.last_signal`.
    2. Если `null` — fixed message (на языке запроса):
       - RU: `Сигналов в памяти нет. Сначала запусти /eth, /btc, /sol или /scan.`
       - EN: `No signal in memory yet. Run /eth, /btc, /sol, or /scan first.`
    3. Если есть — расписать:
       - Bias decision: какое правило bias-mapping сработало (1-5)
       - Long score breakdown: какие компоненты дали `+N` и почему (referencing `state.last_signal.snapshot` data)
       - Short score breakdown: то же
       - Penalties applied
       - Missing data + impact на penalty

    Read schema:
    - `state.last_signal.snapshot` — full normalized object (OI/funding/L-S/liq/RSI/MACD/CVD/ETF)
    - `state.last_signal.rendered` — original output text для context
    - `state.last_signal.at` — timestamp

    ## Watchlist commands

    `/watch SYMBOL [N] [direction]`:

    Form rules:
    - `/watch BTC` — legacy short form: threshold = `state.threshold` (global), direction = `both`
    - `/watch BTC 80` — threshold-only: direction = `both`
    - `/watch BTC 75 long` — full: per-symbol threshold + direction filter

    Procedure:
    1. Read state. Run watchlist migration shim if schema 1.
    2. Parse args. Validate symbol (uppercase, in cached supported list); threshold ∈ [50, 95]; direction ∈ {long, short, both}.
    3. Build entry: `{symbol, threshold: <parsed-or-default>, direction: <parsed-or-"both">, added_at: <ISO-now>}`.
    4. Dedup: если symbol уже в watchlist — заменить existing entry, не добавлять второй.
    5. Write state.
    6. Confirmation (русский, single-language contract): `Добавлено ETH (порог 75, направление long). Список наблюдения: BTC (75 both), ETH (75 long), SOL (70 both).`

    `/unwatch SYMBOL`:
    1. Read state, remove entry с matching symbol (любая direction/threshold).
    2. Write.
    3. Confirmation (русский): `Удалено ETH. Список наблюдения: BTC (75 both), SOL (70 both).`

    ## Settings commands

    `/settings`:

    ```
    Список наблюдения:
    - BTC: порог 75, направление both
    - ETH: порог 75, направление long
    - SOL: порог 70, направление both
    Глобальный порог: 70

    Последний сигнал: ETH Лонг (наблюдение) 78/22 в 2026-05-05 12:34 UTC
    ```

    `/set_threshold 75`:
    1. Validate 50 ≤ N ≤ 95. Reject (русский): `Порог должен быть в диапазоне [50, 95]. Получено: <N>.`
    2. Read state, update **global** `state.threshold` (НЕ модифицирует per-symbol overrides в watchlist[]).
    3. Write.
    4. Confirmation (русский): `Глобальный порог обновлён на 75. Per-symbol overrides сохранены: BTC 75, ETH 75, SOL 70.`

    Note: чтобы изменить per-symbol threshold — `/watch SYMBOL N [direction]` (replace existing entry).

    ## Single-dimension queries

    Lightweight commands для быстрого ad-hoc check одной метрики. Каждая делает 1-3 tool calls (vs 10 в full snapshot), не пишет `last_signal`, не считает scoring.

    ### `/help`

    Static text. Список всех 21 команд (16 base + 5 Phase 1.6 indicator commands) с usage и one-line описанием. Никаких CoinGlass calls. Категории и команды (на русском, single-language contract):
    - Торговля: /eth, /btc, /sol, /scan, /risk, /pulse, /funding, /oi, /etf, /why, /last
    - Индикаторы (Phase 1.6, local Bybit kline): /rsi, /macd, /bb, /adx, /heatmap
    - Список наблюдения: /watch, /unwatch, /settings, /set_threshold
    - Прочее: /help

    ### `/last`

    1. Read `state.last_signal`.
    2. Если `null` — вывод (на языке запроса):
       - RU: `Сигналов в памяти нет. Сначала запусти /eth, /btc, /sol или /scan.`
       - EN: `No signal in memory yet. Run /eth, /btc, /sol, or /scan first.`
    3. Если есть — render `state.last_signal.rendered` напрямую (text-блок). Plus header (русский, как и сам rendered): `Последний сигнал зафиксирован <state.last_signal.at>.`
    4. Никаких CoinGlass calls.

    ### `/funding SYMBOL`

    1. Validate symbol.
    2. Parallel:
       - `get_futures_funding_rate_oi_weight_history({symbol, interval: "4h", limit: 6})`
       - `get_futures_funding_rate_rank({type: "current"})` — для context "где этот symbol относительно top/bottom"
    3. Output:
       ```
       ETH funding (4h, OI-weighted)
       Текущий: 0.012% · Статус: нейтральный
       Траектория (24h, 6 баров): 0.008 → 0.011 → 0.012 → 0.014 → 0.012 → 0.012 (рост → плато)
       Ранг: #34 из 200 по текущему funding (середина)
       ```

    ### `/oi SYMBOL [tf]`

    Hybrid: без `tf` — CoinGlass aggregated 4h (широкая картина по ~10 биржам); с `tf ∈ {1h, 4h}` — Bybit V5 single-source (обходит HOBBYIST блок на интервалах <4h, но покрывает только Bybit ≈ 30% global perp OI).

    1. Validate symbol через cached `get_futures_supported_coins`.
    2. Если `tf` отсутствует → **branch A (CoinGlass aggregated, 4h)**:
       - Parallel:
         - `get_futures_aggregated_open_interest_history({symbol, interval: "4h", limit: 12})` — agg trend
         - Per-exchange split: 3 separate `get_futures_open_interest_history` calls для top exchanges (Binance, OKX, Bybit) с тем же interval
       - Output:
         ```
         ETH open interest (4h, aggregated ~10 бирж)
         Агрегат: $12.5B · 4h Δ: +0.4% · 12h Δ: +1.2% · 24h Δ: +3.1% → растёт
         По биржам (24h Δ):
           - Binance: $4.8B (+2.8%)
           - OKX: $2.1B (+4.5%)
           - Bybit: $3.2B (+1.9%)
         ```
    3. Если `tf` присутствует, но не равен `1h` и не равен `4h` → reject:
       - RU: `Поддерживаются только tf 1h и 4h для Bybit single-source. Без tf — CoinGlass aggregated.`
    4. Если `tf ∈ {1h, 4h}` → **branch B (Bybit V5 single-source)**:
       - Параметры: `tf=1h` → `intervalTime=1h`, kline `interval=60`, `limit=48`; `tf=4h` → `intervalTime=4h`, kline `interval=240`, `limit=24`.
       - Один параллельный fan-out из 2 публичных GET-запросов (no auth):
         - `https://api.bybit.com/v5/market/open-interest?category=linear&symbol=<SYMBOL>USDT&intervalTime=<tf>&limit=<N>` → `result.list[]` с полями `openInterest` (string, base coin units для linear контрактов) и `timestamp` (string ms).
         - `https://api.bybit.com/v5/market/kline?category=linear&symbol=<SYMBOL>USDT&interval=<I>&limit=<N>` → `result.list[]` 7-element строки, index 4 = close.
       - **Bybit возвращает newest-first → reverse оба массива в oldest-first** перед обработкой.
       - Match по timestamp bucket: `oi_usd[i] = float(oi_coins[i]) * float(close[i])`.
       - Deltas:
         - Для `tf=1h`: Δ1h (последние 1 бар), Δ4h (последние 4 бара), Δ24h (последние 24 бара).
         - Для `tf=4h`: Δ4h (последний 1 бар), Δ12h (последние 3 бара), Δ24h (последние 6 баров).
       - Trend zone по Δ24h: `< −2%` → `падает`, `[−2%, +2%]` → `боковик`, `> +2%` → `растёт`.
       - Output (одна форма, Δ-окна зависят от `tf`):
         ```
         ETH open interest <tf> (source: bybit)
         Bybit: $<usd_total>
         Δ <w1>:   <pct1>%
         Δ <w2>:   <pct2>%
         Δ 24h:   <pct24>% → <trend>
         ```
         Δ-окна: `tf=1h` → (Δ1h, Δ4h, Δ24h); `tf=4h` → (Δ4h, Δ12h, Δ24h). `trend ∈ {растёт, боковик, падает}` по Δ24h.
    5. Note (печатать в конце Bybit-вывода или в `/help`): Bybit single ≈ 30% global perp OI; используй `/oi SYM` (без tf) для полной aggregated картины, `/oi SYM 1h` — для short-term momentum без HOBBYIST 4h floor.

    ### `/etf SYMBOL`

    Symbol-gated:
    - `BTC` → `get_bitcoin_etf_flow_history({limit: 30})`
    - `ETH` → `get_ethereum_etf_flow_history({limit: 30})`
    - любой другой symbol → reject (на языке запроса):
      - RU: `ETF-данные на CoinGlass MCP доступны только для BTC и ETH. /etf SOL не поддерживается.`
      - EN: `ETF flow data only available for BTC and ETH on CoinGlass MCP. /etf SOL is not supported.`

    Output (BTC example):
    ```
    BTC ETF flows (последние 30 дней)
    Чистый итог: +$1.2B
    Последние 7 дней: +$245M (5 дней притока, 2 дня оттока)
    Свежий день (2026-05-04): +$32M
    Топ приток: 2026-04-28 ($95M)
    Топ отток: 2026-04-21 (-$18M)
    Режим: чистый приток
    ```

    ### `/pulse SYMBOL`

    Компактный 4-строчный output. Минимально: 3-4 tool calls (price, OI, funding, RSI):
    1. `get_futures_price_history({exchange:"Binance", symbol:"<S>USDT", interval:"4h", limit:6})` — current price + 24h delta
    2. `get_futures_aggregated_open_interest_history({symbol:"<S>", interval:"4h", limit:6})` — 24h OI delta
    3. `get_futures_funding_rate_oi_weight_history({symbol:"<S>", interval:"4h", limit:1})` — current funding
    4. `get_futures_rsi_list({sort_by:"rsi_4h", limit:300})` — find symbol → rsi_4h

    Output:
    ```
    ETH pulse (2026-05-05 12:34 UTC)
    Цена: $3,450 (4h Δ +0.4%)
    OI: $12.5B (24h Δ +3.1%, растёт)
    Funding 4h: 0.012% (нейтральный)
    RSI 4h: 54 (средний диапазон)
    ```

    Никакого scoring. Никакого `last_signal`. Чистый snapshot одной строкой.

    ### `/rsi SYMBOL [tf]` — Phase 1.6

    Multi-TF RSI snapshot. Source: local Bybit V5 kline (no CoinGlass dep).

    1. Validate symbol через cached `get_futures_supported_coins`.
    2. `tf` argument: один из `15m`, `1h`, `4h`, `12h`, `1d` или `all` (default `all` → таблица по всем 5 TF).
    3. Один параллельный fan-out из 5 GET-запросов к `https://api.bybit.com/v5/market/kline?category=linear&symbol=<SYMBOL>USDT&interval=<I>&limit=200`.
    4. Compute Wilder RSI(14) на closes oldest-first.
    5. Output (default `all`):
       ```
       ETH RSI (Wilder 14, source: bybit kline)
       TF     RSI    Зона
       15m    62.2   нейтрально
       1h     66.1   бычий уклон
       4h     66.0   бычий уклон
       12h    64.7   нейтрально
       1d     61.9   нейтрально

       Confluence: 1h/4h/12h все ≥ 60 → bullish lean (Phase 1.6 bonus +5 в /eth scoring если совпадает с long bias)
       ```
       Зоны: `<30` экстремальная перепроданность, `30–40` перепроданность, `40–60` нейтрально, `60–70` бычий уклон, `>70` экстремальная перекупленность.

    ### `/macd SYMBOL [tf]` — Phase 1.6

    1. Default `tf=4h`. Allowed: `1h`, `4h`, `1d`.
    2. GET Bybit V5 kline `interval=<I>&limit=200`.
    3. Compute EMA(12), EMA(26), MACD = ema12−ema26, Signal = EMA(9) of MACD, Hist = MACD−Signal.
    4. Output:
       ```
       ETH MACD (12, 26, 9) на 4h (source: bybit kline)
       MACD:    +21.60
       Signal:  +18.98
       Hist:    +2.62  (растёт — последние 3 бара +1.84, +2.31, +2.62)
       Cross:   бычий (MACD > Signal, последний cross-up ≈ 18 баров назад)
       ```

    ### `/bb SYMBOL [tf]` — Phase 1.6

    1. Default `tf=4h`. Allowed: `1h`, `4h`.
    2. Bybit V5 kline → Bollinger(20, 2σ).
    3. Output:
       ```
       ETH Bollinger Bands (20, 2σ) на 4h (source: bybit kline)
       Верхняя:  $2,413.72
       Средняя:  $2,362.36
       Нижняя:   $2,311.00
       Цена:     $2,408.69
       %B:       0.951  (цена у верхней полосы — перегрев)
       Width:    4.35%  (нормальная волатильность)
       ```
       Squeeze warning если `width < 2.5%`: добавить строку `Squeeze: ⚠️ width <2.5% — пробой скорее всего близко`.

    ### `/adx SYMBOL` — Phase 1.6

    Только `tf=4h` (single bucket as в spreadsheet). 200 свечей × 4h = ~33d, достаточно warmup для ADX(14).

    1. Bybit V5 kline 4h → highs, lows, closes oldest-first.
    2. Wilder ADX(14): TR, +DM, -DM → smoothed → +DI/-DI/DX → ADX.
    3. Output:
       ```
       ETH ADX (14) на 4h (source: bybit kline)
       ADX:      32.6  (сильный тренд)
       +DI:      26.3
       -DI:      9.0
       Направление: +DI > -DI на 17.3 → движение вверх
       ```
       Зоны: `<20` слабый / без тренда, `20–40` средний, `>40` сильный.

    ### `/heatmap [tf]` — Phase 1.6

    Multi-symbol RSI table по всему watchlist. Заменяет CoinGlass `RsiHeatMap` (UI-only, не в API).

    1. Default `tf=4h`. Allowed: `15m`, `1h`, `4h`, `1d`.
    2. Read `state.watchlist`. Для каждого entry → Bybit V5 kline `<SYMBOL>USDT interval=<I> limit=200`.
    3. Compute RSI(14) per symbol in parallel.
    4. Output (sorted ascending by RSI — oversold first):
       ```
       RSI heatmap (Wilder 14, 4h, source: bybit kline)

       SYMBOL    RSI    Зона
       SOL       28.4   экстремальная перепроданность ⚠️
       BTC       45.2   нейтрально
       ETH       66.0   бычий уклон
       ARB       72.5   экстремальная перекупленность ⚠️
       ```
       Если symbol на Bybit отсутствует — append `(not on bybit)` в строке, RSI пропускается.

    ## Missing data handling

    Если tool отсутствует в `tools/list` ИЛИ возвращает 4xx/`not-available-on-plan`:

    - Записать в `missing_data: ["<tool_name>"]`
    - Применить `-5` penalty к scoring sub-input, который от него зависел (если основа сигнала — `-10`)
    - **В output блок "Пропущенные данные:" показывать ТОЛЬКО когда `missing_data` непустой** — пустой `[]` означает что секцию рендерить не нужно вообще, никаких "None" / "—" заглушек. Старая практика "Missing data: None" — шум; убираем.
    - Когда есть пропуски: рендерить русскими лейблами, по строке на ключ:
      ```
      Пропущенные данные:
      - liquidation_order (tier-gated)
      - bybit_kline_unreachable
      ```
    - Никогда не падать; никогда не выдумывать значения

    Если **все** core tools (markets, OI, funding) недоступны — единственный output (на языке запроса):
    - RU: `CoinGlass MCP недоступен или не авторизован. Повторите позже или эскалируйте оператору.`
    - EN: `CoinGlass MCP unreachable or unauthorized. Try later or escalate to operator.`

    ## Anti-patterns

    - Не использовать REST endpoint matrix CoinGlass для inference — derive at runtime из `tools/list` + tool-call errors.
    - Не дёргать все 30 tools на каждый `/eth` — pipeline = 10 calls, остальное по явному запросу.
    - Не вызывать STANDARD-tier-locked tools (`get_futures_coins_markets`, `_liquidation_max_pain`, `_hyperliquid_whale_positions`, `_liquidation_heatmap_*`) — 401 Upgrade на HOBBYIST. Замены уже в pipeline.
    - Не использовать `interval` <4h в CoinGlass MCP — на HOBBYIST 403. Local Bybit любой TF OK (Phase 1.6).
    - Не агрегировать scoring в scalar 0-100 — сохранять directional split (`long_score`, `short_score`).
    - Не давать entry/stop/TP без явной просьбы; даже с просьбой — educational ATR ranges only, не concrete orders.
    - Не повторять snapshot pipeline в loop внутри одного chat-сообщения — для periodic monitoring есть Argo `labs-watch-scan`.
    - Не вызывать `get_futures_rsi_list` / `_macd_list` в default `/eth` / `/btc` / `/sol` — tier-нестабильны; local Bybit = source of truth. Только из `/rsi` / `/macd`.
    - CVD source attribution обязателен: `cvd_24h.per_exchange` всегда содержит все 4 venues (null для unreachable), `cvd_24h.source` склеивается dynamic из usable legs. Не возвращаться к 2-venue baseline — это fallback с обязательным `<venue>_unreachable` / `<venue>_window_incomplete` в `missing_data`.
    - OKX `ctVal` — read once, cache long (меняется раз в годы). Захардкод `0.1` для ETH-USDT-SWAP допустим. assert `ctValCcy == base coin`, иначе abort OKX leg + `okx_ctval_mismatch`.

    ## Cron alerts (Phase 1.5)

    Pasive monitoring через **Argo CronWorkflow `labs-watch-scan`** (см. `platform-gitops/argo-workflows/cluster-templates/cronworkflow-labs-watch-scan.yaml`). Cluster-owned cron каждые 30 мин:

    1. Читает watchlist из S3 (`s3://platform-state/labs/openclaw/workspace/state/eth-trading-intel.json`) read-only
    2. Для каждой entry дёргает CoinGlass MCP + local Bybit kline (Phase 1.6 — 5 binary signals × 20 = max 100): funding direction, price 24h, OI delta, funding extreme, RSI 4h extreme.
    3. Сравнивает с `entry.threshold` + `entry.direction` filter
    4. Если crossed AND `last_alert_at[symbol]` ≥ 4h ago → POST Telegram Bot API sendMessage с alert-сообщением. Recommends "Run /eth SYMBOL for full analysis."
    5. Updates dedup state в `s3://platform-state/labs/cron/eth-trading-intel-alerts.json` (отдельный файл от chat-state, не модифицирует watchlist; намеренно вне `labs/openclaw/` mirror-prefix — чтобы s3-sync sidecar не стирал файл каждые 10с)

    **Cron simple_score умышленно проще** chat-skill полного scoring rubric. Cron — это pre-filter "стоит проснуться и посмотреть", не финальный сигнал. Chat skill сохраняет полную сложность для interactive deep-dive.

