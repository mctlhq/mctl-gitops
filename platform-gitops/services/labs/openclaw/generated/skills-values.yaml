    # eth-trading-intel

    ## Purpose

    Превратить данные CoinGlass MCP + локального индикаторного движка (Bybit/Binance, Phase 1.6) в structured trading snapshot для ETH/BTC/SOL. Только observation. Никогда не торговать. Цель — отфильтровать шум: возвращать "Нет преимущества" честно, когда сигнала нет, вместо натягивания нарратива.

    ## Output language — русский (single-language contract)

    **Все command-level outputs** (snapshot, risk, scan, /funding, /oi, /etf, /pulse, /rsi, /macd, /bb, /adx, /heatmap, /help, /settings, /watch confirmations) рендерятся **только на русском**. Cron-алерты уже на русском с PR #125; chat-skill синхронизирован. Trader-slang (лонг, шорт, funding, OI, RSI, MACD, CVD, ETF) пишем кириллицей или латиницей как принято в трейдер-сообществе — главное держать единый стиль внутри одного output.

    **Узкое исключение — fixed-message branches** (`/why` empty-state, `/last` empty-state, `/etf SOL` reject, core-tools-unavailable, `/scan` no-cross). У них перечислены оба варианта `RU:` / `EN:` потому что это короткие строки одного состояния и оператор может ожидать ответ на языке запроса. **Только эти 5 точек** имеют EN-вариант — остальные команды русско-только; если пользователь пишет на английском, всё равно отвечаем по-русски.

    См. таблицу bias/regime/conviction в `### Output format` ниже для канонических русских лейблов.

    ## When to use

    Сработать на любую из команд:

    - `/eth`, `/btc`, `/sol` — full snapshot
    - `/scan` — параллельные snapshots по watchlist, фильтр по per-symbol threshold + direction
    - `/risk SYMBOL` — детальный risk-разбор без scoring
    - `/why` — объяснение последнего сигнала (читает `state.last_signal`)
    - `/watch SYMBOL [N] [long|short|both]` — добавить в watchlist (см. Watchlist commands ниже)
    - `/unwatch SYMBOL` — убрать из watchlist
    - `/settings` — показать текущий watchlist + threshold
    - `/set_threshold N` — задать global threshold (50–95)
    - `/help` — список всех команд (static, no CoinGlass calls)
    - `/last` — recall `state.last_signal` без re-running pipeline
    - `/funding SYMBOL` — single-dimension snapshot: funding rate
    - `/oi SYMBOL [tf]` — single-dimension snapshot: open interest. Без `tf` — CoinGlass aggregated 4h по ~10 биржам. С `tf ∈ {1h, 4h}` — Bybit V5 single-source (обходит HOBBYIST блок на <4h).
    - `/etf SYMBOL` — ETF flow deep-dive (только BTC и ETH; SOL/прочие → reject)
    - `/pulse SYMBOL` — компакт: price + funding direction + OI delta + RSI bucket
    - `/rsi SYMBOL [tf]` — multi-TF RSI (15m/1h/4h/12h/1d), source: local Bybit kline (Phase 1.6)
    - `/macd SYMBOL [tf]` — MACD(12,26,9), `tf` ∈ {1h,4h,1d}; source: local Bybit kline
    - `/bb SYMBOL [tf]` — Bollinger(20, 2σ), `tf` ∈ {1h,4h}; source: local Bybit kline
    - `/adx SYMBOL` — ADX(14) 4h trend strength; source: local Bybit kline
    - `/heatmap [tf]` — multi-symbol RSI table по watchlist на одном TF; source: local Bybit kline

    Также активироваться на свободные формулировки: "разбор по ETH", "что там с фандингом", "open interest snapshot", "посмотри ликвидации", "rsi на coinglass", "etf flows", "rsi heatmap", "adx тренд".

    ## CoinGlass tier — HOBBYIST (confirmed 2026-05-05, renewal 2026-06-05)

    Текущий API plan ключа — `HOBBYIST`. Доступные интервалы для history-эндпоинтов: `4h, 6h, 8h, 12h, 1d`. Интервалы `<4h` (1m/5m/15m/30m/1h) возвращают **HTTP 403** с `current_plan: HOBBYIST, upgrade_required: STANDARD`.

    `DEFAULT_INTERVAL = "4h"` — использовать везде в snapshot pipeline и single-dimension queries. Никаких `1h` calls.

    ### Available на HOBBYIST (кратко)

    Используем: `get_futures_aggregated_open_interest_history`, `get_futures_funding_rate_oi_weight_history`, `get_futures_global_long_short_account_ratio_history`, `get_futures_top_long_short_account_ratio_history`, `get_futures_aggregated_liquidation_history`, `get_futures_price_history`, `get_futures_aggregated_cvd_history`, `get_bitcoin_etf_flow_history`, `get_ethereum_etf_flow_history`. Не использовать: `rsi_1h`, `rsi_30m`, `rsi_15m`, `macd_1h` (за HOBBYIST plan).

    ### Local indicators (Phase 1.6)

    Bybit V5 + Binance + OKX public klines (no auth). Источники истины для RSI/MACD/ADX; CoinGlass — cross-check only. Interval: 15/60/240/720/D для Bybit; 4h для Binance/OKX. Limit: 200 для Bybit, 6 для Binance, 100 для OKX.
      - **Per-bar pricing rule (важно):** для каждого OKX taker-volume бара брать matching close из **OKX market/candles** по timestamp bucket (`floor(ts / 14_400_000) * 14_400_000`, оба endpoints UTC-aligned 4h). Per-bar delta_usd = `(buyVol − sellVol) * ctVal * okx_close_at_that_bar`. Это и решает codex-finding "single close vs per-bar drift" (sign может flip при дрифте цены), и оставляет `okx_only` достижимым когда Binance leg падает.
      - **Cross-venue price sanity check:** если OKX close vs Binance close на одном и том же ts расходятся >2% → append `risks: ["okx/binance price spread >2% at <ts>: $<okx>, $<binance>"]`. Реальный price spread на perp ETH между биржами обычно <0.1%; >2% означает либо stale data на одной из бирж, либо аутентичный venue dislocation (важный сигнал для оператора).
      - Если кол-во баров OKX taker-volume и OKX candles не совпадает (rubik отдал меньше 6 свежих или timestamps смещены): сматчить по той же `bucket_ts` формуле, пары без обоих источников пропустить.
      - Pair-format: `<COIN>-USDT-SWAP` (отличается от Bybit/Binance `<COIN>USDT`).
      - **Все три OKX endpoint требуют `User-Agent` header** (без UA — 403). Любой не-пустой UA подходит (`labs-trading-intel/1.0` — конвенция). Validated live 2026-05-06.

    **Computed fields:**
    - RSI(14) — Wilder's smoothing — TFs: 15m, 1h, 4h, 12h, 1d
    - MACD(12, 26, 9) — `macd`, `signal`, `hist`, `rising` — TFs: 1h, 4h, 1d
    - ADX(14) — Wilder's — `adx`, `plus_di`, `minus_di`, `trend_strength` bucket — TF: 4h
    - CVD 24h (Phase 2 Hook B — до 4 venues): `cvd_24h.net_usd` = sum(per-exchange deltas) по **usable** подмножеству из {Binance, OKX, Bybit, Bitget} (full стек ~95% global perp ETH). Per-exchange разбивка хранится в `cvd_24h.per_exchange` и всегда содержит все 4 ключа (`null` если leg unreachable). Source string собирается **динамически** из usable legs (joined по `+`) — на full happy path: `"binance_taker_buy_24h+okx_rubik_taker_volume_24h+bybit_publictrade_ws+bitget_publictrade_ws"`; при выпавшем leg или `window_incomplete` соответствующая строка пропадает из `cvd_24h.source` и leg добавляется в `missing_data` (`<venue>_unreachable` / `<venue>_window_incomplete`). НЕ хардкодить full 4-venue string — это ломает contract `missing_data` transparency. Binance + OKX считаются inline (public REST, no auth). Bybit + Bitget берутся из in-cluster `trading-data` MCP (`trading-data__bybit_taker_24h`, `trading-data__bitget_taker_24h`) — stateful WS-агрегация в `labs-trading-data` pod-е. Cold-start: первый час после рестарта pod-а у обоих ws-leg-ов будет `meta.window_incomplete=true`; в это время эти leg-и игнорируются в N-leg cascade и не добавляются в total. Score-компоненты CVD остаются на агрегированном `net_usd` без отдельных венчурных весов.

    **Cross-check rule:** если CoinGlass отдал валидный ответ от `get_futures_rsi_list` / `get_futures_macd_list` И local расчёт расходится >5 пунктов (RSI) / >15% (MACD) — append `risks: ["rsi_4h source disagreement: local 54, coinglass 61"]`. Это страхует от тихих багов в локальной формуле; но score считается по local значениям.

    **CVD source-agreement rule (Phase 2 Hook B) — N-leg generalization:**

    `cvd_24h.agreement` всегда обязан присутствовать в snapshot output. Каскад работает на множестве **usable** legs — leg попадает в множество если он не `null` И его источник вернул валидное число. Для leg-ов из `trading-data` MCP (Bybit, Bitget) дополнительно требуется `meta.window_incomplete == false` (первый час после рестарта pod-а WS-buckets неполные); incomplete leg добавляется в `missing_data` как `<venue>_window_incomplete` и НЕ участвует в каскаде.

    Правила (применять в порядке, первое совпадение выигрывает):

    1. **All legs null/incomplete** (`|usable| == 0`) → `cvd_24h = null` целиком, `missing_data: ["cvd_unreachable"]`, дальше скип секции
    2. **Exactly one usable leg** → `agreement = "<venue>_only"` (например `"binance_only"`, `"okx_only"`, `"bybit_only"`, `"bitget_only"`); direction от знака этого leg-а
    3. **Все usable legs == 0** → `agreement = "all_zero"`, `direction = "balanced"`, append `risks: ["cvd all zero: ни одна биржа не показала чистого taker-имбаланса за 24h"]`
    4. **Часть usable legs == 0, часть non-zero** → `agreement = "partial_zero"`, направление по знакам non-zero подмножества (если все non-zero одного знака → consistent direction; если разнятся — fall through к правилу 6)
    5. **Все usable non-zero legs одного знака** → `agreement = "aligned"`, `direction` от общего знака — увереннее CVD-сигнал, потому что 2-4 venues подтверждают одно и то же
    6. **Знаки usable non-zero legs разнятся** → `agreement = "split"` И append `risks: ["cvd source split: <perl-сep breakdown по venue с знаком и $M>"]`. Direction берётся от leg-а с наибольшим `|net_usd|`, но score должен dempen-ить bonus (сплит — слабый сигнал).

    Каскад покрывает все 5^4 = 625 сочетаний (`venue ∈ {null, incomplete, <0, 0, >0}` × 4) с deterministic resolution: enumerate legs → derive usable set → apply rules. Score-компоненты CVD остаются на агрегированном `net_usd`, но split/zero/single-venue warnings дают оператору сигнал что между биржами происходит арбитраж/decoupling/пустой период.

    **Multi-exchange CVD aggregation status:**
    - ✅ **Binance** (Phase 1.6) — kline taker_buy_base в индексе 9. Inline public REST.
    - ✅ **OKX** (Phase 2 Hook A) — `rubik/stat/taker-volume-contract` + `public/instruments` для ctVal + own market/candles для per-bar pricing. Inline public REST.
    - ✅ **Bybit** (Phase 2 Hook B) — `trading-data__bybit_taker_24h` через in-cluster MCP (Bybit V5 publicTrade WS aggregation). Кэшировать ничего не нужно — service сам агрегирует rolling 24h в memory.
    - ✅ **Bitget** (Phase 2 Hook B) — `trading-data__bitget_taker_24h` через тот же MCP (Bitget V2 trade-channel WS, USDT-FUTURES productType).

