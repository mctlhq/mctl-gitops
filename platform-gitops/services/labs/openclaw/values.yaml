# Prometheus scrape config for the openclaw `/metrics` endpoint added in
# mctl-openclaw#19 (codex token usage counters). Served on the same `http`
# port (18789) as the gateway HTTP/UI, so we reuse the existing Service
# named port rather than provisioning a second port.
#
# Removed 2026-07 while replicaCount is 0 (see the comment above): the
# Service this ServiceMonitor selects still exists, but with zero replicas
# it has zero pod endpoints, so vmagent found a permanent 0-target
# scrape_pool ("labs-openclaw-codex-metrics") and its default
# ScrapePoolHasNoTargets rule fired daily for a condition that isn't
# actionable (the tenant is deliberately paused). Restore this block
# together with `replicaCount: 1` above when labs openclaw is brought
# back online.
#
# extraObjects:
#   - apiVersion: monitoring.coreos.com/v1
#     kind: ServiceMonitor
#     metadata:
#       name: labs-openclaw-codex-metrics
#       labels:
#         app.kubernetes.io/instance: labs-openclaw
#         app.kubernetes.io/name: base-service
#     spec:
#       selector:
#         matchLabels:
#           app.kubernetes.io/instance: labs-openclaw
#           app.kubernetes.io/name: base-service
#       endpoints:
#         - port: http
#           path: /metrics
#           interval: 30s
#           scrapeTimeout: 10s
