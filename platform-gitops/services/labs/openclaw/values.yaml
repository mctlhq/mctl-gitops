configMaps:
  openclaw-scripts:
    mcp-agent-proxy.js: |-
      #!/usr/bin/env node
      const http = require('http');
      process.stdin.setEncoding('utf8');
      let buf = '';
      process.stdin.on('data', chunk => {
        buf += chunk;
        let nl;
        while ((nl = buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) handleLine(line);
        }
      });
      function handleLine(line) {
        let req;
        try { req = JSON.parse(line); } catch (_) { return; }
        callAgent(req).then(res => write(res), err => write({ jsonrpc: '2.0', id: req.id, error: { code: -32603, message: String(err) } }));
      }
      function write(obj) { process.stdout.write(JSON.stringify(obj) + '\n'); }
      function callAgent(body) {
        return new Promise((resolve, reject) => {
          const data = JSON.stringify(body);
          const req = http.request({ hostname: 'admins-mctl-agent-base-service.admins.svc.cluster.local', port: 8080, path: '/mcp', method: 'POST', headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) } }, res => {
            let out = ''; res.on('data', c => { out += c; }); res.on('end', () => { try { resolve(JSON.parse(out)); } catch (_) { reject(new Error('invalid JSON')); } });
          });
          req.on('error', reject); req.write(data); req.end();
        });
      }
    mctl-mcp-proxy.js: |-
      #!/usr/bin/env node
      const fs = require('fs');
      const path = require('path');
      const apiBase = (process.env.MCTL_API_URL || 'https://api.mctl.ai').replace(/\/+$/, '');
      const authFile = process.env.MCTL_AUTH_FILE || '/home/node/.openclaw/mcp-auth/mctl/credentials.json';
      let sessionId = '';
      let queue = Promise.resolve();
      process.stdin.setEncoding('utf8');
      let buf = '';
      process.stdin.on('data', chunk => {
        buf += chunk;
        let nl;
        while ((nl = buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) {
            queue = queue.then(() => handleLine(line)).catch(() => {});
          }
        }
      });
      function write(obj) { process.stdout.write(JSON.stringify(obj) + '\n'); }
      async function handleLine(line) {
        let req;
        try { req = JSON.parse(line); } catch (_) { return; }
        try {
          const res = await callMctl(req);
          write(res);
        } catch (err) {
          write({ jsonrpc: '2.0', id: req.id, error: { code: -32603, message: String(err && err.message ? err.message : err) } });
        }
      }
      async function readAuth() {
        const raw = await fs.promises.readFile(authFile, 'utf8');
        return JSON.parse(raw);
      }
      async function writeAuth(auth) {
        await fs.promises.mkdir(path.dirname(authFile), { recursive: true, mode: 0o700 });
        const tmp = `${authFile}.tmp`;
        await fs.promises.writeFile(tmp, JSON.stringify(auth, null, 2) + '\n', { mode: 0o600 });
        await fs.promises.rename(tmp, authFile);
      }
      function isExpiring(auth) {
        if (!auth || !auth.expiresAt) return false;
        const ms = Date.parse(auth.expiresAt);
        return Number.isFinite(ms) && ms <= Date.now() + 60_000;
      }
      async function refreshAuth(auth) {
        if (!auth || !auth.refreshToken || !auth.clientId) {
          throw new Error('mctl not connected');
        }
        const body = new URLSearchParams({
          grant_type: 'refresh_token',
          refresh_token: auth.refreshToken,
          client_id: auth.clientId,
        });
        const res = await fetch(`${apiBase}/oauth/token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
          body,
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok || !payload.access_token || !payload.refresh_token) {
          throw new Error(payload.error_description || payload.error || `mctl refresh failed (${res.status})`);
        }
        const expiresAt = typeof payload.expires_in === 'number' ? new Date(Date.now() + payload.expires_in * 1000).toISOString() : null;
        const next = {
          ...auth,
          accessToken: String(payload.access_token),
          refreshToken: String(payload.refresh_token),
          scope: typeof payload.scope === 'string' ? payload.scope : (auth.scope || 'mctl'),
          expiresAt,
          updatedAt: new Date().toISOString(),
        };
        await writeAuth(next);
        return next;
      }
      async function ensureAuth() {
        const auth = await readAuth().catch(() => null);
        if (!auth) {
          throw new Error('mctl is not connected in Control UI');
        }
        if (isExpiring(auth)) {
          return await refreshAuth(auth);
        }
        return auth;
      }
      async function post(body, token) {
        const headers = {
          'Content-Type': 'application/json',
          'Accept': 'application/json, text/event-stream',
          'Authorization': `Bearer ${token}`,
        };
        if (sessionId) {
          headers['Mcp-Session-Id'] = sessionId;
        }
        const res = await fetch(`${apiBase}/mcp`, {
          method: 'POST',
          headers,
          body: JSON.stringify(body),
        });
        const nextSessionId = res.headers.get('mcp-session-id');
        if (nextSessionId) {
          sessionId = nextSessionId;
        }
        const text = await res.text();
        let parsed;
        try { parsed = text ? JSON.parse(text) : {}; } catch (_) { throw new Error(`invalid JSON from mctl MCP (${res.status})`); }
        return { status: res.status, body: parsed };
      }
      async function callMctl(body) {
        let auth = await ensureAuth();
        let res = await post(body, auth.accessToken);
        if (res.status === 401 && auth.refreshToken) {
          auth = await refreshAuth(auth);
          res = await post(body, auth.accessToken);
        }
        if (res.status >= 400) {
          const message = res.body && res.body.error && res.body.error.message ? res.body.error.message : `mctl MCP request failed (${res.status})`;
          throw new Error(message);
        }
        return res.body;
      }
      // Proactive token refresh: keep credentials alive without waiting for
      // an incoming message. Checks every 30 min; refreshes when the access
      // token has less than 45 min left. Prevents the refresh token from
      // expiring during long idle periods (bug: on-demand-only refresh died
      // if no message arrived before the refresh token TTL elapsed).
      setInterval(async () => {
        try {
          const auth = await readAuth().catch(() => null);
          if (!auth || !auth.expiresAt) return;
          const ms = Date.parse(auth.expiresAt);
          if (Number.isFinite(ms) && ms <= Date.now() + 45 * 60_000) {
            await refreshAuth(auth);
          }
        } catch (_) {}
      }, 30 * 60 * 1000);
    # CoinGlass MCP stdio bridge — required because the claude-cli backend's
    # bundle-mcp step accepts only stdio MCP servers (it silently skips
    # streamable-http/sse with "[bundle-mcp] skipped server because only stdio
    # MCP servers are supported right now"). Bridge converts stdio JSON-RPC
    # to POST against the upstream streamable-HTTP endpoint, injecting
    # CG-API-KEY directly from process.env (envFrom -> labs-openclaw-coinglass).
    coinglass-mcp-proxy.js: |-
      #!/usr/bin/env node
      // Two MCP-spec invariants codex flagged on the v1 bridge that this
      // version handles:
      //
      // 1. Session/protocol headers must persist across requests after the
      //    `initialize` handshake. Captures `mcp-session-id` from the first
      //    server response and resends it on every subsequent POST. Captures
      //    the negotiated `protocolVersion` from the initialize result and
      //    sends it as `Mcp-Protocol-Version` per spec.
      //
      // 2. Streamable-HTTP servers may return `text/event-stream` instead of
      //    `application/json`. Raw passthrough breaks stdio JSON-RPC framing,
      //    so SSE responses are parsed: each `data:` line is decoded and
      //    written as its own newline-delimited stdio JSON-RPC message.
      const url = 'https://api-mcp.coinglass.com/mcp';
      const apiKey = process.env.COINGLASS_API_KEY;
      let sessionId = '';
      let protocolVersion = '';
      let queue = Promise.resolve();
      process.stdin.setEncoding('utf8');
      let buf = '';
      process.stdin.on('data', chunk => {
        buf += chunk;
        let nl;
        while ((nl = buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) queue = queue.then(() => handle(line)).catch(() => {});
        }
      });
      function writeLine(obj) { process.stdout.write(JSON.stringify(obj) + '\n'); }
      function captureProtocolVersion(message) {
        if (
          message &&
          message.result &&
          typeof message.result.protocolVersion === 'string' &&
          message.result.protocolVersion
        ) {
          protocolVersion = message.result.protocolVersion;
        }
      }
      function emit(message) {
        captureProtocolVersion(message);
        writeLine(message);
      }
      function parseSse(text) {
        const messages = [];
        for (const block of text.split(/\r?\n\r?\n/)) {
          if (!block.trim()) continue;
          const dataLines = [];
          for (const rawLine of block.split(/\r?\n/)) {
            if (rawLine.startsWith('data:')) dataLines.push(rawLine.slice(5).replace(/^ /, ''));
          }
          if (dataLines.length === 0) continue;
          const payload = dataLines.join('\n');
          try { messages.push(JSON.parse(payload)); } catch (_) { /* skip non-JSON keepalives */ }
        }
        return messages;
      }
      // CoinGlass MCP server returns HTTP 401 "Invalid Bearer token" on the
      // standard MCP `initialize` method even when CG-API-KEY is correct
      // (verified via curl from the pod, 2026-05-05). Other methods accept
      // CG-API-KEY without an initialize handshake. claude-cli's bundle-mcp
      // step requires a successful `initialize` reply or it times out and
      // drops the server, so we synthesize the handshake locally and only
      // forward methods CoinGlass actually serves. `notifications/initialized`
      // is silently swallowed (it's a one-way notification per spec).
      // Remove the synthetic branch only after CoinGlass fixes the upstream
      // initialize handler — re-test by deleting the early-return below and
      // checking base-service logs for `[bundle-mcp] failed to start`.
      const PROTOCOL_VERSION = '2025-06-18';
      function synthesizeInitialize(req) {
        return {
          jsonrpc: '2.0', id: req.id,
          result: {
            protocolVersion: PROTOCOL_VERSION,
            capabilities: { tools: {} },
            serverInfo: { name: 'coinglass-bridge', version: '1.0.0' },
          },
        };
      }
      async function handle(line) {
        let req;
        try { req = JSON.parse(line); } catch (_) { return; }
        // JSON-RPC notifications (no `id` key) are one-way; the spec
        // forbids responses, including errors. Track presence vs. value
        // because `id: null` is a valid request id and must still get a
        // reply, while a missing `id` field must not.
        const isNotification = !req || !Object.prototype.hasOwnProperty.call(req, 'id');
        const errorReply = (message) => {
          if (isNotification) return;
          writeLine({
            jsonrpc: '2.0', id: req.id,
            error: { code: -32603, message: String(message) },
          });
        };
        if (req && req.method === 'initialize' && !isNotification) {
          if (
            req.params &&
            typeof req.params.protocolVersion === 'string' &&
            req.params.protocolVersion
          ) {
            protocolVersion = req.params.protocolVersion;
          } else {
            protocolVersion = PROTOCOL_VERSION;
          }
          writeLine(synthesizeInitialize(req));
          return;
        }
        if (req && req.method && req.method.startsWith('notifications/')) {
          // Don't forward client→server notifications; CoinGlass would 401
          // on `notifications/initialized` the same way it does on
          // `initialize`. Spec allows server to ignore unknown notifications.
          return;
        }
        try {
          const headers = {
            'Content-Type': 'application/json',
            'Accept': 'application/json, text/event-stream',
            'CG-API-KEY': apiKey || '',
          };
          if (sessionId) headers['Mcp-Session-Id'] = sessionId;
          if (protocolVersion) headers['Mcp-Protocol-Version'] = protocolVersion;
          const res = await fetch(url, { method: 'POST', headers, body: line });
          const nextSession = res.headers.get('mcp-session-id');
          if (nextSession) sessionId = nextSession;
          // 404 with an attached Mcp-Session-Id means the upstream rejected
          // the session (expired/unknown). Clear local state so the next
          // request enters a fresh initialize flow instead of looping with
          // a stale session id forever.
          if (res.status === 404 && headers['Mcp-Session-Id']) {
            sessionId = '';
            protocolVersion = '';
          }
          const ctype = (res.headers.get('content-type') || '').toLowerCase();
          const body = await res.text();
          if (ctype.includes('text/event-stream')) {
            for (const message of parseSse(body)) emit(message);
          } else {
            const trimmed = body.trim();
            if (!trimmed) {
              // Empty non-SSE body: an upstream gateway hiccup or 204.
              // Bridge must reply with an error so the embedded claude
              // doesn't hang waiting on a request that never returns.
              errorReply(`empty response from coinglass MCP (${res.status})`);
              return;
            }
            try { emit(JSON.parse(trimmed)); }
            catch (_) {
              errorReply(`non-JSON response from coinglass MCP (${res.status})`);
            }
          }
        } catch (err) {
          errorReply(err && err.message ? err.message : err);
        }
      }
    # stdio -> HTTP+Bearer bridge for the in-cluster labs-trading-data MCP
    # service. The claude-cli backend's `bundle-mcp` step accepts only stdio
    # MCP servers (it silently skips streamable-HTTP / SSE), so this
    # ~40-line proxy converts stdio JSON-RPC into Bearer-auth POSTs against
    # the FastAPI streamable-HTTP endpoint. The trading-data service is
    # stateless from the client side (no session-id, no protocol-version
    # exchange beyond initialize) so this bridge is much simpler than the
    # coinglass one — no auth refresh, no SSE re-framing, no env-var header
    # interpolation. URL + token come from process.env (envFrom ->
    # labs-trading-data-client + openclaw.json env passthrough below).
    trading-data-mcp-proxy.js: |-
      #!/usr/bin/env node
      const url = process.env.TRADING_DATA_URL;
      const token = process.env.TRADING_DATA_TOKEN;
      let sessionId = '';
      let queue = Promise.resolve();
      process.stdin.setEncoding('utf8');
      let buf = '';
      process.stdin.on('data', chunk => {
        buf += chunk;
        let nl;
        while ((nl = buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) queue = queue.then(() => handle(line)).catch(() => {});
        }
      });
      function writeLine(obj) { process.stdout.write(JSON.stringify(obj) + '\n'); }
      function isNotification(req) {
        // JSON-RPC 2.0: a notification is a request object with no `id`
        // member at all (e.g. `notifications/initialized`). It expects no
        // response. We must NOT emit unsolicited error frames for these
        // -- a stdio MCP client tracking ids would treat them as orphan
        // replies (codex P2 round 2 on PR #137).
        return !req || !Object.prototype.hasOwnProperty.call(req, 'id');
      }
      function rpcError(req, message) {
        if (isNotification(req)) return;
        writeLine({ jsonrpc: '2.0', id: req.id, error: { code: -32603, message: String(message) } });
      }
      // Parse a streamable-HTTP / SSE body into the JSON payloads of each
      // event block. SSE allows one event to span multiple `data:` lines
      // that the spec requires concatenating with `\n` before parsing;
      // splitting per-line and JSON.parsing each fragment incorrectly
      // discards every multi-line event (codex P2 round 2 on PR #137).
      // Event blocks are separated by blank lines (one or more CRLF/LF).
      function parseSseEvents(text) {
        const out = [];
        for (const block of text.split(/\r?\n\r?\n/)) {
          if (!block.trim()) continue;
          const dataLines = [];
          for (const raw of block.split(/\r?\n/)) {
            // Per spec: a leading single SP after the colon is part of
            // formatting, not data. Strip exactly one leading space.
            if (!raw.startsWith('data:')) continue;
            const value = raw.slice(5);
            dataLines.push(value.startsWith(' ') ? value.slice(1) : value);
          }
          if (!dataLines.length) continue;
          const payload = dataLines.join('\n');
          if (!payload.trim()) continue;
          try { JSON.parse(payload); } catch (_) { continue; }
          out.push(payload);
        }
        return out;
      }
      async function handle(line) {
        let req;
        try { req = JSON.parse(line); } catch (_) { return; }
        if (!url || !token) {
          rpcError(req, 'trading-data proxy not configured (TRADING_DATA_URL/TOKEN missing)');
          return;
        }
        try {
          const headers = {
            'Content-Type': 'application/json',
            'Accept': 'application/json, text/event-stream',
            'Authorization': `Bearer ${token}`,
          };
          if (sessionId) headers['Mcp-Session-Id'] = sessionId;
          const res = await fetch(url, { method: 'POST', headers, body: line });
          const nextSession = res.headers.get('mcp-session-id');
          if (nextSession) sessionId = nextSession;
          if (res.status === 404 && headers['Mcp-Session-Id']) {
            sessionId = '';
          }
          const text = await res.text();
          const contentType = (res.headers.get('content-type') || '').toLowerCase();
          if (contentType.includes('text/event-stream')) {
            const payloads = parseSseEvents(text);
            for (const p of payloads) process.stdout.write(p + '\n');
            if (payloads.length === 0) {
              rpcError(req, `trading-data returned no parseable SSE payload (status ${res.status})`);
            }
            return;
          }
          // Non-SSE: validate that the body is a non-empty JSON document
          // before passing through. Empty bodies, gateway HTML error
          // pages, or upstream timeouts must surface as structured
          // JSON-RPC errors so the agent retries cleanly instead of
          // hitting a stdio framing exception (codex P2 round 1).
          if (!text.trim()) {
            // 202 Accepted with no body is the canonical reply to a
            // notification. Skip silently in that case.
            if (!isNotification(req)) {
              rpcError(req, `trading-data returned empty body (status ${res.status})`);
            }
            return;
          }
          let parsed;
          try { parsed = JSON.parse(text); } catch (_) {
            const preview = text.length > 80 ? text.slice(0, 80) + '...' : text;
            rpcError(req, `trading-data returned non-JSON body (status ${res.status}, content-type=${contentType || 'unknown'}, body=${preview})`);
            return;
          }
          process.stdout.write(JSON.stringify(parsed) + '\n');
        } catch (err) {
          rpcError(req, err && err.message ? err.message : err);
        }
      }
    github-pr-mcp.js: |-
      #!/usr/bin/env node
      const { Buffer } = require('buffer');
      const { McpServer } = require('/app/node_modules/@modelcontextprotocol/sdk/dist/cjs/server/mcp.js');
      const { StdioServerTransport } = require('/app/node_modules/@modelcontextprotocol/sdk/dist/cjs/server/stdio.js');
      const { z } = require('/app/node_modules/zod/index.cjs');
      const apiBase = 'https://api.github.com';
      function text(value) {
        return { content: [{ type: 'text', text: JSON.stringify(value, null, 2) }] };
      }
      function splitRepo(full) {
        const parts = String(full || '').trim().split('/');
        if (parts.length !== 2 || !parts[0] || !parts[1]) throw new Error('repo must be owner/name');
        return { owner: parts[0], repo: parts[1] };
      }
      function allowedRepos() {
        return String(process.env.OPENCLAW_GITHUB_ALLOWED_REPOS || process.env.GITHUB_PR_ALLOWED_REPOS || '')
          .split(',')
          .map((entry) => entry.trim())
          .filter(Boolean);
      }
      function assertAllowed(repo) {
        const allowed = allowedRepos();
        if (allowed.length > 0 && !allowed.includes(repo)) {
          throw new Error(`repo ${repo} is not in OPENCLAW_GITHUB_ALLOWED_REPOS`);
        }
      }
      function authToken() {
        return process.env.GITHUB_TOKEN || process.env.GH_TOKEN || '';
      }
      async function gh(method, pathname, body) {
        const token = authToken();
        if (!token) throw new Error('GITHUB_TOKEN is not configured for OpenClaw');
        const res = await fetch(`${apiBase}${pathname}`, {
          method,
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: 'application/vnd.github+json',
            'Content-Type': 'application/json',
            'User-Agent': 'openclaw-github-pr-mcp',
          },
          body: body === undefined ? undefined : JSON.stringify(body),
        });
        const raw = await res.text();
        let parsed = {};
        try { parsed = raw ? JSON.parse(raw) : {}; } catch (_) {}
        if (!res.ok) {
          const msg = parsed && parsed.message ? parsed.message : `GitHub API ${res.status}`;
          throw new Error(msg);
        }
        return parsed;
      }
      async function getRefSha(repoFull, ref) {
        const { owner, repo } = splitRepo(repoFull);
        const data = await gh('GET', `/repos/${owner}/${repo}/git/ref/heads/${encodeURIComponent(ref)}`);
        return data.object && data.object.sha ? data.object.sha : '';
      }
      async function ensureBranch(repoFull, branch, base) {
        const { owner, repo } = splitRepo(repoFull);
        try {
          await gh('GET', `/repos/${owner}/${repo}/git/ref/heads/${encodeURIComponent(branch)}`);
          return;
        } catch (err) {
          const msg = String(err && err.message ? err.message : err);
          if (!msg.includes('Reference does not exist') && !msg.includes('Not Found')) throw err;
        }
        const baseSha = await getRefSha(repoFull, base);
        await gh('POST', `/repos/${owner}/${repo}/git/refs`, {
          ref: `refs/heads/${branch}`,
          sha: baseSha,
        });
      }
      async function getFile(repoFull, filePath, ref) {
        const { owner, repo } = splitRepo(repoFull);
        const encodedPath = filePath.split('/').map(encodeURIComponent).join('/');
        try {
          return await gh('GET', `/repos/${owner}/${repo}/contents/${encodedPath}?ref=${encodeURIComponent(ref)}`);
        } catch (err) {
          if (String(err && err.message ? err.message : err).includes('Not Found')) return null;
          throw err;
        }
      }
      async function findOpenPullRequest(repoFull, branch, base) {
        const { owner, repo } = splitRepo(repoFull);
        const data = await gh('GET', `/repos/${owner}/${repo}/pulls?state=open&head=${encodeURIComponent(`${owner}:${branch}`)}&base=${encodeURIComponent(base)}`);
        return Array.isArray(data) && data.length > 0 ? data[0] : null;
      }
      const server = new McpServer({ name: 'github-pr-mcp', version: '1.0.0' });
      server.tool(
        'github_find_open_pull_request',
        'Find an existing open pull request for a deterministic remediation branch.',
        { repo: z.string(), branch: z.string(), base: z.string().optional() },
        async ({ repo, branch, base = 'main' }) => {
          assertAllowed(repo);
          const pr = await findOpenPullRequest(repo, branch, base);
          return text({
            ok: true,
            repo,
            branch,
            base,
            pullRequest: pr ? {
              number: pr.number,
              url: pr.html_url,
              title: pr.title,
              state: pr.state,
              headSha: pr.head && pr.head.sha ? pr.head.sha : '',
            } : null,
          });
        },
      );
      server.tool(
        'github_get_file',
        'Read a file from an allowlisted GitHub repo and ref.',
        { repo: z.string(), path: z.string(), ref: z.string().optional() },
        async ({ repo, path, ref = 'main' }) => {
          assertAllowed(repo);
          const file = await getFile(repo, path, ref);
          if (!file) return text({ ok: false, repo, path, ref, error: 'not_found' });
          const decoded = file.content ? Buffer.from(String(file.content).replace(/\\n/g, ''), 'base64').toString('utf8') : '';
          return text({ ok: true, repo, path, ref, sha: file.sha || '', content: decoded });
        },
      );
      server.tool(
        'github_upsert_file',
        'Create or update one file on a deterministic remediation branch.',
        {
          repo: z.string(),
          branch: z.string(),
          path: z.string(),
          content: z.string(),
          commitMessage: z.string(),
          base: z.string().optional(),
        },
        async ({ repo, branch, path, content, commitMessage, base = 'main' }) => {
          assertAllowed(repo);
          await ensureBranch(repo, branch, base);
          const { owner, repo: repoName } = splitRepo(repo);
          const encodedPath = path.split('/').map(encodeURIComponent).join('/');
          const existing = await getFile(repo, path, branch);
          const payload = {
            message: commitMessage,
            content: Buffer.from(content, 'utf8').toString('base64'),
            branch,
            sha: existing && existing.sha ? existing.sha : undefined,
          };
          const data = await gh('PUT', `/repos/${owner}/${repoName}/contents/${encodedPath}`, payload);
          return text({
            ok: true,
            repo,
            branch,
            path,
            commitSha: data.commit && data.commit.sha ? data.commit.sha : '',
          });
        },
      );
      server.tool(
        'github_open_pull_request',
        'Open or reuse a pull request for an existing remediation branch.',
        {
          repo: z.string(),
          branch: z.string(),
          title: z.string(),
          body: z.string(),
          base: z.string().optional(),
          draft: z.boolean().optional(),
        },
        async ({ repo, branch, title, body, base = 'main', draft = false }) => {
          assertAllowed(repo);
          const existing = await findOpenPullRequest(repo, branch, base);
          if (existing) {
            return text({
              ok: true,
              reused: true,
              repo,
              branch,
              pr_number: existing.number,
              pr_url: existing.html_url,
              commit_sha: existing.head && existing.head.sha ? existing.head.sha : '',
            });
          }
          const { owner, repo: repoName } = splitRepo(repo);
          const created = await gh('POST', `/repos/${owner}/${repoName}/pulls`, {
            title,
            body,
            head: branch,
            base,
            draft,
          });
          return text({
            ok: true,
            reused: false,
            repo,
            branch,
            pr_number: created.number,
            pr_url: created.html_url,
            commit_sha: created.head && created.head.sha ? created.head.sha : '',
          });
        },
      );
      server.connect(new StdioServerTransport()).catch((err) => {
        console.error(err);
        process.exit(1);
      });
