apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: labs-openclaw-hooks
  namespace: labs
  labels:
    app.kubernetes.io/instance: labs-openclaw
    app.kubernetes.io/name: base-service
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: labs-openclaw.mctl.ai
      http:
        paths:
          - path: /hooks
            pathType: Prefix
            backend:
              service:
                name: labs-openclaw-base-service
                port:
                  number: 18789
    - host: labs-openclaw.mctl.me
      http:
        paths:
          - path: /hooks
            pathType: Prefix
            backend:
              service:
                name: labs-openclaw-base-service
                port:
                  number: 18789
  tls:
    - secretName: openclaw-tls
      hosts:
        - labs-openclaw.mctl.ai
        - labs-openclaw.mctl.me
