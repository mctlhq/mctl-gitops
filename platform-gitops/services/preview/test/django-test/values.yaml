# Service: django-test
# Team: test
# Environment: preview
# Chart: base-service

image:
  repository: ghcr.io/mctlhq/django-test
  tag: "1.0.0"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8080
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: preview
ingress:
  enabled: true
  host: test-django-test.mctl.me
probes:
  liveness: null
  readiness: null
envFrom:
  - secretRef:
      name: test-django-test-db-creds
dbSecret:
  vaultPath: platform/teams/test/django-test/database
  secretName: test-django-test-db-creds
