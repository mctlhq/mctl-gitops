# Service: aims-frontend
# Team: africaone
# Environment: preview
# Chart: base-service

image:
  repository: ghcr.io/africaone-dev/aims-frontend
  tag: "1.1.56"

imagePullSecrets:
  - name: aims-frontend-registry

registryCredentials:
  vaultKey: preview/africaone/aims-frontend/registry-credentials
  secretName: aims-frontend-registry

service:
  port: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  APP_ENV: preview

ingress:
  enabled: true
  host: aimsgo.mctl.me

probes:
  liveness: null
  readiness: null
