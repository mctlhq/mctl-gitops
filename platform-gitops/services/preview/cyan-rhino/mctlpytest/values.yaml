# Service: mctlpytest
# Team: cyan-rhino
# Environment: preview
# Chart: base-service

image:
  repository: ghcr.io/dmitriimashkov/mctlpytest
  tag: "latest"
service:
  port: 8000
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
env:
  APP_ENV: preview
  test: "1"
ingress:
  enabled: true
  host: cyan-rhino-mctlpytest.preview.mctl.me
externalSecret:
  targetSecret: mctlpytest-secrets
  data:
    - secretKey: secret
      remoteKey: teams/cyan-rhino/mctlpytest
      property: secret
envFrom:
  - secretRef:
      name: mctlpytest-secrets
