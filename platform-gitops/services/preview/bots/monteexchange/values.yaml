# Service: monteexchange
# Team: bots
# Environment: preview
# Chart: base-service

image:
  repository: ghcr.io/mctlhq/monteexchange
  tag: "1.0.1"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 8080
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
env:
  APP_ENV: preview
  EXCHANGE_FEE_IN_PERCENT: "1.75"
  WISE_HOST: https://api.transferwise.com
  WITHDRAWAL_FEE: "0"
ingress:
  enabled: true
  host: monteexchange.mctl.me
externalSecret:
  targetSecret: monteexchange-secrets
  data:
    - secretKey: BALANCE_ID
      remoteKey: teams/bots/monteexchange
      property: BALANCE_ID
    - secretKey: BOT_TOKEN
      remoteKey: teams/bots/monteexchange
      property: BOT_TOKEN
    - secretKey: PROFILE_ID
      remoteKey: teams/bots/monteexchange
      property: PROFILE_ID
    - secretKey: WISE_HOST
      remoteKey: teams/bots/monteexchange
      property: WISE_HOST
    - secretKey: WISE_TOKEN
      remoteKey: teams/bots/monteexchange
      property: WISE_TOKEN
envFrom:
  - secretRef:
      name: monteexchange-secrets
