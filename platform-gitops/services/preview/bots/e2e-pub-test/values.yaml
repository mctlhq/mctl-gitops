# Service: e2e-pub-test
# Team: bots
# Environment: preview
# Chart: base-service

image:
  repository: ghcr.io/dmitriimashkov/e2e-pub-test
  tag: "1.0.0"

imagePullSecrets:
  - name: ghcr-credentials

service:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  APP_ENV: preview

ingress:
  enabled: true
  host: e2e-pub-test.preview.mctl.me
