image:
  repository: ghcr.io/mashkovd/mctl-landing
  tag: "latest"
  pullPolicy: Always

service:
  port: 80

resources:
  requests:
    cpu: 20m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

env:
  NGINX_PORT: "80"

ingress:
  enabled: true
  className: traefik
  host: platform.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd
  tls:
    - hosts:
        - platform.mctl.me
      secretName: landing-page-tls

# No external secrets needed - static site only
externalSecret:
  enabled: false

probes:
  liveness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
