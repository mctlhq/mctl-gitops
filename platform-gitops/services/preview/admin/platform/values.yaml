# Service: platform
# Team: admin
# Environment: preview
# Chart: base-service

image:
  repository: ghcr.io/dmitriimashkov/platform
  tag: "1.0.5"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 80
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
env:
  APP_ENV: preview
  a: "1"
ingress:
  enabled: true
  host: platform.mctl.me
externalSecret:
  targetSecret: platform-secrets
  data:
    - secretKey: s
      remoteKey: teams/admin/platform
      property: s
envFrom:
  - secretRef:
      name: platform-secrets
