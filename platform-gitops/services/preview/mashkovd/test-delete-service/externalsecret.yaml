apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: test-delete-service-secrets
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: test-delete-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: teams/mashkovd/test-delete-service
        property: DB_PASSWORD
    - secretKey: API_KEY
      remoteRef:
        key: teams/mashkovd/test-delete-service
        property: API_KEY
