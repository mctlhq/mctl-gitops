# Service: nginx
# Team: libertex
# Environment: preview

image:
  repository: nginxdemos/hello
  tag: "plain-text"

service:
  port: 80

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  newKey: "New Value1"

externalSecret:
  targetSecret: nginx-secrets
  data:
    - secretKey: newKeys
      remoteKey: preview/libertex/nginx
      property: newKeys

envFrom:
  - secretRef:
      name: nginx-secrets

ingress:
  enabled: true
  host: plain-text-preview.mctl.me
