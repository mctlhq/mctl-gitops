apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mctl-test
  description: "mctl-test service"
  annotations:
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=oh-lala-mctl-test
    backstage.io/kubernetes-namespace: oh-lala
    argocd/app-name: oh-lala-mctl-test
    github.com/source-repo: gornov/mctl-test
    # mctl.me/auto-deploy — triggered by GitHub App webhook on tag push
    #   "true" or "auto" — deploy immediately via scaffolder
    #   "confirm"         — notify only, user deploys manually from UI
    #   "false" or absent — skip
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.me/applications/argocd/oh-lala-mctl-test
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/gornov/mctl-test
      title: Source Repository
      icon: github
    - url: https://workflows.mctl.me
      title: Argo Workflows
      icon: github
    - url: https://oh-lala-mctl-test.mctl.ai
      title: Service URL
      icon: web
  labels:
    team: oh-lala
    env: apps
spec:
  type: service
  lifecycle: production
  owner: group:oh-lala
  system: team-oh-lala
