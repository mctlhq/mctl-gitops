# Service: mctl-docs
# Team: admins

# Chart: base-service

image:
  repository: ghcr.io/mctlhq/mctl-docs
  tag: "0.1.25"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 80
backstage:
  kubernetesId: mctl-docs
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 512Mi
env:
  APP_ENV: production
ingress:
  enabled: true
  hosts:
    - docs.mctl.ai
    - admins-mctl-docs.mctl.ai
    - admins-mctl-docs.mctl.me
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - secretName: mctl-docs-tls
      hosts:
        - docs.mctl.ai
        - admins-mctl-docs.mctl.ai
        - admins-mctl-docs.mctl.me
extraContainers: []
