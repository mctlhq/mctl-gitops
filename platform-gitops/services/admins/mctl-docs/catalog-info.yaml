apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: mctl-docs
  description: "mctl-docs service"
  annotations:
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=admins-mctl-docs
    backstage.io/kubernetes-id: mctl-docs
    backstage.io/kubernetes-namespace: admins
    argocd/app-name: admins-mctl-docs
    github.com/source-repo: mctlhq/mctl-docs
    # mctl.me/auto-deploy — triggered by GitHub App webhook on tag push
    #   "true" or "auto" — deploy immediately via scaffolder
    #   "confirm"         — notify only, user deploys manually from UI
    #   "false" or absent — skip
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.ai/applications/argocd/admins-mctl-docs
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/mctlhq/mctl-docs
      title: Source Repository
      icon: github
    - url: https://workflows.mctl.ai
      title: Argo Workflows
      icon: github
    - url: https://admins-mctl-docs.mctl.ai
      title: Service URL
      icon: web
  labels:
    team: admins
    env: apps
spec:
  type: service
  lifecycle: production
  owner: group:admins
  system: team-admins
