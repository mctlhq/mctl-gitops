# Service: mctl-web
# Team: admins
# Environment: production
# Chart: base-service

image:
  repository: ghcr.io/mctlhq/mctl-web
  tag: "1.1.3"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 80
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  APP_ENV: production
  t: "1"
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - mctl.me
    - mctl.ru
    - mctl.io
  tls:
    - secretName: mctl-web-tls
      hosts:
        - mctl.me
        - mctl.ru
        - mctl.io
probes:
  liveness: null
  readiness: null
externalSecret:
  targetSecret: mctl-web-secrets
  data:
    - secretKey: s
      remoteKey: teams/admins/mctl-web
      property: s
envFrom:
  - secretRef:
      name: mctl-web-secrets
