# Service: mctl-web
# Team: admins
# Environment: production
# Chart: base-service

image:
  repository: ghcr.io/mctlhq/mctl-web
  tag: "4.7.2"
imagePullSecrets:
  - name: ghcr-credentials
service:
  port: 80
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 512Mi
env:
  APP_ENV: production
  t: "123"
  r: "321"
  NUXT_PUBLIC_FRONT_BASE: https://mctl.ai
  NUXT_VUE_DEVTOOLS: "true"
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - mctl.me
    - mctl.ru
    - mctl.ai
  tls:
    - secretName: mctl-web-tls
      hosts:
        - mctl.me
        - mctl.ru
        - mctl.ai
blueGreen:
  enabled: true
  autoPromotionEnabled: true
externalSecret: {}
envFrom: []
