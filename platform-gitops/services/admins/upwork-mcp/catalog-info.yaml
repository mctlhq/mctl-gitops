apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: upwork-mcp
  description: "upwork-mcp service"
  annotations:
    backstage.io/kubernetes-label-selector: app.kubernetes.io/instance=admins-upwork-mcp
    backstage.io/kubernetes-id: upwork-mcp
    backstage.io/kubernetes-namespace: admins
    argocd/app-name: admins-upwork-mcp
    github.com/source-repo: mashkovd/upwork-mcp
    # mctl.me/auto-deploy — triggered by GitHub App webhook on tag push
    #   "true" or "auto" — deploy immediately via scaffolder
    #   "confirm"         — notify only, user deploys manually from UI
    #   "false" or absent — skip
    mctl.me/auto-deploy: "false"
  links:
    - url: https://ops.mctl.ai/applications/argocd/admins-upwork-mcp
      title: ArgoCD
      icon: dashboard
    - url: https://github.com/mashkovd/upwork-mcp
      title: Source Repository
      icon: github
    - url: https://workflows.mctl.ai
      title: Argo Workflows
      icon: github
    - url: https://admins-upwork-mcp.mctl.ai
      title: Service URL
      icon: web
  labels:
    team: admins
    env: apps
spec:
  type: service
  lifecycle: production
  owner: group:admins
  system: team-admins
