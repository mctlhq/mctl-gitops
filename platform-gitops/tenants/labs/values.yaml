# Tenant configuration for: labs
# Created by: wft-create-tenant workflow
# Managed by: ArgoCD ApplicationSet (applicationset-tenants)
tenant:
  name: labs
  displayName: "labs"
  description: ""
  contactEmail: "mashkoffdmitry@gmail.com"
  members:
    - userId: mashkoffdmitry
      role: owner
  quotas:
    # Bumped 2026-05-10 (2nd): preview pod (pelican-proxy-pr-36) + workflow pod
    # exhausted limits.cpu (used 9100m/10000m) and limits.memory (9024Mi/9Gi)
    # and requests.memory (3920Mi/4Gi). Workflow needs limits.cpu=1, limits.memory=512Mi,
    # requests.memory=256Mi. Bump to limits.cpu=12, limits.memory=11Gi, requests.memory=5Gi
    # for ~2Gi/2000m headroom above current usage.
    #
    # Bumped 2026-05-10 (1st): requests.cpu 2 → 3 (validate pod needs 100m,
    # used was 1985m/2000m with preview pod in namespace).
    #
    # Bumped 2026-05-10: pelican-proxy preview env + workflow pods need headroom
    # beyond the 3Gi limit (used: 2896Mi, workflow pods request 256-384Mi each).
    # requests.memory 3Gi → 4Gi gives ~1Gi free for concurrent workflow + preview.
    #
    # Bumped 2026-05-08: 4 baseline service pods (kuptsi-app, openclaw,
    # trading-data, pelican-proxy) settle at ~5100m used → only 900m headroom
    # under the previous limits.cpu=6, which is below the 1000m a single
    # deploy-service workflow scaffold pod (validate / build-image / commit /
    # refresh-apps-appset) requests. CI/CD auto-deploys from
    # mashkoffdmitry/pelican-libertex-social were stuck Pending indefinitely.
    # Bump limits.cpu 6 → 8 (one extra workflow slot + buffer for a future 5th
    # service); requests.cpu 1500m → 2 keeps reserve symmetric.
    #
    # Earlier history (2026-05-06): bumped to fit kuptsi-app FastAPI +
    # Temporal worker alongside labs-openclaw (2600m / 1104Mi req).
    requests.cpu: "3"
    requests.memory: "5Gi"
    limits.cpu: "12"
    # Right-sized 2026-07: after the openclaw memory-limit trim (2560Mi ->
    # 2048Mi, mctl-gitops#532), current steady-state usage is 6560Mi/11Gi —
    # but labs-openclaw is scaled to 0 right now (see
    # services/labs/openclaw/values.yaml) and documented to come back
    # online. Budgeted for that: 6560Mi + 2048Mi (openclaw's trimmed limit,
    # once re-enabled) + ~2Gi headroom (same margin the 2026-05-10 bump
    # validated for concurrent workflow + preview pods) ~= 10.5Gi. Only a
    # 512Mi trim vs the un-adjusted 9Gi first estimate, on purpose — this
    # tenant has the documented history of workflow pods stuck Pending when
    # headroom got too tight.
    limits.memory: "10.5Gi"
    pods: "15"
    persistentvolumeclaims: "2"
    services: "15"
  limitRange:
    enabled: true
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "50m"
      memory: "128Mi"
    max:
      cpu: "3"
      memory: "3Gi"
  networking:
    allowIntraNamespace: true
    allowClusterEgress: true
    allowInternetEgress: true
