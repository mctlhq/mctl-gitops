# Tenant configuration for: labs
# Created by: wft-create-tenant workflow
# Managed by: ArgoCD ApplicationSet (applicationset-tenants)
tenant:
  name: labs
  displayName: "labs"
  description: ""
  contactEmail: "mashkoffdmitry@gmail.com"
  members:
    - userId: mashkoffdmitry
      role: owner
  quotas:
    # Bumped 2026-05-06 to fit kuptsi-app (FastAPI + Temporal worker side
    # container) alongside labs-openclaw and transient provision/build pods.
    # Previous limits were saturated by labs-openclaw (2600m CPU / 1104Mi req),
    # blocking provision-database workflow with `exceeded quota`.
    requests.cpu: "1500m"
    requests.memory: "3Gi"
    limits.cpu: "6"
    limits.memory: "7Gi"
    pods: "15"
    persistentvolumeclaims: "5"
    services: "15"
  limitRange:
    enabled: true
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "50m"
      memory: "128Mi"
    max:
      cpu: "1500m"
      memory: "3Gi"
  networking:
    allowIntraNamespace: true
    allowClusterEgress: true
    allowInternetEgress: true
