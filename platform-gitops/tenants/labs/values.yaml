# Tenant configuration for: labs
# Created by: wft-create-tenant workflow
# Managed by: ArgoCD ApplicationSet (applicationset-tenants)
tenant:
  name: labs
  displayName: "labs"
  description: ""
  contactEmail: "mashkoffdmitry@gmail.com"
  members:
    - userId: mashkoffdmitry
      role: owner
  quotas:
    # Bumped 2026-05-10: pelican-proxy preview env + workflow pods need headroom
    # beyond the 3Gi limit (used: 2896Mi, workflow pods request 256-384Mi each).
    # requests.memory 3Gi → 4Gi gives ~1Gi free for concurrent workflow + preview.
    #
    # Bumped 2026-05-08: 4 baseline service pods (kuptsi-app, openclaw,
    # trading-data, pelican-proxy) settle at ~5100m used → only 900m headroom
    # under the previous limits.cpu=6, which is below the 1000m a single
    # deploy-service workflow scaffold pod (validate / build-image / commit /
    # refresh-apps-appset) requests. CI/CD auto-deploys from
    # mashkoffdmitry/pelican-libertex-social were stuck Pending indefinitely.
    # Bump limits.cpu 6 → 8 (one extra workflow slot + buffer for a future 5th
    # service); requests.cpu 1500m → 2 keeps reserve symmetric.
    #
    # Earlier history (2026-05-06): bumped to fit kuptsi-app FastAPI +
    # Temporal worker alongside labs-openclaw (2600m / 1104Mi req).
    requests.cpu: "2"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "7Gi"
    pods: "15"
    persistentvolumeclaims: "5"
    services: "15"
  limitRange:
    enabled: true
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "50m"
      memory: "128Mi"
    max:
      cpu: "1500m"
      memory: "3Gi"
  networking:
    allowIntraNamespace: true
    allowClusterEgress: true
    allowInternetEgress: true
