# Tenant configuration for: admin
# Managed by: platform-gitops/tenants/admin/values.yaml
# Applied by: ArgoCD ApplicationSet (applicationset-tenants)
tenant:
  name: admin
  displayName: "Admin"
  githubTeam: admin
  quotas:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    pods: "100"
    persistentvolumeclaims: "20"
    services: "50"
  limitRange:
    enabled: true
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "2"
      memory: "4Gi"
  networking:
    allowIntraNamespace: true
    allowClusterEgress: true
    allowInternetEgress: true
