# Tenant configuration for: admins
# Managed by: platform-gitops/tenants/admins/values.yaml
# Applied by: ArgoCD ApplicationSet (applicationset-tenants)
tenant:
  name: admins
  displayName: "Admins"
  members:
    - userId: mashkovd
      role: owner
  quotas:
    # Bumped 2026-05-30: requests.cpu "1" left only ~60m headroom at
    # steady-state (940m used), so a deploy/rollback workflow pod (100m
    # requests) couldn't schedule — this deadlocked a mctl-web rollback
    # during an outage. Raised 1 -> 2 to keep ~1000m+ headroom for
    # deploy-pipeline / rollback workflow pods and rollout surges.
    requests.cpu: "2"
    requests.memory: "3Gi"
    # Bumped 2026-05-13: openclaw sidecar limit increase (s3-sync 2000m +
    # skills-fanout 300m) brings pod limits to 6300m; bumped from 7 to 8
    # to preserve 1000m+ headroom for deploy workflow pods.
    # Bumped 2026-05-16: steady-state usage reached 7500m (openclaw 6300m +
    # mctl-agent/mctl-design/mctl-docs/mctl-web 1200m), leaving only 500m —
    # not enough for the 1000m deploy-pipeline pods. Raised 8 to 10.
    limits.cpu: "10"
    # Right-sized 2026-07: after the openclaw memory-limit trim (2560Mi ->
    # 1536Mi, mctl-gitops#532), steady-state usage is 3712Mi/6Gi. Lowered to
    # 5Gi, keeping ~1.3Gi headroom (same class of margin as the CPU buffer
    # above) for deploy-pipeline/rollback workflow pods. Frees 1Gi of
    # cluster-wide memory-limit quota ceiling for onboarding more tenants
    # (docs/audit/PLATFORM_ASSESSMENT_2026-07.md capacity note).
    limits.memory: "5Gi"
    pods: "12"
    persistentvolumeclaims: "2"
    services: "10"
  limitRange:
    enabled: true
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "50m"
      memory: "128Mi"
    max:
      cpu: "4"
      memory: "5Gi"
  networking:
    allowIntraNamespace: true
    allowClusterEgress: true
    allowInternetEgress: true
