# Tenant configuration for: admins
# Managed by: platform-gitops/tenants/admins/values.yaml
# Applied by: ArgoCD ApplicationSet (applicationset-tenants)
tenant:
  name: admins
  displayName: "Admins"
  members:
    - userId: mashkovd
      role: owner
  quotas:
    requests.cpu: "1"
    requests.memory: "3Gi"
    # Bumped 2026-05-13: openclaw sidecar limit increase (s3-sync 2000m +
    # skills-fanout 300m) brings pod limits to 6300m; bumped from 7 to 8
    # to preserve 1000m+ headroom for deploy workflow pods.
    limits.cpu: "8"
    limits.memory: "6Gi"
    pods: "12"
    persistentvolumeclaims: "2"
    services: "10"
  limitRange:
    enabled: true
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "50m"
      memory: "128Mi"
    max:
      cpu: "4"
      memory: "5Gi"
  networking:
    allowIntraNamespace: true
    allowClusterEgress: true
    allowInternetEgress: true
