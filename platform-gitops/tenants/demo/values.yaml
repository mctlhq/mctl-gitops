# Tenant configuration for: demo
# Created by: wft-create-tenant workflow
# Managed by: ArgoCD ApplicationSet (applicationset-tenants)
tenant:
  name: demo
  displayName: "demo"
  description: "Sample workspace for Anthropic connector review"
  contactEmail: "mashkoffdmitry@yandex.ru"
  members:
    - userId: mctl-reviewer
      role: owner
  quotas:
    requests.cpu: "2"
    requests.memory: "3Gi"
    limits.cpu: "4"
    limits.memory: "6Gi"
    pods: "10"
    persistentvolumeclaims: "5"
    services: "10"
  limitRange:
    enabled: true
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "2"
      memory: "5Gi"
  networking:
    allowIntraNamespace: true
    allowClusterEgress: true
    allowInternetEgress: false
