# Worker: monteexchange
# Team: bots
# Environment: preprod
# Chart: worker-service

image:
  repository: ghcr.io/mashkovd/monteexchange
  tag: "eeb1a64"
  pullPolicy: Always

workloadType: deployment

env:
  EXCHANGE_FEE_IN_PERCENT: "1.75"
  WITHDRAWAL_FEE: "0"
  WISE_HOST: "https://api.transferwise.com"

envFrom:
  - secretRef:
      name: monteexchange-secrets

externalSecret:
  store: vault-backend
  targetSecret: monteexchange-secrets
  refreshInterval: 1h
  data:
    - secretKey: BOT_TOKEN
      remoteKey: preprod/bots/monteexchange
      property: BOT_TOKEN
    - secretKey: WISE_TOKEN
      remoteKey: preprod/bots/monteexchange
      property: WISE_TOKEN
    - secretKey: BALANCE_ID
      remoteKey: preprod/bots/monteexchange
      property: BALANCE_ID
    - secretKey: PROFILE_ID
      remoteKey: preprod/bots/monteexchange
      property: PROFILE_ID

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

probes:
  liveness:
    path: /health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    path: /health
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
