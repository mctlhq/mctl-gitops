# Worker: monteexchange
# Team: bots
# Environment: preprod
# Chart: worker-service

image:
  repository: ghcr.io/mashkovd/monteexchange
  tag: "eeb1a64"
  pullPolicy: Always

workloadType: deployment

envFrom:
  - secretRef:
      name: monteexchange-secrets

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
