# Worker: sample-worker
# Team: sample-team
# Environment: preprod
# Type: deployment (long-running consumer)

image:
  repository: ghcr.io/dmitriimashkov/sample-worker
  tag: latest  # TODO: pin to specific tag via CI

workloadType: deployment

command: []
args: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  LOG_LEVEL: debug
  APP_ENV: preprod
  QUEUE_URL: "redis://redis:6379"
