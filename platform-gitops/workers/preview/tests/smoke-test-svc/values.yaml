  tag: "main"

imagePullSecrets:
  - name: ghcr-credentials

workloadType: deployment

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  APP_ENV: preview
