apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-database-v2
  title: "Provision Database [v2 · Argo]"
  description: |
    Provision a PostgreSQL database for an existing service. Use this if you skipped
    database provisioning during onboarding. Creates a dedicated role, database, Vault secret,
    and Kubernetes ExternalSecret.
    Powered by Argo Workflows (replaces GitHub Actions).
  tags:
    - database
    - postgresql
    - provisioning
    - argo
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: group:admins
  type: provisioning

  parameters:
    - title: Database Details
      required:
        - serviceName
      properties:
        serviceName:
          title: Service
          type: string
          description: "Select the service this database belongs to"
          ui:field: OwnedEntityPicker
          ui:options:
            allowedKinds:
              - Component

  steps:
    - id: fetch-service
      name: Fetch service details
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.serviceName }}

    - id: trigger-provision
      name: Provision database via Argo Workflows
      action: mctl:workflow:submit
      input:
        templateName: provision-database
        parameters:
          team_name: ${{ steps['fetch-service'].output.entity.metadata.labels.team or steps['fetch-service'].output.entity.spec.owner | replace('group:', '') }}
          app_name: ${{ steps['fetch-service'].output.entity.metadata.name }}

  output:
    text:
      - title: Database name
        content: "`${{ steps['fetch-service'].output.entity.metadata.labels.team or steps['fetch-service'].output.entity.spec.owner | replace('group:', '') }}-${{ steps['fetch-service'].output.entity.metadata.name }}`"
      - title: Vault path
        content: "`platform/teams/${{ steps['fetch-service'].output.entity.metadata.labels.team or steps['fetch-service'].output.entity.spec.owner | replace('group:', '') }}/${{ steps['fetch-service'].output.entity.metadata.name }}/database`"
      - title: Kubernetes secret
        content: "`${{ steps['fetch-service'].output.entity.metadata.labels.team or steps['fetch-service'].output.entity.spec.owner | replace('group:', '') }}-${{ steps['fetch-service'].output.entity.metadata.name }}-db-creds`"
    links:
      - title: Argo Workflows Run
        icon: dashboard
        url: ${{ steps['trigger-provision'].output.workflowUrl }}
      - title: Argo Workflows UI
        icon: dashboard
        url: "https://workflows.mctl.me"
