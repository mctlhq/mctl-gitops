apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: update-environment
  title: ⚙️ Update Environment
  description: Update environment variables and secrets for a running service without triggering a rebuild.
  tags:
    - configure
    - secrets
    - environment
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: group:admin
  type: configuration

  parameters:
    - title: Service
      required:
        - serviceName
      properties:
        serviceName:
          title: Service
          type: string
          description: "Select the deployed service to update"
          ui:field: OwnedEntityPicker
          ui:options:
            allowedKinds:
              - Component

    - title: Environment
      properties:
        envVars:
          title: Environment Variables
          type: string
          description: "KEY=VALUE pairs, one per line. Stored as plaintext in GitOps manifests — do not put secrets here."
          ui:widget: textarea
          ui:options:
            rows: 6
          ui:placeholder: |
            LOG_LEVEL=info
            TIMEOUT_SECONDS=30
            FEATURE_FLAG=true

    - title: Secure Variables
      properties:
        secretEnvVars:
          title: Secure Variables
          type: string
          description: "KEY=VALUE pairs, one per line. Stored securely in Vault — never exposed in Git."
          ui:widget: textarea
          ui:options:
            minRows: 10
          ui:placeholder: |
            API_KEY=your-api-key-here
            DATABASE_PASSWORD=your-db-password
            SECRET_TOKEN=your-secret-token

  steps:
    - id: fetch-service
      name: Fetch service details
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.serviceName }}

    - id: update-config
      name: Apply changes
      if: ${{ parameters.envVars or parameters.secretEnvVars }}
      action: github:actions:dispatch
      input:
        repoUrl: github.com?repo=mctl.me&owner=dmitriimashkov
        workflowId: release-service.yml
        branchOrTagName: main
        workflowInputs:
          action: update-config
          team_name: ${{ steps['fetch-service'].output.entity.metadata.labels.team or steps['fetch-service'].output.entity.spec.owner | replace('group:', '') }}
          component_name: ${{ steps['fetch-service'].output.entity.metadata.name }}
          env_vars: ${{ parameters.envVars | default('') }}
          secret_env_vars: ${{ parameters.secretEnvVars | default('') }}

  output:
    text:
      - title: Summary
        content: |
          **Service:** `${{ steps['fetch-service'].output.entity.metadata.labels.team or steps['fetch-service'].output.entity.spec.owner | replace('group:', '') }}/${{ steps['fetch-service'].output.entity.metadata.name }}`

          ${{ parameters.secretEnvVars and '✅ **Secrets** update dispatched — will be stored in Vault and synced to Kubernetes automatically.' or '' }}

          ${{ parameters.envVars and '✅ **Env vars** update dispatched to GitHub Actions. ArgoCD will sync automatically (~2-3 min).' or '' }}
    links:
      - title: GitHub Actions Run
        url: https://github.com/dmitriimashkov/mctl.me/actions/workflows/release-service.yml
        if: ${{ parameters.envVars or parameters.secretEnvVars }}
