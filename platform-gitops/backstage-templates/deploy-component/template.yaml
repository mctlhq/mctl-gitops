apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboard-service
  title: Onboard Service
  description: First-time setup — clone a repo, build the image, and deploy a new service to the preview cluster.
  tags:
    - onboard
    - deploy
    - kubernetes
    - preview
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: group:admins
  type: deployment
  presentation:
    buttonLabels:
      createButtonText: 'Onboard Service'
      reviewButtonText: 'Review & Onboard'

  parameters:
    - title: Service & Source
      required:
        - teamName
        - dockerfileRepo
      properties:
        teamName:
          title: Team
          type: string
          description: "Select your team"
          ui:field: MyGroupsPicker
        dockerfileRepo:
          title: GitHub Repository
          type: string
          description: "Select a repository or type owner/repo"
          pattern: "^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$"
          ui:field: GitHubRepoPicker
        dockerfilePath:
          title: Dockerfile Path
          type: string
          default: Dockerfile
        gitTag:
          title: Tag
          type: string
          description: "Select a tag to checkout and build, or leave empty to build from HEAD (image tagged 'latest')."
          ui:field: GitTagPicker

    - title: Networking
      properties:
        port:
          title: Port
          type: number
          default: 8080
          description: "Container port exposed by the service."
        host:
          title: Ingress Host
          type: string
          description: "Public hostname (e.g. myapp.mctl.me). Leave empty for a background worker — no ingress will be created."
        skipHealthCheck:
          title: Skip Health Checks
          type: boolean
          default: true
          description: "Skip liveness/readiness probes. Recommended for onboarding if /healthz and /readyz are not yet implemented."

    - title: Database
      properties:
        provisionDatabase:
          title: Provision PostgreSQL Database
          type: boolean
          default: false
          description: |
            Create a dedicated database, Vault secret, and K8s ExternalSecret for this service.
            Safe to enable — skips if database already exists.

            When enabled, the following env vars will be auto-injected into the service:
              DATABASE_URL  — postgresql://user:pass@host:port/dbname
              DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD

    - title: Environment
      properties:
        envVars:
          title: Environment Variables
          type: string
          description: "KEY=VALUE pairs, one per line. Stored as plaintext in GitOps manifests — do not put secrets here."
          ui:widget: textarea
          ui:options:
            rows: 5
          ui:placeholder: |
            APP_ENV=production
            LOG_LEVEL=info
            TIMEOUT_SECONDS=30

    - title: Secure Variables
      properties:
        secretEnvVars:
          title: Secure Variables
          type: string
          description: "KEY=VALUE pairs, one per line. Stored securely in Vault — never exposed in Git."
          ui:widget: textarea
          ui:options:
            minRows: 10
          ui:placeholder: |
            API_KEY=your-api-key-here
            DATABASE_PASSWORD=your-db-password
            SECRET_TOKEN=your-secret-token

    - title: Advanced (optional)
      description: "Only needed if the GitHub App is not installed on your repository."
      properties:
        repoPat:
          title: Repository PAT
          type: string
          description: "Fine-grained PAT with 'Contents: Read' scope. Stored securely in Vault."
          ui:field: Secret

  steps:
    - id: save-repo-pat
      name: Save repo PAT to Vault
      if: ${{ parameters.repoPat }}
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/vault/v1/secret/data/teams/${{ parameters.teamName | parseEntityRef | pick('name') }}/${{ parameters.dockerfileRepo | repoName }}/repo-pat
        headers:
          Content-Type: application/json
        body:
          data:
            pat: ${{ parameters.repoPat }}

    - id: trigger-build
      name: Release service
      action: github:actions:dispatch-and-stream
      input:
        repoUrl: github.com?repo=mctl-core&owner=mctlhq
        workflowId: release-service.yml
        branchOrTagName: main
        workflowInputs:
          action: onboard
          team_name: ${{ parameters.teamName | parseEntityRef | pick('name') }}
          component_name: ${{ parameters.dockerfileRepo | repoName }}
          component_type: ${{ 'base-service' if parameters.host else 'worker-service' }}
          dockerfile_repo: ${{ parameters.dockerfileRepo }}
          dockerfile_path: ${{ parameters.dockerfilePath | default('Dockerfile') }}
          git_tag: ${{ parameters.gitTag | default('') }}
          port: ${{ parameters.port | string }}
          host: ${{ parameters.host | default('') }}
          skip_health_check: ${{ parameters.skipHealthCheck | string }}
          provision_database: ${{ parameters.provisionDatabase | string }}
          env_vars: ${{ parameters.envVars | default('') }}
          secret_env_vars: ${{ parameters.secretEnvVars | default('') }}

    - id: trigger-provision-db
      name: Provision database
      if: ${{ parameters.provisionDatabase }}
      action: github:actions:dispatch
      input:
        repoUrl: github.com?repo=mctl-core&owner=mctlhq
        workflowId: provision-db.yml
        branchOrTagName: main
        workflowInputs:
          team: ${{ parameters.teamName | parseEntityRef | pick('name') }}
          app: ${{ parameters.dockerfileRepo | repoName }}

  output:
    text:
      - title: Type
        content: "${{ 'Web Service' if parameters.host else 'Background Worker' }}"
      - title: Version
        content: "${{ parameters.gitTag or 'latest (HEAD)' }}"
      - title: Preview URL
        content: "${{ 'https://' + parameters.host if parameters.host else 'N/A — background worker' }}"
      - title: Database
        content: "${{ parameters.provisionDatabase and '✅ Provisioning dispatched — DATABASE_URL, DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD will be injected as env vars from K8s secret' or 'Not requested' }}"
    links:
      - title: Release Pipeline
        icon: github
        url: ${{ steps['trigger-build'].output.runUrl }}
      - title: ArgoCD Dashboard
        icon: dashboard
        url: "https://ops.mctl.me"
