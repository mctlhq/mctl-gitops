apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-database
  title: 🗄️ Provision Database
  description: Provision a PostgreSQL database for your service. Creates a dedicated role, database, and Kubernetes secret populated from Vault.
  tags:
    - database
    - postgresql
    - provisioning
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: group:admin
  type: provisioning

  parameters:
    - title: Database Details
      required:
        - serviceName
      properties:
        serviceName:
          title: Service
          type: string
          description: "Select the service this database belongs to"
          ui:field: OwnedEntityPicker
          ui:options:
            allowedKinds:
              - Component

  steps:
    - id: fetch-service
      name: Fetch service details
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.serviceName }}

    - id: trigger-provision
      name: Provision database
      action: github:actions:dispatch-and-stream
      input:
        repoUrl: github.com?repo=mctl-core&owner=mctlhq
        workflowId: provision-db.yml
        branchOrTagName: main
        workflowInputs:
          team: ${{ steps['fetch-service'].output.entity.metadata.labels.team or steps['fetch-service'].output.entity.spec.owner | replace('group:', '') }}
          app: ${{ steps['fetch-service'].output.entity.metadata.name }}

  output:
    text:
      - title: Database name
        content: "`${{ steps['fetch-service'].output.entity.metadata.labels.team or steps['fetch-service'].output.entity.spec.owner | replace('group:', '') }}-${{ steps['fetch-service'].output.entity.metadata.name }}`"
      - title: Vault path
        content: "`platform/teams/${{ steps['fetch-service'].output.entity.metadata.labels.team or steps['fetch-service'].output.entity.spec.owner | replace('group:', '') }}/${{ steps['fetch-service'].output.entity.metadata.name }}/database`"
      - title: Kubernetes secret
        content: "`${{ steps['fetch-service'].output.entity.metadata.labels.team or steps['fetch-service'].output.entity.spec.owner | replace('group:', '') }}-${{ steps['fetch-service'].output.entity.metadata.name }}-db-creds`"
    links:
      - title: Provision Run
        icon: github
        url: ${{ steps['trigger-provision'].output.runUrl }}
