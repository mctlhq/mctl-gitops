apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-database
  title: 🗄️ Provision Database
  description: Provision a PostgreSQL database for your service. Creates a dedicated role, database, and Kubernetes secret populated from Vault.
  tags:
    - database
    - postgresql
    - provisioning
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: group:admin
  type: provisioning

  parameters:
    - title: Database Details
      required:
        - teamName
        - serviceName
      properties:
        teamName:
          title: Team
          type: string
          description: "Select your team"
          ui:field: MyGroupsPicker
        serviceName:
          title: App / Service Name
          type: string
          description: "Select the service this database belongs to"
          ui:field: OwnedEntityPicker
          ui:options:
            allowedKinds:
              - Component

  steps:
    - id: trigger-provision
      name: Provision database
      action: github:actions:dispatch
      input:
        repoUrl: github.com?repo=mctl.me&owner=dmitriimashkov
        workflowId: provision-db.yml
        branchOrTagName: main
        workflowInputs:
          team: ${{ parameters.teamName | parseEntityRef | pick('name') }}
          app: ${{ parameters.serviceName | parseEntityRef | pick('name') }}

  output:
    text:
      - title: Database name
        content: "`${{ parameters.teamName | parseEntityRef | pick('name') }}-${{ parameters.serviceName | parseEntityRef | pick('name') }}`"
      - title: Vault path
        content: "`platform/teams/${{ parameters.teamName | parseEntityRef | pick('name') }}/${{ parameters.serviceName | parseEntityRef | pick('name') }}/database`"
      - title: Kubernetes secret
        content: "`${{ parameters.teamName | parseEntityRef | pick('name') }}-${{ parameters.serviceName | parseEntityRef | pick('name') }}-db-creds`"
    links:
      - title: View GitHub Actions Run
        icon: github
        url: https://github.com/dmitriimashkov/mctl.me/actions/workflows/provision-db.yml
