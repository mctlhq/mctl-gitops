## Argo CD configuration for mctl.me preview
## Chart: argo-cd v9.4.1

nameOverride: argocd

global:
  domain: argocd-preview.mctl.me

configs:
  cm:
    url: https://argocd-preview.mctl.me
    admin.enabled: true
    timeout.reconciliation: 180s
    dex.config: |
      logger:
        level: info
        format: json
      connectors:
      - type: github
        id: github
        name: GitHub
        config:
          baseURL: https://github.com
          clientID: "$github-client-id"
          clientSecret: "$github-client-secret"
          orgs:
            - name: dmitriimashkov

  params:
    server.insecure: true

  rbac:
    policy.default: ""
    policy.csv: |
      # Admin team: full access
      p, role:admin, applications, *, */*, allow
      p, role:admin, logs, get, */*, allow
      p, role:admin, clusters, get, */*, allow
      p, role:admin, repositories, *, */*, allow
      p, role:admin, projects, *, */*, allow
      g, dmitriimashkov:admin, role:admin

      # Team: developers
      p, role:team-developers, applications, get, argocd/preview-developers-*, allow
      p, role:team-developers, applications, sync, argocd/preview-developers-*, allow
      p, role:team-developers, logs, get, argocd/preview-developers-*, allow
      g, dmitriimashkov:developers, role:team-developers

      # Team: control
      p, role:team-control, applications, get, argocd/preview-control-*, allow
      p, role:team-control, applications, sync, argocd/preview-control-*, allow
      p, role:team-control, logs, get, argocd/preview-control-*, allow
      g, dmitriimashkov:control, role:team-control
    scopes: "[groups]"

  secret:
    createSecret: true
    extra:
      github-client-id: ""
      github-client-secret: ""

  credentialTemplates:
    github-https:
      url: https://github.com/dmitriimashkov
      username: argocd
      password: ""

  repositories:
    mctl-me:
      url: https://github.com/dmitriimashkov/mctl.me.git
      username: argocd
      password: ""

server:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls: true
    extraTls:
      - hosts:
          - argocd-preview.mctl.me
        secretName: argocd-tls

extraObjects:
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: root-app
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/dmitriimashkov/mctl.me.git
        targetRevision: main
        path: platform-gitops/apps
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
