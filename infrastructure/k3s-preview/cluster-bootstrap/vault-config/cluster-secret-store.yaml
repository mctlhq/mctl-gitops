# ClusterSecretStore for Vault
# Prerequisites:
#   1. Vault must be initialized and unsealed
#   2. Kubernetes auth method must be enabled in Vault:
#      vault auth enable kubernetes
#      vault write auth/kubernetes/config \
#        kubernetes_host="https://kubernetes.default.svc:443"
#   3. A Vault role for ESO must be created:
#      vault write auth/kubernetes/role/external-secrets \
#        bound_service_account_names=external-secrets \
#        bound_service_account_namespaces=external-secrets \
#        policies=external-secrets-read \
#        ttl=1h
#   4. A Vault policy for ESO must exist:
#      vault policy write external-secrets-read - <<EOF
#        path "secret/data/preprod/*" { capabilities = ["read"] }
#      EOF
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
