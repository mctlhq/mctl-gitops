apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: vault-migrate-minio-
  namespace: argo-workflows
spec:
  entrypoint: main
  serviceAccountName: argo-workflow-sa
  templates:
    - name: main
      container:
        image: hashicorp/vault:1.15
        command: [sh, -c]
        args:
          - |
            export VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
            export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=argo-workflow jwt=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token))
            
            # Copy MinIO creds to teams/ path
            vault kv put secret/teams/platform/minio root-user="minio-admin" root-password="VCBB7w6LFCOgn6iEZGXZhFJlo7hIrhv"
            
            echo "✅ MinIO migrated to secret/teams/platform/minio"
