apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: vault-fix-tokens-
  namespace: argo-workflows
spec:
  entrypoint: main
  serviceAccountName: argo-workflow-sa
  templates:
    - name: main
      container:
        image: hashicorp/vault:1.15
        command: [sh, -c]
        args:
          - |
            export VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
            export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=argo-workflow jwt=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token))
            
            # Migrate tokens to teams/ path
            # Values are placeholders, user should update real tokens in Vault UI if needed
            vault kv put secret/teams/platform/mctl-agent/tokens \
              mctl-api-token="mctl-api-token-placeholder" \
              anthropic-api-key="anthropic-api-key-placeholder" \
              github-token="github-token-placeholder" \
              telegram-bot-token="telegram-bot-token-placeholder" \
              telegram-chat-id="telegram-chat-id-placeholder"
            
            echo "✅ Tokens migrated to secret/teams/platform/mctl-agent/tokens"
