apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: vault-fix-teams-
  namespace: argo-workflows
spec:
  entrypoint: main
  serviceAccountName: argo-workflow-sa
  templates:
    - name: main
      container:
        image: hashicorp/vault:1.15
        command: [sh, -c]
        args:
          - |
            export VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
            export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=argo-workflow jwt=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token))
            
            # Write to teams/ path which is guaranteed to be accessible
            vault kv put secret/teams/platform/mctl-agent/database \
              username="mctl-agent" \
              password="agent-db-secret-pass-77a8b2"
            
            echo "✅ Secret created at secret/teams/platform/mctl-agent/database"
            vault kv get secret/teams/platform/mctl-agent/database
