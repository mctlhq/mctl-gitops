apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: vault-policy-update-
  namespace: argo-workflows
spec:
  entrypoint: main
  serviceAccountName: argo-workflow-sa
  templates:
    - name: main
      container:
        image: hashicorp/vault:1.15
        command: [sh, -c]
        args:
          - |
            export VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
            export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=argo-workflow jwt=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token))
            
            echo "--- Current Policies ---"
            vault token lookup -format=json | jq -r ".data.policies"
            
            echo "--- Updating Policy argo-workflow-teams-rw ---"
            vault policy write argo-workflow-teams-rw - <<EOF
            # Read/write team service secrets
            path "secret/data/teams/*" {
              capabilities = ["create", "read", "update", "delete", "list"]
            }
            path "secret/metadata/teams/*" {
              capabilities = ["read", "list", "delete"]
            }
            # Read/write platform secrets (system components)
            path "secret/data/platform/*" {
              capabilities = ["create", "read", "update", "delete", "list"]
            }
            path "secret/metadata/platform/*" {
              capabilities = ["read", "list", "delete"]
            }
            EOF
            
            echo "✅ Policy updated"
