apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: mctl-agents-daily-manual-
  namespace: argo-workflows
  labels:
    workflows.argoproj.io/cron-workflow: mctl-agents-daily
    manual-trigger: 'true'
  annotations:
    workflows.argoproj.io/description: 'Manual one-shot trigger derived from cronwf/mctl-agents-daily.
      Apply with: kubectl apply -f trigger-mctl-agents.yaml'
spec:
  activeDeadlineSeconds: 3600
  entrypoint: run-agents
  serviceAccountName: argo-workflow-sa
  templates:
  - name: run-agents
    steps:
    - - name: clone
        template: clone-gitops
    - - name: run
        template: run-orchestrator
    - - name: commit
        template: commit-and-push
  - name: clone-gitops
    script:
      command:
      - sh
      image: alpine/git:2.43.0
      source: "set -e\napk add --no-cache openssh-client ca-certificates\nmkdir -p\
        \ ~/.ssh\ncp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519\nchmod 600\
        \ ~/.ssh/id_ed25519\nprintf 'Host github.com\\n  Hostname ssh.github.com\\\
        n  Port 443\\n  IdentityFile ~/.ssh/id_ed25519\\n  StrictHostKeyChecking no\\\
        n' > ~/.ssh/config\nchmod 600 ~/.ssh/config\ngit clone --depth=1 git@github.com:mctlhq/mctl-gitops.git\
        \ /workdir/mctl-gitops\nmkdir -p /workdir/mctl-gitops/platform-gitops/agents-state\n\
        echo \"\u2713 gitops cloned\"\n"
      volumeMounts:
      - mountPath: /workdir
        name: workdir
      - mountPath: /secrets/deploy-key
        name: deploy-key
  - container:
      env:
      - name: STATE_DIR
        value: /workdir/mctl-gitops/platform-gitops/agents-state
      - name: CLAUDE_CODE_OAUTH_TOKEN
        valueFrom:
          secretKeyRef:
            key: claude-code-oauth-token
            name: mctl-agents-secrets
      - name: MCTL_TOKEN
        valueFrom:
          secretKeyRef:
            key: mctl-token
            name: mctl-agents-secrets
            optional: true
      - name: SERVICE_AGENT_BUDGET_USD
        value: '1.50'
      - name: MENTOR_BUDGET_USD
        value: '2.00'
      image: ghcr.io/mctlhq/mctl-agents:1.0.0
      imagePullPolicy: IfNotPresent
      resources:
        limits:
          cpu: 2000m
          memory: 2Gi
        requests:
          cpu: 200m
          memory: 512Mi
      volumeMounts:
      - mountPath: /workdir
        name: workdir
    name: run-orchestrator
  - name: commit-and-push
    script:
      command:
      - sh
      image: alpine/git:2.43.0
      source: "set -e\napk add --no-cache openssh-client ca-certificates\nmkdir -p\
        \ ~/.ssh\ncp /secrets/deploy-key/ssh-privatekey ~/.ssh/id_ed25519\nchmod 600\
        \ ~/.ssh/id_ed25519\nprintf 'Host github.com\\n  Hostname ssh.github.com\\\
        n  Port 443\\n  IdentityFile ~/.ssh/id_ed25519\\n  StrictHostKeyChecking no\\\
        n' > ~/.ssh/config\nchmod 600 ~/.ssh/config\n\ncd /workdir/mctl-gitops\ngit\
        \ config user.name \"mctl-agents[bot]\"\ngit config user.email \"mctl-agents[bot]@users.noreply.github.com\"\
        \n\n# Stage only agents-state (paranoia: nothing else)\ngit add platform-gitops/agents-state/\n\
        \nif git diff --cached --quiet; then\n  echo \"\u2139\uFE0F  No new proposals\
        \ or digest changes \u2014 nothing to commit.\"\n  exit 0\nfi\n\nDATE=$(date\
        \ -u +%Y-%m-%d)\ngit commit -m \"chore(agents): daily run ${DATE}\"\n\nfor\
        \ i in 1 2 3 4 5; do\n  if git push origin HEAD:main; then\n    echo \"\u2705\
        \ Pushed agents-state changes\"\n    exit 0\n  fi\n  echo \"\u26A0\uFE0F \
        \ Push failed (attempt ${i}), rebasing...\"\n  git pull --rebase origin main\n\
        done\necho \"\u274C Push failed after 5 attempts\"\nexit 1\n"
      volumeMounts:
      - mountPath: /workdir
        name: workdir
      - mountPath: /secrets/deploy-key
        name: deploy-key
  ttlStrategy:
    secondsAfterCompletion: 86400
  volumeClaimTemplates:
  - metadata:
      name: workdir
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
  volumes:
  - name: deploy-key
    secret:
      defaultMode: 384
      secretName: mctl-gitops-deploy-key

