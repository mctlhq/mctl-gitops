apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: provision-agent-db-v2-
  namespace: argo-workflows
spec:
  entrypoint: main
  serviceAccountName: argo-workflow-sa
  templates:
    - name: main
      container:
        image: hashicorp/vault:1.15
        command: [sh, -c]
        args:
          - |
            export VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
            export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=argo-workflow jwt=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token))
            
            # Put secret again to be 100% sure of the path
            vault kv put secret/platform/mctl-agent/database username="mctl-agent" password="agent-db-secret-pass-77a8b2"
            
            echo "✅ Verified: secret/platform/mctl-agent/database created"
