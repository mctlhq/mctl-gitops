apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: vault-migrate-back-
  namespace: argo-workflows
spec:
  entrypoint: main
  serviceAccountName: argo-workflow-sa
  templates:
    - name: main
      container:
        image: hashicorp/vault:1.15
        command: [sh, -c]
        args:
          - |
            export VAULT_ADDR="http://vault.vault.svc.cluster.local:8200"
            export VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login role=argo-workflow jwt=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token))
            
            # 1. Migrate MinIO back
            vault kv put secret/platform/minio root-user="minio-admin" root-password="VCBB7w6LFCOgn6iEZGXZhFJlo7hIrhv"
            
            # 2. Migrate mctl-agent database back
            vault kv put secret/platform/mctl-agent/database username="mctl-agent" password="agent-db-secret-pass-77a8b2"
            
            # 3. Migrate mctl-agent tokens back
            vault kv put secret/platform/mctl-agent/tokens \
              mctl-api-token="mctl-api-token-placeholder" \
              anthropic-api-key="anthropic-api-key-placeholder" \
              github-token="github-token-placeholder" \
              telegram-bot-token="telegram-bot-token-placeholder" \
              telegram-chat-id="telegram-chat-id-placeholder"
            
            echo "✅ All secrets migrated back to secret/platform/*"
            vault kv list secret/platform
