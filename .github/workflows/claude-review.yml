name: Claude PR review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  # Manual rerun path: comment "@claude review" on a PR to re-run the reviewer
  # (handy after a transient quota-limit failure once the window has reset).
  issue_comment:
    types: [created]

permissions: {}

jobs:
  review:
    # Run on non-draft same-repo PR events (fork PRs can't read the OAuth
    # secret — the job would only fail noisily), or on an "@claude review"
    # comment. The comment path is gated twice: author_association here as a
    # cheap pre-filter, then an API write-permission + same-repo check in the
    # first step below. This matters on a public repo: ungated, any passerby
    # could burn review quota or prompt-inject the reviewer via a PR comment.
    if: >
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude review') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      # author_association alone is too coarse (MEMBER = any org member,
      # COLLABORATOR includes read-only). Require actual write access, and
      # refuse comment-triggered runs on fork PRs — the job would check out
      # refs/pull/N/head, making fork-controlled files the workspace while
      # the OAuth secret is available.
      - name: Gate comment-triggered runs (write permission + same-repo)
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERM=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission" --jq .permission)
          case "$PERM" in
            admin|maintain|write) ;;
            *) echo "::error::@claude review requires write access (commenter has: $PERM)"; exit 1 ;;
          esac
          CROSS=$(gh pr view "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --json isCrossRepository --jq .isCrossRepository)
          if [ "$CROSS" != "false" ]; then
            echo "::error::comment-triggered review is not supported on fork PRs"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}

      - name: Classify PR complexity and pick model
        id: classify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number || github.event.issue.number }}
          files=$(gh pr view "$PR" --repo ${{ github.repository }} \
            --json files --jq '[.files[].path] | join("\n")')
          lines=$(gh pr diff "$PR" --repo ${{ github.repository }} 2>/dev/null \
            | grep -c '^[+-][^+-]' || true)
          score=1
          while IFS= read -r f; do
            if echo "$f" | grep -qE '^internal/(auth|crypto|db|mcp|telegram)/'; then
              score=3; break
            elif echo "$f" | grep -qE '\.go$' && ! echo "$f" | grep -qE '_test\.go$'; then
              [ $score -lt 2 ] && score=2
            fi
          done <<< "$files"
          if [ "$lines" -gt 400 ] && [ $score -lt 3 ]; then
            score=$((score + 1))
          fi
          case $score in
            3) model="claude-opus-4-7" ;;
            2) model="claude-sonnet-4-6" ;;
            *) model="claude-haiku-4-5-20251001" ;;
          esac
          echo "model=$model" >> $GITHUB_OUTPUT
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "lines=$lines" >> $GITHUB_OUTPUT
          echo "PR #$PR: model=$model score=$score lines=$lines"

      - name: Check fallback token availability
        id: token-check
        run: |
          if [ -n "$TOKEN2" ]; then
            echo "has_fallback=true" >> $GITHUB_OUTPUT
          else
            echo "has_fallback=false" >> $GITHUB_OUTPUT
          fi
        env:
          TOKEN2: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}

      - name: Claude review
        id: review
        continue-on-error: true
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            You are the automated code reviewer for this pull request. Review
            the PR diff thoroughly.

            Focus on:
            - Correctness: invalid Helm values, broken ArgoCD Application specs,
              wrong resource references, missing namespace declarations.
            - Security: secrets committed in plain text, overly permissive RBAC,
              missing NetworkPolicies.
            - Operational safety: resource limit/request mismatches, missing
              health checks, LimitRange/ResourceQuota consistency.
            - Argo Workflows: template parameter mismatches, missing mutex on
              writes to shared branches, malformed step dependencies.

            Follow the conventions in this repository's CLAUDE.md (YAML/Helm/
            Kubernetes, conventional commits, English only, no emoji).

            If the diff is trivial — only config/values YAML (hostname, env
            var, image tag, resource limits, replica count), a dependency bump
            with no logic change, docs/comments, or a one-line typo — approve
            the PR with a one-line reason and nothing else:
            `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "<reason>"`.

            Otherwise, post each finding as an inline comment using the
            mcp__github_inline_comment__create_inline_comment tool, prefixed
            with a severity tag:
            - P1 — must fix before merge (bug, security hole, data loss).
            - P2 — should fix before merge (likely bug, missing test, unsafe
              pattern).
            - P3 — nice to have (style, minor nit); does not block merge.

            Finish by submitting a single PR review verdict (this is the merge
            gate — `main` requires one approving review). Include the P1/P2/P3
            counts in the body; be concise and do not restate the diff:
            - No P1/P2 findings (P3 nits are fine): approve —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "No P1/P2 findings (<n> P3). Good to merge."`
            - One or more P1/P2 findings: request changes —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --request-changes --body "Has P1/P2 findings, changes requested: <summary>"`
          claude_args: '--model ${{ steps.classify.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'

      - name: Check primary review actually succeeded
        # The action can report GH Actions outcome=success while the
        # underlying SDK call itself errored (e.g. instant quota-exhaustion
        # failure) — outcome alone silently skips the fallback/classify
        # paths below. Read the raw execution output the action always
        # writes to confirm the run really finished cleanly.
        id: review-check
        if: always()
        run: |
          OUT="$RUNNER_TEMP/claude-execution-output.json"
          is_error="false"
          if [ -f "$OUT" ]; then
            is_error=$(jq -r '
              if type != "array" then "false"
              else ([.[] | select(.type == "result")] | if length > 0 then (.[-1].is_error // false | tostring) else "false" end)
              end' "$OUT" 2>/dev/null || echo "false")
          fi
          if [ "${{ steps.review.outcome }}" = "failure" ] || [ "$is_error" = "true" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Reset git state before fallback
        if: steps.review-check.outputs.failed == 'true' && steps.token-check.outputs.has_fallback == 'true'
        run: git checkout . && git clean -fd

      - name: Claude review (fallback token)
        id: review2
        if: steps.review-check.outputs.failed == 'true' && steps.token-check.outputs.has_fallback == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_2 }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ env.PR_NUMBER }}

            You are the automated code reviewer for this pull request. Review
            the PR diff thoroughly.

            Focus on:
            - Correctness: invalid Helm values, broken ArgoCD Application specs,
              wrong resource references, missing namespace declarations.
            - Security: secrets committed in plain text, overly permissive RBAC,
              missing NetworkPolicies.
            - Operational safety: resource limit/request mismatches, missing
              health checks, LimitRange/ResourceQuota consistency.
            - Argo Workflows: template parameter mismatches, missing mutex on
              writes to shared branches, malformed step dependencies.

            Follow the conventions in this repository's CLAUDE.md (YAML/Helm/
            Kubernetes, conventional commits, English only, no emoji).

            If the diff is trivial — only config/values YAML (hostname, env
            var, image tag, resource limits, replica count), a dependency bump
            with no logic change, docs/comments, or a one-line typo — approve
            the PR with a one-line reason and nothing else:
            `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "<reason>"`.

            Otherwise, post each finding as an inline comment using the
            mcp__github_inline_comment__create_inline_comment tool, prefixed
            with a severity tag:
            - P1 — must fix before merge (bug, security hole, data loss).
            - P2 — should fix before merge (likely bug, missing test, unsafe
              pattern).
            - P3 — nice to have (style, minor nit); does not block merge.

            Finish by submitting a single PR review verdict (this is the merge
            gate — `main` requires one approving review). Include the P1/P2/P3
            counts in the body; be concise and do not restate the diff:
            - No P1/P2 findings (P3 nits are fine): approve —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --approve --body "No P1/P2 findings (<n> P3). Good to merge."`
            - One or more P1/P2 findings: request changes —
              `gh pr review ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --request-changes --body "Has P1/P2 findings, changes requested: <summary>"`
          claude_args: '--model ${{ steps.classify.outputs.model }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'

      - name: Check final review outcome
        id: review-final
        if: always()
        run: |
          if [ "${{ steps.review-check.outputs.failed }}" != "true" ]; then
            echo "failed=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.token-check.outputs.has_fallback }}" != "true" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            OUT="$RUNNER_TEMP/claude-execution-output.json"
            is_error="false"
            if [ -f "$OUT" ]; then
              is_error=$(jq -r '
                if type != "array" then "false"
                else ([.[] | select(.type == "result")] | if length > 0 then (.[-1].is_error // false | tostring) else "false" end)
                end' "$OUT" 2>/dev/null || echo "false")
            fi
            if [ "${{ steps.review2.outcome }}" = "failure" ] || [ "$is_error" = "true" ]; then
              echo "failed=true" >> "$GITHUB_OUTPUT"
            else
              echo "failed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Classify reviewer outcome
        if: steps.review-final.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OUT="$RUNNER_TEMP/claude-execution-output.json"
          if [ -f "$OUT" ] && grep -qiE "hit your limit|usage limit|rate.?limit|overloaded|insufficient.*quota|credit balance" "$OUT"; then
            echo "::warning::Claude reviewer hit a transient usage limit — treating as non-blocking."
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body \
              "⏳ The Claude reviewer hit the shared usage limit and could not finish. This is **transient** and is *not* a code issue. Re-run with \`@claude review\` once the window resets." || true
            exit 0
          fi
          echo "::error::Claude reviewer failed for a non-quota reason — see the 'Claude review' step logs."
          exit 1
