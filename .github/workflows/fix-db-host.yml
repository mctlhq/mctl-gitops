name: Fix DB Host
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, k8s-preview]
    steps:
      - name: Update Vault host
        env:
          VAULT_ADDR: http://vault.vault.svc.cluster.local:8200
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          CURRENT=$(curl -s -H "X-Vault-Token: ${VAULT_TOKEN}" "${VAULT_ADDR}/v1/secret/data/platform/teams/test/django-test/database")
          PASSWORD=$(echo "$CURRENT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['data']['password'])")
          HTTP=$(curl -s -o /tmp/r.json -w "%{http_code}" -X POST \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"host\":\"shared-pg-rw.platform-db.svc.cluster.local\",\"port\":\"5432\",\"database\":\"test-django-test\",\"username\":\"test-django-test\",\"password\":\"${PASSWORD}\"}}" \
            "${VAULT_ADDR}/v1/secret/data/platform/teams/test/django-test/database")
          echo "HTTP: $HTTP"
          cat /tmp/r.json
