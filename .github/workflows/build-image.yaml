name: Build Image
run-name: "build-${{ inputs.build_id }}: ${{ inputs.team_name }}/${{ inputs.component_name }} (${{ inputs.image_tag }})"

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Source repo (e.g. openclaw/openclaw)"
        required: true
        type: string
      git_ref:
        description: "Git ref: branch, tag, or commit SHA"
        required: true
        type: string
      image_name:
        description: "Full image name (e.g. ghcr.io/mctlhq/openclaw)"
        required: true
        type: string
      image_tag:
        description: "Image tag (e.g. main-abc1234)"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile in source repo"
        required: false
        default: "Dockerfile"
        type: string
      team_name:
        description: "Team name (for Vault PAT lookup)"
        required: true
        type: string
      component_name:
        description: "Service name (for Vault PAT lookup)"
        required: true
        type: string
      build_id:
        description: "Unique build ID for correlation with Argo workflow"
        required: true
        type: string
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
      git_ref:
        required: true
        type: string
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      dockerfile_path:
        required: false
        default: "Dockerfile"
        type: string
      team_name:
        required: true
        type: string
      component_name:
        required: true
        type: string
      build_id:
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # --- Tier 1: Vault PAT ---
      - name: Fetch Vault PAT
        id: vault_pat
        run: |
          REPO="${{ inputs.repo }}"
          echo "repo_owner=${REPO%%/*}" >> $GITHUB_OUTPUT
          echo "repo_name=${REPO##*/}" >> $GITHUB_OUTPUT

          PAT=""
          if [[ -n "${{ secrets.VAULT_ADDR }}" && -n "${{ secrets.VAULT_TOKEN }}" ]]; then
            echo "🔑 Vault configured — fetching repo PAT…"
            VAULT_URL="${{ secrets.VAULT_ADDR }}/v1/secret/data/teams/${{ inputs.team_name }}/${{ inputs.component_name }}/repo-pat"
            HTTP_CODE=$(curl -sL -o /tmp/vault-resp.json -w "%{http_code}" \
              -H "X-Vault-Token: ${{ secrets.VAULT_TOKEN }}" \
              "$VAULT_URL" 2>/dev/null || echo "000")
            echo "   Vault HTTP status: $HTTP_CODE"
            if [[ "$HTTP_CODE" == "200" ]]; then
              PAT=$(jq -r '.data.data.pat // empty' /tmp/vault-resp.json 2>/dev/null || true)
              if [[ -n "$PAT" ]]; then
                echo "   ✅ PAT retrieved (length: ${#PAT})"
              fi
            fi
            rm -f /tmp/vault-resp.json
          fi

          if [[ -n "$PAT" ]]; then
            echo "::add-mask::${PAT}"
            echo "pat=${PAT}" >> $GITHUB_OUTPUT
            echo "has_pat=true" >> $GITHUB_OUTPUT
          else
            echo "has_pat=false" >> $GITHUB_OUTPUT
          fi

      # --- Tier 2: GitHub App token ---
      - name: Generate GitHub App token
        id: app_token
        if: steps.vault_pat.outputs.has_pat != 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        continue-on-error: true
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ steps.vault_pat.outputs.repo_owner }}
          repositories: ${{ steps.vault_pat.outputs.repo_name }}

      # --- Resolve final checkout token ---
      - name: Resolve checkout token
        id: checkout_token
        run: |
          if [[ "${{ steps.vault_pat.outputs.has_pat }}" == "true" ]]; then
            echo "token=${{ steps.vault_pat.outputs.pat }}" >> $GITHUB_OUTPUT
            echo "🔑 Using Vault PAT for checkout"
          elif [[ -n "${{ steps.app_token.outputs.token }}" ]]; then
            echo "token=${{ steps.app_token.outputs.token }}" >> $GITHUB_OUTPUT
            echo "🤖 Using GitHub App token for checkout"
          else
            echo "token=${{ github.token }}" >> $GITHUB_OUTPUT
            echo "🌐 Using github.token for checkout (public repos)"
          fi

      # --- Checkout source repo ---
      - name: Checkout source repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.git_ref }}
          token: ${{ steps.checkout_token.outputs.token }}

      # --- Resolve GHCR push token ---
      - name: Resolve GHCR token
        id: ghcr_token
        run: |
          if [[ "${{ steps.vault_pat.outputs.has_pat }}" == "true" ]]; then
            echo "token=${{ steps.vault_pat.outputs.pat }}" >> $GITHUB_OUTPUT
            echo "username=x-access-token" >> $GITHUB_OUTPUT
            echo "🔑 Using Vault PAT for GHCR push"
          elif [[ -n "${{ secrets.GHCR_PAT }}" ]]; then
            echo "token=${{ secrets.GHCR_PAT }}" >> $GITHUB_OUTPUT
            echo "username=x-access-token" >> $GITHUB_OUTPUT
            echo "🔐 Using GHCR_PAT for GHCR push"
          else
            echo "token=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT
            echo "username=${{ github.actor }}" >> $GITHUB_OUTPUT
            echo "🌐 Using GITHUB_TOKEN for GHCR push"
          fi

      # --- Build & Push ---
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ steps.ghcr_token.outputs.username }}
          password: ${{ steps.ghcr_token.outputs.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          build-args: |
            APP_VERSION=${{ inputs.git_ref }}
          # BuildKit secret: a read:packages PAT for source Dockerfiles that
          # install private GitHub Packages dependencies (mctl-web and
          # mctl-docs pull @mctlhq/css). It is injected ONLY when building an
          # allow-listed repo. This gate is keyed on `inputs.repo` — not a
          # caller-set flag — because the workflow checks out and builds that
          # repo's own Dockerfile: a caller cannot both name a trusted repo
          # here AND run an attacker-controlled Dockerfile. Other repos get an
          # empty value, so a malicious Dockerfile elsewhere never receives
          # the PAT.
          secrets: |
            github_token=${{ contains(fromJSON('["mctlhq/mctl-web","mctlhq/mctl-docs"]'), inputs.repo) && secrets.GH_PACKAGES_TOKEN || '' }}
          tags: |
            ${{ inputs.image_name }}:${{ inputs.image_tag }}
            ${{ inputs.image_name }}:latest

      - name: Summary
        run: |
          echo "## ✅ Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Repo** | \`${{ inputs.repo }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Ref** | \`${{ inputs.git_ref }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ inputs.image_name }}:${{ inputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build ID** | \`${{ inputs.build_id }}\` |" >> $GITHUB_STEP_SUMMARY
