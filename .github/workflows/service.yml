name: Service

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - onboard
          - deploy
      team_name:
        description: "Team name (e.g. payments)"
        required: true
        type: string
      service_name:
        description: "Service name (e.g. payment-api)"
        required: true
        type: string
      service_type:
        description: "Helm chart type (onboard only)"
        required: false
        type: choice
        options:
          - base-service
          - worker-service
      port:
        description: "Service port (base-service onboard only)"
        required: false
        default: "8080"
        type: string
      host:
        description: "Ingress host (base-service onboard only, e.g. my-app.preview.mctl.me)"
        required: false
        type: string
      dockerfile_repo:
        description: "Source repo with Dockerfile (e.g. dmitriimashkov/payment-api)"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile in source repo"
        required: false
        default: "Dockerfile"
        type: string
      git_tag:
        description: "Git tag to checkout and build (e.g. v1.0.0). Leave empty for latest."
        required: false
        type: string
      image_tag:
        description: "Image tag (default: v{date}-{short_sha})"
        required: false
        type: string
      env_vars:
        description: "Plaintext ENV KEY=value pairs (non-secret)"
        required: false
        type: string
      secret_env_vars:
        description: "Plaintext SECRET KEY=value pairs (for Vault)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: dmitriimashkov

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      service_dir: ${{ steps.paths.outputs.service_dir }}
      service_type: ${{ steps.paths.outputs.service_type }}
    steps:
      - name: Validate naming conventions
        run: |
          TEAM="${{ inputs.team_name }}"
          SERVICE="${{ inputs.service_name }}"

          if [[ ! "$TEAM" =~ ^[a-z0-9][a-z0-9-]{0,62}$ ]]; then
            echo "::error::team_name must be lowercase alphanumeric with hyphens, ≤63 chars. Got: $TEAM"
            exit 1
          fi
          if [[ ! "$SERVICE" =~ ^[a-z0-9][a-z0-9-]{0,62}$ ]]; then
            echo "::error::service_name must be lowercase alphanumeric with hyphens, ≤63 chars. Got: $SERVICE"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate team membership
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          TEAM="${{ inputs.team_name }}"
          ACTOR="${{ github.actor }}"
          ORG="dmitriimashkov"
          
          echo "🔍 Checking if $ACTOR is a member of team $TEAM..."
          
          # Check team membership via GitHub API
          if gh api "/orgs/${ORG}/teams/${TEAM}/memberships/${ACTOR}" --silent 2>/dev/null; then
            echo "✅ User $ACTOR is a member of team $TEAM"
          else
            echo "::error::User $ACTOR is NOT a member of team $TEAM"
            echo "## ❌ Team Membership Required" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "You must be a member of the **${TEAM}** team to deploy services for this team." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Your teams:" >> $GITHUB_STEP_SUMMARY
            gh api "/user/teams" --jq '.[] | "- " + .name' >> $GITHUB_STEP_SUMMARY || echo "- (unable to fetch teams)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Parse and save secrets to Vault
        if: inputs.secret_env_vars != ''
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          TEAM="${{ inputs.team_name }}"
          SERVICE="${{ inputs.service_name }}"
          SECRET_TEXT="${{ inputs.secret_env_vars }}"
          
          echo "🔐 Parsing and saving secrets to Vault..."
          
          # Parse KEY=value format into JSON
          JSON_DATA="{"
          while IFS='=' read -r key value; do
            # Skip empty lines and comments
            [[ -z "$key" || "$key" =~ ^# ]] && continue
            # Trim whitespace
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | xargs)
            # Add to JSON (escape quotes in value)
            value_escaped=$(echo "$value" | sed 's/"/\\"/g')
            JSON_DATA+="\"$key\":\"$value_escaped\","
          done <<< "$SECRET_TEXT"
          
          # Remove trailing comma and close JSON
          JSON_DATA="${JSON_DATA%,}}"
          
          echo "📝 Saving $(echo "$JSON_DATA" | jq 'keys | length') secrets to secret/teams/$TEAM/$SERVICE"
          
          # Save to Vault
          curl -sS -X POST \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"data\":$JSON_DATA}" \
            "$VAULT_ADDR/v1/secret/data/teams/$TEAM/$SERVICE" || {
            echo "::error::Failed to save secrets to Vault"
            exit 1
          }
          
          echo "✅ Secrets saved successfully"

      - name: Determine paths
        id: paths
        run: |
          TEAM="${{ inputs.team_name }}"
          SERVICE="${{ inputs.service_name }}"
          ACTION="${{ inputs.action }}"

          # For deploy, auto-detect service type
          if [[ "$ACTION" == "deploy" ]]; then
            if [[ -d "platform-gitops/services/preview/${TEAM}/${SERVICE}" ]]; then
              TYPE="base-service"
            elif [[ -d "platform-gitops/workers/preview/${TEAM}/${SERVICE}" ]]; then
              TYPE="worker-service"
            else
              echo "::error::Service ${TEAM}/${SERVICE} not found. Use 'onboard' action first."
              echo "## ❌ Service Not Found" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            TYPE="${{ inputs.service_type }}"
            if [[ -z "$TYPE" ]]; then
              echo "::error::service_type is required for onboard"
              exit 1
            fi
          fi

          if [[ "$TYPE" == "base-service" ]]; then
            DIR="platform-gitops/services/preview/${TEAM}/${SERVICE}"
          else
            DIR="platform-gitops/workers/preview/${TEAM}/${SERVICE}"
          fi

          # Onboard: must NOT exist. Deploy: must exist.
          if [[ "$ACTION" == "onboard" && -d "$DIR" ]]; then
            echo "::error::Service already exists at $DIR. Use 'deploy' to update."
            echo "## ❌ Service Already Exists" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          if [[ "$ACTION" == "deploy" && ! -f "$DIR/values.yaml" ]]; then
            echo "::error::values.yaml not found at $DIR"
            exit 1
          fi

          echo "service_dir=${DIR}" >> $GITHUB_OUTPUT
          echo "service_type=${TYPE}" >> $GITHUB_OUTPUT

      - name: Validate base-service inputs
        if: inputs.action == 'onboard' && inputs.service_type == 'base-service'
        run: |
          if [[ -z "${{ inputs.host }}" ]]; then
            echo "::error::host is required for base-service onboard"
            exit 1
          fi

      - name: Verify source repo accessible
        id: repo_access
        run: |
          REPO="${{ inputs.dockerfile_repo }}"

          # Try with PAT from Vault first (for private repos)
          PAT=""
          if [[ -n "${{ secrets.VAULT_ADDR }}" && -n "${{ secrets.VAULT_TOKEN }}" ]]; then
            PAT=$(curl -sL \
              -H "X-Vault-Token: ${{ secrets.VAULT_TOKEN }}" \
              "${{ secrets.VAULT_ADDR }}/v1/secret/data/preview/${{ inputs.team_name }}/${{ inputs.service_name }}/repo-pat" \
              2>/dev/null | jq -r '.data.data.pat // empty' 2>/dev/null || true)
          fi

          if [[ -n "$PAT" ]]; then
            echo "::add-mask::${PAT}"
            echo "repo_pat=${PAT}" >> $GITHUB_OUTPUT
            if git ls-remote "https://x-access-token:${PAT}@github.com/${REPO}" HEAD > /dev/null 2>&1; then
              echo "✅ Private repo accessible with PAT"
              echo "is_private=true" >> $GITHUB_OUTPUT
            else
              echo "::error::PAT provided but cannot access repo: ${REPO}"
              exit 1
            fi
          else
            if git ls-remote "https://github.com/${REPO}" HEAD > /dev/null 2>&1; then
              echo "✅ Public repo accessible"
              echo "is_private=false" >> $GITHUB_OUTPUT
            else
              echo "::error::Cannot access repo: ${REPO}. If private, save a PAT via Backstage."
              exit 1
            fi
          fi

      - name: Determine image tag
        id: tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            # Explicit image_tag provided
            echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ inputs.git_tag }}" ]]; then
            # Git tag provided - normalize by removing "v" prefix for Docker tag
            GIT_TAG="${{ inputs.git_tag }}"
            NORMALIZED_TAG="${GIT_TAG#v}"  # Remove leading "v"
            echo "image_tag=${NORMALIZED_TAG}" >> $GITHUB_OUTPUT
            echo "📌 Using git tag: $GIT_TAG → Docker tag: ${NORMALIZED_TAG}"
          elif [[ "${{ inputs.action }}" == "onboard" ]]; then
            echo "image_tag=v0.1.0" >> $GITHUB_OUTPUT
          else
            # Auto-increment: get latest semver tag from GHCR
            LATEST=""
            API_RESPONSE=$(gh api \
              "/users/${{ env.IMAGE_OWNER }}/packages/container/${{ inputs.service_name }}/versions" \
              --jq '[.[] | .metadata.container.tags[] | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort | last // empty' \
              2>/dev/null) && LATEST="$API_RESPONSE" || true

            if [[ -z "$LATEST" || ! "$LATEST" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "image_tag=v0.1.0" >> $GITHUB_OUTPUT
            else
              # Increment patch: v1.2.3 → v1.2.4
              MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\..*/\1/')
              MINOR=$(echo "$LATEST" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
              PATCH=$(echo "$LATEST" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\)/\1/')
              PATCH=$((PATCH + 1))
              echo "image_tag=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Resolved tag: $(grep image_tag $GITHUB_OUTPUT | cut -d= -f2)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build & push image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Get repo PAT from Vault
        id: vault_pat
        run: |
          PAT=""
          if [[ -n "${{ secrets.VAULT_ADDR }}" && -n "${{ secrets.VAULT_TOKEN }}" ]]; then
            PAT=$(curl -sL \
              -H "X-Vault-Token: ${{ secrets.VAULT_TOKEN }}" \
              "${{ secrets.VAULT_ADDR }}/v1/secret/data/teams/${{ inputs.team_name }}/${{ inputs.service_name }}/repo-pat" \
              2>/dev/null | jq -r '.data.data.pat // empty' 2>/dev/null || true)
          fi
          if [[ -n "$PAT" ]]; then
            echo "::add-mask::${PAT}"
            echo "pat=${PAT}" >> $GITHUB_OUTPUT
            echo "has_pat=true" >> $GITHUB_OUTPUT
          else
            echo "has_pat=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate PAT and repository access
        if: steps.vault_pat.outputs.has_pat == 'true'
        env:
          PAT: ${{ steps.vault_pat.outputs.pat }}
        run: |
          REPO="${{ inputs.dockerfile_repo }}"
          echo "🔐 Validating PAT access to repository: $REPO"
          
          # Test repository access with PAT
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${PAT}" \
            "https://api.github.com/repos/$REPO")
          
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::Failed to access repository $REPO with provided PAT (HTTP $HTTP_CODE)"
            echo "::error::Please verify:"
            echo "::error::  1. PAT is valid and not expired"
            echo "::error::  2. PAT has 'Contents: Read' scope"
            echo "::error::  3. Repository exists and is accessible"
            exit 1
          fi
          
          echo "✅ PAT is valid and repository is accessible"
          
          # Check PAT scopes (for fine-grained tokens, metadata is limited)
          SCOPES=$(curl -s -I -H "Authorization: token ${PAT}" \
            "https://api.github.com/repos/$REPO" \
            | grep -i "x-oauth-scopes:" | cut -d: -f2 | tr -d ' \r\n')
          
          if [[ -n "$SCOPES" ]]; then
            echo "📋 PAT scopes: $SCOPES"
            if [[ ! "$SCOPES" =~ "repo" ]] && [[ ! "$SCOPES" =~ "public_repo" ]]; then
              echo "::warning::PAT may not have required 'repo' or 'public_repo' scope"
            fi
          else
            echo "📋 Fine-grained PAT detected (scope validation skipped)"
          fi

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.dockerfile_repo }}
          ref: ${{ inputs.git_tag || '' }}
          token: ${{ steps.vault_pat.outputs.has_pat == 'true' && steps.vault_pat.outputs.pat || github.token }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ inputs.service_name }}:${{ needs.validate.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ inputs.service_name }}:latest

      - name: Report failure
        if: failure()
        run: |
          echo "## ❌ Docker Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Failed to build \`${{ inputs.service_name }}\`. Check logs above." >> $GITHUB_STEP_SUMMARY

  apply:
    name: Apply config
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4

      - name: Create values.yaml (onboard)
        if: inputs.action == 'onboard'
        run: |
          TYPE="${{ needs.validate.outputs.service_type }}"
          DIR="${{ needs.validate.outputs.service_dir }}"
          TAG="${{ needs.validate.outputs.image_tag }}"

          if [[ "$TYPE" == "base-service" ]]; then
            TEMPLATE=".github/templates/base-service-values.yaml.tpl"
            COMPONENT_TYPE="service"
          else
            TEMPLATE=".github/templates/worker-service-values.yaml.tpl"
            COMPONENT_TYPE="worker"
          fi

          mkdir -p "$DIR"

          # Create values.yaml
          sed \
            -e "s|__TEAM_NAME__|${{ inputs.team_name }}|g" \
            -e "s|__SERVICE_NAME__|${{ inputs.service_name }}|g" \
            -e "s|__IMAGE_TAG__|${TAG}|g" \
            -e "s|__PORT__|${{ inputs.port }}|g" \
            -e "s|__HOST__|${{ inputs.host }}|g" \
            "$TEMPLATE" > "${DIR}/values.yaml"
          
          # Add custom env vars if provided
          if [[ -n "${{ inputs.env_vars }}" ]]; then
            echo "📝 Adding custom environment variables..."
            
            # Parse and add each env var
            while IFS='=' read -r key value; do
              [[ -z "$key" || "$key" =~ ^# ]] && continue
              key=$(echo "$key" | xargs)
              value=$(echo "$value" | xargs)
              
              yq eval -i ".env.${key} = \"${value}\"" "${DIR}/values.yaml"
            done <<< "${{ inputs.env_vars }}"
            
            echo "✅ Added $(echo "${{ inputs.env_vars }}" | grep -c '=' || echo 0) environment variables"
          fi
          
          # Add externalSecret section if secrets provided
          if [[ -n "${{ inputs.secret_env_vars }}" ]]; then
            echo "🔐 Adding ExternalSecret configuration..."
            
            # Create externalSecret section
            yq eval -i '.externalSecret.targetSecret = "${{ inputs.service_name }}-secrets"' "${DIR}/values.yaml"
            yq eval -i '.externalSecret.data = []' "${DIR}/values.yaml"
            
            # Parse and add each secret
            while IFS='=' read -r key value; do
              [[ -z "$key" || "$key" =~ ^# ]] && continue
              key=$(echo "$key" | xargs)
              
              yq eval -i ".externalSecret.data += [{\"secretKey\": \"${key}\", \"remoteKey\": \"teams/${{ inputs.team_name }}/${{ inputs.service_name }}\", \"property\": \"${key}\"}]" "${DIR}/values.yaml"
            done <<< "${{ inputs.secret_env_vars }}"
            
            # Add envFrom section
            yq eval -i '.envFrom = [{"secretRef": {"name": "${{ inputs.service_name }}-secrets"}}]' "${DIR}/values.yaml"
            
            echo "✅ Added $(echo "${{ inputs.secret_env_vars }}" | grep -c '=' || echo 0) secret environment variables"
          fi
          
          # Create catalog-info.yaml for Backstage
          sed \
            -e "s|__TEAM_NAME__|${{ inputs.team_name }}|g" \
            -e "s|__SERVICE_NAME__|${{ inputs.service_name }}|g" \
            -e "s|__COMPONENT_TYPE__|${COMPONENT_TYPE}|g" \
            ".github/templates/catalog-info.yaml.tpl" > "${DIR}/catalog-info.yaml"
          
          # Create vault-cleanup.yaml for ArgoCD PreDelete hook
          sed \
            -e "s|__TEAM_NAME__|${{ inputs.team_name }}|g" \
            -e "s|__SERVICE_NAME__|${{ inputs.service_name }}|g" \
            ".github/templates/vault-cleanup.yaml.tpl" > "${DIR}/vault-cleanup.yaml"

      - name: Update image tag (deploy)
        if: inputs.action == 'deploy'
        run: |
          DIR="${{ needs.validate.outputs.service_dir }}"
          TAG="${{ needs.validate.outputs.image_tag }}"

          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          yq -i ".image.tag = \"${TAG}\"" "${DIR}/values.yaml"

      - name: Validate Helm template
        run: |
          TYPE="${{ needs.validate.outputs.service_type }}"
          DIR="${{ needs.validate.outputs.service_dir }}"

          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          if ! helm template test "helm-charts/${TYPE}" -f "${DIR}/values.yaml" > /dev/null 2>&1; then
            echo "::error::Helm template validation failed"
            echo "## ❌ Helm Validation Failed" >> $GITHUB_STEP_SUMMARY
            helm template test "helm-charts/${TYPE}" -f "${DIR}/values.yaml" 2>&1 >> $GITHUB_STEP_SUMMARY || true
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DIR="${{ needs.validate.outputs.service_dir }}"
          TAG="${{ needs.validate.outputs.image_tag }}"
          ACTION="${{ inputs.action }}"

          git add "${DIR}/values.yaml"
          
          if [[ "$ACTION" == "onboard" ]]; then
            git add "${DIR}/catalog-info.yaml"
            git add "${DIR}/vault-cleanup.yaml"
            git commit -m "feat: onboard ${{ inputs.team_name }}/${{ inputs.service_name }} (${TAG})"
          else
            git commit -m "deploy: ${{ inputs.team_name }}/${{ inputs.service_name }} → ${TAG}"
          fi

          git push

      - name: Summary
        run: |
          TAG="${{ needs.validate.outputs.image_tag }}"
          ACTION="${{ inputs.action }}"
          EMOJI=$([[ "$ACTION" == "onboard" ]] && echo "🚀" || echo "🔄")

          echo "## ${EMOJI} Service ${ACTION}ed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Team** | \`${{ inputs.team_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | \`${{ inputs.service_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Action** | \`${ACTION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ inputs.service_name }}:${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will sync automatically." >> $GITHUB_STEP_SUMMARY
