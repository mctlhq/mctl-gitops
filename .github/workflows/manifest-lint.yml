name: manifest-lint

on:
  pull_request:
    paths:
      - 'platform-gitops/**'
      - '.github/workflows/manifest-lint.yml'

permissions: {}

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint (relaxed)
        run: |
          # Pin yamllint for reproducible CI — a new major can change rules.
          pipx install yamllint==1.35.1 || pip install yamllint==1.35.1
          cat > /tmp/yamllint.yml <<'CFG'
          extends: relaxed
          rules:
            # Helm templates routinely exceed 80 cols and carry Go-template
            # markers, so line-length / comments / document-start are noise.
            line-length: disable
            comments: disable
            document-start: disable
            # truthy: Helm values legitimately use bare yes/no/on/off; disabled
            # to avoid false positives. Revisit if we standardise on true/false.
            truthy: disable
          CFG
          yamllint -c /tmp/yamllint.yml platform-gitops

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          # Pin Helm for reproducible lint output across CI runs.
          version: v3.14.4
      - name: helm lint charts
        run: |
          for chart in platform-gitops/helm-charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "== helm lint $chart =="
              helm lint "$chart"
            fi
          done
