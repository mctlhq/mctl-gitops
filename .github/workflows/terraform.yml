name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/k3s-preview/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply (default: plan only)"
        type: boolean
        default: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/k3s-preview
    
    # Prevent concurrent runs
    concurrency:
      group: terraform-k3s-preview
      cancel-in-progress: false
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # SSH keys are only needed for terraform apply (modifying cluster).
      # On push (plan only) we skip this — secrets may not be set.
      - name: Setup SSH keys
        if: inputs.apply == true
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_ed25519.pub
          chmod 600 ~/.ssh/id_ed25519
      
      # Dummy keys for plan/validate so file() calls don't fail
      - name: Setup dummy SSH keys (plan only)
        if: inputs.apply != true
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -C "ci-plan-dummy" -q
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.0
      
      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Validate
        run: terraform validate
      
      - name: Terraform Plan
        run: terraform plan -no-color
        continue-on-error: true
      
      - name: Terraform Apply
        if: inputs.apply == true
        run: terraform apply -auto-approve

      - name: Notify Telegram on failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *mctl-core terraform failed*
            Branch: `${{ github.ref_name }}`
            Apply: `${{ inputs.apply }}`
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
