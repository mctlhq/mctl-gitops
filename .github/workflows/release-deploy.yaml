name: Release & Deploy
run-name: "release-deploy ${{ inputs.team_name }}/${{ inputs.component_name }} ${{ inputs.image_tag }}"

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Source repo (e.g. mctlhq/mctl-docs)"
        required: true
        type: string
      git_ref:
        description: "Git ref to build (typically the new release tag)"
        required: true
        type: string
      image_name:
        description: "Full image name (e.g. ghcr.io/mctlhq/mctl-docs)"
        required: true
        type: string
      image_tag:
        description: "Image tag (typically the version, e.g. 0.1.18)"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile in source repo"
        required: false
        default: "Dockerfile"
        type: string
      team_name:
        description: "Team owning the service (matches platform-gitops/services/<team>/)"
        required: true
        type: string
      component_name:
        description: "Service name (matches the directory under platform-gitops/services/<team>/)"
        required: true
        type: string
      values_path:
        description: "Override gitops values file path (default: platform-gitops/services/<team>/<component>/values.yaml). Use for platform bootstrap services. Mutually exclusive with values_glob."
        required: false
        type: string
      values_glob:
        description: "Glob pattern for multiple files (e.g. platform-gitops/argo-workflows/cluster-templates/cwft-mctl-agents-*.yaml). Use when a component's image tag is inline across several manifests instead of one values.yaml. Mutually exclusive with values_path."
        required: false
        type: string

jobs:
  build:
    uses: ./.github/workflows/build-image.yaml
    with:
      repo: ${{ inputs.repo }}
      git_ref: ${{ inputs.git_ref }}
      image_name: ${{ inputs.image_name }}
      image_tag: ${{ inputs.image_tag }}
      dockerfile_path: ${{ inputs.dockerfile_path }}
      team_name: ${{ inputs.team_name }}
      component_name: ${{ inputs.component_name }}
      build_id: rd-${{ github.run_id }}
    secrets: inherit

  bump:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Validate mutually exclusive inputs
        env:
          VALUES_PATH: ${{ inputs.values_path }}
          VALUES_GLOB: ${{ inputs.values_glob }}
        run: |
          if [[ -n "$VALUES_PATH" && -n "$VALUES_GLOB" ]]; then
            echo "::error::values_path and values_glob are mutually exclusive"
            exit 1
          fi

      - name: Bump image tag(s)
        env:
          TEAM: ${{ inputs.team_name }}
          SERVICE: ${{ inputs.component_name }}
          VALUES_PATH: ${{ inputs.values_path }}
          VALUES_GLOB: ${{ inputs.values_glob }}
          IMAGE_NAME: ${{ inputs.image_name }}
          NEW_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          python3 <<'PYEOF'
          import os, re, sys, glob as globmod

          team = os.environ['TEAM']
          service = os.environ['SERVICE']
          image_name = os.environ['IMAGE_NAME']
          new_tag = os.environ['NEW_TAG']
          vpath = os.environ.get('VALUES_PATH', '').strip()
          vglob = os.environ.get('VALUES_GLOB', '').strip()

          if vglob:
              files = sorted(globmod.glob(vglob))
              if not files:
                  print(f"ERROR: no files matched glob: {vglob}", file=sys.stderr)
                  sys.exit(2)
          else:
              files = [vpath or f"platform-gitops/services/{team}/{service}/values.yaml"]

          missing = [f for f in files if not os.path.isfile(f)]
          if missing:
              print(f"ERROR: file(s) not found: {missing}", file=sys.stderr)
              sys.exit(2)

          print(f"Files to process ({len(files)}):")
          for f in files:
              print(f"  {f}")

          total_replaced = 0
          total_already = 0
          for path in files:
              with open(path) as fp:
                  content = fp.read()
              n1 = n2 = n3 = 0
              # Pattern 1: combined repository: <image>\n  tag: <old>
              p1 = re.compile(r'(repository:\s*' + re.escape(image_name) + r'\n\s+tag:)[^\n]+')
              out, n1 = p1.subn(r'\1 "' + new_tag + '"', content)
              # Pattern 2: split registry/repository (Backstage Helm chart style)
              if '/' in image_name:
                  registry, repo = image_name.split('/', 1)
                  p3 = re.compile(
                      r'(registry:\s*' + re.escape(registry) +
                      r'\n\s+repository:\s*' + re.escape(repo) +
                      r'\n\s+tag:)[^\n]+'
                  )
                  out, n3 = p3.subn(r'\1 ' + new_tag, out)
              # Pattern 3: inline image: <image>:<old> (CWFT style, quoted or unquoted)
              p2 = re.compile(r'(image:\s*["\']?' + re.escape(image_name) + r')["\']?:[\w.\-]+')
              out, n2 = p2.subn(r'\1:' + new_tag, out)
              n = n1 + n2 + n3
              if n == 0:
                  print(f"  {path}: WARN — no image pattern matched (skipped)")
                  continue
              if out == content:
                  print(f"  {path}: already at {new_tag} (no diff)")
                  total_already += n
              else:
                  with open(path, 'w') as fp:
                      fp.write(out)
                  print(f"  {path}: bumped {n} occurrence(s)")
                  total_replaced += n

          if total_replaced == 0 and total_already == 0:
              print(f"ERROR: could not find any image tag pattern for {image_name} in any file", file=sys.stderr)
              sys.exit(3)

          print(f"Total: {total_replaced} occurrence(s) bumped across {len(files)} file(s)")
          PYEOF

      - name: Commit and push
        env:
          TEAM: ${{ inputs.team_name }}
          SERVICE: ${{ inputs.component_name }}
          NEW_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          git config user.email "ci@mctl.ai"
          git config user.name "mctl-ci"
          git add -A
          if git diff --staged --quiet; then
            echo "::notice::No tag change (already at ${NEW_TAG})"
            exit 0
          fi
          git commit -m "chore: bump ${TEAM}/${SERVICE} to ${NEW_TAG}"
          git push

      - name: Summary
        run: |
          {
            echo "## Released ${{ inputs.team_name }}/${{ inputs.component_name }}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Image** | \`${{ inputs.image_name }}:${{ inputs.image_tag }}\` |"
            echo "| **Git ref** | \`${{ inputs.git_ref }}\` |"
            if [[ -n "${{ inputs.values_glob }}" ]]; then
              echo "| **Gitops glob** | \`${{ inputs.values_glob }}\` |"
            else
              echo "| **Gitops file** | \`${{ inputs.values_path || format('platform-gitops/services/{0}/{1}/values.yaml', inputs.team_name, inputs.component_name) }}\` |"
            fi
          } >> $GITHUB_STEP_SUMMARY
