name: Release & Deploy
run-name: "release-deploy ${{ inputs.team_name }}/${{ inputs.component_name }} ${{ inputs.image_tag }}"

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Source repo (e.g. mctlhq/mctl-docs)"
        required: true
        type: string
      git_ref:
        description: "Git ref to build (typically the new release tag)"
        required: true
        type: string
      image_name:
        description: "Full image name (e.g. ghcr.io/mctlhq/mctl-docs)"
        required: true
        type: string
      image_tag:
        description: "Image tag (typically the version, e.g. 0.1.18)"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile in source repo"
        required: false
        default: "Dockerfile"
        type: string
      team_name:
        description: "Team owning the service (matches platform-gitops/services/<team>/)"
        required: true
        type: string
      component_name:
        description: "Service name (matches the directory under platform-gitops/services/<team>/)"
        required: true
        type: string
      values_path:
        description: "Override gitops values file path (default: platform-gitops/services/<team>/<component>/values.yaml). Use for platform bootstrap services."
        required: false
        type: string

jobs:
  build:
    uses: ./.github/workflows/build-image.yaml
    with:
      repo: ${{ inputs.repo }}
      git_ref: ${{ inputs.git_ref }}
      image_name: ${{ inputs.image_name }}
      image_tag: ${{ inputs.image_tag }}
      dockerfile_path: ${{ inputs.dockerfile_path }}
      team_name: ${{ inputs.team_name }}
      component_name: ${{ inputs.component_name }}
      build_id: rd-${{ github.run_id }}
    secrets: inherit

  bump:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main

      - name: Resolve gitops file path
        id: paths
        env:
          TEAM: ${{ inputs.team_name }}
          SERVICE: ${{ inputs.component_name }}
          VALUES_PATH: ${{ inputs.values_path }}
        run: |
          DEFAULT="platform-gitops/services/${TEAM}/${SERVICE}/values.yaml"
          F="${VALUES_PATH:-$DEFAULT}"
          echo "gitops_file=$F" >> "$GITHUB_OUTPUT"

      - name: Bump image.tag in values.yaml
        env:
          GITOPS_FILE: ${{ steps.paths.outputs.gitops_file }}
          IMAGE_NAME: ${{ inputs.image_name }}
          NEW_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          if [[ ! -f "$GITOPS_FILE" ]]; then
            echo "::error::values file not found at $GITOPS_FILE"
            exit 1
          fi
          python3 <<'PYEOF'
          import os, re, sys
          path = os.environ['GITOPS_FILE']
          image_name = os.environ['IMAGE_NAME']
          new_tag = os.environ['NEW_TAG']
          with open(path) as fp:
              content = fp.read()
          # Top-level image block: repository: <image>\n  tag: <old>
          p1 = re.compile(r'(repository:\s*' + re.escape(image_name) + r'\n\s+tag:)[^\n]+')
          new_content, n1 = p1.subn(r'\1 "' + new_tag + '"', content)
          # extraContainers / any inline image: <image>:<old>
          p2 = re.compile(r'(image:\s*' + re.escape(image_name) + r'):[\w.\-]+')
          new_content, n2 = p2.subn(r'\1:' + new_tag, new_content)
          if n1 == 0 and n2 == 0:
              print(f"ERROR: could not find any image tag pattern for {image_name} in {path}", file=sys.stderr)
              sys.exit(2)
          with open(path, 'w') as fp:
              fp.write(new_content)
          print(f"OK: bumped {n1} repository/tag + {n2} inline image occurrence(s) in {path}")
          PYEOF

      - name: Commit and push
        env:
          GITOPS_FILE: ${{ steps.paths.outputs.gitops_file }}
          TEAM: ${{ inputs.team_name }}
          SERVICE: ${{ inputs.component_name }}
          NEW_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          git config user.email "ci@mctl.ai"
          git config user.name "mctl-ci"
          git add "$GITOPS_FILE"
          if git diff --staged --quiet; then
            echo "::notice::No tag change in $GITOPS_FILE (already at ${NEW_TAG})"
            exit 0
          fi
          git commit -m "chore: bump ${TEAM}/${SERVICE} to ${NEW_TAG}"
          git push

      - name: Summary
        run: |
          {
            echo "## Released ${{ inputs.team_name }}/${{ inputs.component_name }}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Image** | \`${{ inputs.image_name }}:${{ inputs.image_tag }}\` |"
            echo "| **Git ref** | \`${{ inputs.git_ref }}\` |"
            echo "| **Gitops file** | \`${{ steps.paths.outputs.gitops_file }}\` |"
          } >> $GITHUB_STEP_SUMMARY
