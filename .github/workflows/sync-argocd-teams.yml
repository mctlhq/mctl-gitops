name: Sync ArgoCD Teams RBAC

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger
  push:
    # Re-sync when tenant definitions change
    branches:
      - main
    paths:
      - 'platform-gitops/tenants/*/values.yaml'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-teams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Read tenant definitions
        id: read-tenants
        run: |
          echo "Reading tenant definitions from platform-gitops/tenants/..."

          # Extract tenant name and github team slug from each tenant values.yaml
          # Output: "tenant_name:github_team" one per line
          > /tmp/tenants.txt

          for f in platform-gitops/tenants/*/values.yaml; do
            if [ -f "$f" ]; then
              tenant_name=$(yq '.tenant.name' "$f" 2>/dev/null)
              github_team=$(yq '.tenant.githubTeam // .tenant.name' "$f" 2>/dev/null)

              if [ -n "$tenant_name" ] && [ "$tenant_name" != "null" ]; then
                echo "${tenant_name}:${github_team}" >> /tmp/tenants.txt
              fi
            fi
          done

          echo "Found tenants:"
          cat /tmp/tenants.txt
          echo "tenant_count=$(wc -l < /tmp/tenants.txt)" >> $GITHUB_OUTPUT

      - name: Generate RBAC policies
        id: generate-rbac
        run: |
          cat > /tmp/generate-rbac.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          # Output file — ArgoCD values managed by argocd-self-managed
          VALUES="platform-gitops/argocd/values.yaml"

          # Build new policy.csv content
          POLICY_CSV=""
          POLICY_CSV+="        # ============================================================================\n"
          POLICY_CSV+="        # ArgoCD RBAC Policies - Auto-generated from tenant definitions\n"
          POLICY_CSV+="        # Source: platform-gitops/tenants/*/values.yaml\n"
          POLICY_CSV+="        # ============================================================================\n"
          POLICY_CSV+="\n"
          POLICY_CSV+="        # Admin team: full access to ArgoCD\n"
          POLICY_CSV+="        p, role:admin, applications, *, */*, allow\n"
          POLICY_CSV+="        p, role:admin, logs, get, */*, allow\n"
          POLICY_CSV+="        p, role:admin, exec, create, */*, allow\n"
          POLICY_CSV+="        p, role:admin, clusters, get, */*, allow\n"
          POLICY_CSV+="        p, role:admin, repositories, *, */*, allow\n"
          POLICY_CSV+="        p, role:admin, projects, *, */*, allow\n"
          POLICY_CSV+="        g, mctlhq:admin, role:admin\n"
          POLICY_CSV+="\n"
          POLICY_CSV+="        # ============================================================================\n"
          POLICY_CSV+="        # Team-Based Access (Auto-generated from tenant definitions)\n"
          POLICY_CSV+="        # ============================================================================\n"

          # Generate policies for each tenant (except admin)
          while IFS=: read -r tenant_name github_team; do
            if [ "$tenant_name" = "admin" ]; then
              continue
            fi
            POLICY_CSV+="\n"
            POLICY_CSV+="        # Tenant: $tenant_name (github: $github_team)\n"
            POLICY_CSV+="        p, role:team-$tenant_name, applications, get, preview/preview-$tenant_name-*, allow\n"
            POLICY_CSV+="        p, role:team-$tenant_name, applications, list, preview/preview-$tenant_name-*, allow\n"
            POLICY_CSV+="        p, role:team-$tenant_name, applications, sync, preview/preview-$tenant_name-*, allow\n"
            POLICY_CSV+="        p, role:team-$tenant_name, applications, override, preview/preview-$tenant_name-*, allow\n"
            POLICY_CSV+="        p, role:team-$tenant_name, logs, get, preview/preview-$tenant_name-*, allow\n"
            POLICY_CSV+="        p, role:team-$tenant_name, exec, create, preview/preview-$tenant_name-*, allow\n"
            # Map GitHub team to ArgoCD role (using github_team slug for Dex group claim)
            POLICY_CSV+="        g, mctlhq:$github_team, role:team-$tenant_name\n"
          done < /tmp/tenants.txt

          # Replace policy.csv block in values.yaml
          START=$(grep -n 'policy\.csv: |' "$VALUES" | cut -d: -f1)

          # Save everything before policy.csv
          head -n "$START" "$VALUES" > /tmp/values_new.yaml

          # Add new policy content
          echo -e "$POLICY_CSV" >> /tmp/values_new.yaml

          # Find and add everything after policy.csv block
          tail -n +$((START + 1)) "$VALUES" | awk '
            BEGIN { in_policy=1 }
            /^    [a-z]/ { in_policy=0 }
            !in_policy { print }
          ' >> /tmp/values_new.yaml

          # Replace original file
          mv /tmp/values_new.yaml "$VALUES"

          echo "Generated RBAC config for $(wc -l < /tmp/tenants.txt) tenants"
          SCRIPT

          chmod +x /tmp/generate-rbac.sh
          /tmp/generate-rbac.sh

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet platform-gitops/argocd/values.yaml; then
            echo "No changes detected in RBAC config"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in RBAC config"
            git diff platform-gitops/argocd/values.yaml
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Commit changes directly to main
          git add platform-gitops/argocd/values.yaml
          git commit -m "chore(argocd): sync RBAC policies from tenant definitions

          Auto-generated update from tenant definitions sync workflow.
          Source: platform-gitops/tenants/*/values.yaml

          Tenants synced: ${{ steps.read-tenants.outputs.tenant_count }}

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          # Push directly to main
          git push origin main

      - name: Summary
        run: |
          echo "## ArgoCD Teams Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** \`platform-gitops/tenants/*/values.yaml\` (tenant definitions, no GitHub API)" >> $GITHUB_STEP_SUMMARY
          echo "**Tenants found:** ${{ steps.read-tenants.outputs.tenant_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tenants:**" >> $GITHUB_STEP_SUMMARY
          cat /tmp/tenants.txt | awk -F: '{print "- " $1 " (github: " $2 ")"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check-changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ **Changes detected** - committed and pushed to main" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **No changes** - RBAC config is up to date" >> $GITHUB_STEP_SUMMARY
          fi
