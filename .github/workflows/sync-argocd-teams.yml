name: Sync ArgoCD Teams RBAC

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-teams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch GitHub teams
        id: fetch-teams
        env:
          GH_TOKEN: ${{ secrets.GITHUB_PAT || github.token }}
        run: |
          echo "Fetching teams from dmitriimashkov organization..."
          gh api /orgs/dmitriimashkov/teams --paginate --jq '.[].slug' > /tmp/teams.txt
          echo "Found teams:"
          cat /tmp/teams.txt
          echo "team_count=$(wc -l < /tmp/teams.txt)" >> $GITHUB_OUTPUT

      - name: Generate RBAC policies
        id: generate-rbac
        run: |
          cat > /tmp/generate-rbac.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          # Output file — ArgoCD values managed by argocd-self-managed
          VALUES="platform-gitops/argocd/values.yaml"

          # Build new policy.csv content
          POLICY_CSV=""
          POLICY_CSV+="        # ============================================================================\n"
          POLICY_CSV+="        # ArgoCD RBAC Policies - Auto-synced with GitHub Teams\n"
          POLICY_CSV+="        # ============================================================================\n"
          POLICY_CSV+="\n"
          POLICY_CSV+="        # Admin team: full access to ArgoCD\n"
          POLICY_CSV+="        p, role:admin, applications, *, */*, allow\n"
          POLICY_CSV+="        p, role:admin, logs, get, */*, allow\n"
          POLICY_CSV+="        p, role:admin, exec, create, */*, allow\n"
          POLICY_CSV+="        p, role:admin, clusters, get, */*, allow\n"
          POLICY_CSV+="        p, role:admin, repositories, *, */*, allow\n"
          POLICY_CSV+="        p, role:admin, projects, *, */*, allow\n"
          POLICY_CSV+="        g, dmitriimashkov:admin, role:admin\n"
          POLICY_CSV+="\n"
          POLICY_CSV+="        # ============================================================================\n"
          POLICY_CSV+="        # Team-Based Access (Auto-generated from GitHub Teams)\n"
          POLICY_CSV+="        # ============================================================================\n"

          # Generate policies for each team (except admin)
          while IFS= read -r team; do
            if [ "$team" = "admin" ]; then
              continue
            fi
            POLICY_CSV+="\n"
            POLICY_CSV+="        # Team: $team\n"
            POLICY_CSV+="        p, role:team-$team, applications, get, argocd/preview-$team-*, allow\n"
            POLICY_CSV+="        p, role:team-$team, logs, get, argocd/preview-$team-*, allow\n"
            POLICY_CSV+="        g, dmitriimashkov:$team, role:team-$team\n"
          done < /tmp/teams.txt

          # Replace policy.csv block in values.yaml using python for reliable multiline replacement
          python3 << PYEOF
          import re

          with open("$VALUES", "r") as f:
              content = f.read()

          # Match the policy.csv block (from "policy.csv: |" to the next key at same indentation)
          pattern = r'(      policy\.csv: \|)\n(.*?)(\n    [a-z])'
          replacement = r'\1\n$(echo -e "$POLICY_CSV")\3'

          # Use a simpler approach: find and replace the policy.csv section
          lines = content.split('\n')
          new_lines = []
          in_policy = False
          policy_indent = 0

          for line in lines:
              if 'policy.csv: |' in line and not in_policy:
                  in_policy = True
                  policy_indent = len(line) - len(line.lstrip())
                  new_lines.append(line)
                  # Add new policy content
                  new_lines.append("""$(echo -e "$POLICY_CSV")""".rstrip())
                  continue

              if in_policy:
                  # Check if we've left the block (non-empty line with same or less indent)
                  stripped = line.lstrip()
                  if stripped and not line.startswith(' ' * (policy_indent + 2)):
                      in_policy = False
                      new_lines.append(line)
                  # Skip old policy lines
                  continue

              new_lines.append(line)

          with open("$VALUES", "w") as f:
              f.write('\n'.join(new_lines))
          PYEOF

          echo "Generated RBAC config for $(wc -l < /tmp/teams.txt) teams"
          SCRIPT

          chmod +x /tmp/generate-rbac.sh
          /tmp/generate-rbac.sh

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet platform-gitops/argocd/values.yaml; then
            echo "No changes detected in RBAC config"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected in RBAC config"
            git diff platform-gitops/argocd/values.yaml
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_PAT || github.token }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch
          BRANCH="chore/sync-argocd-teams-$(date +%s)"
          git checkout -b "$BRANCH"

          # Commit changes
          git add platform-gitops/argocd/values.yaml
          git commit -m "chore(argocd): sync RBAC policies with GitHub teams

          Auto-generated update from GitHub teams sync workflow.

          Teams synced: ${{ steps.fetch-teams.outputs.team_count }}
          $(cat /tmp/teams.txt | sed 's/^/- /')

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          # Push branch
          git push origin "$BRANCH"

          # Create PR
          gh pr create \
            --title "chore(argocd): sync RBAC policies with GitHub teams" \
            --body "## Auto-generated RBAC Update

          This PR updates ArgoCD RBAC policies to match current GitHub teams in the \`dmitriimashkov\` organization.

          ### Changes
          - Synced team-based RBAC policies from GitHub teams API
          - Teams are granted read-only access to their namespace applications (\`preview-{team}-*\`)

          ### Teams Included (${{ steps.fetch-teams.outputs.team_count }} teams)
          $(cat /tmp/teams.txt | sed 's/^/- /')

          ### Review Checklist
          - [ ] Verify all active teams are included
          - [ ] Check no sensitive teams are exposed
          - [ ] Confirm permissions are read-only for non-admin teams

          **Note:** This is an automated PR. Review carefully before merging.

          ---
          🤖 Auto-generated by [sync-argocd-teams workflow](https://github.com/dmitriimashkov/mctl.me/actions/workflows/sync-argocd-teams.yml)" \
            --base main \
            --head "$BRANCH" \
            --label "automated,argocd,rbac"

      - name: Summary
        run: |
          echo "## ArgoCD Teams Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Teams found:** ${{ steps.fetch-teams.outputs.team_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Teams:**" >> $GITHUB_STEP_SUMMARY
          cat /tmp/teams.txt | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check-changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ **Changes detected** - PR created" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **No changes** - RBAC config is up to date" >> $GITHUB_STEP_SUMMARY
          fi
