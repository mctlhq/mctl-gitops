name: Onboard New Service

on:
  workflow_dispatch:
    inputs:
      team_name:
        description: "Team name (e.g. payments)"
        required: true
        type: string
      service_name:
        description: "Service name (e.g. payment-api)"
        required: true
        type: string
      service_type:
        description: "Helm chart type"
        required: true
        type: choice
        options:
          - base-service
          - worker-service
      port:
        description: "Service port (base-service only)"
        required: false
        default: "8080"
        type: string
      host:
        description: "Ingress host (base-service only, e.g. payment-api.preview.mctl.me)"
        required: false
        type: string
      dockerfile_repo:
        description: "Source repo with Dockerfile (e.g. dmitriimashkov/payment-api)"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile in source repo"
        required: false
        default: "Dockerfile"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: dmitriimashkov

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate naming conventions
        run: |
          TEAM="${{ inputs.team_name }}"
          SERVICE="${{ inputs.service_name }}"

          if [[ ! "$TEAM" =~ ^[a-z0-9][a-z0-9-]{0,62}$ ]]; then
            echo "::error::team_name must match ^[a-z0-9][a-z0-9-]*$ and be ≤63 chars. Got: $TEAM"
            echo "## ❌ Validation Failed" >> $GITHUB_STEP_SUMMARY
            echo "**team_name** \`$TEAM\` is invalid. Use only lowercase letters, numbers, and hyphens." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [[ ! "$SERVICE" =~ ^[a-z0-9][a-z0-9-]{0,62}$ ]]; then
            echo "::error::service_name must match ^[a-z0-9][a-z0-9-]*$ and be ≤63 chars. Got: $SERVICE"
            echo "## ❌ Validation Failed" >> $GITHUB_STEP_SUMMARY
            echo "**service_name** \`$SERVICE\` is invalid. Use only lowercase letters, numbers, and hyphens." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Checkout platform repo
        uses: actions/checkout@v4

      - name: Check service does not exist
        run: |
          TYPE="${{ inputs.service_type }}"
          if [[ "$TYPE" == "base-service" ]]; then
            DIR="platform-gitops/services/preview/${{ inputs.team_name }}/${{ inputs.service_name }}"
          else
            DIR="platform-gitops/workers/preview/${{ inputs.team_name }}/${{ inputs.service_name }}"
          fi

          if [[ -d "$DIR" ]]; then
            echo "::error::Service already exists at $DIR. Use deploy-service workflow to update."
            echo "## ❌ Service Already Exists" >> $GITHUB_STEP_SUMMARY
            echo "Directory \`$DIR\` already exists. Use the **Deploy Service** workflow to update the image tag." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Validate base-service inputs
        if: inputs.service_type == 'base-service'
        run: |
          if [[ -z "${{ inputs.host }}" ]]; then
            echo "::error::host is required for base-service"
            echo "## ❌ Missing Input" >> $GITHUB_STEP_SUMMARY
            echo "**host** is required for base-service (e.g. \`my-app.preview.mctl.me\`)." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Verify source repo accessible
        run: |
          if ! git ls-remote "https://github.com/${{ inputs.dockerfile_repo }}" HEAD > /dev/null 2>&1; then
            echo "::error::Cannot access repo: ${{ inputs.dockerfile_repo }}"
            echo "## ❌ Source Repo Inaccessible" >> $GITHUB_STEP_SUMMARY
            echo "Cannot access \`${{ inputs.dockerfile_repo }}\`. Check the repo name and permissions." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  build-image:
    name: Build & push Docker image
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.dockerfile_repo }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ inputs.service_name }}:initial
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ inputs.service_name }}:${{ github.sha }}

      - name: Report build failure
        if: failure()
        run: |
          echo "## ❌ Docker Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "The Docker image failed to build. Check the build logs above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Common issues:" >> $GITHUB_STEP_SUMMARY
          echo "- Invalid Dockerfile syntax" >> $GITHUB_STEP_SUMMARY
          echo "- Missing dependencies in Dockerfile" >> $GITHUB_STEP_SUMMARY
          echo "- Wrong \`dockerfile_path\` (current: \`${{ inputs.dockerfile_path }}\`)" >> $GITHUB_STEP_SUMMARY

  create-config:
    name: Create service config
    needs: build-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout platform repo
        uses: actions/checkout@v4

      - name: Generate values.yaml
        run: |
          TYPE="${{ inputs.service_type }}"
          TEAM="${{ inputs.team_name }}"
          SERVICE="${{ inputs.service_name }}"

          if [[ "$TYPE" == "base-service" ]]; then
            TARGET_DIR="platform-gitops/services/preview/${TEAM}/${SERVICE}"
            TEMPLATE=".github/templates/base-service-values.yaml.tpl"
          else
            TARGET_DIR="platform-gitops/workers/preview/${TEAM}/${SERVICE}"
            TEMPLATE=".github/templates/worker-service-values.yaml.tpl"
          fi

          mkdir -p "$TARGET_DIR"

          sed \
            -e "s|__TEAM_NAME__|${TEAM}|g" \
            -e "s|__SERVICE_NAME__|${SERVICE}|g" \
            -e "s|__IMAGE_TAG__|initial|g" \
            -e "s|__PORT__|${{ inputs.port }}|g" \
            -e "s|__HOST__|${{ inputs.host }}|g" \
            "$TEMPLATE" > "${TARGET_DIR}/values.yaml"

          echo "## Generated values.yaml" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          cat "${TARGET_DIR}/values.yaml" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Validate Helm template
        run: |
          TYPE="${{ inputs.service_type }}"
          CHART_PATH="helm-charts/${TYPE}"

          # Install helm
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          if ! helm template test "$CHART_PATH" \
            -f "platform-gitops/$([[ "$TYPE" == "base-service" ]] && echo "services" || echo "workers")/preprod/${{ inputs.team_name }}/${{ inputs.service_name }}/values.yaml" \
            > /dev/null 2>&1; then
            echo "::error::Helm template validation failed"
            echo "## ❌ Helm Validation Failed" >> $GITHUB_STEP_SUMMARY
            echo "The generated values.yaml is incompatible with the \`${TYPE}\` chart." >> $GITHUB_STEP_SUMMARY
            helm template test "$CHART_PATH" \
              -f "platform-gitops/$([[ "$TYPE" == "base-service" ]] && echo "services" || echo "workers")/preprod/${{ inputs.team_name }}/${{ inputs.service_name }}/values.yaml" \
              2>&1 >> $GITHUB_STEP_SUMMARY || true
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TYPE="${{ inputs.service_type }}"
          if [[ "$TYPE" == "base-service" ]]; then
            DIR="platform-gitops/services/preview/${{ inputs.team_name }}/${{ inputs.service_name }}"
          else
            DIR="platform-gitops/workers/preview/${{ inputs.team_name }}/${{ inputs.service_name }}"
          fi

          git add "$DIR/values.yaml"
          git commit -m "feat: onboard ${{ inputs.team_name }}/${{ inputs.service_name }} (${{ inputs.service_type }})"
          git push

      - name: Success summary
        run: |
          echo "## ✅ Service Onboarded Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Team** | \`${{ inputs.team_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | \`${{ inputs.service_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Chart** | \`${{ inputs.service_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ inputs.service_name }}:initial\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will automatically detect and deploy this service." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To update the image, use the **Deploy Service** workflow." >> $GITHUB_STEP_SUMMARY
