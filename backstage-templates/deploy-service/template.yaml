apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: deploy-service
  title: Deploy Web Service
  description: Build & deploy a web service with ingress to the preview cluster
  tags:
    - deploy
    - kubernetes
    - preview
    - service
spec:
  owner: group:admin
  type: service

  parameters:
    - title: Service Info
      required:
        - teamName
        - serviceName
      properties:
        teamName:
          title: Team Name
          type: string
          description: "Select your team"
          ui:field: OwnedEntityPicker
          ui:options:
            allowedKinds:
              - Group
            defaultKind: Group
        serviceName:
          title: Service Name
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

    - title: Source Repository
      required:
        - dockerfileRepo
      properties:
        dockerfileRepo:
          title: GitHub Repository
          type: string
          description: "owner/repo with Dockerfile (e.g. dmitriimashkov/my-app)"
          pattern: "^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$"
        dockerfilePath:
          title: Dockerfile Path
          type: string
          default: Dockerfile
        repoPat:
          title: Repository PAT (private repos only)
          type: string
          description: "Fine-grained PAT with Contents:read scope for the source repo"
          ui:field: Secret

    - title: Service Configuration
      required:
        - port
        - host
      properties:
        port:
          title: Port
          type: number
          default: 8080
        host:
          title: Ingress Host
          type: string
          description: "e.g. myapp.preview.mctl.me"

    - title: Secrets
      properties:
        secretEnvVars:
          title: Secret Environment Variables
          type: object
          additionalProperties:
            type: string
          description: "Keys to store in Vault and inject via ExternalSecret"

  steps:
    - id: save-repo-pat
      name: Save repo PAT to Vault
      if: ${{ parameters.repoPat }}
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/vault/v1/secret/data/preview/${{ parameters.teamName | parseEntityRef | pick('name') }}/${{ parameters.serviceName }}/repo-pat
        headers:
          Content-Type: application/json
        body:
          data:
            pat: ${{ parameters.repoPat }}

    - id: save-secrets
      name: Save secrets to Vault
      if: ${{ parameters.secretEnvVars and parameters.secretEnvVars | length > 0 }}
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/vault/v1/secret/data/preview/${{ parameters.teamName | parseEntityRef | pick('name') }}/${{ parameters.serviceName }}
        headers:
          Content-Type: application/json
        body:
          data: ${{ parameters.secretEnvVars }}

    - id: trigger-build
      name: Build & deploy via GitHub Actions
      action: github:actions:dispatch
      input:
        repoUrl: github.com?repo=mctl.me&owner=dmitriimashkov
        workflowId: service.yml
        branchOrTagName: main
        workflowInputs:
          action: onboard
          team_name: ${{ parameters.teamName | parseEntityRef | pick('name') }}
          service_name: ${{ parameters.serviceName }}
          service_type: base-service
          dockerfile_repo: ${{ parameters.dockerfileRepo }}
          dockerfile_path: ${{ parameters.dockerfilePath | default('Dockerfile') }}
          port: ${{ parameters.port | string }}
          host: ${{ parameters.host }}

  output:
    links:
      - title: GitHub Actions Run
        url: https://github.com/dmitriimashkov/mctl.me/actions/workflows/service.yml
