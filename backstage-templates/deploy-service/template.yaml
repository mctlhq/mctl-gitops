apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: deploy-service
  title: Deploy Component
  description: Build & deploy a component to the preview cluster. Provide a host for web services with ingress, or leave it empty for a background worker.
  tags:
    - deploy
    - kubernetes
    - preview
    - service
    - worker
spec:
  owner: group:admin
  type: service

  parameters:
    - title: Component Info
      required:
        - teamName
        - serviceName
      properties:
        teamName:
          title: Team Name
          type: string
          description: "Select your team"
          ui:field: MyGroupsPicker
        serviceName:
          title: Component Name
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

    - title: Source Repository
      required:
        - dockerfileRepo
        - gitTag
      properties:
        dockerfileRepo:
          title: GitHub Repository
          type: string
          description: >-
            owner/repo containing the Dockerfile (e.g. dmitriimashkov/my-app).
            For private repos: install the GitHub App at https://github.com/apps/mctl-me/installations/new
            or provide a PAT below.
          pattern: "^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$"
        dockerfilePath:
          title: Dockerfile Path
          type: string
          default: Dockerfile
        gitTag:
          title: Git Tag
          type: string
          description: "Semver tag to checkout and build (e.g., v1.0.0)."
          pattern: "^v?[0-9]+\\.[0-9]+\\.[0-9]+.*$"
        repoPat:
          title: Repository PAT (private repos only — optional if GitHub App is installed)
          type: string
          description: >-
            Only needed if the GitHub App is not installed on this repo.
            Fine-grained PAT with 'Contents: Read' scope.
            Create at: https://github.com/settings/tokens?type=beta
          ui:field: Secret

    - title: Network Configuration (optional)
      properties:
        port:
          title: Port
          type: number
          default: 8080
          description: "HTTP port. Required for web services with ingress."
        host:
          title: Ingress Host
          type: string
          description: "Ingress hostname (e.g. myapp.preview.mctl.me). Leave empty to deploy as a background worker."

    - title: Environment Variables
      properties:
        envVars:
          title: Environment Variables (non-secret)
          type: string
          description: "Plaintext KEY=value pairs (one per line). Will be visible in Kubernetes manifests."
          ui:widget: textarea
          ui:options:
            rows: 5
          ui:placeholder: |
            APP_ENV=production
            LOG_LEVEL=info
            PORT=8080
            TIMEOUT_SECONDS=30

    - title: Secrets
      properties:
        secretEnvVars:
          title: Secret Environment Variables
          type: string
          description: "Plaintext KEY=value pairs (one per line). Will be stored in Vault and injected securely."
          ui:widget: textarea
          ui:options:
            minRows: 10
          ui:placeholder: |
            API_KEY=your-api-key-here
            DATABASE_PASSWORD=your-db-password
            SECRET_TOKEN=your-secret-token

  steps:
    - id: save-repo-pat
      name: Save repo PAT to Vault
      if: ${{ parameters.repoPat }}
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/vault/v1/secret/data/teams/${{ parameters.teamName | parseEntityRef | pick('name') }}/${{ parameters.serviceName }}/repo-pat
        headers:
          Content-Type: application/json
        body:
          data:
            pat: ${{ parameters.repoPat }}

    - id: trigger-build
      name: Build & deploy via GitHub Actions
      action: github:actions:dispatch
      input:
        repoUrl: github.com?repo=mctl.me&owner=dmitriimashkov
        workflowId: service.yml
        branchOrTagName: main
        workflowInputs:
          action: onboard
          team_name: ${{ parameters.teamName | parseEntityRef | pick('name') }}
          service_name: ${{ parameters.serviceName }}
          service_type: ${{ 'base-service' if parameters.host else 'worker-service' }}
          dockerfile_repo: ${{ parameters.dockerfileRepo }}
          dockerfile_path: ${{ parameters.dockerfilePath | default('Dockerfile') }}
          git_tag: ${{ parameters.gitTag }}
          port: ${{ parameters.port | string }}
          host: ${{ parameters.host | default('') }}
          env_vars: ${{ parameters.envVars | default('') }}
          secret_env_vars: ${{ parameters.secretEnvVars | default('') }}

  output:
    links:
      - title: GitHub Actions Run
        url: https://github.com/dmitriimashkov/mctl.me/actions/workflows/service.yml
