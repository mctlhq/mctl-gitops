# Service: ${{ values.serviceName }}
# Team: ${{ values.teamName }}
# Environment: preview

image:
  repository: ${{ values.imageRepository }}
  tag: "${{ values.imageTag }}"
{%- if values.imagePullSecretName %}

imagePullSecrets:
  - name: ${{ values.imagePullSecretName }}
{%- elif values.imageRepository and values.imageRepository.startswith('ghcr.io') %}

imagePullSecrets:
  - name: ghcr-credentials
{%- endif %}

service:
  port: ${{ values.port | default(8080) }}

replicaCount: ${{ values.replicaCount | default(1) }}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
{%- if values.envVars and values.envVars | length > 0 %}

env:
{%- for key, value in values.envVars %}
  ${{ key }}: "${{ value }}"
{%- endfor %}
{%- endif %}
{%- if values.secretEnvVars and values.secretEnvVars | length > 0 %}

externalSecret:
  targetSecret: ${{ values.serviceName }}-secrets
  data:
{%- for key, value in values.secretEnvVars %}
    - secretKey: ${{ key }}
      remoteKey: teams/${{ values.teamName }}/${{ values.serviceName }}
      property: ${{ key }}
{%- endfor %}

envFrom:
  - secretRef:
      name: ${{ values.serviceName }}-secrets
{%- endif %}
{%- if values.host %}

ingress:
  enabled: true
  host: ${{ values.host }}
{%- endif %}
{%- if values.healthCheckPath %}

probes:
  liveness:
    path: ${{ values.healthCheckPath }}
    port: http
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: ${{ values.healthCheckPath }}
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
{%- else %}

probes:
  liveness: null
  readiness: null
{%- endif %}
