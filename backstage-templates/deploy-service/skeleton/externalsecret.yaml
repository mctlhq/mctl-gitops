{%- if values.secretEnvVars and values.secretEnvVars | length > 0 -%}
# ExternalSecret for ${{ values.serviceName }}
# Team: ${{ values.teamName }}
# Vault path: secret/data/preprod/${{ values.teamName }}/${{ values.serviceName }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ${{ values.serviceName }}-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ${{ values.serviceName }}-secrets
    creationPolicy: Owner
  data:
{%- for key, value in values.secretEnvVars %}
    - secretKey: ${{ key }}
      remoteRef:
        key: preprod/${{ values.teamName }}/${{ values.serviceName }}
        property: ${{ key }}
{%- endfor %}
{%- endif %}
