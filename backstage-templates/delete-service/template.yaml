apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: delete-service
  title: Delete Service from Preview
  description: Remove a deployed service — triggers GitHub Actions to delete files, Vault secrets, and K8s resources
  tags:
    - delete
    - kubernetes
    - preview
spec:
  owner: group:admin
  type: service

  parameters:
    - title: Select Service to Delete
      required:
        - teamName
        - serviceName
        - serviceType
      properties:
        teamName:
          title: Team Name
          type: string
          description: "Select your team"
          ui:field: OwnedEntityPicker
          ui:options:
            catalogFilter:
              kind: Group
            defaultKind: Group
        serviceName:
          title: Service Name
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{0,62}$"
          description: "Exact name of the service to delete"
        serviceType:
          title: Service Type
          type: string
          enum:
            - base-service
            - worker-service
          enumNames:
            - "Web Service (services/)"
            - "Worker (workers/)"

    - title: Confirm Deletion
      properties:
        deleteVaultSecrets:
          title: Also delete Vault secrets?
          type: boolean
          default: true
          description: "Remove secrets from Vault for this service"

  steps:
    - id: trigger-delete
      name: Trigger delete workflow
      action: github:actions:dispatch
      input:
        repoUrl: github.com?repo=mctl.me&owner=dmitriimashkov
        workflowId: delete-service.yml
        branchOrTagName: main
        workflowInputs:
          team_name: ${{ parameters.teamName | parseEntityRef | pick('name') }}
          service_name: ${{ parameters.serviceName }}
          service_type: ${{ parameters.serviceType }}
          delete_vault_secrets: ${{ parameters.deleteVaultSecrets | string }}

  output:
    links:
      - title: GitHub Actions Run
        url: https://github.com/dmitriimashkov/mctl.me/actions/workflows/delete-service.yml
