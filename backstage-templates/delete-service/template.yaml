apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: delete-service
  title: Delete Service or Worker
  description: Delete a service or worker from the platform (GitOps, ArgoCD, Kubernetes, Vault)
  tags:
    - delete
    - cleanup
    - worker
    - service
spec:
  owner: group:platform
  type: service

  parameters:
    - title: Select Service to Delete
      required:
        - service
      properties:
        service:
          title: Service to Delete
          type: string
          description: "Select the service you want to delete"
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Component
            defaultKind: Component

    - title: Confirmation
      required:
        - confirmDeletion
      properties:
        confirmDeletion:
          title: Type 'DELETE' to confirm
          type: string
          description: "⚠️ This action is IRREVERSIBLE. All resources will be permanently deleted (GitOps files, ArgoCD Application, Kubernetes resources, Vault secrets)."
          pattern: "^DELETE$"

  steps:
    - id: parse-service
      name: Parse service metadata
      action: catalog:fetch
      input:
        entityRef: ${{ parameters.service }}

    - id: trigger-delete
      name: Trigger deletion via GitHub Actions
      action: github:actions:dispatch
      input:
        repoUrl: github.com?repo=mctl.me&owner=dmitriimashkov
        workflowId: delete-service.yml
        branchOrTagName: main
        workflowInputs:
          team_name: ${{ steps['parse-service'].output.entity.metadata.labels.team }}
          service_name: ${{ steps['parse-service'].output.entity.metadata.name }}
          service_type: ${{ steps['parse-service'].output.entity.spec.type === 'worker' and 'worker-service' or 'base-service' }}
          delete_vault_secrets: "true"

  output:
    links:
      - title: GitHub Actions Run
        url: https://github.com/dmitriimashkov/mctl.me/actions/workflows/delete-service.yml
      - title: View Logs
        icon: github
        url: https://github.com/dmitriimashkov/mctl.me/actions/workflows/delete-service.yml
