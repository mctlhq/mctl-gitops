apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: update-service-config
  title: Update Component Config
  description: Update environment variables and secrets for a deployed component without triggering a new build
  tags:
    - configure
    - secrets
    - env
spec:
  owner: group:admin
  type: service

  parameters:
    - title: Component
      required:
        - teamName
        - serviceName
      properties:
        teamName:
          title: Team Name
          type: string
          description: "Select your team"
          ui:field: MyGroupsPicker
        serviceName:
          title: Component Name
          type: string
          description: "Select the deployed component to update"
          ui:field: OwnedEntityPicker
          ui:options:
            allowedKinds:
              - Component

    - title: Environment Variables (non-secret)
      properties:
        envVars:
          title: Environment Variables
          type: string
          description: "Plaintext KEY=value pairs (one per line). Stored in git — visible in Kubernetes manifests."
          ui:widget: textarea
          ui:options:
            rows: 6
          ui:placeholder: |
            LOG_LEVEL=info
            TIMEOUT_SECONDS=30
            FEATURE_FLAG=true

    - title: Secrets
      properties:
        secretEnvVars:
          title: Secret Environment Variables
          type: string
          description: "Plaintext KEY=value pairs (one per line). Will be stored in Vault and injected securely."
          ui:widget: textarea
          ui:options:
            minRows: 10
          ui:placeholder: |
            API_KEY=your-api-key-here
            DATABASE_PASSWORD=your-db-password
            SECRET_TOKEN=your-secret-token

  steps:
    - id: update-config
      name: Update config via GitHub Actions
      if: ${{ parameters.envVars or parameters.secretEnvVars }}
      action: github:actions:dispatch
      input:
        repoUrl: github.com?repo=mctl.me&owner=dmitriimashkov
        workflowId: service.yml
        branchOrTagName: main
        workflowInputs:
          action: update-config
          team_name: ${{ parameters.teamName | parseEntityRef | pick('name') }}
          service_name: ${{ parameters.serviceName | parseEntityRef | pick('name') }}
          env_vars: ${{ parameters.envVars | default('') }}
          secret_env_vars: ${{ parameters.secretEnvVars | default('') }}

  output:
    text:
      - title: Summary
        content: |
          **Component:** `${{ parameters.teamName | parseEntityRef | pick('name') }}/${{ parameters.serviceName | parseEntityRef | pick('name') }}`

          ${{ parameters.secretEnvVars and '✅ **Secrets** update dispatched — will be stored in Vault and synced to Kubernetes automatically.' or '' }}

          ${{ parameters.envVars and '✅ **Env vars** update dispatched to GitHub Actions. ArgoCD will sync automatically (~2-3 min).' or '' }}
    links:
      - title: GitHub Actions Run
        url: https://github.com/dmitriimashkov/mctl.me/actions/workflows/service.yml
        if: ${{ parameters.envVars or parameters.secretEnvVars }}
