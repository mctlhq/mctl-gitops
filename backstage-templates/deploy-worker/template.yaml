apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: deploy-worker
  title: Deploy Worker
  description: Deploy a background worker (deployment or cronjob) to the preview cluster
  tags:
    - deploy
    - kubernetes
    - preview
    - worker
spec:
  owner: group:admin
  type: service

  parameters:
    - title: Worker Info
      required:
        - teamName
        - serviceName
      properties:
        teamName:
          title: Team Name
          type: string
          description: "Select your team"
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: Group
            defaultKind: Group
        serviceName:
          title: Worker Name
          type: string
          pattern: "^[a-z0-9][a-z0-9-]{0,62}$"

    - title: Docker Image
      required:
        - imageRepository
        - imageTag
      properties:
        imageRepository:
          title: Image Repository
          type: string
          description: "Full image path (e.g. ghcr.io/dmitriimashkov/myworker or python:3.12)"
        imageTag:
          title: Image Tag
          type: string
          default: latest
        imagePullSecretName:
          title: Image Pull Secret Name
          type: string
          description: "K8s secret for private registry auth (optional)"

    - title: Worker Configuration
      properties:
        workloadType:
          title: Workload Type
          type: string
          enum:
            - deployment
            - cronjob
          enumNames:
            - "Deployment (long-running)"
            - "CronJob (scheduled)"
          default: deployment
        cronSchedule:
          title: Cron Schedule (cronjob only)
          type: string
          default: "*/5 * * * *"
          description: "Standard cron expression"
        replicaCount:
          title: Replica Count
          type: number
          default: 1
        command:
          title: Container Command Override
          type: array
          items:
            type: string
          description: "Override entrypoint (optional)"
        args:
          title: Container Args Override
          type: array
          items:
            type: string
          description: "Override args (optional)"
        envVars:
          title: Environment Variables
          type: object
          additionalProperties:
            type: string
          description: "Key-value pairs: VAR_NAME → value"
        secretEnvVars:
          title: Secret Environment Variables
          type: object
          additionalProperties:
            type: string
          description: "Keys to store in Vault and inject via ExternalSecret"

  steps:
    - id: generate-files
      name: Generate worker files
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./output/platform-gitops/workers/preview/${{ parameters.teamName | parseEntityRef | pick('name') }}/${{ parameters.serviceName }}
        values:
          teamName: ${{ parameters.teamName | parseEntityRef | pick('name') }}
          serviceName: ${{ parameters.serviceName }}
          imageRepository: ${{ parameters.imageRepository }}
          imageTag: ${{ parameters.imageTag }}
          imagePullSecretName: ${{ parameters.imagePullSecretName }}
          workloadType: ${{ parameters.workloadType }}
          cronSchedule: ${{ parameters.cronSchedule }}
          replicaCount: ${{ parameters.replicaCount }}
          command: ${{ parameters.command }}
          args: ${{ parameters.args }}
          envVars: ${{ parameters.envVars }}
          secretEnvVars: ${{ parameters.secretEnvVars }}

    - id: create-vault-secrets
      name: Create Vault secrets
      if: ${{ parameters.secretEnvVars and parameters.secretEnvVars | length > 0 }}
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/vault/v1/secret/data/preview/${{ parameters.teamName | parseEntityRef | pick('name') }}/${{ parameters.serviceName }}
        headers:
          Content-Type: application/json
        body:
          data: ${{ parameters.secretEnvVars }}

    - id: create-pr
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=mctl.me&owner=dmitriimashkov
        title: "deploy: ${{ parameters.teamName | parseEntityRef | pick('name') }}/${{ parameters.serviceName }}"
        branchName: "deploy/${{ parameters.teamName | parseEntityRef | pick('name') }}-${{ parameters.serviceName }}"
        description: |
          ## Deploy Worker ${{ parameters.serviceName }}

          **Team:** ${{ parameters.teamName | parseEntityRef | pick('name') }}
          **Type:** Worker (${{ parameters.workloadType }})
          **Image:** ${{ parameters.imageRepository }}:${{ parameters.imageTag }}

          Created by Backstage scaffolder.
        sourcePath: ./output
        targetPath: "."

  output:
    links:
      - title: Pull Request
        url: ${{ steps['create-pr'].output.remoteUrl }}
