# Worker: ${{ values.serviceName }}
# Team: ${{ values.teamName }}
# Environment: preview

image:
  repository: ${{ values.imageRepository }}
  tag: "${{ values.imageTag }}"
{%- if values.imagePullSecretName %}

imagePullSecrets:
  - name: ${{ values.imagePullSecretName }}
{%- elif values.imageRepository and values.imageRepository.startswith('ghcr.io') %}

imagePullSecrets:
  - name: ghcr-credentials
{%- endif %}

workloadType: ${{ values.workloadType | default("deployment") }}
{%- if values.workloadType == "cronjob" and values.cronSchedule %}

cronjob:
  schedule: "${{ values.cronSchedule }}"
{%- endif %}
{%- if values.command and values.command | length > 0 %}

command:
{%- for cmd in values.command %}
  - "${{ cmd }}"
{%- endfor %}
{%- endif %}
{%- if values.args and values.args | length > 0 %}

args:
{%- for arg in values.args %}
  - "${{ arg }}"
{%- endfor %}
{%- endif %}

replicaCount: ${{ values.replicaCount | default(1) }}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
{%- if values.envVars and values.envVars | length > 0 %}

env:
{%- for key, value in values.envVars %}
  ${{ key }}: "${{ value }}"
{%- endfor %}
{%- endif %}
{%- if values.secretEnvVars and values.secretEnvVars | length > 0 %}

externalSecret:
  targetSecret: ${{ values.serviceName }}-secrets
  data:
{%- for key, value in values.secretEnvVars %}
    - secretKey: ${{ key }}
      remoteKey: preview/${{ values.teamName }}/${{ values.serviceName }}
      property: ${{ key }}
{%- endfor %}

envFrom:
  - secretRef:
      name: ${{ values.serviceName }}-secrets
{%- endif %}
